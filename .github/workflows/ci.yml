name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["master", "main"]

jobs:
  validate:
    name: KB schema validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Validate YAML schema + referential integrity
        run: python scripts/audit_validator.py --human

  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -e ".[dev]" && pip install fastapi uvicorn sqlalchemy aiosqlite pydantic pydantic-settings httpx pytest pytest-asyncio anyio slowapi pywebpush python-jose passlib
      - name: Run pytest
        run: python -m pytest tests/hospital/ -q

  frontend:
    name: Frontend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run build -- --noEmit 2>/dev/null || npx tsc --noEmit
      - name: Run Vitest
        run: npm run test -- --run
