name: Validate Hospital Backend

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "hospital/**"
      - "tests/hospital/**"
      - "requirements-hospital.txt"
      - ".github/workflows/validate-hospital.yml"
  push:
    branches: [master]

jobs:
  hospital-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-hospital.txt

      - name: Run hospital backend tests
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          JWT_SECRET: "ci-secret-not-for-prod"
          AUDIT_MRN_SALT: "ci-salt"
        run: |
          python -m pytest tests/hospital/ --asyncio-mode=auto -q
