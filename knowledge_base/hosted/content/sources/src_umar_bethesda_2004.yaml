notes: 'STUB — v0.2 prevention workstream. Revised Bethesda guidelines (2004) defining
  which CRC tumors should undergo MSI / IHC testing as a Lynch-syndrome screen. Largely
  superseded by universal-screening recommendations (NCCN / Manchester / Evaluation
  of Genomic Applications in Practice and Prevention) but still cited as the foundational
  selection criterion in pre-universal-tumor-testing era. Used by some non-universal-screening
  programs and historic cohorts.

