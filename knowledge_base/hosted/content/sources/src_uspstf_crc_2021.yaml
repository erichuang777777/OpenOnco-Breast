notes: 'STUB — v0.2 prevention workstream. Cited by prevention RFs / Indications for
  average-risk colorectal-cancer screening: Grade B at age 45-49, Grade A at age 50-75,
  Grade C (selective) at age 76-85. Lowered start age from 50 to 45 vs 2016 statement.
  Acceptable modalities: gFOBT or FIT annually; FIT-DNA q1-3y; flexible sigmoidoscopy
  q5y (alone) or q10y (with FIT q1y); colonoscopy q10y; CT colonography q5y.

