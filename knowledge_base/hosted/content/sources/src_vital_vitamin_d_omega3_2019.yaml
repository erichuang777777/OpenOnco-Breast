notes: 'STUB — v0.2 prevention workstream. VITAL — 2x2 factorial primary-prevention
  RCT in 25,871 US adults (men >=50, women >=55) randomised to vitamin D3 2,000 IU/day
  vs placebo and marine n-3 fatty acids 1 g/day vs placebo, median 5.3 years. Primary
  cancer endpoint (invasive cancer of any type): HR 0.96 (95% CI 0.88–1.06, NS). Pre-specified
  secondary endpoint of cancer mortality showed signal of benefit in sensitivity analyses
  excluding early follow-up. Underpins USPSTF "I" statement on routine vitamin D supplementation
  for cancer prevention.

