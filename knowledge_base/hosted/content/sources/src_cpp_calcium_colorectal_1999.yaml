notes: 'STUB — v0.2 prevention workstream. Calcium Polyp Prevention Study Group —
  double-blind RCT randomising 930 adults with recent colorectal adenoma to elemental
  calcium 1,200 mg/day vs placebo for 4 years. Result: 19% adjusted relative reduction
  in adenoma recurrence (RR 0.85, 95% CI 0.74–0.98). Cited by older ACG / USPSTF colorectal
  chemoprevention reviews. Subsequent calcium-vitamin-D adenoma-prevention trial (Baron
  NEJM 2015) showed null effect; calcium chemoprevention now largely deprioritised
  in favour of aspirin in average-risk populations.

