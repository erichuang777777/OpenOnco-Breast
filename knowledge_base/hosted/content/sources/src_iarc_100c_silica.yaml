notes: 'STUB — v0.2 prevention workstream. Cited by prevention RFs / Indications for
  occupational crystalline-silica exposure → lung cancer. IARC Group 1 carcinogen
  (inhaled crystalline silica in the form of quartz or cristobalite from occupational
  sources). Affected workers: stone-cutting, mining (esp. hard-rock), quarrying, sandblasting,
  foundry work, tunnel construction, ceramics, glass-making, engineered-stone fabrication.

