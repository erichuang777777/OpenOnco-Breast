notes: 'STUB — v0.2 prevention workstream. REDUCE — placebo-controlled RCT in 8,231
  men aged 50–75 with elevated PSA (2.5–10) and a recent negative biopsy, randomised
  to dutasteride 0.5 mg/day vs placebo for 4 years. Primary result: 22.8% relative
  reduction in biopsy-detected prostate cancer (HR 0.77, 95% CI 0.68–0.86). Similar
  Gleason-grade signal as PCPT (small absolute excess of Gleason 8–10), prompting
  FDA decision NOT to grant a chemoprevention indication for either 5-ARI. Cited by
  ASCO / AUA chemoprevention discussion frameworks.

