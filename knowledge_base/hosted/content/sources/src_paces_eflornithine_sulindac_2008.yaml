notes: 'STUB — v0.2 prevention workstream. PACES — double-blind RCT randomising 375
  adults with prior sporadic colorectal adenoma to difluoromethylornithine (DFMO /
  eflornithine 500 mg/day) + sulindac 150 mg/day vs placebo for 3 years. Result: 70%
  relative reduction in adenoma recurrence (12.3% vs 41.1%) and >90% reduction in
  advanced / multiple adenomas. Foundational for combination-chemoprevention research
  and subsequent J-FAPP / Burke FAP trials. Not yet a guideline-recommended regimen
  in average-risk colorectal prevention (cardiovascular / NSAID risk profile).

