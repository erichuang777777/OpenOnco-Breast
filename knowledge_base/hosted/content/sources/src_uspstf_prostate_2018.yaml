notes: 'STUB — v0.2 prevention workstream. Cited by prevention RFs / Indications for
  PSA-based screening for prostate cancer: Grade C (individualized, shared decision-making)
  in men age 55-69; Grade D (recommend against) at age ≥70. Reverses 2012 Grade D
  across-the-board recommendation. Does not cover Black men or men with first-degree
  family history of prostate cancer as separate strata — addressed via NCCN.

