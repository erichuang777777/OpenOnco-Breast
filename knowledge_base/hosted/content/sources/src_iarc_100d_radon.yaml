notes: 'STUB — v0.2 prevention workstream. Cited by prevention RFs / Indications for
  residential and occupational radon exposure → lung cancer. IARC Group 1 carcinogen.
  Radon-222 is the second leading cause of lung cancer in non-smokers; risk multiplicative
  with smoking. Mitigation thresholds: EPA action level 4 pCi/L (148 Bq/m³); WHO reference
  level 100 Bq/m³. Affected populations: residents of geologic-radon zones (granite
  bedrock, e.g. parts of Ukraine), uranium miners, hard-rock miners.

