notes: 'STUB — v0.2 prevention workstream. PCPT — placebo-controlled RCT randomising
  18,882 men aged >=55 with PSA <=3.0 to finasteride 5 mg/day vs placebo for 7 years.
  Primary result: 24.8% relative reduction in period-prevalence prostate cancer (18.4%
  vs 24.4%, p<0.001), but apparent excess of Gleason >=7 tumours (37% relative increase)
  that later sensitivity analyses attributed to detection bias / smaller prostates.
  Foundational for ASCO / AUA chemoprevention recommendations; informs USPSTF prostate
  screening guidance.

