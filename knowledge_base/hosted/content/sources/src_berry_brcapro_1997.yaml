notes: 'STUB — v0.2 prevention workstream. Foundational paper for BRCAPRO, a Mendelian
  Bayesian model that estimates BRCA1/2 carrier probability and breast/ovarian cancer
  risk from pedigree data. Embedded in CancerGene and BayesMendel R package; widely
  used in cancer genetics clinics before BOADICEA / Tyrer-Cuzick adoption. NCCN Genetic/Familial
  High-Risk v2025 lists BRCAPRO among acceptable Mendelian models for BRCA testing
  thresholds.

