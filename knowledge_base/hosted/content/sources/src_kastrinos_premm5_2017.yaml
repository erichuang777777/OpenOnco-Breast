notes: 'STUB — v0.2 prevention workstream. Cited by Lynch syndrome risk-prediction
  algorithms (ALG-PREMM5 / ALG-LYNCH-RISK). PREMM5 estimates the probability of carrying
  a pathogenic variant in MLH1, MSH2, MSH6, PMS2, or EPCAM based on personal and family
  cancer history. Replaces PREMM(1,2,6). Threshold ≥2.5% triggers germline testing
  per NCCN Genetic/Familial High-Risk Assessment. Free calculator at premm.dfci.harvard.edu.

