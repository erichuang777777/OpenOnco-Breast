notes: 'STUB — v0.2 prevention workstream. Children''s Oncology Group Long-Term Follow-Up
  Guidelines v5.0 (October 2018) — consensus, evidence-graded surveillance recommendations
  for late-effects screening in childhood / adolescent / young-adult cancer survivors,
  indexed by treatment exposure (anthracyclines, alkylators, platinum, bleomycin,
  topoisomerase II inhibitors, chest / abdominal / cranial / pelvic radiation, HSCT,
  surgery). Cited across all paediatric cancer survivor late-effects surveillance
  pilots (cardiomyopathy, ototoxicity, second-cancer screening, gonadal / endocrine
  / pulmonary / neurocognitive surveillance). Companion to IGHG harmonised paediatric
  survivor guidelines.

