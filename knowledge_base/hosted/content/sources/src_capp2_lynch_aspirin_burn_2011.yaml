notes: 'STUB — v0.2 prevention workstream. CAPP2 (Colorectal Adenoma/carcinoma Prevention
  Programme 2) — international, double-blind RCT randomising 861 Lynch syndrome carriers
  to aspirin 600 mg/day vs placebo, mean treatment 25 months, planned 10-year follow-up.
  2011 primary analysis: HR 0.41 (95% CI 0.19–0.86, p=0.02) for CRC after aspirin.
  Basis for NCCN / ESMO / Mallorca group recommendations on aspirin chemoprevention
  in Lynch syndrome. Long-term follow-up CAPP2 Lancet 2020 confirmed durable benefit.

