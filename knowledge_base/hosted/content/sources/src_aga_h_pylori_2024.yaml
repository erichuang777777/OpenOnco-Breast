notes: 'STUB — v0.2 prevention-workstream authoring; pending two-Clinical-Co-Lead
  signoff per CHARTER §6.1 dev-mode. Cited by prevention RFs and Indications (H. pylori
  eradication path, gastric MALT lymphoma, gastric adenocarcinoma prevention) in the
  v0.2-A pilot. Current US treatment guideline; emphasizes bismuth quadruple therapy
  first-line, optimized PPI dosing, and salvage regimens (rifabutin triple, levofloxacin
  triple) after failure. Companion to SRC-MAASTRICHT-VI-FLORENCE-2022 (European consensus)
  — both used as Tier-1 references for the H. pylori eradication pathway.

