notes: 'STUB — v0.2 prevention workstream. NSABP P-1 — double-blind RCT randomising
  13,388 women at elevated breast cancer risk (Gail 5-year >=1.67%, age >=60, LCIS,
  atypical hyperplasia) to tamoxifen 20 mg/day vs placebo for 5 years. Primary result:
  49% relative reduction in invasive breast cancer (RR 0.51, 95% CI 0.39–0.66) and
  50% reduction in non-invasive. Excess endometrial cancer (RR 2.53) and thromboembolic
  events. Basis for FDA tamoxifen risk-reduction indication and ASCO / NCCN breast
  chemoprevention frameworks.

