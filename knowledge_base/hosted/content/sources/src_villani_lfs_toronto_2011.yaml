notes: 'STUB — v0.2 prevention workstream. Cited by Li-Fraumeni surveillance Indications.
  Foundational study establishing the Toronto protocol: annual whole-body MRI + breast
  MRI + brain MRI + biochemical screening in germline TP53 carriers. 7 of 33 surveilled
  carriers had asymptomatic cancers detected; 100% 3-year OS in surveillance arm vs
  21% in non-surveillance arm. Basis for current NCCN / ACMG / IARC TP53 surveillance
  recommendations. 2016 follow-up (Villani Lancet Oncol 2016) confirmed durable survival
  benefit at 11 years.

