notes: 'STUB — v0.2 prevention workstream. Primary methodology paper for BOADICEA v6
  (Breast and Ovarian Analysis of Disease Incidence and Carrier Estimation Algorithm),
  delivered to clinicians via the CanRisk tool (canrisk.org). Combines pathogenic-variant
  carrier status (BRCA1/2, PALB2, CHEK2, ATM), polygenic risk score (313-SNP PRS),
  family history, mammographic density, and lifestyle/reproductive factors into 10-year
  and lifetime breast cancer risk estimates. Endorsed by NICE CG164 and NCCN Breast/Ovarian
  v2025 for risk-stratified screening + chemoprevention discussion thresholds.

