notes: 'STUB — v0.2 prevention workstream. NSABP STAR P-2 — double-blind RCT randomising
  19,747 postmenopausal women at elevated breast cancer risk to tamoxifen 20 mg/day
  vs raloxifene 60 mg/day for 5 years. Primary result: raloxifene was as effective
  as tamoxifen in reducing invasive breast cancer (RR 1.02 in initial report; long-term
  update showed raloxifene retained ~76% of tamoxifen efficacy) with significantly
  lower rates of uterine cancer, thromboembolic events, and cataracts. Basis for FDA
  raloxifene risk-reduction indication and ASCO / NCCN chemoprevention algorithms
  in postmenopausal patients.

