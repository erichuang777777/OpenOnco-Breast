notes: 'STUB — v0.2 prevention workstream. Large French cohort study (415 TP53-mutation
  families) underpinning the revised Chompret criteria (2015) for clinical TP53 testing
  eligibility. Demonstrates spectrum + age-distribution of LFS-associated tumors —
  soft-tissue sarcoma, osteosarcoma, premenopausal breast cancer, choroid plexus carcinoma,
  adrenocortical carcinoma. Foundation for current NCCN Genetic/Familial High-Risk
  Breast/Ovarian/Pancreatic v2025 and ACMG/ENIGMA TP53 testing thresholds.

