notes: 'STUB — v0.2 prevention workstream. Cited by prevention RFs / Indications for
  average-risk breast-cancer screening: Grade B biennial mammography in women age
  40-74. New 2024 statement lowered start age from 50 to 40. Insufficient evidence
  (I statement) for: continuing screening at age ≥75; supplemental screening with
  US/MRI for dense breasts. Does not cover hereditary or high-risk pathways (those
  follow ACS/NCCN).

