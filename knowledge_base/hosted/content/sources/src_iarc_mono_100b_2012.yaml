notes: 'STUB — v0.2 prevention-workstream authoring; pending two-Clinical-Co-Lead
  signoff per CHARTER §6.1 dev-mode. Cited by prevention RFs and Indications (Lynch
  / H. pylori / etc.) in the v0.2-A and v0.2-B pilots. IARC Group 1 carcinogenicity
  classifications for biological agents: HCV, HBV, HPV (high-risk types), HIV-1 (indirect
  via immunosuppression), EBV, HTLV-1, H. pylori (gastric MALT lymphoma + gastric
  adenocarcinoma), KSHV/HHV-8, and MCV (Merkel cell polyomavirus). Foundational reference
  for v0.2-A infectious-etiology prevention pilots covering 7 oncogenic infectious
  agents.

