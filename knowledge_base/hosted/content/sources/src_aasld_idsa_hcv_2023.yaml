  living document is updated on a rolling basis; 2023 captured version covers DAA
  regimens (sofosbuvir/velpatasvir, glecaprevir/pibrentasvir, sofosbuvir/velpatasvir/voxilaprevir),
  universal-screening recommendations, and post-cure follow-up. Pairs with SRC-EASL-HCV-2023
  as the US-side Tier-1 reference for the HCV→NHL prevention anchor (KSS §20).

