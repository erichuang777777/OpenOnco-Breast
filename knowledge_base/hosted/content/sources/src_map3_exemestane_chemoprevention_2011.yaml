notes: 'STUB — v0.2 prevention workstream. NCIC CTG MAP.3 — double-blind RCT randomising
  4,560 postmenopausal women at elevated breast cancer risk (>=60 years OR Gail score
  >1.66% OR prior LCIS / atypical hyperplasia / DCIS post-mastectomy) to exemestane
  25 mg/day vs placebo for up to 5 years. Median follow-up 35 months: 65% relative
  reduction in invasive breast cancer (HR 0.35, 95% CI 0.18–0.70, p=0.002). Bone /
  joint AE excess but no excess fracture / cardiovascular events. Basis for ASCO 2013
  / NICE / NCCN 2025 breast chemoprevention recommendations alongside tamoxifen +
  raloxifene.

  '
