notes: 'STUB — v0.2 prevention workstream. Cited by Lynch syndrome risk-assessment
  algorithms and prevention RFs. Amsterdam II criteria expand original Amsterdam I
  to include extracolonic HNPCC-associated cancers (endometrium, small bowel, ureter,
  renal pelvis). Foundational clinical criteria still used (alongside Bethesda guidelines
  and PREMM5) for Lynch-syndrome suspicion before universal MMR-IHC tumour testing
  became standard.

