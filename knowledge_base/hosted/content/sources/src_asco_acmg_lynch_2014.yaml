notes: 'STUB — v0.2 prevention-workstream authoring; pending two-Clinical-Co-Lead
  signoff per CHARTER §6.1 dev-mode. Cited by prevention RFs and Indications (Lynch
  syndrome diagnostic criteria, MMR / MSI testing cascade, family-history-driven CRC
  surveillance) in the v0.2-B Lynch hereditary pilot. ASCO endorsement of the ESMO
  familial-risk colorectal-cancer guideline; covers Amsterdam II and revised Bethesda
  criteria, MMR-IHC / MSI as universal tumor screen for CRC patients, germline mutation
  testing for MLH1 / MSH2 / MSH6 / PMS2 / EPCAM, and surveillance recommendations
  for confirmed Lynch carriers.

  Citation-year asymmetry: entity ID uses 2014 (the year ASCO formally endorsed the
  ESMO guideline); the journal publication appeared in J Clin Oncol 2015 (Volume 33,
  Issue 2). Both years are correct in context — not an error.

