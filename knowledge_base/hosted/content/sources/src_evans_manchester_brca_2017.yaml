notes: 'STUB — v0.2 prevention workstream. Refined Manchester score — a simple point-based
  family-history score for BRCA1 / BRCA2 carrier probability, used in UK genetics
  clinics alongside BOADICEA. Threshold >=15 points historically triggered BRCA testing
  (10% prior). Update reflects modern panel-testing era and ovarian-cancer pathology
  contributions. Endorsed by NICE CG164 alongside BOADICEA / BRCAPRO.

