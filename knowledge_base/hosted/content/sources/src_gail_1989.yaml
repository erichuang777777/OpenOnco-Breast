notes: 'STUB — v0.2 prevention workstream. Original derivation of the Gail model
  (BCRAT — Breast Cancer Risk Assessment Tool), the first widely deployed 5-year +
  lifetime breast cancer risk calculator. Inputs: age, age at menarche, age at first
  live birth, prior biopsies, atypical hyperplasia, family history (first-degree).
  Anchor for NSABP P-1 / STAR enrollment (5-year risk >=1.67%) and for NCCN / USPSTF
  chemoprevention discussion thresholds. Limited generalizability beyond white US
  women; CARE and Asian/Pacific-Islander updates published 2007 / 2011.

