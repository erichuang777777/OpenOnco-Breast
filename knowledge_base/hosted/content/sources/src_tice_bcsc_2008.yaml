notes: 'STUB — v0.2 prevention workstream. Derivation of the Breast Cancer Surveillance
  Consortium (BCSC) 5-year and 10-year risk model from >1 million screening mammograms
  in 7 US registries. Adds BI-RADS mammographic density to age, race/ethnicity, family
  history, and prior biopsy. Used by ACR / SBI to identify women who may benefit from
  supplemental screening MRI / ultrasound; included in NCCN Breast Screening v2025.

