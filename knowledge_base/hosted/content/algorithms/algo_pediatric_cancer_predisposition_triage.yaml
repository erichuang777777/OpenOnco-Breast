notes: >
  STUB — declarative reference content encoding pediatric cancer
  predisposition gene-panel triage per AACR Pediatric Cancer
  Predisposition Working Group consensus (Brodeur GM et al.
  Pediatric Cancer Predisposition and Surveillance: An Overview,
  and a Tribute to Alfred G. Knudson Jr. Clin Cancer Res
  2017;23:e1-e5 PMID 28572261; Knapke S et al. Identification,
  Management, and Evaluation of Children With Cancer-Predisposition
  Syndromes. American Society of Clinical Oncology Educational
  Book 2019;39:e25-e34 PMID 31099673; Ripperger T et al.
  Childhood cancer predisposition syndromes — A concise review and
  recommendations by the Cancer Predisposition Working Group of
  the Society for Pediatric Oncology and Hematology. Am J Med
  Genet A 2017;173:1017-1037 PMID 28168833). Primary-paper Source
  entities (SRC-BRODEUR-2017-AACR-PEDIATRIC, SRC-ZHANG-2015-NEJM-
  PEDIATRIC-GERMLINE, SRC-GROBNER-2018-NATURE-PEDIATRIC,
  SRC-RIPPERGER-2017-SPOH-PEDIATRIC) are v0.2-B authoring backlog.

  Anchored to DIS-ADRENOCORTICAL-CARCINOMA (most pathognomonic
  pediatric-LFS sentinel tumor — Chompret criterion C). Reach is
  cross-disease (the algorithm's input is a pediatric cancer
  proband — any tumor type — and the output is gene-panel
  recommendation). Reach covers all pediatric cancer predisposition
  syndromes: LFS (TP53), NF1, NF2, Beckwith-Wiedemann (11p15
  methylation + CDKN1C), WAGR (WT1), retinoblastoma (RB1), DICER1,
  Gorlin (PTCH1 / SUFU), CMMRD (biallelic MMR), Fanconi anemia
  (FANC genes), Bloom (BLM), xeroderma pigmentosum (XPA-XPG, POLH),
  ataxia-telangiectasia (ATM biallelic), MEN2B (RET M918T),
  pheochromocytoma-paraganglioma syndromes (VHL, SDHx, NF1, RET,
  TMEM127, MAX, FH, MDH2), RASopathies (PTPN11 etc.), Sotos
  (NSD1), Perlman, Simpson-Golabi-Behmel, hereditary RCC, Birt-
  Hogg-Dube (FLCN), and additional newer rare syndromes.

  Pediatric cancer germline yield benchmarks:
    - Unselected pediatric cancer cohorts: ~8-12% germline finding
      (Zhang 2015 NEJM, n=1120; Gröbner 2018 Nature, n=961)
    - Pediatric cancer with phenotype-clue triage (this algorithm):
      yield substantially higher in triaged subgroups —
      * Sentinel ACC / CPC: ~50-80% germline yield
      * Bilateral / familial retinoblastoma: ~100% germline RB1
      * Multi-primary pediatric proband: ~20-30%
      * Syndromic-features-positive (NF1 / Beckwith-Wiedemann /
        etc.): >90% for the syndrome-specific gene
      * Family-history-positive pediatric proband: ~15-25%

  Practical considerations:
    - Comprehensive panel cost ~$250-500 in 2024-2026 — typically
      reimbursed by insurance / national-health schemes for
      pediatric cancer probands (varies by jurisdiction)
    - Pre-test counseling for pediatric germline testing requires
      capacity-of-consent management — minor proband, parental
      legal surrogate, future-adult-implication discussion
    - Post-test surveillance pathways vary by syndrome — Toronto
      Protocol for LFS, retinoblastoma surveillance for RB1, etc.
      Cascade testing for at-risk family members per syndrome-
      specific algorithm

  Cited from RF-PEDIATRIC-CANCER-PREDISPOSITION-SUSPICION + sentinel-
  tumor RF-* trigger logic.

  Decision-tree semantics: routes (via default-Indication placeholder
  IND-LI-FRAUMENI-SUSPICION-PREVENTION-ENHANCED-SURVEILLANCE) for any
  pediatric cancer proband triaged for germline workup. Engine re-
  routes to syndrome-specific Indication based on panel result.
  Indication-coverage gaps in current KB (pediatric-syndrome-specific
  Indications) are v0.2 authoring backlog.
