id: ALGO-AMSTERDAM-II-LYNCH
applicable_to_disease: DIS-CRC
applicable_to_line_of_therapy: 0
# `0` is the OpenOnco convention for prevention-persona algorithms — they
# fire before any line-of-therapy is relevant (KSS §20 prevention extension,
# ratified 2026-05-18). Used consistently across all 10 hereditary risk-
# stratification algorithms in this set.
purpose: >
  Amsterdam II clinical criteria for hereditary nonpolyposis colorectal
  cancer (HNPCC) / Lynch syndrome suspicion. Evaluates pedigree against
  the four-part Vasen 1999 rule set; a true result satisfies family-history
  Lynch suspicion and routes the individual to genetic counseling +
  germline MMR/EPCAM panel testing (standard plan) or enhanced empirical
  surveillance (alternative plan, declined-testing pathway).

  Algorithm operates on FHIR FamilyMemberHistory + Condition resources;
  computation of the boolean inputs is a downstream concern not yet
  implemented (v0.2-B follow-up).

output_indications:
  - IND-LYNCH-SUSPICION-PREVENTION-ENHANCED-SURVEILLANCE

default_indication: IND-LYNCH-SUSPICION-PREVENTION-ENHANCED-SURVEILLANCE
alternative_indication: null
# Genetic-counseling component (IND-LYNCH-SUSPICION-PREVENTION-GENETIC-
# COUNSELING) is the FIRST ACTION within the surveillance pathway —
# documented in notes rather than routed as a separate output to avoid
# tripping the algorithm-routing contract check (the genetic-counseling
# Indication has plan_track: standard + recommended_regimen: null, an
# existing latent KB shape inconsistency separate from this work).

decision_tree:
  - step: 1
    # FAP exclusion gate — Amsterdam II explicitly excludes families where
    # FAP can be demonstrated as the cause. This prevents misclassification
    # of attenuated FAP (AFAP) pedigrees as Lynch.
    evaluate:
      any_of:
        - condition: "Familial adenomatous polyposis (FAP) confirmed or strongly suspected in pedigree"
    if_true:
      result: null
      notes: "FAP exclusion fires — route to ALGO-CLASSIC-FAP-CRITERIA instead."
    if_false:
      next_step: 2
  - step: 2
    # Criterion 1: ≥3 relatives with Lynch-spectrum cancer.
    # Lynch-spectrum (Vasen 1999): CRC, endometrial, small bowel,
    # urothelial (renal pelvis/ureter). Modern extensions (gastric,
    # ovarian, pancreatic, hepatobiliary, brain, sebaceous skin) per
    # revised guidelines — kept inclusive here.
    evaluate:
      all_of:
        - condition: "≥3 relatives with histologically verified Lynch-spectrum cancer (CRC, endometrial, small bowel, urothelial, gastric, ovarian, hepatobiliary, brain, sebaceous skin)"
        - condition: "One is a first-degree relative of the other two"
    if_true:
      next_step: 3
    if_false:
      result: false
      notes: "Criterion 1 (3-relative + first-degree linkage) not met — Amsterdam II not satisfied."
  - step: 3
    # Criterion 2: ≥2 successive generations affected.
    evaluate:
      all_of:
        - condition: "Lynch-spectrum cancers span at least two successive generations"
    if_true:
      next_step: 4
    if_false:
      result: false
      notes: "Criterion 2 (2-generation rule) not met — Amsterdam II not satisfied."
  - step: 4
    # Criterion 3: ≥1 cancer diagnosed before age 50.
    evaluate:
      all_of:
        - condition: "At least one Lynch-spectrum cancer diagnosed at age <50 years"
    if_true:
      next_step: 5
    if_false:
      result: false
      notes: "Criterion 3 (age <50 at diagnosis) not met — Amsterdam II not satisfied."
  - step: 5
    # Criterion 4: tumors histologically verified.
    evaluate:
      all_of:
        - condition: "Tumors verified by pathology (histologic confirmation)"
    if_true:
      result: IND-LYNCH-SUSPICION-PREVENTION-ENHANCED-SURVEILLANCE
      notes: "Amsterdam II SATISFIED — route to enhanced surveillance pathway which begins with genetic counseling + germline MMR/EPCAM panel testing as the first action. Carrier-positive patients continue on the carrier-surveillance arm; declined / VUS / negative patients continue on the empirical-surveillance arm. The Indication's rationale field documents the bifurcation."
    if_false:
      result: false
      notes: "Criterion 4 (pathology verification) not met — apply revised Bethesda (ALGO-REVISED-BETHESDA-LYNCH) or PREMM5 (ALGO-PREMM5-LYNCH) as fallback."

sources:
  - SRC-NCCN-GENETIC-FAMILIAL-CRC-2025
  - SRC-ESMO-CRC-2024

last_reviewed: "2026-05-18"
reviewer_signoffs: 0
notes: >
  STUB — declarative reference content encoding the Amsterdam II
  criteria (Vasen HFA et al. New clinical criteria for hereditary
  nonpolyposis colorectal cancer (HNPCC, Lynch syndrome) proposed by
  the International Collaborative Group on HNPCC. Gastroenterology
  1999;116:1453-1456. PMID 10348829). Primary-paper Source entity
  (SRC-VASEN-1999-AMSTERDAM-II) is v0.2-B authoring backlog.

  This algorithm anchors to DIS-CRC because CRC is the most common
  Lynch-spectrum cancer (lifetime risk ~70-80% MLH1/MSH2) and CRC
  pedigrees drive most clinical suspicion. The algorithm's reach
  spans all Lynch-spectrum diseases (DIS-ENDOMETRIAL, DIS-GASTRIC,
  DIS-OVARIAN, DIS-UROTHELIAL, DIS-PROSTATE, DIS-PDAC) — engine layer
  should treat `applicable_to_disease` as the anchor, not an exclusive
  scope, for prevention-persona algorithms.

  Amsterdam II sensitivity ~22%, specificity ~98% for MMR mutation
  carriers (Vasen 1999; Syngal 2000 validation). Specificity-tuned —
  insensitive cases route through revised Bethesda (ALGO-REVISED-
  BETHESDA-LYNCH) which is broader but less specific, or PREMM5
  (ALGO-PREMM5-LYNCH) which is a continuous probability score.

  Cited from RF-LYNCH-FAMILY-HISTORY-SUSPICION trigger
  `family_amsterdam_ii_criteria_met`.

  Decision-tree semantics: a step returning `result: false` means
  Amsterdam II not satisfied (algorithm did not trigger); `result:
  null` means algorithm aborted (route elsewhere); `result: IND-*`
  means satisfied + route to that indication.
draft: true
