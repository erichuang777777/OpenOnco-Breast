last_reviewed: "2026-05-18"
notes: >
  Tenofovir alafenamide (TAF) is an alternative to entecavir for first-line chronic HBV suppression. Preferred over TDF in patients with renal impairment (CrCl <60), bone comorbidity, or osteoporosis — TAF has lower plasma tenofovir exposure with better renal/bone safety profile. Same anti-HBV efficacy as TDF.
notes_ua: >
  Тенофовір алафенамід (TAF) — альтернатива ентекавіру для першої лінії супресії хронічного HBV. Переважний над TDF у пацієнтів з нирковою недостатністю (CrCl <60), кістковою коморбідністю або остеопорозом — TAF має нижчу плазмову експозицію тенофовіру з кращим нирковим/кістковим safety profile. Та сама anti-HBV ефективність як TDF.
