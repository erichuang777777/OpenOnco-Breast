id: REG-NALTREXONE-AUD
name: "Naltrexone for alcohol use disorder (PO daily or IM monthly)"
name_ua: "Налтрексон при розладі вживання алкоголю (PO щодня або IM щомісяця)"
alternate_names:
  - "Naltrexone AUD"
  - "Vivitrol IM AUD"

components:
  - drug_id: DRUG-NALTREXONE-PO
    dose: "50 mg PO daily OR 380 mg IM deep gluteal every 4 weeks (Vivitrol)"
    schedule: "PO once daily OR IM depot every 4 weeks"
    route: "PO or IM"
    duration: "≥6-12 months; continue per response and clinical assessment"

cycle_length_days: 30
total_cycles: "ongoing — extend per response"

toxicity_profile: low

premedication: []
mandatory_supportive_care: []
monitoring_schedule_id:

dose_adjustments:
  - condition: "PO 50 mg poorly tolerated (nausea, headache)"
    modification: "Start at 25 mg PO daily × 1-2 days, then escalate to 50 mg"
    rationale: "Allows tolerance assessment"
    source_refs:
      - SRC-NCCN-BCELL-2025
  - condition: "Hepatic transaminitis at baseline (AST/ALT 2-5× ULN)"
    modification: "Cautious initiation; baseline + monthly LFT monitoring; discontinue if >5× ULN"
    rationale: "Hepatotoxicity dose-related (rare at 50 mg/d)"
    source_refs:
      - SRC-NCCN-BCELL-2025
  - condition: "Anticipated need for opioid analgesia (planned surgery)"
    modification: "Hold naltrexone 72-96 h before procedure (PO); IM depot — recovery may need 4 weeks"
    rationale: "Antagonist competition blocks opioid analgesia"
    source_refs:
      - SRC-NCCN-BCELL-2025

ukraine_availability:
  all_components_registered: true
  all_components_reimbursed: false
  notes: "Oral naltrexone registered in Ukraine; IM depot (Vivitrol) limited availability. Out-of-pocket — not on НСЗУ AUD package."

sources:
  - SRC-NCCN-BCELL-2025

between_visit_watchpoints:
  - trigger_ua: "Нудота, головний біль у перші 1-2 тижні"
    action_ua: "Поширений ефект — приймайте з їжею; зазвичай минає; занотуйте на наступному візиті"
    urgency: log_at_next_visit
    sources:
      - SRC-NCCN-BCELL-2025
  - trigger_ua: "Реакція в місці IM-ін'єкції — біль, ущільнення, почервоніння"
    action_ua: "Поширений ефект — зазвичай минає за 1-2 тижні; занотуйте на наступному візиті"
    urgency: log_at_next_visit
    sources:
      - SRC-NCCN-BCELL-2025
  - trigger_ua: "Жовтяниця, темна сеча, болі в правому підребер'ї"
    action_ua: "Подзвоніть у клініку того ж дня — ознака можливої гепатотоксичності"
    urgency: call_clinic_same_day
    sources:
      - SRC-NCCN-BCELL-2025
  - trigger_ua: "Опіоїд для болю (екстрена ситуація, операція)"
    action_ua: "Зверніться до лікарні негайно і повідомте про прийом налтрексону — потрібні значно вищі дози і моніторинг дихання"
    urgency: er_now
    sources:
      - SRC-NCCN-BCELL-2025
  - trigger_ua: "Сильний абсцес або некроз у місці IM-ін'єкції"
    action_ua: "Зверніться до лікарні негайно — рідкісне, але серйозне ускладнення IM-форми"
    urgency: er_now
    sources:
      - SRC-NCCN-BCELL-2025

last_reviewed: "2026-05-18"
notes: >
  Naltrexone is first-line AUD pharmacotherapy alongside acamprosate
  (NIAAA + APA). Oral and IM depot both superior to placebo at reducing
  heavy-drinking days; IM depot improves adherence. Verify opioid-free
  ≥7-10 days before initiation to avoid precipitated withdrawal.
  Alcohol cessation/reduction is a cancer-prevention intervention (HCC,
  CRC, esophageal SCC, breast).

notes_ua: >
  Налтрексон — перша лінія фармакотерапії AUD поряд з акампросатом
  (NIAAA + APA). Як пероральна, так і IM-депо форма перевершують
  плацебо за зниженням кількості днів важкого вживання; IM-депо
  покращує прихильність. Підтвердьте відсутність опіоїдів ≥7-10 днів
  перед початком. Зниження вживання алкоголю — інтервенція для
  профілактики раку (HCC, CRC, езофагеальний SCC, грудь).

ukrainian_review_status: pending_clinical_signoff
