id: REG-EXEMESTANE-CHEMOPREVENTION
name: "Exemestane 25 mg daily × 5 years for postmenopausal breast-cancer chemoprevention"
name_ua: "Екземестан 25 мг щодня × 5 років для хіміопрофілактики РМЗ у постменопаузі"
alternate_names:
  - "Exemestane chemoprevention"
  - "MAP.3 chemoprevention regimen"

components:
  - drug_id: DRUG-EXEMESTANE
    dose: "25 mg PO"
    schedule: "once daily, with food"
    route: PO
    duration: "5 years"

cycle_length_days: 30
total_cycles: "60 months (5 years)"

toxicity_profile: moderate

premedication: []
mandatory_supportive_care: []
monitoring_schedule_id:

dose_adjustments:
  - condition: "Severe arthralgia limiting function"
    modification: "Trial drug holiday × 2-4 weeks; rechallenge; switch to anastrozole or letrozole (cross-class swap may help)"
    rationale: "Class-effect AI arthralgia; switching within class sometimes helps"
    source_refs:
      - SRC-NCCN-BREAST-2025
  - condition: "BMD T-score below -2.0 OR ≥1 osteoporotic fracture during treatment"
    modification: "Add bone-protective therapy — bisphosphonate (zoledronic acid 5 mg IV annual or alendronate PO) or denosumab; ensure adequate calcium + vitamin D"
    rationale: "AIs accelerate bone loss; chemoprevention benefit reduced if fragility fracture occurs"
    source_refs:
      - SRC-NCCN-BREAST-2025
  - condition: "Severe vasomotor symptoms unresponsive to lifestyle measures"
    modification: "Consider non-hormonal options (gabapentin, venlafaxine, oxybutynin) — AVOID estrogen replacement"
    rationale: "Vasomotor symptoms common ~30-40%; estrogen would defeat purpose of AI"
    source_refs:
      - SRC-NCCN-BREAST-2025

