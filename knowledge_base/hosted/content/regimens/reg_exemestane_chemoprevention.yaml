last_reviewed: "2026-05-18"
notes: >
  Exemestane 25 mg PO daily × 5 years for breast-cancer chemoprevention
  in POSTMENOPAUSAL women only per MAP.3 (Goss 2011, NEJM). ~65% reduction
  in invasive breast cancer with lower endometrial/VTE risk than tamoxifen.
  IBIS-II (Cuzick 2014) established similar efficacy for anastrozole.
  Both AIs are NCCN-endorsed first-line chemoprevention options for
  postmenopausal high-risk women. Bone health monitoring (DXA at baseline
  + q2 years) is critical — adverse impact on BMD is the main downside
  vs. raloxifene (which preserves BMD). NOT for premenopausal use
  (requires functioning postmenopausal ovary; would not block premenopausal
  estrogen production).

notes_ua: >
  Екземестан 25 мг PO щодня × 5 років для хіміопрофілактики РМЗ
  ТІЛЬКИ у постменопаузних жінок (MAP.3, Goss 2011, NEJM). ~65%
  зниження інвазивного РМЗ з нижчим ризиком ендометрія/VTE ніж
  тамоксифен. IBIS-II (Cuzick 2014) встановило подібну ефективність
  для анастрозолу. Обидва АІ — перша лінія NCCN-схвалених опцій
  хіміопрофілактики для постменопаузних жінок з високим ризиком.
  Критичний моніторинг здоров'я кісток (DXA на старті + q2 роки) —
  негативний вплив на BMD є головним мінусом порівняно з ралоксифеном.
  НЕ для пременопаузи.

