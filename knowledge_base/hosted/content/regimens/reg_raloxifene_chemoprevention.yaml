id: REG-RALOXIFENE-CHEMOPREVENTION
name: "Raloxifene 60 mg daily × 5 years for postmenopausal breast-cancer chemoprevention"
name_ua: "Ралоксифен 60 мг щодня × 5 років для хіміопрофілактики РМЗ у постменопаузі"
alternate_names:
  - "Raloxifene chemoprevention"
  - "STAR P-2 chemoprevention regimen"

components:
  - drug_id: DRUG-RALOXIFENE
    dose: "60 mg PO"
    schedule: "once daily"
    route: PO
    duration: "5 years"

cycle_length_days: 30
total_cycles: "60 months (5 years)"

toxicity_profile: moderate

premedication: []
mandatory_supportive_care: []
monitoring_schedule_id:

dose_adjustments:
  - condition: "VTE event during treatment (DVT, PE)"
    modification: "Discontinue raloxifene; switch to AI-based chemoprevention (exemestane MAP.3) or risk-management without pharmacoprevention"
    rationale: "Raloxifene ~2× baseline VTE risk; recurrence high"
    source_refs:
      - SRC-NCCN-BREAST-2025
  - condition: "History of CHD or CHD-equivalent risk"
    modification: "Discuss RUTH-trial stroke signal; consider AI alternative"
    rationale: "Increased fatal stroke risk in postmenopausal women with documented CHD per RUTH"
    source_refs:
      - SRC-NCCN-BREAST-2025
  - condition: "Anticipated prolonged immobility (surgery, travel >4 h)"
    modification: "Hold raloxifene ≥72 h pre-immobilization and resume after full mobilization"
    rationale: "VTE risk during periods of stasis"
    source_refs:
      - SRC-NCCN-BREAST-2025

