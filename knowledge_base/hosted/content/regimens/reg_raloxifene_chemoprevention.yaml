last_reviewed: "2026-05-18"
notes: >
  Raloxifene 60 mg PO daily × 5 years for breast-cancer chemoprevention
  in POSTMENOPAUSAL women only per STAR P-2 (NSABP-P2, Vogel 2006).
  ~38% reduction in invasive breast cancer (vs ~50% for tamoxifen) with
  lower endometrial-cancer (no agonism) and lower VTE rates than tamoxifen.
  Preferred over tamoxifen in postmenopausal women with intact uterus or
  VTE-risk profile. Adds osteoporosis benefit. NOT for premenopausal
  use or DCIS prevention. Counsel on RUTH stroke signal in patients with
  documented CHD.

notes_ua: >
  Ралоксифен 60 мг PO щодня × 5 років для хіміопрофілактики РМЗ
  ТІЛЬКИ у постменопаузних жінок (STAR P-2, NSABP-P2, Vogel 2006).
  ~38% зниження інвазивного РМЗ (vs ~50% для тамоксифену) з нижчим
  ризиком раку ендометрія (немає агонізму) і нижчим VTE. Перевага
  над тамоксифеном у постменопаузі при інтактній матці або
  VTE-профілі ризику. Додає бонус щодо остеопорозу. НЕ для
  пременопаузи або профілактики DCIS. Консультуйте щодо RUTH-сигналу
  про фатальний інсульт у пацієнток з документованим ССЗ.

