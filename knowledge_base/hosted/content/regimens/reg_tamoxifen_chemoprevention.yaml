last_reviewed: "2026-05-18"
notes: >
  Tamoxifen 20 mg PO daily × 5 years is the FDA-approved breast-cancer
  chemoprevention regimen per NSABP P-1 (Fisher 1998) and IBIS-I (Cuzick).
  Applicable to BOTH premenopausal and postmenopausal women with elevated
  5-year Gail Model risk (≥1.66%) or BRCA1/2 / strong family history.
  ~50% reduction in invasive breast cancer; absolute benefit varies by
  baseline risk. Counsel on VTE and endometrial-cancer risks; baseline
  pelvic + breast assessment before initiation. Postmenopausal women may
  prefer raloxifene (STAR P-2) or AI (MAP.3 / IBIS-II) for lower
  endometrial / VTE risk.

notes_ua: >
  Тамоксифен 20 мг PO щодня × 5 років — FDA-схвалена схема
  хіміопрофілактики раку молочної залози за NSABP P-1 (Fisher 1998)
  та IBIS-I (Cuzick). Застосовна для пре- і постменопаузних жінок з
  підвищеним 5-річним ризиком за Gail Model (≥1.66%) або BRCA1/2 /
  обтяженим сімейним анамнезом. ~50% зниження інвазивного РМЗ.
  Консультуйте щодо ризиків VTE та раку ендометрія. Для постменопаузи
  можуть бути переважними ралоксифен (STAR P-2) або АІ (MAP.3 /
  IBIS-II) — нижчий ризик ендометрія і VTE.

