dose_adjustments:
  - condition: "VTE event during treatment (DVT, PE)"
    modification: "Discontinue tamoxifen; switch to non-SERM strategy or risk-management without pharmacoprevention"
    rationale: "Tamoxifen ~2-3× baseline VTE risk; recurrence high"
    source_refs:
      - SRC-NCCN-BREAST-2025
  - condition: "Postmenopausal bleeding or pelvic symptoms during treatment"
    modification: "Refer for endometrial sampling; biopsy-confirmed hyperplasia/cancer warrants discontinuation"
    rationale: "~2-3× baseline endometrial cancer risk"
    source_refs:
      - SRC-NCCN-BREAST-2025
  - condition: "Concurrent CYP2D6-inhibitor SSRI (paroxetine, fluoxetine, bupropion)"
    modification: "Switch to weak CYP2D6 inhibitor (citalopram, escitalopram, venlafaxine) where possible"
    rationale: "Strong 2D6 inhibition reduces active metabolite endoxifen; uncertain clinical impact but precautionary"
    source_refs:
      - SRC-NCCN-BREAST-2025

