machine_translated_review_pending: true
notes: >
  STUB pending two-Clinical-Co-Lead signoff per CHARTER §6.1 dev-mode.

  Children's Oncology Group Long-Term Follow-Up Guidelines for
  Survivors of Childhood, Adolescent, and Young Adult Cancers
  (COG-LTFU) v6.0 (2024). The canonical exposure-driven framework
  for cancer-survivor late-effects surveillance. Adult-onset cancer
  survivors lack as comprehensive a single guideline — ASCO survivor
  guidelines (breast, colorectal, prostate, HL / NHL) cover disease-
  specific recurrence + late-effect topics but are less unified than
  COG-LTFU.

  Key COG-LTFU domains in this schedule:
  - Cardiac (anthracycline, chest XRT, anti-HER2)
  - Endocrine (cranial / craniospinal / TBI / neck XRT, alkylator)
  - Second malignancy (radiation-field-driven + secondary-leukemia
    from alkylator + topoisomerase-II inhibitor)
  - Neurocognitive (cranial XRT, intrathecal methotrexate)
  - Auditory (cisplatin / carboplatin)
  - Renal (cisplatin / ifosfamide)
  - Pulmonary (bleomycin / chest XRT)
  - Reproductive / fertility (alkylator / pelvic XRT)
  - Psychosocial

  This schedule documents the BASELINE framework only — exposure-
  specific test cadence varies (some sub-schedules elsewhere in KB
  cover specific tracks). Treatment summary + survivorship-care-plan
  authoring is the critical handoff document — typically nurse-
  navigator-mediated. Primary-care coordination is core: most adult
  survivors return to PCP after 5-10 years post-cancer-completion;
  embedding survivorship-care-plan into PCP record is the durability
  mechanism.

  Ukrainian context: dedicated survivorship clinics are sparse — Kyiv
  + Lviv + Dnipro have pediatric-survivorship programs; adult-cancer
  survivorship is largely embedded in oncology follow-up clinic. No
  dedicated NSZU billing pathway for survivorship-care-plan visits;
  authors of these plans typically deliver them as part of routine
  oncology follow-up.

  UA translations of window / checkpoints added 2026-05-19 under CHARTER
  §8.3 dev-mode exemption; awaiting Clinical Co-Lead sign-off.
