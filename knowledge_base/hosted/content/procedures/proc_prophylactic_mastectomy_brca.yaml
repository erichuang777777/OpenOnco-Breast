# PROC-PROPHYLACTIC-MASTECTOMY-BRCA — Risk-reducing bilateral mastectomy
# in BRCA1/BRCA2 carriers. §20 prevention-persona procedure
# (RATIFIED 2026-05-18). `intent: curative` per §17.1 enum (carrier-state
# framing — no `preventive` enum value in v0.1).
id: PROC-PROPHYLACTIC-MASTECTOMY-BRCA
names:
  preferred: "Risk-reducing bilateral mastectomy for BRCA1/2 carriers"
  ukrainian: "Профілактична двобічна мастектомія у носіїв BRCA1/2"
  english: "Risk-reducing bilateral mastectomy for BRCA1/2 carriers"
  synonyms:
    - "Bilateral prophylactic mastectomy (BPM)"
    - "Risk-reducing mastectomy (RRM)"
    - "Bilateral risk-reducing mastectomy"
    - "Nipple-sparing prophylactic mastectomy"
    - "Skin-sparing prophylactic mastectomy"

type: risk_reducing_mastectomy
intent: curative

target_organ: breast
applicable_diseases:
  - DIS-BREAST

# Mortality from prophylactic mastectomy series in young healthy carriers
# is very low; older Mayo/Rotterdam cohorts (Hartmann, Meijers-Heijboer)
# and modern NCCN summaries report <0.5% perioperative mortality.
operative_mortality_pct: "<0.5% in young (<45 yr) otherwise-healthy BRCA carriers; comparable to elective reconstructive surgery"

common_complications:
  - name: "Wound infection / cellulitis"
    frequency: "5-15%"
  - name: "Hematoma / seroma requiring drainage"
    frequency: "5-15%"
  - name: "Skin / nipple-areolar complex necrosis (nipple-sparing technique)"
    frequency: "5-15% partial; 1-5% full thickness"
  - name: "Implant-based reconstruction complication (capsular contracture, malposition, rupture)"
    frequency: "10-30% lifetime"
  - name: "Autologous flap complications (DIEP/TRAM — partial flap loss, fat necrosis)"
    frequency: "5-15%"
  - name: "Chronic post-mastectomy pain syndrome"
    frequency: "20-40% (any chronic pain); 5-10% severe"
  - name: "Loss of nipple/breast sensation"
    frequency: "Near-universal for skin-sparing; partial preservation possible with nipple-sparing"
  - name: "Psychological distress / body-image change"
    frequency: "Variable; pre-op counseling reduces but does not eliminate"
  - name: "Residual breast tissue with ongoing (small) breast cancer risk"
    frequency: "Risk reduction ~90-95%; not 100% (residual ductal tissue near NAC and axilla)"

sources:
  - SRC-NCCN-GENETIC-FAMILIAL-BREAST-OVARIAN-2025
  - SRC-NCCN-BREAST-2025
  - SRC-EVANS-MANCHESTER-BRCA-2017

last_reviewed: "2026-05-18"
