patient_facing_summary:
  english: >
    BRCA1 and BRCA2 carriers have markedly elevated lifetime breast cancer
    risk (roughly 60-72% for BRCA1, 55-69% for BRCA2 by age 80 per pooled
    cohort data). Risk-reducing bilateral mastectomy removes most of the
    breast tissue and reduces breast cancer risk by about 90-95% — it
    does not eliminate risk because small amounts of breast tissue
    remain near the nipple and chest wall. This is a major elective
    surgery with reconstruction options (implant-based or autologous
    tissue flap) discussed in advance. Shared decision-making is
    essential — the alternative is intensive surveillance (annual MRI
    + annual mammography starting age 25-30). Decisions usually happen
    in the late 20s through the 30s; there is no universally "right"
    age. Reproductive plans, family history, and personal values weigh
    heavily.
  ukrainian: >
    Носії патогенних варіантів BRCA1 та BRCA2 мають значно підвищений
    довічний ризик раку молочної залози (приблизно 60–72% для BRCA1,
    55–69% для BRCA2 до 80 років за об’єднаними когортними даними).
    Профілактична двобічна мастектомія видаляє більшу частину тканини
    молочних залоз і знижує ризик раку приблизно на 90–95% — повністю
    ризик не зникає, оскільки невелика кількість залозистої тканини
    залишається біля соска та грудної стінки. Це велике планове
    хірургічне втручання; варіанти реконструкції (з імплантами або
    автологічним клаптем) обговорюються заздалегідь. Спільне
    прийняття рішення є обов’язковим — альтернативою є інтенсивне
    спостереження (щорічна МРТ + щорічна мамографія з 25–30 років).
    Рішення зазвичай приймається у віці 25–35+ років; універсально
    «правильного» віку не існує. Репродуктивні плани, сімейний
    анамнез та особисті цінності мають істотну вагу.

notes: >
  Bilateral risk-reducing mastectomy (RRM) is the single most effective
  primary-prevention intervention for BRCA1/BRCA2 carriers, reducing
  breast cancer risk ~90-95% (NCCN Genetic/Familial Breast/Ovarian
  v3.2025; pooled cohort data — Hartmann 2001, Meijers-Heijboer 2001,
  Evans 2017 Manchester registry). Critically, RRM does NOT eliminate
  risk — residual ductal tissue near the nipple-areolar complex (NAC),
  axillary tail, and inframammary fold means small breast cancers can
  still arise (~0.5-1% incidence per decade post-RRM in long-term
  cohorts). Risk reduction has not been shown to translate into a clear
  all-cause mortality benefit in randomized trials because mortality from
  BRCA-associated breast cancer can be substantially mitigated by MRI +
  mammography surveillance + early-stage treatment.

  Technique choices:
    - Nipple-sparing mastectomy (NSM): preserves NAC; oncologically
      acceptable per multiple cohort series when NAC margin is negative;
      ~5-15% partial NAC necrosis.
    - Skin-sparing mastectomy (SSM): NAC removed, skin envelope
      preserved for immediate reconstruction.
    - Total mastectomy: classical option; usually reserved for very
      high local risk or technical considerations.

  Reconstruction: immediate implant-based vs delayed; autologous DIEP /
  TRAM / latissimus flaps. Patient preference, body habitus, prior
  radiation, smoking, and BMI drive technique. RRM with reconstruction
  is typically a multi-stage path over 6-12+ months.

  Timing: NCCN suggests age 25-30+ as the earliest reasonable age for
  shared decision-making; no upper bound but risk reduction utility
  diminishes after age ~50-60 as the lifetime risk plateaus and competing
  causes of death rise.

  `intent: curative` per §17.1 enum — risk-reducing surgery in carriers
  is curative-intent in the carrier-state framing. The schema does not
  define a `preventive` intent in v0.1.
