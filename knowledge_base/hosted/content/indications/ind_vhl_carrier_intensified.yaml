rationale: >
  Alternative-track companion to IND-VHL-CARRIER-SURVEILLANCE. For VHL carriers
  with active surveillance findings (developing renal/CNS/pancreatic lesions
  below resection threshold), this track adds:

  **Consideration of belzutifan (HIF-2α inhibitor)** — FDA-approved 2021 (Welireg)
  for adults with VHL-associated RCC, CNS hemangioblastomas, and pancreatic NETs
  not requiring immediate surgery. Based on LITESPARK-004 single-arm trial:
  ORR ~49% RCC / ~30% CNS hemangioblastoma / ~83% pancreatic NET. Durable responses;
  side effects include anemia and hypoxia (HIF-2α mediates erythropoietin
  regulation).

  **Reduced surgical thresholds for renal lesions** — nephron-sparing surgery at
  lesion ≥3cm remains standard, but earlier intervention may be considered when
  growth kinetics are rapid (≥0.5cm/year).

  **CNS hemangioblastoma resection threshold** — symptomatic OR rapidly enlarging
  lesions; small asymptomatic lesions can be observed with closer interval imaging.

  Per CHARTER §11 patient-autonomy framing: aggressive intervention requires
  shared decision-making about quality-of-life and side-effect profile vs.
  surveillance burden.

rationale_ua: >
  Альтернативно-трекова Indication — компаньйон до IND-VHL-CARRIER-SURVEILLANCE.
  Для VHL носіїв з active surveillance findings (розвиваючі renal/CNS/pancreatic
  lesions під resection threshold), цей трек додає:

  **Розгляд белзутіфана (HIF-2α інгібітор)** — FDA-схвалено 2021 (Welireg) для
  дорослих з VHL-асоційованою RCC, CNS гемангіобластомами та pancreatic NETs,
  що не потребують негайної хірургії. На основі LITESPARK-004 single-arm trial:
  ORR ~49% RCC / ~30% CNS hemangioblastoma / ~83% pancreatic NET. Тривалі
  відповіді; побічні ефекти включають анемію та гіпоксію.

  **Знижені хірургічні пороги для renal lesions** — nephron-sparing surgery
  при ≥3см залишається стандартом, але раніше втручання може розглядатися при
  rapid growth kinetics (≥0.5см/рік).

  Per CHARTER §11 framing — aggressive intervention потребує shared
  decision-making про quality-of-life та side-effect profile vs. surveillance.

