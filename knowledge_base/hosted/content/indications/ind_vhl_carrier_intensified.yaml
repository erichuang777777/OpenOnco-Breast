  - "Не оперувати маленькі асимптоматичні CNS hemangioblastomas — observation prefered для невеликих стабільних lesions."

do_not_do_en:
  - "Do not prescribe belzutifan without consultation with a VHL-experienced specialist."
  - "Do not use belzutifan as a replacement for surveillance — additive intervention, not an alternative."
  - "Do not operate on small asymptomatic CNS hemangioblastomas — observation is preferred for small stable lesions."

