expected_outcomes:
  overall_response_rate: >-
    Diagnostic yield of germline RET panel testing in pedigree-
    suspicion populations: ~95-100% positive carrier identification
    in known-pathogenic-variant families on cascade testing; ~25%
    in single-MTC-in-relative pedigrees (this is the hereditary
    fraction of all MTC, which is why ATA 2015 recommends RET testing
    for every MTC patient). Confirmed RET carrier routes to the
    central MEN2 clinical decision — prophylactic thyroidectomy at
    RET-class-specific age, which has near-curative effect for MTC
    when performed before biochemical / structural progression.
    MEN2B M918T carriers undergoing thyroidectomy in infancy (before
    age 1) have ~90% biochemical cure rates; classic MEN2A C634
    carriers undergoing thyroidectomy by age 5 have ~95% biochemical
    cure rates. Pheochromocytoma surveillance prevents hypertensive-
    crisis mortality.

