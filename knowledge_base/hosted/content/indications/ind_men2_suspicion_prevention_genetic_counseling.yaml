sources:
  - source_id: SRC-ATA-THYROID-2015
    position: supports
    relevant_quote_paraphrase: >-
      "All patients with medullary thyroid carcinoma should undergo
      germline RET testing. Confirmed RET carriers are stratified into
      HST / H / MOD risk classes that determine the recommended age
      for prophylactic thyroidectomy: HST (M918T) before age 1; H
      (C634 codons, A883F) by age 5; MOD on biochemical surveillance
      with thyroidectomy at age 5 or earlier if calcitonin elevated.
      Cascade testing of first-degree relatives is recommended."
  - source_id: SRC-NCCN-THYROID-2025
    position: supports
    relevant_quote_paraphrase: >-
      "Patients with suspected hereditary MTC / MEN2 should receive
      germline RET panel testing. Carriers enter structured multi-organ
      surveillance including prophylactic thyroidectomy at ATA-class-
      specific age, annual plasma / urine metanephrines for
      pheochromocytoma, and (in MEN2A) annual calcium / PTH for
      parathyroid surveillance."

do_not_do:
  - "Не призначати germline тестування без pre-test консультування — інформована згода + обговорення хірургії у дитячому віці обов'язкові."
  - "Не treter VUS RET-результат як патогенний — не виконувати профілактичну тиреоїдектомію на підставі VUS; управляйте як родовідну підозру."
  - "Не пропускати pre-operative альфа-блокаду перед резекцією феохромоцитоми — гіпертензивний криз під час хірургії може бути фатальним."
  - "Не виконувати total parathyroidectomy без передової реімплантації паращитоподібної тканини у MEN2A — pre-operative гіпопаратиреоз пожиттєвий і важко керований."
  - "Не пропускати оглядову розпізнавання MEN2B-стигматів (слизові невроми, марфаноподібна будова, потовщення корнеальних нервів) у дитини з сімейною історією — діагноз MEN2B часто пропускається в дитячому віці, а затримка хірургії за межі першого року життя суттєво погіршує MTC-прогноз."

do_not_do_en:
  - "Do not order germline testing without pre-test counseling — informed consent and discussion of childhood surgery are mandatory."
  - "Do not treat a VUS RET result as pathogenic — do not perform prophylactic thyroidectomy based on a VUS; manage as pedigree suspicion."
  - "Do not skip pre-operative alpha-blockade before pheochromocytoma resection — intraoperative hypertensive crisis can be fatal."
  - "Do not perform total parathyroidectomy without forearm autotransplantation in MEN2A — post-operative hypoparathyroidism is lifelong and difficult to manage."
  - "Do not miss bedside recognition of MEN2B stigmata (mucosal neuromas, marfanoid habitus, corneal nerve thickening) in a child with family history — MEN2B is often missed in childhood and delay of surgery beyond the first year of life substantially worsens MTC prognosis."

