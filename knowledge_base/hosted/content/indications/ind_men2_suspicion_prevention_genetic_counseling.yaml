rationale: >
  Standard-track prevention pathway for individuals with pedigree
  suspicion of MEN2A or MEN2B. Three parallel referrals:

  **(1) Genetic counseling referral.** Pre-test counseling covers:
  inheritance pattern (autosomal dominant, near-complete penetrance
  for MTC ~95-100% by adulthood), implications for family members
  (cascade testing if positive — siblings at 50% risk; children at
  50% risk; preimplantation genetic diagnosis available with strong
  uptake in MEN2 families historically given the severity of MEN2B
  and the requirement for infant prophylactic surgery; the childhood
  surveillance + surgical-timing protocols mean early carrier
  identification is uniquely impactful in MEN2), insurance / GINA
  considerations, psychological aspects (decision to undergo
  prophylactic thyroidectomy in a child is high-stakes and emotionally
  complex for parents). Per ACMG / ASCO / ATA / Endocrine Society
  guidelines, pre-test counseling is the standard of care before
  germline testing.

  **(2) Germline RET gene panel testing.** Modern hereditary endocrine-
  cancer panels (e.g., Invitae endocrine-tumor panel, Color hereditary
  cancer panel) cover RET (full sequencing of exons 8, 10, 11, 13-16
  where the vast majority of MEN2 pathogenic variants cluster; some
  panels additionally cover exons 5, 9, 17 and the entire gene).
  Variant classification per ACMG framework plus ATA 2015 RET-class
  stratification:
    - **HST (highest risk):** M918T (codon 918) — defines MEN2B;
      prophylactic thyroidectomy before age 1.
    - **H (high risk):** C634 codons (C634R, C634Y, C634F, C634G,
      C634S, C634W), A883F — classic MEN2A; prophylactic
      thyroidectomy at age ≤5 (or sooner if calcitonin elevated).
    - **MOD (moderate risk):** All other MEN2-associated RET
      variants — prophylactic thyroidectomy at age 5 OR delayed
      with annual biochemical surveillance (basal calcitonin,
      neck ultrasound) and surgery driven by calcitonin elevation
      or structural disease.

  **(3) Carrier-confirmation surveillance plan (sequel pathway).**
    Positive RET carrier → structured multi-organ surveillance per
    ATA 2015:
    - **Thyroid:** Prophylactic thyroidectomy at RET-class-specific
      age (above) with central lymph-node dissection. Annual serum
      calcitonin + neck ultrasound thereafter to detect MTC recurrence.
    - **Pheochromocytoma:** Plasma free metanephrines or 24-hour
      urine metanephrines q1 year from age 8 (HST / H risk) or age
      11-16 (MOD risk). Adrenal imaging (MRI or CT) if metanephrines
      elevated. Pre-operative alpha-blockade required before
      pheochromocytoma resection.
    - **Parathyroid (MEN2A only):** Serum calcium + PTH q1 year
      from age 11. Hyperparathyroidism in MEN2A is multi-glandular
      hyperplasia — subtotal vs total parathyroidectomy decision
      similar to MEN1.
    - **Mucosal neuromas + marfanoid features (MEN2B only):**
      Recognized on examination; no specific surveillance protocol
      because they are non-malignant.
    - **Hirschsprung disease (RET C620 / C618 only):** Pediatric
      surgical surveillance for chronic constipation / megacolon
      in infancy.

  Negative result → re-stratify residual family-history risk; if
  family history is very strong but RET-negative, sporadic MTC
  must be considered. VUS result → managed as pedigree suspicion
  (this Indication).

  Genetic counseling and germline RET testing are typically covered
  by insurance in the US/EU when pedigree criteria are met; in
  Ukraine, germline testing is available through private labs at
  out-of-pocket cost (~5000-15000 UAH for multi-gene panel).

rationale_ua: >
  Стандартний-трек prevention шлях для осіб з родовідною підозрою на
  MEN2A або MEN2B. Три паралельні направлення:

  **(1) Направлення на генетичне консультування.** Pre-test
  консультування охоплює: спадкування (аутосомно-домінантне, near-
  complete пенетрантність для MTC ~95-100% до зрілого віку),
  наслідки для членів сім'ї (cascade тестування при позитиві — сібси
  з ризиком 50%; діти з ризиком 50%; преімплантаційна генетична
  діагностика доступна; протоколи дитячого спостереження + хірургічного
  timing'у означають, що рання ідентифікація носія унікально
  impactful у MEN2), страхові / GINA-міркування, психологічні аспекти
  (рішення про профілактичну тиреоїдектомію у дитини high-stakes і
  емоційно складне для батьків). За ACMG / ASCO / ATA / Endocrine
  Society настановами, pre-test консультування — standard of care
  перед germline тестуванням.

  **(2) Germline RET панельне тестування.** Сучасні панелі
  спадкових ендокринних пухлин (напр., Invitae endocrine-tumor panel,
  Color hereditary cancer panel) покривають RET (повне секвенування
  екзонів 8, 10, 11, 13-16, де кластеризується більшість MEN2
  патогенних варіантів). Класифікація варіантів за рамкою ACMG плюс
  ATA 2015 RET-стратифікація:
    - **HST (найвищий ризик):** M918T (кодон 918) — визначає MEN2B;
      профілактична тиреоїдектомія до 1 року.
    - **H (високий ризик):** Кодони C634 (C634R, C634Y, C634F,
      C634G, C634S, C634W), A883F — класичний MEN2A; профілактична
      тиреоїдектомія у віці ≤5 років.
    - **MOD (помірний ризик):** Усі інші MEN2-асоційовані RET
      варіанти — профілактична тиреоїдектомія у 5 років АБО
      відтермінована з щорічним біохімічним спостереженням.

  **(3) План спостереження при підтвердженому носійстві (sequel).**
    Позитивний RET носій → структуроване мульти-органне спостереження
    per ATA 2015:
    - **Щитоподібна залоза:** Профілактична тиреоїдектомія у
      RET-клас-specific вік з центральною лімфодисекцією. Щорічний
      сироватковий кальцитонін + УЗД шиї після цього.
    - **Феохромоцитома:** Плазмові вільні метанефрини q1 рік з 8
      років (HST / H ризик) або 11-16 років (MOD ризик). Adrenal
      візуалізація при елевації. Pre-operative альфа-блокада
      обов'язкова перед резекцією.
    - **Паращитоподібні залози (MEN2A лише):** Сироватковий кальцій
      + PTH q1 рік з 11 років.
    - **Слизові невроми + марфаноподібна будова (MEN2B лише):**
      Розпізнаються на огляді; немає специфічного протоколу
      спостереження.
    - **Хвороба Гіршпрунга (RET C620 / C618 лише):** Педіатричне
      хірургічне спостереження.

  Негативний результат → ре-стратифікація залишкового ризику. VUS →
  ведеться як родовідна підозра.

  Генетичне консультування та germline RET тестування зазвичай
  покриваються страхуванням у США/ЄС при відповідності критеріям; в
  Україні germline тестування доступне через приватні лабораторії за
  out-of-pocket вартість (~5000-15000 грн за мультигенну панель).

