do_not_do:
  - "Не deferувати prophylactic thyroidectomy у HST класі (M918T) поза перший рік життя — MTC може бути інвазивним у інфантильному віці."
  - "Не використовувати single-adenoma parathyroidectomy у MEN2A гіперпаратиреоїді — multi-glandular hyperplasia вимагає subtotal або total + autotransplant."
  - "Не виконувати adrenalectomy для pheochromocytoma без alpha-blockade preop (mandatory ≥7-14 days, phenoxybenzamine або doxazosin) — intra-operative crisis ризик life-threatening."
  - "Не пропускати pediatric metanephrine surveillance у HST / high-risk класах — pheochromocytoma може presentувати в дитячому віці."

do_not_do_en:
  - "Do not defer prophylactic thyroidectomy in HST class (M918T) beyond the first year of life — MTC can be invasive in infancy."
  - "Do not use single-adenoma parathyroidectomy in MEN2A hyperparathyroidism — multi-glandular hyperplasia requires subtotal or total + autotransplant."
  - "Do not perform pheochromocytoma adrenalectomy without preoperative alpha-blockade (mandatory ≥7-14 days, phenoxybenzamine or doxazosin) — intraoperative crisis risk is life-threatening."
  - "Do not skip pediatric metanephrine surveillance in HST / high-risk classes — pheochromocytoma can present in childhood."

