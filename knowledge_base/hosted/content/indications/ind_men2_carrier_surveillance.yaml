rationale: >
  Standard-track confirmed-carrier surveillance pathway for RET-positive
  carriers per ATA 2015 Revised Guidelines for the Management of MTC.

  **Prophylactic thyroidectomy (the central MEN2 decision):** Timing is
  RET-class-driven (ATA 2015 risk stratification):
    - **HST (highest-risk):** RET M918T (MEN2B). Total thyroidectomy in
      first year of life (before age 1, ideally first 6 months); central
      lymph node dissection if calcitonin elevated or thyroid nodule
      present. MTC may already be invasive by infancy.
    - **High-risk:** RET codon 634 mutations (C634R, C634Y, C634W, etc.;
      classic MEN2A). Total thyroidectomy by age 5; central lymph node
      dissection at surgeon discretion based on calcitonin and US.
    - **Moderate-risk:** Other RET mutations (e.g., V804M, K666E, L790F,
      etc.). Total thyroidectomy by age 5-10, or deferred to adulthood
      with q1y calcitonin + neck US surveillance — shared decision with
      family, weighted toward earlier surgery if calcitonin rising.

  **Calcitonin q6mo:** Sensitive marker for residual / recurrent MTC
  post-thyroidectomy and for emerging disease in carriers who have
  deferred surgery (moderate-risk class). Pentagastrin / calcium-
  stimulation tests historical (not widely available).

  **Pheochromocytoma surveillance (MEN2A and MEN2B):** Plasma fractionated
  metanephrines OR 24-hour urinary metanephrines + catecholamines q1y,
  starting age 8 (MEN2B / high-risk MEN2A) or age 16 (moderate-risk).
  Cross-sectional imaging (abdominal MRI or CT) at symptomatic / lab
  signal — not routine baseline imaging.

  **Primary hyperparathyroidism (MEN2A only — absent in MEN2B):** Serum
  PTH + ionized calcium q1y starting age 8-11; surgical strategy
  multi-glandular subtotal parathyroidectomy or total + autotransplant
  (NOT single-adenoma excision).

  **Hirschsprung concern:** RET codon 620 / 618 carriers have ~7%
  Hirschsprung disease incidence — symptomatic-driven workup in
  childhood (constipation, megacolon).

  **MEN2B stigmata:** Mucosal neuromas (lips, tongue), corneal nerve
  thickening, marfanoid habitus — visible in infancy if known to look
  for; clinical recognition can prompt RET testing in absence of family
  history.

  **Cascade testing:** Mandates offer to all first-degree relatives;
  particularly time-sensitive given pediatric thyroidectomy timing.

  Per CHARTER §11 patient-autonomy framing; pediatric surgical timing
  requires extensive family counseling.

rationale_ua: >
  Стандартний-трек confirmed-carrier surveillance per ATA 2015.

  **Prophylactic тиреоїдектомія (центральне MEN2-рішення):** Timing
  RET-class-driven:
    - **HST:** RET M918T (MEN2B). Total thyroidectomy у перший рік життя
      (до 1 року, ideally перші 6 місяців); central LN dissection if
      calcitonin elevated.
    - **High-risk:** RET codon 634 (класична MEN2A). Total thyroidectomy
      до 5 років.
    - **Moderate-risk:** Інші RET мутації. Total thyroidectomy до 5-10
      років або deferred з q1y calcitonin + neck US.

  **Калцитонін q6mo:** Sensitive marker для residual / recurrent MTC.

  **Pheochromocytoma surveillance (MEN2A і MEN2B):** Plasma або urine
  metanephrines q1y з 8 років (MEN2B / high-risk MEN2A) або з 16 років
  (moderate-risk). Cross-sectional imaging при symptomatic / lab
  signal.

  **Гіперпаратиреоз (MEN2A only):** PTH + іонізований Ca q1y з 8-11
  років; multi-glandular subtotal або total + autotransplant.

  **Hirschsprung concern:** RET codon 620 / 618 — ~7%; symptomatic-
  driven workup.

  **MEN2B stigmata:** mucosal neuromas, corneal nerve thickening,
  marfanoid habitus.

  **Cascade тестування:** mandates пропонування first-degree родичам;
  time-sensitive через pediatric surgical timing.

  Per CHARTER §11 framing автономії пацієнта.

