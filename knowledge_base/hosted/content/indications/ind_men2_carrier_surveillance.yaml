expected_outcomes:
  overall_response_rate: >-
    ATA-class-driven prophylactic thyroidectomy in confirmed RET carriers
    is curative for MTC when performed before any nodal involvement —
    near-100% biochemical cure (undetectable post-op calcitonin) with
    appropriate timing. Pheochromocytoma surveillance with annual plasma
    or urine metanephrines detects pre-symptomatic disease at small size
    (amenable to cortical-sparing adrenalectomy). Primary hyperparathyroid
    surveillance in MEN2A (PTH/Ca q1y) detects multi-glandular disease
    at biochemical-only stage.

