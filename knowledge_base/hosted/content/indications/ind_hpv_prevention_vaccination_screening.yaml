do_not_do:
  - "Не пропускати цервікальний скринінг у вакцинованих жінок — вакцина не покриває всі HPV-генотипи."
  - "Не давати Gardasil-9 під час вагітності — постпонувати до пост-партум (хоча випадкова вакцинація не показує тератогенності)."
  - "Не давати Gardasil-9 при гострій тяжкій хворобі — постпонувати."

do_not_do_en:
  - "Do not skip cervical screening in vaccinated women — vaccine does not cover all HPV genotypes."
  - "Do not administer Gardasil-9 during pregnancy — postpone to post-partum (though inadvertent vaccination does not show teratogenicity)."
  - "Do not administer Gardasil-9 during acute severe illness — postpone."

