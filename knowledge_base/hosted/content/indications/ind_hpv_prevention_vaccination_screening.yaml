rationale: >
  Standard-track prevention pathway for HPV-associated cancers. Two
  parallel interventions:

  **(1) Vaccination** — Gardasil-9 nonavalent vaccine, 3-dose series
  (0, 2, 6 months) covering HPV-6, 11, 16, 18, 31, 33, 45, 52, 58.
  Age-eligibility per WHO / CDC / EU: routine 9-14, catch-up 15-26,
  shared-decision-making 27-45. Maximum benefit when administered
  before sexual debut (HPV-naive).

  **(2) Screening** — cadence by age and risk group:
  - **Cervical (USPSTF / NCCN):** ages 21-29: Pap q3y; ages 30-65:
    Pap q3y OR HPV-only q5y OR Pap+HPV co-test q5y. Stop after age 65
    if 3 negative Pap or 2 negative co-tests in prior 10 years.
  - **Anal (HIV+/MSM/post-transplant high-risk):** HRA (high-resolution
    anoscopy) + anal cytology q1-3y.
  - **Oropharyngeal:** routine screening not currently recommended;
    visual inspection during dental visits.

  Vaccination and screening are complementary, not alternatives.
  Vaccinated individuals still need cervical screening per age-
  appropriate cadence.

rationale_ua: >
  Стандартний-трек prevention шлях для HPV-асоційованих раків. Дві
  паралельні інтервенції:

  **(1) Вакцинація** — Gardasil-9 нонавалентна вакцина, 3-дозова серія
  (0, 2, 6 міс), покриває HPV-6, 11, 16, 18, 31, 33, 45, 52, 58.
  Вік-прийнятність за WHO / CDC / ЄС: рутинно 9-14, catch-up 15-26,
  shared-decision-making 27-45. Максимальна користь при введенні до
  сексуального дебюту (HPV-naive).

  **(2) Скринінг** — частота за віком і групою ризику:
  - **Цервікальний (USPSTF / NCCN):** вік 21-29: Pap q3y; вік 30-65:
    Pap q3y АБО HPV-only q5y АБО Pap+HPV ко-тест q5y. Припинити після
    65 років при 3 негативних Pap або 2 негативних ко-тестах за
    попередні 10 років.
  - **Анальний (ВІЛ+/МСМ/post-transplant високого ризику):** HRA + анальна цитологія q1-3y.

