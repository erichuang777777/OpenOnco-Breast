expected_outcomes:
  overall_response_rate: >-
    Vaccination efficacy (Gardasil-9, 3-dose series in ages 9-26
    catch-up): >90% reduction in incidence of HPV-16/18/31/33/45/52/58
    -associated cervical, anal, oropharyngeal pre-cancer and cancer.
    Population-level cervical-cancer mortality reduction projected
    >90% with vaccination + screening combined.

