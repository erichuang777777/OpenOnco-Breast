expected_outcomes:
  overall_response_rate: >-
    Primary endpoint: detection of incident paint-occupation-attributable
    malignancy (lung, bladder, AML) at earliest treatable stage via
    multi-modality surveillance. Pooled painter-cohort meta-analysis
    (Guha 2010) shows lung-cancer RR ~1.35 and bladder-cancer RR
    ~1.25. Heterogeneity of historical paint formulations drives
    multi-organ pattern. Smoking-cessation has largest single-
    intervention impact on lung component.

