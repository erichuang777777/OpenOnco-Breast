desired_tests: []

rationale: >
  Standard-track prevention pathway for individuals with documented
  ≥10 years occupational painting exposure who do not have a current
  paint-occupation-associated malignancy diagnosis. Four parallel
  interventions:

  **(1) Risk-adjusted annual LDCT chest screening (smoker-eligible).**
  USPSTF 2021 criteria are the baseline. Painter-cohort RR for lung
  cancer (~1.35) is below the asbestos / silica magnitude — extension
  to never-smoker painters is not standard practice. Smoker-painters
  meeting USPSTF receive annual LDCT.

  **(2) Urinalysis q1-2y for bladder-cancer surveillance.** Painter
  bladder-cancer RR (~1.25) supports adjunctive surveillance with
  non-invasive urinalysis (microscopy for hematuria). Cystoscopy
  reserved for persistent / unexplained hematuria. Urinary cytology
  not recommended as standalone screening.

  **(3) CBC q1y for hematologic surveillance.** Benzene-solvent
  exposure component of historical paint formulations supports
  hematologic surveillance for AML / MDS. Cytopenia patterns
  (unexplained anemia, leukopenia, thrombocytopenia, or progressive
  monocytosis) prompt referral to hematology. Frequency q1y for
  active / recent exposure; may extend to q2y after 20 years post-
  exposure for asymptomatic patients with prior normal trends.

  **(4) Smoking-cessation counseling.** Highest-impact single
  intervention for lung component. Behavioral counseling +
  pharmacotherapy (varenicline, bupropion, NRT) per USPSTF / ATS /
  AAFP.

  Resource access in Ukraine: LDCT chest (~1500-3500 UAH); urinalysis
  (~150-400 UAH); CBC (~150-300 UAH); smoking-cessation pharmacotherapy
  pharmacy-accessible.

rationale_ua: >
  Стандартний-трек prevention шлях для осіб з документованим ≥10
  років професійним малярським впливом без поточного діагнозу
  paint-occupation-асоційованої малігнізації. Чотири паралельні
  втручання:

  **(1) Risk-adjusted щорічна LDCT грудної клітки (smoker-eligible).**
  USPSTF 2021 критерії — baseline. Painter-cohort RR для раку легень
  (~1.35) нижче за asbestos / silica magnitude — розширення на
  некурців-малярів не є стандартною практикою. Smoker-painters, що
  відповідають USPSTF, отримують щорічну LDCT.

  **(2) Urinalysis q1-2y для спостереження за сечовим міхуром.**
  Painter bladder-cancer RR (~1.25) підтримує адʼюнктивне
  спостереження з неінвазивним urinalysis (мікроскопія для гематурії).

  **(3) CBC q1y для гематологічного спостереження.** Benzene-solvent
  компонент historical paint formulations підтримує гематологічне
  спостереження для AML / MDS. Цитопенії (необʼяснена анемія,
  лейкопенія, тромбоцитопенія, прогресуючий моноцитоз) спонукають
  направлення до гематолога. Частота q1y для активного /
  нещодавнього впливу; може бути продовжена до q2y після 20 років
  post-exposure для асимптомних пацієнтів з попередньою нормальною
  динамікою.

  **(4) Counseling щодо припинення куріння.** Найвпливовіше одиничне
  втручання для легеневого компоненту.

  Доступ до ресурсів в Україні: LDCT грудної клітки (~1500-3500 грн);
  urinalysis (~150-400 грн); CBC (~150-300 грн); pharmacotherapy для
  припинення куріння аптечно доступна.

