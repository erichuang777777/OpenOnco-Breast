sources:
  - source_id: SRC-NCCN-BCELL-2025
    position: context
    relevant_quote_paraphrase: >-
      "Occupational mixed-exposure cohorts (painters, firefighters) with
      heterogeneous carcinogen burden warrant multi-modality surveillance
      reflecting the spectrum of cancer endpoints identified
      epidemiologically."
  - source_id: SRC-NCCN-NSCLC-2025
    position: supports
    relevant_quote_paraphrase: >-
      "Annual low-dose CT lung-cancer screening is recommended for
      individuals at elevated lung-cancer risk by age, smoking history,
      and (per Clinical Practice Guidelines extension) occupational
      carcinogen exposure including paint-trades exposure."

do_not_do:
  - "Не екстраполювати LDCT на некурців-малярів — RR ~1.35 не виправдовує LDCT-extension у never-smoker cohort."
  - "Не використовувати urinary cytology як standalone screening — низька чутливість."
  - "Не призначати рутинну біопсію кісткового мозку асимптомним пацієнтам — резервується для тривожних цитопеній."
  - "Не пропускати counseling щодо припинення куріння — лeгеневий компонент залишається первинним."

do_not_do_en:
  - "Do not extrapolate LDCT to never-smoker painters — an RR of ~1.35 does not justify LDCT extension in the never-smoker cohort."
  - "Do not use urinary cytology as standalone screening — low sensitivity."
  - "Do not order routine bone-marrow biopsy in asymptomatic patients — reserve for alarm cytopenias."
  - "Do not skip smoking-cessation counseling — the lung component remains primary."

