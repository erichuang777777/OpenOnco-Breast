rationale: >
  Standard-track surveillance for chronic pancreatitis → PDAC prevention.

  **(1) Surveillance imaging** — annual MRI/MRCP and/or EUS starting age 40 in
  hereditary pancreatitis (or 20y after symptom onset in alcoholic chronic
  pancreatitis). Refer to PDAC-experienced center.

  **(2) Smoking cessation** — multiplicative synergy with alcohol; primary
  modifiable risk factor.

  **(3) Alcohol cessation** in alcoholic chronic pancreatitis — both reduces
  PDAC incidence and slows pancreatic functional decline.

  **(4) Diabetes management** if present — new-onset diabetes after age 50
  with weight loss may represent paraneoplastic PDAC presentation.

rationale_ua: >
  Стандартний-трек surveillance для хронічного панкреатиту → PDAC prevention.

  **(1) Surveillance imaging** — щорічна MRI/MRCP та/або EUS з 40 років при
  спадковому панкреатиті (або 20р після symptom onset при alcoholic chronic
  pancreatitis). Direct to PDAC-experienced center.

  **(2) Smoking cessation** — мультиплікативна synergy з алкоголем.

  **(3) Alcohol cessation** при alcoholic chronic pancreatitis.

  **(4) Diabetes management** якщо present — new-onset діабет після 50 років
  з weight loss може представляти paraneoplastic PDAC.

