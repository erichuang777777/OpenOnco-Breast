id: IND-SCHISTOSOMA-HAEMATOBIUM-PREVENTION-OBSERVATION
plan_track: surveillance
intent: prevention

applicable_to:
  disease_id: DIS-UROTHELIAL
  stage_requirements: []
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 3

triggered_by_redflags:
  - RF-SCHISTOSOMA-HAEMATOBIUM-BLADDER-PREVENTION

recommended_regimen: null
concurrent_therapy: []
followed_by: []

evidence_level: low
strength_of_recommendation: conditional
nccn_category: "2B"

expected_outcomes:
  overall_response_rate: >-
    Primary endpoint: urinary-surveillance compliance (urinalysis
    q6-12mo, cytology + cystoscopy for any new hematuria). Does not
    reduce S. haematobium-driven bladder SCC incidence but improves
    likelihood of early-stage detection.

hard_contraindications: []
red_flags_triggering_alternative: []
required_tests:
  - TEST-CBC
desired_tests: []

rationale: >
  Alternative-track companion to
  IND-SCHISTOSOMA-HAEMATOBIUM-PREVENTION-TREATMENT. Patient with prior
  S. haematobium exposure but no active infection on confirmatory
  testing (ova negative, serology may remain positive long after
  cure) — surveillance-only without praziquantel. Lifetime urinary
  surveillance: urinalysis q6-12mo; urine cytology + cystoscopy for
  any new gross hematuria.

  Also covers patients with active infection who decline praziquantel
  for any reason — surveillance is still offered (incidence-reduction
  absent).

rationale_ua: >
  Альтернативно-трекова Indication — компаньйон до
  IND-SCHISTOSOMA-HAEMATOBIUM-PREVENTION-TREATMENT. Пацієнт з
  попередньою експозицією S. haematobium без активної інфекції на
  підтверджуючому тестуванні (ova негативні, серологія може
  залишатися позитивною надовго після cure) — surveillance-only
  без празиквантелу. Пожиттєва урологічна surveillance: загальний
  аналіз сечі q6-12мо; цитологія сечі + цистоскопія при будь-якій
  новій макрогематурії.

