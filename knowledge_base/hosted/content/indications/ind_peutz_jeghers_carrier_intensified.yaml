do_not_do:
  - "Не advanceувати pancreatic surveillance раніше 25-30 без high-risk pedigree або co-risk factors — false-positive burden + early imaging exposure не виправдані."
  - "Не виконувати empirical prophylactic колектомію — PJS polyps hamartomatous, не adenomatous; structured colonoscopy з polypectomy adequate."
  - "Не використовувати mTOR-pathway chemoprevention (rapalogs) поза clinical trial — currently investigational у PJS."
  - "Не презентувати breast risk-reducing mastectomy як equivalent BRCA evidence base — PJS-specific absolute risk somewhat lower; shared-decision discussion must surface."
  - "Не пропонувати tamoxifen chemoprevention як standard у PJS — evidence base lower-tier ніж BRCA."

do_not_do_en:
  - "Do not advance pancreatic surveillance earlier than age 25-30 without high-risk pedigree or co-risk factors — false-positive burden and early imaging exposure are not justified otherwise."
  - "Do not perform empirical prophylactic colectomy — PJS polyps are hamartomatous (not adenomatous); structured colonoscopy with polypectomy is adequate."
  - "Do not use mTOR-pathway chemoprevention (rapalogs) outside a clinical trial — currently investigational in PJS."
  - "Do not present breast risk-reducing mastectomy as having equivalent BRCA evidence base — PJS-specific absolute risk is somewhat lower; shared-decision-making discussion must surface this."
  - "Do not offer tamoxifen chemoprevention as standard in PJS — evidence base is lower-tier than in BRCA."

