rationale: >
  Aggressive-track confirmed-carrier pathway layered on top of the
  IND-PEUTZ-JEGHERS-CARRIER-SURVEILLANCE standard protocol.

  **Foundation:** All standard surveillance from IND-PEUTZ-JEGHERS-
  CARRIER-SURVEILLANCE applies (VCE / MR enterography q2-3y from 8-10,
  colonoscopy q2-3y from 18, EGD q2-3y from 8-10, breast MRI from 30,
  pancreatic EUS / MRI q1-2y from 30-35, annual cervical Pap with
  adenoma-malignum awareness, annual testicular exam men, TVUS q1y
  women).

  **Intensification 1 — Earlier pancreatic surveillance initiation:**
  In high-risk PJS kindreds (family pancreatic cancer onset < age 50,
  or proband with smoking / type-2 diabetes / chronic pancreatitis
  co-risk factors), advancing pancreatic surveillance from age 30-35
  to age 25-30 is a shared-decision option. Trade-off: earlier start
  means more lifetime imaging studies + earlier exposure to false-
  positive findings (small cystic lesions in young adults). Center
  must be experienced in PJS-pancreas surveillance to avoid harm from
  unnecessary biopsies / resections.

  **Intensification 2 — Breast risk-reducing options:** Bilateral
  mastectomy in confirmed PJS carriers reduces breast cancer incidence
  to near-zero — same evidence base as BRCA carriers in terms of
  surgical outcomes, though absolute PJS-attributable breast cancer
  risk is somewhat lower than BRCA1 / 2 (~32-54% lifetime vs.
  ~50-72% BRCA1). Shared-decision-making must cover surgical risk,
  psychological impact, reconstructive options, fertility / breast-
  feeding planning, and alternative continued breast MRI surveillance.
  Tamoxifen chemoprevention has lower-tier evidence in PJS than in
  BRCA — discuss only after explicit framing of the weaker PJS-specific
  evidence base.

  **Other intensification considerations (not core to this track):**
    - Empirical prophylactic colectomy is NOT routine — PJS polyps are
      hamartomatous (not adenomatous), and structured colonoscopy with
      polypectomy keeps CRC risk manageable.
    - mTOR-pathway chemoprevention (rapalogs) is investigational in
      PJS — do NOT prescribe outside trial setting despite plausible
      STK11-AMPK-mTOR pathway rationale.

  **Cascade testing remains continuous:** every visit re-confirms
  family testing status.

  Per CHARTER §11: intensified surveillance and risk-reducing surgery
  are shared-decision-making domains. Patient autonomy is paramount;
  standard-track protocol remains the floor.

rationale_ua: >
  Aggressive-трекова Indication: накладена поверх IND-PEUTZ-JEGHERS-
  CARRIER-SURVEILLANCE.

  **Foundation:** Усе standard з IND-PEUTZ-JEGHERS-CARRIER-SURVEILLANCE.

  **Інтенсифікація 1 — Рання pancreatic surveillance initiation:** У
  high-risk кіндредах (family pancreatic cancer < 50 років, або
  smoking / type-2 diabetes / chronic pancreatitis co-risk) — advancing
  з 30-35 до 25-30 років. Trade-off: more lifetime imaging + earlier
  false-positive exposure.

  **Інтенсифікація 2 — Breast risk-reducing options:** Bilateral
  mastectomy — reduces incidence до near-zero; same evidence base
  surgical outcomes як BRCA, хоча absolute PJS-attributable risk
  somewhat lower (~32-54% vs. ~50-72% BRCA1). Shared-decision-making.
  Tamoxifen chemoprevention — lower-tier evidence у PJS ніж BRCA;
  discuss only after framing of weaker PJS-specific evidence base.

  **Інші міркування:**
    - Empirical prophylactic colectomy — NOT routine; PJS polyps
      hamartomatous (не adenomatous).
    - mTOR-pathway chemoprevention (rapalogs) — investigational; NOT
      prescribe outside trial despite STK11-AMPK-mTOR pathway rationale.

  **Cascade тестування continuous.**

  Per CHARTER §11: shared-decision-making домен.

