rationale: >
  Standard-track surveillance for long-term ≥5y calcineurin-
  inhibitor exposure. Components per NCCN Squamous Cell Skin
  Cancer + International Transplant Skin Cancer Collaborative:

  **(1) Annual whole-body skin examination by dermatologist** —
  q6mo cadence if any prior cutaneous SCC, BCC, melanoma, or
  Kaposi sarcoma. Field-effect (multiple actinic keratoses,
  Bowen disease, in-situ SCC) is the rule in calcineurin-
  exposed cohort; treat aggressively (cryotherapy, 5-FU /
  imiquimod for field, Mohs for invasive lesions).

  **(2) Sun-protection counseling at every visit** — broad-
  spectrum SPF 30+ daily on sun-exposed skin (including
  cloudy / indoor windows-near contexts), avoidance during
  peak UV (10am-4pm), photoprotective clothing + wide-brim
  hat + UV-blocking sunglasses. Nicotinamide 500mg BID
  considered for chronic-actinic-damage cohort (ONTRAC trial
  evidence; off-label for transplant cohort).

  **(3) Kaposi-sarcoma surveillance** in HHV-8-exposed cohort
  (HIV+, HHV-8-endemic-region origin, prior HHV-8 seropositivity,
  transplant from HHV-8-positive donor) — annual inspection of
  skin, oral mucosa, lower extremities + GI / pulmonary symptom
  review (KS has GI involvement in ~40% of cutaneous-presentation
  cases). Suspicious lesion → punch biopsy with HHV-8 LANA-1
  immunostain.

  **(4) Shared-decision discussion with transplant nephrologist /
  hepatologist / cardiologist** of switch to mTOR inhibitor
  (sirolimus / everolimus) for patients with cumulative skin-
  cancer burden — CONVERT trial + ProSparc evidence: switch
  reduces new SCC incidence ~50% over 2 years. Trade-offs:
  proteinuria, dyslipidemia, oral ulcers, pneumonitis with
  mTOR; allograft function balance. NEVER unilateral oncology-
  or dermatology-driven switch — transplant team retains
  final call.

  **(5) HPV vaccination catch-up** if transplant context and
  not previously vaccinated (Gardasil-9 through age 45 per ACIP
  shared-decision). Immunosuppression is NOT a contraindication
  to inactivated vaccines.

  **(6) HPV-related skin / mucosal surveillance** — calcineurin
  exposure amplifies cutaneous HPV-driven SCC (high-risk types
  in nonmelanoma skin cancer pathway); cervical / anal HPV-
  driven cancer surveillance per separate transplant pathway.

  **(7) Lip-cancer surveillance** — lower-lip SCC over-
  represented in chronic UV + immunosuppressed cohort; sun-
  protective lip balm + dental examination at routine visits.

  **(8) Non-cyclosporine considerations** — tacrolimus appears
  to have somewhat lower skin-cancer signal than cyclosporine
  in observational comparisons; within-class switch from
  cyclosporine to tacrolimus may be considered by the transplant
  team but is less impactful than mTOR-switch in established
  high-burden cohort.

  Goal: keep cumulative skin-cancer burden manageable;
  KS-aware in at-risk cohort; informed shared decision-making
  with transplant team on the mTOR-switch question.

rationale_ua: >
  Стандартний-трек surveillance для тривалої ≥5р експозиції
  calcineurin inhibitor. Components per NCCN Squamous Cell
  Skin Cancer + International Transplant Skin Cancer
  Collaborative:

  **(1) Annual whole-body skin examination dermatologist** —
  q6mo якщо будь-яка попередня cutaneous SCC, BCC, melanoma,
  або KS. Field-effect — норма у calcineurin-exposed cohort.

  **(2) Sun-protection counseling на кожному візиті** —
  broad-spectrum SPF 30+, avoidance peak UV, photoprotective
  clothing. Nicotinamide 500mg BID для chronic-actinic-damage
  cohort.

  **(3) Kaposi-sarcoma surveillance** у HHV-8-exposed cohort
  (HIV+, HHV-8-endemic-region origin, prior HHV-8 seropositivity)
  — annual inspection шкіри, oral mucosa, нижніх кінцівок +
  GI / pulmonary symptom review.

  **(4) Shared-decision discussion з transplant team** про
  switch на mTOR inhibitor (sirolimus / everolimus) для
  cumulative skin-cancer burden — CONVERT + ProSparc evidence
  ~50% reduction new SCC. Trade-offs: proteinuria, dyslipidemia,
  oral ulcers, pneumonitis. НІКОЛИ unilateral switch.

  **(5) HPV vaccination catch-up** якщо transplant context.

  **(6) HPV-related skin / mucosal surveillance.**

  **(7) Lip-cancer surveillance** — lower-lip SCC over-
  представлений у chronic UV + immunosuppressed cohort.

  **(8) Non-cyclosporine considerations** — tacrolimus має
  somewhat нижчий skin-cancer signal ніж cyclosporine у
  observational comparisons.

