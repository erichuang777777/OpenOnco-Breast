do_not_do:
  - "Не пропускати annual / q6mo whole-body skin exam — найбільший cancer-prevention yield."
  - "Не switching cyclosporine / tacrolimus → mTOR inhibitor unilaterally — координація з transplant team."
  - "Не пропускати sun-protection counseling — found найбільший self-care yield."
  - "Не ignorувати lower-lip lesions / non-healing lip ulcers — over-представлений у cohort."
  - "Не нормалізувати new cutaneous nodules / purple-red macules — KS може presented hidden / atypical."
  - "Не treating field actinic keratoses individually — field therapy (5-FU / imiquimod) більш ефективна."

do_not_do_en:
  - "Do not skip annual / q6mo whole-body skin exam — the highest cancer-prevention yield."
  - "Do not switch cyclosporine / tacrolimus → mTOR inhibitor unilaterally — transplant-team coordination required."
  - "Do not omit sun-protection counseling — highest self-care yield."
  - "Do not ignore lower-lip lesions / non-healing lip ulcers — over-represented in this cohort."
  - "Do not normalize new cutaneous nodules / purple-red macules — KS can present subtly / atypically."
  - "Do not treat field actinic keratoses individually — field therapy (5-FU / imiquimod) is more effective."

