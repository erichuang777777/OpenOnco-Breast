expected_outcomes:
  overall_response_rate: "Continued combined low calcium intake + vitamin D deficiency: baseline CRC incidence elevated per observational meta-analyses. Skeletal-health risk also unaddressed (fracture / osteoporosis). Age-appropriate screening alone does not reduce incidence."

hard_contraindications: []
red_flags_triggering_alternative: []
required_tests: []
desired_tests: []

rationale: >
  Alternative-track companion to IND-LIFESTYLE-LOW-CALCIUM-VIT-D-CRC-
  PREVENTION-REPLETION. Patient declines structured repletion (cost,
  preference, lactose intolerance with dairy avoidance + supplement
  declination, supplement intolerance) — receives USPSTF-cadence CRC
  screening + brief dietary counseling with each clinical contact +
  reaffirmation of skeletal-health implications. Per CHARTER §11
  patient-autonomy framing — dietary / supplementation choice is
  legitimate but framed as suboptimal vs. RDA-target comparator.
  Periodic re-discussion of repletion track at follow-up visits is
  appropriate, especially with age-related fracture-risk progression.

rationale_ua: >
  Альтернативно-трекова Indication. Пацієнт відмовляється від
  structured repletion — отримує USPSTF-cadence CRC screening + brief
  dietary counseling на кожному клінічному контакті + reaffirmation
  skeletal-health implications. Per CHARTER §11. Periodic re-discussion
  repletion треку appropriate, especially з age-related fracture-risk
  progression.

