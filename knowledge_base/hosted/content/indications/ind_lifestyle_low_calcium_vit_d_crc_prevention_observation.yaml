do_not_do:
  - "Не презентувати observation як еквівалент repletion — CRC incidence + skeletal benefits відсутні."
  - "Не пропускати CRC screening — base-rate USPSTF cadence залишається indicated незалежно від status."
  - "Не виключати brief dietary counseling на кожному візиті — repeated exposure has cumulative behavioral effect."
  - "Не ігнорувати fracture-risk monitoring (DEXA, FRAX) — vitamin D / calcium deficiency має додаткові скелетні implications."

do_not_do_en:
  - "Do not present observation as equivalent to repletion — CRC incidence + skeletal benefits are not achieved."
  - "Do not skip CRC screening — base-rate USPSTF cadence remains indicated regardless of status."
  - "Do not skip brief dietary counseling at every visit — repeated exposure has cumulative behavioral effect."
  - "Do not ignore fracture-risk monitoring (DEXA, FRAX) — vitamin D / calcium deficiency has additional skeletal implications."

