# No systemic drug regimen — primary interventions are phlebotomy
# (or iron chelation when phlebotomy contraindicated) and HCC
# surveillance imaging. Phlebotomy is a procedure managed by
# hematology/hepatology, captured as standard supportive care rather
# than a Regimen FK.
