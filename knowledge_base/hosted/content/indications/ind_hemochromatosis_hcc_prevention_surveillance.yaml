sources:
  - source_id: SRC-AASLD-HCC-2023
    position: supports
    relevant_quote_paraphrase: >-
      "HCC surveillance with ultrasound ± AFP every 6 months is
      recommended for patients with cirrhosis from hereditary
      hemochromatosis. Phlebotomy is the standard de-ironing
      intervention; iron chelation is an alternative when phlebotomy
      is contraindicated."
  - source_id: SRC-NCCN-HCC-2025
    position: supports
    relevant_quote_paraphrase: >-
      "Hereditary hemochromatosis with cirrhosis is a category 1
      indication for HCC surveillance. Maintenance phlebotomy and
      avoidance of alcohol and iron supplementation are mandatory
      components of long-term management."
  - source_id: SRC-NCCN-BCELL-2025
    position: context

do_not_do:
  - "Не пропускати phlebotomy у iron-overloaded HFE C282Y гомозиготів — phlebotomy у non-cirrhotic нормалізує тривалість життя."
  - "Не покладатися лише на ferritin для tracking treatment — transferrin saturation також треба моніторити (раніше нормалізується, ніж ferritin)."
  - "Не пропускати HCC surveillance у cirrhotic HH — найвищий-ризик субcohort серед усіх chronic-liver-disease етіологій."
  - "Не призначати iron supplementation або iron-fortified multivitamins у HFE-позитивних — посилює патологію."
  - "Не пропускати ehokардіографію + endocrine workup — iron cardiomyopathy + гіпогонадизм + diabetes — multi-organ HFE прояви."

do_not_do_en:
  - "Do not omit phlebotomy in iron-overloaded HFE C282Y homozygotes — phlebotomy in non-cirrhotic HH normalizes life expectancy."
  - "Do not rely on ferritin alone to track treatment — transferrin saturation must also be monitored (normalizes earlier than ferritin)."
  - "Do not skip HCC surveillance in cirrhotic HH — the highest-risk subcohort among all chronic-liver-disease etiologies."
  - "Do not prescribe iron supplementation or iron-fortified multivitamins in HFE-positive patients — exacerbates pathology."
  - "Do not skip echocardiography + endocrine workup — iron cardiomyopathy, hypogonadism, and diabetes are multi-organ HFE manifestations."

