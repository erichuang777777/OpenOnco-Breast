evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate: >-
    Combined phlebotomy + AASLD HCC surveillance in cirrhotic
    hereditary hemochromatosis:
      - Phlebotomy in non-cirrhotic HH normalizes life expectancy
        (Niederau 1985+1996 cohorts) — primary-prevention success.
      - Phlebotomy in cirrhotic HH markedly improves survival
        (median ~20-25y vs ~5-10y untreated) but does NOT reverse
        cirrhosis or eliminate HCC risk (~3-5%/year residual).
      - HCC surveillance with US ± AFP q6mo shifts stage at diagnosis
        from advanced to early (BCLC 0/A, amenable to ablation,
        resection, or transplant within Milan); early-stage HCC 5y OS
        60-75% vs <15% for advanced disease.

