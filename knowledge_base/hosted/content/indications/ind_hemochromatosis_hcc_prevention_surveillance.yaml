rationale: >
  Standard-track prevention pathway for patients with hereditary
  hemochromatosis, particularly cirrhotic and pre-cirrhotic
  iron-overload subsets. Three-component standard:

  **Phlebotomy treatment:**
    - Induction phase: 500 mL whole blood phlebotomy q1-2 weeks until
      ferritin <50 ng/mL (typical duration 1-3 years depending on
      baseline iron stores)
    - Maintenance phase: phlebotomy q2-4mo to maintain ferritin
      50-100 ng/mL and transferrin saturation <50%
    - Pre-phlebotomy CBC + ferritin + iron studies to confirm safety
      and target
    - Iron chelation (deferasirox 14-28 mg/kg/day OR deferoxamine
      40-50 mg/kg SC overnight 5-7 nights/week) for patients with
      contraindications to phlebotomy (severe anemia from concurrent
      disease, cardiac failure, poor venous access)
    - Family screening: first-degree relatives (siblings, children
      >18y) for HFE genotyping per AASLD 2018; HFE C282Y homozygotes
      enter same monitoring/treatment pathway

  **HCC surveillance imaging (cirrhotic HH only):**
    - Abdominal ultrasound q6mo (AASLD 2023) with AFP simultaneously
    - Suboptimal US visualization → MRI or multiphase CT q6mo
      (LI-RADS framework)
    - LR-3 → repeat 3-6mo; LR-4 → biopsy or close surveillance per
      MDT; LR-5 → DIS-HCC treatment algorithm

  **Hepatic status monitoring:**
    - LFT panel + INR + platelet count + albumin q6-12mo
    - Liver elastography (FibroScan, MR elastography) q1-2y to track
      fibrosis stage; alternative — calculated FIB-4 / APRI scores
    - Hepatology consultation for new decompensation signs

  **Cardiac + endocrine screening (concurrent organ involvement):**
    - Baseline ECG + echocardiogram (iron cardiomyopathy)
    - Fasting glucose + HbA1c (HH-associated diabetes mellitus)
    - Testosterone in men (hypogonadism from iron pituitary deposition)
    - TSH (hypothyroidism less common but worth annual check)

  **Diet + lifestyle:**
    - Avoid iron supplementation (including iron-fortified multivitamins)
    - Limit alcohol (synergistic hepatic injury; AASLD recommends total
      abstinence in cirrhotic HH)
    - Avoid raw shellfish (Vibrio vulnificus infection risk in
      iron-overloaded patients)
    - Vitamin C supplementation limited to <500 mg/day (potentiates
      iron absorption)

  In Ukraine, hereditary hemochromatosis is under-recognized; HFE
  genotyping available at Institute of Genetics + select private labs.
  Phlebotomy services available at major blood banks and hematology
  centers (Kyiv, Lviv, Odesa, Kharkiv); maintenance phlebotomy may be
  done at regional centers if induction protocol is established.
  Deferasirox availability variable. Liver transplantation at
  Shalimov Institute for advanced HH cirrhosis ± HCC within Milan.

rationale_ua: >
  Стандартний-трек prevention шлях для пацієнтів зі спадковим
  гемохроматозом, особливо cirrhotic та pre-cirrhotic iron-overload
  підгруп. Трикомпонентний стандарт:

  **Phlebotomy treatment:**
    - Індукційна фаза: 500 мл whole blood phlebotomy q1-2 тижні до
      ferritin <50 нг/мл (типова тривалість 1-3 роки)
    - Підтримуюча фаза: phlebotomy q2-4 міс (ferritin 50-100 нг/мл,
      transferrin saturation <50%)
    - Iron chelation (деферазірокс 14-28 мг/кг/день АБО деферoxamine
      40-50 мг/кг SC overnight 5-7 ночей/тиждень) для пацієнтів з
      контраіндикаціями до phlebotomy
    - Сімейний скринінг: first-degree родичі (>18 років) для
      HFE-генотипування

  **HCC surveillance imaging (лише cirrhotic HH):**
    - Абдомінальне УЗД q6 міс + AFP одночасно
    - Subтimal візуалізація → MRI або багатофазний CT q6 міс
      (LI-RADS)

  **Hepatic status моніторинг:**
    - LFT + INR + платіт + альбумін q6-12 міс
    - Liver elastography q1-2 роки або FIB-4 / APRI

  **Cardiac + endocrine screening:**
    - Baseline ЕКГ + ехокардіограма (iron cardiomyopathy)
    - HbA1c (HH-асоційований diabetes)
    - Тестостерон у чоловіків (hypogonadism)
    - ТТГ

  **Diet + lifestyle:**
    - Уникати iron supplementation
    - Limit алкоголь (synergistic hepatic injury)
    - Уникати raw shellfish (Vibrio vulnificus)
    - Vitamin C <500 мг/день

  В Україні HH під-визнаний; HFE-генотипування — Institute of
  Genetics. Phlebotomy у blood banks та hematology centers (Київ,
  Львів, Одеса, Харків).

