expected_outcomes:
  overall_response_rate: >-
    Intensified track layers risk-reducing surgery discussions on top of
    the standard NCCN multi-organ surveillance protocol. (1) Bilateral
    risk-reducing mastectomy reduces breast cancer incidence to
    near-zero in confirmed PTEN carriers (NCCN Category 2A; no OS
    benefit shown in RCTs, but cancer-specific incidence reduction is
    well documented). (2) Risk-reducing hysterectomy + BSO
    post-childbearing reduces endometrial cancer incidence to near-zero
    and modestly addresses the small Cowden ovarian-cancer risk.
    Neither intervention is mandated; both are shared-decision-making.

