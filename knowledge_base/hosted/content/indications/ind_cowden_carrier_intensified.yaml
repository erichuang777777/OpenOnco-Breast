rationale: >
  Aggressive-track confirmed-carrier pathway layered on top of the
  IND-COWDEN-CARRIER-SURVEILLANCE standard protocol with two
  intensification options.

  **Foundation:** All standard surveillance from IND-COWDEN-CARRIER-
  SURVEILLANCE applies (breast MRI + mammography annually from 30,
  annual thyroid US, endometrial sampling / TVUS from 35-40, colonoscopy
  from 35, annual dermatology, renal US / MRI from 40).

  **Intensification 1 — Risk-reducing bilateral mastectomy (women,
  post-childbearing):** Bilateral mastectomy with or without immediate
  reconstruction reduces breast cancer incidence in PTEN carriers to
  near-zero (NCCN Category 2A). Shared-decision-making must cover:
    - Surgical risk (anesthesia, infection, reconstruction-specific
      complications)
    - Psychological impact (body-image, sensation loss, sexual function)
    - Reconstructive options (implant vs autologous; immediate vs
      delayed; nipple-sparing eligibility)
    - Alternative: continued annual breast MRI + mammography surveillance
      with explicit framing of cumulative interval-cancer risk vs
      surgical morbidity
    - Fertility / breastfeeding planning (must precede surgery)

  **Intensification 2 — Risk-reducing hysterectomy + BSO
  (post-childbearing):** Reduces endometrial cancer incidence to
  near-zero. Cowden ovarian cancer risk is modest (not BRCA-level), so
  BSO addresses a smaller absolute risk than in BRCA carriers — but
  combined hysterectomy + BSO is the standard surgical package when
  hysterectomy is undertaken. Shared-decision-making must cover:
    - Surgical risk
    - Surgical menopause sequelae (vasomotor symptoms, bone density,
      cardiovascular) — managed with HRT when not contraindicated;
      HRT in Cowden post-BSO is generally appropriate (PTEN-driven
      breast cancer risk is not exclusively hormone-driven in the way
      BRCA-related breast cancer is)
    - Fertility planning (must precede surgery)
    - Alternative: continued endometrial sampling + TVUS surveillance

  **Other intensification considerations (not core to this track):**
    - mTOR-pathway chemoprevention (rapalogs) is investigational — do
      NOT prescribe outside trial.
    - Pediatric prophylactic thyroidectomy is NOT standard (Cowden
      thyroid cancer is most often slow-growing follicular-variant
      papillary; surveillance suffices in most kindreds).

  **Cascade testing remains continuous:** every visit re-confirms
  family testing status.

  Per CHARTER §11: prophylactic surgery and chemoprevention are
  shared-decision-making domains. Patient autonomy is paramount;
  neither intervention is mandated, and continued surveillance from
  IND-COWDEN-CARRIER-SURVEILLANCE remains the floor.

rationale_ua: >
  Aggressive-трекова Indication: накладена поверх IND-COWDEN-CARRIER-
  SURVEILLANCE.

  **Foundation:** Усе standard з IND-COWDEN-CARRIER-SURVEILLANCE.

  **Інтенсифікація 1 — Risk-reducing bilateral mastectomy (жінки,
  post-childbearing):** Reduces breast cancer incidence до near-zero
  (NCCN Category 2A). Shared-decision-making: surgical risk,
  psychological impact (body-image, sensation loss, sexual function),
  reconstructive options, alternative continued surveillance, fertility
  / breastfeeding planning.

  **Інтенсифікація 2 — Risk-reducing гістеректомія + BSO
  (post-childbearing):** Reduces endometrial cancer incidence до
  near-zero; Cowden ovarian risk modest. Shared-decision-making:
  surgical risk, surgical menopause sequelae (HRT appropriate у Cowden
  post-BSO — PTEN-driven breast cancer не exclusively hormone-driven як
  BRCA), fertility planning, alternative continued surveillance.

  **Інші міркування:**
    - mTOR-pathway chemoprevention (rapalogs) — investigational, NOT
      prescribe outside trial.
    - Pediatric prophylactic тиреоїдектомія — NOT standard.

  **Cascade тестування continuous.**

  Per CHARTER §11: shared-decision-making домен.

