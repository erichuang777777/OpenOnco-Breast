do_not_do:
  - "Не презентувати risk-reducing хірургію як обов'язкову — це shared-decision-making, з повним обговоренням опцій continued surveillance."
  - "Не пропонувати risk-reducing хірургію без fertility / breastfeeding planning та menopausal-sequelae management discussion — HRT post-RRSO у Cowden generally appropriate."
  - "Не використовувати mTOR-pathway chemoprevention (rapalogs) поза clinical trial — currently investigational."
  - "Не виконувати pediatric prophylactic тиреоїдектомію — Cowden thyroid cancer переважно slow-growing follicular-variant; surveillance суфіцит."
  - "Не пропускати re-discussion intensification options з пацієнтами, чий initial decline був motivated тривогою."

do_not_do_en:
  - "Do not present risk-reducing surgery as mandatory — shared-decision-making with full discussion of continued surveillance alternative."
  - "Do not offer risk-reducing surgery without fertility / breastfeeding planning and menopausal-sequelae management discussion — HRT post-RRSO in Cowden is generally appropriate."
  - "Do not use mTOR-pathway chemoprevention (rapalogs) outside a clinical trial — currently investigational."
  - "Do not perform pediatric prophylactic thyroidectomy — Cowden thyroid cancer is predominantly slow-growing follicular-variant; surveillance suffices."
  - "Do not skip re-discussion of intensification options with patients whose initial decline was motivated by anxiety."

