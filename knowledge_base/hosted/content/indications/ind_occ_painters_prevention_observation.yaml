expected_outcomes:
  overall_response_rate: >-
    Primary endpoint: avoidance of multi-modality intensified surveillance
    when patient declines structured pathway. Routine USPSTF screening
    alone leaves paint-occupation-attributable excess across lung /
    bladder / hematologic compartments unaddressed. Modest RR magnitudes
    (~1.25-1.35) mean the absolute-risk reduction from intensified
    surveillance is correspondingly modest.

