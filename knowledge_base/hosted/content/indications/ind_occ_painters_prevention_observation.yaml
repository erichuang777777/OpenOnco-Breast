rationale: >
  Alternative-track companion to IND-OCC-PAINTERS-PREVENTION-INTENSIFIED-
  SURVEILLANCE. Patient with documented ≥10 years occupational
  painting exposure who declines multi-modality intensified surveillance —
  for any reason (cost across modalities, anxiety from layered
  surveillance burden, preference, life expectancy / competing
  illness) — is offered routine general-population screening only:

  **Lung-cancer screening:** Apply USPSTF 2021 criteria unmodified.
  Patient is explicitly informed that paint-occupation-attributable
  excess risk is unaddressed.

  **Bladder-cancer screening:** None scheduled — urinalysis obtained
  only on routine primary-care visit or symptomatic presentation.

  **Hematologic surveillance:** None scheduled — CBC obtained only
  routinely or on symptomatic presentation.

  **Smoking cessation:** Still offered — lung component remains
  primary.

  **Symptom-triggered evaluation:** Low threshold for diagnostic
  workup if alarm features develop (chest symptoms; gross / microscopic
  hematuria; unexplained fatigue with cytopenia on incidental CBC).

  Routing reconsiderations: patient may revisit intensified-surveillance
  pathway at any subsequent visit, in whole or in part. Per CHARTER
  §11 patient-autonomy framing: multi-modality surveillance is a
  shared-decision-making domain. Given the modest RR magnitudes
  underlying painter-occupation-cancer association, declining the
  intensified pathway is a more clinically reasonable choice than
  for asbestos- or silica-exposed cohorts.

rationale_ua: >
  Альтернативно-трекова Indication — компаньйон до IND-OCC-PAINTERS-
  PREVENTION-INTENSIFIED-SURVEILLANCE. Пацієнт з документованим ≥10
  років професійним малярським впливом, який відмовляється від
  multi-modality intensified surveillance (вартість через декілька
  модальностей, тривога від layered surveillance burden, перевага,
  очікувана тривалість життя), отримує тільки рутинний
  загальнопопуляційний скринінг:

  **Скринінг раку легень:** Застосовувати USPSTF 2021 без модифікації.

  **Скринінг раку сечового міхура:** Не запланований — urinalysis
  отримується тільки на рутинному візиті.

  **Гематологічне спостереження:** Не заплановане — CBC отримується
  тільки рутинно або при симптоматичній презентації.

  **Припинення куріння:** Все ще пропонується — лeгеневий компонент
  залишається первинним.

  **Symptom-triggered оцінка:** Низький поріг для діагностичного
  workup при появі alarm features.

  Reroute: пацієнт може повернутися до інтенсифікованого спостереження
  на будь-якому подальшому візиті. Per CHARTER §11 — shared-decision-
  making domain. З урахуванням помірних magnitudes RR, що лежать в
  основі painter-occupation-cancer association, відмова від
  intensified pathway — більш клінічно розумний вибір, ніж для
  asbestos- або silica-exposed когорт.

