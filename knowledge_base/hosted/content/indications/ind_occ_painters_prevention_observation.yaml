do_not_do:
  - "Не презентувати observation як еквівалент multi-modality surveillance — paint-occupation-attributable excess ризик не адресується."
  - "Не ігнорувати alarm features (chest симптоми, гематурія, цитопенія) — immediate evaluation."
  - "Не використовувати цей шлях як стандарт першої лінії — intensified-surveillance трек залишається preferred."
  - "Не пропускати counseling щодо припинення куріння — рекомендація актуальна незалежно від surveillance-track вибору."

do_not_do_en:
  - "Do not present observation as equivalent to multi-modality surveillance — paint-occupation-attributable excess risk is unaddressed."
  - "Do not ignore alarm features (chest symptoms, hematuria, cytopenia) — immediate evaluation."
  - "Do not use this pathway as a first-line standard — the intensified-surveillance track remains the preferred recommendation."
  - "Do not skip smoking-cessation counseling — the recommendation is relevant regardless of surveillance-track choice."

