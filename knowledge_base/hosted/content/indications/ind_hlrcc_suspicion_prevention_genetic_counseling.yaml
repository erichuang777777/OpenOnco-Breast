expected_outcomes:
  overall_response_rate: >-
    Diagnostic yield of germline FH panel testing in pedigree-
    suspicion populations: ~50-90% positive carrier identification
    (varies by criterion stringency — biopsy-confirmed cutaneous
    leiomyomas in the proband ~80-90%; multiple early-onset uterine
    leiomyomas + family CRC-papillary-type-2 RCC ~60-80%; family
    history alone with no proband features ~10-20%). Confirmed
    carrier routes to aggressive surveillance reflecting HLRCC-RCC
    biology — even small (<3 cm) primaries can metastasize, so the
    "3-cm rule" applied in VHL is NOT appropriate; HLRCC-RCC requires
    radical nephrectomy on detection of any solid renal mass, plus
    annual contrast MRI starting in childhood. Early-detection
    benefit is substantial — localized HLRCC-RCC has reasonable
    surgical-cure rates, while metastatic HLRCC-RCC historically had
    poor outcomes (though emerging FH-deficient-targeted regimens
    may shift this).

