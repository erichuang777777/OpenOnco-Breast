rationale: >
  Standard-track prevention pathway for individuals with pedigree
  suspicion of Hereditary Leiomyomatosis and Renal Cell Cancer
  (HLRCC). Three parallel referrals:

  **(1) Genetic counseling referral.** Pre-test counseling covers:
  inheritance pattern (autosomal dominant for HLRCC-RCC and leiomyoma
  phenotypes; biallelic FH variants cause autosomal-recessive fumarase
  deficiency — a distinct severe pediatric neurometabolic syndrome
  with different counseling implications, including avoidance of
  consanguineous reproductive partnerships in confirmed carrier
  families), penetrance (RCC ~15-30% lifetime; uterine leiomyomas
  ~70-100% in females; cutaneous leiomyomas ~75%), implications for
  family members (cascade testing if positive — siblings 50%,
  children 50%; preimplantation genetic diagnosis available;
  importantly, fumarase-deficiency risk if partner is also an FH
  carrier — adds a layer to reproductive counseling unique among
  hereditary cancer syndromes), insurance / GINA considerations,
  psychological aspects of childhood-initiating renal surveillance
  and aggressive nephrectomy threshold. Per ACMG / ASCO guidelines,
  pre-test counseling is the standard of care before germline testing.

  **(2) Germline FH gene panel testing.** Modern hereditary renal-
  cancer panels (e.g., Invitae renal-cancer panel, Color renal-cancer
  panel) cover FH (full sequencing + deletion / duplication analysis),
  plus the hereditary-RCC differential genes (VHL, FLCN for Birt-
  Hogg-Dubé, MET for hereditary papillary RCC, BAP1, SDHB/C/D for
  paraganglioma-pheochromocytoma syndromes). Variant classification
  per ACMG framework. Tumor IHC for FH protein loss and 2-succino-
  cysteine (2SC) staining can complement germline testing — FH-
  deficient tumors show loss of FH protein and accumulation of
  fumarate-derived 2SC adducts; this is treatment-persona territory
  when tumor tissue is available.

  **(3) Carrier-confirmation surveillance plan (sequel pathway).**
    Positive FH carrier → aggressive surveillance per HLRCC Family
    Alliance / NCCN Kidney Genetic/Familial High-Risk:
    - **Renal:** Annual contrast-enhanced abdominal MRI starting age
      8-10 (yes, early childhood — HLRCC-RCC has been reported in
      young adults and rarely in adolescents; the aggressive biology
      justifies the early start). **Radical nephrectomy** on detection
      of any solid renal mass regardless of size — the "3-cm rule"
      applied in VHL is NOT appropriate because HLRCC-RCC can
      metastasize from tumors as small as 1 cm. CT alternative if MRI
      contraindicated.
    - **Gynecologic (women):** Detailed gynecologic counseling
      regarding uterine fibroid management. Most female FH carriers
      develop early, large, multiple, symptomatic uterine leiomyomas
      —fertility-preserving myomectomy is feasible at younger ages;
      hysterectomy frequently performed in 30s-40s after childbearing
      is complete. Hysterectomy specimens require pathology review
      for any leiomyosarcoma transformation. Reproductive planning
      should be addressed early (fertility-preservation options
      including oocyte cryopreservation pre-myomectomy /
      hysterectomy; preimplantation genetic diagnosis; partner FH-
      testing to assess fumarase-deficiency risk in offspring).
    - **Dermatology:** Annual skin exam for cutaneous leiomyomas;
      biopsy of any new firm painful nodule. Cutaneous leiomyomas
      themselves are benign but pathognomonic and inform RCC-
      surveillance intensification.
    - **Adrenal / pheochromocytoma:** Not a routine HLRCC feature
      (distinguishes from VHL); plasma metanephrine screening NOT
      indicated unless symptomatic.

  Negative result (no pathogenic / likely-pathogenic variant on a
  high-quality panel) → re-stratify residual family-history risk;
  if cutaneous-leiomyoma phenotype is strong in family with no FH
  variant, consider phenocopy / VUS interpretation review with a
  multidisciplinary tumor board. VUS result → managed as pedigree
  suspicion (this Indication) until segregation analysis or
  functional studies clarify.

  Genetic counseling and germline FH testing are typically covered
  by insurance in the US/EU when pedigree criteria are met; in
  Ukraine, germline testing is available through private labs at
  out-of-pocket cost (~5000-15000 UAH for multi-gene panel).

rationale_ua: >
  Стандартний-трек prevention шлях для осіб з родовідною підозрою на
  синдром Hereditary Leiomyomatosis and Renal Cell Cancer (HLRCC).
  Три паралельні направлення:

  **(1) Направлення на генетичне консультування.** Pre-test
  консультування охоплює: спадкування (аутосомно-домінантне для
  HLRCC-РСС і лейоміоматозного фенотипу; біалельні FH варіанти
  спричиняють аутосомно-рецесивну fumarase deficiency — окремий
  важкий педіатричний нейрометаболічний синдром з різними
  консультативними наслідками, включно з уникненням consanguineous
  репродуктивних партнерств у підтверджених носійських сім'ях),
  пенетрантність (РСС ~15-30% лайфтайм; маткові лейоміоми ~70-100% у
  жінок; шкірні лейоміоми ~75%), наслідки для членів сім'ї (cascade
  тестування при позитиві — сібси 50%, діти 50%; преімплантаційна
  генетична діагностика доступна; важливо: ризик fumarase deficiency
  якщо партнер також FH-носій — додає шар до репродуктивного
  консультування, унікальний серед спадкових раку-синдромів),
  страхові / GINA-міркування, психологічні аспекти childhood-
  initiating renal спостереження та aggressive nephrectomy порогу.
  За ACMG / ASCO настановами, pre-test консультування — standard of
  care перед germline тестуванням.

  **(2) Germline FH панельне тестування.** Сучасні панелі спадкового
  РСС (напр., Invitae renal-cancer panel, Color renal-cancer panel)
  покривають FH (повне секвенування + аналіз делецій / дуплікацій),
  плюс гени диференційного діагнозу спадкового РСС (VHL, FLCN для
  Birt-Hogg-Dubé, MET для спадкового папілярного РСС, BAP1, SDHB/C/D
  для феохромо-парагангліома синдромів). Класифікація варіантів за
  рамкою ACMG. Tumor IHC на FH-протеїнову втрату та 2-сукциніо-
  цистеїн (2SC) забарвлення може доповнити germline тестування —
  FH-дефіцитні пухлини показують втрату FH протеїну та накопичення
  fumarate-derived 2SC adducts; це територія treatment-персони коли
  доступна пухлинна тканина.

  **(3) План спостереження при підтвердженому носійстві (sequel).**
    Позитивний FH носій → агресивне спостереження per HLRCC Family
    Alliance / NCCN Kidney Genetic/Familial High-Risk:
    - **Ниркове:** Щорічна контрастна абдомінальна MRI з 8-10 років
      (так, ранне дитинство — HLRCC-РСС повідомлявся у молодих
      дорослих і рідко у підлітків; aggressive biology обґрунтовує
      ранній старт). **Радикальна нефректомія** при виявленні
      будь-якої solid renal mass незалежно від розміру — "правило
      3-см", що застосовується при VHL, НЕ є відповідним, бо
      HLRCC-РСС може метастазувати з пухлин розміром від 1 см. CT
      альтернатива при контраіндикованому MRI.
    - **Гінекологічне (жінки):** Детальне гінекологічне
      консультування щодо ведення маткових фіброміом. Більшість
      жінок-FH-носіїв розвивають ранні, великі, множинні,
      симптоматичні маткові лейоміоми — fertility-preserving
      міомектомія fea​sible у молодшому віці; гістеректомія часто
      виконується у 30-40 років після завершення дітородіння.
      Препарати гістеректомії потребують патологічної ревізії на
      будь-яку лейоміосаркома-трансформацію. Репродуктивне планування
      слід обговорити рано (опції fertility-preservation, включно з
      cryopreservation ооцитів pre-myomectomy / hysterectomy;
      преімплантаційна генетична діагностика; FH-тестування партнера
      для оцінки fumarase-deficiency ризику у потомства).
    - **Дерматологічне:** Щорічний шкірний огляд на кутанні
      лейоміоми; біопсія будь-якого нового firm painful nodule.
      Кутанні лейоміоми самі по собі доброякісні, але патогномонічні
      та інформують про інтенсифікацію РСС-спостереження.
    - **Адренал / феохромоцитома:** НЕ є рутинним проявом HLRCC
      (відрізняє від VHL); plasma metanephrine скринінг НЕ
      показаний без симптоматики.

  Негативний результат (без патогенного / ймовірно-патогенного
  варіанту на високоякісній панелі) → ре-стратифікація залишкового
  сімейно-історичного ризику; якщо cutaneous-leiomyoma фенотип
  сильний у сім'ї без FH варіанту, розгляньте phenocopy / VUS
  interpretation review з мультидисциплінарним tumor board. VUS
  результат → ведеться як родовідна підозра (ця Indication) до
  segregation analysis або functional studies.

  Генетичне консультування та germline FH тестування зазвичай
  покриваються страхуванням у США/ЄС при відповідності критеріям;
  в Україні germline тестування доступне через приватні лабораторії
  за out-of-pocket вартість (~5000-15000 грн за мультигенну панель).

