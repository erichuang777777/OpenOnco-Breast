sources:
  - source_id: SRC-ESMO-RCC-2024
    position: supports
    relevant_quote_paraphrase: >-
      "Germline testing for hereditary RCC syndromes including HLRCC
      (FH) is recommended for individuals or families with papillary
      type-2 RCC, cutaneous leiomyomas, or early-onset / multiple
      uterine leiomyomas."
  - source_id: SRC-NCCN-KIDNEY-2025
    position: supports
    relevant_quote_paraphrase: >-
      "Patients with suspected HLRCC should receive germline FH panel
      testing; confirmed FH carriers enter aggressive renal
      surveillance (annual contrast MRI from age 8-10) with radical
      nephrectomy on detection of any solid renal mass — the
      tumor-sparing approach used in VHL is not appropriate due to
      the aggressive metastatic potential of HLRCC-RCC."

do_not_do:
  - "Не призначати germline тестування без pre-test консультування — інформована згода, обговорення fumarase-deficiency репродуктивного ризику (якщо партнер також FH-носій), і психологічна підготовка до child-onset surveillance обов'язкові."
  - "Не treter VUS результат як патогенний — управляйте як родовідну підозру до подальших даних; не починайте дитячий MRI протокол на підставі VUS."
  - "Не застосовувати «правило 3-см» VHL до HLRCC-РСС — HLRCC-pap-type-2 метастазує з пухлин <3 см; будь-яка solid renal mass у підтвердженого FH носія потребує радикальної нефректомії, не tumor-sparing підходу."
  - "Не пропускати pre-myomectomy / pre-hysterectomy fertility-preservation обговорення (oocyte cryopreservation) у молодих жінок-FH-носіїв — fibroid surgery часто потребує hysterectomy у 30-40 років і ранне репродуктивне планування критично."
  - "Не пропускати FH-тестування партнера у репродуктивному консультуванні підтвердженого FH-носія — біалельне FH носійство у потомства = fumarase deficiency (важкий неонатальний нейрометаболічний синдром, не HLRCC)."
  - "Не презентувати negative-panel результат як zero-risk — фенокопії і нерозпізнані FH-варіанти можливі; consider tumor IHC (FH-loss, 2SC accumulation) на доступних пухлинних зразках родичів."

do_not_do_en:
  - "Do not order germline testing without pre-test counseling — informed consent, discussion of fumarase-deficiency reproductive risk (if partner is also an FH carrier), and psychological preparation for child-onset surveillance are mandatory."
  - "Do not treat a VUS result as pathogenic — manage as pedigree suspicion pending further data; do not initiate the childhood MRI protocol based on a VUS."
  - "Do not apply the VHL '3-cm rule' to HLRCC-RCC — HLRCC papillary-type-2 metastasizes from tumors <3 cm; any solid renal mass in a confirmed FH carrier requires radical nephrectomy, not a tumor-sparing approach."
  - "Do not skip pre-myomectomy / pre-hysterectomy fertility-preservation discussion (oocyte cryopreservation) in young female FH carriers — fibroid surgery often requires hysterectomy in the 30s-40s and early reproductive planning is critical."
  - "Do not skip partner FH testing in reproductive counseling of a confirmed FH carrier — biallelic FH in offspring = fumarase deficiency (severe neonatal neurometabolic syndrome, not HLRCC)."
  - "Do not present a negative-panel result as zero-risk — phenocopies and unrecognised FH variants are possible; consider tumor IHC (FH loss, 2SC accumulation) on available tumor specimens from relatives."

