rationale: >
  Standard-track surveillance for prior therapeutic radiation. Components per
  COG-LTFU (Children's Oncology Group Long-Term Follow-Up) guidelines:

  **Mantle / chest RT in adolescence/young adulthood (women):**
  - Annual breast MRI from age 25 OR 8y post-RT (whichever later)
  - Alternating with mammography from age 30
  - Clinical breast exam q6mo

  **Pediatric Hodgkin / Wilms / sarcoma RT survivors:**
  - Lung cancer screening with LDCT — eligibility per modified USPSTF criteria
  - Thyroid US q3-5y if cervical/mantle field
  - Skin exam q1y if extensive field

  **Pelvic RT survivors:**
  - Colorectal cancer screening at younger age (typically 10y earlier than
    general-population USPSTF threshold)
  - Bladder cancer surveillance (urinalysis + cytology q1-3y)

  **All RT survivors:**
  - CBC q1y (secondary leukemia surveillance)
  - Awareness of radiation-induced sarcoma — any soft-tissue mass or bone
    pain in irradiated field warrants immediate imaging.

  Cardiovascular surveillance (echo + ECG) and endocrine surveillance (thyroid
  function) are separate concerns but routinely co-managed in this cohort.

rationale_ua: >
  Стандартний-трек surveillance для prior therapeutic radiation. Components
  per COG-LTFU:

  **Mantle / chest RT в adolescence/young adulthood (жінки):**
  - Щорічна breast MRI з 25 років АБО 8р post-RT
  - Alternating з мамографією з 30 років

  **Pediatric Hodgkin / Wilms / sarcoma RT survivors:**
  - Lung cancer screening через LDCT
  - Thyroid US q3-5y

  **Pelvic RT survivors:**
  - CRC screening раніше (10р earlier than USPSTF threshold)
  - Bladder cancer surveillance

  **Всі RT survivors:**
  - CBC q1y (secondary leukemia surveillance)
  - Awareness про radiation-induced sarcoma

