expected_outcomes:
  overall_response_rate: "Testicular GCT + Hodgkin lymphoma survivor cohorts: ~10% incidence of clinically significant bleomycin-induced pulmonary fibrosis at cumulative 270-360 units; subclinical DLCO decline in 30-40% of survivors lifelong. PFT surveillance enables earlier detection of progressive fibrosis (smoking cessation + pulmonology referral can stabilize). LDCT lung-cancer screening (when bleomycin + smoking-history overlap moves survivor into screening-eligible group) detects lung cancer at earlier stage with documented survival benefit per NLST + NELSON in general high-risk populations; bleomycin-exposed smokers represent enriched high-risk subgroup."

