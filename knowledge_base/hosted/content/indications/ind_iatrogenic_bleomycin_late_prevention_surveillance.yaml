rationale: >
  Standard-track late-effects pulmonary surveillance for cancer survivors
  with prior bleomycin exposure. Components per NCCN NSCLC + ACS Lung
  Cancer Screening + COG-LTFU + ESMO Testicular Cancer survivorship:

  **(1) Pulmonary function tests (PFTs) cadence** —
  - Baseline PFT (FEV1, FVC, FEV1/FVC, DLCO) within 6-12 months
    post-completion if not already documented in primary-treatment
    record
  - Repeat PFT q1-2y in first 5y post-completion; q3-5y thereafter
    if stable
  - DLCO is most sensitive marker for bleomycin-induced fibrosis
    (declines before FVC); a >20% decline from baseline warrants
    pulmonology referral

  **(2) Chest exam at routine survivorship visits** —
  - Auscultation for crackles / wheezes
  - Persistent cough, dyspnea on exertion, new oxygen requirement
    → urgent PFT + HRCT chest

  **(3) Smoking cessation counseling** —
  - HIGHEST-yield late-effect intervention for bleomycin-exposed
    survivors; bleomycin + tobacco DNA-damage synergy elevates lung
    cancer risk above general-population baseline
  - Pharmacotherapy support (varenicline, nicotine replacement),
    behavioral support, smoking-cessation clinic referral

  **(4) LDCT lung-cancer screening eligibility shift** —
  - Survivor with bleomycin exposure + ≥20 pack-year smoking history,
    age 50-77: ENROLL in annual LDCT screening per modified USPSTF
    criteria
  - Survivor with bleomycin exposure + <20 pack-year smoking history
    or never-smoker: shared decision-making re: LDCT (lower yield
    in absolute terms but bleomycin still confers elevated risk)
  - Coordinate with primary care + pulmonology for screening + follow-
    up of indeterminate nodules per Lung-RADS

  **(5) Lifelong high-FiO2 oxygen caution** —
  - Patient education: any future surgery, scuba diving, hyperbaric
    medicine — disclose bleomycin history to anesthesia / dive medicine
    physician
  - Anesthesia should target lowest acceptable FiO2 to maintain SpO2
    ≥92% (avoid >30% FiO2 unless absolutely necessary)
  - Medical-alert bracelet / wallet card consideration for survivors
    with significant exposure

  **(6) Co-fired surveillance dimensions** — bleomycin is often co-
  administered with platinum (BEP regimen, ABVD's component-set);
  if patient also meets RF-IATROGENIC-PLATINUM-LATE-PREVENTION
  threshold, that RF fires in parallel and combined PreventionPlan
  addresses pulmonary + CV/renal/AML surveillance dimensions.

