do_not_do:
  - "Не пропускати DLCO у PFT panel — найбільш sensitive marker для bleomycin-induced fibrosis; FVC alone може залишатися normal на ранніх стадіях."
  - "Не пропускати smoking cessation counseling — highest-yield late-effect інтервенція; bleomycin + tobacco synergistic."
  - "Не виключати LDCT lung-cancer screening eligibility лише на основі age — bleomycin survivors з smoking history qualify навіть below general USPSTF threshold."
  - "Не призначати high-FiO2 oxygen без disclosing bleomycin history до anesthesia — oxygen toxicity може precipitate fibrosis exacerbation lifelong."
  - "Не нормалізувати persistent cough як 'post-viral' у bleomycin survivor — warrants PFT + HRCT chest."

do_not_do_en:
  - "Do not skip DLCO in the PFT panel — it is the most sensitive marker for bleomycin-induced fibrosis; FVC alone may remain normal in early stages."
  - "Do not skip smoking cessation counseling — it is the highest-yield late-effect intervention; bleomycin + tobacco are synergistic."
  - "Do not exclude LDCT lung-cancer screening eligibility based on age alone — bleomycin survivors with a smoking history qualify even below the general USPSTF threshold."
  - "Do not order high-FiO2 oxygen without disclosing the bleomycin history to anesthesia — oxygen toxicity can precipitate a fibrosis exacerbation lifelong."
  - "Do not normalize persistent cough as 'post-viral' in a bleomycin survivor — warrants PFT + HRCT chest."

