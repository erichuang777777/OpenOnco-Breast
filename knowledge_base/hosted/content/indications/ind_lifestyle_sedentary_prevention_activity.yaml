rationale: >
  Standard-track prevention pathway for sedentary lifestyle. Components per
  HHS Physical Activity Guidelines (2nd ed.) + ACS Guideline for Diet +
  Physical Activity for Cancer Prevention (2020):

  **(1) Activity prescription (FITT framework)** — Frequency 5x/week,
  Intensity moderate (50-70% HRmax) OR 3x/week vigorous, Time 30+ min/session,
  Type aerobic + 2x/week resistance training. Target ≥150 min/week moderate
  OR ≥75 min/week vigorous; greater benefit up to 300 min/week.

  **(2) Sedentary-time reduction** — Break sitting periods every 30-60 min.
  Standing desks, walking meetings, "exercise snacks" (brief activity bouts).

  **(3) Structured behavioral support** — Motivational interviewing, goal-
  setting (SMART goals), wearable activity trackers for self-monitoring,
  group programs (e.g., Silver Sneakers for older adults).

  **(4) Age-appropriate cancer screening** — Continue routine USPSTF screening
  cadence (colonoscopy q10y from age 45 for CRC, mammography for women age
  40-50+, endometrial cancer surveillance only if symptomatic post-menopausal
  bleeding; no routine asymptomatic endometrial screening).

  Combined activity intervention + age-appropriate screening produces additive
  cancer-incidence reduction. Activity is also cardioprotective + metabolically
  protective — broad health-span benefit beyond cancer-specific endpoints.

rationale_ua: >
  Стандартний-трек prevention шлях для sedentary lifestyle. Components per
  HHS Physical Activity Guidelines + ACS Guideline for Diet + Physical
  Activity (2020):

  **(1) Призначення активності (FITT framework)** — Frequency 5x/тиждень,
  Intensity moderate (50-70% HRmax) АБО 3x/тиждень vigorous, Time 30+ хв/сесія,
  Type aerobic + 2x/тиждень resistance training. Target ≥150 хв/тиждень
  moderate АБО ≥75 хв/тиждень vigorous.

  **(2) Зменшення sedentary time** — Перерви sitting кожні 30-60 хв. Standing
  desks, walking meetings, "exercise snacks".

  **(3) Behavioral support** — Motivational interviewing, goal-setting,
  wearable activity trackers, group programs.

  **(4) Age-appropriate cancer screening** — Continue USPSTF cadence
  (colonoscopy q10y з 45 років для CRC, мамографія для жінок 40-50+).

