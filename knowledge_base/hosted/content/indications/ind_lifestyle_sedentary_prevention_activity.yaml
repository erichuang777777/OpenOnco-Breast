do_not_do:
  - "Не призначати vigorous-intensity пацієнтам з cardiovascular disease без preceding stress testing."
  - "Не презентувати активність як заміну age-appropriate screening — обидві intervention доповнюють."
  - "Не ігнорувати resistance training — сама aerobic activity недостатня для метаболічної + sarcopenia protection у старших."
  - "Не очікувати швидкого зниження ризику — incidence reduction накопичується протягом років послідовної активності."

do_not_do_en:
  - "Do not prescribe vigorous-intensity activity in patients with cardiovascular disease without preceding stress testing."
  - "Do not present activity as a substitute for age-appropriate screening — both interventions are complementary."
  - "Do not ignore resistance training — aerobic activity alone is insufficient for metabolic + sarcopenia protection in older adults."
  - "Do not expect rapid risk reduction — incidence reduction accrues over years of sustained activity."

