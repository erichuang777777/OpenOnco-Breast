expected_outcomes:
  overall_response_rate: "Patient declines annual DES-specific gynecologic examination — receives baseline symptom-vigilance education on alarm symptoms (abnormal vaginal bleeding, persistent discharge, dyspareunia, pelvic pain). Clear-cell adenocarcinoma may go undetected until advanced stage; given known submucosal growth pattern (palpable mass without bleeding in some cases), symptom-only pathway has limited sensitivity. Outcomes substantially worse than with annual DES-specific exam."

