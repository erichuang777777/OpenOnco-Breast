do_not_do:
  - "Не презентувати observation як еквівалент annual DES-specific exam — CCA detection critically depends on clinical exam."
  - "Не пропускати explicit symptom-vigilance education — pattern-recognition критичний у DES daughters."
  - "Не виключати patient зі symptom-prompted workup access — навіть при declining routine exam, GYN має бути available."
  - "Не нормалізувати vaginal bleeding / discharge / dyspareunia у DES daughter — будь-який alarm symptom requires evaluation."
  - "Не рекомендувати self-examination як substitute clinical pelvic exam — CCA може be palpable mass without bleeding."

do_not_do_en:
  - "Do not present observation as equivalent to annual DES-specific exam — CCA detection critically depends on clinical exam."
  - "Do not skip explicit symptom-vigilance education — pattern recognition is critical in DES daughters."
  - "Do not deny the patient symptom-prompted workup access — even if routine exam is declined, GYN must be available."
  - "Do not normalize vaginal bleeding / discharge / dyspareunia in a DES daughter — any alarm symptom requires evaluation."
  - "Do not recommend self-examination as a substitute for clinical pelvic exam — CCA can be a palpable mass without bleeding."

