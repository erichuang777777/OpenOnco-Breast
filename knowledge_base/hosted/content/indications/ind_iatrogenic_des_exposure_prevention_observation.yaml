desired_tests: []

rationale: >
  Alternative-track companion to IND-IATROGENIC-DES-EXPOSURE-
  PREVENTION-SURVEILLANCE. Patient declines annual DES-specific
  gynecologic examination (provider access — DES-experienced
  gynecologists increasingly rare as cohort ages; surveillance
  fatigue, anxiety, preference) — receives explicit symptom-
  vigilance education (abnormal vaginal bleeding regardless of
  pattern, persistent vaginal discharge, dyspareunia, pelvic
  pain, palpable mass → immediate gynecology referral, even if
  minor / intermittent). Per CHARTER §11 patient-autonomy framing
  — declining the structured annual exam is legitimate but framed
  as suboptimal vs. annual-DES-exam comparator. Particularly
  emphasized: clear-cell adenocarcinoma may present as a palpable
  vaginal-wall mass without bleeding — self-examination cannot
  substitute for clinical pelvic exam.

rationale_ua: >
  Альтернативно-трекова Indication. Пацієнт відмовляється від
  annual DES-specific gynecologic examination (provider access
  — DES-experienced gynecologists стають рідкісними; surveillance
  fatigue, anxiety) — отримує explicit symptom-vigilance education
  (abnormal vaginal bleeding незалежно від pattern, persistent
  vaginal discharge, dyspareunia, pelvic pain, palpable mass →
  immediate gynecology referral, навіть якщо minor / intermittent).
  Per CHARTER §11. Особливо emphasized: CCA може presented як
  palpable vaginal-wall mass без bleeding — self-examination
  не може замінити clinical pelvic exam.

