  overall_response_rate: "Tobacco cessation pre-age-40 restores life expectancy nearly to never-smoker comparator. Cessation at any age substantially reduces incidence of all tobacco-related cancers; effect compounds over decades (lung cancer risk ~50% reduction at 15y post-cessation). USPSTF Grade A recommendation — best-evidence preventive intervention in adult medicine."

