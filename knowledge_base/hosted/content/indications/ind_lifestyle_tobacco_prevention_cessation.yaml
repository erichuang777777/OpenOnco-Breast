rationale: >
  Standard-track prevention pathway for active tobacco use. Three components:

  **(1) Structured cessation counseling** — 5A framework (Ask / Advise / Assess /
  Assist / Arrange follow-up). Behavioral support: tobacco quitlines, individual
  or group counseling, smartphone apps (Smokefree.gov, NHS Quit Smoking).

  **(2) Pharmacotherapy** (≥7 first-line options per USPSTF + AHCPR):
  - Nicotine replacement therapy (patch + lozenge/gum combination preferred)
  - Varenicline (Champix/Chantix) — most effective monotherapy; 12-week course
  - Bupropion SR — alternative; avoid in seizure disorders
  - Cytisine — emerging option; non-USA availability

  **(3) USPSTF lung cancer screening eligibility check** — annual LDCT for ages
  50-80 + ≥20 pack-years + currently smoke OR quit ≤15y. Engine surfaces this
  via routing patient profile back through DIS-NSCLC screening pathway.

  Combined intervention (counseling + pharmacotherapy) doubles quit rates vs.
  unassisted cessation. Tobacco cessation is the single most cost-effective
  cancer-prevention intervention; NNT ~25 to prevent one premature death.

rationale_ua: >
  Стандартний-трек prevention шлях для активного куріння. Три компоненти:

  **(1) Структуроване consultation з припинення** — 5A framework (Ask / Advise /
  Assess / Assist / Arrange follow-up). Behavioral support: tobacco quitlines,
  individual or group counseling, smartphone apps.

  **(2) Фармакотерапія** (≥7 first-line options per USPSTF + AHCPR):
  - Nicotine replacement therapy (patch + lozenge/gum combination preferred)
  - Vareniclin (Champix/Chantix) — найефективніша монотерапія; 12-тижневий курс
  - Bupropion SR — альтернатива; уникати при seizure disorders
  - Cytisine — emerging option; non-USA availability

  **(3) USPSTF lung cancer screening eligibility** — щорічна LDCT для віку
  50-80 + ≥20 pack-years + currently smoke АБО quit ≤15y.

