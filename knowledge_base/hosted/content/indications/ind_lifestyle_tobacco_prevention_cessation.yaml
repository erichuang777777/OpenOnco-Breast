do_not_do:
  - "Не пропускати structured counseling — pharmacotherapy alone has lower quit rates."
  - "Не використовувати varenicline у пацієнтів з recent suicidality / depression — black-box warning."
  - "Не вважати e-cigarettes / vaping як cessation tool — IARC рекомендації проти; cessation tools above мають доведене безпекове profile."
  - "Не пропускати lung cancer screening eligibility check — навіть quit-сurpolas have residual risk."

do_not_do_en:
  - "Do not skip structured counseling — pharmacotherapy alone has lower quit rates."
  - "Do not use varenicline in patients with recent suicidality / depression — black-box warning."
  - "Do not consider e-cigarettes / vaping a cessation tool — IARC recommends against; the cessation tools above have established safety profile."
  - "Do not skip lung cancer screening eligibility check — even ex-smokers have residual risk."

