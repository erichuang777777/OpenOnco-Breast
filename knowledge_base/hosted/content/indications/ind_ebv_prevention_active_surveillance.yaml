  - "Не призначати rituximab без транспортної координації з трансплантологом / гематологом."
  - "Не reducing immunosuppression у патієнта з рисом graft rejection — окремий клінічний consult потрібен."

do_not_do_en:
  - "Do not skip quantitative EBV-DNA monitoring in post-transplant patients — this is the foundation of the preemptive strategy."
  - "Do not initiate rituximab without coordination with the transplant team / hematology."
  - "Do not reduce immunosuppression in a patient at risk of graft rejection — a separate clinical consult is required."

