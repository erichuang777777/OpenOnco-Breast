rationale: >
  Standard-track prevention pathway for EBV-driven lymphoma in
  immunocompromised hosts (post-transplant, HSCT, congenital
  immunodeficiency, HIV+). Three components:

  **(1) Quantitative EBV-DNA monitoring (q1-2 weeks initially in
  post-transplant settings, q1-3 months chronically).** Rising titers
  (>10x baseline OR >1000 copies/mL by qPCR) trigger active
  intervention.

  **(2) Reduction of immunosuppression (RIS)** in transplant
  recipients with rising EBV viremia, when graft function allows.
  ~30-50% achieve remission of early PTLD with RIS alone.

  **(3) Preemptive rituximab** for sustained rising EBV-DNA titers
  in solid-organ transplant or post-HSCT settings: rituximab 375 mg/m²
  weekly × 1-4 doses, guided by EBV-DNA response. Reduces progression
  to overt PTLD by ~70-80%.

  Population-wide EBV vaccination is in trials but not yet approved.

rationale_ua: >
  Стандартний-трек prevention шлях для EBV-driven лімфоми в
  імунокомпрометованих хазяях (post-transplant, ТГСК, вроджений
  імунодефіцит, ВІЛ+). Три компоненти:

  **(1) Кількісний EBV-DNA моніторинг (q1-2 тижні спочатку в
  post-transplant контексті, q1-3 міс хронічно).** Підвищення титрів
  (>10x baseline АБО >1000 копій/мл за qPCR) тригерує активне
  втручання.

  **(2) Зниження імуносупресії (RIS)** в transplant-реципієнтів з
  ростом EBV-віремії, коли функція трансплантату дозволяє. ~30-50%
  досягають ремісії ранньої PTLD при RIS самостійно.

  **(3) Preemptive rituximab** для стабільно зростаючих EBV-DNA титрів
  при solid-organ transplant або post-HSCT: rituximab 375 мг/м²
  щотижнево × 1-4 дози, керовано EBV-DNA відповіддю. Знижує
  прогресію до явної PTLD на ~70-80%.

