rationale: >
  Standard-track confirmed-carrier surveillance pathway for individuals
  with a documented germline MEN1 pathogenic variant. Protocol assumes
  genetic counseling, panel testing, and variant classification are
  already complete.

  **Parathyroid (~95% lifetime, earliest tumor):** Serum PTH + ionized
  calcium (or albumin-corrected total calcium) q1y starting age 5.
  Multi-glandular hyperplasia (not solitary adenoma) is the rule;
  surgical strategy when indicated is subtotal (3.5-gland) parathyroidectomy
  or total parathyroidectomy + autotransplantation, NOT single-adenoma
  excision (high recurrence).

  **Pituitary (~30-40%):** Prolactin + IGF-1 q1y from age 5. Pituitary
  MRI q3y starting age 5 (asymptomatic baseline) — earlier or more
  frequent if biochemistry abnormal or visual symptoms develop.
  Prolactinoma is the most common MEN1 pituitary tumor and responds to
  dopamine agonists; surgery reserved for refractory / aggressive cases.

  **GEP-NET (~30-80% lifetime, dominant mortality driver):**
  Chromogranin-A q1y starting age 10 (specificity limited by PPI use,
  atrophic gastritis, renal impairment — interpret cautiously). Fasting
  gastrin q1y (high if Zollinger-Ellison / gastrinoma). Abdominal MRI
  q1y starting age 10 — preferred over CT for cumulative-radiation
  reasons. EUS adjunct for sub-cm pancreatic lesion characterization.
  68Ga-DOTATATE PET reserved for staging confirmed lesions, not routine
  surveillance.

  **Adrenocortical (~20-40%, mostly non-functioning):** Captured
  incidentally on abdominal MRI surveillance — no dedicated biochemistry
  unless functional features (Cushing, virilization, aldosteronism)
  emerge clinically.

  **Bronchial / thymic NET (~5-10%, thymic more aggressive in male
  carriers):** Chest CT q1-3y from age 20 (thymic NET in male MEN1
  carriers can be aggressive — argued for shorter interval in some
  programs). Optional, individualized.

  **Cascade testing:** Confirmed carrier status mandates cascade testing
  offer to all first-degree relatives. Counseling responsibility
  surfaced at every surveillance visit.

  Per CHARTER §11 patient-autonomy framing: surveillance intervals are
  shared-decision-making with the patient and family. Pediatric-onset
  surveillance (PTH/Ca and prolactin from age 5) requires age-appropriate
  patient and parental counseling.

rationale_ua: >
  Стандартний-трекова Indication для confirmed-carrier MEN1 surveillance.
  Протокол per Thakker JCEM 2012 / ESE 2024:

  **Паращитоподібні (~95% lifetime, найраніша пухлина):** PTH +
  іонізований кальцій q1y з 5 років. Multi-glandular hyperplasia — норма;
  хірургія = subtotal (3.5-gland) паратиреоїдектомія або total + auto-
  transplantation, НЕ single-adenoma excision (висока рецидивність).

  **Гіпофіз (~30-40%):** Пролактин + IGF-1 q1y з 5 років. Гіпофізарна
  МРТ q3y з 5 років. Пролактинома — найчастіша; реагує на дофамінові
  агоністи.

  **GEP-NET (~30-80%, основний драйвер смертності):** Хромогранін-А +
  fasting gastrin q1y з 10 років. Абдомінальна МРТ q1y з 10 років
  (preferred over CT через cumulative radiation). EUS adjunct для
  sub-cm pancreatic lesion. 68Ga-DOTATATE PET — для confirmed lesions,
  не routine surveillance.

  **Adrenocortical (~20-40%):** Виявлення incidentally на abdominal MRI.

  **Bronchial / thymic NET (~5-10%):** Chest CT q1-3y з 20 років (thymic
  NET у чоловіків-носіїв часто aggressive).

  **Cascade тестування:** Mandates пропонування тестування first-degree
  родичам.

  Per CHARTER §11 framing автономії пацієнта; педіатрична-вікова
  surveillance потребує age-appropriate counseling.

