expected_outcomes:
  overall_response_rate: >-
    Structured multi-organ MEN1 surveillance per Thakker JCEM 2012 / ESE
    2024 detects parathyroid disease at the biochemical-only stage
    (asymptomatic hypercalcemia), pituitary adenomas before
    mass-effect / hormonal-syndrome presentation, and GEP-NETs at smaller
    sizes amenable to enucleation rather than Whipple. Earliest-onset
    tumors (primary hyperparathyroidism, median age 20-25) are reliably
    captured by annual PTH/Ca biochemistry. GEP-NET surveillance with
    abdominal MRI carries no radiation burden — important given lifelong
    surveillance starting age 10.

