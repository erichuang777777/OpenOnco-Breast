do_not_do:
  - "Не використовувати single-adenoma parathyroidectomy при MEN1 — multi-glandular hyperplasia вимагає subtotal або total + autotransplant."
  - "Не використовувати CT як primary GEP-NET surveillance modality — cumulative radiation burden lifelong; МРТ preferred."
  - "Не пропускати pediatric biochemistry (PTH/Ca, prolactin з 5 років) — primary hyperparathyroidism часто presents у teen years."
  - "Не intepretувати chromogranin-A ізольовано — PPI, atrophic gastritis, renal impairment підвищують false-positive rate."
  - "Не пропускати cascade-тестування first-degree родичів — кожен візит має документувати family testing status."

do_not_do_en:
  - "Do not perform single-adenoma parathyroidectomy in MEN1 — multi-glandular hyperplasia requires subtotal or total + autotransplant."
  - "Do not use CT as the primary GEP-NET surveillance modality — lifelong cumulative radiation burden; MRI preferred."
  - "Do not skip pediatric biochemistry (PTH/Ca, prolactin from age 5) — primary hyperparathyroidism often presents in teen years."
  - "Do not interpret chromogranin-A in isolation — PPI use, atrophic gastritis, and renal impairment raise false-positive rate."
  - "Do not skip cascade testing of first-degree relatives — every surveillance visit should document family testing status."

