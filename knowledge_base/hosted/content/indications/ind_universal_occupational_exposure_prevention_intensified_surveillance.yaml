rationale: >
  Standard-track prevention pathway for documented multiple IARC
  Group 1 occupational exposures. Intensified multi-organ
  surveillance per IARC Monograph exposure-organ pairings +
  ACOEM + NIOSH guidance.

  **(1) Lung-cancer screening.** Combined-exposure cohort (asbestos +
  tobacco, asbestos + radon, silica + tobacco, diesel + tobacco,
  PAH + tobacco) — USPSTF 2021 LDCT eligibility may be met
  through tobacco component alone; consider broadening per NCCN
  Lung-Cancer Screening High-Risk pathway for asbestos / silica /
  radon exposure (NCCN ≥20 pack-year + occupational-exposure
  history may qualify even outside strict USPSTF criteria).
  Annual LDCT with Lung-RADS reporting. Asbestos-specific:
  baseline chest CT (not LDCT) at ≥10y post-first-exposure for
  pleural-plaque + mesothelioma surveillance (no formal screening
  modality; CT documents pleural changes for medico-legal +
  workers-compensation purposes).

  **(2) Urothelial bladder cancer surveillance.** Benzene + aniline-
  dye + rubber-industry + aromatic-amine cohort: urine cytology
  q1y + symptom-prompted cystoscopy (gross hematuria,
  microhematuria persistent after infection-rule-out). Per ACOEM
  + EAU occupational-exposure-specific guidance. NOT routine
  USPSTF — Grade I (insufficient evidence) for general population;
  occupational-cohort warrants surveillance.

  **(3) Skin cancer surveillance.** PAH + coal-tar + arsenic +
  prolonged UV-exposure occupational cohort: dermatology q6-12mo
  with low-threshold biopsy. Particular vigilance for
  occupational-attributable arsenic-keratosis lesions in
  arsenic-exposed workers.

  **(4) Upper aerodigestive tract (UADT) cancer surveillance.**
  Combined PAH + tobacco + alcohol cohort + nickel + chromium +
  formaldehyde + wood-dust cohort: ENT exam q1y + low-threshold
  laryngoscopy / fiber-optic exam for any persistent throat /
  voice symptom. NO routine asymptomatic screening per USPSTF;
  symptom-prompted pathway in occupational cohort is highest
  yield.

  **(5) Hematopoietic malignancy surveillance.** Benzene +
  formaldehyde + ionizing-radiation cohort: CBC + smear q1y;
  symptom-prompted bone-marrow biopsy at any persistent cytopenia
  / fatigue / easy bruising.

  **(6) Mesothelioma + asbestos-related disease.** Asbestos cohort:
  no formal mesothelioma screening modality; baseline chest CT
  at ≥10y post-first-exposure documents pleural plaques /
  thickening; symptom-prompted PET-CT for new pleural effusion /
  persistent chest pain / dyspnea / palpable chest-wall mass.

  **(7) Workers-compensation + medico-legal documentation.**
  Detailed occupational-exposure history at each visit (employer,
  job description, dates, IARC monograph reference, exposure
  intensity / duration where feasible); document for potential
  workers-compensation / IIDB / industrial-injury claims.

  **(8) Cessation of ongoing exposure.** Workplace-modification
  consultation when patient still actively exposed (PPE adequacy,
  exposure-monitoring, occupational-health referral). NIOSH /
  HSE / OSHA-equivalent local-jurisdiction occupational-health
  pathways.

  **Anchor disease:** non-small-cell lung cancer chosen as
  canonical anchor because (a) lung cancer is the dominant
  multi-organ surveillance target for occupational synergies
  (asbestos / tobacco / silica / radon / diesel converge on
  lung), (b) USPSTF / NCCN LDCT screening is the most
  actionable screening modality for the cohort, (c) NIOSH +
  HSE + WHO REACH document the synergistic-exposure literature
  primarily on lung-cancer outcomes.

rationale_ua: >
  Стандартний-трек prevention шлях для documented ≥2 distinct
  IARC Group 1 occupational exposures. Intensified multi-organ
  surveillance per IARC Monograph exposure-organ pairings +
  ACOEM + NIOSH.

  **(1) Lung-cancer screening.** USPSTF 2021 LDCT eligibility +
  NCCN Lung-Cancer Screening High-Risk pathway broadening для
  asbestos / silica / radon exposure. Annual LDCT з Lung-RADS.
  Asbestos-specific: baseline chest CT (не LDCT) ≥10р post-first-
  exposure для pleural plaques + mesothelioma surveillance.

  **(2) Urothelial bladder cancer surveillance.** Benzene +
  aniline-dye + rubber-industry cohort: urine cytology q1р +
  symptom-prompted cystoscopy. NOT routine USPSTF (Grade I);
  occupational-cohort warrants surveillance.

  **(3) Skin cancer surveillance.** PAH + coal-tar + arsenic +
  prolonged UV: dermatology q6-12 міс з low-threshold biopsy.

  **(4) UADT cancer surveillance.** Combined PAH + tobacco +
  alcohol cohort + nickel + chromium + formaldehyde + wood-dust:
  ENT exam q1р + low-threshold laryngoscopy.

  **(5) Hematopoietic malignancy surveillance.** Benzene +
  formaldehyde + ionizing-radiation: CBC + smear q1р;
  symptom-prompted bone-marrow biopsy.

  **(6) Mesothelioma + asbestos-related disease.** Baseline chest
  CT ≥10р post-first-exposure; symptom-prompted PET-CT для нової
  pleural effusion / persistent chest pain / dyspnea.

  **(7) Workers-compensation + medico-legal documentation.**
  Detailed occupational-exposure history.

  **(8) Cessation of ongoing exposure.** Workplace-modification
  consultation; NIOSH / HSE / OSHA-equivalent occupational-health
  pathways.

  **Анкор-захворювання:** NSCLC — dominant multi-organ surveillance
  target для occupational synergies; USPSTF / NCCN LDCT —
  найбільш actionable modality.

