expected_outcomes:
  overall_response_rate: >-
    Intensified multi-organ surveillance per IARC Monograph
    exposure-organ pairings + ACOEM (American College of
    Occupational and Environmental Medicine) + NIOSH guidance
    detects exposure-attributable cancers earlier than general-
    population screening cadence. Per IARC + WHO REACH synergistic-
    exposure literature: asbestos + tobacco lung-cancer SIR ~50-90
    in combined-exposure cohort (vs 5 for either alone);
    benzene + radon hematopoietic + lung composite SIR elevated
    further; PAH + tobacco UADT + lung composite SIR elevated.
    Annual LDCT (often broader USPSTF eligibility criteria per
    NCCN high-risk pathway for occupational-exposure cohort);
    urine cytology + cystoscopy in benzene / aniline-dye / rubber-
    industry cohort; low-threshold ENT + dermatology + symptom-
    prompted skin biopsy in PAH / coal-tar / arsenic cohort;
    ENT exam in combined PAH / tobacco / alcohol cohort.

