do_not_do:
  - "Не використовувати general-population screening cadence у multi-exposure cohort — synergistic-exposure SIR substantially elevated."
  - "Не призначати LDCT без documented exposure profile + ≥10y latency post-first-exposure — false-positive harm exceed benefit без adequate latency."
  - "Не пропускати workers-compensation / medico-legal documentation — clinical documentation крос-cuts з legal claims та public-health surveillance."
  - "Не нормалізувати ongoing exposure без workplace-modification consultation — PPE adequacy + exposure-monitoring + occupational-health referral primary."
  - "Не deny mesothelioma evaluation у asbestos-exposed cohort при нових pleural symptoms — PET-CT + biopsy симптом-prompted, не routine cadence."

do_not_do_en:
  - "Do not use general-population screening cadence in the multi-exposure cohort — synergistic-exposure SIR is substantially elevated."
  - "Do not order LDCT without a documented exposure profile + ≥10y latency post-first-exposure — false-positive harm exceeds benefit without adequate latency."
  - "Do not skip workers-compensation / medico-legal documentation — clinical documentation cross-cuts with legal claims and public-health surveillance."
  - "Do not normalize ongoing exposure without workplace-modification consultation — PPE adequacy + exposure monitoring + occupational-health referral are primary."
  - "Do not deny mesothelioma evaluation in the asbestos-exposed cohort at new pleural symptoms — PET-CT + biopsy is symptom-prompted, not routine cadence."

