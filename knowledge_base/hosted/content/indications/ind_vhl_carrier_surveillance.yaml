rationale: >
  Standard-track confirmed-carrier surveillance for VHL syndrome (germline VHL
  pathogenic variant confirmed). Per VHL Alliance Active Surveillance Guidelines:

  **Brain + spine MRI q1y from age 15-16** — CNS hemangioblastomas are the most
  common VHL-associated tumor; surveillance enables resection before symptomatic
  cord compression or hydrocephalus.

  **MRI abdomen (kidneys + adrenals + pancreas) q1-2y from age 15** —
  surveillance for clear-cell RCC (lifetime risk 25-45%), pheochromocytoma
  (10-20%), pancreatic neuroendocrine tumors / serous cystadenomas (10-15%).
  Nephron-sparing surgery (partial nephrectomy) is the standard for renal
  lesions ≥3cm — preserves renal function while removing tumor before metastasis.

  **Ophthalmology q1y from age 1-5** — retinal hemangioblastomas (capillary
  hemangiomas) treated with laser photocoagulation or cryotherapy before vision
  loss.

  **Catecholamines / metanephrines q1y from age 5-10** — pheochromocytoma
  screening; if elevated → MRI adrenals + 24h urine + plasma free metanephrines.

  **Comprehensive audiology q2-3y** — endolymphatic sac tumors (rare but
  characteristic; can cause hearing loss).

  RCC is the leading cause of mortality in adult VHL carriers — adherence to the
  q1-2y abdominal MRI cadence is the highest-priority surveillance item.

rationale_ua: >
  Стандартний-трек confirmed-carrier surveillance для синдрому VHL
  (підтверджений germline VHL патогенний варіант). За VHL Alliance Active
  Surveillance Guidelines:

  **MRI brain + spine q1y з 15-16 років** — CNS гемангіобластоми — найпоширеніша
  VHL-асоційована пухлина; surveillance дозволяє резекцію до симптоматичної
  cord compression або гідроцефалії.

  **MRI abdomen (нирки + надниркові + підшлункова) q1-2y з 15 років** —
  surveillance clear-cell RCC (lifetime ризик 25-45%), феохромоцитоми (10-20%),
  pancreatic neuroendocrine tumors / serous cystadenomas (10-15%). Nephron-
  sparing surgery (часткова нефректомія) — стандарт для renal lesions ≥3см —
  зберігає функцію нирки перед metastasis.

  **Офтальмологія q1y з 1-5 років** — retinal hemangioblastomas (capillary
  hemangiomas), лікування laser photocoagulation або cryotherapy до vision loss.

  **Catecholamines / metanephrines q1y з 5-10 років** — pheochromocytoma
  screening; при підвищенні → MRI надниркових + 24h urine + plasma free
  metanephrines.

  RCC — провідна причина смертності в adult VHL carriers — adherence до q1-2y
  abdominal MRI cadence — найвищий пріоритет surveillance.

