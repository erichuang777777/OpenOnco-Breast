do_not_do:
  - "Не пропускати annual abdominal MRI у VHL carriers — RCC — провідна причина смертності у дорослих."
  - "Не використовувати whole-body radiation surveillance — VHL carriers чутливі до radiation-induced secondary malignancies; MRI без радіації preferred."
  - "Не пропускати pediatric ophthalmology — retinal hemangioblastomas можуть початися дуже рано."
  - "Не делегувати VHL surveillance non-specialist — multi-organ coordination потребує VHL-experienced center."

do_not_do_en:
  - "Do not skip annual abdominal MRI in VHL carriers — RCC is the leading cause of mortality in adults."
  - "Do not use whole-body radiation surveillance — VHL carriers are sensitive to radiation-induced secondary malignancies; non-ionizing MRI preferred."
  - "Do not skip pediatric ophthalmology — retinal hemangioblastomas can begin very early."
  - "Do not delegate VHL surveillance to non-specialists — multi-organ coordination requires a VHL-experienced center."

