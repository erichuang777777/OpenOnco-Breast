expected_outcomes:
  overall_response_rate: "Indication-review + de-prescription where appropriate eliminates the iatrogenic exposure in the majority of long-term PPI users (~50-70% of chronic users have no current strong indication per primary-care de-prescription studies). For those with ongoing strong indication (Barrett oesophagus, severe GERD with documented erosive disease, Zollinger-Ellison), targeted surveillance (fasting gastrin + chromogranin A, EGD with body/fundus biopsies if abnormal or symptomatic) detects ECL hyperplasia and Type-1 gastric NET at curable stage. Absolute Type-1 gastric NET incidence remains low (~1-2 per 1000 chronic PPI users over 10y in observational cohorts); most lesions are <1 cm, indolent, and managed endoscopically with excellent survival."

