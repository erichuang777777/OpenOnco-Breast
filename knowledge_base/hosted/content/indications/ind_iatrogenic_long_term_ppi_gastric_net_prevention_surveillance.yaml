do_not_do:
  - "Не продовжувати PPI без активного перегляду показів — найбільший effect від de-prescription, не від surveillance."
  - "Не призначати рутинний скринінг gastrin/CgA у всіх PPI-users — лише при тривалому strong-indication використанні."
  - "Не інтерпретувати помірно підвищений gastrin під час PPI як патологічний — частково очікувано від acid-suppression."
  - "Не пропускати тестування H. pylori при першій EGD — co-factor для atrophic gastritis."
  - "Не продовжувати PPI індеферентно після гострої події (stress ulcer, post-NSAID) — re-evaluate при кожному follow-up."

do_not_do_en:
  - "Do not continue PPI without active indication review — de-prescription is the highest-yield intervention, not surveillance."
  - "Do not order routine gastrin/CgA screening in all PPI users — only in those with ongoing strong indication."
  - "Do not interpret moderately elevated gastrin during PPI as pathologic — partially expected from acid suppression."
  - "Do not skip H. pylori testing at first EGD — co-factor for atrophic gastritis progression."
  - "Do not continue PPI indefinitely after an acute event (stress ulcer, post-NSAID) — re-evaluate at every follow-up."

