rationale: >
  Standard-track surveillance for chronic PPI exposure ≥10y. Components
  per NCCN Gastric / NET guidelines + ACG de-prescription consensus:

  **(1) Indication review and de-prescription where appropriate** —
  THE primary intervention. PPI continuation justified for: Barrett
  oesophagus, severe erosive GERD (LA grade C/D), Zollinger-Ellison
  syndrome, dual antiplatelet therapy with prior GI bleeding,
  ongoing chronic NSAID with high GI-bleed risk. NOT justified
  for: vague dyspepsia without erosive disease, NSAID-prophylaxis
  after NSAID stopped, post-hospital "carry-over," eosinophilic
  oesophagitis without symptoms. Step-down trial (alternate-day
  dosing → H2 blocker → as-needed) for the de-prescribable cohort.

  **(2) Fasting gastrin + chromogranin A** in those with ongoing
  strong PPI indication. Hold PPI 14 days before draw (clinically
  difficult — prior abstinence often impractical); interpret elevated
  values in context of acid-suppression continuation. Markedly
  elevated gastrin or rising chromogranin A → endoscopic evaluation.

  **(3) EGD with body / fundus biopsies** when (a) elevated
  gastrin/CgA, (b) new dyspepsia / anemia / weight loss / GI
  bleeding, (c) prior atrophic gastritis on biopsy, or (d) ≥15y
  continuous PPI without prior EGD. Look for ECL hyperplasia,
  atrophic gastritis, Type-1 gastric NET, intestinal metaplasia.

  **(4) Surveillance interval** for documented atrophic gastritis /
  ECL hyperplasia on biopsy: EGD q3-5y per ACG / European
  guidelines; q1-2y if intestinal metaplasia + extensive corpus
  involvement (OLGIM 3-4). Type-1 gastric NET <1 cm with
  hypergastrinemia: endoscopic resection or surveillance q6-12mo;
  >1 cm or symptomatic: endoscopic resection.

  **(5) H. pylori testing** at first EGD if not previously
  documented — eradication reduces atrophic-gastritis progression
  and reduces gastric-cancer risk in seropositive cohort.

  **(6) Calcium / vitamin B12 / magnesium screening** —
  long-term PPI associated with reduced absorption; check at
  10y mark and supplement deficiencies.

  Goal: most patients return to no-PPI or as-needed PPI at year
  10 review (de-prescription). For the minority with sustained
  strong indication, structured monitoring catches ECL hyperplasia
  and Type-1 gastric NET while still endoscopically curable.

rationale_ua: >
  Стандартний-трек surveillance для хронічного PPI ≥10р. Components
  per NCCN Gastric / NET + ACG de-prescription consensus:

  **(1) Перегляд показів і de-prescription** — ПЕРВИННА інтервенція.
  Продовження PPI виправдане при: Barrett oesophagus, важка
  erosive GERD (LA grade C/D), синдром Золлінгера-Еллісона,
  подвійна антиагрегантна терапія з попередньою ШКТ-кровотечею,
  тривалий хронічний NSAID з високим ризиком ШКТ-кровотечі.
  НЕ виправдане для: vague dyspepsia без erosive disease,
  NSAID-профілактика після відміни NSAID, post-discharge
  "carry-over". Step-down trial для de-prescribable когорти.

  **(2) Натще gastrin + chromogranin A** у тих з тривалим
  show-indication. Зупинити PPI на 14 днів перед забором
  (клінічно складно); інтерпретувати значення в контексті
  продовження acid-suppression. Виражено підвищений gastrin
  або зростаючий CgA → ендоскопічна оцінка.

  **(3) EGD з body / fundus біопсіями** при (а) підвищенні
  gastrin/CgA, (б) новій dyspepsia / anemia / weight loss / GI
  bleeding, (в) попередній atrophic gastritis за біопсією, або
  (г) ≥15р безперервний PPI без попередньої EGD. Шукати ECL
  hyperplasia, atrophic gastritis, Type-1 gastric NET,
  intestinal metaplasia.

  **(4) Інтервал surveillance** для документованої atrophic
  gastritis / ECL hyperplasia: EGD q3-5р per ACG / Європейські
  guidelines; q1-2р при intestinal metaplasia + extensive corpus
  involvement (OLGIM 3-4). Type-1 gastric NET <1 cm з
  hypergastrinemia: ендоскопічна резекція або surveillance q6-12mo.

  **(5) Тестування H. pylori** при першій EGD якщо раніше не
  документовано — ерадикація знижує прогресію atrophic gastritis.

  **(6) Скринінг Calcium / vit B12 / Mg** — тривалий PPI
  пов'язаний зі зниженою абсорбцією; перевірити на 10р.

