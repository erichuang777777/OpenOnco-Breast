rationale: >
  Standard-track prevention pathway for long-term combined OCP use.
  Components per ACOG Practice Bulletin + NCCN Genetic/Familial Breast +
  USPSTF + IARC Monograph 100A:

  **(1) Full risk-benefit counseling** — NOT a unidirectional risk
  warning. Present FOUR cancer endpoints:
  - Breast: modest risk increment during use + ~5y post-cessation
    (RR ~1.08-1.20). Baseline restored ~10y post-cessation.
  - Cervical: modest risk increment with ≥5y use IN HPV-positive women.
    HPV is necessary cofactor — HPV vaccination + screening Pap/HPV
    co-test address primary risk.
  - Ovarian: ~50% protection at ≥5y use, durable for ≥30y post-cessation.
  - Endometrial: ~50% protection at ≥5y use, durable.

  **(2) Targeted high-risk subgroup assessment** — Strong family history,
  known BRCA1/BRCA2 / Lynch / Cowden / Li-Fraumeni carriers: separate
  shared-decision-making with genetics + breast-oncology before
  initiating or continuing OCP. BRCA1 carriers: OCP may slightly
  increase breast cancer risk but is the most-effective ovarian cancer
  prevention non-surgical option — individualized risk-benefit critical.

  **(3) HPV-related cervical risk mitigation** — HPV vaccination (any
  unvaccinated patient through age 45 considered case-by-case),
  cervical cancer screening per USPSTF (Pap/HPV co-test cadence).
  These largely neutralize the OCP-cervical association.

  **(4) Breast cancer screening per age-appropriate USPSTF cadence** —
  Mammography from age 40-50+ per shared decision-making. Long-term OCP
  use does NOT trigger earlier screening cadence in average-risk women
  (per current USPSTF/ACS).

  **(5) No routine ovarian or endometrial surveillance for OCP users
  per se** — Protection effect makes surveillance unnecessary.

  Counseling outcome may be: continue OCP, switch to non-hormonal
  contraception (IUD, diaphragm, condoms, sterilization), or change
  formulation. All defensible depending on individual priorities + risk
  factors.

