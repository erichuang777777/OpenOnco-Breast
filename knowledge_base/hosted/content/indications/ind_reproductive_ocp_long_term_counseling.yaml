do_not_do:
  - "Не презентувати OCP як unilaterally cancer-risk-increasing — net balance favorable для більшості users."
  - "Не пропускати BRCA1/2 / Lynch / Cowden assessment перед long-term OCP — different risk-benefit calculus."
  - "Не призначати earlier breast cancer screening лише на основі OCP use — current USPSTF cadence applies."
  - "Не покладатися лише на cessation для cervical risk mitigation — HPV vaccination + screening адекватніше."
  - "Не позиціонувати ovarian protection як стійку причину продовжувати OCP після reproductive years без contraceptive need — risk-benefit calculus shifts."

do_not_do_en:
  - "Do not present OCP as unilaterally cancer-risk-increasing — the net balance is favorable for most users."
  - "Do not skip BRCA1/2 / Lynch / Cowden assessment before long-term OCP — risk-benefit calculus differs."
  - "Do not order earlier breast cancer screening solely based on OCP use — current USPSTF cadence applies."
  - "Do not rely on cessation alone for cervical risk mitigation — HPV vaccination + screening is more adequate."
  - "Do not present ovarian protection as a stand-alone reason to continue OCP beyond reproductive years without contraceptive need — risk-benefit calculus shifts."

