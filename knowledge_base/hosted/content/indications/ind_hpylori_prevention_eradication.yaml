sources:
  - source_id: SRC-NCCN-BCELL-2025
    position: supports
    relevant_quote_paraphrase: >-
      "Eradication antibiotic therapy is first-line treatment for
      H. pylori-positive early-stage gastric MALT lymphoma; H. pylori
      eradication in chronic infection reduces subsequent gastric
      adenocarcinoma incidence per Cochrane meta-analyses."

do_not_do:
  - "Не використовувати clarithromycin-вмісну triple-therapy в регіонах з кларитроміцин-резистентністю >15% (включно з Україною) — низькі показники ерадикації."
  - "Не пропускати підтвердження ерадикації УДТ або антигеном у калі через ≥4 тижні після завершення курсу — реінфекція або неефективність потребує salvage режиму."
  - "Не давати PPI у дні УДТ — false-negative результат."
  - "Не презентувати ерадикацію як еквівалент лікування існуючої малігнізації — це prevention pathway, не treatment."
  - "Не використовувати бісмут-вмісні режими при тяжкій нирковій недостатності (CrCl <30) — accumulation risk."

do_not_do_en:
  - "Do not use clarithromycin-containing triple therapy in regions with clarithromycin resistance >15% (including Ukraine) — low eradication rates."
  - "Do not skip eradication confirmation by UBT or stool antigen ≥4 weeks after completion — reinfection or treatment failure requires salvage regimen."
  - "Do not administer PPI on UBT day — false-negative result."
  - "Do not present eradication as equivalent to treatment of existing malignancy — this is a prevention pathway, not treatment."
  - "Do not use bismuth-containing regimens in severe renal impairment (CrCl <30) — accumulation risk."

