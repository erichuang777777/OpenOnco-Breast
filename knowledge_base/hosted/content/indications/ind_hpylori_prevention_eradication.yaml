id: IND-H-PYLORI-PREVENTION-ERADICATION
plan_track: standard

intent: prevention

applicable_to:
  # Prevention target: gastric adenocarcinoma. Eradication also prevents
  # / treats gastric MALT lymphoma, but DIS-GASTRIC-MALT is not yet a
  # distinct OpenOnco Disease entity (v0.2-A authoring backlog).
  disease_id: DIS-GASTRIC

  stage_requirements: []

  biomarker_requirements_required: []
  biomarker_requirements_excluded: []

  demographic_constraints:
    ecog_max: 3

# Eradication regimen is not yet authored as a Regimen entity (v0.2-A
# follow-up — needs DRUG-CLARITHROMYCIN / DRUG-AMOXICILLIN / DRUG-OMEPRAZOLE
# / DRUG-BISMUTH-SUBCITRATE / DRUG-TETRACYCLINE which don't exist in KB
# yet). Eradication options described in rationale. Render layer handles
# null regimen gracefully (track with no regimen card).
recommended_regimen: null
concurrent_therapy: []
followed_by: []

evidence_level: high
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate: >-
    Primary endpoint: H. pylori eradication (~80-95% SVR depending on
    regimen + local resistance patterns). Secondary endpoint (gastric
    adenocarcinoma incidence): RR ~0.54-0.66 over 5-15 years follow-up
    per Cochrane meta-analyses (NNT ~15-50). Effect strongest in
    younger patients without atrophic gastritis / intestinal metaplasia.
    For early-stage gastric MALT lymphoma (treatment-persona, distinct
    from this Indication): Wotherspoon regression in ~70-80% of
    t(11;18)-negative cases.

hard_contraindications: []
red_flags_triggering_alternative: []

required_tests:
  - TEST-CBC  # baseline before antibiotic course
  - TEST-LFT  # antibiotic / PPI hepatotoxicity baseline

desired_tests: []

rationale: >
  Standard-track prevention pathway. Patient with chronic H. pylori
  infection (positive UBT / stool antigen / biopsy / stool PCR) and no
  confirmed gastric malignancy is offered eradication antibiotics as the
  etiological cancer-prevention pathway. H. pylori is an IARC Group 1
  carcinogen; eradication reduces gastric adenocarcinoma incidence
  (RR ~0.54-0.66) and is curative for early-stage gastric MALT lymphoma
  in most t(11;18)-negative cases.

  **Regimen selection (Maastricht VI / Florence Consensus 2022, AGA
  2024):**
    Region-dependent due to clarithromycin-resistance prevalence:
    - **First-line in regions with clarithromycin resistance >15%
      (Eastern Europe incl. Ukraine, many parts of Asia):** Bismuth
      quadruple therapy — PBMT (PPI + Bismuth subcitrate + Metronidazole
      + Tetracycline) ×10-14 days. Higher eradication rates in
      clarithromycin-resistant populations.
    - **First-line in regions with clarithromycin resistance ≤15%:**
      PPI + Clarithromycin + Amoxicillin ×14 days (or +Metronidazole
      if Pen-allergic).
    - **Alternative:** Vonoprazan-amoxicillin dual therapy
      (vonoprazan 20mg BID + amoxicillin 1g TID ×14d) — non-inferior
      eradication rates, simpler regimen, FDA-approved 2022.
    - **Salvage (after failure):** Levofloxacin-amoxicillin-PPI triple
      OR rifabutin-amoxicillin-PPI triple.

  Confirmation of eradication: UBT or stool antigen ≥4 weeks after
  completion of therapy AND ≥2 weeks off PPI.

  In Ukraine, H. pylori eradication antibiotics + PPI / bismuth are
  pharmacy-accessible without НСЗУ reimbursement — out-of-pocket cost
  ~500-1500 UAH per full course depending on regimen and local
  pricing.

  Eradication is NOT curative for gastric malignancy already present —
  if patient has a confirmed gastric adenocarcinoma or MALT lymphoma,
  this is treatment-persona territory (existing or future treatment
  Indications), NOT prevention.

rationale_ua: >
  Стандартний-трек prevention шлях. Пацієнтові з хронічним H. pylori
  (позитивний УДТ / антиген у калі / біопсія / стульова ПЛР) та без
  підтвердженого діагнозу шлункової малігнізації пропонується
  ерадикаційна антибіотикотерапія як шлях етіологічної профілактики
  раку. H. pylori — канцероген IARC Group 1; ерадикація знижує
  захворюваність аденокарциномою шлунка (RR ~0.54-0.66) і є куративною
  для ранньої стадії MALT-лімфоми шлунка у більшості t(11;18)-негативних
  випадків.

  **Вибір режиму (Maastricht VI / Florence Consensus 2022, AGA 2024):**
  Регіон-залежний через поширеність кларитроміцин-резистентності:
    - **Перша лінія в регіонах з кларитроміцин-резистентністю >15%
      (Східна Європа включно з Україною, багато частин Азії):**
      Бісмутова квадра-терапія — PBMT (PPI + Bismuth subcitrate +
      Metronidazole + Tetracycline) ×10-14 днів. Вищі показники
      ерадикації в кларитроміцин-резистентних популяціях.
    - **Перша лінія в регіонах з кларитроміцин-резистентністю ≤15%:**
      PPI + Clarithromycin + Amoxicillin ×14 днів (або +Metronidazole
      у пацієнтів з алергією на пеніциліни).
    - **Альтернатива:** Vonoprazan-amoxicillin dual терапія
      (vonoprazan 20mg BID + amoxicillin 1g TID ×14 днів) — non-inferior
      показники ерадикації, простіший режим, FDA-схвалено 2022.
    - **Salvage (після невдачі):** Levofloxacin-amoxicillin-PPI triple
      АБО rifabutin-amoxicillin-PPI triple.

  Підтвердження ерадикації: УДТ або антиген у калі ≥4 тижні після
  завершення терапії ТА ≥2 тижні без PPI.

  В Україні ерадикаційні антибіотики + PPI / bismuth — аптечно доступні
  без відшкодування НСЗУ — out-of-pocket вартість ~500-1500 грн за
  повний курс залежно від режиму та локальної ціни.

  Ерадикація НЕ є куративною для вже існуючої шлункової малігнізації —
  якщо у пацієнта є підтверджена аденокарцинома шлунка або MALT-лімфома,
  це територія treatment-персони (існуючі або майбутні treatment
  Indications), НЕ prevention.

