rationale: >
  Alternative-track companion to IND-OCC-WOOD-LEATHER-DUST-PREVENTION-
  INTENSIFIED-SURVEILLANCE. Patient with documented prior occupational
  hardwood / leather-dust exposure who declines annual ENT consultation —
  for any reason (cost, geographic access to ENT specialist, preference,
  life expectancy / competing illness) — is offered routine general-
  population care only:

  **ENT surveillance:** None scheduled; patient counseled to report
  unilateral nasal obstruction, unilateral epistaxis, anosmia, facial
  pain — but without proactive professional symptom-review cadence.
  Patient is explicitly informed that dust-attributable sinonasal
  cancer risk is unaddressed by routine general-population care.

  **Imaging:** None; CT sinus reserved for persistent unilateral
  symptoms (≥3-4 weeks) at presentation.

  **Exposure cessation:** Still offered if active exposure persists;
  this is the only lever with clear forward-looking benefit.

  **Symptom-triggered evaluation:** Low threshold for diagnostic
  workup if alarm features develop. Primary-care clinician educates
  patient on what symptoms warrant return-to-clinic.

  Routing reconsiderations: patient may revisit intensified-surveillance
  pathway at any subsequent visit. Per CHARTER §11 patient-autonomy
  framing: structured surveillance is a shared-decision-making domain.

rationale_ua: >
  Альтернативно-трекова Indication — компаньйон до IND-OCC-WOOD-
  LEATHER-DUST-PREVENTION-INTENSIFIED-SURVEILLANCE. Пацієнт з
  документованим попереднім професійним впливом пилу твердих порід
  деревини / шкіри, який відмовляється від щорічної ENT-консультації
  (вартість, географічний доступ до ENT-спеціаліста, перевага,
  очікувана тривалість життя), отримує тільки рутинний
  загальнопопуляційний догляд:

  **ENT-спостереження:** Не заплановане; пацієнту радять повідомляти
  про однобічну назальну обструкцію, однобічну епістаксис, аносмію,
  лицевий біль — але без проактивної професійної symptom-review
  частоти. Пацієнт явно інформований, що dust-attributable ризик
  синоназального раку не адресується рутинним загальнопопуляційним
  доглядом.

  **Imaging:** Немає; CT синусів резервується для persistent
  однобічних симптомів (≥3-4 тижнів) при презентації.

  **Припинення впливу:** Все ще пропонується, якщо активний вплив
  зберігається — це єдиний важіль з чіткою forward-looking вигодою.

  **Symptom-triggered оцінка:** Низький поріг для діагностичного
  workup при появі alarm features.

  Reroute: пацієнт може повернутися до інтенсифікованого спостереження
  на будь-якому подальшому візиті. Per CHARTER §11 — shared-decision-
  making domain.

