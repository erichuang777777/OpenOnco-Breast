expected_outcomes:
  overall_response_rate: >-
    Primary endpoint: avoidance of annual ENT consultation when patient
    declines structured surveillance. Patient receives only symptom-
    triggered evaluation; no scheduled professional symptom-review
    cadence. Sinonasal-adenocarcinoma early-detection benefit is
    largely forgone; baseline occupational SMR remains 50-900x without
    structured surveillance.

