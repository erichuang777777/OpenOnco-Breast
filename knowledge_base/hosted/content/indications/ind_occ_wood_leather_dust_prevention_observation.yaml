      "Patient autonomy is integral to occupational-exposure surveillance
      enrollment; declining annual ENT consultation does not preclude
      symptom-triggered evaluation."

do_not_do:
  - "Не презентувати observation як еквівалент структурованого нагляду — dust-attributable ризик синоназальної аденокарциноми не адресується."
  - "Не ігнорувати alarm features (однобічна обструкція, епістаксис, аносмія, persistent лицевий біль) — immediate ENT-направлення."
  - "Не використовувати цей шлях як стандарт першої лінії — intensified-surveillance трек залишається preferred."
  - "Не пропускати exposure-cessation / PPE counseling якщо активний вплив зберігається."

do_not_do_en:
  - "Do not present observation as equivalent to structured surveillance — dust-attributable sinonasal-adenocarcinoma risk is unaddressed."
  - "Do not ignore alarm features (unilateral obstruction, epistaxis, anosmia, persistent facial pain) — immediate ENT referral."
  - "Do not use this pathway as a first-line standard — the intensified-surveillance track remains the preferred recommendation."
  - "Do not skip exposure-cessation / PPE counseling if active exposure persists."

