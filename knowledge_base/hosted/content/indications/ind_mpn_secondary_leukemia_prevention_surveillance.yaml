sources:
  - source_id: SRC-NCCN-MPN-2025
    position: supports
    relevant_quote_paraphrase: >-
      "Patients with MPN driver-mutation positivity but not yet meeting
      WHO MPN criteria should undergo periodic CBC + peripheral smear
      monitoring. Bone marrow evaluation is triggered by cytopenia,
      circulating blasts, splenomegaly progression, or constitutional
      symptoms — not by scheduled cadence in stable disease."
  - source_id: SRC-NCCN-AML-2025
    position: supports
    relevant_quote_paraphrase: >-
      "Secondary AML arising from MPN (sAML) carries poor prognosis
      with conventional chemotherapy. Allogeneic HCT is the only
      potentially curative modality; early identification of MPN
      progression preserves transplant eligibility."
  - source_id: SRC-NCCN-BCELL-2025
    position: context

do_not_do:
  - "Не виконувати рутинне scheduled bone marrow без cytopenia/blast тригера — bone marrow biopsy має procedural ризики, низький yield у стабільному MPN."
  - "Не призначати empiric cytoreduction (hydroxyurea, ruxolitinib) у driver-positive pre-WHO-criteria пацієнтів — лікування індиковано після підтвердження MPN Disease entity."
  - "Не пропускати thrombosis-risk assessment + аспірин у JAK2-positive — thrombosis is dominant short-term mortality driver."
  - "Не покладатися лише на JAK2 allele burden — деякі CALR/MPL-driven MPN мають клінічно meaningful progression без JAK2."
  - "Не пропускати NGS-панель для додаткових myeloid-driver мутацій — TP53, ASXL1, EZH2, IDH1/2, SRSF2 ідентифікують high-risk-progression молекулярні підгрупи."

do_not_do_en:
  - "Do not perform routine scheduled bone marrow without cytopenia/blast trigger — bone marrow biopsy has procedural risk and low yield in stable MPN."
  - "Do not prescribe empiric cytoreduction (hydroxyurea, ruxolitinib) in driver-positive pre-WHO-criteria patients — cytoreduction is indicated after MPN Disease entity is confirmed."
  - "Do not skip thrombosis-risk assessment + aspirin in JAK2-positive — thrombosis is the dominant short-term mortality driver."
  - "Do not rely on JAK2 allele burden alone — some CALR/MPL-driven MPN progress meaningfully without JAK2."
  - "Do not skip NGS panel for additional myeloid-driver mutations — TP53, ASXL1, EZH2, IDH1/2, SRSF2 identify high-risk-progression molecular subgroups."

