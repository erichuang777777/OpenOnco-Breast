id: IND-MPN-SECONDARY-LEUKEMIA-PREVENTION-SURVEILLANCE
plan_track: standard
intent: prevention

applicable_to:
  disease_id: DIS-AML
  stage_requirements: []
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
