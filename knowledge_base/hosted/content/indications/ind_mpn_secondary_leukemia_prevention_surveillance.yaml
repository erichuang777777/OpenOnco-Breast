notes: >
  STUB — v0.3 chronic-condition prevention pilot (MPN / secondary AML).
  Two-Co-Lead signoff queued. Engine routing logic depends on the
  trigger firing ONLY when patient has no confirmed DIS-PV / DIS-ET /
  DIS-PMF — patients with established MPN diagnoses route to
  treatment-persona management, not §20 prevention. This pilot
  specifically targets driver-mutation-positive patients in pre-WHO-
  criteria phase.
