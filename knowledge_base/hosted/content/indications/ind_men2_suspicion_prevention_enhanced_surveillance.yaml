rationale: >
  Alternative-track companion to IND-MEN2-SUSPICION-PREVENTION-GENETIC-
  COUNSELING. Patient with pedigree suspicion of MEN2A or MEN2B who
  declines genetic counseling and/or germline RET testing — for any
  reason (cost, insurance concerns, psychological / anxiety
  considerations, family privacy, geographic access constraints) — is
  offered empirical structured surveillance applied as if MEN2 were
  confirmed:

  **Thyroid:** Serum calcitonin q6 months + neck ultrasound q1 year
  starting at the age the youngest MTC was diagnosed in the family
  minus 10 years (or age 5, whichever is earlier; though in practice
  MOD-class onset can be later, the empirical protocol must cover
  for the possibility of HST / H mutations in the kindred since RET
  class is unknown without testing). Pentagastrin / calcium stimulation
  testing is largely historical and not recommended for routine
  empirical screening. Empirical prophylactic thyroidectomy is NOT
  recommended in the absence of RET confirmation — the surgical
  decision rests on confirmed RET-class stratification per ATA 2015.

  **Pheochromocytoma:** Plasma free metanephrines or 24-hour urine
  metanephrines q1 year from age 8-12 (the earlier age 8 if the
  family includes MEN2B / HST suspicion; the later age 12 if pedigree
  suggests MEN2A / MOD only). Adrenal imaging (MRI or CT) if
  metanephrines elevated. Annual blood pressure check at every
  primary-care visit.

  **Parathyroid (if MEN2A pattern in family):** Serum calcium + PTH
  q1 year from age 11. If the pedigree includes MEN2B-only features
  (mucosal neuromas, marfanoid habitus without parathyroid
  involvement), parathyroid surveillance is not required.

  **Examination for MEN2B stigmata:** Annual examination for
  developing mucosal neuromas (lips / tongue / buccal mucosa),
  marfanoid habitus, corneal nerve thickening — particularly important
  in pre-pubertal children where the family history is ambiguous
  for MEN2A vs MEN2B.

  Per CHARTER §11 patient-autonomy framing: genetic testing is a
  shared-decision-making domain. Patients who decline testing retain
  access to surveillance benefit, with the strong caveat that
  empirical surveillance lacks the diagnostic precision of confirmed
  RET status — and in MEN2, that precision is uniquely impactful
  because the central intervention (prophylactic thyroidectomy) is
  not justifiable without genetic confirmation. Periodic re-discussion
  of testing is appropriate; the cost-benefit balance is strongly
  in favor of testing in MEN2 versus most other hereditary syndromes
  given the high MTC penetrance and the curative effect of timely
  surgery.

  Routing reconsiderations: if patient eventually accepts germline
  testing, results reroute to (a) confirmed-carrier pathway, (b)
  general-population pathway, or (c) continued pedigree-suspicion if
  VUS.

rationale_ua: >
  Альтернативно-трекова Indication — компаньйон до IND-MEN2-SUSPICION-
  PREVENTION-GENETIC-COUNSELING. Пацієнт з родовідною підозрою на
  MEN2A або MEN2B, який відмовляється від генетичного консультування
  та/або germline RET-тестування — отримує empіричне структуроване
  спостереження як якщо б MEN2 був підтверджений:

  **Щитоподібна залоза:** Сироватковий кальцитонін q6 місяців + УЗД
  шиї q1 рік починаючи з віку, у якому наймолодший MTC у сім'ї був
  діагностований мінус 10 років (або 5 років, що раніше; на практиці
  MOD-класовий початок може бути пізнішим, але empіричний протокол
  повинен покривати можливість HST / H мутацій у спорідненості,
  оскільки RET-клас невідомий без тестування). Пентагастрин /
  кальцієва стимуляція — здебільшого історична і не рекомендується
  для рутинного empіричного скринінгу. Empірична профілактична
  тиреоїдектомія НЕ рекомендується за відсутності RET-підтвердження
  — хірургічне рішення базується на підтвердженій RET-стратифікації
  per ATA 2015.

  **Феохромоцитома:** Плазмові вільні метанефрини або 24-годинні
  сечові метанефрини q1 рік з 8-12 років (раніший вік 8 при підозрі
  MEN2B / HST; пізніший вік 12 при пропозиції MEN2A / MOD). Adrenal
  візуалізація при елевації. Щорічне вимірювання АТ при кожному
  primary-care візиті.

  **Паращитоподібні залози (при MEN2A-патерні у сім'ї):** Сироватковий
  кальцій + PTH q1 рік з 11 років. Якщо родовід включає лише MEN2B-
  ознаки (слизові невроми, марфаноподібна будова без ураження
  паращитоподібних), паращитоподібний скринінг не потрібний.

  **Обстеження на MEN2B-стигмати:** Щорічне обстеження для розвитку
  слизових неврем (губи / язик / букальна слизова), марфаноподібної
  будови, потовщення корнеальних нервів — особливо важливе у
  препубертальних дітей, де сімейна історія неоднозначна для MEN2A
  vs MEN2B.

  Per CHARTER §11 framing автономії пацієнта. cost-benefit balance
  сильно на користь тестування у MEN2 порівняно з більшістю інших
  спадкових синдромів через високу MTC-пенетрантність і curative
  effect своєчасної хірургії.

  Reroute: якщо пацієнт врешті приймає germline тестування,
  результати маршрутизуються до (а) confirmed-carrier шлях, (б)
  general-population шлях, або (в) продовжена pedigree-підозра при VUS.

