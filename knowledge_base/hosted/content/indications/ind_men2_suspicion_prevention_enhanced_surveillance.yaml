expected_outcomes:
  overall_response_rate: >-
    Empirical MEN2 surveillance (calcitonin q6 months, neck ultrasound
    q1 year, plasma metanephrines q1 year from age 8-12): expected to
    capture early MTC structural / biochemical disease in the subset
    who are actual RET carriers (~25-95% of pedigree-suspicion
    individuals depending on family-history stringency). Does NOT
    permit the high-impact MEN2 intervention — RET-class-driven
    prophylactic thyroidectomy — which requires confirmed RET status.
    Surveillance can catch MTC earlier than symptomatic presentation
    but cannot prevent MTC the way prophylactic surgery in a confirmed
    HST / H RET carrier can. Pheochromocytoma surveillance prevents
    hypertensive-crisis mortality.

