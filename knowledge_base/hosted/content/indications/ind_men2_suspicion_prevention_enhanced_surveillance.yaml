do_not_do:
  - "Не презентувати empіричне спостереження як еквівалент genetic confirmation — у MEN2 особливо diagnostic precision є prerequisite для центральної інтервенції (профілактична тиреоїдектомія)."
  - "Не виконувати empіричну профілактичну тиреоїдектомію без RET-підтвердження — chirurgical decision-making у MEN2 спирається на ATA-class стратифікацію, яка вимагає genetic testing."
  - "Не пропускати alpha-blockade pre-operatively якщо феохромоцитома виявляється під час empіричного спостереження — навіть без підтвердженого RET, виявлений pheo має лікуватися як високо-ризикова резекція."
  - "Не використовувати пентагастрин / кальцієву стимуляцію тестування — historic procedure replaced by basal calcitonin + ultrasound; не показано у сучасному empіричному спостереженні."
  - "Не пропускати periodic re-discussion про genetic testing — у MEN2 особливо cost-benefit balance сильно у користь testing; більшість пацієнтів врешті приймають тестування."

do_not_do_en:
  - "Do not present empirical surveillance as equivalent to genetic confirmation — in MEN2 specifically, diagnostic precision is a prerequisite for the central intervention (prophylactic thyroidectomy)."
  - "Do not perform empirical prophylactic thyroidectomy without RET confirmation — surgical decision-making in MEN2 rests on ATA-class stratification that requires genetic testing."
  - "Do not skip alpha-blockade pre-operatively if a pheochromocytoma is found during empirical surveillance — even without confirmed RET, a detected pheo must be treated as a high-risk resection."
  - "Do not use pentagastrin / calcium stimulation testing — this is a historic procedure replaced by basal calcitonin + ultrasound; not indicated in modern empirical surveillance."
  - "Do not skip periodic re-discussion of genetic testing — in MEN2 specifically, the cost-benefit balance strongly favors testing; most patients eventually accept testing."

