id: IND-LIFESTYLE-SEDENTARY-PREVENTION-OBSERVATION
plan_track: surveillance
intent: prevention

applicable_to:
  disease_id: DIS-CRC
  stage_requirements: []
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 3

triggered_by_redflags:
  - RF-LIFESTYLE-SEDENTARY-PREVENTION

recommended_regimen: null
concurrent_therapy: []
followed_by: []

evidence_level: low
strength_of_recommendation: conditional
nccn_category: "2B"

expected_outcomes:
  overall_response_rate: "Continued sedentary lifestyle: cumulative cancer incidence + metabolic + cardiovascular morbidity continues to accumulate. Cancer screening alone (without activity intervention) captures earlier-stage disease but does not reduce incidence."

hard_contraindications: []
red_flags_triggering_alternative: []
required_tests:
  - TEST-CBC
desired_tests: []

rationale: >
  Alternative-track companion to IND-LIFESTYLE-SEDENTARY-PREVENTION-ACTIVITY.
  Patient declines structured activity program (mobility limitation, time
  constraints, preference) — receives age-appropriate cancer screening per
  USPSTF cadence + repeated brief intervention with each clinical contact
  ("Even 10 minutes of walking per day counts" framing). Per CHARTER §11
  patient-autonomy framing — sedentary lifestyle is a legitimate patient
  choice but framed as suboptimal vs. activity comparator.

rationale_ua: >
  Альтернативно-трекова Indication. Пацієнт відмовляється від structured
  activity program — отримує age-appropriate cancer screening per USPSTF
  cadence + brief intervention на кожному клінічному контакті ("Навіть
  10 хвилин ходьби на день має значення" framing). Per CHARTER §11.

ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_v03_lifestyle_iatrogenic_batch2
draft_revision: 1

sources:
  - source_id: SRC-NCCN-BCELL-2025
    position: context

do_not_do:
  - "Не презентувати observation як еквівалент activity intervention — cancer incidence reduction не досягається."
  - "Не пропускати age-appropriate cancer screening — base-rate screening залишається indicated незалежно від activity status."
  - "Не виключати brief activity-counseling на кожному візиті — accumulating evidence показує що навіть minimal activity uplift має cumulative benefit."
  - "Не використовувати mobility limitation як абсолютну contraindication до руху — physical therapist referral може identifyати feasible activity."

do_not_do_en:
  - "Do not present observation as equivalent to activity intervention — cancer incidence reduction is not achieved."
  - "Do not skip age-appropriate cancer screening — base-rate screening remains indicated regardless of activity status."
  - "Do not skip brief activity counseling at every visit — even minimal activity uplift has cumulative benefit."
  - "Do not treat mobility limitation as an absolute contraindication to activity — physical-therapist referral can identify feasible options."

