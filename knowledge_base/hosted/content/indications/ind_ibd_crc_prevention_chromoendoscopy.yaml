expected_outcomes:
  overall_response_rate: >-
    Surveillance colonoscopy with chromoendoscopy or HD-WL + targeted
    biopsies q1-3y reduces CRC mortality in long-standing IBD by
    enabling detection of flat dysplasia and early-stage cancers
    amenable to endoscopic resection or curative-intent proctocolectomy.
    Chromoendoscopy ~2-3x more sensitive than standard white-light for
    flat dysplasia (multiple meta-analyses; SCENIC consensus 2015).
    Mucosal healing on IBD therapy reduces colitis-associated CRC risk
    by ~50% vs persistent inflammation. PSC-IBD subgroup carries the
    highest absolute benefit from annual surveillance (lifetime CRC
    risk ~15-30% drops with timely dysplasia detection).

