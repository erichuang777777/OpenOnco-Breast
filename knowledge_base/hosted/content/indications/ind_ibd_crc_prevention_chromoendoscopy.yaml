rationale: >
  Standard-track prevention pathway for long-standing IBD with colonic
  involvement (UC ≥8y, Crohn-colitis ≥8y with ≥1/3 colon involvement,
  or any IBD with PSC). Surveillance cadence and modality per
  AGA / ECCO / NCCN:

  **Cadence:**
    - **PSC-IBD:** Annual colonoscopy from PSC diagnosis (regardless of
      IBD duration) — highest absolute CRC risk subgroup.
    - **Long-standing UC or Crohn-colitis ≥1/3 colon involvement:**
      Q1-2 years from 8 years after IBD diagnosis. Extension of colitis
      (left-sided vs pancolitis) matters more than absolute duration —
      pancolitis warrants the more aggressive end of the cadence range.
    - **Risk-stratified shortening:** Q1y if any of (prior dysplasia,
      family history of CRC under 50, persistent active inflammation
      despite therapy, pseudopolyposis). Q3-5y permissible in extended
      remission with normal-appearing mucosa on consecutive exams (but
      Q1-2y remains preferred).

  **Modality:**
    - **Chromoendoscopy** (dye-spray indigo carmine or methylene blue)
      with **targeted biopsies of abnormal areas** is the **preferred**
      AGA / ECCO modality. ~2-3x more sensitive than white-light random
      biopsies for flat dysplasia (SCENIC consensus 2015).
    - **HD-WL + virtual chromoendoscopy** (NBI, BLI, i-Scan) is an
      acceptable alternative when dye-spray chromoendoscopy is not
      available — sensitivity comparable to chromoendoscopy in expert
      hands.
    - **Random biopsies** (4-quadrant every 10 cm + targeted biopsies):
      historical standard, still acceptable when chromoendoscopy is
      unavailable; lower sensitivity, longer procedure time.

  **Dysplasia management:** Any dysplasia → confirm by **expert GI
  pathologist** review (high inter-observer variability; ~30-50% of
  community-pathologist LGD reclassified at expert review).
    - **Visible polypoid lesion completely resected endoscopically**
      (formerly "adenoma-like DALM"): endoscopic resection +
      intensified surveillance Q3-6mo for the first year.
    - **Visible non-polypoid / flat HGD or invisible HGD on random
      biopsy:** strongly consider total proctocolectomy with IPAA.
    - **Visible non-polypoid / flat LGD or invisible LGD:** intensified
      surveillance Q3-6mo by an expert endoscopist; proctocolectomy
      individualized — multifocal LGD or recurrence after endoscopic
      resection favors surgery.

  **Concurrent IBD therapy:** Maintained mucosal healing on the
  patient's IBD regimen (5-ASA, immunomodulators, biologics, JAK
  inhibitors per current ECCO guidance) reduces colitis-associated CRC
  risk by ~50% vs persistent active inflammation. Mesalamine
  chemoprevention is commonly recommended but has mixed RCT support;
  ECCO 2024 considers it a reasonable add-on for UC patients without
  contraindication.

  **PSC-IBD specifics:** annual colonoscopy from PSC diagnosis;
  cholangiocarcinoma surveillance separately handled via
  RF-PSC-CHOLANGIOCARCINOMA-PREVENTION (this pilot). Ursodeoxycholic
  acid (UDCA) for CRC chemoprevention in PSC-IBD is controversial — low
  dose (13-15 mg/kg/day) acceptable; high dose (≥28 mg/kg/day)
  associated with HARM in some PSC trials and is contraindicated.

  In Ukraine, surveillance colonoscopy with biopsies is NSZU-covered;
  chromoendoscopy and HD-WL availability varies by center. Expert GI
  pathology review (rather than community pathology only) is the rate-
  limiting step for accurate dysplasia management — referral to a
  tertiary center may be needed.

rationale_ua: >
  Стандартний-трек prevention шлях для тривалого IBD з ободовим
  ураженням (UC ≥8 років, Crohn-коліт ≥8 років з ≥1/3 ободової кишки,
  або будь-яке IBD з PSC). Частота спостереження та модальність per
  AGA/ECCO/NCCN:

  **Частота:**
    - **PSC-IBD:** Щорічна колоноскопія від PSC діагнозу (незалежно від
      IBD тривалості) — найвища-ризикова підгрупа.
    - **Тривале UC або Crohn-коліт ≥1/3 ободової кишки:** Q1-2 роки з
      8 років після IBD діагнозу.
    - **Risk-stratified коротшення:** Q1 рік при будь-чому з
      (попередня дисплазія, сімейна історія КРР під 50, persistent
      active inflammation, pseudopolyposis).

  **Модальність:**
    - **Хромоендоскопія** (dye-spray indigo carmine або methylene blue)
      з **цільовими біопсіями abnormal areas** — **переважна** модальність
      AGA/ECCO. ~2-3x чутливіша ніж white-light random біопсії для
      flat dysplasia (SCENIC консенсус 2015).
    - **HD-WL + virtual хромоендоскопія** (NBI, BLI, i-Scan) — прийнятна
      альтернатива.
    - **Random біопсії** (4-квадрантні кожні 10 см + цільові): історичний
      стандарт, прийнятний коли хромоендоскопія недоступна.

  **Управління дисплазією:** Будь-яка дисплазія → підтвердження
  **експертним GI-патологом**.
    - **Видиме поліповидне ураження, повністю резектоване ендоскопічно**:
      ендоскопічна резекція + посилене спостереження Q3-6 міс перший рік.
    - **Видиме non-polypoid / flat HGD або invisible HGD:** сильно
      розглядати тотальну проктоколектомію з IPAA.
    - **Видиме non-polypoid / flat LGD або invisible LGD:** посилене
      спостереження Q3-6 міс експертним ендоскопістом.

  **Конкурентна IBD-терапія:** Підтримуване mucosal healing на режимі
  пацієнта (5-ASA, імуномодулятори, біологіки, JAK-інгібітори per
  ECCO) знижує colitis-associated CRC ризик на ~50%.

  **PSC-IBD специфіка:** щорічна колоноскопія від PSC діагнозу.
  Урсодезоксихолева кислота (UDCA) для CRC хемопревенції у PSC-IBD —
  контроверсійно; низька доза (13-15 мг/кг/день) прийнятна; висока
  доза (≥28 мг/кг/день) асоційована з HARM і протипоказана.

  В Україні спостережувальна колоноскопія з біопсіями покривається НСЗУ;
  доступність хромоендоскопії та HD-WL варіюється за центром. Експертний
  огляд GI-патології — rate-limiting step; референтні центри в Києві
  та Львові.

