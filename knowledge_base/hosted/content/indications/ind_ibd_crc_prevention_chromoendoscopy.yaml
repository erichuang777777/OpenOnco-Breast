    position: supports

do_not_do:
  - "Не використовувати white-light random біопсії як sole modality коли chromoendoscopy або HD-WL доступні — flat dysplasia пропускається."
  - "Не базуватися на діагнозі дисплазії одного community-патолога без експертного GI-pathology огляду — high inter-observer variability."
  - "Не виконувати проктоколектомію на основі один-патолог LGD без експертного підтвердження — over-treatment."
  - "Не використовувати високодозовий UDCA (≥28 мг/кг/день) у PSC-IBD — асоційований з HARM в RCT."
  - "Не подовжувати інтервал спостереження понад q2 роки у PSC-IBD — щорічне scope обов'язкове від PSC діагнозу."
  - "Не покладатися на mesalamine хемопревенцію як еквівалент мукозного healing — потрібен active IBD control."

do_not_do_en:
  - "Do not use white-light random biopsies as sole modality when chromoendoscopy or HD-WL is available — flat dysplasia is missed."
  - "Do not rely on a community pathologist's single dysplasia diagnosis without expert GI pathology review — high inter-observer variability."
  - "Do not perform proctocolectomy based on a single-pathologist LGD without expert confirmation — over-treatment."
  - "Do not use high-dose UDCA (≥28 mg/kg/day) in PSC-IBD — associated with HARM in RCTs."
  - "Do not extend surveillance interval beyond q2y in PSC-IBD — annual scope is mandatory from PSC diagnosis."
  - "Do not rely on mesalamine chemoprevention as equivalent to mucosal healing — active IBD control is required."

