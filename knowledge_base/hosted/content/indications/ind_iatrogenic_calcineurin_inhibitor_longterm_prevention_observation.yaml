do_not_do:
  - "Не презентувати observation як еквівалент dermatologic surveillance — calcineurin-driven SCC має worse stage-for-stage prognosis."
  - "Не пропускати explicit symptom-vigilance + sun-protection education — найбільший self-care yield."
  - "Не виключати patient зі symptom-prompted dermatology access — навіть при declining routine surveillance."
  - "Не нормалізувати new skin lesion / non-healing sore / purple macule — будь-який alarm sign requires evaluation."
  - "Не покладатися на self-examination alone — early lesions subtle / mistaken for actinic damage."

do_not_do_en:
  - "Do not present observation as equivalent to dermatologic surveillance — calcineurin-driven SCC has worse stage-for-stage prognosis."
  - "Do not skip explicit symptom-vigilance + sun-protection education — the highest self-care yield."
  - "Do not deny the patient symptom-prompted dermatology access — even if routine surveillance is declined."
  - "Do not normalize a new skin lesion / non-healing sore / purple macule — any alarm sign requires evaluation."
  - "Do not rely on self-examination alone — early lesions are often subtle / mistaken for actinic damage."

