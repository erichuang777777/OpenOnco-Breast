rationale: >
  Alternative-track companion to IND-IATROGENIC-CALCINEURIN-
  INHIBITOR-LONGTERM-PREVENTION-SURVEILLANCE. Patient declines
  structured annual / q6mo dermatologic surveillance (geographic
  access, surveillance fatigue, preference — particularly common
  in long-term-stable transplant survivors who have not yet had
  a skin cancer) — receives explicit sun-protection counseling
  (broad-spectrum SPF 30+ daily, peak UV avoidance, photo-
  protective clothing) + symptom-vigilance education (new or
  changing skin lesion regardless of how minor it appears,
  non-healing sore, purple / red / brown macule or nodule on
  extremities or oral mucosa, lower-lip persistent dryness /
  ulceration → immediate dermatology referral) + skin-self-
  examination instruction (monthly with mirror; partner-
  assisted for hard-to-see areas). Per CHARTER §11 patient-
  autonomy framing — declining the structured pathway is
  legitimate but framed as suboptimal vs. active-dermatology
  comparator. Particular emphasis: skin self-examination cannot
  substitute for dermatologic exam in this high-risk cohort;
  early SCC and KS lesions often subtle / mistaken for actinic
  damage by the patient.

rationale_ua: >
  Альтернативно-трекова Indication. Пацієнт відмовляється від
  structured annual / q6mo dermatologic surveillance — отримує
  explicit sun-protection counseling (SPF 30+ daily, peak UV
  avoidance, photoprotective clothing) + symptom-vigilance
  education (нова або changing skin lesion, non-healing sore,
  purple / red / brown macule або nodule на extremities або
  oral mucosa, lower-lip persistent dryness / ulceration →
  immediate dermatology referral) + skin-self-examination
  instruction (monthly з mirror; partner-assisted для
  hard-to-see areas). Per CHARTER §11. Особлива емфаза: skin
  self-examination не може substitute dermatologic exam у
  високо-ризиковій cohort.

