expected_outcomes:
  overall_response_rate: "Patient declines structured annual / q6mo dermatologic surveillance pathway — receives baseline sun-protection counseling and skin-self-examination education. Aggressive SCC subset and Kaposi sarcoma may present at advanced stage; outcomes worse than with active dermatologic surveillance. Critical caveat: post-transplant / calcineurin-driven SCC has substantially worse stage-for-stage prognosis than spontaneous SCC in immunocompetent hosts — surveillance is the standard, not optional. Patient self-examination cannot substitute for dermatologic exam (early lesions often subtle / mistaken for actinic damage)."

