expected_outcomes:
  overall_response_rate: "Continued chronic arsenic exposure without source change: ongoing dose accumulation drives cumulative bladder + lung + skin cancer + multi-organ toxicity risk. Symptom-triggered evaluation captures earlier-stage disease but does not reduce incidence. Smoking-cessation counseling remains appropriate regardless of exposure-management choice."

