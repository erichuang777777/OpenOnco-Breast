  - TEST-CBC
desired_tests: []

rationale: >
  Alternative-track companion to IND-ENVIRONMENTAL-ARSENIC-WATER-
  PREVENTION-EXPOSURE-ELIMINATION. Patient declines structured water-
  source change or point-of-use filtration (cost, infrastructure
  constraint, doubt about exposure relevance, distrust of testing) —
  receives brief water-safety counseling with each clinical contact +
  symptom-triggered evaluation pathway + tobacco-cessation counseling
  + skin-surveillance recommendation (which does not require water-
  source change). Per CHARTER §11 patient-autonomy framing —
  exposure-management choice is legitimate but framed as suboptimal
  vs. source-change comparator. Periodic re-discussion of exposure-
  elimination track at follow-up visits is appropriate, especially
  if exposure-related findings (hyperpigmentation, hyperkeratosis,
  peripheral neuropathy) emerge.

rationale_ua: >
  Альтернативно-трекова Indication. Пацієнт відмовляється від
  structured water-source change або point-of-use filtration —
  отримує brief water-safety counseling на кожному клінічному контакті
  + symptom-triggered evaluation pathway + tobacco-cessation counseling
  + skin-surveillance recommendation. Per CHARTER §11. Periodic re-
  discussion exposure-elimination треку appropriate на повторних
  візитах, especially з появою exposure-related findings
  (hyperpigmentation, hyperkeratosis, peripheral neuropathy).

