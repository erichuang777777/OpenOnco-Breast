do_not_do:
  - "Не презентувати observation як еквівалент exposure elimination — bladder + lung + skin cancer + multi-organ toxicity ризик не reduced."
  - "Не пропускати tobacco-cessation counseling — multiplicative interaction з arsenic; recommendation relevant незалежно від exposure-management choice."
  - "Не ігнорувати arsenic-skin-signature findings (hyperpigmentation, hyperkeratosis на palms / soles) — pre-malignant + indicator подовженого exposure."
  - "Не нехтувати symptom-triggered evaluation hematuria / dysuria / persistent cough / hemoptysis — low threshold for diagnostic workup."
  - "Не презентувати decision як final — periodic re-discussion exposure-elimination треку appropriate."

do_not_do_en:
  - "Do not present observation as equivalent to exposure elimination — bladder + lung + skin cancer + multi-organ toxicity risk is not reduced."
  - "Do not skip tobacco-cessation counseling — multiplicative interaction with arsenic; recommendation is relevant regardless of exposure-management choice."
  - "Do not ignore arsenic-skin-signature findings (hyperpigmentation, hyperkeratosis on palms / soles) — pre-malignant + indicator of prolonged exposure."
  - "Do not skip symptom-triggered evaluation of hematuria / dysuria / persistent cough / hemoptysis — low threshold for diagnostic workup."
  - "Do not present the decision as final — periodic re-discussion of the exposure-elimination track is appropriate."

