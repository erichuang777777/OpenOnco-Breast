expected_outcomes:
  overall_response_rate: "Less-frequent surveillance (MRI/MRCP q2-3y instead of annual) captures cholangiocarcinoma at later stage; outcomes inferior to annual-surveillance comparator."

hard_contraindications: []
red_flags_triggering_alternative: []
required_tests:
  - TEST-CBC
desired_tests: []

rationale: >
  Alternative-track companion to IND-PSC-CHOLANGIOCARCINOMA-PREVENTION-SURVEILLANCE.
  Used when intensified annual MRI/MRCP cadence is impractical (cost, access,
  patient preference, geographic distance from specialist hepatology). Adopts
  q2-3y MRI/MRCP cadence + symptom-driven evaluation. Per CHARTER §11
  patient-autonomy framing.

rationale_ua: >
  Альтернативно-трекова Indication — компаньйон до IND-PSC-CHOLANGIOCARCINOMA-
  PREVENTION-SURVEILLANCE. Використовується коли інтенсифікована щорічна
  MRI/MRCP cadence непрактична (вартість, доступ, вибір пацієнта, географічна
  відстань від спеціалізованої гепатології). Приймає q2-3y MRI/MRCP cadence +
  symptom-driven evaluation. Per CHARTER §11 framing автономії пацієнта.

