do_not_do:
  - "Не використовувати цей шлях у PSC-IBD підгрупі — потрібна annual surveillance через високий CRC ризик."
  - "Не ігнорувати alarm features під час q2-3y cadence — immediate escalation на standard track."
  - "Не презентувати observation як еквівалент annual surveillance — early-stage detection sensitivity нижче."

do_not_do_en:
  - "Do not use this pathway in the PSC-IBD subgroup — annual surveillance is required due to high CRC risk."
  - "Do not ignore alarm features during q2-3y cadence — immediate escalation to standard track."
  - "Do not present observation as equivalent to annual surveillance — early-stage detection sensitivity is lower."

