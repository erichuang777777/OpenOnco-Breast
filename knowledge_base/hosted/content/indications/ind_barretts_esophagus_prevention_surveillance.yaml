sources:
  - source_id: SRC-NCCN-ESOPHAGEAL-2025
    position: supports
    relevant_quote_paraphrase: >-
      "Barrett's esophagus surveillance and endoscopic eradication therapy
      (RFA, EMR) for dysplastic Barrett are the standard of care.
      Non-dysplastic Barrett: EGD with Seattle protocol biopsies every
      3-5 years. LGD: confirm by expert GI pathologist; endoscopic
      eradication therapy preferred. HGD: endoscopic eradication therapy
      mandatory; esophagectomy reserved for non-responders or T1b."
  - source_id: SRC-ESMO-ESOPHAGEAL-2024
    position: supports
    relevant_quote_paraphrase: >-
      "Barrett's surveillance recommended in all confirmed cases.
      Endoscopic eradication therapy (RFA, EMR) is first-line for
      dysplastic Barrett. PPI co-therapy supports mucosal recovery."

do_not_do:
  - "Не використовувати високодозовий PPI як еквівалент EET для дисплазійного Barrett — PPI контролює симптоми/езофагіт, але не запобігає прогресії дисплазії до EAC."
  - "Не пропонувати езофагектомію як first-line для T1a HGD або інтрамукозного EAC — endoscopic eradication therapy має кращі onkologic outcomes з меншою morbidity."
  - "Не покладатися на одиничну LGD-діагностику без експертного GI-pathology огляду — ~50% LGD reclassified as non-dysplastic at expert review; reduces over-treatment."
  - "Не виконувати РЧА без підтвердженого CE-IM endpoint (повна ерадикація кишкової метаплазії) — часткова ерадикація залишає residual ризик прогресії."
  - "Не пропускати Seattle протокол біопсій (4-квадрантні кожні 1-2 см) — random sampling ≠ Seattle; пропущена dysplasia при недостатньому sampling."
  - "Не призначати аспірин-хемопревенцію без оцінки ризику кровотечі — bleeding risk vs cancer-prevention benefit має бути shared-decision-making."

do_not_do_en:
  - "Do not use high-dose PPI as a substitute for EET in dysplastic Barrett — PPI controls symptoms/esophagitis but does not prevent dysplasia progression to EAC."
  - "Do not offer esophagectomy as first-line for T1a HGD or intramucosal EAC — endoscopic eradication therapy has better oncologic outcomes with less morbidity."
  - "Do not rely on a single LGD diagnosis without expert GI pathology review — ~50% of LGD is reclassified as non-dysplastic at expert review; reduces over-treatment."
  - "Do not perform RFA without confirmed CE-IM endpoint (complete eradication of intestinal metaplasia) — partial eradication leaves residual progression risk."
  - "Do not skip Seattle protocol biopsies (4-quadrant every 1-2 cm) — random sampling ≠ Seattle; dysplasia missed when sampling is inadequate."
  - "Do not prescribe aspirin chemoprevention without assessing bleeding risk — bleeding risk vs cancer-prevention benefit must be a shared-decision-making conversation."

