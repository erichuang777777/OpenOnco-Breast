rationale: >
  Standard-track prevention pathway for patients with confirmed Barrett's
  esophagus. Surveillance and eradication cadence depends on dysplasia
  grade:

  **Non-dysplastic Barrett's:** EGD with Seattle protocol biopsies
  (4-quadrant biopsies every 1-2 cm of Barrett segment + targeted
  biopsies of any visible irregularities) every 3-5 years per ACG /
  NCCN. Long-segment Barrett (≥3 cm) and shorter intervals favored for
  patients with multiple risk factors (male, age >50, white, central
  obesity, smoking, long-segment Barrett).

  **Low-grade dysplasia (LGD), confirmed by expert GI pathologist
  review (LGD is the most over-called dysplasia grade; expert review
  reclassifies ~50% as non-dysplastic):**
    - **Preferred:** Endoscopic eradication therapy — radiofrequency
      ablation (RFA) ± endoscopic mucosal resection (EMR) for visible
      lesions. RFA reduces progression by ~75% (SURF, Phoa 2014).
    - **Alternative (patient declines EET):** Intensified surveillance
      EGD with Seattle protocol biopsies every 6-12 months until
      regression, progression to HGD, or patient accepts EET.

  **High-grade dysplasia (HGD) or intramucosal adenocarcinoma (T1a):**
  Endoscopic eradication therapy is the **standard of care** —
  EMR for visible lesions to confirm staging (T1a vs T1b) followed by
  RFA of residual flat Barrett segment until complete eradication of
  intestinal metaplasia (CE-IM). Surgical esophagectomy reserved for
  T1b invasive disease, EET non-responders, or multifocal HGD not
  amenable to endoscopic management. Per Shaheen 2014, RFA reduces
  progression from HGD to invasive EAC by ~80%.

  **PPI co-therapy (all grades):** High-dose PPI (omeprazole 40 mg BID,
  pantoprazole 40 mg BID, or esomeprazole 40 mg BID) — symptom control
  and esophagitis healing, supports Barrett mucosal recovery between
  ablation sessions. PPI alone does not prevent EAC progression but is
  baseline supportive therapy in all surveillance protocols.

  **Aspirin + PPI combination chemoprevention** (AspECT trial, Jankowski
  et al. Lancet 2018): adding low-dose aspirin to high-dose PPI reduces
  composite endpoint of all-cause mortality, EAC, and HGD by ~24% in
  Barrett patients without high bleeding risk. NCCN considers aspirin
  chemoprevention as 2B for patients at elevated cardiovascular risk
  who can tolerate it. Not universal practice; shared-decision-making
  with the patient.

  **Endoscopic eradication completeness:** post-RFA, surveillance EGD
  with biopsies every 3 months for the first year, every 6 months for
  year 2, then annually until 3 consecutive negative EGDs. Recurrent
  intestinal metaplasia (~10-25% over 5 years post-CE-IM) treated with
  repeat focal RFA.

  In Ukraine, EGD with Seattle-protocol biopsies is available in major
  centers (NSZU-covered for symptomatic GERD investigation but not
  Barrett-specific surveillance; out-of-pocket ~2000-5000 UAH per
  procedure). RFA + EMR available in a small number of tertiary centers
  in Kyiv and Lviv; international referral may be needed for complex
  cases.

rationale_ua: >
  Стандартний-трек prevention шлях для пацієнтів з підтвердженим
  стравоходом Барретта. Спостереження та ерадикаційна частота залежать
  від ступеня дисплазії:

  **Не-дисплазійний Barrett:** EGD з біопсіями за Сіетл-протоколом
  (4-квадрантні біопсії кожні 1-2 см сегмента Barrett + цільові біопсії
  будь-яких видимих нерівностей) кожні 3-5 років per ACG/NCCN.
  Довгий-сегмент Barrett (≥3 см) та коротші інтервали для пацієнтів з
  множинними факторами ризику (чоловіки, вік >50, біла раса,
  центральне ожиріння, куріння, довгий сегмент).

  **Дисплазія низького ступеня (LGD), підтверджена експертним
  GI-патологом (LGD — найбільш over-called grade; експертний огляд
  перекласифікує ~50% як не-дисплазійні):**
    - **Перевага:** Ендоскопічна ерадикаційна терапія — радіочастотна
      абляція (RFA) ± ендоскопічна резекція слизової (EMR) для видимих
      уражень. RFA знижує прогресію на ~75% (SURF, Phoa 2014).
    - **Альтернатива (пацієнт відмовляється від EET):** Посилене
      спостереження EGD з Сіетл-біопсіями кожні 6-12 місяців до
      регресії, прогресії до HGD або згоди пацієнта на EET.

  **Дисплазія високого ступеня (HGD) або інтрамукозна аденокарцинома
  (T1a):** Ендоскопічна ерадикаційна терапія — **стандарт лікування**.
  EMR для видимих уражень для підтвердження стадії (T1a vs T1b), далі
  RFA залишкового flat Barrett сегмента до повної ерадикації кишкової
  метаплазії (CE-IM). Хірургічна езофагектомія резервована для T1b
  інвазивного захворювання, нон-респондерів EET або мультифокального
  HGD, що не піддається ендоскопічному управлінню. Per Shaheen 2014,
  RFA знижує прогресію HGD → інвазивний EAC на ~80%.

  **PPI co-терапія (всі ступені):** Високодозовий PPI (омепразол 40 мг
  BID, пантопразол 40 мг BID або езомепразол 40 мг BID) — контроль
  симптомів та загоєння езофагіту, підтримує відновлення слизової
  Barrett між абляційними сесіями. PPI окремо не запобігає прогресії
  EAC, але є базовою підтримуючою терапією.

  **Aspirin + PPI комбінована хемопревенція** (AspECT trial, Jankowski
  et al. Lancet 2018): додавання низькодозового аспірину до високодозового
  PPI знижує composite endpoint смертності, EAC та HGD на ~24% у
  пацієнтів з Barrett без високого ризику кровотечі. NCCN розглядає
  аспірин-хемопревенцію як 2B для пацієнтів з підвищеним серцево-
  судинним ризиком, які можуть переносити його.

  **Повнота ендоскопічної ерадикації:** після RFA — спостережувальна
  EGD з біопсіями кожні 3 місяці перший рік, кожні 6 місяців другий рік,
  далі щорічно до 3 послідовних негативних EGD. Рецидивна кишкова
  метаплазія (~10-25% за 5 років після CE-IM) лікується повторним
  фокальним RFA.

  В Україні EGD з біопсіями за Сіетл-протоколом доступна в великих
  центрах (НСЗУ покриває для симптоматичного ГЕРХ-обстеження, але не
  Barrett-специфічне спостереження; out-of-pocket ~2000-5000 грн за
  процедуру). RFA + EMR доступні у невеликій кількості третинних
  центрів у Києві та Львові; міжнародне направлення може знадобитися
  для складних випадків.

