expected_outcomes:
  overall_response_rate: >-
    Endoscopic eradication therapy (RFA ± EMR) for dysplastic Barrett:
    HGD ablation reduces progression to EAC by ~75% vs observation
    (Shaheen et al. JAMA 2014, AIM-Dysplasia); LGD ablation reduces
    progression to HGD/EAC by ~75% (SURF trial, Phoa et al. JAMA 2014).
    For non-dysplastic Barrett, surveillance q3-5y captures EAC at
    earliest detectable stage (typically T1a — amenable to endoscopic
    resection with 5-year OS >95%) but does not reduce baseline
    incidence (~0.1-0.3%/year). PPI co-therapy heals reflux esophagitis
    in >90% within 8 weeks; does not by itself prevent EAC progression.

