sources:
  - source_id: SRC-NCCN-BCELL-2025
    position: context
    relevant_quote_paraphrase: >-
      "Patients with chronic H. pylori who decline antibiotic eradication
      require ongoing monitoring for malignancy emergence; alarm features
      route to diagnostic endoscopy."

do_not_do:
  - "Не презентувати observation як еквівалент ерадикації — incidence-reduction відсутній."
  - "Не ігнорувати alarm features (схуднення, дисфагія, ШКТ-кровотеча) — immediate upper endoscopy."
  - "Не використовувати цей шлях як стандарт першої лінії — eradication-track залишається preferred recommendation."
  - "Не продовжувати observation за наявності intestinal metaplasia / dysplasia на біопсії — це pre-cancerous, потребує ерадикації + посиленої surveillance endoscopy."

do_not_do_en:
  - "Do not present observation as equivalent to eradication — incidence-reduction is absent."
  - "Do not ignore alarm features (weight loss, dysphagia, GI bleeding) — immediate upper endoscopy."
  - "Do not use this pathway as a first-line standard — the eradication track remains the preferred recommendation."
  - "Do not continue observation in the presence of intestinal metaplasia / dysplasia on biopsy — this is pre-cancerous, requires eradication + enhanced surveillance endoscopy."

