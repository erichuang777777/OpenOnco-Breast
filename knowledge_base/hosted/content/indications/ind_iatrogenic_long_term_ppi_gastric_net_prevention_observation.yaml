expected_outcomes:
  overall_response_rate: "Patient declines structured indication review + endoscopic evaluation — receives baseline education on dyspepsia / new GI symptom escalation and continues PPI per prior plan. Type-1 gastric NET and atrophic-gastritis-derived gastric adenocarcinoma may go undetected until symptomatic; stage at diagnosis later, intervention more invasive. Outcomes worse than with structured indication-review + targeted surveillance arm, though absolute risk increment remains modest in any individual long-term PPI user."

