rationale: >
  Alternative-track companion to IND-IATROGENIC-LONG-TERM-PPI-
  GASTRIC-NET-PREVENTION-SURVEILLANCE. Patient declines structured
  PPI indication-review + endoscopic evaluation (acceptance of
  reflux control as priority, geographic access, surveillance
  fatigue) — receives explicit symptom-vigilance education
  (new dyspepsia not responsive to current PPI, weight loss,
  iron-deficiency anemia, melena, persistent epigastric pain
  → gastroenterology referral, regardless of how minor it appears)
  + PPI-side-effect-monitoring counseling (calcium, vit B12,
  magnesium, Clostridioides difficile risk, community-acquired
  pneumonia association). Per CHARTER §11 patient-autonomy framing
  — declining a step-down trial or surveillance EGD is legitimate
  but framed as suboptimal vs. structured-review comparator.

rationale_ua: >
  Альтернативно-трекова Indication. Пацієнт відмовляється від
  structured PPI indication-review + endoscopic evaluation —
  отримує explicit symptom-vigilance education (нова dyspepsia
  не відповідає поточному PPI, втрата ваги, залізодефіцитна анемія,
  мелена, persistent epigastric pain → gastroenterology referral,
  незалежно від мінімальності) + PPI-side-effect-monitoring
  counseling (calcium, vit B12, magnesium, Clostridioides difficile
  ризик, community-acquired pneumonia association). Per CHARTER §11.

