do_not_do:
  - "Не презентувати observation як еквівалент structured indication-review — de-prescription зменшує iatrogenic exposure."
  - "Не пропускати explicit symptom-vigilance education — pattern-recognition критична для symptom-prompted evaluation."
  - "Не виключати patient зі symptom-prompted endoscopy access — навіть якщо routine surveillance declined, GI має бути available."
  - "Не нормалізувати дисфагію / weight loss / melena як 'minor' — будь-який alarm symptom requires immediate evaluation."
  - "Не ігнорувати PPI side-effect monitoring (Ca, B12, Mg) — discontinuation issue окрема від cancer risk."

do_not_do_en:
  - "Do not present observation as equivalent to structured indication review — de-prescription reduces iatrogenic exposure."
  - "Do not skip explicit symptom-vigilance education — pattern recognition is critical for symptom-prompted evaluation."
  - "Do not deny the patient symptom-prompted endoscopy access — even if routine surveillance is declined, GI must be available."
  - "Do not normalize dysphagia / weight loss / melena as 'minor' — any alarm symptom requires immediate evaluation."
  - "Do not ignore PPI side-effect monitoring (Ca, B12, Mg) — independent from cancer-risk discussion."

