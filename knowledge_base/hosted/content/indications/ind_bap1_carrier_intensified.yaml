do_not_do:
  - "Не intensifyувати chest CT cadence без documented asbestos exposure history — radiation burden lifelong; reserve annual cadence для high-risk subset."
  - "Не виконувати prophylactic pleurodesis у asymptomatic carrier — реверв для symptomatic recurrent effusion."
  - "Не пропускати occupational-medicine consultation для documented exposure — legal-rights + workplace decontamination implications беyond medical."
  - "Не презентувати genetic reproductive counseling як обов'язкову — autonomy-preserving option серед багатьох, не imperative."
  - "Не використовувати empirical anti-asbestos chemoprevention — does not exist; будь-який supplement / herbal marketed як такий — pseudoscience."

do_not_do_en:
  - "Do not intensify chest CT cadence without documented asbestos exposure history — lifelong radiation burden; reserve annual cadence for the high-risk subset."
  - "Do not perform prophylactic pleurodesis in an asymptomatic carrier — reserve for symptomatic recurrent effusion."
  - "Do not skip occupational-medicine consultation for documented exposure — legal-rights and workplace-decontamination implications go beyond medical."
  - "Do not present genetic reproductive counseling as mandatory — autonomy-preserving option among many, not imperative."
  - "Do not use empirical anti-asbestos chemoprevention — does not exist; any supplement or herbal marketed as such is pseudoscience."

