expected_outcomes:
  overall_response_rate: >-
    Intensified track layers two options on top of standard BAP1
    surveillance: (1) intensified asbestos-avoidance counseling
    (occupational change, household decontamination, take-home exposure
    elimination); (2) earlier mesothelioma surveillance — chest CT
    annually (vs q1-3y standard) for carriers with known occupational,
    environmental, or take-home asbestos history. Goal: detect
    mesothelioma at smaller, more resectable stage (or screen out from
    surgical candidacy if metastatic, sparing futile multimodality
    burden). Evidence base is consensus-driven (BAP1-TPDS rarity).

