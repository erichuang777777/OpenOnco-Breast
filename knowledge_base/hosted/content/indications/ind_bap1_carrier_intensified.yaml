rationale: >
  Aggressive-track confirmed-carrier pathway layered on top of the
  IND-BAP1-CARRIER-SURVEILLANCE standard protocol.

  **Foundation:** All standard surveillance from IND-BAP1-CARRIER-
  SURVEILLANCE applies (annual whole-body skin exam, annual dilated
  fundoscopy, annual abdominal MRI, chest CT q1-3y, asbestos-avoidance
  counseling).

  **Intensification 1 — Intensified asbestos-avoidance counseling:**
  Active occupational-history review at each visit. Identify and
  intervene on:
    - Direct occupational exposure (construction, shipyard, military
      bases, asbestos abatement, brake repair, insulators, boilermakers)
    - Environmental exposure (proximity to asbestos mining, processing,
      contaminated soil)
    - Take-home exposure (family member bringing dust from worksite)
    - Recreational exposure (DIY home renovation, vehicle restoration,
      hobby ceramics with vermiculite)

  For documented exposure, refer for occupational-medicine consultation
  (baseline pulmonary function, chest imaging, exposure quantification,
  legal-rights counseling where applicable in Ukraine / EU framework).

  **Intensification 2 — Earlier mesothelioma surveillance — chest CT
  annually (vs q1-3y standard):** For carriers with any documented
  asbestos history (occupational, environmental, or take-home),
  advance chest CT cadence to annual. Low-dose CT acceptable for
  surveillance; standard CT for any new abnormality. Mesothelioma
  early-detection lead time is the rate-limiting factor in
  multimodality cure feasibility.

  **Other intensification considerations (not core to this track):**
    - Prophylactic pleurodesis is NOT routine — performed only for
      symptomatic recurrent effusion.
    - Empirical anti-asbestos chemoprevention does not exist; no
      pharmacotherapy reduces BAP1-mesothelioma risk.
    - Genetic counseling for reproductive planning (preimplantation
      genetic testing, donor sperm / egg considerations) is appropriate
      for carriers of childbearing age; presented as one autonomy-
      preserving option among many.

  **Cascade testing remains continuous:** every visit re-confirms
  family testing status; particularly important given childhood-onset
  atypical Spitz tumors that may herald family BAP1-TPDS.

  Per CHARTER §11: intensified surveillance and lifestyle counseling
  are shared-decision-making. Patient autonomy paramount.

rationale_ua: >
  Aggressive-трекова Indication: накладена поверх IND-BAP1-CARRIER-
  SURVEILLANCE.

  **Foundation:** Усе standard з IND-BAP1-CARRIER-SURVEILLANCE.

  **Інтенсифікація 1 — Intensified asbestos-avoidance counseling:**
  Active occupational-history review кожного візиту. Identify і
  intervene:
    - Direct occupational (construction, shipyard, military bases,
      asbestos abatement, brake repair, insulators, boilermakers)
    - Environmental (proximity до asbestos mining / processing /
      contaminated soil)
    - Take-home (family member bringing dust)
    - Recreational (DIY home renovation, vehicle restoration,
      hobby ceramics з vermiculite)

  Для documented exposure — направлення occupational medicine
  (baseline PFT, chest imaging, exposure quantification).

  **Інтенсифікація 2 — Earlier mesothelioma surveillance — chest CT
  annually (vs q1-3y standard):** Для carriers з будь-якою documented
  asbestos history — advance chest CT до annual. Low-dose CT acceptable.

  **Інші міркування:**
    - Prophylactic pleurodesis — NOT routine.
    - Empirical anti-asbestos chemoprevention does not exist.
    - Genetic counseling для reproductive planning (PGT, donor
      gametes) appropriate.

  **Cascade тестування continuous;** pediatric atypical Spitz tumors
  можуть herald family BAP1-TPDS.

  Per CHARTER §11: shared-decision-making домен.

