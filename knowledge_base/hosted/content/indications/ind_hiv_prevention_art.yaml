id: IND-CHRONIC-HIV-PREVENTION-ART
plan_track: standard
intent: prevention

applicable_to:
  disease_id: DIS-DLBCL-NOS
  stage_requirements: []
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
