id: IND-CHRONIC-HHV8-PREVENTION-OBSERVATION
plan_track: surveillance
intent: prevention

applicable_to:
  disease_id: DIS-KAPOSI
  stage_requirements: []
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 3

triggered_by_redflags:
  - RF-CHRONIC-HHV8-MALIGNANCY-PREVENTION

recommended_regimen: null
concurrent_therapy: []
followed_by: []

evidence_level: low
strength_of_recommendation: conditional
nccn_category: "2B"

expected_outcomes:
  overall_response_rate: >-
    Primary endpoint: surveillance compliance (mucocutaneous + oral + GI
    + lymph-node exam quarterly; biopsy any new violaceous lesion). Does
    not reduce HHV-8-driven malignancy incidence but improves likelihood
    of early-stage Kaposi sarcoma / MCD detection.

hard_contraindications: []
red_flags_triggering_alternative: []
required_tests:
  - TEST-CBC
  - TEST-LFT
desired_tests:
  - TEST-LDH

rationale: >
  Alternative-track companion to
  IND-CHRONIC-HHV8-PREVENTION-IMMUNE-RESTORATION. Patient with HHV-8
  seropositivity in an immunocompromised host who declines ART (HIV+)
  or in whom transplant-immunosuppression cannot be safely modified
  (graft-rejection risk, recent transplant, donor-specific antibodies)
  — surveillance per IDSA / NIH AIDS Information protocol:
  mucocutaneous + oral + GI / lymph-node exam at each clinic visit,
  CBC + LDH quarterly, biopsy any new violaceous cutaneous / mucosal
  lesion.

  Patient remains at elevated HHV-8-driven malignancy risk;
  surveillance does not reduce incidence but improves early detection.
  Per CHARTER §11 patient-autonomy framing.

rationale_ua: >
  Альтернативно-трекова Indication — компаньйон до
  IND-CHRONIC-HHV8-PREVENTION-IMMUNE-RESTORATION. Пацієнт з
  серопозитивністю HHV-8 у імуноскомпрометованому хості, який
  відмовляється від АРТ (ВІЛ+) або у якого імуносупресія не може
  бути безпечно змінена (ризик відторгнення графта, недавня
  трансплантація, donor-specific antibodies) — surveillance за
  IDSA / NIH AIDS Information протоколом: огляд шкіри + ротової
  порожнини + ШКТ / лімфовузлів при кожному візиті, CBC + LDH
  щоквартально, біопсія будь-якого нового фіолетового шкірного /
  слизового вогнища.

