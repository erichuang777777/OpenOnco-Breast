do_not_do:
  - "Не презентувати enhanced surveillance як еквівалент genetic confirmation — diagnostic precision відсутня; cascade-testing benefit для родичів втрачається."
  - "Не рекомендувати risk-reducing мастектомію або гістеректомію в empіричному спостереженні без PTEN-підтвердження — ці інтервенції вимагають confirmed carrier діагнозу."
  - "Не пропускати periodic re-discussion про genetic testing — більшість пацієнтів врешті приймають тестування; високий ризик раку грудей у Cowden особливо мотивує testing-acceptance."
  - "Не починати щорічне breast MRI до 30 років у emp​іричному спостереженні без сильної сімейної історії дуже-раннього раку грудей — кумулятивна вартість і false-positive rate переважують benefit у молодшій age-bracket."
  - "Не пропускати baseline thyroid US у pedigree-suspicion випадках — це найдешевший і найвищо-виходний empіричний-скринінг-крок; thyroid pathology у Cowden часто рано і легко детектована."
  - "Не виконувати empіричну ендометріальну біопсію без симптомів або US-відхилень — це інвазивна процедура з ризиками; обмежити symptom-driven або US-driven індикаціями у emp​іричному спостереженні."

do_not_do_en:
  - "Do not present enhanced surveillance as equivalent to genetic confirmation — diagnostic precision is absent; cascade-testing benefit for relatives is lost."
  - "Do not recommend risk-reducing mastectomy or hysterectomy in empirical surveillance without PTEN confirmation — these interventions require a confirmed carrier diagnosis."
  - "Do not skip periodic re-discussion of genetic testing — most patients eventually accept testing; the high lifetime breast-cancer risk in Cowden specifically motivates testing acceptance."
  - "Do not start annual breast MRI before age 30 in empirical surveillance without a strong family history of very-early-onset breast cancer — cumulative cost and false-positive rate outweigh benefit in the younger age bracket."
  - "Do not skip baseline thyroid US in pedigree-suspicion cases — this is the cheapest, highest-yield empirical screening step; thyroid pathology in Cowden is often early and easily detected."
  - "Do not perform empirical endometrial biopsy without symptoms or US abnormalities — this is an invasive procedure with risks; limit to symptom-driven or US-driven indications in empirical surveillance."

