expected_outcomes:
  overall_response_rate: >-
    Empirical multi-organ Cowden-style surveillance (annual mammography
    + breast MRI from age 30; annual thyroid US; endometrial
    surveillance from 35-40; colonoscopy q5y from age 35; annual
    dermatologic evaluation; baseline renal imaging): expected to
    capture clinically actionable lesions at earliest detectable stage
    in the subset who are actual PTEN carriers (~25-90% of pedigree-
    suspicion individuals depending on phenotype stringency). Does
    NOT carry the diagnostic certainty of genetic testing — non-
    carriers receive a substantial surveillance burden that could
    have been safely declined, risk-reducing surgical decisions
    cannot be made without genetic confirmation, and cascade-testing
    benefit for relatives is lost.

