rationale: >
  Alternative-track companion to IND-IATROGENIC-AZATHIOPRINE-
  LONGTERM-PREVENTION-SURVEILLANCE. Patient declines structured
  annual dermatologic surveillance + structured year-5 indication-
  review (long-stable disease control, geographic access,
  surveillance fatigue, preference) — receives explicit sun-
  protection counseling (broad-spectrum SPF 30+ daily, peak UV
  avoidance, photoprotective clothing) + symptom-vigilance
  education (new or changing skin lesion, non-healing sore,
  persistent lymphadenopathy, unexplained fevers / night sweats /
  weight loss / fatigue → immediate referral; in IBD cohort,
  perianal / GI symptoms — escalation as usual but with thiopurine-
  context awareness) + skin-self-examination instruction (monthly,
  full-body with mirror; partner-assisted for hard-to-see areas).
  Per CHARTER §11 patient-autonomy framing — declining structured
  surveillance is legitimate but framed as suboptimal vs. annual-
  dermatology + active-indication-review comparator. Particular
  emphasis: thiopurine-attributable cancer signal does NOT
  disappear with continued use; cumulative exposure compounds risk.

rationale_ua: >
  Альтернативно-трекова Indication. Пацієнт відмовляється від
  structured annual dermatologic surveillance + structured year-5
  indication-review — отримує explicit sun-protection counseling
  (SPF 30+ daily, peak UV avoidance, photoprotective clothing)
  + symptom-vigilance education (нова або changing skin lesion,
  non-healing sore, persistent lymphadenopathy, unexplained
  fevers / night sweats / weight loss / fatigue → immediate
  referral; у IBD cohort, perianal / GI симптоми — escalation
  з thiopurine-context awareness) + skin-self-examination
  instruction (monthly, full-body з mirror; partner-assisted).
  Per CHARTER §11. Особлива емфаза: thiopurine-attributable cancer
  signal НЕ зникає з продовженням use; cumulative exposure
  compound risk.

