expected_outcomes:
  overall_response_rate: "Patient declines structured dermatologic surveillance + indication-review discussion — receives baseline sun-protection counseling, B-symptom-vigilance education, and skin-self-examination instruction. Thiopurine-attributable lymphoma and non-melanoma skin cancers may present at advanced stage; outcomes worse than with active surveillance. Patient continues on thiopurine without year-5 alternative-discussion structured prompt — may persist on a treatment whose risk-benefit balance has shifted unfavorably with cumulative exposure."

