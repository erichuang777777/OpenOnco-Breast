do_not_do:
  - "Не презентувати observation як еквівалент дермtologic surveillance + indication review — thiopurine cumulative risk compound."
  - "Не пропускати explicit sun-protection + B-symptom education — найбільший self-care yield."
  - "Не виключати patient зі symptom-prompted dermatology / hematology access — навіть при declining routine surveillance."
  - "Не нормалізувати new skin lesion / non-healing sore / lymphadenopathy / B-symptoms — alarm signs."
  - "Не продовжувати thiopurine indefinitely без structured shared-decision discussion на 5р."
  - "Не покладатися на self-examination alone — early lesions можуть бути subtle."

do_not_do_en:
  - "Do not present observation as equivalent to dermatologic surveillance + indication review — thiopurine cumulative risk compounds."
  - "Do not skip explicit sun-protection + B-symptom education — highest self-care yield."
  - "Do not deny the patient symptom-prompted dermatology / hematology access — even if routine surveillance is declined."
  - "Do not normalize a new skin lesion / non-healing sore / lymphadenopathy / B-symptoms — alarm signs."
  - "Do not continue thiopurine indefinitely without structured shared-decision discussion at year 5."
  - "Do not rely on self-examination alone — early lesions can be subtle."

