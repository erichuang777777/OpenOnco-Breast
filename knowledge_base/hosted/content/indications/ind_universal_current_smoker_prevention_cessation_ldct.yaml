expected_outcomes:
  overall_response_rate: >-
    Combined behavioural-counseling + first-line pharmacotherapy
    cessation programs achieve 6-month abstinence in 20-35% of
    motivated participants per USPHS 2008 + Cochrane meta-analyses
    (varenicline OR ~2.3 vs placebo; combination NRT OR ~1.9;
    bupropion OR ~1.6; combined pharmacotherapy + behavioural
    intervention OR ~3.6 vs no treatment). Lung-cancer-specific
    risk reduction from cessation accrues over time — by year 5
    relative risk falls to ~50% of continuing smoker, by year 15
    to ~10-15%; never returns fully to never-smoker baseline.
    USPSTF 2021 LDCT screening (50-80 yo with ≥20 pack-year history,
    currently smoke OR quit within 15 years): NLST evidence shows
    20% relative reduction in lung-cancer mortality (NNS ~320 over
    6.5 years); NELSON corroborates. Overall: structured-cessation
    + LDCT-eligibility pathway is the highest-yield prevention
    intervention in cancer medicine for the current-smoker cohort.

