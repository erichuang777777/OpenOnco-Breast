do_not_do:
  - "Не призначати LDCT без USPSTF-eligibility verification — false-positive harm + radiation exceed benefit поза eligibility window."
  - "Не пропускати pharmacotherapy при behavioural-only counseling — combined-modality cessation 3-5× ефективніший."
  - "Не frame prior quit-attempts as terminal failures — кожний relapse є data для next attempt."
  - "Не презентувати e-cigarettes / vaping як first-line cessation — high-quality evidence limited; addiction substitution documented."
  - "Не deny LDCT access на основі socioeconomic / insurance барʼєрів без active referral до Medicare / NHS / NSZU equivalent coverage pathway."

do_not_do_en:
  - "Do not order LDCT without USPSTF-eligibility verification — false-positive harm + radiation exceed benefit outside the eligibility window."
  - "Do not skip pharmacotherapy in favor of behavioural-only counseling — combined-modality cessation is 3-5× more effective."
  - "Do not frame prior quit-attempts as terminal failures — each relapse is data for the next attempt."
  - "Do not present e-cigarettes / vaping as first-line cessation — high-quality evidence remains limited; addiction substitution is documented."
  - "Do not deny LDCT access on socioeconomic / insurance grounds without an active referral to Medicare / NHS / NSZU equivalent coverage pathway."

