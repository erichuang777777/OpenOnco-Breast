expected_outcomes:
  overall_response_rate: >-
    Diagnostic yield of germline MEN1 panel testing in pedigree-
    suspicion populations: ~70-90% positive carrier identification
    when classic clinical MEN1 criteria are met in the family; ~30-40%
    in single-tumor MEN1-spectrum pedigrees without the classic
    ≥2-of-3 phenotype cluster. Confirmed carrier routes to structured
    multi-organ surveillance starting in early childhood — biochemistry
    (PTH/Ca, prolactin, IGF-1, fasting gastrin/glucose/insulin,
    chromogranin-A) from age 5; pituitary MRI from age 5; abdominal
    MRI from age 10. Early detection benefit is strongest for
    GEP-NETs where malignant transformation is the dominant MEN1
    mortality driver — early-stage pancreatic NET resection
    substantially improves survival vs metastatic-presentation disease.

