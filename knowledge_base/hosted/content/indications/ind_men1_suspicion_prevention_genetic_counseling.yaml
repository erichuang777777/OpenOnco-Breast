sources:
  - source_id: SRC-NCCN-NET-2025
    position: supports
    relevant_quote_paraphrase: >-
      "MEN1 should be considered in patients with gastrinoma, multifocal
      pancreatic NETs, or any GEP-NET with personal or family history of
      primary hyperparathyroidism / pituitary adenoma. Germline MEN1
      testing and family-cascade testing are recommended; carriers
      enter structured multi-organ surveillance with biochemistry from
      age 5 and imaging from age 10."

do_not_do:
  - "Не призначати germline тестування без pre-test консультування — інформована згода + обговорення дитячого скринінг-тягаря обов'язкові."
  - "Не treter VUS результат як патогенний — управляйте як родовідну підозру до подальших даних; не починайте дитячий скринінг-протокол на підставі VUS."
  - "Не пропускати MLPA / large-deletion аналіз — ~5-10% патогенних MEN1 варіантів — великі делеції, пропущені sequencing-only тестуванням."
  - "Не презентувати negative-panel результат як zero-risk — MEN4 (CDKN1B) є MEN1-фенокопією, клінічно схожою, але часто пропущеною стандартними MEN1-only панелями."
  - "Не пропускати CT грудної клітки у підтверджених MEN1-чоловіків — тимічні NET агресивні, чоловіко-домінантні і є основною причиною смерті у MEN1 поза GEP-NET."
  - "Не починати дитячий пітуітарний MRI протокол на підставі сімейної історії без підтвердженого носійства або сильної біохімічної підстави — седація для MRI у дитини несе ризик, що має бути збалансований проти діагностичної вигоди."

do_not_do_en:
  - "Do not order germline testing without pre-test counseling — informed consent and discussion of the childhood surveillance burden are mandatory."
  - "Do not treat a VUS result as pathogenic — manage as pedigree suspicion pending further data; do not initiate the childhood surveillance protocol based on a VUS."
  - "Do not skip MLPA / large-deletion analysis — ~5-10% of pathogenic MEN1 variants are large deletions missed by sequencing-only testing."
  - "Do not present a negative-panel result as zero-risk — MEN4 (CDKN1B) is a MEN1 phenocopy clinically similar but often missed on standard MEN1-only panels."
  - "Do not skip chest CT in confirmed MEN1 men — thymic NETs are aggressive, male-predominant, and a leading cause of death in MEN1 outside GEP-NETs."
  - "Do not initiate the pediatric pituitary MRI protocol based on family history without confirmed carriage or strong biochemical grounds — MRI sedation in a child carries risk that must be balanced against diagnostic yield."

