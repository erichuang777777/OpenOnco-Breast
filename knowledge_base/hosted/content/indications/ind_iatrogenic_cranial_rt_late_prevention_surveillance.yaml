do_not_do:
  - "Не пропускати annual endocrine panel у cranial-RT survivors — HP-axis dysfunction може бути silent для років при поступовому розвитку."
  - "Не виконувати routine asymptomatic brain MRI q1y у всіх — yield обмежений; symptom-driven imaging є primary screening modality."
  - "Не нормалізувати new-onset seizure як 'idiopathic epilepsy' у cranial-RT survivor — warrants urgent brain MRI для secondary CNS tumor evaluation."
  - "Не пропускати neurocognitive surveillance у adult survivors — late-effects cognitive decline частий і underdiagnosed."
  - "Не делегувати pediatric-survivor surveillance non-experienced clinic — COG-LTFU guidelines складні і вимагають expertise."

do_not_do_en:
  - "Do not skip the annual endocrine panel in cranial-RT survivors — HP-axis dysfunction can be silent for years if onset is gradual."
  - "Do not perform routine asymptomatic brain MRI q1y in everyone — yield is limited; symptom-driven imaging is the primary screening modality."
  - "Do not normalize new-onset seizure as 'idiopathic epilepsy' in a cranial-RT survivor — warrants urgent brain MRI to evaluate for a secondary CNS tumor."
  - "Do not skip neurocognitive surveillance in adult survivors — late-effects cognitive decline is common and underdiagnosed."
  - "Do not delegate pediatric-survivor surveillance to non-experienced clinics — COG-LTFU guidelines are complex and require expertise."

