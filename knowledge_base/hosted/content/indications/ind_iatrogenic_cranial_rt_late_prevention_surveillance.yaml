rationale: >
  Standard-track late-effects surveillance for cancer survivors ≥5y
  post-completion of treatment that included cranial radiotherapy.
  Components per Children's Oncology Group Long-Term Follow-Up Guidelines
  (COG-LTFU) + Childhood Cancer Survivor Study (CCSS) + NCCN CNS Cancers:

  **(1) Annual neurological examination** —
  - Standardized cognitive screen (validated brief instrument — MoCA,
    MMSE for older adults; pediatric survivors transition to age-
    appropriate neuropsychological screening)
  - Cranial nerve exam (vision, hearing, swallow if upper neck/skull
    base in field)
  - Motor + sensory + cerebellar exam

  **(2) Annual endocrine panel** —
  - TSH + free T4 (hypothyroidism — risk from direct thyroid-field
    exposure or indirect HP-axis dysfunction)
  - Morning cortisol ± ACTH stimulation (HP-axis testing if symptoms
    of adrenal insufficiency: fatigue, postural hypotension)
  - GH evaluation (IGF-1, stimulation testing) in pediatric exposure
    cohort with growth-velocity or adult-onset GH-deficiency symptoms
  - Gonadal axis assessment (LH/FSH + sex hormones; pubertal staging
    in pediatric survivors)
  - Prolactin (hypothalamic injury or pituitary stalk-effect)
  - Bone density (DEXA q2y) — multifactorial late-effect risk

  **(3) Brain MRI q1-3y if symptomatic** —
  - New persistent headache (especially morning headache, postural
    component, or progressive)
  - New focal neurological deficit
  - New seizure (new-onset epilepsy in survivor warrants urgent
    workup — secondary meningioma or glioma)
  - Cognitive change beyond expected age-related decline
  - Schedule cadence q1y if any concerning finding; q3y for stable
    asymptomatic surveillance if survivor + clinician prefer scheduled
    imaging despite no acute trigger

  **(4) Neurocognitive surveillance** —
  - Pediatric survivors: school-performance + standardized cognitive
    testing at developmental transitions (entry to elementary, middle,
    high school, college)
  - Adult survivors: routine survivorship cognitive screening; refer
    to neuropsychology for objective evaluation when subjective
    complaints or screen positive

  **(5) Vascular complications surveillance** —
  - Stroke / TIA risk elevated post-cranial RT (radiation vasculopathy)
  - Carotid imaging consideration if cervical neck field involved
  - Aggressive vascular risk factor modification (BP, lipids, smoking)

  **(6) Co-fired surveillance dimensions** — if patient also has
  qualifying anthracycline / alkylator exposure, RF-IATROGENIC-
  ANTHRACYCLINE-LATE-CARDIO-PREVENTION and RF-IATROGENIC-ALKYLATOR-
  TAML-PREVENTION fire in parallel; survivorship clinic co-manages.

rationale_ua: >
  Стандартний-трек late-effects surveillance для виживачів раку ≥5р
  після завершення treatment з cranial radiotherapy. Components per
  COG-LTFU + CCSS + NCCN CNS:

  **(1) Щорічний неврологічний огляд** — cognitive screen (MoCA/MMSE),
  cranial nerves, motor/sensory/cerebellar.

  **(2) Щорічна endocrine panel** —
  - TSH + free T4 (hypothyroidism)
  - Morning cortisol ± ACTH stim (HP-axis if symptoms)
  - GH evaluation (IGF-1) у pediatric cohort з GH-deficiency symptoms
  - Gonadal axis (LH/FSH + sex hormones; pubertal staging)
  - Prolactin
  - Bone density DEXA q2y

  **(3) Brain MRI q1-3y якщо symptomatic** — new persistent headache,
  new focal deficit, new seizure, cognitive change. Schedule q3y для
  stable asymptomatic surveillance якщо survivor + clinician prefer.

  **(4) Neurocognitive surveillance** — pediatric: standardized testing
  при developmental transitions; adult: routine screening + neuropsych
  referral при позитивному screen.

  **(5) Vascular complications surveillance** — radiation vasculopathy;
  aggressive vascular risk factor modification.

  **(6) Co-fired surveillance dimensions** — якщо patient має qualifying
  anthracycline / alkylator exposure, відповідні RF спрацьовують
  паралельно.

