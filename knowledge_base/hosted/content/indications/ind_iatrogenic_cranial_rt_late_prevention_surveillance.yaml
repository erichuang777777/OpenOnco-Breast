expected_outcomes:
  overall_response_rate: "Childhood Cancer Survivor Study (CCSS) + COG-LTFU cohorts: cranial-RT-exposed survivors have cumulative meningioma incidence 1-3% at 30y, high-grade glioma SIR 8-10× population baseline, GH deficiency in 60-80% of survivors who received ≥30 Gy to hypothalamic-pituitary axis. Structured surveillance enables earlier detection of secondary CNS tumors (better resectability + improved outcomes vs. symptom-driven presentation) and earlier endocrine hormone replacement (improved metabolic + bone + cognitive outcomes). Neurocognitive surveillance enables compensatory accommodations (educational, occupational) and early dementia detection in older survivors."

