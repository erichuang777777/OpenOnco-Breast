do_not_do:
  - "Не презентувати 'smoking outside' як sufficient elimination — thirdhand smoke з clothing / surfaces persists; complete cohabitant cessation — highest-yield."
  - "Не пропускати cohabitant smoking-cessation referral — це core lever для passive-smoking exposure reduction."
  - "Не extrapolate USPSTF screening eligibility до non-smoker ETS-only exposed cohort — LDCT не validated для цього population."
  - "Не покладатися виключно на air filtration — HEPA reduces aerosol але не gas-phase ETS components."
  - "Не ігнорувати childhood / in-utero ETS exposure historical — multi-decade effect на lung-cancer + cardiovascular risk."

do_not_do_en:
  - "Do not present 'smoking outside' as sufficient elimination — thirdhand smoke from clothing / surfaces persists; complete cohabitant cessation is the highest-yield."
  - "Do not skip cohabitant smoking-cessation referral — it is the core lever for passive-smoking exposure reduction."
  - "Do not extrapolate USPSTF screening eligibility to a non-smoker ETS-only exposed cohort — LDCT is not validated for this population."
  - "Do not rely exclusively on air filtration — HEPA reduces aerosol but not gas-phase ETS components."
  - "Do not ignore historical childhood / in-utero ETS exposure — multi-decade effect on lung-cancer + cardiovascular risk."

known_controversies:
  - topic: "LDCT screening eligibility for high-cumulative ETS-exposed never-smokers"
    positions:
      - position: "USPSTF 2021 limits LDCT screening to age 50-80 + ≥20 pack-years + recent active smoking; passive-smoking-only never-smokers fall outside criteria"
      - position: "NCCN allows clinical judgment for high-cumulative ETS exposure when concurrent risk factors are present (eg, prior tobacco use, family history)"
    our_default: "Apply USPSTF 2021 criteria as standard; consider NCCN-style clinical judgment when concurrent risk factors escalate cumulative-risk estimate."
    rationale: "RCT screening evidence (NLST, NELSON) enrolled smokers; extension to ETS-only never-smoker cohort is mechanistic + not direct-evidence supported."

