rationale: >
  Standard-track prevention pathway for chronic ETS exposure.
  Components per US Surgeon General 2006 + 2014 reports + IARC
  Monograph 83 (2004) + NCCN NSCLC + USPSTF tobacco-cessation
  framework:

  **(1) Exposure-elimination — primary intervention**
  - Cohabitant smoking cessation referral — bring spouse / partner /
    household members who smoke into a tobacco-cessation program.
    Use the patient as motivational anchor ("your smoking is
    increasing X's lung-cancer risk by 20-25%"). Tools per RF-
    LIFESTYLE-TOBACCO-CANCER-PREVENTION: 5A counseling, NRT,
    varenicline, bupropion, cytisine.
  - Smoke-free home / vehicle policy — establish complete indoor +
    in-vehicle smoking ban. "Smoking on the porch / outside" reduces
    but does not eliminate exposure (thirdhand smoke from clothing /
    surfaces persists). Mandatory smoke-free policy in shared multi-
    unit housing where feasible.
  - Workplace smoke-free policy advocacy — if workplace exposure
    persists despite Ukrainian legal framework prohibiting workplace
    smoking (since 2012 amendments to tobacco control law), document
    occupational exposure for HR / labor protection follow-up.
  - Public-space avoidance — restaurants, bars, outdoor venues with
    permitted smoking should be avoided where feasible.

  **(2) Personal mitigation — secondary lever**
  - HEPA-filter air purifier in living areas where elimination is
    infeasible (eg, multi-unit housing with neighboring smokers).
    HEPA reduces but does not eliminate ETS aerosol; gas-phase
    components persist.
  - Window-closure + ventilation strategies during peak exposure
    periods.

  **(3) USPSTF lung-cancer screening eligibility check** — Annual
  LDCT for ages 50-80, ≥20 pack-years, current or quit within 15
  years. ETS exposure alone does NOT establish USPSTF screening
  eligibility; passive-smoking-only never-smokers fall outside the
  pack-years threshold. NCCN allows clinical judgment for high-
  cumulative ETS exposure in the presence of additional risk factors
  (eg, prior tobacco use, family history). Discuss with patient if
  borderline.

  **(4) Symptom-triggered evaluation** — Low threshold for new
  persistent cough, hemoptysis, dyspnea, chest pain, unintentional
  weight loss. ETS exposure does not change evaluation thresholds
  but raises pre-test probability vs. unexposed never-smoker.

  **(5) Counseling on co-morbidity risk** — ETS exposure also raises
  cardiovascular disease, stroke, COPD-exacerbation, and (in
  children) SIDS / asthma / otitis media risk. Holistic clinical
  surveillance appropriate.

  Resource access in Ukraine: tobacco-cessation pharmacotherapy
  pharmacy-accessible without НСЗУ reimbursement; cohabitant cessation
  is the highest-yield intervention.

