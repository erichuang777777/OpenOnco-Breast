sources:
  - source_id: SRC-ESMO-CRC-2024
    position: supports
    relevant_quote_paraphrase: >-
      "Germline testing for hereditary CRC syndromes including FAP is
      recommended for individuals with classic FAP phenotype, AFAP
      phenotype, or family history of confirmed FAP. Pre-test
      counseling required."
  - source_id: SRC-NCCN-COLON-2025
    position: supports
    relevant_quote_paraphrase: >-
      "Patients with known or suspected FAP / AFAP should receive
      germline APC + MUTYH testing; confirmed carriers enter intensive
      colorectal and upper-GI surveillance with prophylactic colectomy
      timing individualized per phenotype."

do_not_do:
  - "Не призначати germline тестування без pre-test консультування — інформована згода, психологічна підготовка, repro-планування обов'язкові."
  - "Не treter VUS результат як патогенний — управляйте як родовідну підозру до подальших даних; не пропонуйте профілактичну колектомію на підставі VUS."
  - "Не пропонувати профілактичну колектомію у підлітків / молодих дорослих без підтвердженого носійства та обговорення альтернативних хірургічних опцій (IPAA vs IRA) + впливу на якість життя (фекальна частота / нетримання, фертильність у IPAA)."
  - "Не презентувати negative-panel результат як zero-risk — residual сімейно-історичний ризик може зберігатися (deep intronic варіанти, mosaicism, rare non-FAP / non-Lynch синдроми)."
  - "Не пропускати скринінг гепатобластоми (AFP + УЗД) у дітей підтверджених FAP-сімей — інтервал q3-6 місяців від народження до 5 років обов'язковий."
  - "Не використовувати MUTYH-monoallelic carrier status як еквівалент FAP — biallelic MUTYH = MAP (autosomal recessive); monoallelic MUTYH несе тільки модестний ризик і не потребує посиленого спостереження."

do_not_do_en:
  - "Do not order germline testing without pre-test counseling — informed consent, psychological preparation, and reproductive planning are mandatory."
  - "Do not treat a VUS result as pathogenic — manage as pedigree suspicion pending further data; do not offer prophylactic colectomy on a VUS."
  - "Do not offer prophylactic colectomy in adolescents / young adults without confirmed carrier status and discussion of alternative surgical options (IPAA vs IRA) plus quality-of-life impact (stool frequency / incontinence, fertility in IPAA)."
  - "Do not present a negative-panel result as zero-risk — residual family-history risk may persist (deep intronic variants, mosaicism, rare non-FAP / non-Lynch syndromes)."
  - "Do not skip hepatoblastoma screening (AFP + ultrasound) in children of confirmed FAP families — q3-6 month interval birth to age 5 is mandatory."
  - "Do not equate MUTYH-monoallelic carrier status with FAP — biallelic MUTYH = MAP (autosomal recessive); monoallelic MUTYH carries only modest risk and does not require enhanced surveillance."

