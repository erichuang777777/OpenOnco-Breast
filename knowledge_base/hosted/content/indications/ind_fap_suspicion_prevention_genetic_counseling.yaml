nccn_category: "1"

expected_outcomes:
  overall_response_rate: >-
    Diagnostic yield of germline APC / MUTYH panel testing in pedigree-
    suspicion populations: ~30-90% positive carrier identification
    (varies by criterion stringency — classic-FAP phenotype family
    ~80-90% APC-positive; attenuated-FAP phenotype ~30-50% APC- or
    MUTYH-positive; single-relative suspicion ~10-20%). Confirmed
    carrier routes to enhanced surveillance with documented mortality
    benefit: in classic FAP, prophylactic colectomy in late teens /
    early 20s reduces CRC mortality from near-100% to near-0%; in
    attenuated FAP, intensive colonoscopy q1-2y with low-threshold
    colectomy on emergence of polyposis is similarly protective.
    Upper-GI EGD surveillance with Spigelman staging detects duodenal
    polyposis at a manageable stage in ~90% of cases.

