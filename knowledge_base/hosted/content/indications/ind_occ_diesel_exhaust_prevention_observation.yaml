sources:
  - source_id: SRC-NCCN-BCELL-2025
    position: context
    relevant_quote_paraphrase: >-
      "Patients declining intensified surveillance for occupational
      carcinogen cohorts continue to receive symptom-triggered evaluation
      and standard-of-care general-population screening."
  - source_id: SRC-NCCN-NSCLC-2025
    position: context
    relevant_quote_paraphrase: >-
      "Patients who decline lung-cancer screening at the intensified
      cadence require ongoing surveillance via symptom-triggered
      evaluation; smoking-cessation counseling remains foundational."

do_not_do:
  - "Не презентувати observation як еквівалент imaging surveillance — incidence-detection benefit відсутній; DEE-attributable excess ризик не адресується."
  - "Не ігнорувати alarm features (диспное, кровохаркання, гематурія, втрата ваги) — immediate діагностичне imaging + multidisciplinary review."
  - "Не використовувати цей шлях як стандарт першої лінії — intensified-surveillance трек залишається preferred для DEE-exposed cohort."
  - "Не пропускати counseling щодо припинення куріння — рекомендація актуальна незалежно від imaging-track вибору."

do_not_do_en:
  - "Do not present observation as equivalent to imaging surveillance — incidence-detection benefit is absent; DEE-attributable excess risk is unaddressed."
  - "Do not ignore alarm features (dyspnea, hemoptysis, hematuria, weight loss) — immediate diagnostic imaging + multidisciplinary review."
  - "Do not use this pathway as a first-line standard — the intensified-surveillance track remains the preferred recommendation for the DEE-exposed cohort."
  - "Do not skip smoking-cessation counseling — the recommendation is relevant regardless of imaging-track choice."

