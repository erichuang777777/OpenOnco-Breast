rationale: >
  Alternative-track companion to IND-OCC-DIESEL-EXHAUST-PREVENTION-
  INTENSIFIED-SURVEILLANCE. Patient with documented prior occupational
  diesel-exhaust (DEE) exposure who declines DEE-modified imaging
  surveillance — for any reason (cost, radiation-dose concerns, anxiety
  from serial-imaging false-positive cascade, preference for less-
  interventional pathway, geographic access constraints, life expectancy /
  competing illness) — is offered routine general-population screening
  only:

  **Lung-cancer screening:** Apply USPSTF 2021 criteria unmodified
  (age 50-80, ≥20 pack-years, current smoker or quit within 15 years).
  If patient meets criteria they receive annual LDCT at the routine
  cadence; if not, no imaging screening is offered. Patient is
  explicitly informed that DEE-attributable excess risk is unaddressed.

  **Bladder-cancer screening:** None — explicit absence of validated
  general-population screening modality; this track makes no change.

  **Smoking cessation:** Still offered — DEE × tobacco interaction
  remains clinically substantive and cessation is the largest single
  mortality lever regardless of imaging-track choice.

  **Symptom-triggered evaluation:** Low threshold for diagnostic workup
  on new / persistent chest symptoms (dyspnea, hemoptysis, weight loss,
  chronic cough) or genitourinary symptoms (gross / microscopic
  hematuria, dysuria, frequency).

  Routing reconsiderations: patient may revisit intensified-surveillance
  pathway at any subsequent visit; this Indication does not preclude
  future imaging escalation. New active DEE exposure (return to
  occupation) or change in life expectancy may prompt re-discussion.
  Per CHARTER §11 patient-autonomy framing: imaging surveillance is a
  shared-decision-making domain where the cost / radiation / anxiety
  profile must be weighed against an incremental mortality benefit
  that has indirect evidence support for the DEE-exposed cohort.

rationale_ua: >
  Альтернативно-трекова Indication — компаньйон до IND-OCC-DIESEL-
  EXHAUST-PREVENTION-INTENSIFIED-SURVEILLANCE. Пацієнт з документованим
  попереднім професійним впливом DEE, який відмовляється від
  DEE-модифікованого imaging-спостереження (вартість, радіація,
  тривога від false-positive каскаду, перевага менш-інтервенційного
  шляху, географічні обмеження), отримує тільки рутинний
  загальнопопуляційний скринінг:

  **Скринінг раку легень:** Застосовувати USPSTF 2021 без модифікації.
  Пацієнт явно інформований, що DEE-attributable excess ризик не
  адресується.

  **Скринінг раку сечового міхура:** Немає — валідована
  загальнопопуляційна модальність відсутня.

  **Припинення куріння:** Все ще пропонується — DEE × тютюн
  взаємодія залишається клінічно суттєвою.

  **Symptom-triggered оцінка:** Низький поріг для діагностичного
  workup при нових / persistent симптомах з боку грудної клітки або
  сечостатевої системи.

  Reroute: пацієнт може повернутися до інтенсифікованого спостереження
  на будь-якому подальшому візиті. Per CHARTER §11 — shared-decision-
  making domain.

