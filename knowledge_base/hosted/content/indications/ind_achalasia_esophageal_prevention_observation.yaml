do_not_do:
  - "Не використовувати цей шлях у пацієнтів з мегаезофагом або documented food retention — потребують запланованої surveillance."
  - "Не презентувати symptom-driven observation як еквівалент scheduled surveillance — interval-cancer ризик вищий, з типовою більш пізньою-стадією презентацією."
  - "Не ігнорувати red-flag симптоми (нова дисфагія, кровотеча, схуднення) — імідіат-обстеження показано."
  - "Не використовувати цей шлях у пацієнтів з активним курінням або важким вживанням алкоголю — additive SCC ризик виправдовує запланований моніторинг."
  - "Не пропускати періодичне обговорення upgrade — особливо у міру наближення до 10-15-річного latency вікна."

do_not_do_en:
  - "Do not use this pathway in patients with megaesophagus or documented food retention — they require scheduled surveillance."
  - "Do not present symptom-driven observation as equivalent to scheduled surveillance — interval-cancer risk is higher, with typical later-stage presentation."
  - "Do not ignore red-flag symptoms (new dysphagia, bleeding, weight loss) — immediate workup indicated."
  - "Do not use this pathway in patients with active smoking or heavy alcohol use — additive SCC risk warrants scheduled monitoring."
  - "Do not skip periodic re-discussion of upgrade — especially as the 10-15-year latency window approaches."

