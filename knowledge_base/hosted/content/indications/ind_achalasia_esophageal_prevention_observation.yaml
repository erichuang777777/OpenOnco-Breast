expected_outcomes:
  overall_response_rate: >-
    Symptom-driven observation (no scheduled EGD; investigation
    triggered by new/worsening dysphagia, regurgitation of blood,
    weight loss, or chest pain) captures SCC at later stage than
    scheduled surveillance (Leeuwenburgh 2010: ~75% advanced-stage in
    symptomatic-presentation cohorts). Acceptable as a minimum-
    intensity default when patient declines or cannot access scheduled
    EGD — but most diagnoses occur at unresectable stages.

