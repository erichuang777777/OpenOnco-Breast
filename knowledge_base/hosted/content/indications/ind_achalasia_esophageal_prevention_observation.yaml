rationale: >
  Alternative-track companion to IND-ACHALASIA-ESOPHAGEAL-PREVENTION-
  SURVEILLANCE. Appropriate for patients with confirmed achalasia who
  choose minimum-intensity surveillance for any of: cost / access
  constraints, recent (<5y) achalasia diagnosis where SCC latency makes
  routine surveillance lower-yield, severe procedural anxiety, advanced
  age with limited life expectancy where surveillance-detected early
  SCC would not change management, or explicit preference for symptom-
  driven follow-up after informed-consent discussion.

  **Cadence:** no scheduled EGD. Patient and clinician agree to a
  defined list of red-flag symptoms that trigger prompt diagnostic
  EGD:
    - New or worsening dysphagia beyond baseline achalasia dysphagia
    - Regurgitation of blood-tinged material or frank hematemesis
    - Unintentional weight loss >5-10%
    - New retrosternal pain unresponsive to standard achalasia
      management
    - Iron-deficiency anemia of unclear etiology

  **Not appropriate for:**
    - Patients with megaesophagus (>6 cm diameter on barium swallow)
    - Patients with documented food retention or candida esophagitis on
      prior EGD
    - Patients with smoking history or heavy alcohol use (additive SCC
      risk factors)
    - Patients with family history of esophageal cancer
    - Patients >10-15y from achalasia onset who meet standard
      surveillance-eligibility thresholds (these should default to the
      standard-track unless declining)

  Per CHARTER §11 patient-autonomy framing: surveillance benefit is
  meaningful but rests on cohort (not RCT) evidence, and the absolute
  SCC incidence remains low per individual-year (~0.3-1%/year after
  the latency window). An informed-consent choice of symptom-driven
  observation is defensible. Patient retains option to upgrade to
  scheduled surveillance at any future visit.

  **Alarm features** route immediately to diagnostic EGD with biopsies
  — and if SCC is confirmed, to the treatment-persona algorithm via
  DIS-ESOPHAGEAL.

rationale_ua: >
  Альтернативно-трекова Indication — компаньйон до
  IND-ACHALASIA-ESOPHAGEAL-PREVENTION-SURVEILLANCE. Доречно для
  пацієнтів з підтвердженою ахалазією, які обирають мінімальної
  інтенсивності спостереження з причин: вартість / доступ, нещодавній
  (<5 років) діагноз ахалазії де SCC латентність робить routine
  surveillance lower-yield, важка процедурна тривога, похилий вік з
  обмеженою тривалістю життя, або явна перевага symptom-driven
  follow-up після informed-consent обговорення.

  **Частота:** немає планової EGD. Пацієнт та клініцист погоджуються
  на визначений список red-flag симптомів, що триггерують prompt
  діагностичну EGD:
    - Нова або погіршена дисфагія понад baseline дисфагію ахалазії
    - Регургітація blood-tinged матеріалу або frank гематемезис
    - Ненавмисне схуднення >5-10%
    - Новий ретростернальний біль не реагує на стандартний achalasia-
      менеджмент
    - Залізодефіцитна анемія неясної етіології

  **Не доречно для:**
    - Пацієнтів з мегаезофагом (>6 см на barium swallow)
    - Пацієнтів з документованою затримкою їжі або candida-езофагітом
    - Пацієнтів з історією куріння або важкого вживання алкоголю
    - Пацієнтів з сімейним анамнезом раку стравоходу
    - Пацієнтів через >10-15 років після початку ахалазії, що
      відповідають стандартному surveillance-eligibility

  Per CHARTER §11 framing автономії пацієнта: користь surveillance
  meaningful, але базується на cohort (не RCT) доказах, а абсолютна
  SCC incidence залишається низькою per individual-year (~0.3-1%/рік
  після latency вікна). Informed-consent вибір symptom-driven
  observation legitimate. Пацієнт зберігає опцію upgrade.

  **Alarm features** маршрутизують негайно до діагностичної EGD з
  біопсіями — і якщо SCC підтверджено, до treatment-persona алгоритму
  через DIS-ESOPHAGEAL.

