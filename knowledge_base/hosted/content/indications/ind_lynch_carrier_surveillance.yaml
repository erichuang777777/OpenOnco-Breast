rationale: >
  Standard-track confirmed-carrier surveillance pathway for individuals
  with a documented germline MMR / EPCAM pathogenic variant. The
  surveillance protocol below assumes the genetic-test question is
  already settled — pre-test counseling, panel testing, and variant
  classification have all been completed prior to this Indication
  firing.

  **Colorectal (all genes):** Colonoscopy q1-2 years starting age 25,
  or 10 years before the youngest CRC diagnosis in the family
  (whichever is earlier). Targeted polypectomy with histologic review
  of all polyps; expert pathologist review of adenomas / serrated
  lesions. Cadence shortens to annual after age 40 or with any
  adenoma history.

  **Endometrial / ovarian (women):** Endometrial sampling + TVUS
  q1-2 years starting age 30-35 (NCCN protocol; evidence-base modest
  but recommended). Patient education on abnormal uterine bleeding —
  early presentation is the strongest factor in mortality reduction.
  Ovarian surveillance via TVUS + CA-125 is offered but documented to
  have poor sensitivity for early-stage disease — discussed
  honestly. Risk-reducing hysterectomy / BSO post-childbearing
  age 40 is the INTENSIFIED-track option (IND-LYNCH-CARRIER-
  INTENSIFIED), not surfaced as standard-protocol routine.

  **Urothelial:** Annual urinalysis starting age 30-35 (low-cost,
  low-yield, but standard-of-care). Microhematuria triggers urology
  referral with cystoscopy + urine cytology. Annual cytology is
  optional (low sensitivity; positive findings useful when present).

  **Upper GI (gastric / small bowel / duodenum):** EGD q3-5 years
  starting age 40 (consider earlier if family history of gastric
  cancer or H. pylori positive — eradicate H. pylori before
  surveillance regardless of carrier status).

  **Pancreatic (PDAC):** No routine pancreatic surveillance unless
  ≥2 first / second-degree relatives with pancreatic adenocarcinoma —
  if present, referral to pancreatic-cancer high-risk surveillance
  program (EUS + MRCP annually per CAPS consensus). Discussion
  documented even when criteria not met.

  **Skin (Muir-Torre variant — MLH1 / MSH2 predominantly):** Annual
  dermatology examination, with attention to sebaceous neoplasms
  (sebaceous adenoma, sebaceoma, sebaceous carcinoma) and
  keratoacanthomas.

  **Brain (Turcot variant — MLH1 / PMS2 predominantly):** Periodic
  symptom-directed neurologic assessment; no routine MRI brain
  surveillance recommended in adults (low yield, harm from
  incidentalomas).

  **CAPP2 aspirin context:** Daily aspirin (300-600 mg) for ≥2 years
  reduces CRC incidence in confirmed Lynch carriers per CAPP2 trial
  (Burn et al. 2020 follow-up). Standard-track Indication mentions
  this as a topic for HCP discussion but does NOT auto-prescribe.
  Aspirin is surfaced more prominently in the INTENSIFIED track
  (IND-LYNCH-CARRIER-INTENSIFIED).

  **Cascade testing:** Confirmed carrier status mandates cascade
  testing offer to all first-degree relatives + cousins on the
  affected line. This is a counseling responsibility surfaced at every
  surveillance visit, not a one-time conversation.

  Per CHARTER §11 patient-autonomy framing: surveillance schedules
  are shared-decision-making with the patient and family. Cadence
  individualization (e.g., q1y colonoscopy if polyp history;
  baseline EGD before age 40 if family history dictates) is
  appropriate.

rationale_ua: >
  Стандартний-трек шлях спостереження підтверджених носіїв для осіб з
  задокументованим гермінативним патогенним варіантом MMR / EPCAM.
  Протокол спостереження нижче припускає, що питання генетичного
  тестування вже вирішене — pre-test консультування, панельне
  тестування та класифікація варіантів виконані до спрацювання цієї
  Indication.

  **Колоректальне (всі гени):** Колоноскопія q1-2 роки з 25-річного
  віку або 10 років до наймолодшого КРР діагнозу в сім'ї (що раніше).
  Targeted поліпектомія з гістологічним оглядом усіх поліпів; огляд
  експертом-патологом аденом / serrated уражень. Cadence коротшає до
  щорічної після 40 років або при будь-якому анамнезі аденом.

  **Ендометрій / яєчники (жінки):** Біопсія ендометрію + TVUS q1-2
  роки з 30-35 років (NCCN протокол; доказова база помірна, але
  рекомендована). Освіта пацієнтки щодо аномальної маткової кровотечі
  — раннє звернення — найсильніший фактор зменшення смертності.
  Спостереження яєчників через TVUS + CA-125 пропонується, але має
  погану чутливість для ранніх стадій — обговорюється чесно.
  Risk-reducing гістеректомія / BSO post-childbearing вік 40 — це
  опція INTENSIFIED-треку (IND-LYNCH-CARRIER-INTENSIFIED), не
  surfaced як стандарт-протокол routine.

  **Уротеліальне:** Щорічний аналіз сечі з 30-35 років (низьковартісно,
  низькоурожайно, але standard-of-care). Мікрогематурія викликає
  направлення до урології з цистоскопією + цитологія сечі. Щорічна
  цитологія опціональна.

  **Верхнє GI (шлунок / тонка кишка / duodenum):** EGD q3-5 років з
  40 років (раніше при сімейній історії раку шлунка або H. pylori
  позитивному — ерадикувати H. pylori перед спостереженням незалежно
  від статусу носія).

  **Підшлункова (PDAC):** Без рутинного панкреатичного спостереження,
  крім випадків ≥2 родичів першого / другого ступеня з PDAC — тоді
  направлення на high-risk panreatic програму (EUS + MRCP щорічно).

  **Шкіра (Muir-Torre варіант — переважно MLH1 / MSH2):** Щорічний
  огляд дерматолога, з увагою до sebaceous новоутворень та
  кератоакантом.

  **CAPP2 аспірин:** Щоденний аспірин (300-600 мг) ≥2 роки зменшує
  захворюваність КРР у підтверджених Lynch-носіїв (CAPP2 trial).
  Стандартний-трек згадує це як тему для обговорення HCP, але НЕ
  auto-prescribes. Більш помітно surfaced в INTENSIFIED-треку.

  **Cascade тестування:** Підтверджений статус носія вимагає
  пропонування cascade тестування всім родичам першого ступеня +
  кузенам на ураженій лінії.

  Per CHARTER §11 framing автономії пацієнта.

