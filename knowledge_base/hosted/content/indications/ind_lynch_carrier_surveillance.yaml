    position: supports
    relevant_quote_paraphrase: >-
      "Individuals with confirmed germline MMR / EPCAM pathogenic
      variants enter intensive multi-organ surveillance with
      colonoscopy q1-2y from age 25 (or 10y before youngest family
      CRC), endometrial sampling + TVUS for women q1-2y from 30-35,
      annual urinalysis, EGD q3-5y from 40, and pancreatic
      surveillance restricted to families with ≥2 affected first-
      degree relatives."
  - source_id: SRC-ASCO-ACMG-LYNCH-2014
    position: supports
    relevant_quote_paraphrase: >-
      "Confirmed Lynch carriers should be enrolled in a structured
      surveillance program; ACMG / ASCO recommend cascade testing of
      first-degree relatives and surveillance modeled on gene-specific
      penetrance estimates."
  - source_id: SRC-ESMO-CRC-2024
    position: supports
    relevant_quote_paraphrase: >-
      "Lynch syndrome carriers should have colonoscopy with adenoma
      removal every 1-2 years; aspirin chemoprophylaxis may be
      offered per CAPP2 trial data following individualized
      discussion."

do_not_do:
  - "Не пропускати cascade-тестування first-degree родичів — кожен візит спостереження має документувати статус відмови / погодження сім'ї."
  - "Не використовувати general-population screening cadence (10-річна колоноскопія) для Lynch-носія — q1-2y є мінімальним стандартом."
  - "Не пропонувати risk-reducing гістеректомію / BSO як стандартну частину surveillance — це INTENSIFIED-трек, з обговоренням репродуктивного планування та менопаузальних наслідків."
  - "Не auto-prescribe аспірин з підтвердженого носійства — це shared-decision-making, з оцінкою кровотечного ризику, GI / ниркової функції, конкомітантної терапії; CAPP2 дані ефективніші у MLH1 / MSH2."
  - "Не презентувати CA-125 + TVUS як ефективний скринінг яєчників — обмежена чутливість для ранніх стадій; framing має бути чесним."

do_not_do_en:
  - "Do not skip cascade testing of first-degree relatives — every surveillance visit should document the family's status of accepting / declining genetic testing."
  - "Do not use general-population screening cadence (10-year colonoscopy) for a confirmed Lynch carrier — q1-2y is the floor."
  - "Do not offer risk-reducing hysterectomy / BSO as standard surveillance — this is the INTENSIFIED track and requires reproductive-planning and menopausal-sequelae discussion."
  - "Do not auto-prescribe aspirin from confirmed carrier status — shared-decision-making with bleeding-risk, GI / renal function, and concomitant-therapy assessment; CAPP2 data stronger in MLH1 / MSH2 carriers than MSH6 / PMS2."
  - "Do not present CA-125 + TVUS as effective ovarian screening — sensitivity for early-stage high-grade serous carcinoma is poor; framing must be honest."

