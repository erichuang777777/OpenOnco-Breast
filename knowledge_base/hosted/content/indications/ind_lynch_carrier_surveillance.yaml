expected_outcomes:
  overall_response_rate: >-
    NCCN Genetic / Familial High-Risk: Colorectal surveillance in
    confirmed Lynch carriers reduces CRC mortality by ~70% (modeled
    estimates; colonoscopy q1-2y removes adenomas before invasive
    transformation). Endometrial surveillance (sampling + TVUS) has
    modest evidence base but is recommended q1-2y from age 30-35 in
    women. Upper-GI EGD detects early gastric cancer in MLH1 / MSH2
    families. Urinalysis is low-cost, low-yield but high-utility when
    positive (microhematuria triggers cystoscopy). Pancreatic
    surveillance via EUS / MRI is restricted to families with ≥2
    affected first-degree relatives per consensus guidelines (CAPS
    consortium).

