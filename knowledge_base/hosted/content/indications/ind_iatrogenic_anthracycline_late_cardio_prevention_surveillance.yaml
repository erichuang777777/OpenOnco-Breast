do_not_do:
  - "Не використовувати general post-completion echo schedule для виживачів ≥5р — COG-LTFU late-effects cadence суттєво відрізняється і керується ризик-стратумом (доза + chest RT + age at exposure)."
  - "Не покладатися лише на LVEF без GLS у цій когорті — GLS катує subclinical dysfunction на роки раніше."
  - "Не нормалізувати mild dyspnea на exertion як 'deconditioning' у anthracycline-exposed survivors — varrants stat echo."
  - "Не пропускати pregnancy planning counseling — pregnancy hemodynamic load може unmask subclinical cardiotoxicity."
  - "Не вважати asymptomatic LV dysfunction 'wait + watch' — early ACE inhibitor + beta-blocker може stabilize або reverse."

do_not_do_en:
  - "Do not use the general post-completion echo schedule for survivors ≥5y post-treatment — COG-LTFU late-effects cadence differs substantially and is risk-stratum-driven (dose + chest RT + age at exposure)."
  - "Do not rely on LVEF alone without GLS in this cohort — GLS catches subclinical dysfunction years earlier."
  - "Do not normalize mild dyspnea on exertion as 'deconditioning' in anthracycline-exposed survivors — warrants stat echo."
  - "Do not skip pregnancy planning counseling — pregnancy hemodynamic load can unmask subclinical cardiotoxicity."
  - "Do not treat asymptomatic LV dysfunction as 'wait + watch' — early ACE inhibitor + beta-blocker can stabilize or reverse it."

