rationale: >
  Standard-track late-effects cardiac surveillance for cancer survivors
  ≥5y post-completion of treatment that included cumulative anthracycline
  exposure ≥250 mg/m². Components per Children's Oncology Group Long-Term
  Follow-Up Guidelines (COG-LTFU) + ASCO Cardio-Oncology Survivorship +
  ESC 2022 Cardio-Oncology:

  **(1) Echo cadence by risk stratum (COG-LTFU-driven)** —
  - Standard risk (cumulative 250-400 mg/m², no chest RT, no comorbidities,
    age 18-50 at exposure): echo q5y lifelong from completion year 2
  - Higher risk (cumulative ≥400 mg/m², concurrent or sequential chest RT,
    pediatric exposure age <18, exposure age ≥65, HTN/DM/CAD comorbidities,
    concurrent trastuzumab during primary treatment): echo q1-2y lifelong
  - GLS surveillance preferred over isolated LVEF — earlier subclinical
    dysfunction detection

  **(2) Biomarker complement** — BNP / NT-proBNP at routine
  survivorship visits; rising trend triggers stat echo regardless of
  schedule.

  **(3) Symptom-vigilance education** — Dyspnea on exertion, orthopnea,
  paroxysmal nocturnal dyspnea, lower-extremity edema, fatigue out of
  proportion → stat echo + BNP + cardiology referral. Do NOT normalize
  mild exertional dyspnea as "deconditioning" in this cohort.

  **(4) Early intervention threshold** —
  - GLS decline >15% from baseline OR LVEF decline >10% absolute AND
    LVEF <50%: cardiology referral
  - Initiate ACE inhibitor (enalapril, lisinopril) ± beta-blocker
    (carvedilol, bisoprolol)
  - SGLT2 inhibitor (dapagliflozin, empagliflozin) per emerging cancer-
    therapy-related cardiac dysfunction evidence
  - HF specialist consultation for sustained LV decline

  **(5) Cardioprotective lifestyle counseling** —
  - Smoking cessation (compounds CV risk)
  - HTN + DM + lipid control per primary care (lower thresholds
    appropriate in this cohort)
  - Physical activity per HHS guidelines (cardioprotective + cancer-
    survivor benefit)
  - Alcohol moderation

  **(6) Pregnancy planning counseling** for women of reproductive age —
  pregnancy hemodynamic load can unmask subclinical cardiotoxicity;
  pre-conception cardiology + cardio-OB referral.

  **(7) Concurrent t-AML / leukemia surveillance** — anthracyclines are
  topoisomerase-II inhibitors; CBC q1y recommended (overlap with
  RF-IATROGENIC-TOPO2-TAML-PREVENTION when both fire).

  Distinct from IND-IATROGENIC-ANTHRACYCLINE-CARDIO-PREVENTION-
  SURVEILLANCE (general post-completion surveillance): this Indication
  applies specifically to survivors ≥5y post-treatment where COG-LTFU
  late-effects cadence supersedes general post-completion baseline echo
  schedule.

rationale_ua: >
  Стандартний-трек late-effects cardiac surveillance для виживачів
  раку ≥5р після завершення treatment з cumulative anthracycline
  exposure ≥250 мг/м². Components per COG-LTFU + ASCO Cardio-Oncology
  Survivorship + ESC 2022 Cardio-Oncology:

  **(1) Echo cadence по risk stratum (COG-LTFU-driven)** —
  - Standard risk: echo q5y lifelong від completion year 2
  - Higher risk (≥400 мг/м², chest RT, pediatric exposure <18, exposure
    ≥65, HTN/DM/CAD, trastuzumab): echo q1-2y lifelong
  - GLS surveillance preferred над isolated LVEF

  **(2) Biomarker complement** — BNP / NT-proBNP при routine
  survivorship visits; rising trend → stat echo.

  **(3) Symptom-vigilance education** — Dyspnea, orthopnea, PND, edema,
  fatigue → stat echo + BNP + cardiology referral.

  **(4) Early intervention threshold** —
  - GLS decline >15% або LVEF decline >10% з LVEF <50%: cardiology
    referral, ACE inhibitor ± beta-blocker, SGLT2-i

  **(5) Cardioprotective lifestyle counseling** — smoking cessation,
  HTN/DM/lipid control, physical activity, alcohol moderation.

  **(6) Pregnancy planning counseling** — pre-conception cardiology
  + cardio-OB.

  **(7) Concurrent t-AML / leukemia surveillance** — CBC q1y; overlap
  з RF-IATROGENIC-TOPO2-TAML-PREVENTION.

  Відрізняється від IND-IATROGENIC-ANTHRACYCLINE-CARDIO-PREVENTION-
  SURVEILLANCE (general post-completion): цей IND застосовується
  специфічно до виживачів ≥5р post-treatment де COG-LTFU late-effects
  cadence заміщує general post-completion baseline echo schedule.

