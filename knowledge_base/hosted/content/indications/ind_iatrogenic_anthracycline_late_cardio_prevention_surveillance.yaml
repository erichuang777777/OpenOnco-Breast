expected_outcomes:
  overall_response_rate: "Childhood Cancer Survivor Study (CCSS): pediatric anthracycline-exposed survivors with cumulative ≥250 mg/m² have 5-15× HF risk vs. siblings at 30y follow-up. COG-LTFU + ASCO Cardio-Oncology echo surveillance detects asymptomatic LV dysfunction (GLS / LVEF decline) enabling early ACE inhibitor / beta-blocker / SGLT2-i — can stabilize or partially reverse early cardiotoxicity. Outcomes substantially better with surveillance-detected early-stage vs. late symptomatic HF presentation. Adult survivor cohorts (Hodgkin lymphoma, breast cancer adjuvant AC/EC) show similar benefit pattern though absolute incidence lower than pediatric exposure."

