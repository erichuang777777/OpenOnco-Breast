do_not_do:
  - "Не пропускати treatment summary document — це foundation для exposure-driven survivorship cadence."
  - "Не використовувати general-population screening cadence для exposed survivors — chest-RT-exposed female потребує breast MRI з 25 років, не q2р мамографію з 40."
  - "Не deny survivorship-program access на основі primary-cancer-cured framing — late-effect mortality є substantial axis окрема від primary-cancer recurrence."
  - "Не пропускати psychosocial / reproductive-health surveillance — депресія / anxiety / cancer-related PTSD subjective але quantifiable harms у survivor cohort."
  - "Не нормалізувати cardiotoxicity symptoms (dyspnea, exercise intolerance, edema) у anthracycline / chest-RT-exposed cohort — late-onset cardiomyopathy може maніфестувати десятиліттями post-treatment."

do_not_do_en:
  - "Do not skip the treatment summary document — it is the foundation for exposure-driven survivorship cadence."
  - "Do not use general-population screening cadence for exposed survivors — chest-RT-exposed females need breast MRI from age 25, not q2y mammography from 40."
  - "Do not deny survivorship-program access on the basis of primary-cancer-cured framing — late-effect mortality is a substantial axis separate from primary-cancer recurrence."
  - "Do not skip psychosocial / reproductive-health surveillance — depression / anxiety / cancer-related PTSD are subjective but quantifiable harms in the survivor cohort."
  - "Do not normalize cardiotoxicity symptoms (dyspnea, exercise intolerance, edema) in the anthracycline / chest-RT-exposed cohort — late-onset cardiomyopathy can manifest decades post-treatment."

