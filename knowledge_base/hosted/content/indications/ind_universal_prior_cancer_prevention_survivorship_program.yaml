rationale: >
  Standard-track prevention pathway for any cancer survivor with
  treatment completed. Structured survivorship surveillance
  program enrollment per NCCN Survivorship 2025 + COG-LTFU v5.0
  Guidelines (children + young-adult survivors) treatment-summary-
  driven cadence.

  **(1) Treatment summary + survivorship care plan.** Document
  primary cancer (site, histology, stage, year of diagnosis);
  treatment exposures (chemotherapy agents + cumulative doses,
  radiation fields + cumulative doses, surgical procedures,
  hematologic-stem-cell-transplant if applicable); late-effect
  risk-stratification matrix per COG-LTFU / NCCN. This document
  drives subsequent surveillance cadence.

  **(2) Cardiotoxicity surveillance.**
  - Anthracycline cumulative dose ≥250 mg/m² doxorubicin
    equivalent OR chest-RT ≥30 Gy: echocardiogram baseline +
    q5y for asymptomatic; q1-2y if high-exposure (anthracycline
    >300 + chest-RT) OR if ejection-fraction declining.
  - HER2-targeted therapy (trastuzumab) exposure: echocardiogram
    baseline + q3-6mo during therapy + q1y post-therapy ×5y.
  - Per ASE / EACVI + ESMO cardio-oncology guidelines.

  **(3) Secondary-malignancy screening intensification.**
  - Chest-RT (≥30 Gy): breast MRI q1y starting age 25 or 8y
    post-RT whichever later, alternating with mammogram q6mo
    from age 30. CCSS + Hodgkin survivor cohort: breast-cancer
    SIR ~6-12 in chest-RT-exposed survivors.
  - Abdominal / pelvic RT: colonoscopy starting age 35 or 5y
    after RT whichever earlier; cadence q5y.
  - Neck RT: thyroid US baseline + q3y; thyroid-cancer SIR ~2-4
    in neck-RT-exposed survivors.
  - Cranial RT: brain MRI symptom-prompted only (no routine
    asymptomatic screening); CNS-malignancy SIR ~5-10 in
    cranial-RT-exposed survivors.
  - Cyclophosphamide cumulative dose ≥50 g: urine cytology
    annually + cystoscopy symptom-prompted (urothelial-bladder-
    cancer SIR ~7-10).
  - Alkylator + topoisomerase-II inhibitor + TBI exposure: CBC
    + smear q6-12mo (t-MDS / AML risk).

  **(4) Late-effects endocrine + bone-mineral-density
  surveillance.**
  - Neck RT: TSH q1y; thyroid-function tests; thyroid US.
  - Cranial RT or TBI: pituitary axis evaluation q1y (growth-
    hormone deficiency, hypogonadism, secondary adrenal
    insufficiency, central hypothyroidism).
  - Alkylator + TBI pre-menopausal women: ovarian-function
    assessment (AMH, FSH, estradiol) for premature ovarian
    insufficiency.
  - Alkylator-exposed men: semen analysis pre-fatherhood;
    discuss sperm cryopreservation pre-treatment (this is
    pre-treatment counseling, not survivorship).
  - DEXA at age-appropriate cadence + earlier in cohort with
    hypogonadism, hypothyroidism, prolonged steroid exposure,
    or TBI.

  **(5) Psychosocial + reproductive-health surveillance.**
  Annual screening for depression / anxiety / cancer-related
  PTSD; sexual-function evaluation; reproductive-counseling
  for those of reproductive age; financial-toxicity assessment.

  **(6) Lifestyle counseling.** WCRF / AICR survivor-specific
  recommendations (similar to primary-prevention recommendations:
  body weight, physical activity, dietary pattern, alcohol
  moderation, no tobacco) — observational evidence supports
  improved survival in cohort adherence to these recommendations.

  **Anchor disease:** colorectal cancer chosen as canonical
  anchor because (a) CRC surveillance is the most-commonly-
  modified screening cadence in cancer survivors (abdominal /
  pelvic RT exposure cohort), (b) USPSTF baseline (q10y
  colonoscopy) is a familiar cadence for individualization,
  (c) secondary CRC is a documented late-effect in pediatric
  cancer survivors + adult abdominal RT survivors. Cardiotoxicity,
  breast secondary-malignancy, thyroid, urothelial, hematologic
  surveillance covered in the rationale.

rationale_ua: >
  Стандартний-трек prevention шлях для будь-якого cancer survivor
  з treatment completed. Structured survivorship surveillance
  program enrollment per NCCN Survivorship 2025 + COG-LTFU v5.0.

  **(1) Treatment summary + survivorship care plan.** Document
  primary cancer (site, histology, stage); treatment exposures
  (chemo agents + cumulative doses, radiation fields + doses,
  surgery, HSCT); late-effect risk-stratification per COG-LTFU /
  NCCN.

  **(2) Cardiotoxicity surveillance** per anthracycline / chest-RT
  exposure.

  **(3) Secondary-malignancy screening intensification:**
  - Chest-RT (≥30 Gy): breast MRI q1р з 25 років або 8р post-RT.
  - Abdominal / pelvic RT: колоноскопія з 35 років або 5р post-RT.
  - Neck RT: thyroid US baseline + q3р.
  - Cranial RT: brain MRI symptom-prompted only.
  - Cyclophosphamide ≥50 г cumulative: urine cytology q1р.
  - Alkylator + topoisomerase-II + TBI: CBC + smear q6-12 міс.

  **(4) Late-effects endocrine + bone-mineral-density
  surveillance** per neck RT / cranial RT / TBI / alkylator
  exposure.

  **(5) Psychosocial + reproductive-health surveillance.**

  **(6) Lifestyle counseling** WCRF / AICR survivor-specific.

  **Анкор-захворювання:** colorectal cancer — найчастіше-modified
  screening cadence у survivors (abdominal / pelvic RT cohort).

