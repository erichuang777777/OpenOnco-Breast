expected_outcomes:
  overall_response_rate: >-
    Structured survivorship surveillance program enrollment (NCCN
    Survivorship 2025 + COG-LTFU v5.0 treatment-summary-driven
    cadence) achieves: (1) cardiotoxicity surveillance per
    anthracycline / chest-RT exposure (echocardiogram baseline +
    q5y for low-exposure, q1-2y for high-exposure per ASE / EACVI
    + ESMO cardio-oncology); (2) secondary-malignancy screening
    intensification per exposure profile (breast MRI q1y for
    chest-RT-exposed female Hodgkin survivors starting age 25 or
    8y post-RT whichever later, per NCCN; CRC colonoscopy starting
    age 35 or 5y after abdominal/pelvic-RT whichever earlier);
    (3) late-effects endocrine surveillance (TSH q1y for neck-RT-
    exposed, ovarian-function assessment for alkylator + TBI-
    exposed pre-menopausal women, bone-density DEXA at age-
    appropriate cadence); (4) psychosocial + reproductive-health
    surveillance. Per CCSS + COG-LTFU long-term cohort studies:
    structured-program engagement reduces late-effect-related
    mortality ~30-40% vs ad-hoc primary-care follow-up.

