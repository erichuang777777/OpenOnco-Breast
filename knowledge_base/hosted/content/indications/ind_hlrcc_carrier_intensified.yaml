rationale: >
  Alternative-track for HLRCC carriers with prior renal interventions or
  aggressive fibroid phenotype. Intensified q6 month abdominal MRI cadence +
  early hysterectomy discussion in women with refractory fibroid symptoms.
  Per CHARTER §11.

