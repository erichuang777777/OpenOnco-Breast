id: IND-RADON-PREVENTION-OBSERVATION
plan_track: surveillance
intent: prevention

applicable_to:
  disease_id: DIS-NSCLC
  stage_requirements: []
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 3

triggered_by_redflags:
  - RF-RADON-MALIGNANCY-PREVENTION

recommended_regimen: null
concurrent_therapy: []
followed_by: []

evidence_level: low
strength_of_recommendation: conditional
nccn_category: "2B"

expected_outcomes:
  overall_response_rate: "Without radon mitigation: continued elevated lung cancer risk. Routine general-population USPSTF screening (no radon-adjustment) captures some early-stage cases but lower sensitivity than radon-adjusted LDCT schedule."

hard_contraindications: []
red_flags_triggering_alternative: []
required_tests:
  - TEST-CBC
desired_tests: []

rationale: >
  Alternative-track companion to IND-RADON-PREVENTION-MITIGATION-AND-SCREENING.
  Patient declines radon mitigation (cost, rental status, structural constraints)
  but accepts routine general-population USPSTF lung screening cadence. Smoking
  cessation counseling continues. Per CHARTER §11 patient-autonomy framing.

rationale_ua: >
  Альтернативно-трекова Indication — компаньйон до IND-RADON-PREVENTION-
  MITIGATION-AND-SCREENING. Пацієнт відмовляється від radon mitigation (вартість,
  rental статус, структурні обмеження), але приймає routine general-population
  USPSTF lung screening cadence. Smoking cessation counseling продовжується.
  Per CHARTER §11 framing автономії пацієнта.

ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_v03_completion
draft_revision: 1

sources:
