    position: context

do_not_do:
  - "Не презентувати observation як еквівалент mitigation + LDCT — incidence-reduction відсутній."
  - "Не пропускати smoking cessation counseling — це найбільш впливова інтервенція незалежно від mitigation статусу."
  - "Не використовувати цей шлях у occupational uranium miners — їх ризик значно вищий, потрібна агресивна surveillance."

do_not_do_en:
  - "Do not present observation as equivalent to mitigation + LDCT — incidence-reduction is absent."
  - "Do not skip smoking cessation counseling — it is the most impactful intervention regardless of mitigation status."
  - "Do not use this pathway in occupational uranium miners — their risk is substantially higher, aggressive surveillance is needed."

