expected_outcomes:
  overall_response_rate: >-
    Empirical multi-organ MEN1 surveillance (parathyroid biochemistry
    q1y from age 5; pituitary biochemistry q1y from age 5; pituitary
    MRI q3y from age 5; GEP-NET biochemistry + abdominal MRI q1y from
    age 10; chest CT q1-2y from age 20): expected to capture clinically
    actionable lesions at earliest detectable stage in the subset who
    are actual MEN1 carriers (~30-90% of pedigree-suspicion individuals
    depending on phenotype stringency). Does NOT carry the diagnostic
    certainty of genetic testing — non-carriers receive a substantial
    surveillance burden that could have been safely declined (including
    cumulative MRI / CT exposure), and cascade-testing benefit for
    relatives is lost.

