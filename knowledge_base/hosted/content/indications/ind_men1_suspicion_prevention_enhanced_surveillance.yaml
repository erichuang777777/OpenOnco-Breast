rationale: >
  Alternative-track companion to IND-MEN1-SUSPICION-PREVENTION-GENETIC-
  COUNSELING. Patient with pedigree suspicion of MEN1 who declines
  genetic counseling and/or germline MEN1 testing — for any reason
  (cost, insurance concerns, psychological / anxiety considerations,
  family privacy, geographic access constraints) — is offered
  empirical multi-organ surveillance applied as if MEN1 were
  confirmed:

  **Parathyroid:** Annual serum calcium + intact PTH starting age 5
  (or earlier in known-pathogenic-variant families where confirmed
  testing was declined). Primary hyperparathyroidism is the earliest
  and most penetrant MEN1 manifestation; biochemistry-only screening
  is inexpensive and high-yield.

  **Pituitary:** Annual prolactin + IGF-1 starting age 5; pituitary
  MRI q3-5 years starting age 5 (lower-intensity than the carrier-
  confirmation q3y protocol because pre-test probability is lower).
  Symptom-driven imaging escalation (headache, visual change, growth
  acceleration, galactorrhea, amenorrhea).

  **GEP-NETs:** Annual chromogranin-A + fasting gastrin + fasting
  glucose / insulin + pancreatic-polypeptide starting age 10. Annual
  abdominal MRI starting age 15 (lower-intensity than the carrier-
  confirmation age-10 start because pre-test probability is lower and
  cumulative MRI burden warrants more caution). EUS as adjunct if
  MRI ambiguous.

  **Chest CT:** Q1-2 years from age 25 in adolescent / young-adult
  men with pedigree suspicion of MEN1 (thymic NET surveillance —
  this is the highest-stakes empirical recommendation because thymic
  NETs are aggressive in male MEN1 carriers and mortality benefit
  of pre-symptomatic detection is documented). Discuss radiation
  burden in shared decision-making.

  **Adrenal:** Captured incidentally on abdominal MRI; biochemistry
  only if mass detected.

  Per CHARTER §11 patient-autonomy framing: genetic testing is a
  shared-decision-making domain. Patients who decline testing retain
  access to surveillance benefit, with the caveat that empirical
  surveillance lacks the diagnostic precision of confirmed genetic
  status — and the cascade-testing benefit for relatives is lost.
  Periodic re-discussion of testing is appropriate; this pathway does
  not preclude future genetic testing.

  Routing reconsiderations: if patient eventually accepts germline
  testing, results reroute to (a) confirmed-carrier pathway, (b)
  general-population pathway, or (c) continued pedigree-suspicion if
  VUS.

rationale_ua: >
  Альтернативно-трекова Indication — компаньйон до IND-MEN1-SUSPICION-
  PREVENTION-GENETIC-COUNSELING. Пацієнт з родовідною підозрою на
  MEN1, який відмовляється від генетичного консультування та/або
  germline MEN1-тестування — з будь-якої причини (вартість, страхові
  міркування, психологічні / тривожні міркування, сімейна приватність,
  географічні обмеження доступу) — отримує empіричне мульти-органне
  спостереження як якщо б MEN1 був підтверджений:

  **Паращитоподібні залози:** Щорічний сироватковий кальцій + інтактний
  PTH з 5 років. Первинний гіперпаратиреоз — найраніший і найбільш
  пенетрантний прояв MEN1; біохімічний-only скринінг недорогий і
  високо-виходний.

  **Гіпофіз:** Щорічні пролактин + IGF-1 з 5 років; MRI гіпофіза
  q3-5 років з 5 років (менш інтенсивно ніж протокол при підтвердженому
  носійстві q3y, бо pre-test probability нижча). Symptom-driven
  ескалація візуалізації (головний біль, зміна зору, прискорення
  росту, галакторея, аменорея).

  **GEP-NET:** Щорічні хромогранін-A + натще гастрин + натще глюкоза /
  інсулін + панкреатичний поліпептид з 10 років. Щорічне MRI абдомену
  з 15 років (менш інтенсивно ніж протокол при підтвердженому носійстві
  з 10 років, бо pre-test probability нижча, і кумулятивний MRI тягар
  виправдовує більшу обережність). EUS як ад'ювант якщо MRI
  неоднозначна.

  **CT грудної клітки:** Q1-2 роки з 25 років у юнаків / молодих
  чоловіків з родовідною підозрою на MEN1 (тимічне NET спостереження
  — це highest-stakes empіричне рекомендація, бо тимічні NET агресивні
  у чоловіків-носіїв MEN1 і mortality benefit pre-symptomatic
  detection документовано). Обговорення радіаційного тягаря в
  shared decision-making.

  **Наднирники:** Фіксуються інцидентально на MRI абдомену; біохімія
  лише при виявленні утворення.

  Per CHARTER §11 framing автономії пацієнта.

  Reroute: якщо пацієнт врешті приймає germline тестування,
  результати маршрутизуються до (а) confirmed-carrier шлях, (б)
  general-population шлях, або (в) продовжена pedigree-підозра при VUS.

