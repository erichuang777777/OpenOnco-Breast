do_not_do:
  - "Не презентувати enhanced surveillance як еквівалент genetic confirmation — diagnostic precision відсутня; cascade-testing benefit для родичів втрачається."
  - "Не починати дитячий MRI-протокол (пітуітарний / абдомінальний) у emp​іричному спостереженні без підтвердженого носійства або сильного біохімічного сигналу — кумулятивний MRI тягар + ризик седації у дитини мають бути збалансовані."
  - "Не пропускати periodic re-discussion про genetic testing — більшість пацієнтів врешті приймають тестування після додаткових візитів та зменшення тривоги."
  - "Не використовувати 68Ga-DOTATATE PET / CT рутинно у emp​іричному спостереженні — це staging-tool для виявленої пухлини, не скринінг-tool у asymptomatic родовідно-підозрюваних."
  - "Не пропускати щорічний кальцій + PTH у дітей з 5 років — це єдиний дешевий, безпечний і високо-виходний empіричний-скринінг-крок; уникати його дезавальо лише на підставі відмови від genetic testing."

do_not_do_en:
  - "Do not present enhanced surveillance as equivalent to genetic confirmation — diagnostic precision is absent; cascade-testing benefit for relatives is lost."
  - "Do not initiate the pediatric MRI protocol (pituitary / abdominal) in empirical surveillance without confirmed carriage or a strong biochemical signal — cumulative MRI burden + sedation risk in a child must be balanced."
  - "Do not skip periodic re-discussion of genetic testing — most patients eventually accept testing after additional visits and reduced anxiety."
  - "Do not use 68Ga-DOTATATE PET / CT routinely in empirical surveillance — this is a staging tool for a detected tumor, not a screening tool in asymptomatic pedigree-suspicion."
  - "Do not skip annual calcium + PTH in children from age 5 — this is the single cheap, safe, high-yield empirical screening step; declining it solely because the family declined genetic testing is not warranted."

