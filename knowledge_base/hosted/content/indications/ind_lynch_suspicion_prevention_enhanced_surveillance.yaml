do_not_do:
  - "Не презентувати enhanced surveillance як еквівалент genetic confirmation — diagnostic precision відсутня."
  - "Не рекомендувати risk-reducing surgery без genetic confirmation — це necessitates a confirmed carrier diagnosis."
  - "Не пропускати periodic re-discussion про genetic testing — більшість пацієнтів врешті приймають тестування після додаткових візитів та зменшення тривоги."
  - "Не використовувати empirical pancreatic screening (EUS / MRI) routine у Lynch-suspicion без ≥2 first/second-degree-affected або additional syndrome overlap."

do_not_do_en:
  - "Do not present enhanced surveillance as equivalent to genetic confirmation — diagnostic precision is absent."
  - "Do not recommend risk-reducing surgery without genetic confirmation — these necessitate a confirmed carrier diagnosis."
  - "Do not skip periodic re-discussion of genetic testing — most patients eventually accept testing after additional visits and reduced anxiety."
  - "Do not use empirical pancreatic screening (EUS / MRI) routinely in Lynch suspicion without ≥2 first/second-degree-affected or additional syndrome overlap."

