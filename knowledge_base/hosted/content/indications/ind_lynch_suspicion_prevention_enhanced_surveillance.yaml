expected_outcomes:
  overall_response_rate: >-
    Empirical enhanced surveillance (colonoscopy q1-2y from age 25 or
    10y before youngest family CRC dx; endometrial surveillance):
    expected to capture cancer at earliest detectable stage in the
    subset who are actual carriers (~15-25% of pedigree-suspicion
    individuals). Does NOT carry the diagnostic certainty of genetic
    testing — carriers may receive unnecessary intensive surveillance
    when negative testing would have de-escalated, and non-carriers
    receive surveillance that could have been safely declined.

