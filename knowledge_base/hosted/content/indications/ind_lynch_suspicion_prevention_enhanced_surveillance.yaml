rationale: >
  Alternative-track companion to IND-LYNCH-SUSPICION-PREVENTION-GENETIC-
  COUNSELING. Patient with pedigree suspicion of Lynch syndrome who
  declines genetic counseling and/or germline testing — for any reason
  (cost, insurance concerns, psychological / anxiety considerations,
  family privacy, geographic access constraints) — is offered empirical
  enhanced surveillance applied as if Lynch were confirmed:

  **Colorectal:** Colonoscopy q1-2 years starting age 25 (or 10 years
  before youngest CRC dx in family, whichever is earlier). Removal of
  all polyps; histologic review for adenomas / serrated lesions.

  **Endometrial / ovarian (women):** Annual endometrial sampling +
  transvaginal ultrasound starting age 30-35 (NCCN protocol;
  evidence-base modest). Discussion of risk-reducing hysterectomy +
  BSO post-childbearing age 40+ (this is a major decision and should
  only be considered if genetic confirmation is later obtained or
  family history is very strong).

  **Urothelial:** Annual urinalysis ± urine cytology starting age 30-35.
  Low-threshold cystoscopy for hematuria.

  **Gastric:** Surveillance EGD q3-5y from age 30-35 (consider in
  families with multiple gastric cancers).

  **Pancreatic (PDAC):** No routine pancreatic screening unless ≥2
  first/second-degree affected family members or known FAMMM / Peutz-
  Jeghers overlap — referral to pancreatic-cancer high-risk
  surveillance program.

  Per CHARTER §11 patient-autonomy framing: genetic testing is a
  shared-decision-making domain. Patients who decline testing retain
  access to surveillance benefit, with the caveat that empirical
  surveillance lacks the diagnostic precision of confirmed genetic
  status. Periodic re-discussion of testing is appropriate; this
  pathway does not preclude future genetic testing.

  Routing reconsiderations: if patient eventually accepts genetic
  testing, results recoute to (a) confirmed-carrier pathway, (b)
  general-population pathway, or (c) continued pedigree-suspicion if
  VUS.

rationale_ua: >
  Альтернативно-трекова Indication — компаньйон до
  IND-LYNCH-SUSPICION-PREVENTION-GENETIC-COUNSELING. Пацієнт з
  родовідною підозрою на синдром Lynch, який відмовляється від
  генетичного консультування та/або germline тестування — з будь-якої
  причини (вартість, страхові міркування, психологічні / тривожні
  міркування, сімейна приватність, географічні обмеження доступу) —
  отримує empіричне посилене спостереження, як якщо б Lynch був
  підтверджений:

  **Колоректальне:** Колоноскопія q1-2 роки з 25-річного віку (або
  10 років до наймолодшого КРР діагнозу в сім'ї, що раніше). Видалення
  всіх поліпів; гістологічний огляд аденом / serrated уражень.

  **Ендометріальне / оваріальне (жінки):** Щорічна біопсія ендометрію
  + трансвагінальний ультразвук з 30-35 років (NCCN протокол; база
  доказів помірна). Обговорення risk-reducing гістеректомії + BSO
  post-childbearing вік 40+ (це велике рішення і має розглядатися
  лише якщо генетичне підтвердження пізніше отримано або сімейна
  історія дуже сильна).

  Per CHARTER §11 framing автономії пацієнта.

