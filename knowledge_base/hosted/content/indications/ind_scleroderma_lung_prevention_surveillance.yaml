sources:
  - source_id: SRC-NCCN-NSCLC-2025
    position: supports
    relevant_quote_paraphrase: >-
      "Lung cancer screening with annual low-dose CT is recommended for
      eligible high-risk individuals (USPSTF 2021 criteria). In patients
      with interstitial lung disease, incidental pulmonary nodules on
      surveillance HRCT are followed per Fleischner Society / Lung-RADS
      criteria."
  - source_id: SRC-NCCN-BCELL-2025
    position: context

do_not_do:
  - "Не використовувати HRCT як скрінінг-тест у asymptomatic SSc без ILD — низький yield, accumulated radiation; PFTs + clinical reassessment достатньо."
  - "Не ігнорувати DLCO ↓ >15% або FVC ↓ >10% — потребують repeat HRCT для виключення ILD прогресії vs нової малігнізації."
  - "Не пропускати smoking-cessation counseling — найбільш модифікований ризик-фактор у SSc + куріння population."
  - "Не призначати імуносупресанти (mycophenolate, cyclophosphamide) без рутинного дерматологічного + неоплазійного оглядового спостереження — підвищений ризик неопластій."
  - "Не відкладати діагностичний workup підозрілого pulmonary вузла per Fleischner/Lung-RADS — early-stage NSCLC має значно кращі outcomes."

do_not_do_en:
  - "Do not use HRCT as a screening test in asymptomatic SSc without ILD — low yield, accumulated radiation; PFTs + clinical reassessment suffice."
  - "Do not ignore DLCO decline >15% or FVC decline >10% — these warrant repeat HRCT to distinguish ILD progression from new malignancy."
  - "Do not skip smoking-cessation counseling — the most modifiable risk factor in the SSc + smoking population."
  - "Do not prescribe immunosuppressants (mycophenolate, cyclophosphamide) without routine dermatologic + neoplasia surveillance — elevated neoplasia risk."
  - "Do not delay diagnostic workup of a suspicious pulmonary nodule per Fleischner/Lung-RADS — early-stage NSCLC has materially better outcomes."

