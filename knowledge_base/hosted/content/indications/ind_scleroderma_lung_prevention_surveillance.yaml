triggered_by_redflags:
  - RF-SCLERODERMA-LUNG-PREVENTION

# No systemic drug regimen — primary intervention is imaging
# (HRCT/LDCT), PFTs, and smoking cessation. Rheumatologic SSc-ILD
# disease-modifying therapy (mycophenolate, nintedanib, tocilizumab,
# cyclophosphamide) is treatment of the underlying ILD and is captured
# in rheumatology/pulmonary care, not as a prevention Regimen FK.
recommended_regimen: null
concurrent_therapy: []
followed_by: []

evidence_level: moderate
strength_of_recommendation: strong
nccn_category: "2A"

expected_outcomes:
  overall_response_rate: >-
    Surveillance HRCT chest q1-2y in SSc-ILD subset + PFT q6-12mo +
    smoking cessation enables detection of incidental pulmonary nodules
    requiring Lung-RADS / Fleischner-driven workup. Surveillance does
    not reduce baseline lung-cancer incidence in SSc but enables earlier
    stage at diagnosis (early-stage NSCLC 5y OS 60-90% vs 5-15% for
    locally advanced/metastatic). Smoking cessation alone provides the
    largest absolute risk reduction (~50% over 10 years post-cessation
    for typical smokers, additive in SSc).

hard_contraindications: []
red_flags_triggering_alternative: []

required_tests:
  - TEST-CBC
desired_tests: []

rationale: >
  Standard-track prevention pathway for patients with confirmed systemic
  sclerosis, particularly the SSc-ILD subset (the strongest lung-cancer-
  risk subgroup). Three-component standard:

  **HRCT chest cadence:**
    - Baseline HRCT at SSc diagnosis to characterize ILD
      presence/pattern (NSIP > UIP > organizing pneumonia in SSc-ILD).
    - In established SSc-ILD: surveillance HRCT q1-2y; more frequent
      (q6-12mo) for progressive ILD or new symptoms.
    - No SSc-ILD on baseline + asymptomatic + no smoking history:
      no scheduled HRCT — clinical reassessment and PFT-driven
      re-imaging cadence.
    - Incidental pulmonary nodules on surveillance HRCT followed per
      Fleischner Society 2017 or Lung-RADS criteria; suspicious
      nodules → diagnostic CT, PET/CT, biopsy as appropriate.

  **PFT cadence:**
    - Baseline at SSc diagnosis (FVC, DLCO).
    - SSc-ILD: PFTs q3-6mo during first 2-3 years (highest ILD
      progression risk) then q6-12mo.
    - No SSc-ILD: PFTs q12mo.
    - DLCO declines >15% or FVC declines >10% without obvious cause:
      flag for repeat HRCT regardless of last imaging date.

  **Smoking cessation:**
    - Repeat assessment + counseling at every visit for current/former
      smokers.
    - Pharmacotherapy (varenicline, bupropion, NRT) per usual cessation
      guidelines.
    - LDCT lung cancer screening eligibility (USPSTF: age 50-80, 20
      pack-year history, currently smoking or quit <15y) evaluated
      independently of SSc; SSc + smoking is a doubly-indicated
      population.

  **Concurrent SSc-ILD treatment** (per EULAR 2023 + ACR 2023):
  mycophenolate first-line for progressive SSc-ILD; nintedanib add-on
  per SENSCIS for progressive fibrotic ILD; tocilizumab/rituximab
  considered in early diffuse SSc with progressive ILD. These are
  pulmonary/rheumatology management decisions, not part of the lung-
  cancer prevention pathway per se — but the same patients benefit from
  both ILD management and structured surveillance imaging.

  In Ukraine, HRCT chest is widely available at oncology and pulmonary
  centers (NSZU partial coverage for indicated imaging; out-of-pocket
  ~1500-3500 UAH per study). PFTs available at most regional pulmonary
  centers. SSc rheumatology care concentrated in Kyiv, Lviv, Odesa,
  Kharkiv. Smoking cessation pharmacotherapy NSZU-covered when
  prescribed.

rationale_ua: >
  Стандартний-трек prevention шлях для пацієнтів з підтвердженим
  системним склерозом, особливо SSc-ILD підгрупою. Трикомпонентний
  стандарт:

  **HRCT грудей частота:**
    - Baseline HRCT при діагнозі SSc для характеризації ILD
      присутності/патерну (NSIP > UIP > organizing pneumonia).
    - У встановленому SSc-ILD: surveillance HRCT q1-2 роки; частіше
      (q6-12 міс) для прогресуючого ILD або нових симптомів.
    - Без SSc-ILD на baseline + asymptomatic + без куріння: без
      запланованого HRCT.
    - Incidental pulmonary вузли — Fleischner Society 2017 або
      Lung-RADS.

  **PFT частота:**
    - Baseline при діагнозі (FVC, DLCO).
    - SSc-ILD: PFTs q3-6 міс перші 2-3 роки, далі q6-12 міс.
    - Без SSc-ILD: PFTs q12 міс.
    - DLCO ↓ >15% або FVC ↓ >10% без очевидної причини — repeat HRCT.

  **Smoking cessation:**
    - Повторна оцінка + counseling на кожному візиті для
      курців/колишніх курців.
    - Фармакотерапія (вареніклін, бупропіон, NRT).
    - LDCT lung cancer screening eligibility (USPSTF: вік 50-80, 20
      pack-year, поточно куріння або quit <15 років) оцінюється
      незалежно від SSc.

  **Concurrent SSc-ILD лікування** (per EULAR 2023 + ACR 2023):
  мікофенолат first-line; нінтеданіб add-on per SENSCIS; тоцилізумаб/
  ритуксимаб у ранньому diffuse SSc.

  В Україні HRCT грудей широко доступна в онкологічних та pulmonary
  центрах (НСЗУ частково покриває; out-of-pocket ~1500-3500 грн).
  PFTs у більшості регіональних pulmonary центрів. SSc rheumatology
  care у Києві, Львові, Одесі, Харкові.

