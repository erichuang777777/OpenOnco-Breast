id: IND-SCLERODERMA-LUNG-PREVENTION-SURVEILLANCE
plan_track: standard
intent: prevention

applicable_to:
  disease_id: DIS-NSCLC
  stage_requirements: []
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
