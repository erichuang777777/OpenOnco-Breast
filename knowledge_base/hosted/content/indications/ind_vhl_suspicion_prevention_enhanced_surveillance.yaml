expected_outcomes:
  overall_response_rate: >-
    Empirical VHL-style multi-organ surveillance (CNS MRI q1-2y from
    age 15-16, contrast-MRI abdomen q1-2y, ophthalmology q1y from
    age 1-5, plasma metanephrines q1y from age 5-10): expected to
    capture VHL-spectrum manifestations at earliest detectable stage
    in the subset who are actual carriers (~40-90% of pedigree-
    suspicion individuals depending on phenotype stringency). Does
    NOT carry the diagnostic certainty of germline confirmation —
    carriers may receive unnecessary intensive surveillance when
    negative testing would have de-escalated, non-carriers receive
    surveillance that could have been safely declined, and the
    autosomal-dominant cascade-testing benefit for siblings /
    children is lost without proband genetic confirmation. The high
    childhood-surveillance burden (pediatric ophthalmology, MRIs,
    annual catecholamines) is a particular cost to weigh against the
    benefit of empirical adherence.

