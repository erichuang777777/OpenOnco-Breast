rationale: >
  Alternative-track companion to IND-VHL-SUSPICION-PREVENTION-GENETIC-
  COUNSELING. Patient with pedigree suspicion of VHL who declines
  genetic counseling and/or germline VHL testing — for any reason
  (cost, insurance concerns, psychological / anxiety considerations,
  family privacy, geographic access constraints, reluctance to
  initiate the lifelong-surveillance commitment in self / children) —
  is offered empirical multi-organ surveillance applied as if VHL
  were confirmed:

  **CNS:** MRI brain + complete spine q1-2 years from age 15-16
  (matches confirmed-carrier protocol because hemangioblastoma onset
  typically falls in this window).

  **Abdomen (kidneys / adrenals / pancreas):** Contrast-enhanced MRI
  abdomen q1-2 years from age 15-16. RCC surveillance with "3-cm rule"
  for tumor-sparing partial nephrectomy. Adrenal pheochromocytoma
  and pancreatic NET captured in the same imaging.

  **Ophthalmology:** Dilated fundoscopy with retinal angiography
  q1 year from age 1-5 — this is the highest-stakes empirical
  recommendation for children of VHL-suspicion families because
  retinal hemangioblastoma onset is childhood and untreated lesions
  cause irreversible vision loss within years.

  **Catecholamines / metanephrines:** Plasma free metanephrines or
  24-hour urine metanephrines q1 year from age 5-10. Annual blood
  pressure check at every primary-care visit.

  **Hearing:** Audiometry q3-5 years from age 15. MRI internal
  auditory canal if symptoms develop.

  Per CHARTER §11 patient-autonomy framing: genetic testing is a
  shared-decision-making domain. VHL is a particularly compelling
  syndrome for genetic confirmation because (1) the surveillance
  burden is high (multi-organ, lifelong, childhood-initiating) and
  asymmetrically benefits true carriers; (2) the cascade-testing
  benefit for relatives is substantial (siblings 50%, children 50%);
  (3) the early-detection mortality / morbidity benefit is well-
  documented (retinal vision preservation, RCC 3-cm rule, pre-
  crisis pheochromocytoma detection). Empirical surveillance preserves
  the early-detection benefit for the index patient but loses the
  cascade-testing benefit; this trade-off should be explicit in
  counseling.

  Routing reconsiderations: if patient eventually accepts germline
  testing, results reroute to (a) confirmed-carrier pathway, (b)
  general-population pathway, or (c) continued pedigree-suspicion if
  VUS.

rationale_ua: >
  Альтернативно-трекова Indication — компаньйон до
  IND-VHL-SUSPICION-PREVENTION-GENETIC-COUNSELING. Пацієнт з
  родовідною підозрою на VHL, який відмовляється від генетичного
  консультування та/або germline VHL тестування — з будь-якої
  причини (вартість, страхові міркування, психологічні / тривожні
  міркування, сімейна приватність, географічні обмеження, небажання
  ініціювати lifelong-surveillance зобов'язання у себе / у дітей) —
  отримує empіричне мульти-органне спостереження як якщо б VHL був
  підтверджений:

  **ЦНС:** MRI головного мозку + повний хребет q1-2 роки з 15-16
  років (відповідає протоколу підтвердженого носія, бо emerg​ence
  гемангіобластом припадає на це вікове вікно).

  **Абдомен (нирки / наднирники / підшлункова):** Контрастна MRI
  абдомену q1-2 роки з 15-16 років. РСС-спостереження з "правилом
  3-см" для tumor-sparing часткової нефректомії. Адренальна
  феохромоцитома і підшлунковий NET фіксуються тим самим
  візуалізаційним обстеженням.

  **Офтальмологія:** Розширена фундоскопія з ретинальною
  ангіографією q1 рік з 1-5 років — це найбільш high-stakes
  empіричне рекомендування для дітей з VHL-підозрюваних сімей, бо
  ретинальна гемангіобластома emerg​ує у дитинстві і нелікована
  призводить до незворотньої втрати зору протягом років.

  **Катехоламіни / метанефрини:** Плазмові вільні метанефрини або
  24-годинні сечові метанефрини q1 рік з 5-10 років. Щорічне
  вимірювання АТ при кожному primary-care візиті.

  **Слух:** Аудіометрія q3-5 років з 15 років. MRI внутрішнього
  слухового каналу при появі симптомів.

  Per CHARTER §11 framing автономії пацієнта: генетичне тестування —
  shared-decision-making домен. VHL — особливо переконливий синдром
  для генетичного підтвердження бо (1) тягар спостереження високий
  (мульти-органний, пожиттєвий, дитячий-старт) і асиметрично корисний
  справжнім носіям; (2) cascade-testing benefit для родичів суттєвий
  (сібси 50%, діти 50%); (3) early-detection mortality / morbidity
  benefit well-documented (ретинальне збереження зору, РСС 3-см
  правило, pre-crisis виявлення феохромоцитоми). Empіричне
  спостереження зберігає early-detection benefit для index пацієнта,
  але втрачає cascade-testing benefit; цей trade-off має бути
  експліцитним при консультуванні.

  Reroute: якщо пацієнт врешті приймає germline тестування,
  результати маршрутизуються до (а) confirmed-carrier шлях, (б)
  general-population шлях, або (в) продовжена pedigree-підозра при
  VUS.

