do_not_do:
  - "Не презентувати enhanced surveillance як еквівалент genetic confirmation — diagnostic precision відсутня; cascade-testing benefit для родичів втрачається; це трейд-офф особливо вагомий при VHL через high-stakes childhood surveillance."
  - "Не пропускати дитячу офтальмологію (q1 рік з 1-5 років) у emp​іричних спостереженнях сильно-VHL-сімей — ретинальна гемангіобластома — провідна причина втрати зору і потребує laser / cryotherapy при ранньому виявленні."
  - "Не пропускати periodic re-discussion про genetic testing — більшість пацієнтів врешті приймають тестування після додаткових візитів та зменшення тривоги, особливо при перевазі cascade-testing benefit для дітей."
  - "Не починати дитячі MRI (за станом дорослий-протокол) до 15-16 років — pediatric sedation / anesthesia ризик при щорічному MRI перевищує користь до cerebellar hemangioblastoma onset window."
  - "Не використовувати plasma free metanephrines без urine confirmation при пограничних значеннях — false-positive rate plasma testing вищий; pediatric reference ranges відрізняються від дорослих."

do_not_do_en:
  - "Do not present enhanced surveillance as equivalent to genetic confirmation — diagnostic precision is absent; cascade-testing benefit for relatives is lost; this trade-off is particularly weighty in VHL given the high-stakes childhood surveillance protocol."
  - "Do not skip childhood ophthalmology (q1 year from age 1-5) in empirical surveillance of strong VHL families — retinal hemangioblastoma is a leading cause of vision loss and requires laser / cryotherapy at early detection."
  - "Do not skip periodic re-discussion of genetic testing — most patients eventually accept testing after additional visits and reduced anxiety, especially when cascade-testing benefit for children is emphasized."
  - "Do not start childhood MRIs (at adult-protocol cadence) before age 15-16 — pediatric sedation / anesthesia risk at annual MRI cadence exceeds benefit before the cerebellar hemangioblastoma onset window."
  - "Do not use plasma free metanephrines without urine confirmation in borderline values — false-positive rate of plasma testing is higher; pediatric reference ranges differ from adult."

