evidence_level: low
strength_of_recommendation: conditional
nccn_category: "2B"

expected_outcomes:
  overall_response_rate: "Continued high processed-meat consumption: baseline CRC incidence elevated proportional to intake. Age-appropriate screening alone captures earlier-stage disease but does not reduce incidence."

hard_contraindications: []
red_flags_triggering_alternative: []
required_tests: []
desired_tests: []

rationale: >
  Alternative-track companion to IND-LIFESTYLE-PROCESSED-MEAT-PREVENTION-
  DIETARY. Patient declines structured dietary modification (cultural,
  preference, food-environment constraints) — receives USPSTF-cadence
  CRC screening + brief dietary counseling with each clinical contact.
  Per CHARTER §11 patient-autonomy framing — dietary choice is
  legitimate but framed as suboptimal vs. reduced-intake comparator.

rationale_ua: >
  Альтернативно-трекова Indication. Пацієнт відмовляється від structured
  dietary modification — отримує USPSTF-cadence CRC screening + brief
  dietary counseling на кожному клінічному контакті. Per CHARTER §11.

ukrainian_review_status: pending_clinical_signoff
