do_not_do:
  - "Не презентувати observation як еквівалент dietary intervention — CRC incidence reduction не досягається."
  - "Не пропускати CRC screening — base-rate USPSTF cadence залишається indicated незалежно від dietary status."
  - "Не виключати brief dietary counseling на кожному візиті — repeated exposure has cumulative behavioral effect."

do_not_do_en:
  - "Do not present observation as equivalent to dietary intervention — CRC incidence reduction is not achieved."
  - "Do not skip CRC screening — base-rate USPSTF cadence remains indicated regardless of dietary status."
  - "Do not skip brief dietary counseling at every visit — repeated exposure has cumulative behavioral effect."

