do_not_do:
  - "Не презентувати observation як еквівалент structured cancer surveillance — post-transplant SCC has worse stage-for-stage prognosis than spontaneous."
  - "Не пропускати explicit symptom-vigilance education — pattern-recognition critical у high-risk cohort."
  - "Не нормалізувати new skin lesion / non-healing sore — high probability SCC у post-transplant cohort."
  - "Не пропускати sun-protection counseling — найбільший self-care yield."
  - "Не reducing immunosuppression unilaterally — graft rejection risk; завжди координація з transplant team."

do_not_do_en:
  - "Do not present observation as equivalent to structured cancer surveillance — post-transplant SCC has worse stage-for-stage prognosis than spontaneous."
  - "Do not skip explicit symptom-vigilance education — pattern recognition is critical in this high-risk cohort."
  - "Do not normalize a new skin lesion / non-healing sore — high probability of SCC in the post-transplant cohort."
  - "Do not omit sun-protection counseling — the highest self-care yield."
  - "Do not reduce immunosuppression unilaterally — graft rejection risk; always coordinate with transplant team."

