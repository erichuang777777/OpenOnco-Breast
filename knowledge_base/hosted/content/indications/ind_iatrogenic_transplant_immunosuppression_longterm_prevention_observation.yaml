rationale: >
  Alternative-track companion to IND-IATROGENIC-TRANSPLANT-
  IMMUNOSUPPRESSION-LONGTERM-PREVENTION-SURVEILLANCE. Patient
  declines structured annual skin exam + GYN co-test + symptom-
  surveillance pathway (transplant survivorship fatigue,
  geographic access, preference) — receives explicit symptom-
  vigilance education (new or changing skin lesion, non-healing
  sore, persistent lymphadenopathy, unexplained fevers / night
  sweats / weight loss, hematochezia, abnormal vaginal bleeding,
  oral leukoplakia / non-healing oral lesion → immediate referral)
  + sun-protection counseling (broad-spectrum SPF 30+, avoidance
  during peak UV, photoprotective clothing — sun protection is
  the single highest-yield self-care intervention for this
  cohort). Coordination with transplant team for any immuno-
  suppression review remains essential — NEVER unilateral changes.
  Per CHARTER §11 patient-autonomy framing — declining the
  structured pathway is legitimate but framed as suboptimal vs.
  active-surveillance comparator, particularly given the
  aggressive post-transplant SCC subset.

rationale_ua: >
  Альтернативно-трекова Indication. Пацієнт відмовляється від
  structured annual skin exam + GYN co-test + symptom-surveillance
  pathway — отримує explicit symptom-vigilance education (new
  або changing skin lesion, non-healing sore, persistent
  lymphadenopathy, unexplained fevers / night sweats / weight
  loss, hematochezia, abnormal vaginal bleeding, oral leukoplakia
  / non-healing oral lesion → immediate referral) + sun-protection
  counseling. Координація з transplant team для immunosuppression
  review essential — НІКОЛИ unilateral changes. Per CHARTER §11.

