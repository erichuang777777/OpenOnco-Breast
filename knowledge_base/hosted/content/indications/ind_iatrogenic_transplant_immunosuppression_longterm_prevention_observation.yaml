expected_outcomes:
  overall_response_rate: "Patient declines structured cancer-surveillance pathway (annual skin exam, cervical co-test, anal cytology, dental cancer screening, lymphadenopathy/B-symptom review) — receives baseline symptom-vigilance education and sun-protection counseling. Skin cancers (especially aggressive post-transplant SCC), late-onset PTLD, HPV-associated cancers may go undetected at curable stage; outcomes worse than with structured surveillance arm. Critical caveat: post-transplant SCC has substantially worse stage-for-stage prognosis than spontaneous SCC — surveillance is the standard, not optional."

