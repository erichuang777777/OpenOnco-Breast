rationale: >
  Standard-track surveillance for occupational aromatic-amine exposure (Group 1
  IARC carcinogen for urothelial bladder cancer). Three components:

  **(1) Annual urinalysis + urine cytology** — primary surveillance modality.
  Microscopic hematuria + atypical/positive cytology trigger cystoscopy.

  **(2) Low-threshold cystoscopy for hematuria** — any visible hematuria, or
  persistent microscopic hematuria in an aromatic-amines-exposed individual,
  warrants cystoscopy regardless of age. Standard for general population is
  age-stratified evaluation, but exposure history lowers the threshold.

  **(3) Smoking cessation counseling** — tobacco is an independent IARC Group 1
  bladder carcinogen; combined exposure is multiplicative. Tobacco cessation
  is the single most modifiable risk factor.

rationale_ua: >
  Стандартний-трек surveillance для occupational aromatic-amine exposure.

  **(1) Щорічна urinalysis + urine cytology** — первинна модальність surveillance.

  **(2) Низький поріг cystoscopy при hematuria** — будь-який visible hematuria
  або persistent microscopic hematuria у людини з aromatic-amines exposure
  потребує cystoscopy незалежно від віку.

  **(3) Smoking cessation counseling** — tobacco — незалежний IARC Group 1
  bladder carcinogen; combined exposure мультиплікативна.

