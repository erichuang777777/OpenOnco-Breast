do_not_do:
  - "Не пропускати radon re-test через 24 місяці після митигації — митигація може бути неповною."
  - "Не вважати tobacco cessation і radon mitigation альтернативами — обидві потрібні."
  - "Не використовувати chest X-ray замість LDCT для lung cancer screening — LDCT має значно вищу sensitivity."
  - "Не починати LDCT screening без обговорення incidental-findings ризику (50% LDCT мають incidental finding, що потребує follow-up)."

do_not_do_en:
  - "Do not skip radon re-testing 24 months post-mitigation — mitigation may be incomplete."
  - "Do not treat tobacco cessation and radon mitigation as alternatives — both are needed."
  - "Do not use chest X-ray instead of LDCT for lung cancer screening — LDCT has significantly higher sensitivity."
  - "Do not start LDCT screening without discussing incidental-findings risk (50% of LDCTs have an incidental finding requiring follow-up)."

