rationale: >
  Standard-track prevention pathway for radon-elevated residential exposure. Three components:

  **(1) Radon mitigation** — sub-slab depressurization (the EPA standard), sealing of foundation cracks, increased ventilation. Re-test 24 months post-mitigation to confirm radon levels <4 pCi/L (EPA action threshold).

  **(2) Smoking cessation counseling** — radon-smoking synergy is multiplicative (not additive); smokers with radon-elevated homes carry the highest lung cancer risk. Tobacco cessation is the single most impactful intervention.

  **(3) Annual low-dose CT (LDCT) screening** per USPSTF lung cancer screening criteria adjusted for radon-elevated risk. Standard USPSTF criteria: ages 50-80, ≥20 pack-years smoking history, quit ≤15y. Radon-elevated patients may benefit from screening even with lower pack-year thresholds (individualized).

  Occupational uranium mining or processing exposure carries even higher lung cancer risk — ensure occupational history is captured.

rationale_ua: >
  Стандартний-трек prevention шлях для radon-elevated residential exposure. Три компоненти:

  **(1) Митигація радону** — sub-slab depressurization (EPA стандарт), герметизація тріщин фундаменту, посилена вентиляція. Повторне тестування через 24 місяці після митигації для підтвердження рівнів радону <4 pCi/L (EPA action threshold).

  **(2) Консультування з припинення куріння** — radon-smoking синергія мультиплікативна (не адитивна); курці з radon-elevated помешканнями мають найвищий ризик раку легень. Припинення тютюнопаління — найбільш впливова інтервенція.

  **(3) Щорічний LDCT скринінг** за критеріями USPSTF lung cancer screening, скорегованими для radon-elevated risk. Стандартні USPSTF критерії: вік 50-80, ≥20 пачко-років тютюнопаління, кинули ≤15р. Radon-elevated пацієнти можуть отримати користь зі скринінгу навіть з нижчими pack-year thresholds (індивідуалізовано).

  Occupational uranium mining або processing exposure має ще вищий ризик раку легень.

