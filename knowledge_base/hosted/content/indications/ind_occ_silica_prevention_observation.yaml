rationale: >
  Alternative-track companion to IND-OCC-SILICA-PREVENTION-INTENSIFIED-
  SURVEILLANCE. Patient with documented prior occupational respirable
  crystalline silica exposure who declines silica-modified imaging
  surveillance — for any reason (cost, radiation-dose concerns, anxiety
  from serial-imaging false-positive cascade, preference for less-
  interventional pathway, geographic access constraints) — is offered
  routine general-population screening only:

  **Lung-cancer screening:** Apply USPSTF 2021 criteria unmodified
  (age 50-80, ≥20 pack-years, current smoker or quit within 15 years).
  Patient is explicitly informed that silica-attributable excess risk
  is unaddressed.

  **Silicosis surveillance:** None scheduled; HRCT chest reserved for
  symptomatic / functional presentation. Patient is informed that
  silicosis can develop / progress asymptomatically and that earlier
  detection has limited treatment options but does affect lung-cancer
  surveillance thresholds.

  **Smoking cessation:** Still offered — silica × tobacco interaction
  remains clinically substantive.

  **Symptom-triggered evaluation:** Low threshold for HRCT chest on
  new / persistent dyspnea, chronic cough, or hemoptysis. Low
  threshold for spirometry on suspicion of declining lung function.

  **Exposure cessation:** Still offered if active exposure persists;
  forward-looking benefit (preventing further silica deposition).

  Routing reconsiderations: patient may revisit intensified-surveillance
  pathway at any subsequent visit. Per CHARTER §11 patient-autonomy
  framing: structured surveillance is a shared-decision-making domain.

rationale_ua: >
  Альтернативно-трекова Indication — компаньйон до IND-OCC-SILICA-
  PREVENTION-INTENSIFIED-SURVEILLANCE. Пацієнт з документованим
  попереднім професійним впливом респірабельного кристалічного силіцію,
  який відмовляється від силіцій-модифікованого imaging-спостереження
  (вартість, радіація, тривога, перевага, географічні обмеження),
  отримує тільки рутинний загальнопопуляційний скринінг:

  **Скринінг раку легень:** Застосовувати USPSTF 2021 без модифікації.
  Пацієнт явно інформований, що silica-attributable excess ризик не
  адресується.

  **Спостереження за силікозом:** Не заплановане; HRCT грудної клітки
  резервується для симптоматичної / функціональної презентації.

  **Припинення куріння:** Все ще пропонується — silica × тютюн
  взаємодія залишається клінічно суттєвою.

  **Symptom-triggered оцінка:** Низький поріг для HRCT грудної клітки
  при нових / persistent диспное, хронічному кашлі або кровохарканні.
  Низький поріг для спірометрії при підозрі на зниження легеневої
  функції.

  **Припинення впливу:** Все ще пропонується, якщо активний вплив
  зберігається — forward-looking benefit (запобігання подальшому
  відкладенню силіцію).

  Reroute: пацієнт може повернутися до інтенсифікованого спостереження
  на будь-якому подальшому візиті. Per CHARTER §11 — shared-decision-
  making domain.

