do_not_do:
  - "Не відкладати prophylactic colectomy в classic FAP після появи dense polyposis — CRC ризик ~100% до 40 років."
  - "Не пропускати upper EGD surveillance post-colectomy — duodenal cancer leading mortality."
  - "Не використовувати тільки colonoscopy в attenuated FAP — також потрібна upper-GI surveillance."

do_not_do_en:
  - "Do not delay prophylactic colectomy in classic FAP after dense polyposis appears — CRC risk approaches 100% by age 40."
  - "Do not skip upper EGD surveillance post-colectomy — duodenal cancer is the leading cause of mortality."
  - "Do not use colonoscopy alone in attenuated FAP — upper-GI surveillance also required."

