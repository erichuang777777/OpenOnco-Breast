rationale: >
  Standard-track confirmed-carrier surveillance per NCCN Genetic/Familial
  High-Risk: Colorectal + InSiGHT FAP guidelines:

  **Classic FAP (typical APC variant, dense polyposis phenotype):**
  - Annual sigmoidoscopy from age 10-12.
  - Colonoscopy when polyps appear (typically 12-15).
  - Prophylactic colectomy (typically late teens to early 20s) — total proctocolectomy
    with IPAA or total colectomy with IRA. Specific timing is patient-individualized
    based on polyp burden + dysplasia + symptoms.
  - Upper EGD q1-3 years starting age 25-30 with Spigelman staging of duodenal
    polyposis; prophylactic duodenectomy considered at Spigelman IV.
  - Annual thyroid US — cribriform-morular variant papillary thyroid cancer.
  - Desmoid tumor awareness (especially post-colectomy).

  **Attenuated FAP (3' / 5' APC variants, attenuated polyposis phenotype):**
  - Colonoscopy q1-2y starting age 18-20 (later onset than classic).
  - Polypectomy as polyps emerge; colectomy timing more flexible — may avoid
    if polyposis remains manageable endoscopically.
  - Upper EGD q1-3y starting 25-30.

  **MAP differential (MUTYH biallelic):** similar phenotype, recessive
  inheritance; surveillance similar to attenuated FAP. Already covered by the
  germline panel testing.

rationale_ua: >
  Стандартний-трек confirmed-carrier surveillance per NCCN + InSiGHT FAP:

  **Класична FAP:**
  - Щорічна сигмоїдоскопія з 10-12 років.
  - Колоноскопія коли поліпи з'являються (12-15).
  - Прорпрофілактична колектомія (typically late teens to early 20s) — total
    proctocolectomy with IPAA або total colectomy with IRA.
  - Upper EGD q1-3 роки з 25-30 років з Spigelman staging; prophylactic
    duodenectomy при Spigelman IV.
  - Щорічна thyroid US.

  **Attenuated FAP:**
  - Колоноскопія q1-2y з 18-20 років.

