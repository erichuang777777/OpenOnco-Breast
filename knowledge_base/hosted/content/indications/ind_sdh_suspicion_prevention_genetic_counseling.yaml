rationale: >
  Standard-track prevention pathway for SDH-deficiency syndromes.

  **(1) Genetic counseling + germline SDH-panel** (SDHA, SDHB, SDHC, SDHD,
  SDHAF2).

  **(2) Confirmed-carrier surveillance** (per Endocrine Society guidelines):
  - Annual whole-body MRI from age 6-10 in SDHB carriers (childhood-onset
    paragangliomas reported)
  - Annual metanephrines / methoxytyramine / catecholamines
  - Head + neck MRI q2-3y for parasympathetic paragangliomas
  - Abdominal MRI for RCC + GIST surveillance
  - SDHB > SDHD > SDHC > SDHA carrier-risk gradient (SDHB highest)

  **(3) Cascade testing** — paternal inheritance pattern for SDHD/SDHAF2
  (imprinting), autosomal dominant for SDHA/B/C.

rationale_ua: >
  Стандартний-трек для SDH-deficiency.

