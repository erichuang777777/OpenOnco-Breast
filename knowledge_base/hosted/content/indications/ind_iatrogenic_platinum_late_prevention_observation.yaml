desired_tests: []

rationale: >
  Alternative-track companion to IND-IATROGENIC-PLATINUM-LATE-
  PREVENTION-SURVEILLANCE. Cancer survivor declines structured annual
  BP + lipid + creatinine + CBC surveillance schedule (surveillance
  fatigue post-curative treatment, no perceived symptoms, financial
  / access barrier, geographic distance from survivorship clinic,
  preference for general primary-care management without survivor-
  specific intensification) — receives symptom-vigilance education
  (chest pain / dyspnea on exertion → urgent CV evaluation; unexplained
  fatigue / easy bruising / recurrent infections → urgent CBC) +
  cardiovascular risk modification counseling (smoking cessation,
  physical activity, weight, Mediterranean / DASH dietary pattern).
  Per CHARTER §11 patient-autonomy framing — surveillance refusal is
  a legitimate choice but framed as suboptimal vs. scheduled-
  surveillance comparator.

rationale_ua: >
  Альтернативно-трекова Indication. Виживач відмовляється від
  structured annual BP + lipid + creatinine + CBC surveillance —
  отримує symptom-vigilance education (chest pain / dyspnea →
  urgent CV evaluation; fatigue / easy bruising / infections →
  urgent CBC) + cardiovascular risk modification counseling
  (smoking cessation, physical activity, weight, Mediterranean
  / DASH діета). Per CHARTER §11.

