expected_outcomes:
  overall_response_rate: "Survivor declines structured BP + lipid + creatinine + CBC q1y surveillance schedule — receives general primary-care preventive cadence only. Modifiable CV risk factors may go uncontrolled until first CV event (MI, stroke), foreclosing window for risk reduction; CKD may progress silently with magnesium wasting unrecognized; t-MDS may evolve to overt t-AML before cytopenias addressed. Outcomes substantially worse with general-population cadence vs. survivor-specific schedule given documented elevated absolute risks."

