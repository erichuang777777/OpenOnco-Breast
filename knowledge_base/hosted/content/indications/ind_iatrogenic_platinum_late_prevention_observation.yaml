do_not_do:
  - "Не презентувати observation як еквівалент structured surveillance — late-presentation MACE + CKD + t-AML substantially гірші outcomes."
  - "Не пропускати CV risk modification counseling — навіть на observation track це highest-yield late-effect інтервенція."
  - "Не нормалізувати progressive fatigue як 'normal aging' у platinum survivors — може бути silent CKD або t-MDS."
  - "Не вважати magnesium replacement 'optional' у symptomatic survivors з documented cisplatin Mg wasting — supplementation often required lifelong."

do_not_do_en:
  - "Do not present observation as equivalent to structured surveillance — late-presentation MACE + CKD + t-AML have substantially worse outcomes."
  - "Do not skip CV risk modification counseling — even on the observation track this is the highest-yield late-effect intervention."
  - "Do not normalize progressive fatigue as 'normal aging' in platinum survivors — may be silent CKD or t-MDS."
  - "Do not treat magnesium replacement as 'optional' in symptomatic survivors with documented cisplatin Mg wasting — supplementation is often required lifelong."

