do_not_do:
  - "Не презентувати single-modality screening як еквівалент comprehensive plan — outcomes inferior."
  - "Не пропускати symptom-vigilance education для declined modalities — symptom-prompted evaluation є backup."
  - "Не accept access barrier як immutable — proactively coordinate NSZU / Medicare / NHS referral pathways."
  - "Не deny FIT як non-invasive CRC first-choice — substantially exceeds no-screening baseline."
  - "Не призначати LDCT без USPSTF eligibility verification — false-positive harm + radiation поза eligibility window."

do_not_do_en:
  - "Do not present single-modality screening as equivalent to comprehensive plan — outcomes are inferior."
  - "Do not skip symptom-vigilance education for declined modalities — symptom-prompted evaluation is the backup."
  - "Do not accept the access barrier as immutable — proactively coordinate NSZU / Medicare / NHS referral pathways."
  - "Do not deny FIT as the non-invasive CRC first-choice — it substantially exceeds the no-screening baseline."
  - "Do not order LDCT without USPSTF eligibility verification — false-positive harm + radiation outside the eligibility window."

