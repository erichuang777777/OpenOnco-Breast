rationale: >
  Alternative-track companion to IND-UNIVERSAL-AGE-50PLUS-
  PREVENTION-COMPREHENSIVE-CATCHUP. Patient declines comprehensive
  catch-up across all modalities — receives prioritized highest-
  yield single-modality screening.

  **(1) Highest-yield modality prioritization** per patient
  demographics + risk-factor profile + access:
  - For all adults ≥50: CRC screening — FIT q1y as non-invasive
    first choice (~70-80% sensitivity for CRC, can be home-
    administered, low cost). If FIT positive → diagnostic
    colonoscopy. If colonoscopy access permits and patient
    consents → direct colonoscopy is gold-standard.
  - For women 40-74: breast mammography q2y (USPSTF Grade B,
    2024). Highly accessible in most settings.
  - For women 21-65 with cervical-screening gap: hr-HPV / co-test
    / cytology per age-appropriate modality.
  - For USPSTF-eligible smokers: LDCT only if patient consents
    after full informed discussion of benefit + harms.

  **(2) Reassurance + symptom-vigilance education.** Patient
  declining specific modalities receives symptom-vigilance
  education for cancers not screened: persistent change in bowel
  habits / hematochezia / unintended weight loss (CRC), breast
  lump / nipple discharge (breast), postmenopausal bleeding /
  abnormal cervical discharge (cervical / endometrial), persistent
  cough / hemoptysis / dyspnea / unintended weight loss (lung),
  difficulty voiding / hematuria (prostate / bladder / kidney).

  **(3) Re-engagement pathway.** Document declined-modalities
  determination explicitly + offer re-engagement at each annual
  visit. Many patients who initially decline comprehensive
  screening eventually engage with additional modalities when
  motivational triggers shift (new family cancer event, peer
  experience, change in healthcare access).

  **(4) Access coordination.** For patients with documented access
  barriers (geographic, financial, insurance, language), proactively
  coordinate referral pathways (NSZU Family Doctor in Ukraine,
  Medicare-covered screening in US, NHS-equivalent in UK / EU)
  rather than accepting access barrier as immutable.

  **(5) Life-expectancy + comorbidity overlay.** For patients
  age ≥75 or with significant competing comorbidity, individualize
  screening recommendations: continue when life expectancy ≥10
  years and patient values screening; discontinue when life
  expectancy <5 years OR when screening would not change management.

  Per CHARTER §11 patient-autonomy framing — declining comprehensive
  plan is legitimate but framed as suboptimal vs full-coverage
  comparator.

rationale_ua: >
  Альтернативно-трекова Indication. Пацієнт відмовляється від
  comprehensive catch-up — отримує prioritized highest-yield
  single-modality screening.

  **(1) Highest-yield modality prioritization:**
  - Усі дорослі ≥50: CRC screening — FIT q1р як non-invasive
    first choice. Якщо FIT positive → diagnostic колоноскопія.
  - Жінки 40-74: breast мамографія q2р (USPSTF Grade B).
  - Жінки 21-65 з cervical-screening gap: hr-HPV / co-test /
    cytology.
  - USPSTF-eligible smokers: LDCT лише при consent після full
    informed discussion benefit + harms.

  **(2) Reassurance + symptom-vigilance education** для cancers
  не screened: persistent change у bowel habits / hematochezia /
  unintended weight loss (CRC), breast lump / nipple discharge
  (breast), postmenopausal bleeding (cervical / endometrial),
  persistent cough / hemoptysis (lung), difficulty voiding /
  hematuria (prostate / bladder / kidney).

  **(3) Re-engagement pathway.** Document declined-modalities
  determination explicitly + offer re-engagement.

  **(4) Access coordination** для patients з documented access
  barriers — proactively coordinate referral pathways (NSZU /
  Medicare / NHS).

  **(5) Life-expectancy + comorbidity overlay.** Для patients
  ≥75 або з significant competing comorbidity, individualize
  recommendations.

  Per CHARTER §11 patient-autonomy framing.

