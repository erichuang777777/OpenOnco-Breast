expected_outcomes:
  overall_response_rate: >-
    Alternative-track companion. Patient declines comprehensive
    catch-up across all USPSTF / NCCN-recommended modalities
    (access barriers, prior procedure-related fear, limited
    healthcare-engagement capacity, declining intent for invasive
    procedures) — receives prioritized highest-yield single-
    modality screening based on patient demographics + risk-factor
    profile + access constraints. Prioritization typically:
    (1) CRC FIT-stool test q1y (non-invasive, low-cost, ~70-80%
    sensitivity for CRC, can be home-administered) OR colonoscopy
    if access permits; (2) breast mammography q2y for women 40-74;
    (3) cervical hr-HPV / co-test / cytology if not previously
    completed in past 5 years; (4) LDCT only if USPSTF-eligible
    AND patient consents. Single-modality engagement achieves
    partial benefit relative to comprehensive program but
    substantially exceeds no-screening baseline. Re-engagement
    opportunity preserved for subsequent visits. Per CHARTER §11
    patient-autonomy framing — declining comprehensive plan is
    legitimate but framed as suboptimal vs full-coverage
    comparator.

