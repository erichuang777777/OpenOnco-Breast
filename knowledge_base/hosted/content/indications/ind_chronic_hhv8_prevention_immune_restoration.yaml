id: IND-CHRONIC-HHV8-PREVENTION-IMMUNE-RESTORATION
plan_track: standard
intent: prevention

applicable_to:
  disease_id: DIS-KAPOSI
  stage_requirements: []
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 3

triggered_by_redflags:
  - RF-CHRONIC-HHV8-MALIGNANCY-PREVENTION

recommended_regimen: null
concurrent_therapy: []
followed_by: []

evidence_level: moderate
strength_of_recommendation: strong
nccn_category: "2A"

expected_outcomes:
  overall_response_rate: >-
    Primary endpoint: restoration of cellular immunity (CD4 > 200 in
    HIV+; transplant-immunosuppression rebalance) and prevention of
    HHV-8-driven Kaposi sarcoma, multicentric Castleman disease (MCD),
    and primary effusion lymphoma (PEL). ART initiation in HIV+/HHV-8+
    reduces Kaposi sarcoma incidence by 70-90% across multiple cohorts;
    transplant-immunosuppression reduction triggers tumor regression in
    a meaningful fraction of post-transplant Kaposi sarcoma.

hard_contraindications: []
red_flags_triggering_alternative: []
required_tests:
  - TEST-CBC
  - TEST-LFT
desired_tests:
  - TEST-LDH

rationale: >
  Standard-track prevention pathway for HHV-8 seropositivity in an
  immunocompromised host (HIV+, solid-organ-transplant recipient, or
  other persistent T-cell-immunity deficit). No curative anti-HHV-8
  agent exists; the etiological prevention modality is restoration /
  optimization of cellular immunity.

  HIV+ patient: initiate ART regardless of CD4 count (DHHS, WHO,
  IDSA — universal ART). Kaposi sarcoma incidence drops 70-90% with
  sustained virological suppression; MCD and PEL similarly less
  frequent.

  Transplant recipient: review immunosuppression regimen with transplant
  team. Conversion from calcineurin-inhibitor-based to mTOR-inhibitor-
  based (sirolimus / everolimus) regimen has documented anti-Kaposi
  activity (direct anti-angiogenic + restored immune surveillance).
  Reduction in net immunosuppression where graft-safe.

  Surveillance regardless of intervention: mucocutaneous + oral + GI +
  lymph-node exam at routine clinic visits; biopsy any new violaceous
  cutaneous / mucosal lesion. CD4 count + HIV viral load quarterly in
  HIV+; transplant-team co-management in transplant recipients.

rationale_ua: >
  Стандартний-трек prevention шлях для серопозитивності HHV-8 у
  імуноскомпрометованого пацієнта (ВІЛ+, реципієнт трансплантації
  солідного органу, або інший стійкий дефіцит T-клітинного імунітету).
  Куративного анти-HHV-8 агента немає; етіологічна prevention
  модальність — відновлення / оптимізація клітинного імунітету.

  Пацієнт ВІЛ+: старт АРТ незалежно від CD4 (DHHS, WHO, IDSA —
  універсальна АРТ). Захворюваність саркомою Капоші знижується на
  70-90% при стійкій вірусологічній супресії; MCD і PEL також рідші.

  Реципієнт трансплантату: перегляд режиму імуносупресії з
  транспланталогічною командою. Конверсія з calcineurin-inhibitor-
  based до mTOR-inhibitor-based (sirolimus / everolimus) режиму
  має документовану анти-Kaposi активність (пряма анти-ангіогенна +
  відновлений імунний нагляд). Зниження сумарної імуносупресії, де
  graft-safe.

  Surveillance незалежно від втручання: шкіра + ротова порожнина +
  ШКТ + лімфовузли при рутинних візитах; біопсія будь-якого нового
  фіолетового шкірного / слизового вогнища. CD4 + HIV viral load
  щоквартально у ВІЛ+; ко-менеджмент з транспланталогічною командою
  у реципієнтів.

