do_not_do:
  - "Не презентувати ART як 'protection from Kaposi' пацієнту — це incidence-reduction інтервенція, не guarantee. Disclaimer per CHARTER §11."
  - "Не змінювати режим імуносупресії у трансплант-реципієнта самостійно без транспланталогічного консиліуму — risk of allograft rejection."
  - "Не пропускати огляд шкіри / ротової порожнини при візитах — рання детекція Kaposi sarcoma визначає прогноз."

do_not_do_en:
  - "Do not present ART to the patient as 'protection from Kaposi' — this is a cancer-incidence-reduction intervention, not a guarantee. Disclaimer per CHARTER §11."
  - "Do not change transplant-immunosuppression regimen unilaterally without transplant-team consult — risk of allograft rejection."
  - "Do not skip mucocutaneous / oral exam at routine visits — early Kaposi sarcoma detection drives prognosis."

