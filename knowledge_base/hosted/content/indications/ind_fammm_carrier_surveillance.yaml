do_not_do:
  - "Не використовувати тільки visual self-exam — annual whole-body dermatology з total body photography + dermoscopy потрібна для multi-primary CDKN2A phenotype."
  - "Не пропускати pancreatic surveillance — CDKN2A — один з небагатьох hereditary syndromes зі sufficient absolute risk per CAPS Consortium consensus."
  - "Не пропускати smoking cessation discussion — single most important modifiable cofactor для CDKN2A pancreatic risk; multiplicatively raises baseline."
  - "Не використовувати tanning beds — UV exposure dominant modifiable melanoma risk; tanning bed use в anyone з CDKN2A categorically contraindicated."
  - "Не пропускати pediatric skin exam — childhood UV exposure найсильніший modifiable melanoma risk factor."

do_not_do_en:
  - "Do not use visual self-exam alone — annual whole-body dermatology with total body photography and dermoscopy is required for the multi-primary CDKN2A phenotype."
  - "Do not skip pancreatic surveillance — CDKN2A is one of the few hereditary syndromes with sufficient absolute risk per CAPS Consortium consensus."
  - "Do not skip smoking-cessation discussion — single most important modifiable cofactor for CDKN2A pancreatic risk; multiplicatively raises baseline."
  - "Do not use tanning beds — UV exposure is the dominant modifiable melanoma risk; tanning bed use in anyone with CDKN2A is categorically contraindicated."
  - "Do not skip pediatric skin exam — childhood UV exposure is the strongest modifiable melanoma risk factor."

