expected_outcomes:
  overall_response_rate: >-
    Whole-body dermatology surveillance with total body photography +
    dermoscopy in CDKN2A carriers detects melanoma at smaller (median
    < 1 mm Breslow) and lower-stage presentation than population
    screening — corresponding to ~95% disease-specific survival vs
    ~85-90% in unselected populations. Pancreatic surveillance per CAPS
    Consortium (EUS or MRI / MRCP q1-2y from age 40) detects pancreatic
    intraepithelial neoplasia or T1 adenocarcinoma in a meaningful
    minority of high-risk carriers — yielding higher resectability and
    R0 resection rates. Sun-protection counseling reduces UV-driven
    accelerator effect on background CDKN2A risk.

