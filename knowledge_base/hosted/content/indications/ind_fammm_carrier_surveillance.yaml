rationale: >
  Standard-track confirmed-carrier surveillance pathway for CDKN2A-
  positive carriers per NCCN Genetic / Familial High-Risk: Breast,
  Ovarian, Pancreatic (covers FAMMM pancreatic surveillance), Goldstein
  et al. recommendations, and CAPS Consortium consensus.

  **Cutaneous melanoma (~60-80% lifetime; often multiple primaries):**
  Annual whole-body skin examination by dermatologist with total body
  photography (digital baseline + annual comparison) and dermoscopy
  for atypical nevi. Self-examination education with mirror / partner
  technique for hard-to-see sites. Lower threshold for excisional
  biopsy of any changing / atypical lesion. Earlier start: at-risk
  pediatric carriers from age 10 with parental-supervised skin exam.

  **Pancreatic adenocarcinoma (~15-25% lifetime — CDKN2A is CAPS
  Consortium-eligible):** EUS or MRI / MRCP q1-2y starting age 40
  (earlier if family pancreatic cancer < age 50 — see INTENSIFIED
  track for that scenario). HbA1c q1y as adjunctive early-diabetes
  signal. Smoking cessation is essential — smoking is the dominant
  modifiable cofactor (multiplicatively raises CDKN2A pancreatic risk).

  **Sun-protection counseling:** Broad-spectrum SPF 30+ daily;
  protective clothing (long sleeves, hats with brims, sun-protective
  fabric); avoidance of peak-UV hours; tanning bed prohibition.
  Particularly important in pediatric / adolescent carriers (childhood
  UV exposure is the strongest modifiable melanoma risk factor).

  **Cascade testing:** Mandates offer to all first-degree relatives.
  Pediatric testing appropriate given the childhood-onset skin exam
  window.

  **Uveal melanoma (modest elevation):** No dedicated ophthalmology
  surveillance required for CDKN2A carriers (unlike BAP1-TPDS — see
  RF-BAP1-CONFIRMED-CARRIER for ocular surveillance). Routine eye
  exams sufficient.

  Per CHARTER §11 patient-autonomy framing; pediatric surveillance
  requires family counseling.

rationale_ua: >
  Стандартний-трек confirmed-carrier surveillance per NCCN +
  Goldstein recommendations + CAPS Consortium.

  **Шкірна меланома (~60-80%; часто multiple primaries):** Annual
  whole-body skin exam дерматологом + total body photography (digital
  baseline + annual comparison) + dermoscopy для atypical nevi. Self-
  examination education з mirror / partner technique. Lower threshold
  excisional biopsy будь-якого changing / atypical lesion. Earlier
  start: at-risk pediatric carriers з 10 років (parental-supervised).

  **Pancreatic adenocarcinoma (~15-25% — CAPS-eligible):** EUS або
  МРТ / MRCP q1-2y з 40 років. HbA1c q1y. Smoking cessation essential
  — smoking multiplicatively raises CDKN2A pancreatic risk.

  **Sun-protection counseling:** Broad-spectrum SPF 30+ daily;
  protective clothing; avoidance peak-UV hours; tanning bed prohibition.
  Particularly important у pediatric / adolescent carriers.

  **Cascade тестування:** mandates пропонування first-degree родичам;
  pediatric appropriate.

  **Увеальна меланома (modest elevation):** No dedicated ophthalmology
  surveillance потрібна для CDKN2A (unlike BAP1-TPDS). Routine eye
  exams sufficient.

  Per CHARTER §11 framing автономії пацієнта.

