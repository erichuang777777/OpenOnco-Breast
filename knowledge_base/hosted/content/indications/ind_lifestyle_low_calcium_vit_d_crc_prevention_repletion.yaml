expected_outcomes:
  overall_response_rate: "Repletion of dietary calcium to RDA target (1000-1200 mg/day) + vitamin D to ≥50 nmol/L circulating 25-OH-D is associated with modest CRC-incidence reduction in observational cohorts (~8-15% per WCRF/AICR meta-analysis for calcium; ~30% highest-vs-lowest quartile for vitamin D status). RCT data for supplementation are mixed at population doses — adequate-intake repletion is favored over high-dose pharmacologic supplementation. Skeletal health + cardiovascular co-benefits are well-established."

