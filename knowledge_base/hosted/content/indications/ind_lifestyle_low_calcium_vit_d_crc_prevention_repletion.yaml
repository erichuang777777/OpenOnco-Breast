do_not_do:
  - "Не призначати supraphysiologic vitamin D dosing (>4000 IU/день chronic) — нема CRC-prevention benefit, є risk of hypercalcemia / nephrolithiasis."
  - "Не покладатися виключно на calcium supplements при reachable dietary intake — food sources favored через cardiovascular signal в meta-analyses високих supplement доз."
  - "Не презентувати vitamin D як monotherapy для CRC prevention — RCT evidence (VITAL, ViDA) negative для primary incidence reduction at population doses."
  - "Не пропускати CRC screening — base-rate USPSTF cadence indicated незалежно від repletion status."
  - "Не ігнорувати UV-skin-cancer risk при sunlight counseling — balance потрібен; high-Fitzpatrick types отримують більший Vit D yield з shorter exposures."

do_not_do_en:
  - "Do not prescribe supraphysiologic vitamin D dosing (>4000 IU/day chronic) — no CRC-prevention benefit; risk of hypercalcemia / nephrolithiasis."
  - "Do not rely exclusively on calcium supplements when dietary intake is reachable — food sources are favored given cardiovascular signal in meta-analyses of high supplement doses."
  - "Do not present vitamin D as monotherapy for CRC prevention — RCT evidence (VITAL, ViDA) is negative for primary incidence reduction at population doses."
  - "Do not skip CRC screening — base-rate USPSTF cadence is indicated regardless of repletion status."
  - "Do not ignore UV-skin-cancer risk in sunlight counseling — balance is needed; high-Fitzpatrick types achieve greater Vit D yield from shorter exposures."

known_controversies:
  - topic: "Vitamin D supplementation efficacy for primary CRC-incidence prevention"
    positions:
      - position: "Observational + IARC pooled signal supports protective association (~30% incidence reduction in highest vs lowest 25-OH-D quartile)"
      - position: "RCT supplementation evidence (VITAL, ViDA) negative for primary CRC-incidence reduction at population doses (~2000 IU/day); modest signal for CRC mortality reduction"
    our_default: "Targeted repletion in documented deficiency (25-OH-D <30 nmol/L per IOM) is favored over high-dose pharmacologic supplementation for cancer-prevention purposes."
    rationale: "Reconciles observational + RCT divergence by limiting intervention to repletion of confirmed deficiency rather than universal supplementation."

