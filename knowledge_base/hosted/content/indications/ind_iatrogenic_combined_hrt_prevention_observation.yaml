do_not_do:
  - "Не презентувати observation як еквівалент structured screening + shared-decision review — earlier-stage detection достовірно кращі outcomes."
  - "Не пропускати explicit symptom-vigilance education — pattern-recognition critical для symptom-prompted evaluation."
  - "Не виключати patient зі symptom-prompted endometrial / breast workup access — навіть при declining routine screening."
  - "Не нормалізувати unexpected або postmenopausal bleeding — будь-який alarm symptom requires evaluation."
  - "Не продовжувати HRT за default без periodic reassessment risk-benefit — CV ризик evolves з віком."

do_not_do_en:
  - "Do not present observation as equivalent to structured screening + shared-decision review — earlier-stage detection produces reliably better outcomes."
  - "Do not skip explicit symptom-vigilance education — pattern recognition is critical for symptom-prompted evaluation."
  - "Do not deny the patient symptom-prompted endometrial / breast workup access — even if routine screening is declined."
  - "Do not normalize unexpected or postmenopausal bleeding — any alarm symptom requires evaluation."
  - "Do not continue HRT by default without periodic risk-benefit reassessment — CV risk evolves with age."

