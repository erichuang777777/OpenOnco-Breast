rationale: >
  Alternative-track companion to IND-IATROGENIC-COMBINED-HRT-
  PREVENTION-SURVEILLANCE. Patient declines structured shared-
  decision HRT review + age-appropriate mammographic screening
  + annual GYN exam (screening fatigue, geographic access,
  preference, comfort with current symptom control) — receives
  explicit symptom-vigilance education (breast lump, skin
  retraction / dimpling, nipple discharge, ANY unexpected
  bleeding outside the expected sequential-withdrawal pattern,
  postmenopausal bleeding → immediate breast / gynecology
  referral, regardless of how minor it appears) + cardiovascular
  / VTE self-awareness counseling (new leg swelling, chest pain,
  neurologic symptom → emergency evaluation; not HRT-stop in
  isolation but acute event workup). Per CHARTER §11 patient-
  autonomy framing — declining the structured pathway is
  legitimate but framed as suboptimal vs. annual-review +
  screening comparator. Particular emphasis: endometrial cancers
  in HRT-exposed women present with bleeding ~95% of the time —
  symptom-prompted pathway has high sensitivity.

rationale_ua: >
  Альтернативно-трекова Indication. Пацієнт відмовляється від
  structured shared-decision HRT review + age-appropriate
  mammographic screening + annual GYN exam — отримує explicit
  symptom-vigilance education (breast lump, skin retraction,
  nipple discharge, БУДЬ-ЯКЕ unexpected bleeding поза очікуваним
  sequential-withdrawal pattern, postmenopausal bleeding →
  immediate breast / gynecology referral) + cardiovascular /
  VTE self-awareness counseling (new leg swelling, chest pain,
  neurologic symptom → emergency evaluation). Per CHARTER §11.
  Особлива емфаза: endometrial cancers у HRT-exposed жінок
  presented з bleeding ~95% часу — symptom-prompted pathway
  має високу sensitivity.

