expected_outcomes:
  overall_response_rate: "Patient declines structured shared-decision review + age-appropriate screening — receives baseline symptom-vigilance education on breast (lump, skin change, nipple discharge) and endometrial (any unexpected bleeding) alarm symptoms. Breast and endometrial cancers may go undetected at screen-detectable stage; outcomes worse than with structured screening + shared-decision arm. Patient also missing periodic reassessment of HRT risk-benefit ratio — continued use under default may persist past the window where benefits outweigh risks (cardiovascular risk profile evolves with age)."

