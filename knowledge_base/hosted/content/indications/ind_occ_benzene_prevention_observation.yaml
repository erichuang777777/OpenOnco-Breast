rationale: >
  Alternative-track companion to IND-OCC-BENZENE-PREVENTION-
  INTENSIFIED-SURVEILLANCE. Patient with documented prior
  occupational benzene exposure who declines structured CBC
  surveillance — for any reason (preference for less-interventional
  pathway, low perceived risk, anxiety-from-monitoring concerns,
  cost / access constraints, life expectancy, competing illness) —
  is offered the following:

  **Symptom-triggered CBC + workup.** Patient presents to primary
  care or hematology if new symptoms emerge: persistent fatigue
  beyond baseline, easy bruising / petechiae / mucosal bleeding,
  recurrent or atypical infections, B-symptoms (fever, night
  sweats, weight loss), bone pain, persistent unexplained anemia
  symptoms (pallor, exertional dyspnea, palpitations). CBC at
  presentation; abnormal result triggers the intensified-
  surveillance pathway with marrow workup if persistent / unexplained.

  **Annual primary-care encounter.** Routine annual physical with
  symptom inquiry maintained; explicit re-discussion of CBC
  surveillance pathway at each encounter to allow patient to opt
  back in.

  **No imaging / marrow at baseline.** This pathway explicitly
  forgoes structured CBC monitoring; bone marrow workup is reserved
  for symptomatic presentation.

  Routing reconsiderations: the patient may revisit the
  intensified-surveillance pathway at any subsequent visit; this
  Indication does not preclude future surveillance escalation.
  Family events (relative diagnosed with hematologic malignancy),
  new co-morbidity (autoimmune cytopenia, unexplained transfusion
  requirement), or change in risk perception are common triggers
  for re-engagement. Per CHARTER §11 patient-autonomy framing:
  hematologic surveillance is a shared-decision-making domain where
  the cumulative monitoring burden, anxiety profile, and access
  cost must be weighed against an early-detection benefit that is
  meaningful but not life-saving in absolute terms for the average
  benzene-exposed worker.

rationale_ua: >
  Альтернативно-трекова Indication — компаньйон до IND-OCC-BENZENE-
  PREVENTION-INTENSIFIED-SURVEILLANCE. Пацієнт з документованим
  попереднім професійним впливом бензолу, який відмовляється від
  структурованого CBC спостереження — з будь-якої причини
  (перевага менш-інтервенційного шляху, низько-сприйнятий ризик,
  занепокоєння тривогою від моніторингу, обмеження
  вартості / доступу, очікувана тривалість життя, competing
  illness) — отримує:

  **Symptom-triggered CBC + workup.** Пацієнт презентується до
  primary care або гематології при появі нових симптомів:
  persistent втома понад baseline, легка ушкоджуваність /
  петехії / мукозальні кровотечі, рецидивні або атипові інфекції,
  B-симптоми (лихоманка, нічні поти, втрата ваги), біль у кістках,
  persistent нез'ясовані anemia симптоми (блідість, exertional
  диспное, серцебиття). CBC на презентацію; abnormal результат
  спрацьовує intensified-surveillance шлях з marrow workup при
  persistent / нез'ясованому.

  **Щорічна primary-care зустріч.** Рутинний щорічний огляд з
  опитуванням симптомів зберігається; явне re-discussion CBC
  surveillance шляху на кожній зустрічі, щоб дозволити пацієнту
  opt-back-in.

  **Без imaging / marrow на baseline.** Цей шлях явно відмовляється
  від структурованого CBC моніторингу; bone marrow workup
  зарезервовано для симптоматичної презентації.

  Reroute: пацієнт може повернутися до інтенсифікованого
  спостереження на будь-якому подальшому візиті; ця Indication не
  виключає майбутню surveillance ескалацію. Сімейні події (родич
  з гематологічною малігнізацією), нова co-morbidity
  (autoimmune cytopenia, нез'ясована потреба у трансфузії), або
  зміна сприйняття ризику — поширені тригери для re-engagement.
  Per CHARTER §11 framing автономії пацієнта.

