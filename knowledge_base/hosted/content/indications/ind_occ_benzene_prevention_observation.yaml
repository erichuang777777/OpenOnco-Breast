expected_outcomes:
  overall_response_rate: >-
    Primary endpoint: avoidance of structured CBC surveillance when
    patient declines the intensified-monitoring pathway. Cancer-
    incidence outcome: no reduction in benzene-attributable
    myeloid-neoplasm incidence; surveillance does NOT change
    incidence and is justified on early-detection grounds. Symptom-
    triggered evaluation (fatigue, easy bruising, recurrent
    infection, B-symptoms) is the safety net, but presentation at
    overt cytopenia or frank leukemia typically carries worse
    transplant-outcome profile than at prodromal MDS / CHIP-CCUS
    stage. Routine clinical encounters (annual physical) continue.

