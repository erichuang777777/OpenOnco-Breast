sources:
  - source_id: SRC-NCCN-AML-2025
    position: context
    relevant_quote_paraphrase: >-
      "Patients who decline structured CBC surveillance require
      symptom-triggered evaluation; presentation at frank leukemia
      carries worse outcome profile than at prodromal MDS / CHIP
      stage."
  - source_id: SRC-ESMO-MDS-2021
    position: context
    relevant_quote_paraphrase: >-
      "Shared decision-making informs surveillance cadence; periodic
      re-discussion of the structured-surveillance pathway is
      appropriate."

do_not_do:
  - "Не презентувати observation як еквівалент структурованого CBC спостереження — early-detection benefit відсутній; benzene-attributable excess risk не адресується."
  - "Не ігнорувати alarm features (легка ушкоджуваність, recurrent інфекції, B-симптоми) — immediate CBC + smear огляд, низький поріг для marrow."
  - "Не використовувати цей шлях як стандарт першої лінії — intensified-surveillance трек залишається preferred recommendation."
  - "Не presenting decision як остаточне — periodic re-discussion структурованого CBC спостереження доречне на повторних візитах."
  - "Не пропускати річний primary-care огляд — анамнез + фізикальне обстеження дають мінімальний safety-net, навіть без CBC моніторингу."

do_not_do_en:
  - "Do not present observation as equivalent to structured CBC surveillance — the early-detection benefit is absent; the benzene-attributable excess risk is unaddressed."
  - "Do not ignore alarm features (easy bruising, recurrent infections, B-symptoms) — immediate CBC + smear review, low threshold for marrow workup."
  - "Do not use this pathway as a first-line standard — the intensified-surveillance track remains the preferred recommendation."
  - "Do not present the decision as final — periodic re-discussion of structured CBC surveillance is appropriate at follow-up visits."
  - "Do not skip the annual primary-care visit — history-plus-exam provides a minimum safety net even without CBC monitoring."

