do_not_do:
  - "Не використовувати цей шлях у cirrhotic A1AT — потребують AASLD US/AFP q6 міс."
  - "Не використовувати цей шлях у active smokers — потребують активного cessation + LDCT screening eligibility."
  - "Не презентувати observation як еквівалент structured surveillance — interval-cancer ризик вищий."
  - "Не ігнорувати нову decompensation, респіраторну симптоматику, або PFT-decline — імідіат-imaging."
  - "Не пропускати періодичну elastography / PFTs — fibrosis або emphysema progression потребує переходу на standard track."

do_not_do_en:
  - "Do not use this pathway in cirrhotic A1AT — they require AASLD US/AFP every 6 months."
  - "Do not use this pathway in active smokers — they require active cessation + LDCT screening eligibility."
  - "Do not present observation as equivalent to structured surveillance — interval-cancer risk is higher."
  - "Do not ignore new decompensation, respiratory symptoms, or PFT decline — immediate imaging."
  - "Do not skip periodic elastography / PFTs — fibrosis or emphysema progression warrants transition to the standard track."

