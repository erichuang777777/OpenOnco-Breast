rationale: >
  Alternative-track companion to IND-A1AT-DEFICIENCY-HCC-LUNG-
  PREVENTION-SURVEILLANCE. Appropriate primarily for non-cirrhotic
  non-smoking A1AT-deficient patients with stable hepatic and
  pulmonary function who choose minimum-intensity surveillance for
  any of: cost / access constraints, procedural anxiety, geographic
  distance, severe comorbidity limiting life expectancy, or explicit
  preference after informed-consent discussion.

  **Cadence:**
    - Hepatology / pulmonology follow-up per usual cadence (q6-12mo)
      with examination, LFT panel, AFP, INR, platelet count, basic
      PFTs (FEV1, FEV1/FVC, DLCO), smoking status, second-hand smoke
      exposure
    - Smoking cessation counseling at every visit if applicable
    - Vaccinations (influenza annually; pneumococcal per schedule;
      HBV if not immune)
    - Imaging only when triggered by:
      - New hepatic decompensation (ascites, encephalopathy, jaundice)
      - LFT pattern change (rising AFP, new hepatic mass on
        examination, new RUQ pain)
      - New respiratory symptoms (dyspnea, hemoptysis, persistent
        cough, recurrent pneumonia)
      - PFT decline (FEV1 ≥10% absolute drop or DLCO ≥15% drop on
        repeat measurement)
      - B-symptoms (fever, night sweats, unintentional weight loss)
      - Patient becomes USPSTF LDCT-eligible

  **Not appropriate for:**
    - Cirrhotic A1AT (Child-Pugh A through C) — these meet AASLD
      surveillance criteria; should be on the standard track
    - Current smokers regardless of pack-year history
    - PiZZ patients with established emphysema (FEV1 <80% or DLCO
      <70% predicted) — these meet symptomatic-disease threshold and
      benefit from active monitoring
    - A1AT with concurrent HBV/HCV (HCC risk multiplied)
    - Patients with prior HCC, lung cancer, or other A1AT-related
      cancer

  Per CHARTER §11 patient-autonomy framing: non-cirrhotic non-smoking
  A1AT carries modest absolute cancer risk (HCC near-baseline without
  cirrhosis; lung-cancer SIR ~2 in non-smoking PiZZ but absolute
  incidence still low). Informed-consent observation is defensible
  for this subset. Patient retains option to upgrade at any visit;
  emerging cirrhosis or new emphysema mandates transition.

  **Alarm features** route immediately to abdominal imaging (US/MRI)
  or HRCT chest as appropriate — and if HCC or lung cancer confirmed,
  to the treatment-persona algorithm via DIS-HCC or DIS-NSCLC.

rationale_ua: >
  Альтернативно-трекова Indication — компаньйон до
  IND-A1AT-DEFICIENCY-HCC-LUNG-PREVENTION-SURVEILLANCE. Доречно
  переважно для non-cirrhotic non-smoking A1AT-deficient пацієнтів
  зі стабільною hepatic та pulmonary функцією, які обирають мінімальної
  інтенсивності спостереження з причин: вартість / доступ, процедурна
  тривога, географічна відстань, важка коморбідність з обмеженою
  тривалістю життя.

  **Частота:**
    - Hepatology / pulmonology follow-up per usual частотою (q6-12 міс)
      з обстеженням, LFT, AFP, INR, тромбоцитами, базовими PFTs (FEV1,
      FEV1/FVC, DLCO), smoking status
    - Smoking cessation counseling на кожному візиті
    - Vaccinations (influenza, pneumococcal, HBV)
    - Imaging лише при триггері:
      - Нова hepatic decompensation
      - LFT pattern change (зростаюче AFP, нова hepatic mass)
      - Нові респіраторні симптоми (диспное, кровохаркання, persistent
        кашель)
      - PFT decline (FEV1 ↓ ≥10% або DLCO ↓ ≥15%)
      - B-симптоми
      - Пацієнт стає USPSTF LDCT-eligible

  **Не доречно для:**
    - Cirrhotic A1AT — задовольняють AASLD surveillance
    - Активних курців
    - PiZZ з встановленою емфіземою (FEV1 <80% або DLCO <70%)
    - A1AT з coexisting HBV/HCV
    - Пацієнтів з попереднім HCC, lung cancer

  Per CHARTER §11 framing автономії пацієнта: non-cirrhotic
  non-smoking A1AT — модерний абсолютний ризик. Informed-consent
  observation defensible.

  **Alarm features** маршрутизують негайно до абдомінального imaging
  або HRCT грудей.

