rationale: >
  Standard-track prevention pathway for Peutz-Jeghers syndrome (STK11/LKB1) family
  history suspicion. Two parallel referrals:

  **(1) Genetic counseling referral.** Pre-test counseling: autosomal dominant
  inheritance, variable penetrance, cascade testing for relatives, implications
  for reproductive planning (pre-implantation genetic testing option), psychological
  preparation for high cancer risk across multiple organ systems.

  **(2) Germline STK11/LKB1 panel testing.** Modern multi-gene panels cover STK11
  along with the broader hereditary CRC + breast + GI cancer set. Variant
  classification per ACMG framework.

  **Surveillance protocol for confirmed STK11 carriers** (per international PJ
  consensus):
  - Small-bowel surveillance via video capsule endoscopy (VCE) OR MR enterography
    q2-3 years starting age 8-10 (small-bowel hamartomatous polyposis can present
    with intussusception in childhood).
  - Colonoscopy q2-3 years starting age 18.
  - EGD q2-3 years starting age 8-10.
  - Breast MRI from age 30 (women).
  - Pancreatic surveillance discussion (EUS/MRI q1-2y from 30-35) — controversial,
    high-volume center referral.
  - Annual clinical breast/testicular/pelvic exam from puberty.
  - Cervical Pap with adenoma malignum awareness (women).

rationale_ua: >
  Стандартний-трек prevention шлях для родовідної підозри на синдром Peutz-
  Jeghers (STK11/LKB1). Два паралельні направлення:

  **(1) Направлення на генетичне консультування.** Pre-test counseling: autosomal
  dominant наслідування, варіабельна пенетрантність, cascade тестування для
  родичів, наслідки для reproductive planning (опція pre-implantation genetic
  testing), психологічна підготовка до високого онкоризику в багатьох
  органних системах.

  **(2) Germline STK11/LKB1 панельне тестування.** Сучасні мультигенні панелі
  покривають STK11 разом з ширшим набором спадкових КРР + молочна залоза + GI
  ризиків. Класифікація варіантів за ACMG.

  **Surveillance протокол для підтверджених STK11 носіїв:**
  - Small-bowel surveillance через video capsule endoscopy (VCE) АБО MR enterography
    q2-3 роки з 8-10 років (small-bowel hamartomatous polyposis може презентуватися
    інвагінацією у дитинстві).
  - Колоноскопія q2-3 роки з 18.
  - EGD q2-3 роки з 8-10.
  - Breast MRI з 30 років (жінки).
  - Pancreatic surveillance discussion (EUS/MRI q1-2y з 30-35) — контроверсійно,
    направлення в high-volume центр.

