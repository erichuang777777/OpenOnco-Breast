do_not_do:
  - "Не призначати germline тестування без pre-test counseling."
  - "Не використовувати дитячу колоноскопію без чіткого clinical indication — small-bowel hamartomas можна моніторити через VCE/MR enterography з меншою інвазивністю."
  - "Не презентувати negative-panel result як zero-risk — residual ризик через rare варіанти, не покриті панеллю."
  - "Не пропускати breast surveillance у STK11+ жінок — breast cancer ризик ~30-55%."

do_not_do_en:
  - "Do not order germline testing without pre-test counseling."
  - "Do not use pediatric colonoscopy without clear clinical indication — small-bowel hamartomas can be monitored via VCE/MR enterography with less invasiveness."
  - "Do not present a negative-panel result as zero-risk — residual risk through rare variants not covered by the panel."
  - "Do not skip breast surveillance in STK11+ women — breast cancer risk ~30-55%."

