expected_outcomes:
  overall_response_rate: "Germline STK11 panel testing positivity in pedigree-suspicion populations: ~70-90% in classic PJ phenotype. Confirmed STK11 pathogenic variant carriers have lifetime cancer risks: GI (~40-65% CRC + gastric + small bowel + pancreas), breast (~30-55% women), gynecologic (~10-20% cervical adenoma malignum + ovarian sex-cord), testicular Sertoli cell. Surveillance reduces mortality particularly for small-bowel intussusception (canonical PJ complication, often in first 2 decades)."

