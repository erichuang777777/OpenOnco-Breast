do_not_do:
  - "Не пропускати urine cytology у annual screening — urinalysis alone has lower sensitivity для urothelial carcinoma in situ, особливо у cyclophosphamide-exposed cohort."
  - "Не нормалізувати microscopic hematuria як 'UTI' без cystoscopic evaluation у cyclophosphamide survivors — diagnostic delay frequent."
  - "Не виконувати routine prophylactic marrow biopsies у asymptomatic patients з normal CBC — yield poor."
  - "Не призначати additional alkylator-based therapy для benign indications якщо alternatives exist — rituximab + mycophenolate для autoimmune disease."
  - "Не вважати t-MDS / t-AML always fatal — early-detected t-MDS amenable до allogeneic HSCT з meaningful long-term survival."

do_not_do_en:
  - "Do not skip urine cytology in annual screening — urinalysis alone has lower sensitivity for urothelial carcinoma in situ, especially in a cyclophosphamide-exposed cohort."
  - "Do not normalize microscopic hematuria as 'UTI' without cystoscopic evaluation in cyclophosphamide survivors — diagnostic delay is frequent."
  - "Do not perform routine prophylactic marrow biopsies in asymptomatic patients with a normal CBC — yield is poor."
  - "Do not prescribe additional alkylator-based therapy for benign indications when alternatives exist — rituximab + mycophenolate for autoimmune disease."
  - "Do not consider t-MDS / t-AML always fatal — early-detected t-MDS is amenable to allogeneic HSCT with meaningful long-term survival."

