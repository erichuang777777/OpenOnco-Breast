expected_outcomes:
  overall_response_rate: "High-cumulative-dose cyclophosphamide survivor cohorts (Hyper-CVAD, pediatric ALL induction, BMT conditioning): bladder cancer SIR 4-7× population baseline with cumulative incidence 3-5% at 25y, latency 10-20y; t-AML/MDS cumulative ~1-3% at 10y with peak 5-10y post-exposure. Annual urinalysis + cytology detects urothelial carcinoma at earlier (often non-muscle-invasive, TURBT-curable) stage vs. symptom-driven late presentation. CBC q3-6mo for first 5y catches t-MDS at cytopenic phase enabling early allogeneic HSCT evaluation in fit candidates."

