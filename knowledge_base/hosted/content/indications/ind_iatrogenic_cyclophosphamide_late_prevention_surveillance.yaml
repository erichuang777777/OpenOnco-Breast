rationale: >
  Standard-track late-effects surveillance for cancer survivors with
  prior cumulative cyclophosphamide ≥7 g/m². Components per NCCN
  Bladder Cancer + NCCN AML Survivorship + Childhood Cancer Survivor
  Study (CCSS) + COG-LTFU:

  **(1) Annual urinalysis + urine cytology** —
  - Both modalities together (complementary detection sensitivity)
  - Annual cadence lifelong post-exposure (highest risk window
    10-20y post-treatment but does not plateau)
  - Any unexplained microscopic or gross hematuria → cystoscopy +
    CT urography preferred
  - Particularly important in survivors who received cyclophosphamide
    without MESNA uroprotection (legacy regimens) or with documented
    hemorrhagic cystitis during primary treatment

  **(2) CBC with differential q3-6 months for first 5 years post-
  chemotherapy** — Then q12mo lifelong. Median t-AML latency 5-7y
  post-alkylator exposure; risk plateaus after 10y but does not
  return to baseline.

  **(3) Low-threshold bone marrow evaluation** for any of:
  - New unexplained cytopenia (anemia, neutropenia, thrombocytopenia)
  - Persistent macrocytosis (MCV >100)
  - Dysplastic changes on peripheral smear
  - Unexplained monocytosis
  Bone marrow aspirate + biopsy + cytogenetics + flow cytometry +
  NGS panel (TP53, ASXL1, RUNX1, -7/-5/del5q signal).

  **(4) Bladder symptom education** —
  - Survivor self-reporting: any new urgency / frequency / dysuria
    / hematuria → urgent UA + urology evaluation
  - Lower threshold for cystoscopy in this cohort (general PCP-level
    "rule out UTI" approach can delay diagnosis by months)

  **(5) Avoid additional bone-marrow-toxic + bladder-toxic
  exposures** —
  - Avoid additional alkylator-based therapy for benign indications
    (autoimmune disease) when alternatives exist (e.g., rituximab,
    mycophenolate)
  - Counsel about benzene exposure (refer to RF-OCC-BENZENE if
    occupational risk)
  - Smoking cessation (compounds bladder cancer risk independently)

  **(6) Patient education re: symptoms** —
  - t-MDS / t-AML: easy bruising, prolonged bleeding, persistent
    fatigue, recurrent infections, fever — report immediately
  - Bladder cancer: hematuria (any episode), persistent voiding
    symptoms — report immediately

  **(7) Co-fired surveillance** — high-cumulative-dose cyclophosphamide
  may also meet RF-IATROGENIC-ALKYLATOR-TAML-PREVENTION trigger; both
  RFs can fire on same patient and engine builds combined
  PreventionPlan covering bladder + leukemia surveillance dimensions.

rationale_ua: >
  Стандартний-трек late-effects surveillance для виживачів раку з
  prior cumulative cyclophosphamide ≥7 г/м². Components per NCCN
  Bladder + NCCN AML Survivorship + CCSS + COG-LTFU:

  **(1) Щорічний urinalysis + urine cytology** —
  - Обидві modalities разом (complementary detection sensitivity)
  - Annual cadence lifelong
  - Будь-яка hematuria → cystoscopy + CT urography
  - Particularly important у survivors без MESNA uroprotection
    (legacy regimens) або з documented hemorrhagic cystitis

  **(2) CBC з diff q3-6 міс перші 5 років** — потім q12mo lifelong.
  Median t-AML latency 5-7р post-alkylator.

  **(3) Low-threshold bone marrow evaluation** при:
  - New unexplained cytopenia
  - Persistent macrocytosis (MCV >100)
  - Dysplastic changes на peripheral smear
  - Unexplained monocytosis
  BM aspirate + biopsy + cytogenetics + flow + NGS panel.

  **(4) Bladder symptom education** — будь-яка нова urgency /
  frequency / dysuria / hematuria → urgent UA + urology.

  **(5) Уникати additional bone-marrow-toxic + bladder-toxic exposures**
  — alternative therapy для autoimmune (rituximab, mycophenolate);
  smoking cessation; benzene counseling.

  **(6) Patient education re: symptoms** — t-MDS / t-AML: easy
  bruising, fatigue, infections; bladder cancer: hematuria, voiding
  symptoms.

  **(7) Co-fired surveillance** — high-cumulative-dose cyclophosphamide
  може спрацьовувати з RF-IATROGENIC-ALKYLATOR-TAML-PREVENTION;
  combined PreventionPlan.

