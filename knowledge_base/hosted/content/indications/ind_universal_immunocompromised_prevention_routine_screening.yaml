  - Lymphadenopathy + B-symptoms у post-transplant cohort →
    EBV-VL + nodal biopsy (PTLD workup).
  - Skin SCC / BCC pattern recognition.

  **(3) Vaccination as feasible** — HPV catch-up до 45 років;
