expected_outcomes:
  overall_response_rate: >-
    Alternative-track companion. Patient declines stratified
    immunocompromised-specific screening cadence (HRA / annual
    cervical / q6-12mo dermatology / EBV-VL monitoring) —
    receives routine general-population screening cadence per
    USPSTF / NCCN baseline + symptom-vigilance education +
    re-engagement opportunity at each annual visit. Outcomes
    inferior to stratified-program comparator: anal cancer
    detection later, cervical CIN missed at accelerated cadence,
    skin SCC at later stage, EBV-PTLD precursor states missed.
    Per CHARTER §11 patient-autonomy framing — declining stratified
    cadence is legitimate but framed as suboptimal vs intervention-
    arm comparator.

