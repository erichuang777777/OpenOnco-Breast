do_not_do:
  - "Не презентувати routine general-population screening як еквівалент immunocompromised-specific cadence — outcomes inferior."
  - "Не пропускати symptom-vigilance education — у immunocompromised cohort alarm symptoms warrant prompt evaluation."
  - "Не deny dermatology / anoscopy / colposcopy access at symptom presentation — symptom-prompted access є backup для declined-cadence pathway."
  - "Не закривати door на re-engagement — більшість патієнтів eventually engage при emerging symptoms."
  - "Не deny vaccination на основі declined-screening — vaccination axis окрема від surveillance cadence."

do_not_do_en:
  - "Do not present routine general-population screening as equivalent to immunocompromised-specific cadence — outcomes are inferior."
  - "Do not skip symptom-vigilance education — in the immunocompromised cohort, alarm symptoms warrant prompt evaluation."
  - "Do not deny dermatology / anoscopy / colposcopy access at symptom presentation — symptom-prompted access is the backup for the declined-cadence pathway."
  - "Do not close the door on re-engagement — most patients eventually engage when symptoms emerge."
  - "Do not deny vaccination on the basis of declined-screening — vaccination axis is separate from surveillance cadence."

