rationale: >
  Alternative-track companion to IND-UNIVERSAL-IMMUNOCOMPROMISED-
  PREVENTION-STRATIFIED-SCREENING. Patient declines stratified
  immunocompromised-specific cadence — receives routine general-
  population screening + symptom-vigilance education.

  **(1) Routine general-population screening per USPSTF / NCCN.**
  CRC q10y colonoscopy 45-75, breast q2y mammography 40-74,
  cervical hr-HPV / co-test q5y modality-appropriate (NOT
  accelerated annual cadence), LDCT if USPSTF-eligible, prostate
  PSA shared-decision 55-69. Patient retains right to engage
  with selective enhanced surveillance subsequently (e.g.,
  consent to dermatology referral as opportunistic skin-cancer
  evaluation even if declining q6-12mo cadence).

  **(2) Symptom-vigilance education for immunocompromised-cohort
  cancers.**
  - Anal canal symptoms (pain, bleeding, mass) → anoscopy +
    biopsy referral regardless of routine cadence.
  - Cervical / vaginal symptoms (abnormal bleeding, persistent
    discharge, post-coital bleeding) → colposcopy referral
    regardless of routine cadence.
  - Skin lesion change (new mole, growing nodule, non-healing
    sore) → dermatology referral with low-threshold biopsy.
  - Mucocutaneous lesions in HIV+ cohort (Kaposi-suspicious
    purple-blue cutaneous / oral lesions) → biopsy +
    histopathology.
  - Lymphadenopathy + B-symptoms in post-transplant cohort →
    EBV-VL + nodal biopsy (PTLD workup).
  - Skin SCC / BCC pattern recognition (non-healing erosion,
    irregular pigmentation, rapidly growing nodule).

  **(3) Vaccination as feasible.** HPV vaccine catch-up to age
  45 per ACIP (immunocompromised cohort accelerated cadence);
  hepatitis B vaccination; PCV13 / PPSV23 per ACIP; influenza /
  COVID per immunocompromised guidance.

  **(4) Re-engagement pathway.** Document declined-stratified-
  cadence determination explicitly + offer re-engagement at each
  annual visit. Many patients who initially decline stratified
  cadence eventually engage when symptoms emerge or when peer /
  family experience shifts priorities.

  **(5) Underlying-immunosuppression management coordination.**
  Patient's primary immunosuppression management (HIV-ART,
  transplant immunosuppression, autoimmune immunosuppression)
  remains under specialty-care coordination; the prevention-
  persona surveillance is supplementary, not a replacement
  for the primary management.

  Per CHARTER §11 patient-autonomy framing.

