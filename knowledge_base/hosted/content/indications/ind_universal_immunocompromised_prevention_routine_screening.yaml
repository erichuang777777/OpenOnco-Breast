  **(1) Routine general-population screening per USPSTF / NCCN.**
  CRC q10р колоноскопія, breast q2р мамографія, cervical
  baseline cadence (НЕ accelerated annual). Patient retains
  right to selective enhanced surveillance.

  **(2) Symptom-vigilance education для immunocompromised-cohort
  cancers:**
