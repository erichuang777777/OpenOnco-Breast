do_not_do:
  - "Не презентувати observation як еквівалент structured surveillance — late-presentation bladder cancer + t-AML substantially гірші outcomes."
  - "Не нормалізувати any hematuria у cyclophosphamide survivor — warrants urgent cystoscopy навіть на observation track."
  - "Не пропускати smoking cessation counseling — independent bladder cancer risk factor; additive до cyclophosphamide-induced ризику."
  - "Не вважати persistent fatigue 'normal post-cancer' — може бути silent t-MDS; CBC q1y мінімум навіть на observation track."

do_not_do_en:
  - "Do not present observation as equivalent to structured surveillance — late-presentation bladder cancer + t-AML have substantially worse outcomes."
  - "Do not normalize any hematuria in a cyclophosphamide survivor — warrants urgent cystoscopy even on the observation track."
  - "Do not skip smoking cessation counseling — independent bladder cancer risk factor; additive to cyclophosphamide-induced risk."
  - "Do not treat persistent fatigue as 'normal post-cancer' — may be silent t-MDS; CBC q1y is the minimum even on the observation track."

