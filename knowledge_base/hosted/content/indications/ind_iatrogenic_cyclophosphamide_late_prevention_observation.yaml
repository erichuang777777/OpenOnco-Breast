rationale: >
  Alternative-track companion to IND-IATROGENIC-CYCLOPHOSPHAMIDE-LATE-
  PREVENTION-SURVEILLANCE. Cancer survivor declines structured annual
  UA + cytology + CBC q3-6mo surveillance schedule (surveillance fatigue,
  no perceived symptoms, financial/access barrier, geographic distance
  from survivorship clinic) — receives symptom-vigilance education
  (any hematuria → urgent UA + urology evaluation; persistent fatigue
  / easy bruising / recurrent infections / fever → urgent CBC +
  hematology evaluation) + lifestyle counseling (smoking cessation
  — independent bladder cancer risk factor; avoid additional alkylator
  exposure for benign indications). Per CHARTER §11 patient-autonomy
  framing — surveillance refusal is a legitimate choice but framed
  as suboptimal vs. scheduled-surveillance comparator.

rationale_ua: >
  Альтернативно-трекова Indication. Виживач відмовляється від
  structured annual UA + cytology + CBC q3-6mo surveillance schedule —
  отримує symptom-vigilance education (будь-яка hematuria → urgent
  UA + urology; persistent fatigue / easy bruising / infections /
  fever → urgent CBC + hematology) + lifestyle counseling (smoking
  cessation, avoid additional alkylator exposure). Per CHARTER §11.

