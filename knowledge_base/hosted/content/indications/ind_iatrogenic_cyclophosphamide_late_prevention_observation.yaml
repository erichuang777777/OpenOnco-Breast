expected_outcomes:
  overall_response_rate: "Survivor declines structured annual UA + cytology + CBC q3-6mo surveillance schedule — receives symptom-prompted evaluation only. Bladder cancer second primaries often present at muscle-invasive or metastatic stage when symptom-driven, vs. early non-muscle-invasive disease curable with TURBT in surveillance-detected cases. t-MDS may progress to overt t-AML before cytopenia recognized, foreclosing window for allogeneic HSCT in some patients. Outcomes substantially worse with late-presentation vs. surveillance-detected second primaries."

