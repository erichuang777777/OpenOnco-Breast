rationale: >
  Standard-track surveillance for transplant-immunosuppression cohort.

  **(1) Annual whole-body skin exam by dermatologist** — SCC + BCC most common
  post-transplant malignancy; aggressive SCC subset specific to immunosuppressed.

  **(2) Quantitative EBV-DNA q1-3 months** in post-solid-organ-transplant +
  post-HSCT for PTLD surveillance. Rising titers → reduce immunosuppression
  (RIS) + preemptive rituximab.

  **(3) Cervical Pap + HPV co-test annually** in post-transplant women.

  **(4) Anal cytology q1-3y** in MSM + women with anogenital HPV history.

  **(5) Oral cancer awareness** at routine dental visits.

  **(6) HCC surveillance** (US + AFP q6mo) in post-transplant with HBV/HCV
  history.

