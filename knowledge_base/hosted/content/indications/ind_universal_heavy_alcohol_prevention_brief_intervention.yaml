do_not_do:
  - "Не презентувати brief intervention як еквівалент structured cessation + pharmacotherapy — outcomes inferior, framing critical."
  - "Не пропускати FIB-4 / elastography при heavy alcohol — cirrhosis-evaluation pathway вирішує HCC surveillance залежно від AUD-engagement status."
  - "Не уникати re-engagement opportunity — більшість патієнтів eventually engage коли motivational triggers shift."
  - "Не нормалізувати alarm symptoms (dysphagia, hoarseness, oral lesion, weight loss) у heavy-alcohol cohort — symptom-prompted evaluation є highest-yield."
  - "Не deny mutual-support group engagement (AA, SMART Recovery) на основі лікарського preference — це окрема ефективна axis."

do_not_do_en:
  - "Do not present brief intervention as equivalent to structured cessation + pharmacotherapy — outcomes are inferior; framing is critical."
  - "Do not skip FIB-4 / elastography in heavy alcohol use — cirrhosis-evaluation pathway decides HCC surveillance regardless of AUD-engagement status."
  - "Do not avoid re-engagement opportunity — most patients eventually engage when motivational triggers shift."
  - "Do not normalize alarm symptoms (dysphagia, hoarseness, oral lesion, weight loss) in the heavy-alcohol cohort — symptom-prompted evaluation is highest yield."
  - "Do not deny mutual-support group engagement (AA, SMART Recovery) on the basis of physician preference — it is a separate effective axis."

