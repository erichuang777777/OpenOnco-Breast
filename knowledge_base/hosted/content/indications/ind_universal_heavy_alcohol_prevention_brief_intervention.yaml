expected_outcomes:
  overall_response_rate: >-
    Alternative-track companion. Patient declines structured
    cessation program + AUD pharmacotherapy (autonomy preference,
    stigma, prior unsuccessful attempts, declining intent for
    formal addiction-medicine engagement) — receives brief-
    intervention 5As + SBIRT counseling at each routine visit
    + symptom-vigilance education + cirrhosis-evaluation
    pathway. Brief intervention alone achieves clinically
    meaningful reduction in alcohol consumption in ~10-15% of
    AUDIT-C-positive patients at 12 months per USPSTF SBIRT
    meta-analysis. Lower than structured-program / pharmacotherapy
    comparator (~25-40%) but higher than no-intervention. HCC
    surveillance pathway preserved if cirrhosis component identified
    via FIB-4 / elastography. Per CHARTER §11 patient-autonomy
    framing — declining structured program is legitimate but framed
    as suboptimal vs intervention-arm comparator.

