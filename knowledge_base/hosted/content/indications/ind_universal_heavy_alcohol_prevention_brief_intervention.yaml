rationale: >
  Alternative-track companion to IND-UNIVERSAL-HEAVY-ALCOHOL-
  PREVENTION-CESSATION-SCREENING. Patient declines structured
  cessation program + AUD pharmacotherapy — receives brief
  intervention within routine-visit scope.

  **(1) SBIRT brief intervention at each routine visit.**
  Screening (AUDIT-C), Brief Intervention (5-15 min motivational
  feedback per FRAMES — Feedback, Responsibility, Advice, Menu,
  Empathy, Self-efficacy), Referral to Treatment (offer
  structured-program referral at each visit). USPSTF Grade B
  recommendation.

  **(2) Cirrhosis-evaluation pathway.** Low-cost FIB-4 score
  (AST + ALT + platelets + age) at baseline; ≥1.45 prompts
  hepatology referral + elastography (FibroScan or MR-elastography).
  Cirrhosis confirmation routes to HCC surveillance regardless of
  cessation engagement. Without cirrhosis component, no routine
  HCC surveillance.

  **(3) Symptom-vigilance education.** Heightened pattern-
  recognition for alcohol-related-cancer-cluster early-warning
  features: persistent dysphagia (oesophageal SCC), persistent
  hoarseness (laryngeal), oral lesion not healing within 2 weeks
  (oral SCC), unintended weight loss + abdominal mass (HCC,
  pancreatic), change in bowel habits (CRC), painless breast lump.
  Every alarm symptom warrants prompt diagnostic workup.

  **(4) Re-engagement pathway.** Document declined-program
  determination explicitly + offer re-engagement at each annual
  visit. Most patients who initially decline structured AUD
  treatment eventually engage after cardiometabolic / hepatic /
  social motivational trigger; never frame prior failures as
  terminal.

  **(5) Self-administered NRT-equivalent for alcohol (limited
  evidence).** Patient may choose to engage with AA / SMART
  Recovery mutual-support groups without formal addiction-
  medicine referral. Document the determination.

  Per CHARTER §11 patient-autonomy framing.

rationale_ua: >
  Альтернативно-трекова Indication. Пацієнт відмовляється від
  structured cessation program + AUD pharmacotherapy — отримує
  brief intervention у routine-visit scope.

  **(1) SBIRT brief intervention при кожному routine visit.**
  Screening (AUDIT-C), Brief Intervention (5-15 хв motivational
  feedback per FRAMES), Referral to Treatment. USPSTF Grade B.

  **(2) Cirrhosis-evaluation pathway.** Низькокоштовний FIB-4 score
  на baseline; ≥1.45 prompts hepatology referral + elastography.
  Cirrhosis confirmation routes до HCC surveillance regardless
  of cessation engagement.

  **(3) Symptom-vigilance education.** Heightened pattern-
  recognition: persistent dysphagia (oesophageal SCC), persistent
  hoarseness (laryngeal), oral lesion не healing within 2 weeks
  (oral SCC), unintended weight loss + abdominal mass (HCC,
  pancreatic), change у bowel habits (CRC), painless breast lump.

  **(4) Re-engagement pathway.** Document declined-program
  determination explicitly + offer re-engagement при кожному
  annual visit.

  **(5) Self-administered mutual-support engagement** (AA / SMART
  Recovery) без formal addiction-medicine referral. Document
