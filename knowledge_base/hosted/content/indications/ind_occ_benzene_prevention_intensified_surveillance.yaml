evidence_level: moderate
strength_of_recommendation: conditional
nccn_category: "2A"

expected_outcomes:
  overall_response_rate: >-
    Primary endpoint: detection of cytopenia / clonal hematopoiesis /
    incipient MDS at earliest treatable stage. Periodic CBC + smear
    review captures emerging cytopenias (anemia, thrombocytopenia,
    neutropenia, macrocytosis) at presentation; persistent
    unexplained cytopenia (≥3-6 months) is the conventional trigger
    for bone marrow aspirate + biopsy with cytogenetics + NGS panel
    (myeloid genes — TP53, ASXL1, SF3B1, SRSF2, U2AF1, RUNX1, NRAS,
    KRAS, FLT3, NPM1, IDH1/2). Early MDS detection enables
    risk-stratified intervention (HMA initiation, transplant
    referral) at lower disease burden. Benzene-attributable AML
    detected at incipient / MDS-prodromal stage has better
    transplant-outcome profile than at fulminant presentation.

