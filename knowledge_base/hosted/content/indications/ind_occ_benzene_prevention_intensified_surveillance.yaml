desired_tests:
  - TEST-LFT

rationale: >
  Standard-track prevention pathway for individuals with documented
  prior occupational benzene exposure who do not have a current
  myeloid neoplasm diagnosis. Three parallel interventions:

  **(1) Exposure-cessation counseling.** Most benzene-exposed
  individuals are now retired or working in OSHA-regulated
  environments (1 ppm 8-hr TWA + 5 ppm STEL since 1987 in US;
  similar EU thresholds), so contemporary high-exposure cessation
  is typically not the primary lever. Where active exposure exists
  (legacy environments, informal workshop / artisanal trades,
  household solvent use, second-hand cigarette smoke as a low-dose
  benzene source), counsel on PPE (respiratory protection,
  ventilation), engineering controls (closed-system handling,
  vapor recovery), and substitution where feasible. Second-hand
  smoke exposure in benzene-exposed workers compounds the risk
  marginally — smoking-cessation counseling included.

  **(2) Longitudinal CBC + peripheral smear surveillance.**
    - Baseline CBC with manual differential + peripheral smear
      review at enrollment.
    - Repeat CBC q6-12 months thereafter; intensify to q3 months
      if any baseline cytopenia is borderline.
    - Manual smear review (not automated-only) — automated counts
      miss dysplastic features (Pelger-Huet anomaly, hypogranular
      neutrophils, micromegakaryocytes on rare smear; macrocytosis
      and anisocytosis on RBC review).
    - Reticulocyte count, LDH, B12 + folate, ferritin to triage
      cytopenia etiology before invasive workup.

  **(3) Low-threshold bone marrow aspirate + biopsy.** Persistent
  (≥3-6 months) unexplained cytopenia (anemia <12 g/dL persistently
  in men or <11 g/dL in women; ANC <1.5; platelets <100), or
  macrocytic anemia without B12 / folate / hypothyroid etiology,
  or any dysplasia on smear → bone marrow with cytogenetics + NGS
  myeloid panel + iron stain + immunohistochemistry. Refer to
  hematology / oncology for procedure + interpretation. Findings
  routed:
    - Normal marrow / non-clonal cytopenia → continue surveillance.
    - MDS (any IPSS-R / IPSS-M stratification) → treatment-persona
      DIS-MDS-LR / DIS-MDS-HR pathway.
    - AML (≥20% blasts) → treatment-persona DIS-AML pathway.
    - Clonal hematopoiesis of indeterminate potential (CHIP) /
      clonal cytopenia of undetermined significance (CCUS) →
      enhanced surveillance, hematology co-management.

  **Hematology co-management.** Referral threshold low; many
  centers offer benzene-exposure-specific occupational-medicine /
  hematology joint clinics. Workers'-compensation documentation
  may benefit the patient — surveillance findings + exposure
  documentation can support disability / compensation claims if
  malignancy emerges.

  Resource access in Ukraine: CBC is universally accessible
  (~50-150 UAH per draw); bone marrow aspirate + biopsy with
  cytogenetics + NGS is available at regional cancer centers and
  large private labs (~3000-15000 UAH depending on extent of
  molecular workup). НСЗУ covers CBC in primary care; bone marrow
  workup typically requires oncology / hematology referral with
  partial НСЗУ coverage.

rationale_ua: >
  Стандартний-трек prevention шлях для осіб з документованим
  попереднім професійним впливом бензолу, які не мають поточного
  діагнозу мієлоїдної неоплазії. Три паралельні втручання:

  **(1) Counseling щодо припинення впливу.** Більшість
  benzene-експонованих осіб зараз пенсіонери або працюють у
  OSHA-регульованих умовах, тому сучасне припинення high-exposure
  зазвичай не є головним важелем. Де існує активна експозиція
  (legacy середовища, неформальні майстерні / artisanal ремесла,
  household solvent використання, second-hand cigarette smoke як
  low-dose бензольне джерело), counseling щодо PPE (respiratory
  захист, вентиляція), engineering controls (closed-system
  поводження, vapor recovery), та substitution де можливо.
  Second-hand куріння у benzene-експонованих робітників маргінально
  посилює ризик — counseling щодо припинення куріння включено.

  **(2) Longitudinal CBC + peripheral smear спостереження.**
    - Baseline CBC з ручним диф. + peripheral smear оглядом на
      enrollment.
    - Повторні CBC q6-12 місяців; інтенсифікувати до q3 місяців,
      якщо будь-яка baseline цитопенія borderline.
    - Ручний smear огляд (не тільки автоматизований) —
      автоматизовані counts пропускають диспластичні риси
      (Pelger-Huet anomaly, hypogranular neutrophils,
      micromegakaryocytes на rare smear; макроцитоз та anisocytosis
      на RBC огляді).
    - Reticulocyte count, LDH, B12 + folate, ferritin для triage
      cytopenia етіології перед інвазивним workup.

  **(3) Low-threshold bone marrow aspirate + biopsy.** Persistent
  (≥3-6 місяців) нез'ясована цитопенія (анемія <12 г/дл persistently
  у чоловіків або <11 г/дл у жінок; ANC <1.5; тромбоцити <100), або
  макроцитарна анемія без B12 / folate / гіпотиреоїдної етіології,
  або будь-яка дисплазія на smear → bone marrow з цитогенетикою +
  NGS myeloid panel + iron stain + IHC. Направлення до гематології /
  онкології для процедури + інтерпретації. Знахідки routed:
    - Нормальний marrow / non-clonal cytopenia → продовжувати
      спостереження.
    - MDS (будь-який IPSS-R / IPSS-M стратифікація) → treatment-
      persona DIS-MDS-LR / DIS-MDS-HR шлях.
    - AML (≥20% бластів) → treatment-persona DIS-AML шлях.
    - Clonal hematopoiesis of indeterminate potential (CHIP) /
      clonal cytopenia of undetermined significance (CCUS) →
      посилене спостереження, hematology co-management.

