id: IND-OCC-BENZENE-PREVENTION-INTENSIFIED-SURVEILLANCE
plan_track: standard
intent: prevention

applicable_to:
  # Primary prevention anchor — AML is the strongest benzene-
  # attributable hematologic malignancy and the canonical target.
  # MDS-LR and MDS-HR are co-targets via the RF's relevant_diseases
  # listing; the engine surfaces both as kb_state targets via the
  # fired RF.
  disease_id: DIS-AML
