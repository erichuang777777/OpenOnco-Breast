sources:
  - source_id: SRC-NCCN-AML-2025
    position: supports
    relevant_quote_paraphrase: >-
      "Therapy-related AML and AML following antecedent
      hematologic disorder include benzene-exposed cohorts;
      surveillance for cytopenia development with low-threshold
      marrow evaluation is appropriate."
  - source_id: SRC-ELN-AML-2022
    position: supports
    relevant_quote_paraphrase: >-
      "AML with myelodysplasia-related changes (AML-MRC) frequently
      follows prior cytotoxic / occupational exposure; molecular
      and cytogenetic profile (TP53, complex karyotype) carries
      adverse prognostic implications."
  - source_id: SRC-ESMO-MDS-2021
    position: supports
    relevant_quote_paraphrase: >-
      "Secondary MDS following chemical / occupational exposure
      carries distinct cytogenetic and clinical profile; early
      detection via CBC surveillance + low-threshold marrow
      evaluation enables risk-stratified management."

do_not_do:
  - "Не покладатися виключно на автоматизований CBC — manual smear огляд необхідний для виявлення dysplastic features (Pelger-Huet, hypogranular neutrophils), які автоматизовані counts пропускають."
  - "Не призначати bone marrow на основі ізольованої транзіторної цитопенії — повторити CBC через 4-8 тижнів спочатку; persistent ≥3-6 місяців — поріг для marrow."
  - "Не пропускати молекулярний NGS myeloid panel при marrow biopsy — TP53, ASXL1, SF3B1, та інші myeloid mutations керують клінічним ризиком і ASCT-eligibility decisions."
  - "Не лікувати CHIP / CCUS як malignancy — це pre-cancerous стани, що вимагають моніторингу, не лікування (NCCN не рекомендує HMA-терапію поза clinical trial для CHIP)."
  - "Не нехтувати documentation експозиції для workers' compensation — патогенетичний зв'язок benzene-AML / MDS добре встановлений і може підтримати disability claims, якщо malignancy emerges."

do_not_do_en:
  - "Do not rely solely on automated CBC — manual smear review is necessary to detect dysplastic features (Pelger-Huet, hypogranular neutrophils) that automated counts miss."
  - "Do not order bone marrow on the basis of an isolated transient cytopenia — repeat the CBC in 4-8 weeks first; persistent ≥3-6 months is the threshold for marrow evaluation."
  - "Do not skip the molecular NGS myeloid panel at marrow biopsy — TP53, ASXL1, SF3B1, and other myeloid mutations drive clinical risk and ASCT-eligibility decisions."
  - "Do not treat CHIP / CCUS as malignancy — these are pre-cancerous states requiring monitoring, not treatment (NCCN does not recommend HMA therapy outside of clinical trial for CHIP)."
  - "Do not overlook exposure documentation for workers' compensation — the pathogenetic link of benzene to AML / MDS is well-established and may support disability claims if malignancy emerges."

