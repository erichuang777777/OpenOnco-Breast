sources:
  - source_id: SRC-NCCN-BCELL-2025
    position: context
    relevant_quote_paraphrase: >-
      "Patients declining structured surveillance for occupational
      ionizing-radiation cohorts continue to receive symptom-triggered
      evaluation and standard-of-care general-population follow-up."
  - source_id: SRC-NCCN-AML-2025
    position: context
    relevant_quote_paraphrase: >-
      "Hematologic surveillance in occupational-radiation cohorts is
      a shared-decision-making process; declining structured CBC does
      not preclude symptom-triggered evaluation."

do_not_do:
  - "Не презентувати observation як еквівалент структурованого нагляду — radiation-attributable ризик AML / thyroid / breast не адресується."
  - "Не пропускати ALARA / PPE counseling для активних робітників — це єдиний важіль з forward-looking benefit."
  - "Не ігнорувати alarm features (цитопенія, маса шиї, маса молочної залози, persistent лімфаденопатія) — immediate evaluation."
  - "Не використовувати цей шлях як стандарт першої лінії — intensified-surveillance трек залишається preferred."

do_not_do_en:
  - "Do not present observation as equivalent to structured surveillance — radiation-attributable AML / thyroid / breast risk is unaddressed."
  - "Do not skip ALARA / PPE counseling for active workers — this is the only lever with forward-looking benefit."
  - "Do not ignore alarm features (cytopenia, neck mass, breast mass, persistent lymphadenopathy) — immediate evaluation."
  - "Do not use this pathway as a first-line standard — the intensified-surveillance track remains the preferred recommendation."

