expected_outcomes:
  overall_response_rate: >-
    Primary endpoint: avoidance of structured CBC + thyroid US +
    lifetime dose tracking when patient declines intensified pathway.
    Routine general-population care alone leaves radiation-attributable
    excess across hematologic / thyroid / breast endpoints
