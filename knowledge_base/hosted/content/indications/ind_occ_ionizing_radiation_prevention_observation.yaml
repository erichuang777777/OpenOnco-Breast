rationale: >
  Alternative-track companion to IND-OCC-IONIZING-RADIATION-PREVENTION-
  INTENSIFIED-SURVEILLANCE. Patient with documented ≥10 years
  occupational ionizing-radiation exposure who declines structured
  CBC + thyroid surveillance + dose tracking — for any reason (cost,
  anxiety from regular bloodwork / imaging, preference, geographic
  access, life expectancy / competing illness) — is offered routine
  general-population care only:

  **Hematologic surveillance:** None scheduled; CBC obtained only on
  routine primary-care visit or symptomatic presentation. Patient is
  explicitly informed that radiation-attributable AML risk is
  unaddressed by structured surveillance.

  **Thyroid surveillance:** None scheduled — thyroid US reserved for
  palpable nodule or symptomatic presentation. Patient is counseled
  to report any neck mass or persistent dysphagia.

  **Breast-cancer screening:** Apply NCCN average-risk screening
  guidelines (mammography from age 40-50 per patient-shared-
  decision). No occupational-radiation-specific earlier-initiation
  extension.

  **Lifetime dose tracking:** Not actively pursued; patient may
  request dosimetry-records review from former / current employer at
  any time.

  **ALARA / PPE counseling for active workers:** Still offered —
  only lever with clear forward-looking benefit. Lead apron + thyroid
  shield + leaded eyewear during fluoroscopic / interventional work,
  time-distance-shielding principles remain standard regardless of
  surveillance-track choice.

  **Symptom-triggered evaluation:** Low threshold for diagnostic
  workup if alarm features develop (cytopenia, neck mass, breast
  mass, palpable lymphadenopathy, unexplained fatigue).

  Routing reconsiderations: patient may revisit intensified-surveillance
  pathway at any subsequent visit, in whole or in part. Per CHARTER
  §11 patient-autonomy framing: structured surveillance is a shared-
  decision-making domain.

rationale_ua: >
  Альтернативно-трекова Indication — компаньйон до IND-OCC-IONIZING-
  RADIATION-PREVENTION-INTENSIFIED-SURVEILLANCE. Пацієнт з
  документованим ≥10 років occupational ionizing-radiation впливом,
  який відмовляється від структурованого CBC + thyroid surveillance +
  dose tracking (вартість, тривога, перевага, географічний доступ,
  очікувана тривалість життя), отримує тільки рутинний
  загальнопопуляційний догляд:

  **Гематологічне спостереження:** Не заплановане; CBC отримується
  тільки на рутинному візиті або при симптоматичній презентації.

  **Спостереження за щитоподібною залозою:** Не заплановане —
  thyroid US резервується для палпабельного вузла або симптоматичної
  презентації. Пацієнту радять повідомляти про будь-яку масу шиї або
  persistent дисфагію.

  **Скринінг раку молочної залози:** Застосовувати NCCN average-risk
  screening guidelines без модифікації.

  **Lifetime dose tracking:** Не активно переслідується; пацієнт може
  запросити dosimetry-records review від попереднього / поточного
  роботодавця у будь-який час.

  **ALARA / PPE counseling для активних робітників:** Все ще
  пропонується — єдиний важіль з чіткою forward-looking вигодою.

  **Symptom-triggered оцінка:** Низький поріг для діагностичного
  workup при появі alarm features.

  Reroute: пацієнт може повернутися до інтенсифікованого спостереження
  на будь-якому подальшому візиті. Per CHARTER §11 — shared-decision-
  making domain.

