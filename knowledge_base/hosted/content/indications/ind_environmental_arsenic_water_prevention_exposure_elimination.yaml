rationale: >
  Standard-track prevention pathway for chronic arsenic-contaminated
  drinking water exposure. Components per IARC Monograph 100C (2012) +
  WHO 2017 Arsenic in Drinking Water + NCCN Bladder + NSCLC + Skin
  guidelines:

  **(1) Water-source change OR filtration — primary intervention**
  - Test current drinking-water source for total + inorganic arsenic.
    Private wells: regional environmental health authority lab; consider
    repeat seasonal testing.
  - If >10 µg/L: switch to alternative source (municipal water with
    verified compliance, bottled water with documented compliance, or
    point-of-use filtration). Boiling does NOT remove arsenic — water
    boiled to concentrate arsenic to higher levels.
  - Point-of-use filters: reverse-osmosis (RO) is the gold standard
    (removes ~95-99% inorganic arsenic); activated alumina + iron-based
    adsorption media also effective. NSF Standard 58 (RO) / 53 (As)
    certified units preferred. Test post-filter water periodically to
    verify performance.
  - Counsel on use of safe water for ALL ingestion: drinking, cooking,
    food preparation (vegetables / pasta absorb water arsenic), ice
    cubes, infant formula reconstitution. Bathing / hand-washing risk
    is low (dermal + inhalation absorption minimal at WHO thresholds).

  **(2) Cumulative-dose biomarker assessment — limited utility**
  - Urinary inorganic arsenic + methylated metabolites (DMA, MMA)
    reflect recent (~72h) exposure. Not useful for cumulative-dose
    estimation but can document ongoing exposure when source is
    uncertain.
  - Arsenic in hair / nails — long-term marker but bandwidth limited
    + contamination-prone; not recommended for routine clinical
    surveillance.

  **(3) Tobacco-cessation counseling** — Arsenic + tobacco interact
  multiplicatively for bladder + lung cancer risk. Smoking cessation
  is the highest-yield co-intervention (see RF-LIFESTYLE-TOBACCO-
  CANCER-PREVENTION).

  **(4) Intensified screening** — Three organ systems:
  - Skin: annual full-body skin examination by clinician (cumulative
    UV + arsenic synergy increases BCC/SCC + Bowen's risk). Patient
    education on hyperpigmentation, hyperkeratosis (palms / soles),
    new persistent skin lesions — these are arsenic-skin-signature
    findings warranting workup.
  - Bladder: USPSTF does NOT recommend routine bladder-cancer
    screening (urine cytology + cystoscopy in asymptomatic adults).
    Symptom-triggered evaluation only — low threshold for hematuria,
    dysuria, urinary frequency.
  - Lung: USPSTF lung-cancer screening eligibility check (age 50-80,
    ≥20 pack-years, current or quit within 15 years). Arsenic
    exposure alone does not establish screening eligibility but NCCN
    allows clinical judgment for environmental carcinogen exposure
    plus borderline-USPSTF risk factors.

  **(5) Multi-systemic toxicity awareness** — Chronic arsenic exposure
  also causes peripheral neuropathy, cardiovascular disease (atherosclerosis,
  ischemic heart disease, peripheral arterial disease — blackfoot
  disease in Taiwan cohorts), diabetes mellitus, hepatic + renal
  toxicity. Holistic clinical surveillance appropriate.

  Resource access in Ukraine: arsenic testing not routine on municipal
  water (focus on lead + microbiology); private-well testing at
  environmental health labs (~500-2000 UAH per panel). RO point-of-use
  filters 3000-12000 UAH. Bottled water with documented chemistry
  available at major retailers.

