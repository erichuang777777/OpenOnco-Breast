do_not_do:
  - "Не рекомендувати boiling як arsenic removal — boiling концентрує arsenic."
  - "Не покладатися на standard carbon-block filters — вони НЕ remove inorganic arsenic; RO або NSF-53-certified As-specific media потрібні."
  - "Не пропускати tobacco-cessation counseling — multiplicative interaction з arsenic для bladder + lung cancer."
  - "Не призначати routine bladder cancer screening (cystoscopy / cytology) в asymptomatic adults — USPSTF проти; symptom-triggered evaluation only."
  - "Не використовувати hair / nail arsenic testing як routine clinical surveillance — contamination-prone + bandwidth-limited."
  - "Не нехтувати dermatological surveillance — arsenic-induced skin findings (hyperpigmentation, hyperkeratosis) — pre-malignant markers."

do_not_do_en:
  - "Do not recommend boiling as arsenic removal — boiling concentrates arsenic."
  - "Do not rely on standard carbon-block filters — they do NOT remove inorganic arsenic; RO or NSF-53-certified arsenic-specific media is needed."
  - "Do not skip tobacco-cessation counseling — multiplicative interaction with arsenic for bladder and lung cancer."
  - "Do not order routine bladder-cancer screening (cystoscopy / cytology) in asymptomatic adults — USPSTF recommends against; symptom-triggered evaluation only."
  - "Do not use hair / nail arsenic testing as routine clinical surveillance — contamination-prone and bandwidth-limited."
  - "Do not overlook dermatological surveillance — arsenic-induced skin findings (hyperpigmentation, hyperkeratosis) are pre-malignant markers."

known_controversies:
  - topic: "Bladder + lung cancer screening for arsenic-exposed but USPSTF-ineligible patients"
    positions:
      - position: "USPSTF recommends against routine bladder-cancer screening in asymptomatic adults (cystoscopy / cytology)"
      - position: "USPSTF lung-cancer LDCT screening requires age 50-80 + ≥20 pack-years + recent smoking; arsenic-only exposed never-smokers fall outside criteria"
      - position: "NCCN allows clinical judgment for occupational + environmental carcinogen exposures + concurrent risk factors"
    our_default: "Symptom-triggered evaluation for bladder; USPSTF-cadence + NCCN clinical judgment for lung; annual full-body skin exam for cutaneous surveillance."
    rationale: "RCT screening evidence does not exist for arsenic-exposed populations; observational signal supports intensified clinical-exam pathways rather than population-screening modalities."

