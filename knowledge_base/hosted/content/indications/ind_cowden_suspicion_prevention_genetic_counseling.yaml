expected_outcomes:
  overall_response_rate: >-
    Diagnostic yield of germline PTEN panel testing in pedigree-
    suspicion populations: ~80-100% positive carrier identification
    in Lhermitte-Duclos-positive probands (Lhermitte-Duclos is
    pathognomonic); ~25-80% positive in clinical-criteria-met
    populations depending on Cleveland Clinic Cowden Score
    stringency; ~10-25% in single-criterion / Bannayan-Riley-
    Ruvalcaba pediatric phenotype populations. Confirmed PTEN
    carrier routes to structured multi-organ surveillance: breast
    MRI + mammography from age 30, annual thyroid US from diagnosis,
    endometrial surveillance discussion from 35-40, colonoscopy from
    age 35, dermatologic evaluation q1y, baseline renal imaging.
    Early breast-cancer detection benefit is substantial given the
    ~85% lifetime breast-cancer risk and the demonstrated mortality
    reduction from MRI + mammography combination screening in high-
    risk populations.

