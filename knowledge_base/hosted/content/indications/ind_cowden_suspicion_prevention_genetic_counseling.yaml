sources:
  - source_id: SRC-NCCN-GENETIC-FAMILIAL-BREAST-OVARIAN-2025
    position: supports
    relevant_quote_paraphrase: >-
      "Patients meeting NCCN criteria for Cowden syndrome / PHTS should
      receive germline PTEN panel testing. Confirmed carriers enter
      structured multi-organ surveillance: breast MRI + mammography
      starting age 30, annual thyroid ultrasound from diagnosis,
      endometrial surveillance from age 35-40, colonoscopy from age 35,
      annual dermatologic evaluation, and baseline renal imaging."
  - source_id: SRC-NCCN-BREAST-2025
    position: supports
    relevant_quote_paraphrase: >-
      "High-risk breast cancer screening with annual mammography +
      MRI is recommended for women with PTEN pathogenic variants,
      starting at age 30."

do_not_do:
  - "Не призначати germline тестування без pre-test консультування — інформована згода + обговорення мульти-органного surveillance + потенційні risk-reducing хірургії обов'язкові."
  - "Не treter VUS PTEN-результат як патогенний — управляйте як родовідну підозру; не починайте інтенсивний multi-organ surveillance протокол на підставі VUS."
  - "Не пропускати MLPA / large-deletion аналіз — ~10-15% патогенних PTEN варіантів — великі делеції, пропущені sequencing-only тестуванням."
  - "Не презентувати negative-panel результат як zero-risk — Cowden phenocopies (KLLN-methylation, SDH-related синдроми) можуть бути basis сильної сімейної історії; розгляньте дедиковану панель."
  - "Не рекомендувати risk-reducing мастектомію або гістеректомію без підтвердженого PTEN-носійства — ці інтервенції вимагають confirmed carrier діагнозу і shared decision-making про reproductive / menopausal sequelae."
  - "Не пропускати baseline thyroid US у дитячих PTEN-носіїв — thyroid pathology у Cowden може презентуватися рано; рання базова оцінка важлива."

do_not_do_en:
  - "Do not order germline testing without pre-test counseling — informed consent and discussion of multi-organ surveillance + potential risk-reducing surgeries are mandatory."
  - "Do not treat a VUS PTEN result as pathogenic — manage as pedigree suspicion; do not initiate intensive multi-organ surveillance based on a VUS."
  - "Do not skip MLPA / large-deletion analysis — ~10-15% of pathogenic PTEN variants are large deletions missed by sequencing-only testing."
  - "Do not present a negative-panel result as zero-risk — Cowden phenocopies (KLLN methylation, SDH-related syndromes) may underlie a strong family history; consider a dedicated panel."
  - "Do not recommend risk-reducing mastectomy or hysterectomy without confirmed PTEN carriage — these interventions require a confirmed carrier diagnosis and shared decision-making about reproductive / menopausal sequelae."
  - "Do not skip baseline thyroid US in pediatric PTEN carriers — thyroid pathology in Cowden can present early; early baseline assessment is important."

