rationale: >
  Standard-track prevention pathway for individuals with pedigree
  suspicion of Cowden syndrome / PTEN hamartoma tumor syndrome (PHTS).
  Three parallel referrals:

  **(1) Genetic counseling referral.** Pre-test counseling covers:
  inheritance pattern (autosomal dominant, variable penetrance
  particularly for the cancers — breast and thyroid penetrance high,
  endometrial and renal moderate), implications for family members
  (cascade testing if positive — siblings at 50% risk; children at
  50% risk; preimplantation genetic diagnosis available; pediatric-
  phenotype Bannayan-Riley-Ruvalcaba [BRR] variant is the childhood
  manifestation of PHTS and warrants developmental / surveillance
  considerations for affected children), insurance / GINA
  considerations, psychological aspects of multi-organ surveillance
  burden including potential risk-reducing mastectomy / hysterectomy
  discussions in confirmed carriers. Per ACMG / NCCN / ASCO guidelines,
  pre-test counseling is the standard of care before germline testing.

  **(2) Germline PTEN gene panel testing.** Modern hereditary cancer
  panels (e.g., Invitae multi-cancer panel, Color hereditary cancer
  panel, GeneDx OncoGene comprehensive) cover PTEN (full sequencing
  + large-deletion / MLPA analysis; deletions / duplications account
  for ~10-15% of PTEN pathogenic variants), plus differential genes
  for Cowden-phenocopies (KLLN — Killin promoter hypermethylation
  is associated with a Cowden-like phenotype; SDHB / SDHC / SDHD —
  hereditary paraganglioma can overlap clinically; AKT1 / PIK3CA —
  somatic-only mosaic Cowden-like presentations). Variant
  classification per ACMG framework.

  **(3) Carrier-confirmation surveillance plan (sequel pathway).**
    Positive PTEN carrier → structured multi-organ surveillance per
    NCCN Genetic/Familial High-Risk Breast Ovarian Pancreatic:
    - **Breast (women):** Annual mammography + annual breast MRI
      (offset by 6 months for alternating Q6-month imaging) starting
      age 30 (or 5-10 years before earliest breast cancer in family,
      whichever is earlier). Clinical breast exam q6-12 months.
      Discussion of risk-reducing mastectomy in shared decision-
      making (decision driven by individual risk tolerance + family
      history + reproductive plans).
    - **Endometrial / uterine:** Endometrial sampling q1-2 years
      from age 35-40, OR transvaginal ultrasound; discussion of
      risk-reducing hysterectomy post-childbearing. Evidence base
      for endometrial surveillance modest — shared decision-making.
    - **Thyroid:** Baseline thyroid ultrasound at PTEN diagnosis
      (any age including pediatric carriers); annual thyroid US
      lifelong. Predominantly follicular variant papillary thyroid
      carcinoma; multinodular goiter near-universal but mostly
      benign.
    - **Colorectal:** Colonoscopy q5 years starting age 35 (more
      frequent if polyposis demonstrated). Cowden CRC risk is
      lower than Lynch / FAP but elevated above general population.
    - **Renal:** Baseline renal MRI / US at diagnosis; surveillance
      imaging q2 years thereafter (or earlier if family history
      includes renal cancer). Predominantly papillary or
      chromophobe RCC.
    - **Dermatologic:** Annual dermatologic evaluation for
      characteristic skin lesions (trichilemmomas, acral keratoses,
      papillomatous papules) plus melanoma surveillance.
    - **CNS:** Brain MRI if symptoms suggest Lhermitte-Duclos
      (cerebellar ataxia, headache, dizziness); no routine CNS
      screening required.

  Negative result (no pathogenic / likely-pathogenic variant on a
  high-quality panel including large-deletion analysis) → re-stratify
  residual family-history risk; consider KLLN promoter methylation
  testing and SDH-related differential. VUS result → managed as
  pedigree suspicion (this Indication) until segregation analysis or
  functional studies clarify.

  Genetic counseling and germline PTEN testing are typically covered
  by insurance in the US/EU when pedigree criteria are met; in
  Ukraine, germline testing is available through private labs at
  out-of-pocket cost (~5000-15000 UAH for multi-gene panel).

rationale_ua: >
  Стандартний-трек prevention шлях для осіб з родовідною підозрою на
  синдром Cowden / PTEN hamartoma tumor syndrome (PHTS). Три
  паралельні направлення:

  **(1) Направлення на генетичне консультування.** Pre-test
  консультування охоплює: спадкування (аутосомно-домінантне, варіабельна
  пенетрантність — особливо для раків, груди і щитоподібна залоза
  висока, ендометрій і нирки помірна), наслідки для членів сім'ї
  (cascade тестування при позитиві — сібси з ризиком 50%; діти з
  ризиком 50%; преімплантаційна генетична діагностика доступна;
  педіатричний фенотип Bannayan-Riley-Ruvalcaba [BRR] — дитячий
  прояв PHTS і потребує developmental / спостережувальних міркувань
  для уражених дітей), страхові / GINA-міркування, психологічні
  аспекти мульти-органного спостереження включаючи потенційні
  обговорення risk-reducing мастектомії / гістеректомії у підтверджених
  носіїв. За ACMG / NCCN / ASCO настановами, pre-test консультування
  — standard of care перед germline тестуванням.

  **(2) Germline PTEN панельне тестування.** Сучасні панелі
  спадкових ракових захворювань (напр., Invitae multi-cancer panel,
  Color hereditary cancer panel, GeneDx OncoGene comprehensive)
  покривають PTEN (повне секвенування + large-deletion / MLPA аналіз;
  делеції / дуплікації становлять ~10-15% PTEN-патогенних варіантів),
  плюс гени диференційного діагнозу для Cowden-фенокопій (KLLN —
  гіперметилювання промотора Killin асоційоване з Cowden-подібним
  фенотипом; SDHB / SDHC / SDHD; AKT1 / PIK3CA — соматичні-only
  мозаїчні Cowden-подібні презентації). Класифікація варіантів за
  рамкою ACMG.

  **(3) План спостереження при підтвердженому носійстві (sequel).**
    Позитивний PTEN носій → структуроване мульти-органне
    спостереження per NCCN Genetic/Familial High-Risk Breast Ovarian
    Pancreatic:
    - **Молочна залоза (жінки):** Щорічна мамографія + щорічне
      MRI грудей (offset by 6 months для альтернативного Q6-month
      візуалізаційного обстеження) з 30 років (або 5-10 років до
      найранішого раку грудей у сім'ї, що раніше). Клінічний огляд
      грудей q6-12 місяців. Обговорення risk-reducing мастектомії
      у shared decision-making.
    - **Ендометрій / матка:** Біопсія ендометрію q1-2 роки з 35-40
      років АБО трансвагінальне УЗД; обговорення risk-reducing
      гістеректомії post-childbearing. База доказів для
      ендометріального скринінгу помірна.
    - **Щитоподібна залоза:** Базове УЗД щитоподібної залози при
      PTEN-діагнозі (будь-який вік включно з педіатричними носіями);
      щорічне УЗД пожиттєво. Переважно фолікулярний варіант
      папілярного раку щитоподібної залози; багатовузловий зоб
      майже-універсальний але переважно доброякісний.
    - **Колоректальне:** Колоноскопія q5 років з 35 років (частіше
      якщо демонструється поліпоз). Cowden-CRC-ризик нижчий ніж
      Lynch / FAP але підвищений над загальною популяцією.
    - **Нирки:** Базове ниркове MRI / УЗД при діагнозі; візуалізаційне
      спостереження q2 роки після. Переважно папілярне або
      хромофобне РСС.
    - **Шкіра:** Щорічне дерматологічне обстеження для характерних
      шкірних уражень (трихілеммоми, акральні кератози, папіломатозні
      папули) плюс melanoma-спостереження.
    - **ЦНС:** MRI мозку при симптомах підозри Lhermitte-Duclos
      (мозочкова атаксія, головний біль, запаморочення); без
      рутинного ЦНС-скринінгу.

  Негативний результат → ре-стратифікація залишкового ризику;
  розгляньте KLLN-promoter-methylation тестування і SDH-related
  диференціал. VUS → ведеться як родовідна підозра.

  Генетичне консультування та germline PTEN-тестування зазвичай
  покриваються страхуванням у США/ЄС при відповідності критеріям; в
  Україні germline тестування доступне через приватні лабораторії за
  out-of-pocket вартість (~5000-15000 грн за мультигенну панель).

