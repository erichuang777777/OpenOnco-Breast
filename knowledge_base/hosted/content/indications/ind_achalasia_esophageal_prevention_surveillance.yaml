expected_outcomes:
  overall_response_rate: >-
    EGD surveillance q2-3y starting 10-15y after achalasia onset shifts
    SCC stage at diagnosis from advanced (T3-T4) to earlier (T1-T2) in
    surveilled patients (Leeuwenburgh 2010: ~75% early-stage among
    surveilled vs ~25% among unsurveilled). Surveillance does not
    reduce SCC incidence but materially improves resectability and
    5-year OS (early-stage SCC 5y OS ~40-50% vs ~10-15% for locally
    advanced). Post-myotomy Barrett surveillance overlaps with
    RF-BARRETTS-ESOPHAGUS-PREVENTION pathway.

