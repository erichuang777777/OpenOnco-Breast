do_not_do:
  - "Не починати surveillance EGD у перші 5 років після діагнозу ахалазії без додаткових факторів ризику — SCC латентність 10-25 років, ранній скринінг має низький yield."
  - "Не використовувати лише barium swallow як заміну EGD — barium виявляє анатомічні зміни, але не дисплазію або ранній SCC."
  - "Не пропускати огляд GE-junction і тубулярного стравоходу — SCC може виникнути в будь-якій ділянці контактна з застійним болюсом."
  - "Не виконувати pneumatic dilation або міотомію без обговорення довгострокового Barrett ризику + наступного surveillance plan."
  - "Не відкладати діагностичну EGD при новій-or-погіршеній дисфагії, regurgitation крові, або втраті ваги — ці ознаки потребують термінового обстеження незалежно від surveillance дату."

do_not_do_en:
  - "Do not start surveillance EGD in the first 5 years after achalasia diagnosis without additional risk factors — SCC latency is 10-25 years; early screening has low yield."
  - "Do not use barium swallow alone as a substitute for EGD — barium detects anatomic changes but not dysplasia or early SCC."
  - "Do not skip inspection of GE junction and tubular esophagus — SCC can arise anywhere in contact with the stagnant food bolus."
  - "Do not perform pneumatic dilation or myotomy without discussing long-term Barrett risk + subsequent surveillance plan."
  - "Do not delay diagnostic EGD for new-or-worsening dysphagia, hematemesis, or weight loss — these features warrant urgent workup regardless of surveillance date."

