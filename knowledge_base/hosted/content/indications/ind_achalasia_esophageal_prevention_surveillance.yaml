rationale: >
  Standard-track prevention pathway for patients with confirmed
  achalasia. Endoscopic surveillance addresses the chronic-stasis-
  associated SCC risk that emerges 10-25 years after disease onset.

  **Cadence:** EGD every 2-3 years starting 10-15 years after the
  initial achalasia diagnosis (per ACG 2013, ASGE 2015). Earlier
  initiation (5-10 years post-diagnosis) reasonable in patients with
  any of: megaesophagus (esophageal diameter >6 cm on barium swallow),
  food retention on prior EGD, history of smoking or heavy alcohol use,
  or family history of esophageal cancer.

  **Technique:** standard EGD with careful inspection of the entire
  esophageal mucosa after wash-out of retained food (may require pre-
  procedural fasting beyond standard NPO + on-table irrigation).
  Biopsy any suspicious mucosa — friable, ulcerated, plaque-like, or
  irregular areas. Chromoendoscopy with Lugol's iodine (1-3% solution
  sprayed onto mucosa) highlights dysplastic and early-SCC areas as
  pale unstained patches; recommended where available.

  **Post-myotomy Barrett surveillance:** patients ~10y after Heller
  myotomy or POEM develop reflux + Barrett at ~25-30% rate. Once
  Barrett is confirmed, the patient transitions to (or runs in parallel
  with) the RF-BARRETTS-ESOPHAGUS-PREVENTION pathway with Seattle-
  protocol biopsies and dysplasia-grade-driven cadence.

  **Symptom escalation triggers immediate workup:** new or worsening
  dysphagia (beyond baseline achalasia dysphagia), regurgitation of
  blood-tinged material, unintentional weight loss >10%, chest pain not
  responsive to standard achalasia measures. These features warrant
  prompt diagnostic EGD with biopsies regardless of last surveillance
  date.

  In Ukraine, EGD is widely available (NSZU-covered for symptomatic
  upper-GI investigation; achalasia-surveillance EGD typically
  out-of-pocket ~2000-5000 UAH). Lugol's chromoendoscopy available in
  a small number of tertiary centers in Kyiv and Lviv; conventional
  EGD with mucosal-inspection alone is acceptable if chromoendoscopy
  not available.

rationale_ua: >
  Стандартний-трек prevention шлях для пацієнтів з підтвердженою
  ахалазією. Ендоскопічне спостереження адресує chronic-stasis-
  асоційований SCC ризик, який з'являється через 10-25 років після
  початку захворювання.

  **Частота:** EGD кожні 2-3 роки починаючи через 10-15 років після
  початкового діагнозу ахалазії (per ACG 2013, ASGE 2015). Більш
  раннє початок (5-10 років post-diagnosis) розумне у пацієнтів з:
  мегаезофагом (діаметр стравоходу >6 см на barium swallow), затримкою
  їжі на попередній EGD, історією куріння або важкого вживання
  алкоголю, або сімейним анамнезом раку стравоходу.

  **Техніка:** стандартна EGD з обережним оглядом всієї слизової
  стравоходу після видалення затриманої їжі (може потребувати
  передпроцедурного посту понад стандартний NPO + on-table зрошення).
  Біопсія будь-якої підозрілої слизової — рихла, виразкована,
  бляшкоподібна або нерівна ділянка. Хромоендоскопія з Lugol-йодом
  (1-3% розчин, розпилений на слизову) виділяє диспластичні та
  early-SCC ділянки як бліді нефарбовані ділянки; рекомендовано де
  доступно.

  **Post-myotomy Barrett surveillance:** пацієнти ~через 10 років після
  Heller-міотомії або POEM розвивають рефлюкс + Barrett у ~25-30%.
  Після підтвердження Barrett пацієнт переходить (або паралельно
  спостерігається) на шлях RF-BARRETTS-ESOPHAGUS-PREVENTION.

  **Ескалація симптомів триггерує негайне обстеження:** нова або
  погіршена дисфагія (понад baseline дисфагію ахалазії), регургітація
  blood-tinged матеріалу, ненавмисне схуднення >10%, грудний біль не
  реагує на стандартні achalasia заходи. Ці ознаки виправдовують
  prompt діагностичну EGD з біопсіями незалежно від останнього
  surveillance дату.

  В Україні EGD широко доступна (НСЗУ покриває симптоматичне
  обстеження верхнього ШКТ; achalasia-surveillance EGD типово
  out-of-pocket ~2000-5000 грн). Lugol-хромоендоскопія доступна у
  невеликій кількості третинних центрів у Києві та Львові.

