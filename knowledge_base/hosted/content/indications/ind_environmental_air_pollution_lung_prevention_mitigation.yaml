do_not_do:
  - "Не презентувати individual-level mitigation як sufficient — exposure reduction yields incidence benefit at population scale + over decades."
  - "Не extrapolate USPSTF age-pack-years criteria до non-smoker air-pollution-exposed cohort — LDCT screening не validated для цього population per USPSTF 2021."
  - "Не пропускати smoking-cessation counseling — multiplicative interaction з PM2.5; cessation — highest-yield co-intervention."
  - "Не використовувати ozone-generating air purifiers — ozone — separate respiratory irritant + Group-2A carcinogen-component."
  - "Не нехтувати indoor air quality (cooking fumes, candles, indoor smoking) — indoor sources можуть exceed outdoor PM2.5 в residential settings."

do_not_do_en:
  - "Do not present individual-level mitigation as sufficient — exposure reduction yields incidence benefit at population scale and over decades."
  - "Do not extrapolate USPSTF age-pack-years criteria to a non-smoker air-pollution-exposed cohort — LDCT screening is not validated for this population per USPSTF 2021."
  - "Do not skip smoking-cessation counseling — multiplicative interaction with PM2.5; cessation is the highest-yield co-intervention."
  - "Do not use ozone-generating air purifiers — ozone is a separate respiratory irritant + Group-2A carcinogen component."
  - "Do not overlook indoor air quality (cooking fumes, candles, indoor smoking) — indoor sources may exceed outdoor PM2.5 in residential settings."

known_controversies:
  - topic: "LDCT screening eligibility for non-smoker high-PM2.5-exposed cohorts"
    positions:
      - position: "USPSTF 2021 limits LDCT screening to age 50-80 + ≥20 pack-years + current smoker or quit ≤15y; does not endorse air-pollution exposure as standalone screening indication"
      - position: "NCCN allows clinical judgment for occupational + environmental carcinogen exposures in the presence of additional risk factors; air-pollution-exposed never-smokers fall in soft-evidence region"
    our_default: "Apply USPSTF 2021 criteria as standard; consider individual NCCN-style clinical judgment when concurrent risk factors (eg, borderline pack-years, occupational co-exposure, family history) escalate cumulative-risk estimate."
    rationale: "RCT screening evidence (NLST, NELSON) enrolled smokers; extension to air-pollution-only cohort is mechanistic + not direct-evidence supported."

