rationale: >
  Standard-track prevention pathway for chronic high-PM2.5 residential
  exposure. Components per WHO 2021 Global Air Quality Guidelines +
  IARC Monograph 109 (2013) + NCCN NSCLC screening + ATS/ERS air-
  pollution statements:

  **(1) Exposure reduction counseling — individual levers**
  - Indoor air filtration: HEPA-filter portable purifiers in primary
    living areas (bedrooms especially); CADR sized to room volume.
    Whole-home HEPA HVAC where economically feasible.
  - Outdoor activity timing: avoid high-pollution hours (typically
    morning rush hour + late-afternoon traffic peaks; check local AQI).
    Defer vigorous outdoor exercise on poor-AQI days (>100 in US AQI
    scale, >50 µg/m³ PM2.5).
  - Respiratory protection: N95 (US) / FFP2 (EU) masks during peak-
    pollution events (wildfire smoke, dust storms, war-related fires,
    industrial accidents). KN95 acceptable substitute.
  - Window-closure during high-pollution events; minimize indoor
    combustion (gas stoves with vented hoods, no candles / incense
    in poorly-ventilated areas, no indoor smoking).
  - Residence relocation — discuss only if economically feasible;
    chronic-exposure reduction over decades is what drives
    incidence benefit.

  **(2) Tobacco-cessation counseling** — PM2.5 + tobacco interact
  multiplicatively for lung-cancer risk (similar to asbestos × tobacco
  framing). Smoking cessation is the highest-yield co-intervention.
  See RF-LIFESTYLE-TOBACCO-CANCER-PREVENTION for full cessation
  protocol.

  **(3) USPSTF lung-cancer screening eligibility check** — Annual
  LDCT for ages 50-80, ≥20 pack-years, current smoker or quit within
  15 years. Air-pollution exposure alone does not establish screening
  eligibility per USPSTF 2021; however, NCCN extends consideration
  for occupational + environmental carcinogen exposures in the
  presence of additional risk factors. Discuss with patient if
  smoking history is borderline-USPSTF.

  **(4) Symptom-triggered evaluation** — Low threshold for diagnostic
  workup of new persistent cough, hemoptysis, dyspnea, chest pain,
  unintentional weight loss. Chronic-PM2.5 exposure does not change
  evaluation thresholds but raises pre-test probability.

  **(5) Policy / advocacy framing** — Document exposure in clinical
  record; encourage patient awareness of local air-quality monitoring
  (AQI apps, IQAir, government monitors). Individual-level mitigation
  is partial protection only; population-level emissions regulation
  is the dominant lever.

  Resource access in Ukraine: portable HEPA purifiers 2000-15000 UAH
  depending on CADR; KN95/FFP2 masks pharmacy-accessible (~10-30 UAH
  each). Real-time PM2.5 monitoring via SaveEcoBot Telegram +
  IQAir AirVisual. Wartime fires + war-zone exposures are an active
  PM2.5 burden — see public-health advisories.

