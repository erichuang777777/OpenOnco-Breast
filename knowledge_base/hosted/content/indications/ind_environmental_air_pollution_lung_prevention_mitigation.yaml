expected_outcomes:
  overall_response_rate: "Reducing chronic PM2.5 exposure from >35 µg/m³ to WHO Interim-Target levels (≤25 then ≤15 µg/m³ annual mean) is associated with proportional lung-cancer-incidence reduction over decades — ecological + cohort data suggest ~9% incidence reduction per 10 µg/m³ improvement (Hamra/Pope meta-analyses). Individual-level mitigation (indoor air filtration, mask use during peak events, residence relocation) yields incomplete protection but reduces inhaled-dose burden. Population-level policy levers (Clean Air Act analogues, traffic / industrial emissions regulation) are the dominant exposure-reduction mechanism."

