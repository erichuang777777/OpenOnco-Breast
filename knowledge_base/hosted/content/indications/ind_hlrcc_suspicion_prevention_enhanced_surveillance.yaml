expected_outcomes:
  overall_response_rate: >-
    Empirical HLRCC-style surveillance (annual contrast-enhanced
    abdominal MRI from age 8-10 with radical-nephrectomy threshold
    on any detected solid renal mass; annual skin exam; gynecologic
    follow-up for women): expected to capture HLRCC-RCC at localised
    stage in the subset who are actual carriers (~50-90% of pedigree-
    suspicion individuals depending on phenotype stringency). Does
    NOT carry the diagnostic certainty of germline confirmation —
    carriers may receive unnecessary intensive surveillance when
    negative testing would have de-escalated, non-carriers receive
    childhood-initiated annual MRI that could have been safely
    declined, and the autosomal-dominant cascade-testing benefit
    (siblings, children, partner-fumarase-risk assessment) is lost
    without proband genetic confirmation. The aggressive nephrectomy
    threshold on any detected mass also amplifies the cost of
    unnecessary surveillance: a non-carrier with an incidentally-
    detected indeterminate renal cyst may face surgical workup that
    would not have been triggered in a general-population context.

