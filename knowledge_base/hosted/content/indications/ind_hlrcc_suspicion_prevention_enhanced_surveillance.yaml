do_not_do:
  - "Не презентувати enhanced surveillance як еквівалент genetic confirmation — diagnostic precision відсутня; cascade-testing і partner-FH-testing benefits для родичів втрачаються; це трейд-офф особливо вагомий при HLRCC через child-onset surveillance і fumarase-deficiency репродуктивний ризик."
  - "Не застосовувати «правило 3-см» VHL до emp​іричних HLRCC-спостережень — HLRCC-РСС біологія агресивна, і будь-яка solid renal mass потребує радикальної нефректомії, а не tumor-sparing підходу; зміна порогу втрачає мету surveillance."
  - "Не пропускати periodic re-discussion про genetic testing — більшість пацієнтів врешті приймають тестування після додаткових візитів, особливо при підкреслюванні partner-FH-testing benefits для дітей."
  - "Не починати дитячі MRI до 8 років без demonstrable proband-leiomyoma або strong family-history clustering — pediatric sedation ризик при щорічному MRI потребує clear-benefit pathway."
  - "Не пропускати pre-procedure fertility-preservation обговорення у молодих жінок з emp​іричною HLRCC-підозрою, які стикаються з myomectomy / hysterectomy — навіть без генетичного підтвердження репродуктивні наслідки fibroid surgery значні."

do_not_do_en:
  - "Do not present enhanced surveillance as equivalent to genetic confirmation — diagnostic precision is absent; cascade-testing and partner-FH-testing benefits for relatives are lost; this trade-off is particularly weighty in HLRCC given the child-onset surveillance and fumarase-deficiency reproductive risk."
  - "Do not apply the VHL '3-cm rule' to empirical HLRCC surveillance — HLRCC-RCC biology is aggressive, and any solid renal mass requires radical nephrectomy rather than a tumor-sparing approach; changing the threshold defeats the purpose of surveillance."
  - "Do not skip periodic re-discussion of genetic testing — most patients eventually accept testing after additional visits, especially when partner-FH-testing benefits for children are emphasized."
  - "Do not start childhood MRIs before age 8 without demonstrable proband-leiomyoma or strong family-history clustering — pediatric sedation risk at annual MRI cadence requires a clear-benefit pathway."
  - "Do not skip pre-procedure fertility-preservation discussion in young women with empirical HLRCC suspicion who face myomectomy / hysterectomy — even without genetic confirmation, the reproductive consequences of fibroid surgery are significant."

