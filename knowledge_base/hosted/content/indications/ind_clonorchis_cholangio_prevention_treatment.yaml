  - TEST-CBC
  - TEST-LFT
desired_tests: []

rationale: >
  Standard-track prevention pathway for prior or active C. sinensis
  infection. Eradicate active infection with praziquantel 25 mg/kg PO
  three times in one day. Then transition to lifelong hepatobiliary
  surveillance for heavily-exposed cohorts: liver US + serum CA 19-9
  every 12 months from age 40. Identical surveillance protocol to
  O. viverrini exposure.

  Caveat on CA 19-9: not specific to cholangiocarcinoma; elevated
  values warrant cross-sectional imaging (MRI / MRCP). Negative CA 19-9
  does NOT exclude cholangiocarcinoma — Lewis-antigen-negative
  individuals (~5-10% of population) cannot produce the antigen.

rationale_ua: >
  Стандартний-трек prevention шлях для попередньої або активної
  інфекції C. sinensis. Ерадикація активної інфекції празиквантелом
  25 мг/кг PO тричі за один день. Потім перехід до пожиттєвого
  гепатобіліарного спостереження для важко-експонованих когорт: УЗД
  печінки + сироватковий CA 19-9 кожні 12 міс з 40 років. Ідентичний
  протокол surveillance як для експозиції O. viverrini.

