evidence_level: moderate
strength_of_recommendation: strong
nccn_category: "2A"

expected_outcomes:
  overall_response_rate: >-
    Praziquantel cure of active C. sinensis infection: 80-95% with
    standard regimen 25 mg/kg PO three times in one day. Cancer-
    prevention endpoint: regional praziquantel programmes in endemic
    East-Asian zones associated with reduced cholangiocarcinoma
    incidence in successor cohorts, BUT praziquantel does NOT reverse
    chronic biliary-tract inflammation / fibrosis from prior burden —
    lifelong hepatobiliary surveillance remains mandatory in heavily-
    exposed individuals.

hard_contraindications: []
red_flags_triggering_alternative: []
