do_not_do:
  - "Не вважати празиквантел повноцінним cancer-prevention інтервенцією — хронічний фіброз від попереднього навантаження зберігає ризик cholangiocarcinoma."
  - "Не презентувати празиквантел як 'protection from cancer' пацієнту. Disclaimer per CHARTER §11."
  - "Не покладатися на CA 19-9 як sole screening test — Lewis-antigen-negative особи не продукують антиген."

do_not_do_en:
  - "Do not consider praziquantel a complete cancer-prevention intervention — chronic fibrosis from prior burden preserves cholangiocarcinoma risk."
  - "Do not present praziquantel to the patient as 'protection from cancer'. Disclaimer per CHARTER §11."
  - "Do not rely on CA 19-9 as a sole screening test — Lewis-antigen-negative individuals cannot produce the antigen."

