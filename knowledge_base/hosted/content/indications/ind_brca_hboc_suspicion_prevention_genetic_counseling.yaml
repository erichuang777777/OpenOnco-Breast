    position: supports
    relevant_quote_paraphrase: >-
      "Genetic counseling and BRCA1/BRCA2 testing recommended for
      individuals meeting NCCN Genetic/Familial High-Risk Assessment
      criteria for HBOC syndrome. Multi-gene panel testing is
      appropriate when multiple hereditary cancer syndromes are in
      the differential."
  - source_id: SRC-NCCN-OVARIAN-2025
    position: supports
    relevant_quote_paraphrase: >-
      "All women with high-grade serous ovarian, fallopian-tube, or
      primary peritoneal carcinoma should be offered germline testing
      regardless of family history. Family-cascade testing is
      indicated upon carrier identification."
  - source_id: SRC-ESMO-BREAST-EARLY-2024
    position: supports
    relevant_quote_paraphrase: >-
      "Hereditary breast cancer susceptibility testing should be
      offered to patients meeting criteria; counseling precedes
      testing."
  - source_id: SRC-ESMO-OVARIAN-2024
    position: supports
    relevant_quote_paraphrase: >-
      "Germline BRCA1/BRCA2 testing recommended in all patients with
      epithelial ovarian carcinoma; cascade testing of affected
      relatives upon positive identification."

do_not_do:
  - "Не призначати germline тестування без pre-test консультування — інформована згода, психологічна підготовка та обговорення GINA-наслідків обов'язкові."
  - "Не трактувати VUS результат як патогенний — управляйте як родовідну підозру до подальших даних з segregation analysis або functional studies."
  - "Не призначати risk-reducing хірургію (BSO / мастектомія) у носіїв без обговорення reproductive-planning, hormone-replacement-therapy наслідків post-BSO, та психологічного впливу — це shared-decision-making процес, а не алгоритмічна рекомендація."
  - "Не презентувати negative-panel результат як zero-risk — quantitative модель (Tyrer-Cuzick) може показувати залишковий ризик >20% lifetime, що виправдовує посилений скринінг навіть без variantу; deep intronic / regulatory варіанти не покриті стандартними панелями."
  - "Не пропускати male-carrier шлях — BRCA2 чоловіки мають підвищений ризик раку молочної залози (~6.8%) і метастатичного простатичного раку (~20-30%); сімейна історія сприймається як «жіноча проблема» в багатьох клінічних культурах і потребує явного contraargument."

do_not_do_en:
  - "Do not order germline testing without pre-test counseling — informed consent, psychological preparation, and GINA-implication discussion are mandatory."
  - "Do not treat a VUS result as pathogenic — manage as pedigree suspicion pending further data from segregation analysis or functional studies."
  - "Do not recommend risk-reducing surgery (BSO / mastectomy) in carriers without a discussion of reproductive planning, hormone-replacement-therapy sequelae post-BSO, and psychological impact — this is a shared-decision-making process, not an algorithmic recommendation."
  - "Do not present a negative-panel result as zero-risk — quantitative model (Tyrer-Cuzick) may show residual lifetime risk >20%, warranting enhanced screening even without identified variant; deep intronic / regulatory variants are not covered by standard panels."
  - "Do not skip the male-carrier pathway — BRCA2 men have elevated breast (~6.8%) and metastatic prostate (~20-30%) cancer risk; family history is perceived as a 'women's problem' in many clinical cultures and requires explicit counter-framing."

