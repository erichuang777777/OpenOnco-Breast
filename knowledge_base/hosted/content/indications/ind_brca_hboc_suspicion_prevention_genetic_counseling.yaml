rationale: >
  Standard-track prevention pathway for individuals with pedigree
  suspicion of Hereditary Breast and Ovarian Cancer syndrome. Two
  parallel referrals:

  **(1) Genetic counseling referral.** Pre-test counseling covers:
  inheritance pattern (autosomal dominant), penetrance (high for
  BRCA1/BRCA2, moderate for PALB2/CHEK2, lower for ATM), implications
  for first-degree relatives (cascade testing if positive), GINA /
  insurance considerations (genetic information non-discrimination
  protections in the US; check Ukrainian / EU equivalents per local
  jurisdiction), psychological aspects (HBOC carries significant
  cancer-anxiety burden — premorbid surveillance fatigue is a real
  phenomenon). Per ACMG / ASCO / NCCN guidelines, pre-test counseling
  by a certified genetic counselor or trained clinician is the
  standard of care before germline testing.

  **(2) Germline multi-gene HBOC panel testing.** Modern panels
  (e.g., Invitae Common Hereditary Cancers panel, Color hereditary
  cancer panel, GeneDx OncoGene Comprehensive, Myriad MyRisk) cover
  BRCA1, BRCA2, PALB2, CHEK2, ATM, RAD51C, RAD51D, BRIP1, plus
  contextual genes (TP53, PTEN, STK11, CDH1, NF1) for broader
  syndrome differential. Variant classification per ACMG framework:
  pathogenic / likely pathogenic / VUS / likely benign / benign.
  Ashkenazi Jewish patients with strong pedigree may start with
  3-mutation founder panel (BRCA1 185delAG, BRCA1 5382insC, BRCA2
  6174delT) for cost efficiency, escalating to full panel if negative.

  **Sequel pathway (positive panel — confirmed BRCA1/BRCA2 carrier):**
  - Breast surveillance — annual breast MRI starting age 25-30
    (alternating q6 months with mammogram from age 30); clinical
    breast exam q6-12mo.
  - Ovarian surveillance — risk-reducing bilateral
    salpingo-oophorectomy (BSO) is recommended between ages 35-40 for
    BRCA1, 40-45 for BRCA2, after childbearing complete. Pre-BSO
    interim screening (transvaginal ultrasound + CA-125 q6mo)
    is offered but has documented poor sensitivity for early-stage
    disease — must be explicitly framed as suboptimal vs BSO.
  - Risk-reducing mastectomy — option, discussed but not mandated;
    informed-consent process emphasizes that surveillance and
    risk-reducing surgery are both acceptable with different risk /
    quality-of-life tradeoffs.
  - Male carriers — annual clinical breast exam, breast imaging
    starting age 50, prostate-cancer screening (PSA) from age 40-45
    (BRCA2 high-priority).
  - Pancreatic — high-risk surveillance program referral if ≥1 affected
    first-degree relative + BRCA2 carrier (EUS + MRCP annually from
    age 50 or 10y before youngest family PDAC dx).

  **Sequel pathway (positive panel — moderate-penetrance variant
  PALB2/CHEK2/ATM):** modified surveillance — annual mammogram +/-
  MRI from age 30; ovarian surveillance generally not indicated for
  these moderate-penetrance variants (penetrance for ovarian is
  much lower than for BRCA1/2); discuss family planning per
  inheritance pattern.

  **Sequel pathway (negative panel):** general-population screening
  cadence per USPSTF guidelines + re-stratification by remaining
  family-history risk (quantitative model — Tyrer-Cuzick — may still
  indicate elevated empirical risk warranting enhanced surveillance
  even without identified variant).

  **Sequel pathway (VUS — variant of uncertain significance):**
  managed as pedigree-suspicion (this Indication / surveillance
  pathway) until segregation analysis or functional studies
  reclassify. VUS should NOT drive clinical management decisions.

  Genetic counseling and germline testing are typically covered by
  insurance in the US / EU when NCCN pedigree criteria are met; in
  Ukraine, germline testing is available through private labs at
  out-of-pocket cost (~5000-15000 UAH for multi-gene HBOC panel,
  ~1500-3000 UAH for Ashkenazi founder panel).

rationale_ua: >
  Стандартний-трек prevention шлях для осіб з родовідною підозрою на
  синдром спадкового раку молочної залози та яєчників (HBOC). Дві
  паралельні направлення:

  **(1) Направлення на генетичне консультування.** Pre-test
  консультування охоплює: спадкування (аутосомно-домінантне),
  пенетрантність (висока для BRCA1/BRCA2, помірна для PALB2/CHEK2,
  нижча для ATM), наслідки для родичів першого ступеня (cascade
  тестування при позитиві), GINA / страхові міркування (захист від
  генетичної дискримінації в США; перевірити українські / ЄС
  еквіваленти за місцевою юрисдикцією), психологічні аспекти (HBOC
  несе суттєвий cancer-anxiety тягар — преморбідна surveillance fatigue
  — реальне явище). За ACMG / ASCO / NCCN настановами, pre-test
  консультування у сертифікованого генетичного консультанта або
  навченого клініциста — standard of care перед germline тестуванням.

  **(2) Germline мультигенне HBOC панельне тестування.** Сучасні
  панелі (напр., Invitae Common Hereditary Cancers panel, Color
  hereditary cancer panel, GeneDx OncoGene Comprehensive, Myriad
  MyRisk) покривають BRCA1, BRCA2, PALB2, CHEK2, ATM, RAD51C, RAD51D,
  BRIP1, плюс контекстуальні гени (TP53, PTEN, STK11, CDH1, NF1) для
  ширшої диференціації синдромів. Класифікація варіантів за рамкою
  ACMG: патогенний / ймовірно патогенний / VUS / ймовірно
  доброякісний / доброякісний. Пацієнти ашкеназько-єврейського
  походження з сильним родоводом можуть починати з 3-мутаційної
  засновницької панелі (BRCA1 185delAG, BRCA1 5382insC, BRCA2
  6174delT) для cost-ефективності, з ескалацією до повної панелі при
  негативному результаті.

  **Наступний шлях (позитивна панель — підтверджений BRCA1/BRCA2
  носій):**
  - Скринінг молочної залози — щорічна МРТ молочної залози з 25-30
    років (чергуючи q6 місяців з мамографією з 30 років); клінічний
    огляд молочних залоз q6-12 міс.
  - Скринінг яєчників — risk-reducing двостороння сальпінго-
    оваріектомія (BSO) рекомендована між 35-40 роками для BRCA1,
    40-45 для BRCA2, після завершення дітородіння. Pre-BSO проміжний
    скринінг (трансвагінальний ультразвук + CA-125 q6 міс)
    пропонується, але має задокументовану погану чутливість для
    ранніх стадій — мусить бути явно framed як subоптимальний vs BSO.
  - Risk-reducing мастектомія — опція, обговорюється, але не
    обов'язкова; процес інформованої згоди підкреслює, що скринінг і
    risk-reducing хірургія обидва прийнятні з різними trade-off
    ризику / якості життя.
  - Чоловіки-носії — щорічний клінічний огляд молочних залоз, breast
    imaging з 50 років, скринінг раку передміхурової залози (ПСА) з
    40-45 років (BRCA2 високий пріоритет).
  - Підшлункова — направлення на програму високого ризику, якщо ≥1
    уражений родич першого ступеня + BRCA2 носій (EUS + MRCP
    щорічно з 50 років або 10 років до наймолодшого сімейного PDAC dx).

  **Наступний шлях (позитивна панель — варіант помірної
  пенетрантності PALB2/CHEK2/ATM):** модифікований скринінг — щорічна
  мамографія +/- МРТ з 30 років; скринінг яєчників зазвичай не
  показаний для цих варіантів помірної пенетрантності (пенетрантність
  для яєчників значно нижча, ніж для BRCA1/2); обговорити планування
  сім'ї за патерном спадкування.

  **Наступний шлях (негативна панель):** general-population скринінг-
  частота за настановами USPSTF + ре-стратифікація залишкового
  сімейно-історичного ризику (кількісна модель — Tyrer-Cuzick — може
  все ще вказувати на підвищений емпіричний ризик, що виправдовує
  посилений скринінг навіть без ідентифікованого варіанту).

  **Наступний шлях (VUS — variant of uncertain significance):**
  ведеться як родовідна підозра (ця Indication / шлях скринінгу) до
  segregation analysis або functional studies для рекласифікації.
  VUS НЕ повинна керувати клінічними рішеннями.

