expected_outcomes:
  overall_response_rate: >-
    Diagnostic yield of germline BRCA1/2 (+ extended HBOC panel) testing
    in pedigree-suspicion populations: ~10-25% positive carrier
    identification overall (variable by criterion stringency — Ashkenazi
    founder testing in BRCA-affected family ~40%, single-relative
    breast-cancer-<50 ~5-15%, multi-cancer cluster ~20-30%). Confirmed
    carrier routes to enhanced surveillance with documented mortality
    benefit: annual breast MRI + alternating mammogram reduces
    interval-cancer rate substantially in BRCA carriers; risk-reducing
    BSO between ages 35-45 reduces ovarian cancer incidence by ~80-90%
    and all-cause mortality. Risk-reducing mastectomy reduces breast
    cancer incidence by ~90% (option, not requirement).

