# No systemic drug regimen — primary intervention is biochemical
# monitoring (TSH) + imaging surveillance (thyroid US) + FNA of dominant
# or sonographically suspicious nodules. Levothyroxine replacement (when
# indicated for hypothyroidism) is supportive, not a Regimen FK.
recommended_regimen: null
