followed_by: []

evidence_level: moderate
strength_of_recommendation: strong
nccn_category: "2A"

expected_outcomes:
  overall_response_rate: >-
    Active surveillance (TSH q6-12mo + thyroid US q1y + FNA of any
    dominant/TIRADS-3+ nodule) captures both primary thyroid lymphoma
    (relative risk ~67-80x in Hashimoto's) and Hashimoto-associated PTC
    at earliest detectable stage. Early-stage thyroid lymphoma (most
    commonly MALT) is highly curable with stage-adapted radiation +/-
    rituximab-based chemotherapy (>90% 5y OS for stage IE). Early-stage
    Hashimoto-associated PTC outcomes mirror sporadic PTC (10y OS ~95%
    for low-risk disease). Surveillance does not reduce baseline
    incidence but materially shifts stage at diagnosis.

