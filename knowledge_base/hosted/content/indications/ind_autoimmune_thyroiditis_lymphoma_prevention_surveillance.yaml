sources:
  - source_id: SRC-NCCN-THYROID-2025
    position: supports
    relevant_quote_paraphrase: >-
      "Thyroid nodules in patients with chronic lymphocytic thyroiditis
      should be evaluated with ultrasound and FNA per general nodule
      criteria. Rapidly enlarging gland or compressive symptoms in
      Hashimoto's warrant urgent biopsy to exclude primary thyroid
      lymphoma."
  - source_id: SRC-NCCN-BCELL-2025
    position: supports
    relevant_quote_paraphrase: >-
      "Primary thyroid lymphoma (most commonly MALT or DLBCL) arises
      almost exclusively in a background of Hashimoto's thyroiditis.
      Diagnosis requires core-needle biopsy with histology and flow
      cytometry; FNA alone is frequently non-diagnostic in lymphoma."

do_not_do:
  - "Не покладатися виключно на TSH-моніторинг для виявлення раку — TSH не виявляє ні лімфому, ні PTC у Хашимото."
  - "Не призначати TSH-супресивні дози левотироксину для cancer prevention при Хашимото без підтвердженого PTC — ризик ятрогенного тиреотоксикозу, остеопорозу, аритмій."
  - "Не покладатися лише на FNA при підозрі на первинну лімфому щитоподібної залози — core-needle біопсія з flow cytometry переважно (FNA часто inconclusive в лімфомі)."
  - "Не ігнорувати швидке збільшення зоба або компресивні симптоми у Хашимото-пацієнта — урогенна онкологічна оцінка."
  - "Не виконувати рутинну профілактичну тиреоїдектомію — ризик хірургії перевищує абсолютний ризик раку у переважній більшості Хашимото-пацієнтів."

do_not_do_en:
  - "Do not rely on TSH monitoring alone to detect malignancy — TSH detects neither lymphoma nor PTC in Hashimoto's."
  - "Do not prescribe TSH-suppressive levothyroxine doses for cancer prevention in Hashimoto's without confirmed PTC — risks iatrogenic thyrotoxicosis, osteoporosis, arrhythmia."
  - "Do not rely on FNA alone when primary thyroid lymphoma is suspected — core-needle biopsy with flow cytometry is preferred (FNA frequently non-diagnostic in lymphoma)."
  - "Do not ignore rapid goiter enlargement or compressive symptoms in a Hashimoto patient — urgent oncologic evaluation required."
  - "Do not perform routine prophylactic thyroidectomy — surgical risk exceeds the absolute cancer risk in the vast majority of Hashimoto patients."

