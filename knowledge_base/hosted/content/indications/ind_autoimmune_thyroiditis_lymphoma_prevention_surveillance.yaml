rationale: >
  Standard-track prevention pathway for patients with confirmed
  Hashimoto's thyroiditis (or persistent positive anti-TPO/anti-Tg with
  goiter). Two-modality surveillance:

  **Biochemical (TSH q6-12mo):** monitors evolution of hypothyroidism
  and adjusts levothyroxine dose when indicated. Persistent TSH
  suppression in a previously euthyroid Hashimoto patient — especially
  with a new dominant nodule — warrants nodule workup (rare Hashitoxicosis
  vs PTC with functional autonomy vs lymphoma-related thyrotoxicosis).

  **Imaging (thyroid US q1y):** baseline US at diagnosis to document
  gland echotexture, vascular pattern, and any nodules. Annual repeat
  US thereafter. Any new dominant nodule (>1 cm) or progressively
  enlarging existing nodule → FNA per ATA 2015 / TIRADS criteria.

  **Red-flag (immediate workup):**
    - Rapid goiter enlargement over weeks-to-months
    - New compressive symptoms (dysphagia, hoarseness, stridor)
    - B-symptoms (fever, drenching night sweats, unintentional weight
      loss >10%)
    - Markedly hypoechoic mass replacing normal gland architecture on US
    These features raise suspicion for primary thyroid lymphoma → urgent
    core-needle biopsy (FNA can be inconclusive in lymphoma; histology
    + flow cytometry preferred).

  **PTC nodule workup:** FNA per Bethesda categories. Bethesda III/IV
  indeterminate nodules → molecular testing (Afirma/ThyroSeq) or repeat
  FNA. Bethesda V/VI → surgical consultation per ATA 2015 lobectomy vs
  thyroidectomy thresholds.

  **Levothyroxine replacement** (when TSH elevated) is standard
  endocrine care — not cancer prevention, but optimizes patient
  function during long-term surveillance. TSH-suppressive doses (TSH
  <0.5) are NOT indicated for cancer prevention in Hashimoto's absent a
  confirmed PTC requiring suppression.

  In Ukraine, thyroid US is widely available (NSZU-covered for
  evaluation of palpable nodules or goiter; ~300-800 UAH out-of-pocket
  at private centers). FNA performed at most regional oncology and
  endocrine centers; cytopathology turnaround typically 5-10 days.

rationale_ua: >
  Стандартний-трек prevention шлях для пацієнтів з підтвердженим
  тиреоїдитом Хашимото (або стійкими позитивними анти-ТПО/анти-Тг із
  зобом). Двомодальне спостереження:

  **Біохімічне (ТТГ q6-12 міс):** моніторинг еволюції гіпотиреозу та
  корекція дози левотироксину. Стійка супресія ТТГ у попередньо
  еутиреоїдного Хашимото-пацієнта — особливо з новим домінантним вузлом
  — потребує обстеження вузла.

  **Інструментальне (УЗД щитоподібної залози q1y):** базове УЗД на момент
  діагнозу для документації ехотекстури залози, васкулярного патерну
  та вузлів. Щорічне повторне УЗД. Будь-який новий домінантний вузол
  (>1 см) або прогресивно зростаючий → FNA per ATA 2015 / TIRADS критеріями.

  **Red-flag (негайне обстеження):**
    - Швидке збільшення зоба за тижні-місяці
    - Нові компресивні симптоми (дисфагія, охриплість, стридор)
    - B-симптоми (лихоманка, профузні нічні поти, ненавмисне схуднення
      >10%)
    - Виражено гіпоехогенна маса, що заміщує нормальну архітектуру залози
    Ці ознаки підвищують підозру на первинну лімфому щитоподібної
    залози → ургентна core-needle біопсія (FNA може бути inconclusive у
    лімфомі; гістологія + flow cytometry переважно).

  **PTC обстеження вузла:** FNA per Bethesda категоріями. Bethesda III/IV
  невизначені → молекулярне тестування (Afirma/ThyroSeq) або повторна
  FNA. Bethesda V/VI → хірургічна консультація per ATA 2015.

  **Левотироксин-замісна терапія** (при підвищеному ТТГ) — стандартна
  ендокринна допомога. TSH-супресивні дози (ТТГ <0.5) НЕ показані для
  cancer prevention при Хашимото без підтвердженого PTC.

  В Україні УЗД щитоподібної залози широко доступне (НСЗУ покриває для
  оцінки пальпованих вузлів або зоба; ~300-800 грн out-of-pocket у
  приватних центрах). FNA виконується у більшості регіональних
  онкологічних та ендокринних центрів.

