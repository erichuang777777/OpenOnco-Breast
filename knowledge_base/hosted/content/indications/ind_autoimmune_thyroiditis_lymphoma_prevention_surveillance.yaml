notes: >
  STUB — v0.3 chronic-condition prevention pilot (Hashimoto's
  thyroiditis). Two-Co-Lead signoff queued. PTC risk magnitude in
  Hashimoto's remains debated (2-3x vs surveillance-bias-attenuated);
  surveillance cadence reflects the higher-confidence lymphoma signal
  + the modest PTC nodule-emergence pattern. Future enhancement: a
  dedicated DIS-THYROID-LYMPHOMA entity would allow more precise
  Indication anchoring than the current DIS-THYROID-PAPILLARY +
  DIS-BURKITT pair.
