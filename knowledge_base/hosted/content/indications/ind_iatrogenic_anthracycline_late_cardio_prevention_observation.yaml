rationale: >
  Alternative-track companion to IND-IATROGENIC-ANTHRACYCLINE-LATE-
  CARDIO-PREVENTION-SURVEILLANCE. Cancer survivor ≥5y post-treatment
  declines structured COG-LTFU echo surveillance cadence (surveillance
  fatigue, no perceived symptoms, financial/access barrier, geographic
  distance from survivorship clinic) — receives symptom-vigilance
  education (dyspnea on exertion, orthopnea, paroxysmal nocturnal
  dyspnea, lower-extremity edema, fatigue out of proportion → stat
  echo + BNP + cardiology referral) + cardioprotective lifestyle
  counseling (smoking cessation, BP/lipid/glucose control, physical
  activity, alcohol moderation). Per CHARTER §11 patient-autonomy
  framing — surveillance refusal is a legitimate choice but framed as
  suboptimal vs. scheduled-surveillance comparator.

rationale_ua: >
  Альтернативно-трекова Indication. Виживач раку ≥5р post-treatment
  відмовляється від structured COG-LTFU echo surveillance cadence —
  отримує symptom-vigilance education (dyspnea, orthopnea, PND, edema,
  fatigue → stat echo + BNP + cardiology referral) + cardioprotective
  lifestyle counseling (smoking cessation, BP/lipid/glucose control,
  physical activity, alcohol moderation). Per CHARTER §11.

