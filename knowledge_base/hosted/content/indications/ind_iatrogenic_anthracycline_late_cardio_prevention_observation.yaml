expected_outcomes:
  overall_response_rate: "Survivor declines structured COG-LTFU echo surveillance schedule — receives symptom-prompted evaluation + cardioprotective lifestyle counseling only. Asymptomatic LV dysfunction may progress to symptomatic HF before detection. Outcomes substantially worse with late-presentation HF vs. surveillance-detected early dysfunction (early ACE inhibitor / beta-blocker / SGLT2-i can stabilize or partially reverse subclinical disease)."

