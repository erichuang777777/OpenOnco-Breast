sources:
  - source_id: SRC-NCCN-BCELL-2025
    position: context
    relevant_quote_paraphrase: >-
      "Symptom-driven workup is the minimum acceptable surveillance for
      low-risk Sjögren's; structured lymphoma surveillance is
      recommended for any patient with predictor features."

do_not_do:
  - "Не використовувати цей шлях у пацієнтів з будь-яким lymphoma-предиктором — потребують structured surveillance."
  - "Не презентувати rheumatology-only observation як еквівалент lymphoma-focused surveillance — interval-cancer ризик вищий."
  - "Не ігнорувати alarm features (persistent parotid swelling, palpable purpura, нова лімфаденопатія) — імідіат-workup показано."
  - "Не використовувати цей шлях у пацієнтів з високим ESSDAI або активним extraglandular involvement."
  - "Не пропускати періодичне обговорення upgrade — Шегрен-предиктори можуть емерджувати з часом."

do_not_do_en:
  - "Do not use this pathway in patients with any lymphoma predictor — they require structured surveillance."
  - "Do not present rheumatology-only observation as equivalent to lymphoma-focused surveillance — interval-cancer risk is higher."
  - "Do not ignore alarm features (persistent parotid swelling, palpable purpura, new lymphadenopathy) — immediate workup indicated."
  - "Do not use this pathway in patients with high ESSDAI or active extraglandular involvement."
  - "Do not skip periodic re-discussion of upgrade — Sjögren's predictors can emerge over time."

