rationale: >
  Alternative-track companion to IND-SJOGREN-MALT-LYMPHOMA-PREVENTION-
  SURVEILLANCE. Appropriate for patients with confirmed primary
  Sjögren's syndrome WITHOUT high-risk lymphoma-predictor features
  who choose minimum-intensity surveillance for any of: stable mild
  Sjögren's with low ESSDAI for >5 years and no predictors, cost /
  access constraints (no nearby rheumatology center capable of
  cryoglobulin testing), procedural anxiety, geographic distance, or
  explicit preference for symptom-driven follow-up after informed-
  consent discussion.

  **Cadence:**
    - Rheumatology follow-up per usual cadence (typically q6-12mo)
      with ESSDAI tracking
    - CBC + basic metabolic panel q12mo
    - Lymphoma-focused lab workup (SPEP, cryoglobulins, C4) only when
      triggered by clinical suspicion
    - Imaging (parotid US, CT, etc.) only on trigger

  **Trigger list for prompt lymphoma workup:**
    - New persistent parotid or lacrimal swelling >2 weeks
    - New palpable purpura, livedo, or vasculitic skin lesion
    - New lymphadenopathy (>1 cm cervical or any axillary/inguinal)
    - New splenomegaly on examination
    - B-symptoms (fever, night sweats, unintentional weight loss >10%)
    - New unexplained cytopenias
    - New monoclonal protein on incidental SPEP

  **Not appropriate for:**
    - Patients with any pre-existing lymphoma-predictor (persistent
      parotid swelling, low C4, cryoglobulinemia, palpable purpura,
      monoclonal gammopathy)
    - Patients with high ESSDAI (≥14) or active extraglandular
      involvement
    - Patients with prior salivary gland biopsy showing lymphoepithelial
      lesions or focal lymphocyte score ≥3
    - Patients with family history of lymphoma

  Per CHARTER §11 patient-autonomy framing: low-risk Sjögren's patients
  (no predictors, low ESSDAI) carry near-population MALT incidence in
  short-term, so symptom-driven observation is a defensible informed-
  consent choice. Risk of missed early lymphoma exists; patient retains
  option to upgrade to scheduled surveillance at any future visit.

  **Alarm features** route immediately to lymphoma workup (lab panel +
  targeted imaging ± biopsy) — and if MALT or other lymphoma confirmed,
  to the relevant treatment-persona algorithm.

rationale_ua: >
  Альтернативно-трекова Indication — компаньйон до
  IND-SJOGREN-MALT-LYMPHOMA-PREVENTION-SURVEILLANCE. Доречно для
  пацієнтів з підтвердженим первинним Шегреном БЕЗ high-risk lymphoma-
  предикторів, які обирають мінімальної інтенсивності спостереження з
  причин: стабільний легкий Шегрен з низьким ESSDAI >5 років без
  предикторів, вартість / доступ (немає поблизу rheumatology-центра з
  cryoglobulin testing), процедурна тривога, географічна відстань.

  **Частота:**
    - Rheumatology follow-up per usual частотою (q6-12 міс) з ESSDAI
    - CBC + базовий метаболічний панель q12 міс
    - Lymphoma-focused лабораторний workup (SPEP, кріоглобуліни, C4)
      лише при триггері клінічної підозри
    - Imaging (parotid US, CT) лише на тригер

  **Триггер-лист для prompt lymphoma workup:**
    - Новий persistent привушний або слізний набряк >2 тижні
    - Нова palpable purpura, livedo або vasculitic шкірне ураження
    - Нова лімфаденопатія
    - Нова спленомегалія
    - B-симптоми
    - Нові непояснені cytopenias
    - Новий моноклональний протеїн на випадковій SPEP

  **Не доречно для:**
    - Пацієнтів з будь-яким lymphoma-предиктором (persistent привушний
      набряк, низький C4, кріоглобулінемія, palpable purpura,
      моноклональна гаммапатія)
    - Пацієнтів з високим ESSDAI (≥14)
    - Пацієнтів з попередньою salivary gland біопсією з lymphoepithelial
      ураженнями або focal lymphocyte score ≥3
    - Пацієнтів з сімейним анамнезом лімфоми

  Per CHARTER §11 framing автономії пацієнта: low-risk Шегрен-пацієнти
  несуть near-population MALT incidence у short-term, тому
  symptom-driven observation — defensible informed-consent вибір.

  **Alarm features** маршрутизують негайно до lymphoma workup.

