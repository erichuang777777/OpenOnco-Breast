expected_outcomes:
  overall_response_rate: >-
    Rheumatology-driven observation (ESSDAI tracking and disease-
    activity-driven Sjögren's management without scheduled lymphoma-
    focused lab panel or imaging) detects MALT lymphoma at later stage
    when caught only on clinical suspicion or symptom presentation.
    Acceptable as a minimum-intensity default for patients without
    high-risk predictors (no persistent parotid swelling, normal C4,
    no cryoglobulinemia, no monoclonal gammopathy) — but below EULAR
    2020 best-practice surveillance recommendation for any Sjögren's
    patient.

