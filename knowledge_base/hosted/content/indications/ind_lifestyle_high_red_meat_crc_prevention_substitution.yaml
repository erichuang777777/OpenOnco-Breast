rationale: >
  Standard-track prevention pathway for combined red+processed meat
  exposure. Components per WCRF/AICR Continuous Update Project + IARC
  Monograph 114 (2015) + ACS 2020 Diet + Physical Activity Guideline +
  NCCN Colon screening framework:

  **(1) Dietary substitution counseling** — Reduce processed meat to
  <50 g/day (ideally minimal/none). Reduce red meat to <500 g/week
  (~3 portions). Substitute with:
  - Poultry, fish, eggs, dairy
  - Legumes (beans, lentils, chickpeas) — high-fibre + plant-protein
  - Whole grains, nuts, seeds
  - Plant-based protein sources (tofu, tempeh, seitan)

  **(2) Cooking-method counseling** — When red meat is consumed,
  prefer lower-temperature methods (braising, stewing, slow-roasting)
  over grilling/charring/frying. Marinades (vinegar, herbs, citrus)
  reduce HCA + PAH formation. Avoid charring + visible burnt surfaces.

  **(3) Mediterranean-style or plant-forward eating pattern** — Whole
  foods, vegetables, fruits, whole grains, olive oil, moderate fish/
  poultry, minimal processed/red meat. Strongest dietary-pattern
  evidence for CRC + cardiovascular + all-cause mortality reduction.

  **(4) USPSTF-cadence CRC screening** — Colonoscopy q10y from age 45
  (or stool-based screening: FIT q1y, FIT-DNA q3y as alternatives).
  Red/processed meat consumption does not change screening cadence per
  current guidelines but compounds baseline risk.

  **(5) Referral to registered dietitian** for sustained behavioral
  change, especially if cultural / religious dietary patterns make
  reduction challenging.

  Dietary intervention + age-appropriate screening additive for CRC
  incidence reduction.

rationale_ua: >
  Стандартний-трек prevention шлях для combined red+processed meat
  exposure. Components per WCRF/AICR + IARC Monograph 114 + ACS 2020 +
  NCCN Colon framework:

  **(1) Dietary substitution counseling** — Зменшити processed meat до
  <50 г/день (ідеально minimal/none). Зменшити red meat до <500 г/тиждень
  (~3 порції). Substitute:
  - Птиця, риба, яйця, dairy
  - Бобові — high-fibre + plant-protein
  - Whole grains, nuts, seeds
  - Plant-based protein (tofu, tempeh, seitan)

  **(2) Cooking-method counseling** — При споживанні red meat надавати
  перевагу lower-temperature methods (braising, stewing, slow-roasting)
  над grilling/charring/frying. Marinades (vinegar, herbs, citrus)
  знижують утворення HCA + PAH. Уникати charring + visible burnt
  surfaces.

  **(3) Mediterranean-style або plant-forward eating pattern** — Whole
  foods, овочі, фрукти, whole grains, olive oil, помірне fish/poultry,
  мінімальне processed/red meat.

  **(4) USPSTF-cadence CRC screening** — Colonoscopy q10y з 45 років
  (або FIT q1y / FIT-DNA q3y).

  **(5) Direction до registered dietitian** для sustained behavioral
  change, especially if cultural/religious patterns make reduction
  challenging.

