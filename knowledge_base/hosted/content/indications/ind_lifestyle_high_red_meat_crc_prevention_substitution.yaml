do_not_do:
  - "Не презентувати dietary counseling як заміну colonoscopy screening — both interventions complementary."
  - "Не demonізувати окремі їжі — dietary pattern має значення більше ніж elimination окремих foods."
  - "Не приписувати extreme dietary restriction без registered-dietitian support — risk of malnutrition / inappropriate substitution."
  - "Не ігнорувати cultural / religious dietary patterns — counseling має бути culturally sensitive і feasible для individual."
  - "Не нехтувати cooking-method counseling — HCA/PAH formation залежить від temperature і duration; behavior change тут underused."

do_not_do_en:
  - "Do not present dietary counseling as a substitute for colonoscopy screening — both interventions are complementary."
  - "Do not demonize individual foods — dietary pattern matters more than single-food elimination."
  - "Do not prescribe extreme dietary restriction without registered-dietitian support — risk of malnutrition / inappropriate substitution."
  - "Do not ignore cultural / religious dietary patterns — counseling must be culturally sensitive and feasible for the individual."
  - "Do not skip cooking-method counseling — HCA/PAH formation depends on temperature + duration; behavior change here is underused."

