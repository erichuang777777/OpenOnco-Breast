expected_outcomes:
  overall_response_rate: >-
    Diagnostic yield of germline VHL panel testing in pedigree-
    suspicion populations: ~40-90% positive carrier identification
    (varies by criterion stringency — known-pathogenic-variant family
    ~100% on cascade testing; bilateral / multifocal RCC suspicion
    ~30-50%; isolated CNS hemangioblastoma in proband ~80%; early-
    onset clear-cell RCC <46 without other features ~10-15%).
    Confirmed carrier routes to structured multi-organ surveillance
    starting in early childhood — VHL is one of the strongest
    natural-history candidates for early-detection benefit: retinal
    hemangioblastoma early laser / cryotherapy preserves vision in
    most cases; RCC tumor-sparing partial nephrectomy at 3-cm
    threshold preserves renal function while preventing metastatic
    spread; pheochromocytoma catecholamine screening detects pre-
    crisis disease.

