sources:
  - source_id: SRC-ESMO-RCC-2024
    position: supports
    relevant_quote_paraphrase: >-
      "Germline testing for hereditary RCC syndromes including VHL is
      recommended for individuals with clear-cell RCC under 46,
      bilateral / multifocal RCC, CNS / retinal hemangioblastoma, or
      family history of these features."
  - source_id: SRC-NCCN-KIDNEY-2025
    position: supports
    relevant_quote_paraphrase: >-
      "Patients with suspected hereditary RCC syndromes including VHL
      should receive germline panel testing; confirmed VHL carriers
      enter structured multi-organ surveillance (CNS MRI, abdominal
      MRI, ophthalmology, catecholamines) starting in childhood per
      VHL Alliance consensus guidelines."

do_not_do:
  - "Не призначати germline тестування без pre-test консультування — інформована згода + обговорення дитячого скринінг-тягаря обов'язкові."
  - "Не treter VUS результат як патогенний — управляйте як родовідну підозру до подальших даних; не починайте дитячий скринінг-протокол на підставі VUS."
  - "Не пропускати MLPA / large-deletion аналіз — ~30% патогенних VHL варіантів — великі делеції, пропущені sequencing-only тестуванням."
  - "Не презентувати negative-panel результат як zero-risk — non-VHL hereditary RCC syndromes (FH / HLRCC, FLCN / BHD, SDHB/C/D) можуть бути basis сильної сімейної історії; розгляньте дедиковану панель."
  - "Не пропускати дитячий офтальмологічний скринінг (q1 рік з 1-5 років) у підтверджених VHL-сім'ях — retinal hemangioblastoma — провідна причина втрати зору при VHL і легко лікується при ранньому виявленні."
  - "Не пропускати скринінг катехоламінів / метанефринів у підтверджених VHL-сім'ях з 5-10 років — pheochromocytoma в дитячому віці може представитися гіпертензивним кризом / cardiovascular collapse, але pre-symptomatic detection дозволяє безпечну елективну ад​реналектомію."

do_not_do_en:
  - "Do not order germline testing without pre-test counseling — informed consent and discussion of the childhood surveillance burden are mandatory."
  - "Do not treat a VUS result as pathogenic — manage as pedigree suspicion pending further data; do not initiate the childhood surveillance protocol based on a VUS."
  - "Do not skip MLPA / large-deletion analysis — ~30% of pathogenic VHL variants are large deletions missed by sequencing-only testing."
  - "Do not present a negative-panel result as zero-risk — non-VHL hereditary RCC syndromes (FH / HLRCC, FLCN / BHD, SDHB/C/D) may underlie a strong family history; consider a dedicated panel."
  - "Do not skip childhood ophthalmologic screening (q1 year from age 1-5) in confirmed VHL families — retinal hemangioblastoma is a leading cause of vision loss in VHL and is treatable at small sizes."
  - "Do not skip catecholamine / metanephrine screening in confirmed VHL families from age 5-10 — childhood pheochromocytoma may present as hypertensive crisis / cardiovascular collapse, but pre-symptomatic detection enables safe elective adrenalectomy."

