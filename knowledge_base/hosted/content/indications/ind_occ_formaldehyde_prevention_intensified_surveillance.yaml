expected_outcomes:
  overall_response_rate: >-
    Primary endpoint: detection of incident formaldehyde-attributable
    AML at earlier stage via CBC surveillance, and early detection of
    nasopharyngeal / sinonasal carcinoma via symptom-triggered ENT
    evaluation. No validated screening modality exists for nasopharyngeal
    carcinoma in occupational cohorts; CBC surveillance for occupational
    leukemia risk is supported by NCCN occupational-exposure
    extension but not RCT-validated. Patient is informed that the
    incremental incidence-detection benefit is modest.

