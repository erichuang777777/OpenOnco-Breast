      "Patients with documented occupational benzene / formaldehyde /
      ionizing-radiation exposure carry elevated AML risk; CBC
      surveillance and cytopenia-triggered marrow evaluation form the
      operational surveillance standard."

do_not_do:
  - "Не призначати рутинну біопсію кісткового мозку асимптомним пацієнтам — резервується для тривожних цитопеній на CBC."
  - "Не пропонувати нaзальну ендоскопію як рутинний screening — резервується для пацієнтів із симптомами."
  - "Не пропускати ENT-направлення при однобічній епістаксис / обструкції — це типові early-warning ознаки назофарингеальної карциноми."
  - "Не екстраполювати CBC-частоту q1y indefinitely — після 20 років post-exposure для асимптомних пацієнтів q2y розумно."

do_not_do_en:
  - "Do not order routine bone-marrow biopsy in asymptomatic patients — reserve for alarm cytopenias on CBC."
  - "Do not offer nasal endoscopy as routine screening — reserve for symptomatic patients."
  - "Do not skip ENT referral for unilateral epistaxis / obstruction — these are typical early-warning signs of nasopharyngeal carcinoma."
  - "Do not extrapolate CBC frequency q1y indefinitely — after 20 years post-exposure for asymptomatic patients, q2y is reasonable."

