rationale: >
  Standard-track prevention pathway for individuals with documented
  prior occupational formaldehyde exposure who do not have a current
  formaldehyde-associated malignancy diagnosis. Three parallel
  interventions:

  **(1) Annual CBC for myeloid-leukemia surveillance.** Formaldehyde
  has Group-1 association with myeloid leukemia (IARC 100F).
  Cytopenia patterns (unexplained anemia, leukopenia, thrombocytopenia,
  or progressive monocytosis) on annual CBC prompt referral to
  hematology for peripheral-smear review and consideration of bone-
  marrow biopsy. Frequency q1y for active / recent exposure (within
  20 years); may extend to q2y after 20 years post-exposure for
  asymptomatic patients with prior normal trends.

  **(2) ENT symptom-awareness counseling.** Patient is counseled to
  report unilateral epistaxis, persistent unilateral nasal obstruction,
  recurrent unilateral sinusitis, anosmia, or facial pain — any of
  which warrants prompt ENT referral with consideration of nasal /
  sinus endoscopy and CT sinus imaging. No validated screening modality
  for asymptomatic nasopharyngeal / sinonasal cancer exists; symptom-
  triggered evaluation is the operational standard.

  **(3) Exposure-cessation / PPE counseling.** Most formaldehyde-
  exposed individuals are no longer in high-exposure roles. Where
  active or residual exposure persists (continuing pathology /
  embalming work), counsel on fume-hood use, formalin-substitution
  preservatives where available, N95+/half-face respirators during
  high-exposure tasks, and adherence to OSHA / NSZU PEL.

  Resource access in Ukraine: CBC is widely available (~150-300 UAH);
  ENT consultation accessible at regional centers; CT sinus
  (~1500-3000 UAH) where indicated.

rationale_ua: >
  Стандартний-трек prevention шлях для осіб з документованим попереднім
  професійним впливом формальдегіду без поточного діагнозу
  формальдегід-асоційованої малігнізації. Три паралельні втручання:

  **(1) Щорічна CBC для спостереження за мієлоїдною лейкемією.**
  Формальдегід — Group-1 асоціація з AML (IARC 100F). Цитопенії
  (необʼяснена анемія, лейкопенія, тромбоцитопенія, прогресуючий
  моноцитоз) при щорічній CBC спонукають направлення до гематолога
  для перегляду периферійного мазка та розгляду біопсії кісткового
  мозку. Частота q1y для активного / нещодавнього впливу (у межах
  20 років); може бути продовжена до q2y після 20 років post-exposure
  для асимптомних пацієнтів з попередньою нормальною динамікою.

  **(2) ENT symptom-awareness counseling.** Пацієнту радять
  повідомляти про однобічну епістаксис, persistent однобічну назальну
  обструкцію, рецидивуючий однобічний синусит, аносмію або лицевий
  біль — кожен з яких потребує оперативного ENT-направлення з
  розглядом назальної / синусової ендоскопії та CT-сканування синусів.
  Валідованої модальності скринінгу асимптомного назофарингеального /
  синоназального раку немає; symptom-triggered оцінка — operational
  standard.

  **(3) Exposure-cessation / PPE counseling.** Більшість
  формальдегід-експонованих осіб більше не у high-exposure ролях.
  Де активний / залишковий вплив зберігається (продовження
  патологоанатомічної / бальзамувальної роботи), counseling щодо
  використання fume-hood, формалін-замінних консервантів де доступні,
  N95+/half-face респіратори при high-exposure задачах, дотримання
  OSHA / НСЗУ PEL.

  Доступ до ресурсів в Україні: CBC (~150-300 грн); ENT-консультація
  доступна в регіональних центрах; CT синусів (~1500-3000 грн) де
  показано.

