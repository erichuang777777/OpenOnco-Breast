do_not_do:
  - "Не використовувати цей шлях у high-risk post-HSCT або early post-solid-organ-transplant пацієнтів — потрібна active surveillance."
  - "Не ігнорувати new lymphadenopathy / B-симптоми — immediate EBV-DNA + imaging escalation."

do_not_do_en:
  - "Do not use this pathway in high-risk post-HSCT or early post-solid-organ-transplant patients — active surveillance is required."
  - "Do not ignore new lymphadenopathy / B-symptoms — immediate EBV-DNA + imaging escalation."

