rationale: >
  Alternative-track companion to IND-UNIVERSAL-CURRENT-SMOKER-
  PREVENTION-CESSATION-LDCT. Patient declines structured multi-
  session cessation program enrollment — receives brief intervention
  within routine-visit scope.

  **(1) 5As brief intervention at each routine visit.** Ask
  (current smoking, quantity, quit attempts); Advise (link tobacco
  to ≥17-cancer cluster + cardiovascular + COPD risk in plain
  language); Assess (readiness to change per Prochaska stages);
  Assist (provide written resources, quit-line telephone number,
  smartphone-app referrals); Arrange (follow-up at 3-6 month
  interval, offer structured-program referral at each touch).

  **(2) Take-home nicotine replacement therapy (NRT) starter kit.**
  Combination NRT (long-acting patch 14-21 mg + short-acting gum
  / lozenge 2-4 mg PRN) provided directly OR via prescription /
  voucher / OTC voucher per local accessibility. Patient-self-
  administered without active program scaffolding; abstinence
  rates lower than structured-program comparator but exceed
  no-intervention baseline. Pharmacotherapy with varenicline /
  bupropion offered with clear-warning of need for active
  monitoring (depression / agitation flag, dose-titration); patient
  may decline prescription pharmacotherapy in favor of OTC NRT
  only.

  **(3) USPSTF LDCT lung-cancer screening eligibility self-
  evaluation.** Provide written eligibility criteria + clinician
  pathway for those who choose to enroll. Without active program
  coordination, uptake is lower (~20-30% of eligible) vs structured
  pathway (~50-60% of eligible); document patient determination.

  **(4) Symptom-vigilance education.** Heightened pattern-
  recognition for site-specific early-warning features in the
  smoker cohort: persistent cough / hemoptysis (lung), dysphagia
  (oesophageal / oropharyngeal), oral lesion (oral / laryngeal),
  unexplained hematuria (bladder / kidney), unintended weight loss
  + epigastric pain (pancreas / gastric). Every alarm symptom
  warrants prompt diagnostic workup.

  **(5) Re-engagement pathway.** Document quit-attempts at each
  visit. Each relapse is data; offer structured-program referral
  at each touch.

  Per CHARTER §11 patient-autonomy framing.

rationale_ua: >
  Альтернативно-трекова Indication. Пацієнт відмовляється від
  structured cessation program — отримує brief intervention у
  routine-visit scope.

  **(1) 5As brief intervention при кожному routine visit.** Ask /
  Advise / Assess / Assist / Arrange. Quit-line телефон, smartphone-
  apps. Follow-up на 3-6 місяців.

  **(2) Take-home NRT starter kit.** Combination NRT (long-acting
  патч 14-21 мг + short-acting gum / lozenge 2-4 мг PRN). Patient-
  self-administered. Pharmacotherapy varenicline / bupropion
  offered з clear warning щодо need for active monitoring.

  **(3) USPSTF LDCT lung-cancer screening eligibility self-
  evaluation.** Письмові критерії + clinician pathway.

  **(4) Symptom-vigilance education.** Heightened pattern-
  recognition: persistent cough / hemoptysis (легені), dysphagia
  (стравохід / oropharynx), oral lesion, unexplained hematuria,
  unintended weight loss + epigastric pain.

  **(5) Re-engagement pathway.** Document quit-attempts при кожному
  visit. Each relapse is data; offer structured-program referral
  при кожному touch.

  Per CHARTER §11 patient-autonomy framing.

