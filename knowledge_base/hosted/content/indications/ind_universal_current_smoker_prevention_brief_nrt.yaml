do_not_do:
  - "Не презентувати brief intervention як еквівалент structured cessation program — outcomes inferior, framing critical."
  - "Не disable LDCT access на основі declined-program — eligibility evaluation окрема axis."
  - "Не пропускати symptom-vigilance education — patient у smoker cohort часто delay alarm symptom presentation."
  - "Не уникати re-engagement opportunity — кожний relapse є data; пацієнт може engage при шостій спробі after шостого relapse."
  - "Не призначати prescription varenicline / bupropion без depression / agitation flag explicitly framed — black-box warning withdrawn але patient education залишається важливим."

do_not_do_en:
  - "Do not present brief intervention as equivalent to structured cessation program — outcomes are inferior; framing is critical."
  - "Do not disable LDCT access on the basis of declined-program — eligibility evaluation is a separate axis."
  - "Do not skip symptom-vigilance education — patients in the smoker cohort often delay alarm-symptom presentation."
  - "Do not avoid re-engagement opportunity — every relapse is data; a patient may engage at the sixth attempt after the sixth relapse."
  - "Do not prescribe varenicline / bupropion without depression / agitation flag explicitly framed — black-box warning was withdrawn but patient education remains important."

