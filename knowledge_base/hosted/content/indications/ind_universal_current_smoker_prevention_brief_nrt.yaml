expected_outcomes:
  overall_response_rate: >-
    Alternative-track companion. Patient declines structured
    multi-session cessation program enrollment (geographic access,
    insurance, prior unsuccessful attempts, autonomy preference) —
    receives brief-intervention 5As counseling + take-home nicotine
    replacement therapy (NRT) starter kit + symptom-vigilance
    education + optional self-paced LDCT eligibility self-evaluation.
    Cumulative 6-month abstinence with brief-intervention + NRT only:
    ~10-18% per Cochrane brief-intervention meta-analysis (lower than
    intensive-program ~20-35% but higher than no-intervention ~5-8%
    spontaneous quit rate). Re-engagement opportunity preserved.
    LDCT uptake lower without active program coordination but
    eligibility self-evaluation surfaces the screening opportunity.
    Per CHARTER §11 patient-autonomy framing — declining structured
    program is legitimate but framed as suboptimal vs intervention-
    arm comparator.

