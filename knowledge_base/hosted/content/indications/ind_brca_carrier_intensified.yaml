expected_outcomes:
  overall_response_rate: >-
    Intensified track layers two evidence-supported risk-reducing
    surgical options on top of the standard NCCN surveillance
    protocol. (1) Risk-reducing mastectomy (RRM) reduces breast
    cancer incidence by ~90% in confirmed BRCA carriers (Hartmann
    1999, Rebbeck 2004, Domchek 2010 meta-analyses). Mortality
    benefit demonstrated in cohort follow-up. (2) Risk-reducing
    bilateral salpingo-oophorectomy (RRSO) reduces ovarian cancer
    incidence by ~80-90% and all-cause mortality by ~30-40% in
    confirmed BRCA carriers (Domchek 2010). Pre-menopausal RRSO
    additionally reduces breast cancer incidence by ~50%
    (controversial — magnitude debated post-WHI). Both surgeries
    are appropriate for shared-decision discussion; neither is
    mandated.

