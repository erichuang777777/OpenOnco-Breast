rationale: >
  Aggressive-track confirmed-carrier pathway: layered on top of the
  IND-BRCA-CARRIER-SURVEILLANCE standard protocol with two
  evidence-based risk-reducing surgical options that escalate beyond
  surveillance alone.

  **Foundation:** All standard surveillance from IND-BRCA-CARRIER-
  SURVEILLANCE applies (annual breast MRI from 25 / 30 alternating
  with mammogram from 30; CBE q6mo; TVUS + CA-125 q6mo from 30-35
  framed honestly; PSA + DRE for BRCA2 men from 40; pancreatic
  surveillance per CAPS criteria).

  **Intensification 1 — Risk-reducing mastectomy (RRM, women,
  age 25-30+):** RRM reduces breast cancer incidence by ~90% in
  confirmed BRCA carriers — strongest documented risk-reduction
  intervention available. Timing: age 25-30 for BRCA1 (earlier
  median onset); age 30-35 for BRCA2. Shared-decision-making must
  cover:
    - Surgical risk (multi-stage reconstruction, complications,
      revision rate)
    - Sensation loss / body image / sexual function impact
    - Reconstruction options (implant vs autologous DIEP / TRAM;
      nipple-sparing vs simple); each with distinct cosmetic /
      functional / oncologic trade-offs
    - Residual risk (~5-10% residual breast tissue at axilla / chest
      wall — surveillance continues at reduced cadence post-RRM)
    - Reversibility: NONE — RRM is irreversible
    - Alternative: continued intensive surveillance with annual MRI
      (next-strongest risk reduction; no incidence reduction but
      stage-shift on detection)
  Urgency differs: BRCA1 carriers face earlier-median breast cancer
  diagnosis (~40), motivating earlier RRM discussion. BRCA2
  carriers (median ~45) have more flexibility for surveillance-
  first deferral.

  **Intensification 2 — Risk-reducing BSO (RRSO, women,
  post-childbearing):** RRSO is the canonical BRCA-spectrum
  prophylactic surgery. Reduces ovarian cancer incidence by
  ~80-90% and all-cause mortality by ~30-40%. Timing:
    - BRCA1: age 35-40 (or upon completion of childbearing,
      whichever later) — earlier age reflects earlier-median
      ovarian cancer onset in BRCA1 (~50) vs BRCA2 (~60).
    - BRCA2: age 40-45 (post-childbearing).
  Shared-decision-making must cover:
    - Surgical menopause sequelae (vasomotor symptoms, bone
      density, cardiovascular risk)
    - Hormone replacement therapy (HRT) — in BRCA carriers
      WITHOUT prior breast cancer, short-course estrogen-only HRT
      (post-RRSO) to natural menopause age (~50) is generally
      considered acceptable and does NOT meaningfully increase
      breast cancer risk (REBECCA, Rebbeck 2004). Combined
      estrogen-progestin HRT is more nuanced — discussed
      individually. This contrasts with Lynch BSO where HRT
      tolerance is straightforward; in BRCA carriers, the
      decision is more complex but not categorically forbidden.
    - Fertility planning (must precede surgery; preserve oocytes /
      embryos if future fertility desired)
    - Salpingectomy-alone option (interval RRSO; oophorectomy
      delayed) is investigational; not standard of care.
    - Alternative: continued TVUS + CA-125 surveillance with
      honest framing of poor sensitivity for early-stage disease

  **Intensification 3 — Chemoprevention (limited role):** Tamoxifen
  or raloxifene chemoprevention has documented breast cancer
  incidence reduction in moderate-risk populations (NSABP P-1,
  STAR); in BRCA carriers specifically, evidence is conflicting and
  effect smaller than RRM. Tamoxifen may reduce risk in BRCA2 but
  not BRCA1. Discussed individually; not standard recommendation.

  **Other intensification considerations:**
    - Empirical PARP inhibitor chemoprevention is investigational;
      not licensed; do NOT prescribe outside trial setting.
    - Cascade testing remains continuous responsibility — every
      visit re-confirms family's testing status, especially male
      relatives.

  Per CHARTER §11: prophylactic surgery is a classic shared-
  decision-making domain. Patient autonomy is paramount; neither
  RRM nor RRSO is mandated, and both have legitimate decline
  options (standard surveillance from IND-BRCA-CARRIER-
  SURVEILLANCE remains the floor).

rationale_ua: >
  Aggressive-трекова Indication: накладена поверх IND-BRCA-CARRIER-
  SURVEILLANCE стандартного протоколу з двома evidence-based risk-
  reducing хірургічними опціями.

  **Foundation:** Усе стандартне спостереження з IND-BRCA-CARRIER-
  SURVEILLANCE застосовується.

  **Інтенсифікація 1 — Risk-reducing мастектомія (RRM, жінки,
  вік 25-30+):** RRM зменшує захворюваність breast cancer на ~90%
  у підтверджених BRCA-носіїв — найсильніше задокументоване
  risk-reduction втручання. Час: вік 25-30 для BRCA1 (earlier
  median onset); вік 30-35 для BRCA2. Shared-decision-making має
  охоплювати: хірургічний ризик, втрата чутливості / body image /
  сексуальна функція, опції реконструкції, residual ризик
  (~5-10% residual breast tissue — surveillance continues at
  reduced cadence post-RRM), незворотність, альтернативу
  intensive surveillance.

  **Інтенсифікація 2 — Risk-reducing BSO (RRSO, жінки,
  post-childbearing):** RRSO зменшує захворюваність ovarian cancer
  на ~80-90% та all-cause mortality на ~30-40%. Час: BRCA1 — вік
  35-40 post-childbearing; BRCA2 — вік 40-45 post-childbearing.
  Shared-decision-making має охоплювати: surgical menopause
  sequelae, HRT (у BRCA-носіїв WITHOUT prior breast cancer,
  short-course estrogen-only HRT post-RRSO до natural menopause
  age ~50 generally considered acceptable та НЕ meaningfully
  increases breast cancer ризик; combined estrogen-progestin
  more nuanced), fertility planning, salpingectomy-alone option
  investigational, альтернативу.

  **Інтенсифікація 3 — Chemoprevention (обмежена роль):** Tamoxifen
  або raloxifene chemoprevention має задокументоване incidence
  reduction у moderate-risk populations; у BRCA-носіях evidence
  conflicting та ефект менший за RRM. Tamoxifen може зменшити
  ризик у BRCA2, але не BRCA1. Обговорюється індивідуально.

  **Інші міркування інтенсифікації:** empirical PARP inhibitor
  chemoprevention investigational; cascade testing continuous
  responsibility.

  Per CHARTER §11: prophylactic хірургія — класичний shared-
  decision-making домен. Жодне з втручань не є обов'язковим.

