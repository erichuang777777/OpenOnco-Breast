    position: supports
    relevant_quote_paraphrase: >-
      "Risk-reducing mastectomy reduces breast cancer incidence by
      approximately 90% in BRCA1 / BRCA2 carriers; risk-reducing
      bilateral salpingo-oophorectomy is recommended between ages
      35-40 (BRCA1) or 40-45 (BRCA2) after completion of
      childbearing, with documented reduction in ovarian cancer
      incidence and all-cause mortality."
  - source_id: SRC-NCCN-BREAST-2025
    position: supports
    relevant_quote_paraphrase: >-
      "Risk-reducing mastectomy is an acceptable option for confirmed
      BRCA carriers, with shared decision-making covering surgical
      risk, reconstruction options, and the alternative of intensive
      MRI-based surveillance."
  - source_id: SRC-NCCN-OVARIAN-2025
    position: supports
    relevant_quote_paraphrase: >-
      "Risk-reducing bilateral salpingo-oophorectomy is the
      evidence-based intervention for ovarian cancer risk reduction
      in BRCA carriers; surveillance with TVUS + CA-125 has poor
      sensitivity for early-stage disease and is offered only as
      bridge to RRSO."

do_not_do:
  - "Не призначати risk-reducing хірургію як обов'язкову — це shared-decision-making домен, з повним обговоренням ризику / користі / альтернатив / незворотності."
  - "Не використовувати estrogen-progestin HRT routinely post-RRSO у BRCA-носіїв без individualized оцінки — combined HRT може скромно підвищувати breast cancer ризик; estrogen-only до natural menopause age generally acceptable."
  - "Не використовувати empirical PARP inhibitor chemoprevention поза clinical trial — currently investigational, not licensed."
  - "Не пропускати fertility planning перед RRSO — preserve oocytes / embryos якщо future fertility desired; це часто опускається у urgent scheduling."
  - "Не презентувати salpingectomy-alone (interval RRSO) як standard of care — investigational; oophorectomy лишається стандартним RRSO компонентом."

do_not_do_en:
  - "Do not present risk-reducing surgery as mandatory — shared-decision-making with full discussion of risk / benefit / alternatives / irreversibility."
  - "Do not use combined estrogen-progestin HRT routinely post-RRSO in BRCA carriers without individualized assessment — combined HRT may modestly increase breast cancer risk; estrogen-only to natural-menopause age is generally acceptable."
  - "Do not use empirical PARP inhibitor chemoprevention outside a clinical trial — currently investigational and not licensed."
  - "Do not skip fertility planning before RRSO — preserve oocytes / embryos if future fertility is desired; this is often missed in urgent scheduling."
  - "Do not present salpingectomy-alone (interval RRSO) as standard of care — investigational; oophorectomy remains the standard RRSO component."

