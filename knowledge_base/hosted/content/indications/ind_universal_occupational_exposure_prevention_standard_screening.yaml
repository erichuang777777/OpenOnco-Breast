expected_outcomes:
  overall_response_rate: >-
    Alternative-track companion. Patient declines intensified
    multi-organ surveillance (geographic access, surveillance
    fatigue, declining intent for invasive procedures, ongoing
    employment in same exposure environment) — receives standard
    occupational-exposure screening (USPSTF / NCCN baseline
    cadence with single-exposure-driven modifications: LDCT if
    USPSTF-eligible from tobacco component, no broadening per
    NCCN High-Risk; opportunistic skin / ENT exam at annual
    physical; symptom-prompted cystoscopy / dermatology / ENT
    pathways) + symptom-vigilance education + re-engagement
    opportunity. Outcomes inferior to intensified-surveillance
    comparator: exposure-attributable cancers detected later;
    medico-legal documentation less detailed; mesothelioma
    surveillance gap. Per CHARTER §11 patient-autonomy framing —
    declining intensified surveillance is legitimate but framed
    as suboptimal vs intervention-arm comparator.

