do_not_do:
  - "Не презентувати standard screening як еквівалент intensified surveillance у multi-exposure cohort — outcomes inferior."
  - "Не пропускати symptom-vigilance education — symptom-prompted evaluation є backup для declined-cadence pathway."
  - "Не deny workplace-modification consultation якщо patient ongoing exposed — PPE / exposure-monitoring axis окрема від surveillance engagement."
  - "Не нормалізувати alarm symptoms (persistent cough, unexplained hematuria, non-healing skin lesion, new pleural effusion) у exposed cohort — symptom-prompted evaluation primary."
  - "Не deny formal medico-legal documentation якщо patient potentially eligible для workers-compensation / IIDB — exposure documentation cross-cuts з legal + public-health surveillance."

do_not_do_en:
  - "Do not present standard screening as equivalent to intensified surveillance in the multi-exposure cohort — outcomes are inferior."
  - "Do not skip symptom-vigilance education — symptom-prompted evaluation is the backup for the declined-cadence pathway."
  - "Do not deny workplace-modification consultation if the patient is ongoing exposed — PPE / exposure-monitoring axis is separate from surveillance engagement."
  - "Do not normalize alarm symptoms (persistent cough, unexplained hematuria, non-healing skin lesion, new pleural effusion) in the exposed cohort — symptom-prompted evaluation is primary."
  - "Do not deny formal medico-legal documentation if the patient is potentially eligible for workers-compensation / IIDB — exposure documentation cross-cuts with legal + public-health surveillance."

