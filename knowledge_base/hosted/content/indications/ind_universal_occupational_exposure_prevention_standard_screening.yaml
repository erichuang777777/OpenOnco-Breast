rationale: >
  Alternative-track companion to IND-UNIVERSAL-OCCUPATIONAL-
  EXPOSURE-PREVENTION-INTENSIFIED-SURVEILLANCE. Patient declines
  intensified multi-organ surveillance — receives standard
  occupational-exposure screening within routine-physical scope.

  **(1) Standard occupational-exposure screening.**
  - LDCT only if USPSTF-eligible (≥20 pack-year + current smoker
    or quit ≤15y, age 50-80) — NO broadening per NCCN High-Risk
    pathway. Without USPSTF eligibility, no asymptomatic chest
    imaging.
  - Opportunistic skin exam at annual physical (no q6-12mo
    dermatology cadence; symptom-prompted dermatology referral
    only for new / changing lesion).
  - Opportunistic ENT / oral exam at annual physical (no q1y
    laryngoscopy; symptom-prompted ENT referral only for
    persistent throat / voice symptom).
  - Standard CRC q10y colonoscopy + breast q2y mammography +
    cervical hr-HPV / cytology per general-population cadence.

  **(2) Symptom-vigilance education for occupational-exposure
  cancers.** Heightened pattern-recognition for exposure-driven
  early-warning features:
  - Lung: persistent cough / hemoptysis / dyspnea / unintended
    weight loss → chest imaging.
  - Mesothelioma: new pleural effusion / persistent chest pain →
    chest CT + PET if effusion + biopsy.
  - Bladder / urothelial: any unexplained hematuria → urology
    referral.
  - Skin: non-healing erosion / irregular pigmentation / rapidly
    growing nodule → dermatology + biopsy.
  - UADT: persistent dysphagia / odynophagia / hoarseness / oral
    lesion → ENT.
  - Hematopoietic: persistent cytopenia / unexplained bleeding /
    fatigue → CBC + smear + hematology referral.

  **(3) Workers-compensation + medico-legal documentation
  (baseline only).** Document occupational-exposure history at
  baseline visit but without cadenced re-documentation; patient
  retains right to formal medico-legal documentation if needed
  for claims.

  **(4) Workplace-modification consultation if ongoing exposure.**
  Even in declined-intensified-surveillance pathway, refer to
  occupational-health for PPE adequacy + exposure-monitoring +
  job-modification consultation if patient still actively
  exposed.

  **(5) Re-engagement pathway.** Document declined-intensified-
  surveillance determination explicitly + offer re-engagement at
  each annual visit. Many patients who initially decline
  intensified surveillance engage when exposure-attributable
  symptoms emerge or when peer cancer diagnosis shifts priorities.

  Per CHARTER §11 patient-autonomy framing.

rationale_ua: >
  Альтернативно-трекова Indication. Пацієнт відмовляється від
  intensified multi-organ surveillance — отримує standard
  occupational-exposure screening у routine-physical scope.

  **(1) Standard occupational-exposure screening:**
  - LDCT лише при USPSTF eligibility (≥20 pack-year + поточний
    курець або quit ≤15р) — НЕ broadening per NCCN High-Risk.
  - Opportunistic skin exam при annual physical.
  - Opportunistic ENT / oral exam при annual physical.
  - Standard CRC q10р + breast q2р + cervical per general-
    population cadence.

  **(2) Symptom-vigilance education для occupational-exposure
  cancers:**
  - Lung: persistent cough / hemoptysis / dyspnea → chest imaging.
  - Mesothelioma: new pleural effusion → chest CT + biopsy.
  - Bladder: unexplained hematuria → urology.
  - Skin: non-healing erosion → dermatology.
  - UADT: persistent dysphagia / hoarseness → ENT.
  - Hematopoietic: persistent cytopenia → CBC + smear.

  **(3) Workers-compensation + medico-legal documentation
  (baseline only).** Document occupational-exposure history.

  **(4) Workplace-modification consultation if ongoing exposure.**
  Occupational-health referral для PPE + exposure-monitoring +
  job-modification.

  **(5) Re-engagement pathway.** Document declined-intensified-
  surveillance determination + offer re-engagement.

  Per CHARTER §11 patient-autonomy framing.

