  - "Do not skip smoking cessation counseling — even on the observation track this is the highest-yield intervention."
  - "Do not normalize persistent cough as 'post-viral' in a bleomycin survivor — warrants urgent evaluation."
  - "Do not skip medical-alert / wallet card counseling re: lifelong high-FiO2 caution — relevant even if routine PFT surveillance is declined."

