rationale: >
  Alternative-track companion to IND-IATROGENIC-BLEOMYCIN-LATE-
  PREVENTION-SURVEILLANCE. Cancer survivor declines structured PFT
  surveillance schedule + LDCT lung-cancer screening (surveillance
  fatigue post-curative treatment, no perceived pulmonary symptoms,
  cumulative imaging burden concerns, never-smoker or low-smoking-
  exposure survivor who declines LDCT after shared decision-making) —
  receives symptom-vigilance education (persistent cough, dyspnea
  on exertion, new oxygen requirement → urgent PFT + HRCT chest)
  + smoking cessation counseling (when applicable) + lifelong high-
  FiO2 oxygen caution education (medical-alert bracelet
  consideration). Per CHARTER §11 patient-autonomy framing — surveillance
  refusal is a legitimate choice but framed as suboptimal vs. scheduled-
  surveillance comparator.

rationale_ua: >
  Альтернативно-трекова Indication. Виживач відмовляється від
  structured PFT surveillance + LDCT lung-cancer screening — отримує
  symptom-vigilance education (persistent cough, dyspnea, new oxygen
  requirement → urgent PFT + HRCT) + smoking cessation counseling
  + lifelong high-FiO2 oxygen caution. Per CHARTER §11.

