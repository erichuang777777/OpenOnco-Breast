expected_outcomes:
  overall_response_rate: "Survivor declines structured PFT surveillance + LDCT screening — receives symptom-prompted evaluation + smoking cessation counseling only. Progressive bleomycin-induced pulmonary fibrosis may present at later stage with persistent dyspnea / oxygen requirement, vs. surveillance-detected subclinical DLCO decline amenable to pulmonology referral + risk-factor modification. Second-primary lung cancer in smoking bleomycin-exposed survivors typically presents at more advanced stage when symptom-driven (vs. earlier stage detected by LDCT screening per NLST + NELSON paradigm)."

