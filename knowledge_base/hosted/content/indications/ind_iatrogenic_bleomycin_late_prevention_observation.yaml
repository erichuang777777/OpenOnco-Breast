  - "Не нормалізувати persistent cough як 'post-viral' у bleomycin survivor — warrants urgent evaluation."
  - "Не пропускати medical-alert / wallet card counseling re: lifelong high-FiO2 caution — relevant навіть якщо routine PFT surveillance declined."

do_not_do_en:
