do_not_do:
  - "Не пропускати pediatric small-bowel surveillance — symptomatic intussusception у нелікованому PJS ~50% до 20 років, потенційно life-threatening та operation-dependent."
  - "Не resectувати тонку кишку без planning консультації — multiple recurrent резекції ведуть до short-bowel syndrome; goal — polypectomy via push enteroscopy / spiral enteroscopy where possible."
  - "Не використовувати тільки routine Pap cytology для cervical surveillance — adenoma malignum (minimal-deviation adenocarcinoma) easily missed; explicit cytopathology awareness потрібна."
  - "Не пропускати pre-pubertal testicular exam у boys — large-cell calcifying Sertoli-cell tumor hormonally active може cause precocious puberty / gynecomastia."
  - "Не пропускати cascade-тестування first-degree родичів — кожен візит має документувати family testing status."

do_not_do_en:
  - "Do not skip pediatric small-bowel surveillance — symptomatic intussusception in untreated PJS occurs in ~50% by age 20 and is potentially life-threatening and operation-dependent."
  - "Do not resect small bowel without planning consultation — multiple recurrent resections lead to short-bowel syndrome; goal is polypectomy via push enteroscopy or spiral enteroscopy where possible."
  - "Do not use routine Pap cytology alone for cervical surveillance — adenoma malignum (minimal-deviation adenocarcinoma) is easily missed; explicit cytopathology awareness is required."
  - "Do not skip pre-pubertal testicular exam in boys — large-cell calcifying Sertoli-cell tumor is hormonally active and can cause precocious puberty / gynecomastia."
  - "Do not skip cascade testing of first-degree relatives — every surveillance visit should document family testing status."

