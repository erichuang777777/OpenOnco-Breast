rationale: >
  Standard-track confirmed-carrier surveillance pathway for STK11-
  positive carriers per ACG 2015 / NCCN Genetic Familial High-Risk:
  Colorectal.

  **Small-bowel (~13% lifetime cancer; ~50% childhood intussusception
  if untreated):** Video capsule endoscopy (VCE) OR MR enterography
  q2-3y starting age 8-10. Symptomatic episodes (abdominal pain,
  obstruction) trigger immediate imaging. Polyps >1.5 cm or rapidly
  growing → push enteroscopy or surgical resection to prevent
  intussusception. This is the most distinctive PJS surveillance
  intervention.

  **Colorectal (~39% lifetime):** Colonoscopy q2-3y starting age 18
  (earlier if polyps detected on imaging). Polypectomy of all hamartomas
  > 5 mm. Pan-colonic distribution typical.

  **Upper GI (~29% gastric, plus duodenal):** EGD q2-3y starting age
  8-10 — paired with VCE / MR enterography scheduling to consolidate
  anesthesia exposures in children.

  **Breast (women, ~32-54% lifetime — BRCA-comparable):** Annual breast
  MRI starting age 30 (or earlier per family-cluster age-of-onset);
  add mammography from age 30-35. Clinical breast exam q6mo.

  **Pancreatic (~11-36% lifetime — highest hereditary risk):** EUS or
  MRI / MRCP q1-2y starting age 30-35 (PJS is one of the few hereditary
  syndromes with sufficient absolute risk to justify pancreatic
  surveillance per CAPS consortium consensus). HbA1c q1y as adjunctive
  early-diabetes signal.

  **Cervical (women, ~10% lifetime adenoma malignum — rare but
  pathognomonic):** Annual Pap with explicit cytopathology awareness
  of minimal-deviation adenocarcinoma (adenoma malignum) — easily missed
  on routine cytology. Pelvic exam q1y.

  **Ovarian / sex-cord (women, ~8-21% SCTAT):** TVUS q1y from age 25-30
  with awareness of sex-cord tumor with annular tubules (SCTAT) — often
  estrogen-secreting, may present with abnormal bleeding or precocious
  puberty in pediatric carriers.

  **Testicular (men, ~9% Sertoli-cell large-cell calcifying variant):**
  Annual testicular exam from infancy with US for any mass, gynecomastia,
  or short stature. Pre-pubertal Sertoli-cell tumors hormonally active
  (estrogen) → can cause precocious puberty.

  **Mucocutaneous pigmentation:** No surveillance intervention, but
  serves as visible reminder of carrier status at every visit.

  **Cascade testing:** Mandates offer to all first-degree relatives;
  pediatric testing for at-risk children appropriate given the
  childhood-onset surveillance window (age 8-10 starting VCE).

  Per CHARTER §11 patient-autonomy framing; pediatric surveillance
  requires extensive family counseling and age-appropriate consent
  framework.

rationale_ua: >
  Стандартний-трек confirmed-carrier surveillance per ACG 2015 / NCCN.

  **Тонка кишка (~13% lifetime cancer; ~50% childhood intussusception
  untreated):** VCE АБО MR enterography q2-3y з 8-10 років.
  Symptomatic → immediate imaging. Polyps >1.5 см → push enteroscopy
  або surgical resection для prevention intussusception.

  **Колоректальний (~39%):** Колоноскопія q2-3y з 18 років.
  Polypectomy всіх hamartomas >5 мм.

  **Upper GI (~29%):** EGD q2-3y з 8-10 років — paired з VCE / MR
  enterography для consolidation anesthesia exposures у дітей.

  **Молочна залоза (жінки, ~32-54% — BRCA-comparable):** Annual breast
  MRI з 30 років; mammography з 30-35. CBE q6mo.

  **Підшлункова (~11-36% — highest hereditary):** EUS або МРТ / MRCP
  q1-2y з 30-35 років (PJS — один з небагатьох синдромів зі sufficient
  absolute risk per CAPS consensus). HbA1c q1y.

  **Шийка (жінки, ~10% adenoma malignum):** Annual Pap з awareness
  minimal-deviation adenocarcinoma.

  **Яєчники / sex-cord (жінки, ~8-21% SCTAT):** TVUS q1y з 25-30 років.

  **Яєчко (чоловіки, ~9% Sertoli-cell large-cell calcifying):** Annual
  testicular exam з інфантильного віку; US для будь-якої маси /
  гінекомастії / short stature.

  **Мукокутанна пігментація:** No surveillance intervention, але
  visible reminder.

  **Cascade тестування:** mandates пропонування first-degree родичам;
  pediatric тестування appropriate.

  Per CHARTER §11 framing автономії пацієнта.

