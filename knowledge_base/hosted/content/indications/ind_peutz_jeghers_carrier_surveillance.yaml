expected_outcomes:
  overall_response_rate: >-
    Structured multi-organ surveillance per ACG 2015 / NCCN Genetic
    Familial High-Risk: Colorectal reduces CRC, gastric, and
    small-bowel cancer incidence through pre-malignant polyp removal;
    detects pancreatic adenocarcinoma at smaller, more resectable stage
    via EUS / MRCP; detects breast cancer earlier via MRI. Most
    importantly, small-bowel surveillance with VCE / MR enterography
    enables clearance of large polyps before intussusception or
    malignant transformation — preventing the acute pediatric emergency
    that historically defined PJS clinical presentation.

