  context, cytopenias → immediate hematology referral, з HSTCL
  specifically у differential для young patients на combination
  anti-TNF + thiopurine) + sun-protection counseling +
  skin-self-examination instruction + vaccination reminder.
  Per CHARTER §11. Particular framing: anti-TNF monotherapy
  cancer signal у population background; observation arm
  primarily misses combination-step-down conversation.

