do_not_do:
  - "Не презентувати observation як еквівалент structured combination-step-down review — meaningful difference у combination-therapy axis."
  - "Не пропускати explicit B-symptom + lymphadenopathy education — HSTCL has distinctive presentation."
  - "Не виключати patient зі hematology access — навіть при declining routine surveillance."
  - "Не нормалізувати hepatosplenomegaly без IBD flare у young patient на combination — HSTCL workup."
  - "Не використовувати live vaccines під час active biologic therapy."
  - "Не over-stating anti-TNF monotherapy cancer signal — population background."

do_not_do_en:
  - "Do not present observation as equivalent to structured combination-step-down review — the meaningful difference is in the combination-therapy axis."
  - "Do not skip explicit B-symptom + lymphadenopathy education — HSTCL has a distinctive presentation."
  - "Do not deny the patient hematology access — even if routine surveillance is declined."
  - "Do not normalize hepatosplenomegaly without IBD flare in a young patient on combination — HSTCL workup."
  - "Do not use live vaccines during active biologic therapy."
  - "Do not overstate anti-TNF monotherapy cancer signal — at population background."

