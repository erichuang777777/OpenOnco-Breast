rationale: >
  Alternative-track companion to IND-IATROGENIC-ANTI-TNF-
  LYMPHOMA-PREVENTION-SURVEILLANCE. Patient declines structured
  year-1 / year-3 / year-5 combination-therapy step-down review
  + annual dermatologic surveillance (stable IBD on current
  regimen, surveillance fatigue, preference) — receives explicit
  B-symptom + lymphadenopathy vigilance education (unexplained
  fevers, drenching night sweats, weight loss, persistent
  lymphadenopathy, hepatosplenomegaly outside IBD flare context,
  cytopenias → immediate hematology referral, with HSTCL specifically
  in differential for young patients on combination anti-TNF +
  thiopurine) + sun-protection counseling (broad-spectrum SPF 30+
  daily, peak UV avoidance) + skin-self-examination instruction +
  vaccination reminder (HPV catch-up, HBV / pneumococcal / shingrix
  / annual influenza). Per CHARTER §11 patient-autonomy framing —
  declining the structured pathway is legitimate but framed as
  suboptimal vs. active-review comparator. Particular framing
  note: anti-TNF monotherapy cancer signal is at population
  background; observation arm primarily misses the combination-
  therapy step-down conversation rather than introducing acute
  daily-life risk.

rationale_ua: >
  Альтернативно-трекова Indication. Пацієнт відмовляється від
  structured year-1 / year-3 / year-5 combination-therapy step-
  down review + annual dermatologic surveillance — отримує
  explicit B-symptom + lymphadenopathy vigilance education
