expected_outcomes:
  overall_response_rate: "Patient declines structured combination-therapy step-down discussion + annual dermatologic surveillance — receives baseline B-symptom + lymphadenopathy education, sun-protection counseling, and reminder of HSTCL combination-therapy Boxed Warning. The rare HSTCL / DLBCL events may present at advanced stage; outcomes worse than with active surveillance arm. Most population-attributable cancer signal in anti-TNF monotherapy is at background — the meaningful clinical-impact difference between the two arms is structured combination-step-down review, which the observation arm passively skips."

