expected_outcomes:
  overall_response_rate: >-
    Tenofovir-based ART (TDF or TAF, paired with FTC or 3TC + third
    agent per DHHS): HIV viral suppression to undetectable >95%,
    concurrent HBV-DNA suppression to undetectable >95%. HCC incidence
    reduction over 5-10 years comparable to HBV mono-infection
    treatment cohorts. Accelerated-fibrosis trajectory of coinfection
    is halted / reversed with virological control.

