rationale: >
  Standard-track prevention pathway for HIV + HBV coinfection. The ART
  regimen MUST be tenofovir-based — TDF (300 mg PO daily) or TAF
  (25 mg PO daily), paired with emtricitabine (FTC) or lamivudine
  (3TC) as the NRTI backbone, plus a third agent (integrase inhibitor
  preferred per current DHHS guidance: dolutegravir, bictegravir, or
  raltegravir). Tenofovir + FTC/3TC has dual activity against HIV and
  HBV — single regimen covers both. Bictegravir/FTC/TAF (Biktarvy) is
  a common single-tablet regimen in this population.

  HARD RULE: entecavir is NOT active against HIV. Entecavir monotherapy
  in an HIV-coinfected patient drives HIV resistance (M184V emerges).
  Never prescribe entecavir without concurrent HIV ART in HIV+/HBV+.

  HCC surveillance per AASLD: US + AFP every 6 months for all chronic
  HBV patients regardless of antiviral status; cirrhotic coinfected
  patients may warrant q4mo cadence per hepatology judgment.

  In Ukraine, tenofovir-based ART is reimbursed via the national HIV
  programme (ART access is universal-free policy); HBV-active
  component is bundled (no separate funding pathway).

rationale_ua: >
  Стандартний-трек prevention шлях для коінфекції ВІЛ + HBV. АРТ-режим
  ОБОВ'ЯЗКОВО має бути tenofovir-based — TDF (300 мг PO щодня) або
  TAF (25 мг PO щодня), у парі з emtricitabine (FTC) або lamivudine
  (3TC) як NRTI-каркас, + третій агент (integrase inhibitor
  переважно за поточними DHHS: dolutegravir, bictegravir, або
  raltegravir). Тенофовір + FTC/3TC має подвійну активність проти
  ВІЛ і HBV — єдиний режим покриває обидва. Bictegravir/FTC/TAF
  (Biktarvy) — поширений single-tablet режим в цій популяції.

  HARD RULE: entecavir НЕ активний проти ВІЛ. Entecavir-monotherapy
  у HIV-коінфікованого пацієнта призводить до HIV-резистентності
  (M184V). НІКОЛИ не призначати entecavir без concurrent HIV ART у
  ВІЛ+/HBV+.

  HCC-surveillance за AASLD: УЗД + AFP кожні 6 міс для всіх пацієнтів
  з хронічним HBV незалежно від антивірусного статусу; коінфіковані
  циротики можуть потребувати q4мо за рішенням гепатолога.

  В Україні tenofovir-based АРТ відшкодовується через національну
  програму ВІЛ (доступ до АРТ — політика універсального
  безкоштовного).

