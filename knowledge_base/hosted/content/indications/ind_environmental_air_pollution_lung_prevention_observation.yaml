expected_outcomes:
  overall_response_rate: "Continued chronic high-PM2.5 exposure without individual-level mitigation: baseline lung-cancer + cardiovascular + respiratory morbidity continues to climb with each year of exposure. Symptom-triggered evaluation captures earlier-stage disease but does not reduce incidence. Smoking-cessation counseling remains appropriate regardless of mitigation-track choice."

