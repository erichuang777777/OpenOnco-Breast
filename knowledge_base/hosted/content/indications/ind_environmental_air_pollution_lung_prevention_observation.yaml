desired_tests: []

rationale: >
  Alternative-track companion to IND-ENVIRONMENTAL-AIR-POLLUTION-
  LUNG-PREVENTION-MITIGATION. Patient declines structured individual-
  level mitigation (cost of air purifiers, mask wear non-acceptable
  socially, residence relocation infeasible, perception of low
  individual benefit) — receives USPSTF-cadence lung-cancer screening
  eligibility check + brief exposure-awareness counseling with each
  clinical contact + symptom-triggered evaluation pathway. Per CHARTER
  §11 patient-autonomy framing — exposure-management choice is
  legitimate but framed as suboptimal vs. structured-mitigation
  comparator. Smoking-cessation counseling continues regardless.
  Periodic re-discussion of mitigation track at follow-up visits is
  appropriate, especially with changes in local air-quality patterns
  (industrial accidents, wartime events).

rationale_ua: >
  Альтернативно-трекова Indication. Пацієнт відмовляється від
  structured individual-level mitigation — отримує USPSTF-cadence
  lung-cancer screening eligibility check + brief exposure-awareness
  counseling на кожному клінічному контакті + symptom-triggered
  evaluation. Per CHARTER §11. Smoking-cessation counseling
  залишається appropriate незалежно. Periodic re-discussion mitigation
  треку на повторних візитах, especially з changes у local air-quality
  patterns.

