do_not_do:
  - "Не презентувати observation як еквівалент mitigation — lung-cancer + cardiovascular incidence reduction не досягається."
  - "Не пропускати smoking-cessation counseling — multiplicative interaction з PM2.5; recommendation relevant незалежно від mitigation-track choice."
  - "Не ігнорувати alarm features (persistent cough, hemoptysis, dyspnea, weight loss) — immediate diagnostic imaging + multidisciplinary review."
  - "Не презентувати decision як final — periodic re-discussion mitigation треку appropriate на повторних візитах."

do_not_do_en:
  - "Do not present observation as equivalent to mitigation — lung-cancer + cardiovascular incidence reduction is not achieved."
  - "Do not skip smoking-cessation counseling — multiplicative interaction with PM2.5; recommendation is relevant regardless of mitigation-track choice."
  - "Do not ignore alarm features (persistent cough, hemoptysis, dyspnea, weight loss) — immediate diagnostic imaging + multidisciplinary review."
  - "Do not present the decision as final — periodic re-discussion of the mitigation track is appropriate at follow-up visits."

