do_not_do:
  - "Не використовувати цей шлях у пацієнтів з підтвердженим SSc-ILD — потребують запланованої HRCT q1-2 роки."
  - "Не презентувати symptom-driven observation як еквівалент structured surveillance — interval-cancer ризик вищий."
  - "Не ігнорувати alarm features (нові респіраторні симптоми, DLCO ↓ >15%) — імідіат-HRCT показано."
  - "Не використовувати цей шлях у active smokers — додаткова USPSTF LDCT eligibility."
  - "Не пропускати періодичне обговорення upgrade — SSc-ILD може емерджувати під час спостереження."

do_not_do_en:
  - "Do not use this pathway in patients with confirmed SSc-ILD — they require scheduled HRCT every 1-2 years."
  - "Do not present symptom-driven observation as equivalent to structured surveillance — interval-cancer risk is higher."
  - "Do not ignore alarm features (new respiratory symptoms, DLCO decline >15%) — immediate HRCT indicated."
  - "Do not use this pathway in active smokers — additional USPSTF LDCT eligibility applies."
  - "Do not skip periodic re-discussion of upgrade — SSc-ILD can emerge during observation."

