id: IND-LIFESTYLE-OBESITY-PREVENTION-OBSERVATION
plan_track: surveillance
intent: prevention

applicable_to:
  disease_id: DIS-BREAST
  stage_requirements: []
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 3

triggered_by_redflags:
  - RF-LIFESTYLE-OBESITY-CANCER-PREVENTION

recommended_regimen: null
concurrent_therapy: []
followed_by: []

evidence_level: low
strength_of_recommendation: conditional
nccn_category: "2B"

expected_outcomes:
  overall_response_rate: "Continued obesity without intervention: cancer incidence + cardiovascular + MASH continue to climb. Cancer screening per BMI-adjusted protocols (post-menopausal mammography, endometrial awareness) captures earlier-stage cases."

hard_contraindications: []
red_flags_triggering_alternative: []
required_tests:
  - TEST-CBC
desired_tests: []

rationale: >
  Alternative-track companion. Patient declines structured weight-loss program /
  pharmacotherapy / bariatric surgery — receives screening per BMI-elevated
  risk profile + brief intervention at each contact. Per CHARTER §11
  patient-autonomy framing.

rationale_ua: >
  Альтернативно-трекова Indication. Пацієнт відмовляється від structured
  weight-loss / pharmacotherapy / bariatric surgery — отримує screening per
  BMI-elevated risk profile + brief intervention. Per CHARTER §11.

ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_v03_lifestyle
draft_revision: 1

sources:
  - source_id: SRC-NCCN-BCELL-2025
    position: context

do_not_do:
  - "Не презентувати observation як еквівалент weight-loss — cancer reduction відсутній."
  - "Не пропускати mental health support — стигма + decline weight-loss часто корелюють."
  - "Не виключати periodic re-discussion — багато пацієнтів врешті приймають intervention."

do_not_do_en:
  - "Do not present observation as equivalent to weight loss — cancer reduction is absent."
  - "Do not skip mental-health support — stigma + decline-weight-loss often correlate."
  - "Do not exclude periodic re-discussion — many patients eventually accept intervention."

known_controversies: []
time_critical: false
last_reviewed: "2026-05-18"
reviewers: []
reviewer_signoffs: 0
notes: "STUB — alternative-track for obesity prevention. §15.2 C4 ≥2-tracks invariant."
