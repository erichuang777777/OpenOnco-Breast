do_not_do:
  - "Не використовувати цей шлях у PSC-IBD пацієнтів — щорічна колоноскопія від PSC діагнозу — standard of care."
  - "Не використовувати цей шлях у пацієнтів з попередньою дисплазією на біопсії — посилене спостереження обов'язкове."
  - "Не пропускати документоване консультування пацієнта про відхід від AGA/ECCO/NCCN standard — informed consent обов'язковий."
  - "Не подовжувати q3-5y cadence у пацієнтів з персистентним активним запаленням — потрібна терапевтична escalation та посилене спостереження."
  - "Не ігнорувати alarm features під час observation — immediate diagnostic колоноскопія."

do_not_do_en:
  - "Do not use this pathway in PSC-IBD patients — annual colonoscopy from PSC diagnosis is the standard of care."
  - "Do not use this pathway in patients with prior dysplasia on biopsy — intensified surveillance is mandatory."
  - "Do not skip documented patient counseling about departure from AGA/ECCO/NCCN standard — informed consent is mandatory."
  - "Do not extend q3-5y cadence in patients with persistent active inflammation — therapeutic escalation and intensified surveillance are warranted."
  - "Do not ignore alarm features during observation — immediate diagnostic colonoscopy."

