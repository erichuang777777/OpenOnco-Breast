# Active observation — routine-cadence colonoscopy (q3-5y) with
# white-light random biopsies. No chromoendoscopy, no IBD-specific
# dysplasia decision-tree. Below the AGA/ECCO/NCCN standard of care for
# long-standing IBD; included per §15.2 C4 and CHARTER §11 patient-
# autonomy framing.
recommended_regimen: null
concurrent_therapy: []
followed_by: []

evidence_level: low
strength_of_recommendation: conditional
nccn_category: "2B"

expected_outcomes:
  overall_response_rate: >-
    Routine q3-5y colonoscopy with random biopsies (general high-risk
    cadence — clinically unusual for established long-standing IBD
    where q1-2y chromoendoscopy is standard): captures interval CRC
    later than chromoendoscopy-based surveillance, with reduced
    sensitivity for flat dysplasia. Surveillance does NOT reduce
    baseline incidence (~2% at 10y, 8% at 20y, 18% at 30y in
    long-standing UC); improvement in early-stage detection is partial
    at lower frequency. PSC-IBD subgroup: this cadence is below the
    standard of care and is not appropriate.

