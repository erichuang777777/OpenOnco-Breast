expected_outcomes:
  overall_response_rate: "Survivor declines structured COG-LTFU pediatric pelvic-RT late-effects surveillance — receives general-population USPSTF screening cadence + symptom-driven evaluation only. Bladder cancer second primaries often present at muscle-invasive or metastatic stage when symptom-driven (hematuria, obstructive symptoms), vs. early non-muscle-invasive disease curable with TURBT in surveillance-detected cases. CRC also presents at more advanced stage when general-population screening threshold applied. Outcomes substantially worse with general-population cadence vs. survivor-specific COG-LTFU schedule."

