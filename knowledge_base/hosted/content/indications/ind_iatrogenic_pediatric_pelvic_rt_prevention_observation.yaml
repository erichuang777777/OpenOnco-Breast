do_not_do:
  - "Не презентувати observation як еквівалент COG-LTFU pediatric pelvic-RT surveillance — late-presentation bladder cancer + CRC substantially гірші outcomes."
  - "Не нормалізувати any hematuria у pediatric pelvic-RT survivor — warrants urgent cystoscopy навіть при declined routine surveillance."
  - "Не починати CRC screening лише в 50 років у pediatric pelvic-RT survivor — навіть при observation track recommend earlier screening initiation якщо patient eventually willing."
  - "Не пропускати pelvic-field sarcoma awareness — persistent pelvic pain або palpable mass warrants urgent imaging."

do_not_do_en:
  - "Do not present observation as equivalent to COG-LTFU pediatric pelvic-RT surveillance — late-presentation bladder cancer + CRC have substantially worse outcomes."
  - "Do not normalize any hematuria in a pediatric pelvic-RT survivor — warrants urgent cystoscopy even if routine surveillance was declined."
  - "Do not start CRC screening only at 50 in a pediatric pelvic-RT survivor — even on observation track, recommend earlier initiation if the patient eventually becomes willing."
  - "Do not skip pelvic-field sarcoma awareness — persistent pelvic pain or palpable mass warrants urgent imaging."

