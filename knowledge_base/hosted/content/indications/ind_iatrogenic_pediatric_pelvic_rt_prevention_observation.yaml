rationale: >
  Alternative-track companion to IND-IATROGENIC-PEDIATRIC-PELVIC-RT-
  PREVENTION-SURVEILLANCE. Cancer survivor declines structured COG-LTFU
  pediatric pelvic-RT late-effects surveillance schedule (surveillance
  fatigue post-childhood-cancer treatment, cumulative imaging burden
  concerns, financial/access barrier, geographic distance from
  survivorship clinic, distrust of medical follow-up after extensive
  prior treatment) — accepts general-population USPSTF cadence +
  symptom-driven evaluation. Per CHARTER §11 patient-autonomy framing —
  surveillance refusal is a legitimate choice but framed as suboptimal
  vs. survivor-specific surveillance comparator.

rationale_ua: >
  Альтернативно-трекова Indication. Виживач відмовляється від
  structured COG-LTFU pediatric pelvic-RT late-effects surveillance —
  приймає general-population USPSTF cadence + symptom-driven evaluation.
  Per CHARTER §11.

