do_not_do:
  - "Не пропускати CBC surveillance — median t-AML latency 5-7р, не years 1-2."
  - "Не виконувати routine prophylactic marrow biopsies у asymptomatic patients з normal CBC — yield poor."
  - "Не очікувати t-AML обмежується першими 5р — cumulative incidence продовжує наростати до 10р."
  - "Не використовувати alkylator-based regimens для curable conditions якщо alternative non-leukemogenic regimen exists без compromise outcome."
  - "Не вважати t-AML always fatal — early-detected t-MDS amenable до allogeneic HSCT з meaningful long-term survival."

do_not_do_en:
  - "Do not skip CBC surveillance — median t-AML latency is 5-7y, not years 1-2."
  - "Do not perform routine prophylactic marrow biopsies in asymptomatic patients with normal CBC — yield is poor."
  - "Do not expect t-AML to be limited to the first 5y — cumulative incidence continues to climb through 10y."
  - "Do not use alkylator-based regimens for curable conditions when an alternative non-leukemogenic regimen exists without compromising outcome."
  - "Do not consider t-AML always fatal — early-detected t-MDS is amenable to allogeneic HSCT with meaningful long-term survival."

