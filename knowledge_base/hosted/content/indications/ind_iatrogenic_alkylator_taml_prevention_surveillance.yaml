rationale: >
  Standard-track surveillance for prior alkylator chemotherapy exposure.
  Components per NCCN AML Survivorship + Childhood Cancer Survivor Study
  (CCSS) + COG-LTFU guidelines:

  **(1) CBC with differential q3-6 months for first 10 years post-
  chemotherapy** — Then q12mo lifelong. Median t-AML latency 5-7y
  post-alkylator exposure; risk plateaus after 10y but does not return
  to baseline.

  **(2) Low-threshold marrow evaluation** for any of:
  - New unexplained cytopenia (anemia, neutropenia, thrombocytopenia)
  - Persistent macrocytosis (MCV >100)
  - Dysplastic changes on peripheral smear
  - Unexplained monocytosis
  Bone marrow aspirate + biopsy + cytogenetics + flow cytometry +
  NGS panel (TP53, ASXL1, RUNX1 +-7/-5/del5q signal).

  **(3) Avoid additional bone-marrow-toxic exposures** —
  - Avoid radioactive iodine, additional alkylator-based therapy if
    alternative non-leukemogenic regimens exist
  - Counsel about benzene exposure (refer to RF-OCC-BENZENE if active
    occupational risk)
  - Pre-medication assessment before any cancer-related re-treatment

  **(4) Patient education** —
  - Self-monitoring for symptoms: easy bruising, prolonged bleeding,
    persistent fatigue, recurrent infections, fever
  - Report any of above to clinician immediately

  **(5) Allogeneic HSCT eligibility assessment** —if t-MDS or t-AML
  develops, early evaluation for allogeneic transplant per NCCN AML
  + AAMC age/comorbidity criteria. Outcomes substantially better with
  early intervention vs. delayed.

  Note: routine prophylactic bone marrow biopsies NOT recommended in
  asymptomatic patients with normal CBC. CBC surveillance is the
  recommended monitoring modality.

rationale_ua: >
  Стандартний-трек surveillance для prior alkylator chemotherapy exposure.
  Components per NCCN AML Survivorship + CCSS + COG-LTFU guidelines:

  **(1) CBC з диференційною q3-6 місяців для перших 10 років post-
  chemotherapy** — Потім q12mo lifelong. Median t-AML latency 5-7р
  post-alkylator; risk plateaus після 10р але не повертається до baseline.

  **(2) Low-threshold marrow evaluation** при:
  - New unexplained cytopenia (anemia, neutropenia, thrombocytopenia)
  - Persistent macrocytosis (MCV >100)
  - Dysplastic changes на peripheral smear
  - Unexplained monocytosis
  Bone marrow aspirate + biopsy + cytogenetics + flow + NGS panel.

  **(3) Уникати additional bone-marrow-toxic exposures** — additional
  alkylator-based therapy if alternative non-leukemogenic регимени exist;
  counsel про benzene exposure.

  **(4) Patient education** — Self-monitoring for symptoms: easy bruising,
  prolonged bleeding, persistent fatigue, recurrent infections, fever.

  **(5) Allogeneic HSCT eligibility assessment** при розвитку t-MDS або
  t-AML — early evaluation per NCCN AML.

