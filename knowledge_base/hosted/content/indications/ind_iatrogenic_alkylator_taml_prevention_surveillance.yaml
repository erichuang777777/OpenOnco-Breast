expected_outcomes:
  overall_response_rate: "Hodgkin lymphoma + multiple myeloma + pediatric sarcoma survivor cohorts: ~1-10% 10-year cumulative t-AML/t-MDS incidence post-alkylator-based regimens. Surveillance with CBC q3-6mo for first 10y catches t-MDS at cytopenic phase enabling early intervention (allogeneic HSCT in fit candidates significantly improves outcomes vs. delayed presentation with overt AML). Cytogenetic studies (-5/5q-, -7/7q-, complex karyotype) confirm therapy-related etiology + guide prognosis."

