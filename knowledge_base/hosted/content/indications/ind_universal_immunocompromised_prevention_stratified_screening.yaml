do_not_do:
  - "Не використовувати general-population cervical-screening cadence у immunocompromised cohort — accelerated cadence (annual cytology initial) per ACOG / ASCCP 2020 mandatory."
  - "Не cease cervical screening на 65 років у immunocompromised cohort — risk-elevation persists."
  - "Не пропускати annual dermatology у transplant cohort — SCC SIR ~65-250 з low-threshold biopsy axis."
  - "Не нормалізувати new skin lesion / oral lesion / cervical lesion / anal-canal symptom у immunocompromised cohort — alarm symptoms warrant prompt evaluation."
  - "Не deny EBV-VL monitoring у high-risk post-transplant cohort (EBV-seronegative pre-tx + seropositive donor) — preemptive intervention відрізняє treatment success від PTLD progression."

do_not_do_en:
  - "Do not use general-population cervical-screening cadence in the immunocompromised cohort — accelerated cadence (annual cytology initial) per ACOG / ASCCP 2020 is mandatory."
  - "Do not cease cervical screening at age 65 in the immunocompromised cohort — risk elevation persists."
  - "Do not skip annual dermatology in the transplant cohort — SCC SIR ~65-250 with low-threshold biopsy axis."
  - "Do not normalize a new skin lesion / oral lesion / cervical lesion / anal-canal symptom in the immunocompromised cohort — alarm symptoms warrant prompt evaluation."
  - "Do not deny EBV-VL monitoring in the high-risk post-transplant cohort (EBV-seronegative pre-tx + seropositive donor) — preemptive intervention is the difference between treatment success and PTLD progression."

