expected_outcomes:
  overall_response_rate: >-
    Stratified cancer-screening cadence per IDSA + ASCO + AST
    (transplant) + ACOG (cervical-screening modification in
    immunocompromised) + ECCO (IBD-immunosuppressed) guidelines
    detects elevated-incidence AIDS-defining + non-AIDS-defining
    cancers earlier than general-population screening cadence.
    Documented outcomes: anal cancer screening in HIV+ MSM with
    HRA (high-resolution anoscopy) every 1-3 years detects HSIL
    treatable lesions with cumulative cancer-incidence reduction
    in compliant cohort (NEJM ANCHOR trial 2022 — treatment of
    HSIL reduced anal cancer by ~57%); cervical screening at
    accelerated cadence in immunocompromised women (annual
    cytology / hr-HPV vs q3-5y general population per ACOG /
    ASCCP) detects CIN earlier; skin-cancer screening at
    q6-12mo dermatology with low-threshold biopsy in transplant
    cohort detects skin SCC / BCC / Merkel before regional /
    metastatic progression. EBV-VL monitoring in post-transplant
    cohort detects EBV-driven PTLD precursor states (elevated
    VL) at preemptive-intervention-amenable stage.

