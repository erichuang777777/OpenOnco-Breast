expected_outcomes:
  overall_response_rate: >-
    Alternative-track companion. Patient declines structured weight-
    loss program enrollment (access barriers, prior unsuccessful
    attempts, surveillance fatigue, weight-stigma, declining intent
    for pharmacotherapy or bariatric surgery) — receives brief-
    intervention counseling at each routine visit (5As framework:
    Ask, Advise, Assess, Assist, Arrange) + age-appropriate cancer-
    cluster screening at standard cadence per USPSTF / NCCN without
    obesity-driven cadence modification. Cumulative effect: modest
    weight loss in subset of patients re-engaging on later visits;
    cancer-cluster screening yield mirrors general-population
    cadence. Outcomes inferior to structured-program comparator
    for obesity-related cancer incidence (no documented behavioural-
    counseling-only intervention shows obesity-cluster cancer
    reduction; bariatric-surgery cohort studies remain the strongest
    evidence for incidence reduction). Per CHARTER §11 patient-
    autonomy framing — declining structured program is legitimate
    but framed as suboptimal vs intervention-arm comparator.

