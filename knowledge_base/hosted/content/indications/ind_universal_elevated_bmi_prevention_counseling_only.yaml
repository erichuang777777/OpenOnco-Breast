do_not_do:
  - "Не презентувати counseling-only як еквівалент structured intervention — outcomes inferior; framing is critical для shared-decision."
  - "Не пропускати re-engagement opportunity — більшість патієнтів eventually engage коли motivational triggers shift."
  - "Не уникати weight-related obesity-cluster cancer discussions через weight-stigma concerns — clinical reality requires honest framing з compassion."
  - "Не нормалізувати unintended weight loss у obesity cohort — paradoxical presentation з malignancy occult, warrants prompt evaluation."
  - "Не пропускати NAFLD / MASH screening (FIB-4) при metabolic syndrome — окрема axis від weight-loss intervention engagement."

do_not_do_en:
  - "Do not present counseling-only as equivalent to structured intervention — outcomes are inferior; framing is critical for shared decision-making."
  - "Do not skip re-engagement opportunity — most patients eventually engage when motivational triggers shift."
  - "Do not avoid weight-related obesity-cluster cancer discussions because of weight-stigma concerns — clinical reality requires honest framing with compassion."
  - "Do not normalize unintended weight loss in the obesity cohort — paradoxical presentation with occult malignancy warrants prompt evaluation."
  - "Do not skip NAFLD / MASH screening (FIB-4) when metabolic syndrome is present — separate axis from weight-loss intervention engagement."

