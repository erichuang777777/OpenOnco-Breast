rationale: >
  Alternative-track companion to IND-UNIVERSAL-ELEVATED-BMI-
  PREVENTION-WEIGHT-LOSS-SCREENING. Patient declines structured
  weight-loss program enrollment — gives brief-intervention
  counseling within routine-visit scope.

  **(1) 5As brief intervention at each routine visit.** Ask
  (current weight, weight history, prior weight-loss attempts);
  Advise (link obesity to cancer-cluster risk + cardiometabolic
  risk in plain language); Assess (readiness to change per
  Prochaska stages); Assist (provide written resources on
  Mediterranean / DASH dietary patterns, ≥150 min/wk moderate
  activity, NEAT-increment strategies, smartphone apps for
  self-monitoring); Arrange (follow-up at 3-6 month interval to
  re-assess, offer structured-program referral at each touch).

  **(2) Re-engagement opportunity.** Document declined-program
  determination explicitly + offer re-engagement at each annual
  visit. Many patients who initially decline behavioural-intensive
  program engage later when motivational triggers shift
  (cardiometabolic event, new cancer diagnosis in family,
  reproductive-planning concerns).

  **(3) Standard-cadence cancer screening** per USPSTF / NCCN
  without obesity-driven cadence modification. Same age-and-
  modality endpoints as the structured-program track but without
  the colonoscopy-interval shortening (no adenoma + family-history
  co-factor) or supplemental imaging (no high-density + family-
  history co-factor).

  **(4) Symptom-vigilance education.** Heightened pattern-
  recognition for site-specific early-warning features in the
  obesity cohort: new persistent abdominal pain (HCC, pancreatic),
  postmenopausal bleeding (endometrial), persistent change in
  bowel habits (CRC), painless hematuria (RCC), new persistent
  fatigue + weight loss (paradoxical — work up for malignancy in
  obesity cohort presenting with unintended weight loss).

  Per CHARTER §11 patient-autonomy framing — declining structured
  program is legitimate but framed as suboptimal vs intervention-
  arm comparator.

rationale_ua: >
  Альтернативно-трекова Indication. Пацієнт відмовляється від
  structured weight-loss program — отримує brief-intervention
  counseling у routine-visit scope.

  **(1) 5As brief intervention при кожному routine visit.** Ask /
  Advise / Assess / Assist / Arrange. Письмові ресурси
  Mediterranean / DASH, ≥150 хв/тиждень moderate activity,
  smartphone apps. Follow-up на 3-6 місяців з re-assess + offer
  structured-program referral при кожному touch.

  **(2) Re-engagement opportunity.** Document declined-program
  determination explicitly + offer re-engagement при кожному
  annual visit.

  **(3) Standard-cadence cancer screening** per USPSTF / NCCN без
  obesity-driven cadence modification.

  **(4) Symptom-vigilance education.** Heightened pattern-
  recognition для site-specific early-warning features:
  new persistent abdominal pain (HCC, pancreatic), postmenopausal
  bleeding (endometrial), persistent change у bowel habits (CRC),
  painless hematuria (RCC), unintended weight loss (paradoxical у
  obesity cohort — work up для malignancy).

  Per CHARTER §11 patient-autonomy framing.

