rationale: >
  Aggressive-track confirmed-carrier pathway layered on top of the
  IND-FAMMM-CARRIER-SURVEILLANCE standard protocol.

  **Foundation:** All standard surveillance from IND-FAMMM-CARRIER-
  SURVEILLANCE applies (annual whole-body dermatology, total body
  photography + dermoscopy, pancreatic EUS / MRI q1-2y from 40,
  sun-protection counseling).

  **Intensification 1 — Earlier pancreatic surveillance initiation:**
  In CDKN2A carriers with active smoking history or family pancreatic
  cancer onset < age 50, advance pancreatic surveillance start from
  age 40 to age 30-35. Trade-off: more lifetime EUS / MRI studies +
  earlier exposure to false-positive findings (small cystic lesions
  near-universal in young adults — IPMN differential complex).
  Center must be experienced in CAPS-style pancreatic surveillance to
  avoid harm from unnecessary biopsies / resections.

  **Intensification 2 — Intensified sun-avoidance program:**
    - Structured occupational counseling (outdoor work modification —
      indoor reassignment, shade structures, sun-protective uniform)
    - UV-protective clothing prescription (UPF 50+) for daily wear,
      not just recreational
    - Window film for vehicle and home (UV-A exposure through glass)
    - Photoprotection adjuncts: nicotinamide (vitamin B3, 500 mg BID
      — modest reduction in non-melanoma skin cancer per ONTRAC trial,
      no melanoma-specific evidence; conservative discussion as
      shared-decision-making rather than mandate)
    - Vitamin D monitoring + supplementation if avoidance regimen
      lowers endogenous synthesis

  **Other intensification considerations (not core to this track):**
    - Empirical pre-emptive nevus excision is NOT recommended — even
      in dense atypical nevus phenotype, excision-only-on-change is
      the standard of care; pre-emptive excision of clinically benign
      nevi creates excessive scarring without melanoma-specific benefit.
    - mTOR-pathway / CDK4/6 inhibitor chemoprevention — investigational
      despite mechanistic rationale (CDKN2A regulates CDK4/6); do NOT
      prescribe outside trial setting.

  **Cascade testing remains continuous:** every visit re-confirms
  family testing status.

  Per CHARTER §11: intensified surveillance and lifestyle counseling
  are shared-decision-making.

