do_not_do:
  - "Не advanceувати pancreatic surveillance раніше 30-35 без smoking history або family early-onset cancer — false-positive burden + early imaging exposure не виправдані."
  - "Не виконувати empirical pre-emptive nevus excision у dense atypical phenotype — excision-only-on-change standard."
  - "Не використовувати mTOR / CDK4/6 inhibitor chemoprevention поза clinical trial — investigational despite CDKN2A-CDK4/6 mechanistic rationale."
  - "Не презентувати nicotinamide як melanoma chemoprevention — evidence base тільки non-melanoma skin cancer (ONTRAC), не melanoma-specific."
  - "Не пропускати vitamin D monitoring при intensified sun-avoidance — deficiency може emerge при strict avoidance regimen."

do_not_do_en:
  - "Do not advance pancreatic surveillance earlier than age 30-35 without smoking history or family early-onset cancer — false-positive burden and early imaging exposure are not justified otherwise."
  - "Do not perform empirical pre-emptive nevus excision in dense atypical phenotype — excision-only-on-change is the standard of care."
  - "Do not use mTOR / CDK4/6 inhibitor chemoprevention outside a clinical trial — investigational despite the CDKN2A-CDK4/6 mechanistic rationale."
  - "Do not present nicotinamide as melanoma chemoprevention — evidence base is only for non-melanoma skin cancer (ONTRAC), not melanoma-specific."
  - "Do not skip vitamin D monitoring with intensified sun-avoidance — deficiency can emerge with a strict avoidance regimen."

