expected_outcomes:
  overall_response_rate: >-
    Intensified track layers two options on top of standard FAMMM
    surveillance: (1) earlier pancreatic surveillance initiation
    (age 30-35 vs. age 40 standard) for carriers with smoking history
    or family pancreatic cancer < age 50; (2) intensified sun-avoidance
    program (structured occupational / lifestyle counseling, UV-
    protective clothing prescription, photoprotection adjuncts like
    nicotinamide). Goal: maximize melanoma detection lead time + reduce
    pancreatic-cancer absolute risk through cofactor modification.

