expected_outcomes:
  overall_response_rate: >-
    Intensified track layers two options on top of standard HPRC
    surveillance: (1) earlier surveillance initiation (age 20-25 vs.
    age 30 standard) in families with very-early-onset RCC (proband
    or first-degree relative < age 30) or for carriers with rapidly
    growing index lesion; (2) lower surgical threshold (2 cm vs.
    3 cm standard) for atypical / rapidly growing or central / hilum-
    adjacent lesions where waiting incurs disproportionate technical
    surgical complexity. Trade-off: more frequent intervention, more
    lifetime surgery-related morbidity, potential over-treatment of
    biologically indolent disease.

