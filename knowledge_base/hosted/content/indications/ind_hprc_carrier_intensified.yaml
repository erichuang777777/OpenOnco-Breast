do_not_do:
  - "Не advanceувати baseline imaging раніше 20-25 без very-early-onset family RCC — false-positive burden + early imaging exposure не виправдані."
  - "Не lowerувати surgical threshold у typical HPRC lesion (slow growth, peripheral, no atypia) — 3-cm Linehan threshold validated."
  - "Не використовувати MET-inhibitor chemoprevention поза clinical trial — investigational."
  - "Не виконувати bilateral total nephrectomy у asymptomatic carrier — preserves option-value nephron-sparing."
  - "Не transferувати threshold логіку до VHL / HLRCC carriers — більш aggressive biology вимагає different surgical algorithms."

do_not_do_en:
  - "Do not advance baseline imaging earlier than age 20-25 without very-early-onset family RCC — false-positive burden and early imaging exposure are not justified otherwise."
  - "Do not lower the surgical threshold in a typical HPRC lesion (slow growth, peripheral, no atypia) — the 3-cm Linehan threshold is validated."
  - "Do not use MET-inhibitor chemoprevention outside a clinical trial — investigational."
  - "Do not perform bilateral total nephrectomy in an asymptomatic carrier — preserves the option-value of nephron-sparing."
  - "Do not transfer threshold logic to VHL / HLRCC carriers — more aggressive biology requires different surgical algorithms."

