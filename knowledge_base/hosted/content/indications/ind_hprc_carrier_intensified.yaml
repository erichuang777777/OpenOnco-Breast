rationale: >
  Aggressive-track confirmed-carrier pathway layered on top of the
  IND-HPRC-CARRIER-SURVEILLANCE standard protocol.

  **Foundation:** All standard surveillance from IND-HPRC-CARRIER-
  SURVEILLANCE applies (annual abdominal MRI from age 30, 3-cm
  surgical threshold, nephron-sparing primacy, active surveillance
  permissible for sub-3-cm lesions).

  **Intensification 1 — Earlier surveillance initiation:** In families
  with very-early-onset RCC (proband or first-degree relative diagnosed
  before age 30) — advance baseline MRI from age 30 to age 20-25.
  Trade-off: more lifetime imaging studies + earlier exposure to
  false-positive findings.

  **Intensification 2 — Lower surgical threshold (2-cm vs 3-cm):** For
  HPRC lesions with atypical features (rapid growth > 5 mm/year, new
  cystic component, central necrosis, or central / hilum-adjacent
  location where waiting will compromise surgical technique), advance
  surgical intervention from 3-cm to 2-cm threshold. Trade-off:
  potential over-treatment of biologically indolent disease + earlier
  cumulative nephron loss across lifetime.

  **Other intensification considerations (not core to this track):**
    - Empirical MET-inhibitor chemoprevention (tivantinib, crizotinib,
      savolitinib, cabozantinib) is NOT indicated — investigational
      at best despite the MET-driven mechanism; trials in metastatic
      / advanced disease ongoing.
    - Bilateral total nephrectomy + dialysis-dependent state in
      asymptomatic carrier is NOT routine — preserves option-value of
      nephron-sparing across lifetime.
    - Transplant after bilateral nephrectomy — discussed only after
      surveillance failure (multiple bilateral recurrences exhausting
      nephron-sparing options).

  **Cascade testing remains continuous:** every visit re-confirms
  family testing status.

  Per CHARTER §11: intensified surveillance and lower surgical
  threshold are shared-decision-making. Patient autonomy is paramount;
  standard-track 3-cm Linehan / NCI protocol remains the floor.

rationale_ua: >
  Aggressive-трекова Indication: накладена поверх IND-HPRC-CARRIER-
  SURVEILLANCE.

  **Foundation:** Усе standard з IND-HPRC-CARRIER-SURVEILLANCE.

  **Інтенсифікація 1 — Рання surveillance initiation:** У сім'ях з
  very-early-onset RCC (< 30 років) — advance baseline MRI з 30 до
  20-25 років. Trade-off: more lifetime imaging + earlier false-
  positive exposure.

  **Інтенсифікація 2 — Lower surgical threshold (2-cm vs 3-cm):** Для
  HPRC lesions з atypical features (rapid growth > 5 мм/рік, new
  cystic component, central necrosis, central / hilum-adjacent location)
  — advance з 3-cm до 2-cm threshold. Trade-off: over-treatment
  indolent disease + earlier cumulative nephron loss.

  **Інші міркування:**
    - Empirical MET-inhibitor chemoprevention (tivantinib, crizotinib,
      savolitinib, cabozantinib) — NOT indicated; investigational
      despite MET-driven mechanism.
    - Bilateral total nephrectomy + dialysis у asymptomatic carrier —
      NOT routine; preserves option-value nephron-sparing.
    - Transplant after bilateral nephrectomy — only after surveillance
      failure (multiple bilateral recurrences exhausting nephron-
      sparing options).

  **Cascade тестування continuous.**

  Per CHARTER §11: shared-decision-making домен.

