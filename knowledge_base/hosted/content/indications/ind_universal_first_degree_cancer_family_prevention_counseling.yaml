do_not_do:
  - "Не пропускати structured pedigree review при наявності будь-якого first-degree relative cancer — поверхневий 'family-history positive' без три-генеційного pedigree упускає syndrome-specific тригери."
  - "Не призначати germline тестування на основі однієї first-degree relative cancer без pedigree-criterion трігера — clinically низькоdiagnostic-yield + recreates VUS-driven anxiety."
  - "Не презентувати negative-pedigree determination як zero-risk — deep intronic / regulatory variants, mosaic disease, та limited-pedigree-information сценарії залишають residual epidemiologic uncertainty."
  - "Не блокувати pedigree-review on the basis of insurance / payer — pre-test counseling часто covered або low-cost; cost barrier для panel testing може бути addressed через cascade pathway для index-case relatives."
  - "Не перепризначати pedigree-review без перевірки нових family cancer events — pedigree dynamic; re-review кожні 5 років або при нових подіях."

do_not_do_en:
  - "Do not skip structured pedigree review in the presence of any first-degree relative cancer — superficial 'family-history positive' without three-generation pedigree misses syndrome-specific triggers."
  - "Do not order germline testing on the basis of a single first-degree relative cancer without a pedigree-criterion trigger — clinically low diagnostic yield + recreates VUS-driven anxiety."
  - "Do not present a negative-pedigree determination as zero-risk — deep intronic / regulatory variants, mosaic disease, and limited-pedigree-information scenarios leave residual epidemiologic uncertainty."
  - "Do not block pedigree review on the basis of insurance / payer — pre-test counseling is often covered or low-cost; panel-testing cost barrier may be addressed through the cascade pathway for index-case relatives."
  - "Do not re-defer pedigree review without checking for new family cancer events — pedigree is dynamic; re-review every 5 years or upon new events."

