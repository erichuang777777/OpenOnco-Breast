expected_outcomes:
  overall_response_rate: >-
    Structured pedigree review (Tyrer-Cuzick / BOADICEA / PREMM5 /
    MMRpro depending on family profile) reclassifies the cohort:
    ~5-15% trigger downstream disease-specific genetic-counseling
    referrals (HBOC, Lynch, Cowden, Li-Fraumeni, etc.) where
    multi-gene germline panels carry diagnostic yield 10-25%
    depending on pedigree-criterion stringency. The majority
    (~85-95%) receive a documented negative-pedigree determination
    and continue age-appropriate population-screening cadence.
    Cumulative impact across the cohort: incremental high-penetrance
    carrier identification rate ~1-3% (population-level), with
    each identified carrier routing to confirmed-carrier
    surveillance pathways with documented mortality benefit
    (e.g., risk-reducing BSO in BRCA carriers reduces ovarian-
    cancer-specific mortality ~80%).

