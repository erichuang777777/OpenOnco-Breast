rationale: >
  Standard-track prevention pathway for any patient with at least
  one first-degree relative (parent, full sibling, biological child)
  with any cancer history. Universal pre-triage anchor; routes to:

  **(1) Structured pedigree review.** Three-generation pedigree
  with age at diagnosis, cancer type, treatment, vital status for
  each affected and unaffected relative. Pedigree assessed against
  syndrome-specific criteria — NCCN Genetic / Familial High-Risk
  Assessment Breast / Ovarian / Pancreatic (HBOC, BRCA1/2, PALB2,
  CHEK2, ATM, RAD51C/D, BRIP1); NCCN Genetic / Familial High-Risk
  Assessment Colorectal (Lynch syndrome — MLH1/MSH2/MSH6/PMS2/EPCAM
  per Amsterdam II + Bethesda; FAP/AFAP per APC; MUTYH-associated
  polyposis per MUTYH; Cowden/PHTS per PTEN; Li-Fraumeni per TP53;
  Peutz-Jeghers per STK11; juvenile polyposis per SMAD4/BMPR1A);
  AFI / multi-syndrome quantitative models (Tyrer-Cuzick for breast,
  PREMM5 for Lynch, MMRpro for Lynch, BOADICEA for breast / ovarian).

  **(2) Risk-tier classification.** Population-baseline (no syndrome
  trigger) → continue USPSTF / NCCN age-and-modality screening
  unchanged. Moderate-risk pedigree (single affected first-degree
  relative <50y, or single second-degree with strong family-history
  hint) → empirical risk modeling (Tyrer-Cuzick lifetime breast risk
  ≥20% → enhanced breast surveillance; PREMM5 ≥5% → Lynch panel
  consideration). High-risk pedigree meeting syndrome-specific
  criteria → referral to certified genetic counselor for pre-test
  counseling + germline panel.

  **(3) Cascade testing of relatives** upon carrier identification.
  Confirmed BRCA / Lynch / familial-cancer-syndrome variants
  inheritance follow-up: first-degree relatives (siblings, children
  ≥18, parents) offered targeted single-variant testing. Lifetime
  cascade-yield from one positive index case typically identifies
  5-10 additional family carriers across two generations.

  **(4) Negative-pedigree determination.** When the pedigree does
  not meet syndrome-specific criteria, document the determination
  explicitly (avoid leaving the family-history flag as a perpetual
  uncertainty) and route to age-appropriate population-screening
  cadence. Re-review pedigree at 5-year intervals or upon new
  family cancer events.

  **Anchor disease:** breast cancer chosen as the canonical anchor
  because (a) it is the highest-prevalence cancer in the population,
  (b) family-history hereditary breast / ovarian cancer (HBOC) is
  the most common syndrome trigger, and (c) NCCN Genetic / Familial
  High-Risk Breast / Ovarian / Pancreatic is the most-cited
  reference for the universal pedigree-review pathway. Lynch / FAP /
  Cowden / Li-Fraumeni / other syndromes route through their own
  disease-specific RFs (Lynch via RF-LYNCH-FAMILY-HISTORY-SUSPICION,
  HBOC via RF-BRCA-HBOC-FAMILY-HISTORY-SUSPICION) when the pedigree
  triggers them. This Indication is the upstream catchment.

rationale_ua: >
  Стандартний-трек prevention шлях для будь-якого пацієнта з
  щонайменше одним родичем першого ступеня (батько, мати, рідний
  сиблінг, біологічна дитина) з онкологічним анамнезом. Universal
  pre-triage anchor; routes до:

  **(1) Структурований pedigree review.** Три-генеційна родовід з
  age at diagnosis, cancer type, treatment, vital status для
  кожного affected і unaffected родича. Pedigree оцінюється проти
  syndrome-specific criteria — NCCN Genetic / Familial High-Risk
  Breast / Ovarian / Pancreatic (HBOC, BRCA1/2, PALB2, CHEK2, ATM,
  RAD51C/D, BRIP1); NCCN Genetic / Familial High-Risk Colorectal
  (Lynch — MLH1/MSH2/MSH6/PMS2/EPCAM per Amsterdam II + Bethesda;
  FAP/AFAP per APC; MAP per MUTYH; Cowden/PHTS per PTEN;
  Li-Fraumeni per TP53); AFI / multi-syndrome quantitative моделі
  (Tyrer-Cuzick для breast, PREMM5 для Lynch, MMRpro для Lynch,
  BOADICEA для breast / ovarian).

  **(2) Risk-tier classification.** Population-baseline (без
  syndrome trigger) → продовжити USPSTF / NCCN age-and-modality
  скринінг без змін. Moderate-risk pedigree → empirical risk
  modeling (Tyrer-Cuzick lifetime breast risk ≥20% → enhanced
  breast surveillance; PREMM5 ≥5% → Lynch panel consideration).
  High-risk pedigree → направлення до сертифікованого генетичного
  консультанта для pre-test counseling + germline panel.

  **(3) Cascade testing родичів** при carrier identification.
  Confirmed BRCA / Lynch варіанти inheritance follow-up: родичі
  першого ступеня (сиблінги, діти ≥18, батьки) offered targeted
  single-variant testing.

  **(4) Negative-pedigree determination.** Коли pedigree не
  відповідає syndrome-specific criteria, документувати determination
  explicitly + routing до age-appropriate population-screening.
  Re-review pedigree з 5-річними інтервалами або при нових family
  cancer events.

  **Анкор-захворювання:** breast cancer обрано як canonical anchor:
  (а) найвища prevalence cancer у популяції, (б) family-history
  HBOC — найчастіший syndrome trigger, (в) NCCN Genetic / Familial
  High-Risk Breast / Ovarian / Pancreatic — найцитованіша reference
  для universal pedigree-review pathway. Lynch / FAP / Cowden /
  Li-Fraumeni / інші syndromes routes через власні disease-specific
  RFs коли pedigree їх тригерить. Ця Indication — upstream catchment.

