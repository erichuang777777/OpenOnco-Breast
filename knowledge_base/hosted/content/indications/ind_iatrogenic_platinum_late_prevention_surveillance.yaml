do_not_do:
  - "Не використовувати general-population BP / lipid / ASCVD-risk thresholds у platinum survivors — lower thresholds appropriate given elevated CV risk."
  - "Не пропускати magnesium measurement в annual CMP — cisplatin-induced renal Mg wasting persists lifelong та може бути silent."
  - "Не нормалізувати progressive GFR decline як 'aging' у platinum survivors — nephrology referral при decline >5 mL/min/1.73m² per year."
  - "Не пропускати CV risk modification counseling — highest-yield late-effect інтервенція; smoking cessation, статини, BP control."
  - "Не вважати ototoxicity / neuropathy / Raynaud 'just side effects' — significantly impact quality of life і warrant ongoing management."

do_not_do_en:
  - "Do not use general-population BP / lipid / ASCVD-risk thresholds in platinum survivors — lower thresholds are appropriate given the elevated CV risk."
  - "Do not skip magnesium measurement in the annual CMP — cisplatin-induced renal Mg wasting persists lifelong and can be silent."
  - "Do not normalize progressive GFR decline as 'aging' in platinum survivors — nephrology referral when decline is >5 mL/min/1.73m² per year."
  - "Do not skip CV risk modification counseling — it is the highest-yield late-effect intervention; smoking cessation, statins, BP control."
  - "Do not treat ototoxicity / neuropathy / Raynaud as 'just side effects' — they significantly impact quality of life and warrant ongoing management."

