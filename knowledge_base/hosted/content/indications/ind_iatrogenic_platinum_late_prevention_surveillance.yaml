expected_outcomes:
  overall_response_rate: "Testicular GCT + ovarian + cervical + H&N survivor cohorts with cumulative platinum ≥400 mg/m²: cardiovascular mortality SIR 1.5-2× population baseline; testicular cancer survivors with BEP exposure have 2-3× CV-mortality at 30y. CKD stage ≥2 in ~30% of long-term survivors. t-AML / t-MDS cumulative ~1-3% at 10y depending on co-exposures. Structured surveillance enables earlier intervention on modifiable CV risk factors (statin + BP control + smoking cessation reduces 10y-MACE per primary-prevention RCT data extrapolation), earlier detection of CKD progression (renal-protective management — ACE-i/ARB, magnesium supplementation), earlier detection of t-MDS at cytopenic phase (allogeneic HSCT in fit candidates significantly improves outcomes vs. delayed)."

