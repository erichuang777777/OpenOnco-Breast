notes: "STUB — cancer-survivor late-effects pilot (platinum). Three surveillance domains: cardiovascular risk modification (highest yield — BP + lipid q1y), nephropathy (creatinine + Mg q1y), secondary AML/MDS (CBC q1y). Anchor DIS-AML for secondary leukemia dimension; CV + renal are co-managed under same RF firing. Two-Clinical-Co-Lead signoff queued."
