rationale: >
  Standard-track late-effects surveillance for cancer survivors with
  prior cumulative platinum exposure ≥400 mg/m² (cisplatin or AUC-
  equivalent carboplatin). Components per NCCN Testicular Cancer
  Survivorship + NCCN AML Survivorship + ASCO Cardio-Oncology
  Survivorship + ESC 2022 Cardio-Oncology + COG-LTFU:

  **(1) Annual BP measurement** —
  - Lower treatment threshold (consider initiating antihypertensive
    at 130/80 vs. 140/90 in this cohort given elevated CV risk)
  - Out-of-office BP monitoring (home cuff) for confirmation

  **(2) Annual lipid panel** —
  - Total cholesterol, LDL, HDL, triglycerides
  - Lower statin initiation threshold appropriate (ASCVD 10y risk
    ≥7.5% rather than ≥10% in this cohort)
  - Aggressive LDL target <100 mg/dL (vs. <130 general population)

  **(3) Annual creatinine + CMP** —
  - Track GFR trend (eGFR decline >5 mL/min/1.73m² per year warrants
    nephrology referral)
  - Magnesium specifically — cisplatin-induced renal Mg wasting
    persists lifelong; supplementation often required
  - ACE-inhibitor / ARB if proteinuria + elevated risk factors
    (renoprotective + cardioprotective)

  **(4) Annual CBC with differential** —
  - Surveillance for t-MDS / t-AML — peak risk 5-10y post-exposure
  - Any new unexplained cytopenia → marrow evaluation per
    RF-IATROGENIC-ALKYLATOR-TAML-PREVENTION pathway

  **(5) Cardiovascular risk modification counseling** —
  - HIGHEST-yield late-effect intervention in this cohort
  - Smoking cessation (compounds CV + renal + lung-cancer risk)
  - Physical activity per HHS guidelines (cardioprotective + cancer-
    survivor benefit)
  - DM screening + management (lower thresholds appropriate)
  - Mediterranean / DASH dietary pattern counseling
  - Alcohol moderation

  **(6) Raynaud syndrome surveillance** —
  - Often persistent late effect (cisplatin / BEP); patient education
    on cold-protection + smoking-cessation impact

  **(7) Ototoxicity + peripheral neuropathy surveillance** (co-managed
  outside cancer surveillance scope) — audiometry q3-5y if symptoms;
  neurology referral if progressive neuropathy.

  **(8) Co-fired surveillance dimensions** — platinum often co-
  administered with etoposide (BEP) or alkylators; RF-IATROGENIC-
  TOPO2-TAML-PREVENTION + RF-IATROGENIC-ALKYLATOR-TAML-PREVENTION may
  fire in parallel. Engine builds combined PreventionPlan.

