rationale: >
  Alternative-track companion to IND-BARRETTS-ESOPHAGUS-PREVENTION-
  SURVEILLANCE. Appropriate for patients with **confirmed non-dysplastic
  Barrett's esophagus only**, who choose minimal-intensity surveillance
  for any of: cost / access constraints, anxiety about repeated
  procedures, geographic distance to GI center, preference for lower-
  frequency monitoring, very-short-segment Barrett (<1 cm) where some
  guidelines question the need for surveillance altogether.

  **Cadence:** EGD every 5 years per ACG / NCCN minimum surveillance
  interval for non-dysplastic Barrett. Seattle protocol biopsies
  preferred but lower sampling acceptable if patient and clinician
  agree (with explicit understanding of reduced sensitivity).

  **Not appropriate for:**
    - LGD — minimum surveillance q6-12mo, preferred RFA (see standard
      track)
    - HGD — endoscopic eradication therapy is standard of care; routine
      q5y is below the standard of care and would represent under-
      treatment
    - Patients with multiple EAC risk factors (long-segment Barrett ≥3
      cm, male sex with onset >50, white race, central obesity,
      smoking history) — these patients benefit from shorter intervals
      (q3y or less)

  **PPI co-therapy:** symptom-driven only (PPI for active GERD symptoms;
  no high-dose protocol). Per CHARTER §11 patient-autonomy framing:
  non-dysplastic Barrett carries low absolute EAC risk (~1-3% lifetime),
  so routine q5y observation is a legitimate informed-consent choice
  with documented trade-offs — patient retains access to upgrade to
  intensified surveillance at any future visit if dysplasia emerges or
  preferences change.

  **Alarm features** (unintended weight loss, dysphagia, odynophagia,
  GI bleeding, persistent or worsening reflux unresponsive to PPI,
  iron-deficiency anemia of unclear etiology) route immediately to
  diagnostic upper endoscopy with biopsies — and if EAC or HGD is
  confirmed, to the treatment-persona algorithm via existing
  DIS-ESOPHAGEAL Indications.

rationale_ua: >
  Альтернативно-трекова Indication — компаньйон до
  IND-BARRETTS-ESOPHAGUS-PREVENTION-SURVEILLANCE. Доречно для пацієнтів
  з **підтвердженим не-дисплазійним стравоходом Барретта лише**, які
  обирають мінімальної інтенсивності спостереження з причин: вартість /
  доступ, тривога щодо повторних процедур, географічна відстань до
  GI-центра, перевага нижчої частоти моніторингу, дуже-короткий-сегмент
  Barrett (<1 см) де деякі настанови питають необхідність спостереження
  взагалі.

  **Частота:** EGD кожні 5 років per ACG/NCCN мінімальний інтервал
  спостереження для не-дисплазійного Barrett. Сіетл-протокол біопсій
  переважно, але нижче sampling прийнятне якщо пацієнт і клініцист
  згодні (з явним розумінням зниженої чутливості).

  **Не доречно для:**
    - LGD — мінімальне спостереження q6-12 міс, переважно RFA (див.
      standard track)
    - HGD — ендоскопічна ерадикаційна терапія — стандарт лікування;
      рутинна q5y нижче standard of care і представляла б under-
      treatment
    - Пацієнтів з множинними факторами ризику EAC (довгий сегмент
      Barrett ≥3 см, чоловіча стать з початком >50, біла раса,
      центральне ожиріння, історія куріння) — ці пацієнти отримують
      користь від коротших інтервалів (q3 роки або менше)

  **PPI co-терапія:** лише symptom-driven (PPI для активних симптомів
  ГЕРХ; без високодозового протоколу). Per CHARTER §11 framing
  автономії пацієнта: не-дисплазійний Barrett має низький абсолютний
  EAC ризик (~1-3% lifetime), тому рутинна q5y observation — легітимний
  informed-consent вибір з документованими trade-offs — пацієнт зберігає
  доступ до upgrade до посиленого спостереження на будь-якому
  майбутньому візиті якщо дисплазія з'являється або переваги змінюються.

  **Alarm features** (ненавмисне схуднення, дисфагія, одинофагія,
  ШКТ-кровотеча, стійкий або погіршений рефлюкс не реагує на PPI,
  залізодефіцитна анемія неясної етіології) маршрутизують негайно до
  діагностичної верхньої ендоскопії з біопсіями — і якщо EAC або HGD
  підтверджено, до treatment-persona алгоритму через існуючі
  DIS-ESOPHAGEAL Indications.

