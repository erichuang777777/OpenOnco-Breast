do_not_do:
  - "Не використовувати цей шлях у пацієнтів з LGD або HGD — потребують intensified surveillance або ендоскопічної ерадикаційної терапії."
  - "Не презентувати q5y observation як еквівалент intensified surveillance — interval-cancer ризик вищий через нижчу частоту sampling."
  - "Не ігнорувати alarm features (дисфагія, схуднення, ШКТ-кровотеча) під час observation — immediate upper endoscopy показана."
  - "Не пропускати periodic re-discussion intensified track — пацієнти, які обрали observation, можуть змінити переваги після додаткових візитів або появи risk factors."
  - "Не використовувати цей шлях у пацієнтів з довгим сегментом Barrett (≥3 см) та множинними EAC factor risk — коротші інтервали (q3 роки) виправдані."

do_not_do_en:
  - "Do not use this pathway in patients with LGD or HGD — they require intensified surveillance or endoscopic eradication therapy."
  - "Do not present q5y observation as equivalent to intensified surveillance — interval-cancer risk is higher due to lower sampling frequency."
  - "Do not ignore alarm features (dysphagia, weight loss, GI bleeding) during observation — immediate upper endoscopy is indicated."
  - "Do not skip periodic re-discussion of the intensified track — patients who chose observation may change preferences after additional visits or emergence of risk factors."
  - "Do not use this pathway in patients with long-segment Barrett (≥3 cm) and multiple EAC risk factors — shorter intervals (q3y) are warranted."

