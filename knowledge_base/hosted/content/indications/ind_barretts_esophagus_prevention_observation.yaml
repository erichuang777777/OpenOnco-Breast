nccn_category: "2B"

expected_outcomes:
  overall_response_rate: >-
    Routine-cadence EGD q5y (non-dysplastic Barrett only): captures EAC
    at earliest detectable stage IF malignancy emerges (~0.1-0.3%/year
    progression in non-dysplastic Barrett), but lower-frequency sampling
    increases interval-cancer risk vs intensified surveillance.
    Surveillance does NOT reduce baseline incidence. Inappropriate for
    any dysplasia grade — LGD progression risk ~0.7-2%/year, HGD risk
    ~7-19%/year, both warrant intensified surveillance or endoscopic
    eradication therapy (see IND-BARRETTS-ESOPHAGUS-PREVENTION-
    SURVEILLANCE).

