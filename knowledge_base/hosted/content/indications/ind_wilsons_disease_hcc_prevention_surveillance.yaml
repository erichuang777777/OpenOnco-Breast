sources:
  - source_id: SRC-AASLD-HCC-2023
    position: supports
    relevant_quote_paraphrase: >-
      "HCC surveillance with ultrasound ± AFP every 6 months is
      recommended for all patients with cirrhosis from any etiology
      with annual HCC incidence ≥1.5%. Wilson's cirrhosis meets this
      threshold in contemporary cohorts."
  - source_id: SRC-NCCN-HCC-2025
    position: supports
    relevant_quote_paraphrase: >-
      "Patients with cirrhosis of any etiology (including Wilson's
      disease, hemochromatosis, alpha-1 antitrypsin deficiency) are
      candidates for HCC surveillance per AASLD criteria. Curative
      treatment (resection, ablation, transplantation) requires
      early-stage detection."
  - source_id: SRC-NCCN-BCELL-2025
    position: context

do_not_do:
  - "Не пропускати HCC surveillance у cirrhotic Wilson — historic perception 'низького ризику' застаріла; contemporary cohorts показують HCC incidence ~1%/рік."
  - "Не використовувати лише AFP для surveillance — низька sensitivity isolated; AFP як adjunct до US/MRI."
  - "Не покладатися на ceruloplasmin/serum copper для tracking treatment adequacy — 24-год urinary copper більш інформативний для adherence."
  - "Не призначати пеніциламін без B6 (піридоксину) supplementation — penicillamine indused B6 deficiency."
  - "Не пропускати transplant evaluation для decompensated cirrhosis — Wilson's-cirrhotic-with-HCC рецепієнти мають сприятливі outcomes given ATP7B-corrected donor liver."

do_not_do_en:
  - "Do not skip HCC surveillance in cirrhotic Wilson's — the historic 'low risk' perception is outdated; contemporary cohorts show HCC incidence ~1%/year."
  - "Do not use AFP alone for surveillance — low sensitivity in isolation; AFP serves as adjunct to US/MRI."
  - "Do not rely on ceruloplasmin/serum copper to track treatment adequacy — 24h urinary copper is more informative for adherence."
  - "Do not prescribe penicillamine without B6 (pyridoxine) supplementation — penicillamine-induced B6 deficiency."
  - "Do not skip transplant evaluation for decompensated cirrhosis — Wilson's-cirrhotic-with-HCC recipients have favorable outcomes given ATP7B-corrected donor liver."

