rationale: >
  Standard-track prevention pathway for patients with Wilson's disease,
  particularly cirrhotic subset. Three-component standard:

  **HCC surveillance imaging (cirrhotic Wilson's only):**
    - Abdominal ultrasound q6mo (AASLD 2023) with operator focus on
      complete liver visualization; AFP measured simultaneously
      (sensitivity boost when combined with US per AASLD ≥0.5
      sensitivity gain vs US alone).
    - Suboptimal US visualization (obese, hepatic steatosis, prior
      surgery, advanced cirrhosis with nodular contour) → switch to
      MRI or multiphase CT q6mo (LI-RADS reporting framework).
    - LR-3 (intermediate probability) → repeat imaging in 3-6mo;
      LR-4 (probably HCC) → biopsy or close surveillance per
      multidisciplinary discussion; LR-5 (definitely HCC) →
      transition to HCC treatment algorithm (DIS-HCC).

  **Chelation adherence reinforcement:**
    - Confirm continued chelation (penicillamine 750-1500 mg/day, OR
      trientine 750-1500 mg/day, OR zinc 75-150 mg/day elemental
      depending on phase of treatment and adherence profile)
    - 24h urinary copper q6-12mo to assess de-coppering adequacy and
      adherence (target: 200-500 mcg/24h during maintenance)
    - Ceruloplasmin + serum copper q6-12mo (typically remain low — they
      track Wilson's pathophysiology rather than treatment response)
    - LFT panel + INR + platelet count q6-12mo to monitor hepatic
      synthetic function

  **Liver transplantation evaluation:**
    - Hepatology referral for: decompensated cirrhosis (Child-Pugh C,
      MELD ≥15), recurrent variceal bleeding despite endoscopic
      management, refractory ascites, hepatic encephalopathy
    - Acute fulminant Wilson's (severe acute liver failure presentation,
      often in adolescents) — emergency transplant evaluation
    - HCC within Milan criteria (single ≤5 cm, or up to 3 nodules each
      ≤3 cm, no vascular invasion, no extrahepatic spread) — transplant
      remains highly favorable in Wilson's recipients given de-novo
      ATP7B-corrected liver

  **Co-factor management:** abstain from alcohol; HBV vaccination if
  not immune; HCV treatment per standard DAA regimens if co-infected;
  PrEP per separate RFs.

  In Ukraine, Wilson's disease care concentrated in hepatology centers
  in Kyiv, Lviv, Odesa, Kharkiv; ATP7B genetic testing available at
  Institute of Genetics + select private labs. Penicillamine and
  trientine availability variable (penicillamine widely available;
  trientine via tertiary specialist prescription or international
  import). Liver transplantation performed at Shalimov Institute
  (Kyiv); HCC-within-Milan adult recipients accepted.

rationale_ua: >
  Стандартний-трек prevention шлях для пацієнтів з хворобою Вільсона,
  особливо cirrhotic підгрупою. Трикомпонентний стандарт:

  **HCC surveillance imaging (лише cirrhotic Вільсона):**
    - Абдомінальне УЗД q6 міс (AASLD 2023); AFP одночасно
    - Subтimal візуалізація → MRI або багатофазний CT q6 міс
      (LI-RADS reporting)
    - LR-3 → repeat 3-6 міс; LR-4 → біопсія або close surveillance;
      LR-5 → HCC treatment algorithm (DIS-HCC)

  **Chelation adherence:**
    - Пеніциламін 750-1500 мг/день, АБО трієнтин 750-1500 мг/день,
      АБО цинк 75-150 мг/день elemental
    - 24-год urinary copper q6-12 міс (target 200-500 мкг/24г maintenance)
    - Ceruloplasmin + serum copper q6-12 міс
    - LFT + INR + platelets q6-12 міс

  **Liver transplantation evaluation:**
    - Hepatology referral: decompensated cirrhosis (Child-Pugh C,
      MELD ≥15), recurrent variceal bleeding, refractory ascites,
      hepatic encephalopathy
    - Гострий fulminant Вільсон — emergency transplant
    - HCC у Milan — favorable transplant outcomes (de-novo ATP7B-
      corrected liver)

  **Co-factor management:** abstain від алкоголю; HBV вакцинація;
  HCV treatment.

  В Україні Wilson care концентрована в hepatology центрах у Києві,
  Львові, Одесі, Харкові; ATP7B-генетичне тестування — Institute of
  Genetics. Пеніциламін широко доступний; трієнтин — third-tier
  specialist prescription. Liver transplantation — Shalimov Institute.

