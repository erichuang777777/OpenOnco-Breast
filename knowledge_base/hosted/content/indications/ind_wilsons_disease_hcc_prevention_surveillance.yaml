expected_outcomes:
  overall_response_rate: >-
    AASLD HCC surveillance (US ± AFP q6mo) in cirrhotic Wilson's shifts
    HCC stage at diagnosis from advanced/multifocal to early (BCLC 0/A,
    typically within Milan criteria for transplant or amenable to
    ablation/resection). Early-stage HCC 5y OS 60-75% post-transplant
    or ablation/resection, vs <15% for BCLC C/D presenting symptomatically.
    Surveillance does not reduce HCC incidence; addresses stage-shift
    and access to curative intervention (transplant in particular for
    Wilson's-cirrhotic-with-HCC).

