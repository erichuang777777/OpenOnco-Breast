# No systemic drug regimen — primary intervention is HCC surveillance
# imaging + chelation-adherence reinforcement + transplant evaluation.
# Copper-chelation pharmacotherapy (penicillamine, trientine, zinc) is
# treatment of the underlying Wilson's, managed by hepatology, not as
