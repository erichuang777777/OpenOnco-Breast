do_not_do:
  - "Не презентувати reproductive timing як 'mistake' — counsel forward-looking, modifiable factors."
  - "Не пропускати genetic counseling assessment — family-history RFs separate but overlap у diagnosed-young families."
  - "Не purchase earlier breast cancer screening cadence лише на основі цього RF cluster у average-risk women without family history — USPSTF cadence applies."
  - "Не делегувати breastfeeding support до non-lactation-consultant без надання resource — major barrier to breastfeeding success."

do_not_do_en:
  - "Do not present reproductive timing as a 'mistake' — counsel forward-looking, modifiable factors."
  - "Do not skip genetic counseling assessment — family-history RFs are separate but overlap in diagnosed-young families."
  - "Do not order earlier breast cancer screening cadence based on this RF cluster alone in average-risk women without family history — USPSTF cadence applies."
  - "Do not delegate breastfeeding support to non-lactation-consultant without providing the resource — a major barrier to breastfeeding success."

