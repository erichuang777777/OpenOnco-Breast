  **(1) Breastfeeding promotion (forward-looking)** — У поточних або
  subsequent pregnancies, support exclusive breastfeeding ≥6 місяців +
  continued breastfeeding через ≥12 місяців per WHO + AAP.

  **(2) Modifiable cancer-protective lifestyle counseling** —
  - Алкоголь: ≤1 напій/день
  - Фізична активність: ≥150 хв/тиждень moderate
  - Weight management: maintain healthy BMI post-menopause
  - Mediterranean dietary pattern

  **(3) Breast cancer screening per USPSTF cadence + family history
  modification** — Мамографія з 40-50+ per shared decision-making. При
  family history: shared DM про earlier/more-frequent screening + risk
  assessment (Gail / Tyrer-Cuzick / BOADICEA models).

  **(4) Genetic counseling referral** при family-history red flags per
  NCCN BRCA1/2 / Lynch / Cowden criteria.

