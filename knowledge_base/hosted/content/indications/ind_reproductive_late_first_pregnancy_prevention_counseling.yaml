rationale: >
  Standard-track prevention pathway for late-first-pregnancy + short-
  breastfeeding combination. Components per ACOG + AAP + USPSTF +
  NCCN Breast Cancer Screening:

  **(1) Breastfeeding promotion (forward-looking)** — In current or
  subsequent pregnancies, support exclusive breastfeeding ≥6 months +
  continued breastfeeding through ≥12 months per WHO + AAP. Lactation
  consultant referral for any breastfeeding difficulty. Each 12 months
  of cumulative lifetime breastfeeding reduces breast cancer risk ~4%.

  **(2) Modifiable cancer-protective lifestyle counseling** — Since
  reproductive timing cannot be reversed, double-down on modifiable
  factors:
  - Alcohol: ≤1 drink/day (less is better; each drink/day adds ~7-10%
    breast cancer risk)
  - Physical activity: ≥150 min/week moderate per HHS guidelines
  - Weight management: maintain healthy BMI post-menopause (most-
    impactful single modifiable factor)
  - Mediterranean dietary pattern

  **(3) Breast cancer screening per USPSTF cadence + family history
  modification** —
  - Mammography from age 40-50+ per shared decision-making (USPSTF
    starts age 40 with shared DM, ACS routine 45+)
  - If family history of breast cancer + this RF cluster: shared DM
    about earlier/more-frequent screening + risk assessment
    (Gail / Tyrer-Cuzick / BOADICEA models)
  - If 5-year breast cancer risk ≥1.66% (Gail) OR ≥3% (10-year
    Tyrer-Cuzick): refer for risk-reducing medication discussion
    (tamoxifen/raloxifene/AI) per USPSTF Grade B

  **(4) Genetic counseling referral** if family-history red flags
  present (per NCCN BRCA1/2 / Lynch / Cowden criteria) — these are
  separate from reproductive-history RF but should be assessed.

  Counseling tone: reproductive choices are personal + non-modifiable
  retroactively. Focus on what CAN be done — breastfeeding when feasible,
  lifestyle, screening cadence.

rationale_ua: >
  Стандартний-трек prevention шлях для late-first-pregnancy + short-
  breastfeeding. Components per ACOG + AAP + USPSTF + NCCN Breast
