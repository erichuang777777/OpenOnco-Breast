sources:
  - source_id: SRC-NCCN-GENETIC-FAMILIAL-BREAST-OVARIAN-2025
    position: supports
    relevant_quote_paraphrase: >-
      "Confirmed BRCA1 / BRCA2 carriers should receive annual breast
      MRI from age 25-30, alternating with mammogram from age 30,
      with clinical breast exam q6mo; TVUS + CA-125 q6mo from 30-35
      is offered with documented limitations until risk-reducing BSO
      is performed. Male BRCA2 carriers receive PSA + DRE annually
      from age 40."
  - source_id: SRC-NCCN-BREAST-2025
    position: supports
    relevant_quote_paraphrase: >-
      "Annual breast MRI is the most sensitive imaging modality in
      BRCA carriers; staggered q6-month imaging with mammogram from
      age 30 provides imaging every 6 months."
  - source_id: SRC-NCCN-OVARIAN-2025
    position: supports
    relevant_quote_paraphrase: >-
      "Ovarian surveillance via TVUS + CA-125 has documented poor
      sensitivity for early-stage high-grade serous ovarian carcinoma
      — must be framed as suboptimal vs risk-reducing BSO."

do_not_do:
  - "Не пропускати cascade-тестування — особливо male родичів першого ступеня (BRCA2 чоловіки мають meaningful prostate / pancreatic ризик, часто пропускається у family-history рутинах)."
  - "Не презентувати TVUS + CA-125 як ефективний скринінг яєчників — UKCTOCS / UKFOCSS дані не показують mortality benefit; framing має бути чесним з направленням до RRSO як evidence-based опції."
  - "Не використовувати general-population mammogram cadence (q2y від 50) для BRCA-носія — annual MRI з 25-30 років з alternating мамографією з 30 — мінімальний стандарт."
  - "Не пропонувати risk-reducing хірургію як стандартну частину surveillance — це INTENSIFIED-трек, з повним обговоренням ризику / користі / альтернатив."
  - "Не пропускати male-line міркування — щорічний CBE з 35, PSA з 40 (BRCA2) / 45 (BRCA1); ці пункти часто опускаються у HBOC family-history рутинах."

do_not_do_en:
  - "Do not skip cascade testing — especially male first-degree relatives (BRCA2 men have meaningful prostate / pancreatic risk, frequently missed in family-history routines)."
  - "Do not present TVUS + CA-125 as effective ovarian screening — UKCTOCS / UKFOCSS data do not show mortality benefit; framing must be honest with referral to RRSO as the evidence-based option."
  - "Do not use general-population mammogram cadence (q2y from 50) for a BRCA carrier — annual MRI from 25-30 with alternating mammogram from 30 is the floor."
  - "Do not offer risk-reducing surgery as standard surveillance — this is the INTENSIFIED track with full risk / benefit / alternatives discussion."
  - "Do not skip male-line considerations — annual CBE from 35, PSA from 40 (BRCA2) / 45 (BRCA1); these often get dropped in HBOC family-history routines."

