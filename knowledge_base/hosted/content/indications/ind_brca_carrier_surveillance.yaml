expected_outcomes:
  overall_response_rate: >-
    NCCN Genetic / Familial High-Risk: Breast, Ovarian, Pancreatic
    surveillance in confirmed BRCA1 / BRCA2 carriers achieves
    earlier-stage breast cancer detection — annual breast MRI is the
    most sensitive imaging modality (sensitivity ~80-90% in BRCA
    carriers vs ~30-40% mammography alone). Alternating mammogram +
    MRI provides imaging every 6 months overall. Ovarian
    surveillance via TVUS + CA-125 has documented poor sensitivity
    for early-stage high-grade serous carcinoma — UKCTOCS / UKFOCSS
    trials do not demonstrate mortality benefit even in BRCA-
    confirmed cohorts; framed honestly as suboptimal vs RRSO (which
    is offered in the INTENSIFIED track). PSA + DRE in BRCA2 men
    from age 40 captures the high-grade prostate cancer enrichment
    documented in BRCA2 carriers.

