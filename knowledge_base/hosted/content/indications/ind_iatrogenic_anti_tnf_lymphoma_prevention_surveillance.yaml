rationale: >
  Standard-track surveillance for chronic anti-TNF biologic
  exposure ≥3y in pediatric / young-adult IBD cohort. Components
  per ECCO 2019 IBD-malignancy + AAP / NASPGHAN IBD-pediatric +
  NCCN B-Cell Lymphoma:

  **(1) EBV serology at anti-TNF initiation** — baseline
  anti-VCA-IgG. Document status; influences combination-therapy
  decision-making (avoid anti-TNF + thiopurine combination in
  EBV-seronegative young men where alternative monotherapy or
  alternative biologic class is acceptable).

  **(2) Structured shared-decision review at year 1, year 3,
  and year 5 of anti-TNF therapy** — combination-therapy
  reassessment:
  - Anti-TNF + thiopurine combination has the highest
    cancer signal (most HSTCL cases reported with this
    combination). Step-down to anti-TNF monotherapy if IBD
    activity allows + therapeutic drug monitoring of anti-TNF
    trough confirms adequate exposure without anti-drug
    antibodies.
  - Alternative biologic classes with reportedly favorable
    cancer-signal profiles: vedolizumab (gut-selective integrin),
    ustekinumab (IL-12/23), risankizumab (IL-23), upadacitinib
    (JAK1 — own cancer-signal caveat).
  - Step-up considerations balance against IBD relapse risk.

  **(3) Annual B-symptom + lymphadenopathy assessment** —
  unexplained fevers, drenching night sweats, weight loss,
  persistent lymphadenopathy, hepatosplenomegaly without IBD
  flare → urgent workup with imaging + biopsy. HSTCL has a
  distinctive presentation (hepatosplenomegaly without
  lymphadenopathy, cytopenias, B symptoms) — should be
  considered in any young IBD patient on combination therapy
  with these findings.

  **(4) Annual whole-body skin examination by dermatologist** —
  non-melanoma skin cancer signal is synergistic with concomitant
  thiopurine + UV exposure; q6mo if any prior skin cancer.
  Sun-protection counseling at every visit.

  **(5) Vaccination catch-up** — HPV (Gardasil-9 through age
  45 per ACIP), HBV (anti-HBs titer + booster if needed), HAV,
  influenza, pneumococcal (PCV20 + PPSV23 schedule for immuno-
  suppressed cohort), VZV / shingrix (recombinant zoster).
  Live vaccines contraindicated during active biologic therapy.

  **(6) HBV / HCV / TB screening** at initiation and as
  indicated. Anti-TNF can reactivate HBV (HBsAg+ or anti-HBc+
  → prophylactic antiviral) and latent TB (IGRA / TST →
  treatment of latent TB before initiation). HCV screening
  baseline.

  **(7) Pediatric / young-adult-specific counseling** — patient
  + family informed of small but real cancer-signal that scales
  with combination therapy; HSTCL-specific Boxed Warning for
  combination in pediatric / young-adult IBD per FDA. Framing
  matters: anti-TNF monotherapy cancer signal is at population
  background; the meaningful intervention is structured
  combination-step-down rather than anti-TNF abandonment.

  **(8) Annual CBC + LFT** — monitoring for cytopenia,
  hepatotoxicity, and early hematologic-malignancy signal.

  Goal: structured year-1 / year-3 / year-5 review of
  combination therapy; early detection of B-symptoms; vaccination
  intact; sun protection active; framing avoids over-stating
  monotherapy cancer risk while addressing the combination-
  therapy HSTCL signal.

rationale_ua: >
  Стандартний-трек surveillance для хронічної anti-TNF biologic
  експозиції ≥3р у pediatric / young-adult IBD cohort. Components
  per ECCO 2019 + AAP / NASPGHAN + NCCN B-Cell Lymphoma:

  **(1) EBV serology на anti-TNF initiation** — baseline
  anti-VCA-IgG. Documenta status; впливає на combination-therapy
  decision (avoid anti-TNF + thiopurine combination у EBV-
  seronegative young men).

  **(2) Structured shared-decision review на 1р, 3р, 5р anti-TNF
  therapy** — combination-therapy reassessment:
  - Anti-TNF + thiopurine combination — найвищий cancer signal.
    Step-down на anti-TNF monotherapy якщо IBD activity allows.
  - Alternative biologic classes: vedolizumab, ustekinumab,
    risankizumab, upadacitinib.

  **(3) Annual B-symptom + lymphadenopathy assessment** —
  unexplained fevers, drenching night sweats, weight loss,
  persistent lymphadenopathy, hepatosplenomegaly без IBD flare
  → urgent workup. HSTCL: hepatosplenomegaly без lymphadenopathy,
  cytopenias, B symptoms.

  **(4) Annual whole-body skin examination dermatologist** —
  NMSC signal synergistic з concomitant thiopurine + UV.

  **(5) Vaccination catch-up** — HPV (Gardasil-9 до 45), HBV,
  HAV, influenza, pneumococcal (PCV20 + PPSV23), VZV / shingrix.
  Live vaccines contraindicated.

  **(6) HBV / HCV / TB screening** — анти-TNF може reactivate
  HBV і latent TB.

  **(7) Pediatric / young-adult-specific counseling** —
  HSTCL-specific Boxed Warning для combination у pediatric /
  young-adult IBD per FDA.

  **(8) Annual CBC + LFT.**

