expected_outcomes:
  overall_response_rate: "EBV serology baseline check + structured year-1 / year-3 / year-5 review of combination anti-TNF + thiopurine vs monotherapy + annual B-symptom / lymphadenopathy / skin assessment achieves early detection of the rare HSTCL and DLBCL events in this cohort. Most population-based studies (DOLCE, Danish, French CESAME) show anti-TNF monotherapy cancer signal is at population background; the meaningful intervention is structured combination-therapy step-down where IBD activity permits (combination → monotherapy reduces HSTCL signal in young men)."

