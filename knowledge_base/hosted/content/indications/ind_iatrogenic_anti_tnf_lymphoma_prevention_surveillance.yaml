do_not_do:
  - "Не initiateувати anti-TNF + thiopurine combination у EBV-seronegative young man без discussion alternatives — HSTCL ризик."
  - "Не пропускати TB screening (IGRA / TST) pre-anti-TNF initiation — latent TB reactivation ризик."
  - "Не пропускати HBV screening pre-anti-TNF — reactivation у HBsAg+ або anti-HBc+ cohort."
  - "Не over-stating anti-TNF monotherapy cancer signal — population background; combination — meaningful axis."
  - "Не нормалізувати unexplained hepatosplenomegaly без IBD flare у young patient на combination — HSTCL workup."
  - "Не використовувати live vaccines під час active biologic therapy."

do_not_do_en:
  - "Do not initiate anti-TNF + thiopurine combination in an EBV-seronegative young man without discussing alternatives — HSTCL risk."
  - "Do not skip TB screening (IGRA / TST) before anti-TNF initiation — latent TB reactivation risk."
  - "Do not skip HBV screening before anti-TNF — reactivation in HBsAg+ or anti-HBc+ cohort."
  - "Do not overstate anti-TNF monotherapy cancer signal — at population background; combination therapy is the meaningful axis."
  - "Do not normalize unexplained hepatosplenomegaly without IBD flare in a young patient on combination — HSTCL workup."
  - "Do not use live vaccines during active biologic therapy."

