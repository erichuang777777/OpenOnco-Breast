rationale: >
  Alternative-track companion to IND-IATROGENIC-CRANIAL-RT-LATE-
  PREVENTION-SURVEILLANCE. Cancer survivor ≥5y post-treatment declines
  structured COG-LTFU surveillance schedule (surveillance fatigue,
  no perceived symptoms, financial/access barrier, geographic distance
  from survivorship clinic, distrust of imaging) — receives symptom-
  vigilance education (new persistent headache, new focal neurological
  deficit, new seizure, cognitive change beyond expected age-related
  decline, postural hypotension / fatigue suggestive of adrenal
  insufficiency → urgent evaluation) + lifestyle counseling (vascular
  risk factor modification post-radiation vasculopathy, neurocognitive
  health). Per CHARTER §11 patient-autonomy framing — surveillance
  refusal is a legitimate choice but framed as suboptimal vs. scheduled-
  surveillance comparator.

rationale_ua: >
  Альтернативно-трекова Indication. Виживач раку ≥5р post-treatment
  відмовляється від structured COG-LTFU cranial-RT late-effects
  surveillance — отримує symptom-vigilance education (new persistent
  headache, new focal deficit, new seizure, cognitive change, postural
  hypotension / fatigue suggestive of adrenal insufficiency → urgent
  evaluation) + lifestyle counseling (vascular risk modification,
  neurocognitive health). Per CHARTER §11.

