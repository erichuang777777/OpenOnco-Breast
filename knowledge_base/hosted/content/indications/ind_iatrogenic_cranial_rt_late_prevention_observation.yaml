do_not_do:
  - "Не презентувати observation як еквівалент structured COG-LTFU surveillance — late-presentation late effects substantially гірші outcomes."
  - "Не нормалізувати new persistent headache як 'tension' у cranial-RT survivors — warrants brain MRI."
  - "Не вважати fatigue + weight loss generic 'aging' — може бути silent HP-axis insufficiency."
  - "Не пропускати vascular risk factor counseling — radiation vasculopathy elevates stroke ризик."

do_not_do_en:
  - "Do not present observation as equivalent to structured COG-LTFU surveillance — late-presentation late effects have substantially worse outcomes."
  - "Do not normalize new persistent headache as 'tension' in cranial-RT survivors — warrants brain MRI."
  - "Do not treat fatigue + weight loss as generic 'aging' — may be silent HP-axis insufficiency."
  - "Do not skip vascular risk factor counseling — radiation vasculopathy elevates stroke risk."

