expected_outcomes:
  overall_response_rate: "Survivor declines structured COG-LTFU cranial-RT late-effects surveillance — receives symptom-prompted evaluation only. Secondary CNS tumors and endocrine sequelae may present at more advanced stage (symptomatic meningioma is often larger / surgically more challenging than incidental MRI-detected; HP-axis dysfunction may progress to clinically significant deficits before recognition). Outcomes substantially worse with late-presentation vs. surveillance-detected late effects."

