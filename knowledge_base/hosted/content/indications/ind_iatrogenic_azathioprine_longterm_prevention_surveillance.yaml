expected_outcomes:
  overall_response_rate: "Annual whole-body skin examination by dermatologist + EBV serology check at initiation + B-symptom / lymphadenopathy review + shared-decision discussion at year 5 catches the major thiopurine-attributable cancers (DLBCL, non-melanoma skin cancer) at early stage. CESAME cohort + Dutch Pediatric IBD studies: lymphoma absolute risk on thiopurines ~4-6 per 1000 person-years vs ~1 per 1000 background; SCC risk increases 4-10x with cumulative dose-years. Discontinuation of thiopurine after a thiopurine-attributable cancer reduces second-event risk; early detection of NMSC enables Mohs / wide excision with high cure rate."

