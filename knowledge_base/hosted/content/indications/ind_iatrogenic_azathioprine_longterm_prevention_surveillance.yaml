do_not_do:
  - "Не initiateувати azathioprine у EBV-seronegative young man — fatal post-mononucleosis lymphoma risk per ECCO 2019."
  - "Не пропускати annual whole-body skin exam — primary cancer-prevention yield."
  - "Не пропускати HBV screening pre-initiation — reactivation risk; prophylactic antiviral у HBsAg+ або anti-HBc+ cohort."
  - "Не нормалізувати unexplained lymphadenopathy / B-symptoms у thiopurine-exposed patient — DLBCL ризик."
  - "Не продовжувати thiopurine без year-5 shared-decision indication review — alternatives existed and improved."
  - "Не пропускати HPV vaccination catch-up — immunosuppression не contraindication до inactivated vaccines."

do_not_do_en:
  - "Do not initiate azathioprine in an EBV-seronegative young man — fatal post-mononucleosis lymphoma risk per ECCO 2019."
  - "Do not skip annual whole-body skin exam — primary cancer-prevention yield."
  - "Do not skip HBV screening pre-initiation — reactivation risk; prophylactic antiviral in HBsAg+ or anti-HBc+ cohort."
  - "Do not normalize unexplained lymphadenopathy / B-symptoms in a thiopurine-exposed patient — DLBCL risk."
  - "Do not continue thiopurine without year-5 shared-decision indication review — alternatives have improved."
  - "Do not skip HPV vaccination catch-up — immunosuppression is not a contraindication to inactivated vaccines."

