do_not_do:
  - "Не презентувати observation як еквівалент multi-modality surveillance — firefighter-attributable excess ризик не адресується."
  - "Не пропускати PPE counseling для активних пожежників — це єдиний важіль з forward-looking benefit."
  - "Не ігнорувати alarm features (chest симптоми, гематурія, неcicатризуючі ураження шкіри, GI-симптоми) — immediate evaluation."
  - "Не використовувати цей шлях як стандарт першої лінії — intensified-surveillance трек залишається preferred."

do_not_do_en:
  - "Do not present observation as equivalent to multi-modality surveillance — firefighter-attributable excess risk is unaddressed."
  - "Do not skip PPE counseling for active firefighters — this is the only lever with forward-looking benefit."
  - "Do not ignore alarm features (chest symptoms, hematuria, non-healing skin lesions, GI symptoms) — immediate evaluation."
  - "Do not use this pathway as a first-line standard — the intensified-surveillance track remains the preferred recommendation."

