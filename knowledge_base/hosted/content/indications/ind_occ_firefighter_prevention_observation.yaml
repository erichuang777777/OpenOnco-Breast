rationale: >
  Alternative-track companion to IND-OCC-FIREFIGHTER-PREVENTION-
  INTENSIFIED-SURVEILLANCE. Patient with documented ≥10 years career-
  firefighter exposure who declines multi-modality intensified
  surveillance — for any reason (cost across modalities, anxiety from
  layered surveillance burden, preference, geographic access constraints
  to dermatology + LDCT + GI centers, life expectancy / competing
  illness) — is offered routine general-population screening only:

  **Lung-cancer screening:** Apply USPSTF 2021 criteria unmodified.
  Patient is explicitly informed that firefighter-attributable excess
  risk is unaddressed.

  **Bladder-cancer screening:** None scheduled — urinalysis only on
  routine primary-care visit or symptomatic presentation.

  **Skin-cancer screening:** None scheduled — patient counseled to
  perform monthly self-skin-checks and report new / changing lesions,
  but without proactive professional dermatology cadence.

  **Colorectal screening:** Apply NCCN average-risk criteria
  unmodified (start age 45). No firefighter-specific earlier-
  initiation extension.

  **Mesothelioma surveillance:** None — explicit absence of validated
  modality (see asbestos pilot for general framing).

  **PPE / decontamination counseling for active firefighters:** Still
  offered — only lever with clear forward-looking benefit. SCBA-
  throughout-overhaul, post-fire decontamination, gear-laundering
  remain standard regardless of surveillance-track choice.

  **Symptom-triggered evaluation:** Low threshold for diagnostic
  workup if alarm features develop.

  Routing reconsiderations: patient may revisit intensified-surveillance
  pathway at any subsequent visit, in whole or in part. Per CHARTER
  §11 patient-autonomy framing: multi-modality surveillance is a
  shared-decision-making domain.

rationale_ua: >
  Альтернативно-трекова Indication — компаньйон до IND-OCC-FIREFIGHTER-
  PREVENTION-INTENSIFIED-SURVEILLANCE. Пацієнт з документованим ≥10
  років career-firefighter впливом, який відмовляється від
  multi-modality intensified surveillance (вартість через декілька
  модальностей, тривога, перевага, географічні обмеження, очікувана
  тривалість життя), отримує тільки рутинний загальнопопуляційний
  скринінг:

  **Скринінг раку легень:** Застосовувати USPSTF 2021 без модифікації.

  **Скринінг раку сечового міхура:** Не запланований — urinalysis
  тільки на рутинному візиті або при симптоматичній презентації.

  **Скринінг раку шкіри:** Не запланований — пацієнту радять
  виконувати щомісячні self-skin-checks та повідомляти про нові /
  змінювальні ураження, але без проактивної професійної dermatology
  частоти.

  **Колоректальний скринінг:** Застосовувати NCCN average-risk
  критерії без модифікації (початок з 45).

  **Спостереження за мезотеліомою:** Немає — явна відсутність
  валідованої модальності.

  **PPE / decontamination counseling для активних пожежників:** Все
  ще пропонується — єдиний важіль з чіткою forward-looking вигодою.

  **Symptom-triggered оцінка:** Низький поріг для діагностичного
  workup при появі alarm features.

  Reroute: пацієнт може повернутися до інтенсифікованого спостереження
  на будь-якому подальшому візиті. Per CHARTER §11 — shared-decision-
  making domain.

