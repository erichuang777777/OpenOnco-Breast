expected_outcomes:
  overall_response_rate: >-
    Primary endpoint: avoidance of multi-modality firefighter-specific
    surveillance when patient declines intensified pathway. Routine
    general-population screening alone leaves firefighter-attributable
    excess unaddressed across bladder / mesothelioma / melanoma /
    colorectal endpoints. PPE counseling for active firefighters
