do_not_do:
  - "Не призначати DAA monotherapy без concurrent HBV-супресії при коінфекції — ризик HBV-reactivation / фульмінантного гепатиту."
  - "Не пропускати інтенсифікований HCC-surveillance (US + AFP q4-6mo) — коінфекція є найвищим ризиком ГЦК у нециротичних дорослих."
  - "Не комбінувати sofosbuvir з аміодароном — ризик важкої брадикардії та зупинки серця."

do_not_do_en:
  - "Do not prescribe DAA monotherapy without concurrent HBV suppression in coinfection — risk of HBV reactivation / fulminant hepatitis."
  - "Do not skip intensified HCC surveillance (US + AFP q4-6mo) — coinfection is the highest HCC risk in non-cirrhotic adults."
  - "Do not combine sofosbuvir with amiodarone — risk of severe bradycardia and cardiac arrest."

