id: IND-CHRONIC-HCV-HBV-COINFECTION-PREVENTION-COMBINATION-ANTIVIRAL
plan_track: standard
intent: prevention

applicable_to:
  disease_id: DIS-HCC
  stage_requirements: []
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
