evidence_level: moderate
strength_of_recommendation: strong
nccn_category: "1"

expected_outcomes:
  overall_response_rate: >-
    HCV cure (SVR12) >95% with sofosbuvir/velpatasvir 12 weeks;
    concurrent HBV-DNA suppression to undetectable >95% with entecavir
    or tenofovir over 12 months. Combined HCC incidence reduction
    materially greater than either intervention alone — coinfection
    is the highest-risk HCC profile in non-cirrhotic adults.
    Intensified surveillance (US + AFP q4-6mo) improves early-stage
    detection.

hard_contraindications: []
red_flags_triggering_alternative: []
required_tests:
  - TEST-CBC
  - TEST-LFT
  - TEST-HBV-SEROLOGY
  - TEST-FIB4
desired_tests:
  - TEST-LDH

rationale: >
  Standard-track prevention pathway for chronic HCV + HBV coinfection.
  The combination is the highest-risk HCC profile in non-cirrhotic
  adults — DAA-induced HCV cure can trigger HBV reactivation /
  fulminant hepatitis if HBV is not concurrently suppressed. Therefore
  combination antiviral is mandatory: DAA (sofosbuvir/velpatasvir
  12 weeks) for HCV cure PLUS nucleos(t)ide analog (entecavir 0.5 mg
  PO daily, OR tenofovir TDF 300 mg PO daily, OR tenofovir TAF 25 mg
  PO daily) for HBV suppression — started before / concurrently with
  DAA, continued long-term per AASLD/EASL HBV criteria.

  Intensified HCC surveillance: US + AFP every 4-6 months (more
  frequent than the q6mo cadence for mono-infection) per AASLD-
  modified protocol for high-risk patients. FibroScan / FIB-4 to assess
  baseline fibrosis stage; cirrhotic coinfected patients require even
  more intensive surveillance.

  In Ukraine, SOF/VEL is reimbursed via НСЗУ national HCV programme;
  entecavir is reimbursed via НСЗУ chronic HBV programme — both
  access pathways already established (combination is administrative
  coordination, not a new funding ask).

rationale_ua: >
  Стандартний-трек prevention шлях для хронічної коінфекції HCV + HBV.
  Комбінація — найвищий ризик ГЦК у нециротичних дорослих —
  DAA-індукований cure HCV може спровокувати реактивацію HBV /
  фульмінантний гепатит якщо HBV не супресований одночасно. Тому
  комбінований противірусний обов'язковий: DAA
  (sofosbuvir/velpatasvir 12 тижнів) для HCV-cure + nucleos(t)ide
  аналог (entecavir 0.5 мг PO щодня, АБО tenofovir TDF 300 мг PO
  щодня, АБО tenofovir TAF 25 мг PO щодня) для HBV-супресії — старт
  перед / одночасно з DAA, продовжувати довгостроково за критеріями
  AASLD/EASL для HBV.

  Інтенсифікований HCC-surveillance: УЗД + AFP кожні 4-6 міс
  (частіше ніж q6мо для моноінфекції) за AASLD-модифікованим
  протоколом для пацієнтів високого ризику. FibroScan / FIB-4 для
  оцінки базового фіброзу; коінфіковані циротики потребують ще
  інтенсивнішого спостереження.

  В Україні SOF/VEL відшкодовується через НСЗУ національну програму
  HCV; entecavir — через НСЗУ програму хронічного HBV — обидва шляхи
  доступу вже встановлені.

