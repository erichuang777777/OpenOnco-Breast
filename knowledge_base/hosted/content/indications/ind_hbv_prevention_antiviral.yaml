  - source_id: SRC-AASLD-HCC-2023
    position: supports

do_not_do:
  - "Не призначати entecavir monotherapy при коінфекції ВІЛ — використовуйте повну АРТ."
  - "Не пропускати q6mo HCC surveillance ультразвуком + AFP — це основний предиктор раннього виявлення."
  - "Не припиняти антивірусну терапію без hepatologist consult — risk of severe HBV reactivation."

do_not_do_en:
  - "Do not prescribe entecavir monotherapy in HIV coinfection — use full ART."
  - "Do not skip q6mo HCC surveillance ultrasound + AFP — this is the strongest predictor of early-stage detection."
  - "Do not discontinue antiviral therapy without a hepatology consult — risk of severe HBV reactivation."

