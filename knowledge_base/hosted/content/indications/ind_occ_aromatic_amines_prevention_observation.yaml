rationale: >
  Alternative-track companion to IND-OCC-AROMATIC-AMINES-PREVENTION-SURVEILLANCE.
  Patient declines structured annual urinalysis cadence (cost, access,
  preference) but accepts symptom-driven evaluation + smoking cessation
  counseling. Per CHARTER §11 patient-autonomy framing.

