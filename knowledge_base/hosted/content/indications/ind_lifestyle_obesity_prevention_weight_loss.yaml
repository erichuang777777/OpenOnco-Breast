rationale: >
  Standard-track prevention pathway for obesity (BMI ≥30). Tiered intervention:

  **(1) Behavioral / lifestyle modification** (first-line per USPSTF):
  - Intensive structured weight-loss program (≥14 contacts/year per USPSTF
    Grade B); typically 6-12 month duration
  - Mediterranean / DASH / portion-controlled dietary patterns
  - ≥150 min/week moderate-intensity aerobic + resistance training

  **(2) Pharmacotherapy** for BMI ≥30 (or ≥27 with weight-related comorbidity):
  - GLP-1 receptor agonists (semaglutide 2.4mg, tirzepatide 15mg) — current
    first-line for sustained ≥15% weight loss
  - Bupropion-naltrexone (Contrave) — alternative
  - Phentermine-topiramate (Qsymia) — alternative
  - Orlistat — older option

  **(3) Bariatric surgery referral** for BMI ≥40 (or ≥35 with comorbidity):
  - Roux-en-Y gastric bypass / sleeve gastrectomy / one-anastomosis bypass
  - Produces durable 25-35% weight loss + meaningful cancer-incidence
    reduction in long-term cohort follow-up

  **(4) Cancer screening per BMI-elevated risk profile:**
  - Post-menopausal women: ensure adherence to USPSTF mammography
  - Endometrial cancer awareness (post-menopausal bleeding evaluation)
  - HCC surveillance in cirrhotic (MASH) subset
  - Routine CRC screening per USPSTF (q10y colonoscopy from 45 or 50)

rationale_ua: >
  Стандартний-трек prevention шлях для ожиріння (BMI ≥30).

  **(1) Behavioral / lifestyle modification** — structured weight-loss program
  (≥14 contacts/year per USPSTF Grade B); Mediterranean / DASH дієтичні
  паттерни; ≥150 хв/тиждень помірної aerobic + resistance training.

  **(2) Фармакотерапія** при BMI ≥30 (або ≥27 з weight-related coморбідністю):
  - GLP-1 receptor agonists (семаглутид 2.4мг, тирзепатид 15мг) — поточна
    перша лінія для sustained ≥15% weight loss
  - Bupropion-налтрексон (Contrave) — альтернатива
  - Phentermine-topiramate (Qsymia) — альтернатива

  **(3) Bariatric surgery referral** при BMI ≥40 (або ≥35 з коморбідністю):
  - Roux-en-Y gastric bypass / sleeve gastrectomy / one-anastomosis bypass
  - Виробляє durable 25-35% weight loss + meaningful cancer-incidence
    reduction

  **(4) Cancer screening per BMI-elevated risk:**
  - Post-menopausal жінки: adherence до USPSTF mammography
  - Endometrial cancer awareness (post-menopausal bleeding evaluation)
  - HCC surveillance в цирозному (MASH) subset

