do_not_do:
  - "Не починати pharmacotherapy без структурного behavioral context — combined approach has best outcomes."
  - "Не пропускати mental-health screening — obesity often co-occurs with depression / disordered eating."
  - "Не використовувати semaglutide / GLP-1 RAs у пацієнтів з historией medullary thyroid carcinoma / MEN2."
  - "Не очікувати full cancer-risk-restoration до non-obese comparator — лише incremental risk reduction."

do_not_do_en:
  - "Do not start pharmacotherapy without a structured behavioral context — combined approach has best outcomes."
  - "Do not skip mental-health screening — obesity often co-occurs with depression / disordered eating."
  - "Do not use semaglutide / GLP-1 RAs in patients with history of medullary thyroid carcinoma / MEN2."
  - "Do not expect full cancer-risk-restoration to non-obese comparator — only incremental risk reduction."

