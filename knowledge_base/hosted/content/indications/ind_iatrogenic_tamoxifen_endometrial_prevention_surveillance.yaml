rationale: >
  Standard-track surveillance for tamoxifen exposure ≥5y in women with
  intact uterus. Components per ACOG Committee Opinion + NCCN Breast
  Survivorship + NCCN Uterine:

  **(1) Patient counseling about symptoms requiring evaluation** —
  ANY of the following → immediate gynecology referral:
  - Postmenopausal bleeding (most-sensitive symptom; ~90% endometrial
    cancers in tamoxifen-exposed cohort present with bleeding)
  - Abnormal pre-menopausal bleeding (menorrhagia, intermenstrual
    bleeding, post-coital bleeding)
  - Vaginal discharge / spotting
  - Pelvic pain or pressure

  **(2) Prompt diagnostic workup of any reported symptom** —
  Transvaginal ultrasound (TVUS) + endometrial biopsy (pipelle or
  hysteroscopy with directed biopsy). Do NOT defer biopsy based on
  TVUS endometrial thickness alone in tamoxifen-exposed women —
  tamoxifen-related changes (subepithelial cysts, thickening) can mask
  or mimic pathology; tissue diagnosis required.

  **(3) Annual gynecologic exam** with pelvic exam + symptom inquiry.
  Routine asymptomatic TVUS screening NOT recommended (ACOG, NCCN,
  ASCO) — high false-positive rate, unnecessary biopsies, no proven
  survival benefit. Annual exam suffices.

  **(4) Tamoxifen duration optimization** — Standard adjuvant
  endocrine therapy is 5y; extended to 10y in selected high-risk
  ER+ breast cancer per ATLAS/aTTom trials. Risk-benefit re-assessment
  at year 5 vs. continued endometrial risk + thromboembolic risk.
  Aromatase inhibitor (post-menopausal) is alternative without
  endometrial risk if switch appropriate.

  **(5) Concurrent risk-factor screening** — Obesity, hypertension,
  diabetes, Lynch syndrome (independent endometrial cancer risks)
  compound tamoxifen-related risk; address per separate pathways.

  **(6) Hormone replacement therapy contraindicated** in this
  population — defer non-hormonal vasomotor + GU-symptom management.

  Outcome: women on tamoxifen who report bleeding promptly + receive
  prompt workup have endometrial cancer detected at curable stage in
  vast majority of cases. Goal of surveillance pathway is NOT screening
  asymptomatic women — it is rapid response to any bleeding/symptom.

rationale_ua: >
  Стандартний-трек surveillance для tamoxifen exposure ≥5р у жінок з
  intact uterus. Components per ACOG Committee Opinion + NCCN Breast
  Survivorship + NCCN Uterine:

  **(1) Patient counseling про симптоми requiring evaluation** —
  БУДЬ-ЯКИЙ з наступних → immediate gynecology referral:
  - Postmenopausal bleeding (most-sensitive симптом; ~90% endometrial
    cancers у tamoxifen-exposed cohort present з bleeding)
  - Abnormal pre-menopausal bleeding (menorrhagia, intermenstrual
    bleeding, post-coital bleeding)
  - Vaginal discharge / spotting
  - Pelvic pain або pressure

  **(2) Prompt diagnostic workup будь-якого reported симптому** —
  Transvaginal ultrasound (TVUS) + endometrial biopsy (pipelle або
  hysteroscopy з directed biopsy). НЕ defer biopsy на основі TVUS
  endometrial thickness alone у tamoxifen-exposed жінок.

  **(3) Annual gynecologic exam** з pelvic exam + symptom inquiry.
  Routine asymptomatic TVUS screening НЕ recommended (ACOG, NCCN, ASCO).

  **(4) Tamoxifen duration optimization** — Standard adjuvant
  endocrine therapy 5р; extended до 10р у selected high-risk ER+
  breast cancer per ATLAS/aTTom trials. Aromatase inhibitor (post-
  menopausal) — alternative без endometrial risk.

  **(5) Concurrent risk-factor screening** — Obesity, hypertension,
  diabetes, Lynch syndrome.

  **(6) Hormone replacement therapy contraindicated** у цій population.

