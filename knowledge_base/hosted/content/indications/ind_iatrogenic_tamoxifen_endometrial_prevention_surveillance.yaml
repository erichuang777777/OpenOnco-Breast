do_not_do:
  - "Не призначати routine asymptomatic TVUS screening — false-positive rate elevated від tamoxifen-related subepithelial changes; ACOG/NCCN against."
  - "Не defer endometrial biopsy у symptomatic woman через 'thin' TVUS endometrium — tamoxifen-related changes can mask pathology; biopsy required."
  - "Не призначати hormone replacement therapy у tamoxifen-exposed women — contraindicated. Non-hormonal vasomotor management."
  - "Не нормалізувати postmenopausal bleeding — навіть мінімальне spotting requires evaluation."
  - "Не deprioritize Lynch syndrome assessment у тих кому endometrial cancer розвивається на tamoxifen — concurrent germline risk альтерує management."

do_not_do_en:
  - "Do not order routine asymptomatic TVUS screening — false-positive rate is elevated by tamoxifen-related subepithelial changes; ACOG/NCCN advise against."
  - "Do not defer endometrial biopsy in a symptomatic woman based on a 'thin' TVUS endometrium — tamoxifen-related changes can mask pathology; biopsy is required."
  - "Do not prescribe hormone replacement therapy in tamoxifen-exposed women — contraindicated. Use non-hormonal vasomotor management."
  - "Do not normalize postmenopausal bleeding — even minimal spotting requires evaluation."
  - "Do not deprioritize Lynch syndrome assessment in those who develop endometrial cancer on tamoxifen — concurrent germline risk alters management."

