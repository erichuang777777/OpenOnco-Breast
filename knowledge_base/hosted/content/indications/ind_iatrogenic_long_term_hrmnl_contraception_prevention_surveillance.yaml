rationale: >
  Standard-track surveillance for cumulative hormonal-contraception
  exposure ≥10y. Components per NCCN Breast / Cervical + USPSTF
  + ASCCP:

  **(1) Mammographic screening per USPSTF** — women 40-74,
  biennial. NOT mandating supplemental screening (MRI/US) based
  on OCP exposure alone — absolute risk increment too modest to
  justify intensification per USPSTF. Density-based intensification
  is a separate axis (dense breasts on mammogram → consider US
  per state-level supplemental-screening regulations).

  **(2) Cervical co-test cadence per ASCCP** — primary HPV
  testing q5y ages 25-65 (preferred), or co-test (cytology + HPV)
  q5y ages 30-65. ≥10y prior OCP use is NOT a guideline-modifying
  factor in itself, but co-existing high-risk HPV positivity at
  screening shifts management per ASCCP (immediate colposcopy
  for HPV-16/18 positive; risk-based for other high-risk types).

  **(3) Clinical breast exam + breast self-awareness counseling.**
  Breast lump, skin change, nipple discharge, persistent breast
  pain → diagnostic mammogram + targeted US workup, not screening
  pathway.

  **(4) Abnormal-bleeding evaluation** — post-coital bleeding,
  intermenstrual bleeding outside expected pattern, postmenopausal
  bleeding → speculum exam + cervical cytology + colposcopy +
  endometrial sampling per ACOG.

  **(5) Risk-factor co-screening** — Lynch / BRCA family history,
  prior thoracic radiation (Hodgkin survivor), tobacco use,
  obesity / sedentary lifestyle — all separately addressable
  axes; address per separate pathways. Cumulative OCP exposure
  alone is not a referral trigger for high-risk-genetics
  evaluation.

  **(6) Patient counseling** — magnitude of OCP-attributable
  risk is small in absolute terms, attenuating after stopping;
  ovarian + endometrial protection (covered by RF-REPRODUCTIVE-
  OCP-LONG-TERM) is the offsetting axis. NOT a recommendation to
  stop OCP for risk reduction in average-risk women.

  Goal: keep cadence at population guideline; ensure HPV co-test
  is happening; mainstream breast screening 40+; respond promptly
  to symptoms.

rationale_ua: >
  Стандартний-трек surveillance для кумулятивної гормональної
  контрацепції ≥10р. Components per NCCN Breast / Cervical
  + USPSTF + ASCCP:

  **(1) Mammographic screening per USPSTF** — жінки 40-74,
  q2р. НЕ мандат supplemental screening (MRI/US) на основі OCP
  exposure alone — абсолютний приріст ризику замалий для
  intensification per USPSTF. Density-based intensification —
  окрема вісь.

  **(2) Cervical co-test cadence per ASCCP** — primary HPV
  q5р у віці 25-65 (preferred), або co-test (cytology + HPV)
  q5р у 30-65. ≥10р попередній OCP — НЕ guideline-modifying
  factor, але co-existing high-risk HPV positivity під час
  screening shift management per ASCCP (immediate colposcopy
  для HPV-16/18 positive).

  **(3) Clinical breast exam + breast self-awareness
  counseling.** Lump, skin change, discharge, persistent
  pain → diagnostic mammogram + US workup.

  **(4) Evaluation patterns abnormal bleeding** — post-coital,
  intermenstrual поза очікуваним pattern, postmenopausal
  bleeding → speculum exam + cervical cytology + colposcopy
  + endometrial sampling per ACOG.

  **(5) Co-screening факторів ризику** — Lynch / BRCA family
  history, prior thoracic radiation, tobacco use, obesity —
  окремі осі.

  **(6) Counseling** — magnitude OCP-attributable risk малий
  в абсолютних термінах; ovarian + endometrial protection —
  компенсуюча вісь. НЕ recommendation зупиняти OCP для risk
  reduction.

