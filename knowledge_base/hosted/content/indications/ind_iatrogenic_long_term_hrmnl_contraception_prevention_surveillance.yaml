expected_outcomes:
  overall_response_rate: "Age-appropriate USPSTF mammography (q2y women 40-74) + ASCCP cervical co-test cadence (primary HPV q5y or co-test q5y, ages 30-65) detects breast and cervical cancers at curable stage in this modestly-elevated-risk cohort. Absolute increment over background population is small (+~10-15 breast cases per 100,000 woman-years during use, attenuating after stop; cervical incidence elevated 1.5-2.0x at ≥5y use only in HPV-positive subset) — surveillance recommendation matches population guidelines rather than mandating intensification. Cervical attention is the higher-yield axis (HPV positivity + cumulative exposure is the meaningful combination)."

