do_not_do:
  - "Не призначати supplemental MRI / US screening на основі OCP exposure alone — абсолютний risk increment замалий per USPSTF."
  - "Не зупиняти OCP у жінок середнього ризику для risk reduction — magnitude attributable risk малий + offsetting ovarian/endometrial protection."
  - "Не пропускати HPV co-testing у когорті з ≥10р OCP exposure — co-positivity з high-risk HPV — meaningful axis."
  - "Не нормалізувати postmenopausal або abnormal bleeding — будь-який alarm symptom requires workup."
  - "Не ігнорувати breast self-awareness counseling — pattern-recognition critical для early detection."

do_not_do_en:
  - "Do not order supplemental MRI / US screening based on OCP exposure alone — absolute risk increment too modest per USPSTF."
  - "Do not stop OCP in average-risk women for risk reduction — attributable-risk magnitude small + offsetting ovarian/endometrial protection."
  - "Do not skip HPV co-testing in the ≥10y OCP cohort — co-positivity with high-risk HPV is the meaningful axis."
  - "Do not normalize postmenopausal or abnormal bleeding — any alarm symptom requires workup."
  - "Do not omit breast self-awareness counseling — pattern recognition is critical for early detection."

