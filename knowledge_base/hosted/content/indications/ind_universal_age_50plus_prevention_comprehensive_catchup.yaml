expected_outcomes:
  overall_response_rate: >-
    Comprehensive screening catch-up plan covering all USPSTF /
    NCCN-recommended modalities for the ≥50 adult age cohort
    (CRC + breast + cervical + lung-LDCT-if-eligible) detects
    early-stage cancers in the cohort with documented screening
    gap. Per USPSTF / NCCN published modeling: NLST shows 20%
    relative reduction in lung-cancer mortality from LDCT (NNS
    ~320); Cochrane mammography meta-analyses show ~20% breast-
    cancer mortality reduction from biennial mammography (NNS
    ~1000 over 10y); colonoscopy reduces CRC mortality ~40-60%
    in screening-cohort observational + Polish RCT data;
    cervical screening (Pap or hr-HPV) reduces cervical-cancer
    mortality ≥70% in compliant cohort. Catch-up screening also
    identifies premalignant lesions (adenomas at colonoscopy,
    CIN at cervical screening) addressable in the screening-
    detection window.

