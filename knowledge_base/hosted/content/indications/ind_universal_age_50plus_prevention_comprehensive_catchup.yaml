do_not_do:
  - "Не призначати asymptomatic screening поза USPSTF / NCCN-recommended modalities (thyroid, oral, pancreatic, ovarian, endometrial, bladder, renal) — false-positive harm >> incremental detection benefit у average-risk cohort."
  - "Не пропускати life-expectancy / comorbidity overlay у ≥75 cohort — catch-up screening може harms outweigh benefits у very-frail patient."
  - "Не призначати LDCT без USPSTF-eligibility verification (≥20 pack-year + current smoker або quit ≤15р) — false-positive + radiation exceed benefit."
  - "Не пропускати informed-consent для PSA screening — overdiagnosis / overtreatment harms significant; shared-decision-making mandatory."
  - "Не deny catch-up screening на основі socioeconomic / insurance барʼєрів — більшість modalities accessible через NSZU / Medicare / NHS coverage; document determination + actively coordinate access."

do_not_do_en:
  - "Do not order asymptomatic screening outside USPSTF / NCCN-recommended modalities (thyroid, oral, pancreatic, ovarian, endometrial, bladder, renal) — false-positive harm >> incremental detection benefit in average-risk cohort."
  - "Do not skip life-expectancy / comorbidity overlay in the ≥75 cohort — catch-up screening may have harms outweigh benefits in very-frail patients."
  - "Do not order LDCT without USPSTF-eligibility verification (≥20 pack-year + current smoker or quit ≤15y) — false-positives + radiation exceed benefit."
  - "Do not skip informed-consent for PSA screening — overdiagnosis / overtreatment harms are significant; shared-decision-making is mandatory."
  - "Do not deny catch-up screening on socioeconomic / insurance grounds — most modalities are accessible through NSZU / Medicare / NHS coverage; document determination + actively coordinate access."

