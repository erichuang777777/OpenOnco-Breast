do_not_do:
  - "Не презентувати observation як еквівалент photoprotection — BCC + SCC + melanoma incidence reduction не досягається."
  - "Не пропускати annual clinical skin exam — early detection AKs / NMSC at curable stage."
  - "Не виключати brief photoprotection counseling на кожному візиті — repeated exposure has cumulative behavioral effect, especially з visible photo-damage."
  - "Не ігнорувати new persistent skin lesions — symptom-triggered evaluation залишається priority."
  - "Не презентувати decision як final — periodic re-discussion photoprotection треку appropriate."

do_not_do_en:
  - "Do not present observation as equivalent to photoprotection — BCC + SCC + melanoma incidence reduction is not achieved."
  - "Do not skip annual clinical skin exam — early detection of AKs / NMSC at curable stage."
  - "Do not skip brief photoprotection counseling at every visit — repeated exposure has cumulative behavioral effect, especially with visible photo-damage."
  - "Do not ignore new persistent skin lesions — symptom-triggered evaluation remains a priority."
  - "Do not present the decision as final — periodic re-discussion of the photoprotection track is appropriate."

