recommended_regimen: null
concurrent_therapy: []
followed_by: []

evidence_level: low
strength_of_recommendation: conditional
nccn_category: "2B"

expected_outcomes:
  overall_response_rate: "Continued chronic occupational outdoor UV exposure without structured photoprotection: cumulative non-melanoma skin cancer (BCC + SCC) incidence + actinic-keratosis burden + melanoma risk continue to accumulate. Annual clinical skin exam captures earlier-stage disease but does not reduce incidence. Patient skin self-exam education remains appropriate regardless of mitigation-track choice."

hard_contraindications: []
red_flags_triggering_alternative: []
required_tests: []
desired_tests: []

rationale: >
  Alternative-track companion to IND-ENVIRONMENTAL-OUTDOOR-UV-SKIN-
  PREVENTION-PHOTOPROTECTION. Patient declines structured personal
  photoprotection (occupational practicality — eg, agricultural work
  in summer heat with PPE intolerance, cost, preference, cosmetic /
  social factors) — receives annual clinical full-body skin exam +
  patient skin self-exam education + brief photoprotection counseling
  with each clinical contact + actinic-keratosis treatment as
  detected. Per CHARTER §11 patient-autonomy framing — exposure-
  management constraints are legitimate but framed as suboptimal vs.
  full-photoprotection comparator. Periodic re-discussion of
  photoprotection track at follow-up visits is appropriate.

rationale_ua: >
  Альтернативно-трекова Indication. Пацієнт відмовляється від
  structured personal photoprotection (occupational practicality
  — eg, agricultural work у summer heat з PPE intolerance, cost,
  preference, cosmetic / social factors) — отримує annual clinical
  full-body skin exam + patient skin self-exam education + brief
  photoprotection counseling на кожному клінічному контакті +
  actinic-keratosis treatment as detected. Per CHARTER §11. Periodic
  re-discussion photoprotection треку appropriate.

