rationale: >
  Standard-track prevention pathway for BAP1 tumor predisposition syndrome.

  **(1) Genetic counseling + germline BAP1 panel testing.** Autosomal dominant
  inheritance.

  **(2) Confirmed-carrier surveillance protocol** (per BAP1 Interest Group
  consensus):
  - Annual ophthalmologic exam (dilated fundoscopy) for uveal melanoma
  - Annual whole-body skin exam by dermatologist for cutaneous melanoma + atypical
    Spitz tumors
  - Annual abdominal MRI for clear-cell RCC surveillance
  - Awareness of mesothelioma — chest imaging individualized; avoid asbestos
    exposure as additive risk

  **(3) Cascade testing of first-degree relatives.**

rationale_ua: >
  Стандартний-трек для BAP1 syndrome.

