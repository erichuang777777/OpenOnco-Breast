id: IND-CHRONIC-HIV-HBV-COINFECTION-PREVENTION-OBSERVATION
plan_track: surveillance
intent: prevention

applicable_to:
  disease_id: DIS-HCC
  stage_requirements: []
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 3

triggered_by_redflags:
  - RF-CHRONIC-HIV-HBV-COINFECTION-PREVENTION

recommended_regimen: null
concurrent_therapy: []
followed_by: []

evidence_level: low
strength_of_recommendation: conditional
nccn_category: "2B"

expected_outcomes:
  overall_response_rate: >-
    Primary endpoint: HCC-surveillance compliance (US + AFP q6mo;
    cirrhotic coinfected may need q4mo). Does NOT reduce HCC incidence
    or accelerated-fibrosis progression characteristic of coinfection;
    surveillance improves likelihood of early-stage detection.

hard_contraindications: []
red_flags_triggering_alternative: []
required_tests:
  - TEST-CBC
  - TEST-LFT
  - TEST-FIB4
desired_tests:
  - TEST-LDH

rationale: >
  Alternative-track companion to
  IND-CHRONIC-HIV-HBV-COINFECTION-PREVENTION-TENOFOVIR-ART. Patient
  with HIV + HBV coinfection who declines ART — for any reason
  (drug intolerance, prior failure, preference, access barrier) — is
  offered HCC surveillance per AASLD: US + AFP every 6 months
  (cirrhotic coinfected patients may need q4mo).

  Patient remains at elevated HCC + accelerated-fibrosis risk;
  surveillance does not reduce incidence but improves likelihood of
  early-stage detection. Per CHARTER §11 patient-autonomy framing.

  Strongly recommend infectious-disease + hepatology referral for
  ongoing review — patient preferences may shift over time, and
  HIV-disease progression has its own non-cancer-prevention urgency
  (AIDS-defining events, opportunistic infections).

rationale_ua: >
  Альтернативно-трекова Indication — компаньйон до
  IND-CHRONIC-HIV-HBV-COINFECTION-PREVENTION-TENOFOVIR-ART. Пацієнт
  з коінфекцією ВІЛ + HBV, який відмовляється від АРТ — з будь-якої
  причини (непереносимість препаратів, попередня невдача, вибір,
  бар'єр доступу) — отримує HCC-surveillance за AASLD: УЗД + AFP
  кожні 6 міс (коінфіковані циротики можуть потребувати q4мо).

