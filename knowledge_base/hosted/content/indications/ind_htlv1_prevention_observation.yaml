  - "Не використовувати цей шлях у пацієнтів з documented high proviral load — active surveillance preferred."

do_not_do_en:
  - "Do not ignore developing lymphadenopathy / skin bullae in an HTLV-1+ patient — immediate evaluation."
  - "Do not use this pathway in patients with documented high proviral load — active surveillance is preferred."

