id: IND-CHRONIC-HTLV-1-PREVENTION-OBSERVATION
plan_track: surveillance
intent: prevention

applicable_to:
  disease_id: DIS-ATLL
  stage_requirements: []
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 3

recommended_regimen: null
concurrent_therapy: []
followed_by: []

evidence_level: very_low
strength_of_recommendation: conditional
nccn_category: "2B"

expected_outcomes:
  overall_response_rate: >-
    Minimal surveillance (annual or symptom-driven only) defers ATLL
    detection to symptomatic presentation, when outcomes are inferior
    to early-detection scenarios.

hard_contraindications: []
red_flags_triggering_alternative: []
required_tests:
  - TEST-CBC
desired_tests: []

rationale: >
  Alternative-track companion to IND-CHRONIC-HTLV-1-PREVENTION-
  SURVEILLANCE. Used when active hematologic surveillance is impractical
  (low-resource setting, patient preference, geographic isolation from
  specialist care) — adopts symptom-driven surveillance only (annual
  CBC; care-seeking if lymphadenopathy / skin lesions / hypercalcemia
  symptoms develop).

  Per CHARTER §11 patient-autonomy framing.

rationale_ua: >
  Альтернативно-трекова Indication — компаньйон до
  IND-CHRONIC-HTLV-1-PREVENTION-SURVEILLANCE. Використовується коли
  активне гематологічне спостереження непрактичне (low-resource setting,
  вибір пацієнта, географічна ізоляція від спеціалізованої допомоги) —
  приймає symptom-driven спостереження лише (щорічний CBC; звернення
  до лікаря при появі лімфаденопатії / шкірних уражень / симптомів
  гіперкальціємії).

