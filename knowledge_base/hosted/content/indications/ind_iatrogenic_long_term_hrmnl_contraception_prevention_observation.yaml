expected_outcomes:
  overall_response_rate: "Patient declines structured age-appropriate screening (mammogram, cervical HPV co-test) — receives baseline breast-self-awareness + symptom-vigilance education. Breast and cervical cancers may go undetected at screen-detectable stage; outcomes worse than with adherence to USPSTF / ASCCP screening cadence, though absolute risk attributable to OCP exposure remains modest."

hard_contraindications: []
red_flags_triggering_alternative: []
required_tests: []
desired_tests: []

rationale: >
  Alternative-track companion to IND-IATROGENIC-LONG-TERM-HRMNL-
  CONTRACEPTION-PREVENTION-SURVEILLANCE. Patient declines age-
  appropriate mammography + ASCCP cervical co-test cadence
  (screening fatigue, geographic access, anxiety / preference)
  — receives explicit symptom-vigilance education (breast lump,
  skin retraction, nipple discharge, post-coital bleeding,
  intermenstrual bleeding outside expected pattern, postmenopausal
  bleeding → immediate gynecology / breast referral, regardless
  of how minor it appears). Per CHARTER §11 patient-autonomy
  framing — declining routine screening is legitimate but framed
  as suboptimal vs. structured-screening comparator.

rationale_ua: >
  Альтернативно-трекова Indication. Пацієнт відмовляється від
  age-appropriate mammography + ASCCP cervical co-test cadence
  — отримує explicit symptom-vigilance education (lump, skin
  retraction, nipple discharge, post-coital bleeding,
  intermenstrual bleeding поза pattern, postmenopausal bleeding
  → immediate gynecology / breast referral). Per CHARTER §11.

