do_not_do:
  - "Не презентувати observation як еквівалент age-appropriate screening — early-stage detection достовірно кращі outcomes."
  - "Не пропускати explicit symptom-vigilance education — pattern-recognition критична."
  - "Не виключати patient зі symptom-prompted workup access — навіть при declining routine screening, breast / GYN має бути available при будь-якому symptom."
  - "Не нормалізувати abnormal bleeding або breast change як 'minor' — будь-який alarm symptom requires evaluation."
  - "Не рекомендувати зупинку OCP як substitute for screening — magnitude attributable risk малий."

do_not_do_en:
  - "Do not present observation as equivalent to age-appropriate screening — earlier-stage detection produces reliably better outcomes."
  - "Do not skip explicit symptom-vigilance education — pattern recognition is critical."
  - "Do not deny the patient symptom-prompted workup access — even if routine screening is declined, breast / GYN must be available for any symptom."
  - "Do not normalize abnormal bleeding or breast change as 'minor' — any alarm symptom requires evaluation."
  - "Do not recommend stopping OCP as a substitute for screening — the attributable-risk magnitude is small."

