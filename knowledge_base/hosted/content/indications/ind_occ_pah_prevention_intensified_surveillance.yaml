rationale: >
  Standard-track prevention pathway for individuals with documented
  prior occupational PAH-rich exposure who do not have a current
  PAH-associated malignancy diagnosis. Four parallel interventions:

  **(1) Risk-adjusted annual LDCT chest screening.** USPSTF 2021
  criteria are the baseline. PAH-exposed cohorts extend consideration:
    - First LDCT at ≥10-15 years from first PAH exposure for
      current / ex-smokers (smoker-PAH synergy supports earlier start),
      ≥15-20 years for never-smokers with heavy cumulative PAH-rich
      occupational exposure.
    - Annual cadence; Lung-RADS reporting.

  **(2) Urinalysis q1-2y for bladder-cancer surveillance.** Several
  PAH-rich occupations (coal gasification, aluminum production) are
  IARC Group 1 for bladder cancer. Non-invasive urinalysis with
  microscopy for hematuria is supported by NCCN occupational-exposure
  guidance; cystoscopy reserved for persistent / unexplained
  hematuria. Urinary cytology is not recommended as standalone
  screening.

  **(3) Annual dermatology consultation with full-skin exam.**
  Cutaneous PAH-contact areas (face, neck, hands, forearms, scrotum)
  receive focused attention. Suspicious lesions (chronic
  hyperkeratotic plaques, non-healing ulcers, "tar warts") prompt
  biopsy. Patient is counseled to perform monthly self-skin-checks
  between visits and report any new / changing lesion.

  **(4) Smoking-cessation counseling.** Highest-impact single
  intervention for lung component. PAH × tobacco interaction is
  additive-to-multiplicative. Behavioral counseling + pharmacotherapy
  (varenicline, bupropion, NRT) per USPSTF / ATS / AAFP.

  Resource access in Ukraine: LDCT chest (~1500-3500 UAH); urinalysis
  (~150-400 UAH); dermatology consultation accessible at regional
  centers.

rationale_ua: >
  Стандартний-трек prevention шлях для осіб з документованим попереднім
  професійним впливом PAH-rich occupations без поточного діагнозу
  PAH-асоційованої малігнізації. Чотири паралельні втручання:

  **(1) Risk-adjusted щорічна LDCT грудної клітки.** USPSTF 2021
  критерії — baseline. PAH-експоновані когорти розширюють розгляд:
  перша LDCT при ≥10-15 років від першого PAH-впливу для поточних /
  ex-курців, ≥15-20 років для некурців з heavy cumulative PAH-rich
  occupational exposure. Щорічна частота; Lung-RADS звітність.

  **(2) Urinalysis q1-2y для спостереження за сечовим міхуром.**
  Декілька PAH-rich професій (газифікація вугілля, виробництво
  алюмінію) — IARC Group 1 для раку сечового міхура. Неінвазивний
  urinalysis з мікроскопією для гематурії підтримується NCCN
  occupational-exposure guidance; цистоскопія резервується для
  persistent / нез'ясованої гематурії.

  **(3) Щорічна дерматологічна консультація з повним оглядом шкіри.**
  Cutaneous PAH-contact ділянки (обличчя, шия, руки, передпліччя,
  мошонка) отримують фокусовану увагу. Підозрілі ураження (хронічні
  hyperkeratotic plaques, неcicатризуючі виразки, "tar warts")
  потребують біопсії. Пацієнту радять виконувати щомісячні
  self-skin-checks між візитами та повідомляти про будь-які нові /
  змінювальні ураження.

  **(4) Counseling щодо припинення куріння.** Найвпливовіше одиничне
  втручання для легеневого компоненту. PAH × тютюн взаємодія —
  адитивно-мультиплікативна.

  Доступ до ресурсів в Україні: LDCT грудної клітки (~1500-3500 грн);
  urinalysis (~150-400 грн); дерматологічна консультація доступна в
  регіональних центрах.

