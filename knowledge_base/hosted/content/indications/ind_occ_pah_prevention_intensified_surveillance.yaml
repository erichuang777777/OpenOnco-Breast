expected_outcomes:
  overall_response_rate: >-
    Primary endpoint: detection of incident PAH-attributable malignancy
    (lung, bladder, cutaneous SCC) at earliest treatable stage via
    multi-organ surveillance. Lung-cancer SMR ~2-4x in heavily-exposed
    coke-oven workers (Costantino 1995); bladder-cancer SMR ~1.5-3x in
    aluminum-smelter cohorts (Spinelli 2006); cutaneous SCC excess
    historically well-documented (Pott 1775 chimney-sweep observation
    is foundational). Smoking-cessation has largest single-intervention
    impact on lung component.

