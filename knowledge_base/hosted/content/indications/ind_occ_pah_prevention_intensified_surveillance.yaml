sources:
  - source_id: SRC-NCCN-BCELL-2025
    position: context
    relevant_quote_paraphrase: >-
      "Occupational PAH-exposure cohorts at elevated multi-organ cancer
      risk warrant structured multi-modality surveillance (LDCT,
      urinalysis, dermatologic exam) per NCCN occupational-exposure
      extension."
  - source_id: SRC-NCCN-NSCLC-2025
    position: supports
    relevant_quote_paraphrase: >-
      "Annual low-dose CT lung-cancer screening is recommended for
      individuals at elevated lung-cancer risk by age, smoking history,
      and (per Clinical Practice Guidelines extension) occupational
      carcinogen exposure including polycyclic aromatic hydrocarbons."

do_not_do:
  - "Не пропускати дерматологічний огляд — cutaneous SCC від PAH-контакту — historic foundational occupational-cancer association (Pott 1775)."
  - "Не використовувати urinary cytology як standalone screening — низька чутливість для low-grade захворювання."
  - "Не призначати cystoscopy рутинно — резервується для persistent / нез'ясованої гематурії."
  - "Не пропускати counseling щодо припинення куріння — PAH × тютюн взаємодія — адитивно-мультиплікативна."

do_not_do_en:
  - "Do not skip dermatologic exam — cutaneous SCC from PAH contact is the historic foundational occupational-cancer association (Pott 1775)."
  - "Do not use urinary cytology as standalone screening — low sensitivity for low-grade disease."
  - "Do not order cystoscopy routinely — reserve for persistent / unexplained hematuria."
  - "Do not skip smoking-cessation counseling — the PAH × tobacco interaction is additive-to-multiplicative."

