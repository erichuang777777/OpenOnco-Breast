rationale: >
  Standard-track prevention pathway for very hot beverage consumption.
  Components per IARC Monograph 116 + NCCN Esophageal Cancer screening
  guidance:

  **(1) Beverage-temperature counseling** — Cool beverages to <60°C
  before drinking. Practical rules:
  - Allow tea/coffee to cool ≥5 min after pouring
  - Avoid sipping immediately after boiling
  - Mate, mursik, traditional hot-beverage cultures: same temperature
    target applies
  - Use of straws for very hot drinks NOT a safe workaround (concentrates
    thermal injury at posterior pharynx/upper esophagus)

  **(2) Co-modifiable risk factor assessment** — ESCC risk multiplied by
  concurrent alcohol use, tobacco use, low fruit/vegetable intake,
  achalasia, prior caustic ingestion, tylosis. Address each
  independently; engine routes through respective RF prevention indications
  if concurrently flagged.

  **(3) Targeted endoscopic surveillance** — Routine endoscopic screening
  NOT recommended for hot-beverage exposure alone in low-incidence
  populations. In high-incidence regions (Iran "esophageal cancer belt",
  Linxian China, parts of South America) OR with concurrent ESCC risk
  factors (heavy alcohol + tobacco + family hx) — consider endoscopic
  surveillance per regional guideline / NCCN Esophageal.

  **(4) Symptom-prompted evaluation** — Dysphagia, odynophagia,
  unexplained weight loss, hematemesis → immediate upper endoscopy.
  Do not delay workup for "minor" dysphagia in hot-beverage-exposed +
  alcohol-/tobacco-exposed patients.

rationale_ua: >
  Стандартний-трек prevention шлях для very hot beverage consumption.
  Components per IARC Monograph 116 + NCCN Esophageal:

  **(1) Beverage-temperature counseling** — Охолоджувати напої до <60°C
  before drinking:
  - Дати чаю/каві охолонути ≥5 хв після заварювання
  - Уникати sipping immediately after boiling
  - Mate, mursik, traditional hot-beverage культури: той самий target
  - Соломинки для very hot drinks НЕ safe workaround

  **(2) Co-modifiable risk factor assessment** — ESCC risk компромісний
  concurrent alcohol use, tobacco use, low fruit/vegetable intake,
  achalasia, prior caustic ingestion, tylosis.

  **(3) Targeted endoscopic surveillance** — Routine endoscopic screening
  НЕ recommended для hot-beverage exposure alone у low-incidence
  populations. У high-incidence regions (Iran, Linxian China) АБО з
  concurrent ESCC risk factors — consider per regional guideline.

  **(4) Symptom-prompted evaluation** — Дисфагія, odynophagia,
  unexplained weight loss, hematemesis → immediate upper endoscopy.

