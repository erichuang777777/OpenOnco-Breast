do_not_do:
  - "Не презентувати weight-loss counseling без specific structured intervention referral — generic 'eat less, move more' has marginal effectiveness."
  - "Не призначати pharmacotherapy weight-loss без поваги до contraindications (GLP-1 у history of medullary thyroid / MEN2; orlistat у malabsorption)."
  - "Не intensify CRC colonoscopy interval suddenly without adenoma-history або family-history co-factor — single risk factor (obesity alone) does not change baseline q10y interval per USPSTF / NCCN."
  - "Не пропускати NAFLD / MASH evaluation при BMI ≥30 з metabolic syndrome — FIB-4 score або elastography низькокоштовні і вирішують HCC-surveillance pathway."
  - "Не використовувати asymptomatic endometrial / thyroid / renal / pancreatic screening на основі обезності alone — false-positive harm >> incremental detection benefit."

do_not_do_en:
  - "Do not present weight-loss counseling without specific structured intervention referral — generic 'eat less, move more' has marginal effectiveness."
  - "Do not prescribe pharmacotherapy weight loss without respecting contraindications (GLP-1 in history of medullary thyroid / MEN2; orlistat in malabsorption)."
  - "Do not intensify CRC colonoscopy interval suddenly without an adenoma-history or family-history co-factor — single risk factor (obesity alone) does not change baseline q10y interval per USPSTF / NCCN."
  - "Do not skip NAFLD / MASH evaluation at BMI ≥30 with metabolic syndrome — FIB-4 score or elastography is low-cost and decides the HCC-surveillance pathway."
  - "Do not use asymptomatic endometrial / thyroid / renal / pancreatic screening on the basis of obesity alone — false-positive harm >> incremental detection benefit."

