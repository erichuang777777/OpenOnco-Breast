rationale: >
  Standard-track prevention pathway for any adult with BMI ≥30.
  Two parallel pathways: structured weight-loss intervention +
  cancer-cluster screening cadence modification.

  **(1) Structured weight-loss intervention.** USPSTF Grade B
  recommendation for intensive behavioural counseling (≥12 contacts
  over 12 months) in adults with BMI ≥30. Multi-disciplinary
  approach: dietician (caloric deficit 500-750 kcal/d, Mediterranean
  / DASH dietary pattern), exercise specialist (≥150 min/wk
  moderate intensity per WCRF / AICR), behavioural therapist
  (cognitive-behavioural modification for eating behaviour).
  Pharmacotherapy candidates per AACE / Endocrine Society
  guidelines: GLP-1 agonists (semaglutide, liraglutide, tirzepatide
  — 10-22% weight loss at year 1), orlistat, naltrexone-bupropion,
  phentermine-topiramate; weighed against side-effect profile +
  cost + sustainability. Bariatric surgery referral threshold:
  BMI ≥40 OR BMI ≥35 + obesity-related comorbidity (T2DM,
  hypertension, dyslipidemia, OSA, NAFLD) per ASMBS / IFSO
  guidelines.

  **(2) Cancer-cluster screening cadence modification.** Priority
  modifications across the IARC 13-cancer cluster:
  - CRC: colonoscopy q10y baseline; individualize interval to q5y
    if obesity + adenoma history + family history (additive risk
    factors).
  - Breast: USPSTF biennial mammography 40-74; no obesity-specific
    cadence change but supplemental imaging individualized on
    breast density (dense breast + obesity cohort discussed for
    supplemental MRI / US in shared-decision frame).
  - Endometrial: NO routine asymptomatic screening — symptom-
    prompted TVUS + endometrial biopsy on any postmenopausal
    bleeding (high sensitivity for early-stage endometrial cancer
    detection; obesity is the dominant non-Lynch risk factor).
  - HCC: US + AFP q6mo if NAFLD / MASH cirrhosis documented (FIB-4,
    elastography, or biopsy); without cirrhosis component, no
    routine HCC surveillance.
  - Renal: no routine asymptomatic screening; opportunistic
    detection on imaging performed for other indications.
  - Thyroid: no routine asymptomatic screening; palpate at annual
    physical.
  - Multiple myeloma: no routine asymptomatic screening; SPEP /
    UPEP on symptom-prompted indication (bone pain, hypercalcemia,
    renal insufficiency, anemia).

  **Anchor disease:** colorectal cancer chosen as canonical anchor
  because (a) it is the largest screening-eligible cohort affected
  by obesity (q10y colonoscopy is universal age 45-75), (b) the
  obesity-CRC dose-response is robust (HR ~1.3 per 5 kg/m² in WCRF
  / AICR CUP), (c) screening cadence modification is most clinically
  actionable for CRC (interval shortening + adenoma surveillance).
  Breast, endometrial, HCC, renal, and other cluster cancers are
  covered in the rationale but anchor through their disease-specific
  screening pathways.

rationale_ua: >
  Стандартний-трек prevention шлях для будь-якого дорослого з
  BMI ≥30. Два паралельні шляхи: structured weight-loss
  intervention + cancer-cluster screening cadence modification.

  **(1) Structured weight-loss intervention.** USPSTF Grade B
  recommendation для intensive behavioural counseling (≥12
  contacts протягом 12 місяців). Multi-disciplinary: dietician
  (caloric deficit 500-750 kcal/добу, Mediterranean / DASH),
  exercise specialist (≥150 хв/тиждень moderate intensity per
  WCRF / AICR), behavioural therapist. Pharmacotherapy кандидати
  per AACE / Endocrine Society: GLP-1 agonists (semaglutide,
  liraglutide, tirzepatide — 10-22% weight loss за рік), orlistat,
  naltrexone-bupropion. Bariatric surgery threshold: BMI ≥40 АБО
  BMI ≥35 + obesity-related comorbidity per ASMBS / IFSO.

  **(2) Cancer-cluster screening cadence modification.** Priority
  modifications:
  - CRC: q10р колоноскопія baseline; individualize до q5р при
    obesity + adenoma history + family history.
  - Breast: USPSTF q2р мамографія 40-74; supplemental imaging
    individualized на density.
  - Endometrial: НЕ рутинний asymptomatic screening — symptom-
    prompted TVUS + endometrial biopsy при any postmenopausal
    bleeding.
  - HCC: US + AFP q6 міс при NAFLD / MASH cirrhosis documented.
  - Renal: opportunistic detection на imaging для інших indications.
  - Thyroid: palpate при annual physical.

  **Анкор-захворювання:** colorectal cancer — найбільша screening-
  eligible cohort affected by obesity; obesity-CRC dose-response
  robust per WCRF / AICR CUP.

