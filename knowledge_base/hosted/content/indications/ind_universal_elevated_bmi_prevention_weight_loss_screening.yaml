expected_outcomes:
  overall_response_rate: >-
    Structured weight-loss program (USPSTF-recommended intensive
    behavioural counseling — ≥12 contacts over 12 months delivered
    by dietician / lifestyle coach / multidisciplinary clinic ±
    pharmacotherapy ± bariatric surgery referral if BMI ≥35 +
    comorbidity or BMI ≥40) achieves clinically meaningful weight
    loss (≥5% baseline) in ~40-60% of engaged participants per Look
    AHEAD / DPP-style intervention literature. Cancer-cluster
    screening cadence modification per IARC 13-cancer cluster
    priorities — CRC colonoscopy interval individualization
    (q10y baseline; consider q5y if obesity + adenoma history),
    biennial mammography per USPSTF (no obesity-driven cadence
    change; supplemental imaging individualized on density),
    symptom-prompted endometrial evaluation (TVUS + biopsy on any
    abnormal bleeding in postmenopausal cohort), HCC US+AFP q6mo
    if NAFLD / MASH-cirrhosis component. Weight-loss-attributable
    cancer-incidence reduction is documented in bariatric-surgery
    cohort studies (SOS / Utah Bariatric — 20-40% relative reduction
    across obesity-cluster sites including breast, endometrial, CRC,
    HCC at 10y follow-up) but causality from behavioural-only weight
    loss is less robustly demonstrated.

