    position: context

do_not_do:
  - "Не пропускати liver disease monitoring у heavy drinkers навіть якщо vidmovlyaiut cessation."
  - "Не виключати breast cancer surveillance у жінок-користувачок alcohol — це окрема indication."

do_not_do_en:
  - "Do not skip liver disease monitoring in heavy drinkers even if they decline cessation."
  - "Do not exclude breast cancer surveillance in women who use alcohol — that is a separate indication."

