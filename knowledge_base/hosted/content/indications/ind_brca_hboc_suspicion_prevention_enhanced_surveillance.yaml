do_not_do:
  - "Не презентувати enhanced surveillance як еквівалент genetic confirmation — diagnostic precision відсутня, і risk-reducing хірургія недоступна emпірично."
  - "Не рекомендувати risk-reducing хірургію (мастектомія / BSO) без genetic confirmation — необхідне підтверджене status носія для виправдання незворотного втручання."
  - "Не пропускати periodic re-discussion про genetic testing — більшість пацієнтів врешті приймають тестування після додаткових візитів, сімейних подій та зменшення тривоги; testing-first шлях клінічно та коштом більш ефективний."
  - "Не презентувати ovarian surveillance (TVUS + CA-125) як ефективний — UKCTOCS дані не показують переваги по смертності; це best-available proxy, а не доказово-підтверджене скринінгове втручання."
  - "Не пропускати male-line розгляд — BRCA2 чоловіки в pedigree мають підвищений ризик і потребують відповідного скринінгу (breast clinical exam, PSA), що часто пропускається у family-history рутинах."

do_not_do_en:
  - "Do not present enhanced surveillance as equivalent to genetic confirmation — diagnostic precision is absent and risk-reducing surgery is unavailable empirically."
  - "Do not recommend risk-reducing surgery (mastectomy / BSO) without genetic confirmation — confirmed carrier status is required to justify these irreversible interventions."
  - "Do not skip periodic re-discussion of genetic testing — most patients eventually accept testing after additional visits, family events, and reduced anxiety; the testing-first pathway is more clinically and cost-effective."
  - "Do not present ovarian surveillance (TVUS + CA-125) as effective — UKCTOCS data do not demonstrate mortality benefit; this is a best-available proxy, not an evidence-supported screening intervention."
  - "Do not skip male-line consideration — BRCA2 men in the pedigree have elevated risk and need appropriate screening (breast clinical exam, PSA), which is often missed in family-history routines."

