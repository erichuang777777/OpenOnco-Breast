expected_outcomes:
  overall_response_rate: >-
    Empirical enhanced surveillance (annual breast MRI from age 25-30
    alternating with mammogram from age 30; transvaginal ultrasound +
    CA-125 q6 months from age 30-35 with documented sensitivity
    limitations; clinical breast exam q6 months): expected to capture
    breast cancer at earliest detectable stage in the subset who are
    actual BRCA / HBOC carriers (~10-25% of pedigree-suspicion
    individuals). Ovarian surveillance has POOR documented sensitivity
    for early-stage disease in both confirmed carriers and empirical
    cohorts — must be framed as inferior to risk-reducing BSO (which
    is only an option after genetic confirmation). Does NOT carry the
    diagnostic certainty of germline testing — carriers receive
    unnecessary intensive surveillance when targeted intervention
    (risk-reducing surgery) would have been preferred; non-carriers
    receive surveillance that could have been safely declined.

