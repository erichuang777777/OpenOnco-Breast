expected_outcomes:
  overall_response_rate: >-
    Diagnostic yield of germline MMR/EPCAM panel testing in pedigree-
    suspicion populations: ~15-25% positive carrier identification
    (varies by criterion stringency — Amsterdam II ~25-50%, single
    relative <50 ~10-15%, PREMM5 ≥5% ~25-30%). Confirmed carrier
    routes to enhanced surveillance with documented mortality benefit:
    colonoscopy q1-2y reduces CRC mortality by ~70%; risk-reducing
    hysterectomy + BSO post-childbearing reduces endometrial and
    ovarian cancer incidence to near-zero.

