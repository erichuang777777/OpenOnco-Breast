rationale: >
  Standard-track prevention pathway for individuals with pedigree
  suspicion of Lynch syndrome. Two parallel referrals:

  **(1) Genetic counseling referral.** Pre-test counseling covers:
  inheritance pattern (autosomal dominant), penetrance (variable by
  gene — MLH1/MSH2 high, MSH6/PMS2 lower), implications for family
  members (cascade testing if positive), insurance / GINA
  considerations, psychological aspects. Per ACMG / ASCO guidelines,
  pre-test counseling is the standard of care before germline testing.

  **(2) Germline MMR/EPCAM panel testing.** Modern multi-gene panels
  (e.g., Invitae Lynch syndrome panel, Color hereditary cancer panel,
  GeneDx OncoGene Comprehensive) cover MLH1, MSH2, MSH6, PMS2, EPCAM
  (3' deletion). Variant classification per ACMG framework: pathogenic
  / likely pathogenic / VUS / likely benign / benign.

  **Tumor MMR/MSI screening** (universal in CRC and endometrial cancer
  per NCCN/ASCO) — if any tumor is available from family members,
  IHC-detected loss of MLH1/MSH2/MSH6/PMS2 protein, MSI-high status, or
  somatic MLH1 promoter methylation provides supporting evidence
  (treatment-persona territory; useful here as an additional pedigree
  signal).

  **Sequel pathway:**
  - Positive carrier → enhanced surveillance per NCCN Genetic/Familial
    High-Risk: Colorectal protocol (colonoscopy q1-2y starting age 25
    or 10y before youngest family CRC dx; endometrial surveillance;
    discussion of risk-reducing hysterectomy/BSO post-childbearing
    age 40+; urothelial / gastric / pancreatic surveillance per
    individual risk).
  - Negative result (no pathogenic / likely-pathogenic variant) →
    general-population screening cadence (USPSTF) +
    re-stratification of any residual family-history risk.
  - VUS result → managed as pedigree-suspicion (this Indication)
    until segregation analysis or functional studies clarify.

  Genetic counseling and germline testing are typically covered by
  insurance in the US/EU when pedigree criteria are met; in Ukraine,
  germline testing is available through private labs at
  out-of-pocket cost (~5000-15000 UAH for multi-gene panel).

rationale_ua: >
  Стандартний-трек prevention шлях для осіб з родовідною підозрою на
  синдром Lynch. Дві паралельні направлення:

  **(1) Направлення на генетичне консультування.** Pre-test
  консультування охоплює: спадкування (аутосомно-домінантне),
  пенетрантність (варіабельна за геном — MLH1/MSH2 високa, MSH6/PMS2
  нижча), наслідки для членів сім'ї (cascade тестування при позитиві),
  страхові / GINA-міркування, психологічні аспекти. За ACMG / ASCO
  настановами, pre-test консультування — standard of care перед
  germline тестуванням.

  **(2) Germline MMR/EPCAM панельне тестування.** Сучасні мультигенні
  панелі (напр., Invitae Lynch syndrome panel, Color hereditary cancer
  panel, GeneDx OncoGene Comprehensive) покривають MLH1, MSH2, MSH6,
  PMS2, EPCAM (3' делеція). Класифікація варіантів за рамкою ACMG:
  патогенний / ймовірно патогенний / VUS / ймовірно доброякісний /
  доброякісний.

  **Tumor MMR/MSI скринінг** (універсальний у КРР і раку ендометрію
  per NCCN/ASCO) — якщо доступна будь-яка пухлина від членів сім'ї,
  IHC-виявлена втрата MLH1/MSH2/MSH6/PMS2 білка, MSI-high статус або
  соматичне MLH1 промотор-метилювання забезпечує підтверджувальний
  доказ (treatment-persona територія; корисне тут як додатковий
  родовідний сигнал).

  **Наступний шлях:**
  - Позитивний носій → посилене спостереження per NCCN протокол
    (колоноскопія q1-2y з 25 років або 10 років до наймолодшого
    сімейного КРР діагнозу; ендометріальне спостереження; обговорення
    risk-reducing гістеректомії/BSO post-childbearing вік 40+;
    уротеліальне / шлункове / панкреатичне спостереження за
    індивідуальним ризиком).
  - Негативний результат (без патогенного / ймовірно-патогенного
    варіанту) → general-population скринінг-частота (USPSTF) +
    ре-стратифікація залишкового сімейно-історичного ризику.
  - VUS результат → ведеться як родовідна підозра (ця Indication) до
    segregation analysis або functional studies.

