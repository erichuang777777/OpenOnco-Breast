sources:
  - source_id: SRC-ESMO-CRC-2024
    position: supports
    relevant_quote_paraphrase: >-
      "Germline testing for Lynch syndrome is recommended for individuals
      meeting Amsterdam II or revised Bethesda criteria, or with PREMM5
      score ≥2.5%. Genetic counseling should precede testing."
  - source_id: SRC-ESGO-ENDOMETRIAL-2025
    position: supports
    relevant_quote_paraphrase: >-
      "Lynch syndrome screening in women with endometrial cancer
      family history; cascade testing of relatives upon positive
      identification."

do_not_do:
  - "Не призначати germline тестування без pre-test консультування — інформована згода, психологічна підготовка обов'язкові."
  - "Не trete VUS результат як патогенний — управляйте як родовідну підозру до подальших даних."
  - "Не призначати risk-reducing хірургію (BSO / hysterectomy) у носіїв без обговорення reproductive-planning + менопаузальних наслідків."
  - "Не презентувати negative-panel результат як zero-risk — residual сімейний-історичний ризик може зберігатися (deep intronic / regulatory варіанти, не покриті панеллю; rare non-Lynch hereditary CRC синдроми)."

do_not_do_en:
  - "Do not order germline testing without pre-test counseling — informed consent and psychological preparation are mandatory."
  - "Do not treat a VUS result as pathogenic — manage as pedigree suspicion pending further data."
  - "Do not recommend risk-reducing surgery (BSO / hysterectomy) in carriers without a discussion of reproductive planning and menopausal sequelae."
  - "Do not present a negative-panel result as zero-risk — residual family-history risk may persist (deep intronic / regulatory variants not covered by panel; rare non-Lynch hereditary CRC syndromes)."

