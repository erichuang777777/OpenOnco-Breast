rationale: >
  Standard-track surveillance for cumulative anthracycline exposure
  ≥250 mg/m². Components per ASCO Cardio-Oncology Survivorship +
  COG-LTFU + ESC 2022 Cardio-Oncology Guidelines:

  **(1) Baseline echocardiogram** within 6-12 months of completing
  anthracycline therapy. Document LVEF + global longitudinal strain
  (GLS) + diastolic function.

  **(2) Serial echocardiogram cadence by risk stratum** —
  - Standard risk (cumulative dose 250-400 mg/m², no concurrent
    trastuzumab, no chest RT, adult, no comorbidities):
    echo q5y lifelong starting year 2 post-completion
  - Higher risk (cumulative dose ≥400 mg/m², concurrent trastuzumab,
    concurrent/prior chest RT, age <18 at exposure OR ≥65 at exposure,
    hypertension/diabetes/CAD): echo q1-2y lifelong
  - GLS surveillance preferred over isolated LVEF — earlier change
    detection
  - BNP / NT-proBNP can complement echo as biochemical signal

  **(3) Symptom-prompted evaluation** — Dyspnea on exertion, orthopnea,
  paroxysmal nocturnal dyspnea, lower-extremity edema, fatigue out of
  proportion: stat echo + BNP + cardiology referral.

  **(4) Early intervention if GLS / LVEF decline** —
  - GLS decline >15% from baseline OR LVEF decline >10% (absolute) AND
    below normal (LVEF <50%): cardiology referral
  - Initiate ACE inhibitor (enalapril, lisinopril) ± beta-blocker
    (carvedilol, bisoprolol) per cardiology
  - SGLT2 inhibitor (dapagliflozin, empagliflozin) per emerging evidence
    for cancer-therapy-related cardiac dysfunction
  - Consider HF specialist consultation

  **(5) Cardioprotective lifestyle counseling** —
  - Avoid smoking (compounds CV risk)
  - Hypertension + diabetes + lipid control per primary care
  - Physical activity per HHS guidelines (cardioprotective + cancer-
    survivor benefit)
  - Avoid recreational/excess alcohol

  **(6) Pregnancy planning counseling** for women of reproductive age —
  pregnancy hemodynamic load can unmask subclinical cardiotoxicity;
  pre-conception cardiology + cardio-OB referral.

  **(7) Concurrent t-AML surveillance** per RF-IATROGENIC-TOPO2-TAML-
  PREVENTION — engine fires both; clinical workflow co-manages cardio
  + hematologic surveillance.

