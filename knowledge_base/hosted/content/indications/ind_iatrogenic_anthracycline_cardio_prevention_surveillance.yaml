do_not_do:
  - "Не покладатися лише на LVEF без GLS — GLS катує subclinical dysfunction earlier."
  - "Не пропускати baseline echo — без baseline, decline cannot be quantified."
  - "Не використовувати дорослий surveillance cadence для pediatric cancer survivors — pediatric ACS lifetime HF risk substantially higher; COG-LTFU mandates more frequent surveillance."
  - "Не призначати pregnancy без pre-conception cardio assessment у women з anthracycline history."
  - "Не пропускати t-AML surveillance — anthracyclines є topo2 inhibitors; both surveillance dimensions необхідні."
  - "Не вважати asymptomatic LV dysfunction 'wait + watch' — early ACE inhibitor + beta-blocker може stabilize або reverse."

do_not_do_en:
  - "Do not rely on LVEF alone without GLS — GLS catches subclinical dysfunction earlier."
  - "Do not skip the baseline echo — without baseline, decline cannot be quantified."
  - "Do not use the adult surveillance cadence for pediatric cancer survivors — pediatric ACS lifetime HF risk is substantially higher; COG-LTFU mandates more frequent surveillance."
  - "Do not approve pregnancy without pre-conception cardio assessment in women with anthracycline history."
  - "Do not skip t-AML surveillance — anthracyclines are topo2 inhibitors; both surveillance dimensions are required."
  - "Do not treat asymptomatic LV dysfunction as 'wait + watch' — early ACE inhibitor + beta-blocker can stabilize or reverse it."

