strength_of_recommendation: conditional
nccn_category: "2B"

expected_outcomes:
  overall_response_rate: "Patient declines structured CBC surveillance schedule — receives symptom-prompted evaluation pathway only. Cytopenias / dysplastic changes may go undetected until overt t-AML/t-MDS presentation, at which point treatment options (especially allogeneic HSCT eligibility) may be more constrained. Outcomes worse than with surveillance-detected disease."

hard_contraindications: []
red_flags_triggering_alternative: []
required_tests: []
desired_tests: []

rationale: >
  Alternative-track companion to IND-IATROGENIC-ALKYLATOR-TAML-
  PREVENTION-SURVEILLANCE. Patient declines structured q3-6mo CBC
  surveillance (clinic-burden, anxiety, surveillance-fatigue post-
  primary-cancer treatment) — receives symptom-vigilance education
  + low-threshold evaluation for any reported symptom (easy bruising,
  prolonged bleeding, persistent fatigue, recurrent infections, fever).
  Per CHARTER §11 patient-autonomy framing — surveillance refusal is a
  legitimate choice but framed as suboptimal vs. scheduled-surveillance
  comparator (which catches t-MDS at treatable cytopenic phase).

rationale_ua: >
  Альтернативно-трекова Indication. Пацієнт відмовляється від structured
  q3-6mo CBC surveillance (clinic-burden, anxiety, surveillance-fatigue
  post-primary-cancer treatment) — отримує symptom-vigilance education +
  low-threshold evaluation при будь-якому reported symptom (easy bruising,
  prolonged bleeding, persistent fatigue, recurrent infections, fever).
  Per CHARTER §11.

