do_not_do:
  - "Не презентувати observation як еквівалент surveillance — surveillance-detected t-MDS має substantially кращі outcomes."
  - "Не пропускати patient education про symptoms — symptom-prompted evaluation залежить від patient awareness."
  - "Не затримувати workup при early cytopenia навіть без structured surveillance schedule."
  - "Не нормалізувати surveillance refusal — counsel що CBC q3-6mo low-burden + high-yield."

do_not_do_en:
  - "Do not present observation as equivalent to surveillance — surveillance-detected t-MDS has substantially better outcomes."
  - "Do not skip patient education about symptoms — symptom-prompted evaluation depends on patient awareness."
  - "Do not delay workup for early cytopenia even without a structured surveillance schedule."
  - "Do not normalize surveillance refusal — counsel that CBC q3-6mo is low-burden and high-yield."

