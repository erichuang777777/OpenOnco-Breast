rationale: >
  Standard-track late-effects surveillance for survivors ≥5y post-
  completion of pediatric pelvic radiotherapy. Components per Children's
  Oncology Group Long-Term Follow-Up Guidelines (COG-LTFU) + Childhood
  Cancer Survivor Study (CCSS) + ACS guideline-augmentation + NCCN
  Bladder Cancer + NCCN Colon/Rectal Cancer:

  **(1) Annual urinalysis + urine cytology** —
  - Both modalities together (each has limited individual sensitivity
    for urothelial carcinoma; complementary detection)
  - Annual cadence lifelong (vs. q1-3y in adult-exposure cohorts)
  - Any unexplained microscopic or gross hematuria → cystoscopy +
    imaging (CT urography preferred)

  **(2) Earlier-onset colorectal cancer screening** —
  - Initiate at age 45 OR 10 years post-RT (whichever is earlier)
  - Colonoscopy as primary screening modality (preferred over FIT in
    this cohort due to elevated lifetime risk)
  - q5y if normal initial, q3-5y if polyps detected
  - Lower threshold for symptomatic evaluation (changed bowel habit,
    rectal bleeding, persistent abdominal pain → colonoscopy)

  **(3) Pelvic-field secondary cancer awareness** —
  - Uterine: annual pelvic exam ± endometrial biopsy if abnormal
    bleeding; consideration of TVUS for those with menstrual changes
  - Ovarian (if ovaries in field — often gonadal-sparing technique used
    but verify): pelvic exam + symptom vigilance
  - Cervical: annual Pap if cervix in field
  - Bone sarcoma in irradiated pelvic bone: persistent pelvic pain or
    palpable mass → urgent imaging (no scheduled bone imaging — symptom-
    driven only)

  **(4) Non-cancer late effects** (co-managed, not primary cancer
  surveillance scope) — renal vascular hypertension, hypogonadism if
  gonads in field, bowel dysfunction (radiation enteritis sequelae),
  bladder fibrosis / capacity reduction, infertility (counsel re:
  reproductive options).

  **(5) Survivorship clinic integration** — pediatric-cancer-survivor
  follow-up clinics provide best-coordinated care; community PCP
  often requires COG-LTFU passport for accurate surveillance schedule.

rationale_ua: >
  Стандартний-трек late-effects surveillance для виживачів ≥5р після
  завершення pediatric pelvic radiotherapy. Components per COG-LTFU
  + CCSS + ACS + NCCN Bladder + NCCN Colon:

  **(1) Щорічний urinalysis + urine cytology** —
  - Обидві modalities разом (комплементарні)
  - Annual cadence lifelong
  - Будь-яка hematuria → cystoscopy + imaging (CT urography preferred)

  **(2) Earlier-onset CRC screening** —
  - Initiate в 45 років АБО 10р post-RT (раніше)
  - Colonoscopy як primary screening modality
  - q5y якщо normal, q3-5y якщо polyps detected
  - Lower threshold для symptomatic evaluation (changed bowel habit,
    rectal bleeding → colonoscopy)

  **(3) Pelvic-field secondary cancer awareness** —
  - Uterine: щорічний pelvic exam ± endometrial biopsy при abnormal
    bleeding
  - Ovarian: pelvic exam + symptom vigilance
  - Cervical: щорічний Pap якщо cervix in field
  - Bone sarcoma в irradiated pelvic bone: persistent pelvic pain
    або palpable mass → urgent imaging

  **(4) Non-cancer late effects** (co-managed) — renal vascular HTN,
  hypogonadism, bowel dysfunction, bladder fibrosis, infertility.

  **(5) Survivorship clinic integration** — pediatric-cancer-survivor
  follow-up clinics best-coordinated; community PCP вимагає COG-LTFU
  passport.

