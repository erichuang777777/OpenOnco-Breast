do_not_do:
  - "Не використовувати general-population USPSTF CRC-screening threshold (45-50) у pediatric pelvic-RT survivors — initiate в 45 АБО 10р post-RT (whichever earlier)."
  - "Не пропускати urine cytology у annual screening — urinalysis alone має нижчу sensitivity для urothelial carcinoma in situ."
  - "Не нормалізувати microscopic hematuria як 'incidental' у pediatric pelvic-RT survivors — warrants cystoscopy + CT urography."
  - "Не пропускати pelvic exam щорічно — uterine + ovarian + cervical secondaries можуть presenter abnormal bleeding або pelvic mass."
  - "Не делегувати pediatric-survivor surveillance non-experienced clinic — COG-LTFU passport документує prior RT field + dose які керують surveillance plan."

do_not_do_en:
  - "Do not use the general-population USPSTF CRC-screening threshold (45-50) in pediatric pelvic-RT survivors — initiate at 45 OR 10y post-RT (whichever is earlier)."
  - "Do not skip urine cytology in annual screening — urinalysis alone has lower sensitivity for urothelial carcinoma in situ."
  - "Do not normalize microscopic hematuria as 'incidental' in pediatric pelvic-RT survivors — warrants cystoscopy + CT urography."
  - "Do not skip the annual pelvic exam — uterine + ovarian + cervical secondaries may present with abnormal bleeding or pelvic mass."
  - "Do not delegate pediatric-survivor surveillance to non-experienced clinics — the COG-LTFU passport documents prior RT field + dose, which drive the surveillance plan."

