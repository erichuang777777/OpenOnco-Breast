expected_outcomes:
  overall_response_rate: "Childhood Cancer Survivor Study (CCSS) + COG-LTFU pediatric pelvic-RT cohorts: cumulative urothelial carcinoma incidence 2-4% at 25-30y post-RT, CRC SIR 3-5× population baseline with cumulative 5-10% at 30y depending on dose + field. Structured surveillance (annual UA + cytology + earlier-onset CRC screening) detects second primaries at earlier stage — meaningfully improved survival vs. symptom-driven late presentation. Pediatric exposure carries higher cumulative lifetime risk vs. adult pelvic RT due to longer time-at-risk."

