do_not_do:
  - "Не презентувати observation як риск-нейтральну — risk-benefit calculus exists."
  - "Не пропускати cervical Pap/HPV co-test screening — HPV cofactor для OCP-cervical association."
  - "Не пропускати mammography per USPSTF cadence — breast risk modest але real під час use."
  - "Не призначати ovarian/endometrial surveillance — protective effect makes it unnecessary."

do_not_do_en:
  - "Do not present observation as risk-neutral — a risk-benefit calculus exists."
  - "Do not skip cervical Pap/HPV co-test screening — HPV cofactor for OCP-cervical association."
  - "Do not skip mammography per USPSTF cadence — breast risk is modest but real during use."
  - "Do not order ovarian/endometrial surveillance — the protective effect makes it unnecessary."

