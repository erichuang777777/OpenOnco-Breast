evidence_level: low
strength_of_recommendation: conditional
nccn_category: "2B"

expected_outcomes:
  overall_response_rate: "Patient declines structured risk-benefit counseling — receives baseline USPSTF cancer screening (cervical Pap/HPV co-test, mammography per age, no routine ovarian/endometrial surveillance). Cancer risk profile unchanged: modest breast + cervical (HPV-cofactor) increment OFFSET by substantial ovarian + endometrial protection during use."

hard_contraindications: []
red_flags_triggering_alternative: []
required_tests: []
desired_tests: []

rationale: >
  Alternative-track companion to IND-REPRODUCTIVE-OCP-LONG-TERM-
  COUNSELING. Patient does not wish to engage with structured risk-
  benefit counseling (counselors unavailable, patient preference,
  family-planning needs override discussion) — receives baseline
  USPSTF cancer screening + symptom-prompted evaluation pathway +
  brief intervention at each clinical contact. Per CHARTER §11
  patient-autonomy framing.

rationale_ua: >
  Альтернативно-трекова Indication. Пацієнт не бажає engaging зі
  structured risk-benefit counseling — отримує baseline USPSTF cancer
  screening + symptom-prompted evaluation + brief intervention на
  кожному клінічному контакті. Per CHARTER §11.

