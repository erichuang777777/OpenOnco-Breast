expected_outcomes:
  overall_response_rate: >-
    Intensified track layers two evidence-supported prophylactic /
    chemoprevention options on top of the standard NCCN surveillance
    protocol. (1) Risk-reducing hysterectomy + bilateral salpingo-
    oophorectomy (BSO) post-childbearing age 40 reduces endometrial
    cancer incidence to near-zero and ovarian cancer incidence by
    ~85-90% in confirmed Lynch female carriers (NCCN Category 2A; no
    OS benefit shown in RCTs, but cancer-specific incidence reduction
    is well documented). (2) Daily aspirin 300-600 mg ≥2 years
    reduces CRC incidence in MLH1 / MSH2 carriers by ~50% (CAPP2
    trial 10-year and 20-year follow-up — Burn et al. 2011, Burn et
    al. 2020; effect size modest in MSH6 / PMS2 carriers). Both
    interventions are appropriate for shared-decision discussion;
    neither is mandated.

