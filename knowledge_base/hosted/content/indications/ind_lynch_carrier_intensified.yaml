sources:
  - source_id: SRC-NCCN-GENETIC-FAMILIAL-CRC-2025
    position: supports
    relevant_quote_paraphrase: >-
      "Risk-reducing hysterectomy and bilateral salpingo-oophorectomy
      should be discussed with confirmed Lynch syndrome women who have
      completed childbearing, typically at age 40-45; daily aspirin
      may be considered for CRC chemoprevention based on CAPP2 trial
      evidence following shared decision-making."
  - source_id: SRC-ASCO-ACMG-LYNCH-2014
    position: supports
    relevant_quote_paraphrase: >-
      "Risk-reducing surgery and chemoprevention with aspirin are
      acceptable options for Lynch carriers; shared decision-making is
      essential."
  - source_id: SRC-ESMO-CRC-2024
    position: supports
    relevant_quote_paraphrase: >-
      "Daily aspirin chemoprevention may be offered to Lynch carriers
      following individualized discussion of bleeding risk per CAPP2
      data; gene-specific (MLH1 / MSH2 stronger evidence) effect
      modification noted."

do_not_do:
  - "Не призначати risk-reducing хірургію або chemoprevention як обов'язкове — це shared-decision-making домен, з повним обговоренням ризик / користь / альтернативи."
  - "Не пропонувати risk-reducing хірургію без обговорення fertility planning та menopausal-sequelae management — HRT post-RRSO у Lynch є clinically acceptable і часто appropriate (Lynch не hormone-driven)."
  - "Не використовувати empirical immune-checkpoint chemoprevention поза clinical trial — currently investigational, не licensed."
  - "Не auto-prescribe аспірин без оцінки bleeding ризику, GI / ниркової функції, конкомітантної антитромбоцитарної / антикоагулянтної терапії."
  - "Не пропускати re-discussion з пацієнтом про intensification options якщо initial decline був motivated тривогою або incomplete information — пацієнти часто переглядають через час."

do_not_do_en:
  - "Do not present risk-reducing surgery or chemoprevention as mandatory — these are shared-decision-making with full discussion of risk / benefit / alternatives."
  - "Do not offer risk-reducing surgery without discussion of fertility planning and menopausal-sequelae management — HRT post-RRSO in Lynch is clinically acceptable and often appropriate (Lynch is not hormone-driven)."
  - "Do not use empirical immune-checkpoint chemoprevention outside a clinical trial — currently investigational and not licensed."
  - "Do not auto-prescribe aspirin without bleeding-risk, GI / renal function, and concomitant antiplatelet / anticoagulant assessment."
  - "Do not skip re-discussion of intensification options with patients whose initial decline was motivated by anxiety or incomplete information — patients often reconsider over time."

