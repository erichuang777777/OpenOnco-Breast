expected_outcomes:
  overall_response_rate: >-
    Praziquantel cure of active O. viverrini infection: 80-95% single
    dose 25 mg/kg PO three times in one day (WHO standard). Cancer-
    prevention endpoint: population-level praziquantel programmes in
    endemic Mekong-basin regions associated with reduced
    cholangiocarcinoma incidence in successor cohorts, BUT praziquantel
    does NOT reverse chronic biliary-tract inflammation / fibrosis from
    prior burden — lifelong hepatobiliary surveillance remains mandatory
    in high-risk individuals.

