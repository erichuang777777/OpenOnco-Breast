rationale: >
  Standard-track prevention pathway for prior or active O. viverrini
  infection. Eradicate active infection with praziquantel 25 mg/kg PO
  three times in one day (WHO standard regimen). Then transition to
  lifelong hepatobiliary surveillance for heavily-exposed cohorts
  (chronic / repeated infection history, endemic-region residence into
  adulthood): liver ultrasound + serum CA 19-9 every 12 months from
  age 40.

  Caveat on CA 19-9: not specific to cholangiocarcinoma; elevated
  values warrant cross-sectional imaging (MRI / MRCP) for further
  characterization. Negative CA 19-9 does NOT exclude
  cholangiocarcinoma — Lewis-antigen-negative individuals (~5-10% of
  population) cannot produce the antigen.

rationale_ua: >
  Стандартний-трек prevention шлях для попередньої або активної
  інфекції O. viverrini. Ерадикація активної інфекції празиквантелом
  25 мг/кг PO тричі за один день (стандарт ВООЗ). Потім перехід до
  пожиттєвого гепатобіліарного спостереження для важко-експонованих
  когорт (хронічна / повторна інфекція, проживання в ендемічному
  регіоні до зрілого віку): УЗД печінки + сироватковий CA 19-9 кожні
  12 міс з 40 років.

  Застереження щодо CA 19-9: не специфічний для
  холангіокарциноми; підвищені значення вимагають крос-секційної
  візуалізації (МРТ / MRCP) для подальшої характеристики. Негативний
  CA 19-9 НЕ виключає холангіокарциному — Lewis-антиген-негативні
  особи (~5-10% популяції) не можуть продукувати антиген.

