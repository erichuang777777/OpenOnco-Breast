  overall_response_rate: >-
    Alternative-track companion. Patient declines structured
    survivorship-program enrollment (geographic access, surveillance
    fatigue, declining intent for late-effect-specific cadence,
    psychological avoidance) — receives routine internal-medicine
    follow-up with age-appropriate population-screening cadence +
    treatment-exposure-summary documentation handed off to primary-
