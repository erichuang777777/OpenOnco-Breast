do_not_do:
  - "Не пропускати treatment-exposure summary handoff до primary-care — навіть при declined-program scenario це highest-value artifact."
  - "Не презентувати routine population-screening як equivalent до survivorship program у exposed cohort — late-effect screening gaps significantly увеличеваять mortality."
  - "Не пропускати symptom-vigilance education для high-risk late effects — pattern-recognition критична коли cadence-based surveillance declined."
  - "Не закривати door на re-engagement — більшість патієнтів eventually engage коли late-effect symptoms emerge."
  - "Не нормалізувати late-onset cardiotoxicity symptoms у anthracycline / chest-RT exposed cohort десятиліттями post-treatment — pattern-recognition різниця між prompt cardiology referral і missed diagnosis."

do_not_do_en:
  - "Do not skip treatment-exposure summary handoff to primary-care — even in declined-program scenarios it is the highest-value artifact."
  - "Do not present routine population-screening as equivalent to survivorship program in the exposed cohort — late-effect screening gaps significantly increase mortality."
  - "Do not skip symptom-vigilance education for high-risk late effects — pattern recognition is critical when cadence-based surveillance is declined."
  - "Do not close the door on re-engagement — most patients eventually engage when late-effect symptoms emerge."
  - "Do not normalize late-onset cardiotoxicity symptoms in the anthracycline / chest-RT exposed cohort decades post-treatment — pattern recognition is the difference between prompt cardiology referral and missed diagnosis."

