sources:
  - source_id: SRC-NCCN-BCELL-2025
    position: context
    relevant_quote_paraphrase: >-
      "Occupational ionizing-radiation cohorts at elevated hematologic
      and solid-tumor risk warrant structured multi-modality
      surveillance and individualized risk-stratification by lifetime
      dose-equivalent tracking."
  - source_id: SRC-NCCN-AML-2025
    position: supports
    relevant_quote_paraphrase: >-
      "Patients with documented occupational ionizing-radiation exposure
      carry elevated AML risk; CBC surveillance and cytopenia-triggered
      marrow evaluation form the operational surveillance standard."

do_not_do:
  - "Не пропускати lifetime dose tracking — це foundational до individualized risk-stratification."
  - "Не екстраполювати thyroid US q3-5y до асимптомної загальної популяції — підтримується тільки для documented occupational cohort."
  - "Не призначати рутинну біопсію кісткового мозку асимптомним пацієнтам — резервується для тривожних цитопеній."
  - "Не пропускати ALARA / PPE counseling для активних робітників — forward-looking benefit зберігається."

do_not_do_en:
  - "Do not skip lifetime dose tracking — it is foundational to individualized risk-stratification."
  - "Do not extrapolate thyroid US q3-5y to the asymptomatic general population — supported only for the documented occupational cohort."
  - "Do not order routine bone-marrow biopsy in asymptomatic patients — reserve for alarm cytopenias."
  - "Do not skip ALARA / PPE counseling for active workers — forward-looking benefit is preserved."

