expected_outcomes:
  overall_response_rate: >-
    Primary endpoint: detection of incident radiation-attributable
    malignancy (myeloid leukemia, thyroid cancer, breast cancer in
    female workers) at earliest treatable stage via structured multi-
    modality surveillance. Foundational evidence from Life Span Study
    (atomic-bomb survivors), UK NRRW (Muirhead 2009), and INWORKS
    (Richardson 2015) pooled cohorts establishes dose-response across
    multiple endpoints. AML excess relative risk per Gy ~1-4 (linear-
    no-threshold baseline). Lifetime dose tracking provides
    individualized risk-stratification anchor.

