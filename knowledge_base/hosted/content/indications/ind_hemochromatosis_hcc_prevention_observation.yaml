do_not_do:
  - "Не використовувати цей шлях у cirrhotic HH — потребують AASLD US/AFP q6 міс."
  - "Не презентувати observation як еквівалент scheduled surveillance у cirrhotic HH — interval-HCC ризик може зсунути за межі Milan."
  - "Не ігнорувати нову decompensation або incidental hepatic mass — імідіат-imaging."
  - "Не використовувати цей шлях у HH з coexisting HBV/HCV."
  - "Не пропускати періодичну elastography — fibrosis progression в HH потребує переходу на standard track."

do_not_do_en:
  - "Do not use this pathway in cirrhotic HH — they require AASLD US/AFP every 6 months."
  - "Do not present observation as equivalent to scheduled surveillance in cirrhotic HH — interval HCC risk may push detection beyond Milan."
  - "Do not ignore new decompensation or incidental hepatic mass — immediate imaging."
  - "Do not use this pathway in HH with coexisting HBV/HCV."
  - "Do not skip periodic elastography — fibrosis progression in HH warrants transition to the standard track."

