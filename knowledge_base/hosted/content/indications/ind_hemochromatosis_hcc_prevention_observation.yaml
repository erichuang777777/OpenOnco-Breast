rationale: >
  Alternative-track companion to IND-HEMOCHROMATOSIS-HCC-PREVENTION-
  SURVEILLANCE. Appropriate primarily for non-cirrhotic
  iron-controlled HFE-positive patients (where HCC surveillance has
  very low yield given near-baseline incidence) and for cirrhotic HH
  patients who choose minimum-intensity surveillance after informed-
  consent discussion.

  **Cadence:**
    - Hepatology / hematology follow-up per usual cadence (q6-12mo)
      with examination, ferritin + transferrin saturation + iron
      studies, LFT panel, INR, platelets, CBC, fasting glucose, TSH,
      testosterone in men
    - Maintenance phlebotomy q2-4mo as needed to keep ferritin
      50-100 ng/mL
    - HCC-focused imaging (US, MRI) only when triggered by:
      - New hepatic decompensation (ascites, encephalopathy, jaundice)
      - LFT pattern change (rising AFP, new hepatic mass on
        examination, new RUQ pain)
      - New thrombocytopenia or worsening synthetic dysfunction
      - Patient becomes cirrhotic on elastography (transitions to
        IND-HEMOCHROMATOSIS-HCC-PREVENTION-SURVEILLANCE)

  **Not appropriate for:**
    - Cirrhotic HH patients with documented synthetic dysfunction or
      portal hypertension — meet AASLD HCC surveillance criteria;
      should be on the standard track
    - HH with concurrent HBV or HCV infection (HCC risk multiplied;
      separate RF surveillance applies)
    - HH with poor phlebotomy adherence and ongoing iron overload
      (high progression risk; needs more intensive engagement)
    - Patients with prior history of HCC (post-treatment surveillance
      per DIS-HCC algorithm, not prevention)

  Per CHARTER §11 patient-autonomy framing: non-cirrhotic
  iron-controlled HH carries near-population HCC risk; symptom-driven
  observation is a defensible default for this subset. For cirrhotic
  HH, informed-consent observation is a patient-choice option but the
  trade-off (missed early-stage HCC, later transplant ineligibility
  if outside Milan at detection) must be explicitly discussed and
  documented.

  **Alarm features** route immediately to abdominal imaging (US/MRI/
  CT) ± biopsy — and if HCC is confirmed, to the treatment-persona
  algorithm via DIS-HCC.

rationale_ua: >
  Альтернативно-трекова Indication — компаньйон до
  IND-HEMOCHROMATOSIS-HCC-PREVENTION-SURVEILLANCE. Доречно переважно
  для non-cirrhotic iron-controlled HFE-позитивних пацієнтів (де
  HCC surveillance має дуже низький yield) та для cirrhotic HH
  пацієнтів, які обирають мінімальної інтенсивності спостереження
  після informed-consent обговорення.

  **Частота:**
    - Hepatology / hematology follow-up per usual частотою (q6-12 міс)
      з обстеженням, ferritin + transferrin saturation + iron studies,
      LFT, INR, тромбоцити, CBC, fasting glucose, ТТГ, тестостерон
    - Підтримуюча phlebotomy q2-4 міс (ferritin 50-100 нг/мл)
    - HCC-focused imaging (US, MRI) лише при триггері:
      - Нова hepatic decompensation
      - LFT pattern change (зростаюче AFP, нова hepatic mass)
      - Нова тромбоцитопенія
      - Пацієнт стає cirrhotic на elastography (переходить на
        IND-HEMOCHROMATOSIS-HCC-PREVENTION-SURVEILLANCE)

  **Не доречно для:**
    - Cirrhotic HH з документованою synthetic dysfunction або
      портальною гіпертензією — задовольняють AASLD surveillance
    - HH з coexisting HBV або HCV
    - HH з поганою phlebotomy adherence
    - Пацієнтів з попередньою історією HCC

  Per CHARTER §11 framing автономії пацієнта: non-cirrhotic iron-
  controlled HH несе near-population HCC ризик; symptom-driven
  observation — defensible default. Для cirrhotic HH informed-consent
  observation — patient-choice опція з явним обговоренням trade-off.

  **Alarm features** маршрутизують негайно до абдомінального imaging.

