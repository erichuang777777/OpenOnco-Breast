do_not_do:
  - "Не презентувати observation як еквівалент cooling intervention — ESCC incidence reduction не досягається."
  - "Не пропускати alcohol + tobacco screening — synergistic compound risk важливо address."
  - "Не затримувати endoscopic workup при early dysphagia."
  - "Не нормалізувати hot-beverage consumption як culturally fixed — counsel що temperature, не beverage type, має значення."

do_not_do_en:
  - "Do not present observation as equivalent to cooling intervention — ESCC incidence reduction is not achieved."
  - "Do not skip alcohol + tobacco screening — synergistic compound risk is important to address."
  - "Do not delay endoscopic workup for early dysphagia."
  - "Do not normalize hot-beverage consumption as culturally fixed — counsel that temperature, not beverage type, is what matters."

