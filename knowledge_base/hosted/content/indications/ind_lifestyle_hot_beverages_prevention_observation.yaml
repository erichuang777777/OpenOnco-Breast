nccn_category: "2B"

expected_outcomes:
  overall_response_rate: "Continued very-hot-beverage consumption: thermal injury + chronic inflammation in esophageal epithelium continues. Symptom-prompted endoscopic evaluation captures disease earlier but does not reduce incidence."

hard_contraindications: []
red_flags_triggering_alternative: []

required_tests: []
desired_tests: []

rationale: >
  Alternative-track companion to IND-LIFESTYLE-HOT-BEVERAGES-PREVENTION-
  COOLING. Patient declines temperature modification (cultural ritual,
  preference) — receives co-modifiable risk factor screening (alcohol,
  tobacco) + symptom-vigilance education (dysphagia, odynophagia,
  unexplained weight loss → immediate workup) + brief intervention with
  each clinical contact. Per CHARTER §11 patient-autonomy framing.

rationale_ua: >
  Альтернативно-трекова Indication. Пацієнт відмовляється від temperature
  modification — отримує co-modifiable risk factor screening + symptom-
  vigilance education (дисфагія, odynophagia, unexplained weight loss →
  immediate workup) + brief intervention. Per CHARTER §11.

