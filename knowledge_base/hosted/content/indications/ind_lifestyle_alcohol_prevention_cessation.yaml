do_not_do:
  - "Не пропускати FIB-4 / fibrosis assessment у heavy drinkers — silent cirrhosis common."
  - "Не використовувати disulfiram у пацієнтів з coronary artery disease (cardiotoxic interaction with alcohol)."
  - "Не очікувати reduction breast cancer risk до baseline — cessation запобігає incremental ризик."
  - "Не ігнорувати alcohol-tobacco synergy — combined cessation важливіша ніж кожне окремо."

do_not_do_en:
  - "Do not skip FIB-4 / fibrosis assessment in heavy drinkers — silent cirrhosis is common."
  - "Do not use disulfiram in patients with coronary artery disease (cardiotoxic interaction with alcohol)."
  - "Do not expect breast cancer risk reduction to baseline — cessation prevents incremental risk."
  - "Do not ignore alcohol-tobacco synergy — combined cessation more impactful than either alone."

