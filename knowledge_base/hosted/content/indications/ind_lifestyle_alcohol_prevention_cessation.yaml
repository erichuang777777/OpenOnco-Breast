  - TEST-LDH

rationale: >
  Standard-track prevention pathway for heavy alcohol use. Components:

  **(1) Structured cessation / moderation counseling** — brief intervention by
  primary clinician + referral to addiction-medicine specialist if dependence.
  AUDIT-C screening + motivational interviewing.

  **(2) Pharmacotherapy for alcohol use disorder** (per AAP / SAMHSA):
  - Naltrexone (oral or extended-release IM) — first-line
  - Acamprosate — alternative; renal-adjusted dosing
  - Disulfiram — only with reliable adherence support
  - Off-label: gabapentin, topiramate, ondansetron

  **(3) Liver disease evaluation** — FIB-4 + transient elastography for staging
  alcohol-related liver disease. If cirrhosis confirmed → HCC surveillance
  (US + AFP q6mo per AASLD) — routes to broader HCC-surveillance pathway.

  **(4) Targeted cancer screening** — endoscopy for heavy-drinking + tobacco-
  using cohort to evaluate esophageal SCC risk. Breast cancer screening per
  USPSTF cadence for women.

  Combined cessation + targeted screening produces meaningful cancer-
  incidence reduction in heavy-drinking cohorts.

rationale_ua: >
  Стандартний-трек prevention шлях для важкого вживання алкоголю.

  **(1) Структуроване припинення / помірність** — brief intervention +
  направлення до addiction-medicine specialist при залежності. AUDIT-C
  screening + motivational interviewing.

  **(2) Фармакотерапія alcohol use disorder** — налтрексон (per oral or
  extended-release IM) перша лінія; acamprosate альтернатива; disulfiram
  з reliable adherence support.

  **(3) Оцінка хвороби печінки** — FIB-4 + transient elastography. При
  цирозі → HCC surveillance (УЗ + AFP q6mo per AASLD).

  **(4) Targeted cancer screening** — ендоскопія для heavy-drinking +
  tobacco-using cohort. Breast cancer screening per USPSTF cadence.

