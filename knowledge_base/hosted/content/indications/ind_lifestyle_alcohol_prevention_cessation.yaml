nccn_category: "1"

expected_outcomes:
  overall_response_rate: "Alcohol cessation in heavy drinkers reduces HCC incidence by ~50% over 10 years post-cessation in those without established cirrhosis. Head + neck + esophageal SCC incidence reduction follows cessation with similar lag. Breast cancer risk in women does not return to baseline but cessation prevents incremental dose-dependent risk increase."

