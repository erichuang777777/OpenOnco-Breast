rationale: >
  Alternative-track companion to IND-CELIAC-REFRACTORY-EATL-PREVENTION-SURVEILLANCE.
  Used when intensive q1-2y small-bowel imaging is impractical (cost, access,
  geographic distance from specialty center) — adopts symptom-driven evaluation +
  annual CBC + strict GFD adherence. Per CHARTER §11 patient-autonomy framing.

