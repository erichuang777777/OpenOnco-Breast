sources:
  - source_id: SRC-NCCN-BCELL-2025
    position: context
    relevant_quote_paraphrase: >-
      "Patients declining intensified surveillance for occupational
      carcinogen cohorts continue to receive symptom-triggered evaluation
      and standard-of-care general-population screening."
  - source_id: SRC-NCCN-NSCLC-2025
    position: context
    relevant_quote_paraphrase: >-
      "Multi-modality surveillance pathways are subject to patient-
      autonomy and shared-decision-making considerations; partial
      acceptance (e.g., dermatology without LDCT) is acceptable."

do_not_do:
  - "Не презентувати observation як еквівалент multi-modality surveillance — PAH-attributable excess ризик не адресується."
  - "Не ігнорувати alarm features (chest симптоми, гематурія, неcicатризуючі ураження шкіри на PAH-контактних ділянках) — immediate evaluation."
  - "Не використовувати цей шлях як стандарт першої лінії — intensified-surveillance трек залишається preferred."
  - "Не пропускати counseling щодо припинення куріння — рекомендація актуальна незалежно від surveillance-track вибору."

do_not_do_en:
  - "Do not present observation as equivalent to multi-modality surveillance — PAH-attributable excess risk is unaddressed."
  - "Do not ignore alarm features (chest symptoms, hematuria, non-healing skin lesions on PAH-contact areas) — immediate evaluation."
  - "Do not use this pathway as a first-line standard — the intensified-surveillance track remains the preferred recommendation."
  - "Do not skip smoking-cessation counseling — the recommendation is relevant regardless of surveillance-track choice."

