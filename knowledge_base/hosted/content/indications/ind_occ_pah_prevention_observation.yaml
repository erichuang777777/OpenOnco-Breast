expected_outcomes:
  overall_response_rate: >-
    Primary endpoint: avoidance of multi-modality intensified surveillance
    (LDCT + urinalysis + dermatology) when patient declines structured
    pathway. No reduction in PAH-attributable lung / bladder / cutaneous
    cancer incidence beyond what routine general-population care
    provides. Smoking-cessation counseling remains appropriate regardless
    of surveillance-track choice.

