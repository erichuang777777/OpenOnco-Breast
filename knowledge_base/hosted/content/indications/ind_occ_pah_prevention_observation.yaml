rationale: >
  Alternative-track companion to IND-OCC-PAH-PREVENTION-INTENSIFIED-
  SURVEILLANCE. Patient with documented prior occupational PAH-rich
  exposure who declines multi-modality intensified surveillance — for
  any reason (cost across multiple surveillance modalities, anxiety
  from layered surveillance burden, preference, geographic access
  constraints to dermatology + LDCT centers, life expectancy) — is
  offered routine general-population screening only:

  **Lung-cancer screening:** Apply USPSTF 2021 criteria unmodified.
  Patient is explicitly informed that PAH-attributable excess risk is
  unaddressed.

  **Bladder-cancer screening:** None scheduled — no validated general-
  population modality; urinalysis obtained only on routine primary-
  care visit or symptomatic presentation.

  **Skin-cancer screening:** None scheduled — patient counseled to
  perform monthly self-skin-checks and to report new / changing
  lesions, but without proactive professional dermatology cadence.

  **Smoking cessation:** Still offered — PAH × tobacco interaction
  remains clinically substantive.

  **Symptom-triggered evaluation:** Low threshold for diagnostic
  workup if alarm features develop (chest symptoms; gross / microscopic
  hematuria; non-healing skin lesion or hyperkeratotic plaque on PAH-
  contact area).

  Routing reconsiderations: patient may revisit intensified-surveillance
  pathway at any subsequent visit, in whole or in part (e.g., agree
  to dermatology alone). Per CHARTER §11 patient-autonomy framing:
  multi-modality surveillance is a shared-decision-making domain.

rationale_ua: >
  Альтернативно-трекова Indication — компаньйон до IND-OCC-PAH-
  PREVENTION-INTENSIFIED-SURVEILLANCE. Пацієнт з документованим
  попереднім професійним PAH-rich впливом, який відмовляється від
  multi-modality intensified surveillance (вартість через декілька
  surveillance modalities, тривога від layered surveillance burden,
  перевага, географічні обмеження до dermatology + LDCT центрів),
  отримує тільки рутинний загальнопопуляційний скринінг:

  **Скринінг раку легень:** Застосовувати USPSTF 2021 без модифікації.
  Пацієнт явно інформований, що PAH-attributable excess ризик не
  адресується.

  **Скринінг раку сечового міхура:** Не запланований — валідованої
  загальнопопуляційної модальності немає; urinalysis отримується тільки
  на рутинному візиті до первинної медичної допомоги або при
  симптоматичній презентації.

  **Скринінг раку шкіри:** Не запланований — пацієнту радять виконувати
  щомісячні self-skin-checks та повідомляти про нові / змінювальні
  ураження, але без проактивної професійної dermatology частоти.

  **Припинення куріння:** Все ще пропонується — PAH × тютюн взаємодія
  залишається клінічно суттєвою.

  **Symptom-triggered оцінка:** Низький поріг для діагностичного
  workup при появі alarm features.

  Reroute: пацієнт може повернутися до інтенсифікованого спостереження
  на будь-якому подальшому візиті, в цілому або частково. Per CHARTER
  §11 — shared-decision-making domain.

