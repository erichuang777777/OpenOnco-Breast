do_not_do:
  - "Не презентувати observation як еквівалент structured surveillance — late-presentation HF outcomes worse."
  - "Не пропускати cardioprotective lifestyle counseling — навіть якщо surveillance declined, modifiable risk factors important."
  - "Не нормалізувати mild dyspnea на exertion як 'deconditioning' — у anthracycline-exposed patients warrants stat echo."
  - "Не пропускати t-AML symptom-vigilance education — anthracycline exposure also triggers RF-IATROGENIC-TOPO2-TAML-PREVENTION."

do_not_do_en:
  - "Do not present observation as equivalent to structured surveillance — late-presentation HF outcomes are worse."
  - "Do not skip cardioprotective lifestyle counseling — even if surveillance is declined, modifiable risk factors are important."
  - "Do not normalize mild dyspnea on exertion as 'deconditioning' — in anthracycline-exposed patients this warrants a stat echo."
  - "Do not skip t-AML symptom-vigilance education — anthracycline exposure also triggers RF-IATROGENIC-TOPO2-TAML-PREVENTION."

