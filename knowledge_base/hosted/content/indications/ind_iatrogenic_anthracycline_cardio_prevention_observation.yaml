  - TEST-CBC
desired_tests: []

rationale: >
  Alternative-track companion to IND-IATROGENIC-ANTHRACYCLINE-CARDIO-
  PREVENTION-SURVEILLANCE. Patient declines structured echo surveillance
  schedule (surveillance fatigue post-primary treatment, no perceived
  symptoms, financial/access barrier) — receives symptom-vigilance
  education (dyspnea on exertion, orthopnea, paroxysmal nocturnal
  dyspnea, lower-extremity edema, fatigue out of proportion → stat
  echo + BNP + cardiology referral) + cardioprotective lifestyle
  counseling (smoking cessation, BP/lipid/glucose control, physical
  activity, alcohol moderation). Per CHARTER §11 patient-autonomy
  framing — surveillance refusal is a legitimate choice but framed as
  suboptimal vs. scheduled-surveillance comparator.

rationale_ua: >
  Альтернативно-трекова Indication. Пацієнт відмовляється від structured
  echo surveillance schedule — отримує symptom-vigilance education
  (dyspnea, orthopnea, PND, edema, fatigue → stat echo + BNP + cardiology
  referral) + cardioprotective lifestyle counseling. Per CHARTER §11.

