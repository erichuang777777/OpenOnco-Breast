expected_outcomes:
  overall_response_rate: "Patient declines structured cardio-surveillance schedule — receives symptom-prompted evaluation only. Asymptomatic LV dysfunction may progress to symptomatic HF before detection. Outcomes substantially worse with late-presentation HF vs. surveillance-detected early dysfunction (early ACE inhibitor / beta-blocker / SGLT2-i can stabilize or reverse subclinical disease)."

