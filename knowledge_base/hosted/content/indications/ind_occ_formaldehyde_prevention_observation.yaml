rationale: >
  Alternative-track companion to IND-OCC-FORMALDEHYDE-PREVENTION-
  INTENSIFIED-SURVEILLANCE. Patient with documented prior occupational
  formaldehyde exposure who declines structured CBC + ENT-symptom-
  tracking surveillance — for any reason (cost, anxiety from frequent
  bloodwork, geographic access, preference, life expectancy) — is
  offered routine general-population care only:

  **Hematologic surveillance:** None scheduled; CBC obtained only in
  the context of routine primary-care visits or symptomatic
  presentation. Patient is explicitly informed that formaldehyde-
  attributable AML risk is unaddressed by structured surveillance.

  **ENT surveillance:** None scheduled; patient counseled to report
  unilateral epistaxis, persistent nasal obstruction, anosmia, or
  facial pain — but without proactive symptom-review cadence.

  **Exposure cessation:** Still offered if active exposure persists;
  cessation is the only lever with clear forward-looking benefit
  regardless of imaging / lab-track choice.

  **Symptom-triggered evaluation:** Low threshold for diagnostic
  workup if alarm features develop (cytopenia on incidental CBC,
  unilateral epistaxis, persistent unilateral sinusitis, anosmia,
  fatigue out of proportion to comorbidities).

  Routing reconsiderations: patient may revisit intensified-surveillance
  pathway at any subsequent visit. Per CHARTER §11 patient-autonomy
  framing: structured surveillance is a shared-decision-making domain
  where modest incidence-detection benefit must be weighed against
  patient preference and access constraints.

rationale_ua: >
  Альтернативно-трекова Indication — компаньйон до IND-OCC-FORMALDEHYDE-
  PREVENTION-INTENSIFIED-SURVEILLANCE. Пацієнт з документованим
  попереднім професійним впливом формальдегіду, який відмовляється від
  структурованого CBC + ENT-symptom-tracking спостереження (вартість,
  тривога, географічні обмеження, перевага), отримує тільки рутинний
  загальнопопуляційний догляд:

  **Гематологічне спостереження:** Не заплановане; CBC отримується
  тільки в контексті рутинних візитів до первинної медичної допомоги
  або симптоматичної презентації.

  **ENT-спостереження:** Не заплановане; пацієнту радять повідомляти
  про однобічну епістаксис, persistent назальну обструкцію, аносмію
  або лицевий біль — але без проактивної symptom-review частоти.

  **Припинення впливу:** Все ще пропонується, якщо активний вплив
  зберігається — це єдиний важіль з чіткою forward-looking вигодою.

  **Symptom-triggered оцінка:** Низький поріг для діагностичного
  workup при появі alarm features.

  Reroute: пацієнт може повернутися до інтенсифікованого спостереження
  на будь-якому подальшому візиті. Per CHARTER §11 — shared-decision-
  making domain.

