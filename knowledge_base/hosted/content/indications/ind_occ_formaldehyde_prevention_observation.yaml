    position: context
    relevant_quote_paraphrase: >-
      "Patients declining structured surveillance for occupational
      hematologic-cancer risk continue to receive symptom-triggered
      evaluation and standard-of-care general-population follow-up."
  - source_id: SRC-NCCN-AML-2025
    position: context
    relevant_quote_paraphrase: >-
      "Hematologic surveillance in occupational-exposure cohorts is a
      shared-decision-making process; declining structured CBC does not
      preclude symptom-triggered evaluation."

do_not_do:
  - "Не презентувати observation як еквівалент структурованого нагляду — formaldehyde-attributable ризик AML / NPC не адресується."
  - "Не ігнорувати alarm features (цитопенія, однобічна епістаксис, persistent обструкція, аносмія) — immediate діагностична оцінка + multidisciplinary review."
  - "Не використовувати цей шлях як стандарт першої лінії — intensified-surveillance трек залишається preferred для formaldehyde-exposed cohort."
  - "Не пропускати exposure-cessation counseling якщо активний вплив зберігається — forward-looking benefit зберігається."

do_not_do_en:
  - "Do not present observation as equivalent to structured surveillance — formaldehyde-attributable AML / NPC risk is unaddressed."
  - "Do not ignore alarm features (cytopenia, unilateral epistaxis, persistent obstruction, anosmia) — immediate diagnostic evaluation + multidisciplinary review."
  - "Do not use this pathway as a first-line standard — the intensified-surveillance track remains the preferred recommendation for the formaldehyde-exposed cohort."
  - "Do not skip exposure-cessation counseling if active exposure persists — forward-looking benefit is preserved."

