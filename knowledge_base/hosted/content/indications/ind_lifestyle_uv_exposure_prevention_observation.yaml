recommended_regimen: null
concurrent_therapy: []
followed_by: []

evidence_level: low
strength_of_recommendation: conditional
nccn_category: "2B"

expected_outcomes:
  overall_response_rate: "Continued UV exposure without protection: cumulative melanoma + NMSC incidence climbs with each year of exposure. Skin examination alone (without UV-protection behavior change) shifts diagnosis-stage earlier but does not reduce incidence."

hard_contraindications: []
red_flags_triggering_alternative: []

required_tests: []
desired_tests: []

rationale: >
  Alternative-track companion to IND-LIFESTYLE-UV-EXPOSURE-PREVENTION-
  PROTECTION. Patient declines structured UV-protection program
  (occupation, recreational preference, body-image concerns) — receives
  age- and risk-appropriate clinical skin exam + skin self-exam
  education + brief intervention with each clinical contact. Per
  CHARTER §11 patient-autonomy framing — UV exposure is a legitimate
  patient choice but framed as suboptimal vs. protected comparator.

rationale_ua: >
  Альтернативно-трекова Indication. Пацієнт відмовляється від structured
  UV-protection program — отримує age- + risk-appropriate clinical skin
  exam + SSE education + brief intervention на кожному клінічному
  контакті. Per CHARTER §11.

ukrainian_review_status: pending_clinical_signoff
