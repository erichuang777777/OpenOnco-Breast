  - source_id: SRC-NCCN-SKIN-2025
    position: context

do_not_do:
  - "Не презентувати observation як еквівалент UV-protection — melanoma + NMSC incidence reduction не досягається."
  - "Не виключати пацієнта зі skin exam через odmovu від UV protection — surveillance залишається indicated незалежно."
  - "Не пропускати ABCDE counseling — SSE без criteria має поганий yield для early melanoma detection."
  - "Не нормалізувати tanning-bed use навіть якщо пацієнт відмовляється кинути — clearly counsel continued risk."

do_not_do_en:
  - "Do not present observation as equivalent to UV protection — melanoma + NMSC incidence reduction is not achieved."
  - "Do not exclude a patient from skin exam because of UV-protection refusal — surveillance remains indicated regardless."
  - "Do not skip ABCDE counseling — SSE without criteria has poor yield for early melanoma detection."
  - "Do not normalize tanning-bed use even if the patient declines to stop — clearly counsel continued risk."

