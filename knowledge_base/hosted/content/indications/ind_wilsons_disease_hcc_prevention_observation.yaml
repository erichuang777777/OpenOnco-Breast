expected_outcomes:
  overall_response_rate: >-
    Hepatology-driven observation (chelation continuation + LFT
    monitoring; no scheduled US/MRI HCC-surveillance imaging) is
    appropriate for non-cirrhotic Wilson's where HCC incidence remains
    very low (<0.1%/year). For cirrhotic Wilson's, this pathway falls
    below AASLD best-practice (~1%/year HCC incidence meets q6mo
    surveillance threshold); included only as informed-consent
    minimum-intensity option for patients who decline imaging.

