do_not_do:
  - "Не використовувати цей шлях у cirrhotic Wilson — потребують запланованої US/AFP q6 міс."
  - "Не презентувати observation як еквівалент scheduled surveillance у cirrhotic Wilson — interval-HCC ризик може зсунути за межі Milan з втратою transplant eligibility."
  - "Не ігнорувати нову decompensation або incidental hepatic mass — імідіат-imaging."
  - "Не використовувати цей шлях у Wilson з coexisting HBV/HCV — HCC ризик multiplicatively підвищений."
  - "Не пропускати періодичне обговорення upgrade — cirrhotic Wilson на даному шляху повинен переглядатися щорічно."

do_not_do_en:
  - "Do not use this pathway in cirrhotic Wilson's — they require scheduled US/AFP every 6 months."
  - "Do not present observation as equivalent to scheduled surveillance in cirrhotic Wilson's — interval HCC risk may push detection beyond Milan with loss of transplant eligibility."
  - "Do not ignore new decompensation or incidental hepatic mass — immediate imaging."
  - "Do not use this pathway in Wilson's with coexisting HBV/HCV — HCC risk is multiplicatively elevated."
  - "Do not skip periodic re-discussion of upgrade — cirrhotic Wilson's on this pathway should be revisited annually."

