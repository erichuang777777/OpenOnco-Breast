rationale: >
  Alternative-track companion to IND-WILSONS-DISEASE-HCC-PREVENTION-
  SURVEILLANCE. Appropriate primarily for non-cirrhotic Wilson's
  patients (where HCC surveillance has very low yield) and for
  cirrhotic Wilson's patients who choose minimum-intensity surveillance
  for any of: cost / access constraints, severe procedural anxiety,
  geographic distance to imaging center, very advanced age or
  comorbidity with limited life expectancy, or explicit preference
  after informed-consent discussion of trade-offs.

  **Cadence:**
    - Hepatology follow-up per usual cadence (q6-12mo) with examination,
      LFT panel, INR, platelets, ceruloplasmin/serum copper, 24h
      urinary copper (every 6-12mo for chelation adherence)
    - HCC-focused imaging (US, MRI) only when triggered by:
      - New hepatic decompensation (ascites, encephalopathy, jaundice)
      - LFT pattern change (rising AFP, new hepatic mass on abdominal
        examination, new RUQ pain)
      - New thrombocytopenia or worsening synthetic dysfunction
      - Patient elects to upgrade to scheduled surveillance

  **Not appropriate for:**
    - Cirrhotic Wilson's patients with documented synthetic
      dysfunction or portal hypertension (these meet AASLD HCC
      surveillance criteria)
    - Wilson's with concurrent HBV or HCV infection (HCC risk
      multiplied; separate RF surveillance applies)
    - Wilson's with prior history of HCC (post-treatment surveillance
      per DIS-HCC algorithm, not prevention)
    - Wilson's with poor chelation adherence and ongoing hepatic
      injury (high progression risk)

  Per CHARTER §11 patient-autonomy framing: non-cirrhotic Wilson's
  patients carry very low absolute HCC risk and are reasonable
  candidates for symptom-driven observation. For cirrhotic Wilson's
  patients, informed-consent observation is defensible as a
  patient-choice option but the trade-off (missed early-stage HCC,
  later transplant ineligibility if outside Milan at detection) must
  be explicitly discussed.

  **Alarm features** route immediately to abdominal imaging (US/MRI/CT)
  ± biopsy — and if HCC is confirmed, to the treatment-persona
  algorithm via DIS-HCC.

rationale_ua: >
  Альтернативно-трекова Indication — компаньйон до
  IND-WILSONS-DISEASE-HCC-PREVENTION-SURVEILLANCE. Доречно переважно
  для non-cirrhotic Вільсон-пацієнтів (де HCC surveillance має дуже
  низький yield) та для cirrhotic Вільсон-пацієнтів, які обирають
  мінімальної інтенсивності спостереження з причин: вартість / доступ,
  важка процедурна тривога, географічна відстань, дуже похилий вік
  або коморбідність з обмеженою тривалістю життя.

  **Частота:**
    - Hepatology follow-up per usual частотою (q6-12 міс) з
      обстеженням, LFT, INR, тромбоцитами, ceruloplasmin/serum copper,
      24-год urinary copper
    - HCC-focused imaging (US, MRI) лише при триггері:
      - Нова hepatic decompensation (асцит, encephalopathy, жовтяниця)
      - LFT pattern change (зростаюче AFP, нова hepatic mass на
        абдомінальному обстеженні, новий RUQ біль)
      - Нова тромбоцитопенія або погіршення synthetic dysfunction
      - Пацієнт обирає upgrade до scheduled surveillance

  **Не доречно для:**
    - Cirrhotic Вільсон-пацієнтів з документованою synthetic dysfunction
      або портальною гіпертензією — задовольняють AASLD HCC surveillance
    - Вільсон з coexisting HBV або HCV
    - Вільсон з попередньою історією HCC
    - Вільсон з поганою chelation adherence

  Per CHARTER §11 framing автономії пацієнта: non-cirrhotic Вільсон —
  дуже низький абсолютний HCC ризик. Для cirrhotic Вільсон —
  informed-consent observation defensible як patient-choice опція з
  явним обговоренням trade-off (пропущений early-stage HCC).

  **Alarm features** маршрутизують негайно до абдомінального imaging.

