id: IND-OCC-VINYL-CHLORIDE-PREVENTION-SURVEILLANCE
plan_track: standard
intent: prevention

applicable_to:
  disease_id: DIS-HCC
  stage_requirements: []
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints: {ecog_max: 3}

triggered_by_redflags:
  - RF-OCC-VINYL-CHLORIDE-MALIGNANCY-PREVENTION

recommended_regimen: null
concurrent_therapy: []
followed_by: []

evidence_level: moderate
strength_of_recommendation: strong
nccn_category: "2A"

expected_outcomes:
  overall_response_rate: "Liver US + AFP q6mo (AASLD HCC surveillance protocol adapted for VCM-exposed cohort) detects early-stage angiosarcoma and HCC; trade-off — angiosarcoma is highly aggressive, even early detection has limited mortality benefit."

hard_contraindications: []
red_flags_triggering_alternative: []

required_tests: [TEST-CBC, TEST-LFT]
desired_tests: []

rationale: >
  Standard-track surveillance for documented occupational vinyl chloride
  exposure. Doppler liver US + AFP q6mo (extending AASLD HCC surveillance
  protocol to this etiologically distinct cohort). Smoking cessation
  counseling continues. Refer to hepatology for occupational-medicine
  consultation.

rationale_ua: >
  Стандартний-трек surveillance для documented occupational VCM exposure.
  Doppler liver US + AFP q6mo. Smoking cessation. Hepatology consult.

