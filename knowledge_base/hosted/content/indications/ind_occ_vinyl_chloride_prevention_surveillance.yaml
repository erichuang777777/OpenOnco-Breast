  - "Не використовувати тільки AFP — angiosarcoma часто AFP-negative; imaging має пріоритет."

do_not_do_en:
  - "Do not skip hepatology consultation in VCM-exposed cohort — angiosarcoma diagnosis is difficult."
  - "Do not use AFP alone — angiosarcoma is often AFP-negative; imaging has priority."

