sources:
  - source_id: SRC-NCCN-BCELL-2025
    position: context
    relevant_quote_paraphrase: >-
      "Occupational carcinogen-exposure cohorts at elevated lung-cancer
      risk warrant risk-adjusted LDCT surveillance distinct from
      general-population USPSTF criteria."
  - source_id: SRC-NCCN-NSCLC-2025
    position: supports
    relevant_quote_paraphrase: >-
      "Annual low-dose CT lung-cancer screening is recommended for
      individuals at elevated lung-cancer risk by age, smoking history,
      and (per Clinical Practice Guidelines extension) occupational
      carcinogen exposure including respirable crystalline silica."

do_not_do:
  - "Не пропускати HRCT при функціональних / симптоматичних знахідках, узгоджених із силікозом — силікоз сам по собі — маркер підвищеного ризику."
  - "Не екстраполювати USPSTF без модифікації для silicosis-affected пацієнтів — нижчий поріг LDCT обґрунтований."
  - "Не пропускати counseling щодо припинення куріння — silica × тютюн взаємодія — адитивно-мультиплікативна."
  - "Не нехтувати engineered-stone професіями — це emerging high-exposure категорія з rapid progressive силікозом у молодих робітників."

do_not_do_en:
  - "Do not skip HRCT for functional / symptomatic findings consistent with silicosis — silicosis itself is a risk-elevation marker."
  - "Do not extrapolate USPSTF unmodified for silicosis-affected patients — a lower LDCT threshold is justified."
  - "Do not skip smoking-cessation counseling — the silica × tobacco interaction is additive-to-multiplicative."
  - "Do not overlook engineered-stone occupations — this is an emerging high-exposure category with rapid progressive silicosis in young workers."

