expected_outcomes:
  overall_response_rate: >-
    Primary endpoint: detection of incident silica-attributable lung
    cancer at earliest treatable stage via LDCT, with HRCT-mediated
    detection of silicosis (itself a marker of substantially elevated
    lung-cancer risk). Lung-cancer SMR is ~2-3x in silicosis-affected
    workers and ~1.3-1.5x in silica-exposed-without-silicosis (per
    IARC 100C / Steenland 2001 / Vida 2010). Smoking cessation is the
    single highest-impact lever — silicosis × smoking interaction is
    additive-to-multiplicative.

