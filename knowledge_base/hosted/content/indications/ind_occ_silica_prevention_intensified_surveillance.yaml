rationale: >
  Standard-track prevention pathway for individuals with documented
  prior occupational respirable crystalline silica exposure who do not
  have a current silica-associated malignancy diagnosis. Four parallel
  interventions:

  **(1) HRCT chest if silicosis suspected.** Functional findings
  (declining FVC / DLCO on spirometry), symptomatic findings (dyspnea
  on exertion, chronic cough out of proportion to comorbidities), or
  baseline chest-radiograph abnormalities (small rounded opacities,
  hilar / mediastinal lymph-node calcification) warrant HRCT chest
  to confirm / characterize silicosis. Silicosis itself is a marker
  of substantially elevated lung-cancer risk and shifts the LDCT-
  threshold lower.

  **(2) Risk-adjusted annual LDCT chest screening.** USPSTF 2021
  criteria are the baseline. Silica-exposed cohorts extend
  consideration:
    - With silicosis: LDCT consideration regardless of smoking history
      from ≥10 years post first exposure given elevated lung-cancer
      SMR.
    - Without silicosis: USPSTF criteria for smokers; consider LDCT
      for never-smokers with ≥20 years of high-cumulative-exposure
      occupations (engineered-stone fabrication, sandblasting) from
      ≥20 years post first exposure.
    - Annual cadence; Lung-RADS reporting.

  **(3) Smoking-cessation counseling.** Highest-impact single
  intervention. Silica × tobacco interaction is additive-to-
  multiplicative. Behavioral counseling + pharmacotherapy
  (varenicline, bupropion, NRT) per USPSTF / ATS / AAFP.

  **(4) Exposure-cessation / PPE counseling.** Engineered-stone /
  quartz-surface fabrication has become a globally-emerging high-
  exposure occupation (rapid progressive silicosis in young workers
  documented in Australia, Spain, Israel, and increasingly US /
  Ukraine). Where active exposure persists, counsel on wet-method
  cutting (essential), LEV (local exhaust ventilation), supplied-air
  respirators for high-exposure tasks (P100 minimum for moderate
  exposure), and adherence to OSHA / NSZU PEL.

  Resource access in Ukraine: HRCT chest (~2000-4000 UAH); LDCT chest
  (~1500-3500 UAH); spirometry widely available. Smoking-cessation
  pharmacotherapy pharmacy-accessible without НСЗУ.

rationale_ua: >
  Стандартний-трек prevention шлях для осіб з документованим
  попереднім професійним впливом респірабельного кристалічного
  силіцію без поточного діагнозу силіцій-асоційованої малігнізації.
  Чотири паралельні втручання:

  **(1) HRCT грудної клітки при підозрі на силікоз.** Функціональні
  знахідки (зниження FVC / DLCO на спірометрії), симптоматичні
  знахідки (диспное при навантаженні, хронічний кашель не
  пропорційно до коморбідностей) або baseline-аномалії на
  рентгенограмі грудної клітки (малі заокруглені opacities, кальцинати
  hilar / mediastinal лімфовузлів) потребують HRCT грудної клітки для
  підтвердження / характеристики силікозу. Силікоз сам по собі —
  маркер суттєво підвищеного ризику раку легень.

  **(2) Risk-adjusted щорічна LDCT грудної клітки.** USPSTF 2021
  критерії — baseline. Силіцій-експоновані когорти розширюють
  розгляд: із силікозом — LDCT-розгляд незалежно від smoking history
  з ≥10 років post first exposure; без силікозу — USPSTF для курців;
  розгляд LDCT для некурців з ≥20 років high-cumulative-exposure
  професій з ≥20 років post first exposure.

  **(3) Counseling щодо припинення куріння.** Найвпливовіше одиничне
  втручання. Силіцій × тютюн взаємодія — адитивно-мультиплікативна.

  **(4) Exposure-cessation / PPE counseling.** Виробництво
  інженерного / кварцового каменю стало глобально-emerging
  high-exposure професією (rapid progressive силікоз у молодих
  робітників задокументований в Австралії, Іспанії, Ізраїлі, дедалі
  в США / Україні). Де активний вплив зберігається, counseling щодо
  wet-method різання (essential), LEV (local exhaust ventilation),
  supplied-air респіратори для high-exposure задач (P100 мінімум для
  помірного впливу).

  Доступ до ресурсів в Україні: HRCT грудної клітки (~2000-4000 грн);
  LDCT грудної клітки (~1500-3500 грн); спірометрія широко доступна.

