rationale: >
  Standard-track prevention pathway for individuals with documented
  prior occupational diesel-exhaust (DEE) exposure who do not have a
  current DEE-associated malignancy diagnosis. Three parallel interventions:

  **(1) Smoking-cessation counseling.** Highest-impact single
  intervention for residual lung-cancer risk reduction. Asbestos-style
  multiplicative synergy is not fully established for DEE × tobacco,
  but additive-to-multiplicative interaction is consistent across
  cohort studies (Silverman 2012 mining; Garshick 2012 trucking).
  Behavioral counseling + pharmacotherapy (varenicline, bupropion,
  NRT) per USPSTF / ATS / AAFP.

  **(2) Risk-adjusted annual LDCT chest screening.** USPSTF 2021
  criteria (age 50-80, ≥20 pack-years, current smoker or quit within
  15 years) form the baseline. For DEE-exposed workers, NCCN and ACR
  extend consideration based on cumulative exposure:
    - First LDCT at ≥10-15 years from first DEE exposure for
      current / ex-smokers, ≥15-20 years for never-smokers with
      ≥10 years cumulative DEE exposure in enclosed-environment
      occupations (mining, enclosed warehouses).
    - Annual cadence; Lung-RADS reporting for nodule classification.
    - Continue annually as long as the patient remains a candidate for
      curative-intent treatment (typically age <85, life expectancy
      >5 years, ECOG ≤2).

  **(3) Urinalysis q1-2y for bladder-cancer surveillance.** IARC
  evidence for DEE → bladder cancer is limited-but-suggestive (Group 1
  Monograph 105). Non-invasive urinalysis with microscopy for hematuria
  is supported as low-cost adjunctive surveillance in cohort guidance;
  cystoscopy reserved for persistent / unexplained hematuria. Urinary
  cytology is not recommended as standalone screening (low sensitivity
  for low-grade disease).

  Resource access in Ukraine: LDCT chest available at large regional /
  private centers (~1500-3500 UAH per scan); urinalysis is widely
  available (~150-400 UAH). Smoking-cessation pharmacotherapy
  (varenicline, bupropion) is pharmacy-accessible without НСЗУ
  reimbursement.

rationale_ua: >
  Стандартний-трек prevention шлях для осіб з документованим попереднім
  професійним впливом вихлопу дизельних двигунів (DEE), які не мають
  поточного діагнозу DEE-асоційованої малігнізації. Три паралельні
  втручання:

  **(1) Counseling щодо припинення куріння.** Найвпливовіше одиничне
  втручання для зниження залишкового ризику раку легень.
  Мультиплікативна синергія, як для азбесту × тютюну, для DEE × тютюну
  повністю не встановлена, але адитивно-мультиплікативна взаємодія
  узгоджується з cohort studies. Поведінкове counseling +
  pharmacotherapy (варенiклін, бупропіон, NRT) за USPSTF / ATS / AAFP.

  **(2) Risk-adjusted щорічна LDCT грудної клітки.** USPSTF 2021
  критерії — baseline. Для DEE-експонованих NCCN / ACR розширюють
  розгляд: перша LDCT при ≥10-15 років від першого DEE-впливу для
  поточних / ex-курців, ≥15-20 років для некурців з ≥10 років
  кумулятивного DEE-впливу в enclosed-environment професіях.

  **(3) Urinalysis q1-2y для спостереження за сечовим міхуром.**
  IARC-evidence DEE → рак сечового міхура — обмежено-суггестивна.
  Неінвазивний urinalysis з мікроскопією для гематурії підтримується
  як низьковартісне адʼюнктивне спостереження; цистоскопія резервується
  для persistent / нез'ясованої гематурії.

  Доступ до ресурсів в Україні: LDCT грудної клітки (~1500-3500 грн);
  urinalysis (~150-400 грн). Pharmacotherapy припинення куріння
  аптечно-доступна без НСЗУ.

