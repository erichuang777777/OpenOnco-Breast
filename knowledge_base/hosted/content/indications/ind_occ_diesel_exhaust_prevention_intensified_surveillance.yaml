sources:
  - source_id: SRC-NCCN-BCELL-2025
    position: context
    relevant_quote_paraphrase: >-
      "Occupational carcinogen-exposure cohorts require risk-adjusted
      surveillance recommendations distinct from general-population
      screening; multidisciplinary review at large academic centers
      is the operational reference standard."
  - source_id: SRC-NCCN-NSCLC-2025
    position: supports
    relevant_quote_paraphrase: >-
      "Annual low-dose CT lung-cancer screening is recommended for
      individuals at elevated lung-cancer risk by age, smoking history,
      and (per Clinical Practice Guidelines extension) occupational
      carcinogen exposure including diesel exhaust."

do_not_do:
  - "Не презентувати DEE-modified LDCT як eвідентно-rівноцінне USPSTF-стандарту — extension опирається на mechanistic-rationale, не на RCT-дані."
  - "Не пропускати counseling щодо припинення куріння — DEE × тютюн взаємодія залишається клінічно суттєвою."
  - "Не використовувати urinary cytology як standalone screening — низька чутливість для low-grade захворювання; urinalysis з мікроскопією переважно."
  - "Не призначати cystoscopy рутинно — резервується для persistent / нез'ясованої гематурії."

do_not_do_en:
  - "Do not present DEE-modified LDCT as evidentiarily equivalent to the USPSTF standard — the extension rests on mechanistic rationale, not RCT data."
  - "Do not skip smoking-cessation counseling — the DEE × tobacco interaction remains clinically substantive."
  - "Do not use urinary cytology as standalone screening — low sensitivity for low-grade disease; urinalysis with microscopy preferred."
  - "Do not order cystoscopy routinely — reserve for persistent / unexplained hematuria."

