nccn_category: "2A"

expected_outcomes:
  overall_response_rate: >-
    Primary endpoint: detection of incident DEE-attributable malignancy
    at earliest treatable stage. NLST + NELSON data show annual LDCT in
    high-risk smokers reduces lung-cancer mortality ~20-26%; DEE-exposed
    cohorts are not formally enrolled but mechanistic inference supports
    extension. Smoking cessation in DEE-exposed workers reduces the
    smoking-attributable component over 10-15 years. Bladder-cancer
    surveillance via urinalysis has low sensitivity (~30-50%) as
    standalone screening but is non-invasive and supported by NCCN
    risk-stratified guidance for occupational chemical-exposure cohorts.

