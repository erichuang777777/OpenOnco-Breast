rationale: >
  Aggressive-track confirmed-carrier pathway layered on top of the
  IND-MEN2-CARRIER-SURVEILLANCE standard protocol.

  **Foundation:** All standard surveillance from IND-MEN2-CARRIER-
  SURVEILLANCE applies (ATA-class-driven thyroidectomy timing,
  calcitonin q6mo, metanephrines q1y, PTH/Ca q1y in MEN2A).

  **Intensification 1 — Earlier thyroidectomy than ATA-class default:**
  In moderate-risk RET kindreds with a severe-phenotype index case
  (e.g., metastatic MTC in a teen-aged relative or unexpectedly early
  calcitonin rise in the proband), advancing thyroidectomy timing
  beyond the standard ATA-class recommendation is a shared-decision
  option. Trade-off: surgical morbidity in a younger child (recurrent
  laryngeal nerve injury ~1-2%, permanent hypoparathyroidism if all
  parathyroids removed without autograft, lifelong levothyroxine
  replacement).

  **Intensification 2 — Bilateral cortical-sparing adrenalectomy
  discussion:** When bilateral pheochromocytomas emerge sequentially or
  synchronously, complete bilateral adrenalectomy commits the patient to
  lifelong glucocorticoid + mineralocorticoid replacement with
  ever-present Addisonian-crisis risk. Cortical-sparing partial
  adrenalectomy preserves a viable adrenal cortical remnant (~30% of
  one gland adequate) — patient avoids primary adrenal insufficiency
  but accepts ~10-30% lifetime adrenal-remnant pheochromocytoma
  recurrence over decades. Shared decision; surgical expertise required.

  **Other intensification considerations (discussed at HCP discretion):**
    - Annual whole-body 18F-DOPA or 68Ga-DOTATATE PET surveillance is
      NOT routine — high cost, low pre-test probability, frequent
      incidentalomas.
    - Prophylactic parathyroidectomy in MEN2A without biochemical
      hyperparathyroidism is NOT standard — wait for biochemical
      signal.

  **Cascade testing continuous:** every visit re-confirms family
  testing status; particularly time-sensitive for pediatric kindred.

  Per CHARTER §11: intensified surgical and surveillance decisions are
  shared-decision-making; standard-track ATA-class default remains the
  floor.

rationale_ua: >
  Aggressive-трекова Indication: накладена поверх IND-MEN2-CARRIER-
  SURVEILLANCE.

  **Foundation:** Усе standard з IND-MEN2-CARRIER-SURVEILLANCE.

  **Інтенсифікація 1 — Рання тиреоїдектомія раніше ATA-class default:**
  У moderate-risk RET кіндредах із severe-phenotype index — advancing
  timing beyond ATA recommendation. Trade-off: surgical morbidity у
  молодшої дитини, lifelong levothyroxine.

  **Інтенсифікація 2 — Bilateral cortical-sparing adrenalectomy:** При
  bilateral pheochromocytomas — complete bilateral adrenalectomy
  commits до lifelong glucocorticoid + mineralocorticoid replacement
  + Addisonian-crisis risk. Cortical-sparing partial — preserves adrenal
  cortical remnant; ~10-30% recurrence over decades. Shared decision.

  **Інші міркування:**
    - Annual whole-body 18F-DOPA / 68Ga-DOTATATE PET surveillance — NOT
      routine.
    - Prophylactic parathyroidectomy у MEN2A без biochemical signal — NOT
      standard.

  **Cascade тестування continuous;** time-sensitive для pediatric
  кіндредів.

  Per CHARTER §11: shared-decision-making домен.

