do_not_do:
  - "Не advanceувати thyroidectomy раніше ATA-class default без severe-phenotype index чи rising calcitonin — surgical morbidity у дитини не виправдана."
  - "Не виконувати bilateral cortical-sparing adrenalectomy у low-volume center — adrenal remnant viability technique-dependent."
  - "Не призначати empirical lifelong glucocorticoid после cortical-sparing surgery — assessment of remnant cortical function (ACTH stimulation) визначає необхідність."
  - "Не використовувати 18F-DOPA / 68Ga-DOTATATE PET як routine surveillance — резерв для staging of confirmed disease."

do_not_do_en:
  - "Do not advance thyroidectomy earlier than ATA-class default without severe-phenotype index or rising calcitonin — surgical morbidity in a child is not justified otherwise."
  - "Do not perform bilateral cortical-sparing adrenalectomy in a low-volume center — adrenal-remnant viability is technique-dependent."
  - "Do not prescribe empirical lifelong glucocorticoid after cortical-sparing surgery — remnant function assessment (ACTH stimulation) determines need."
  - "Do not use 18F-DOPA / 68Ga-DOTATATE PET as routine surveillance — reserve for staging of confirmed disease."

