rationale: >
  Aggressive-track confirmed-carrier pathway: layered on top of the
  IND-MEN1-CARRIER-SURVEILLANCE standard protocol with three
  intensification options that escalate beyond surveillance alone.

  **Foundation:** All standard surveillance from IND-MEN1-CARRIER-
  SURVEILLANCE applies (annual biochemistry from age 5, pituitary MRI
  q3y from age 5, abdominal MRI + chromogranin-A q1y from age 10,
  optional chest CT q1-3y from age 20).

  **Intensification 1 — Earlier prophylactic parathyroid surgery
  discussion:** Once biochemically established hyperparathyroidism is
  documented (elevated PTH + hypercalcemia, even if asymptomatic),
  subtotal (3.5-gland) parathyroidectomy or total parathyroidectomy
  with cervical-thymectomy + heterotopic autotransplant becomes a
  shared-decision option in adolescents / young adults rather than a
  reactive intervention at symptomatic presentation. Trade-off: surgical
  morbidity (recurrent laryngeal nerve injury ~1-2%, permanent
  hypoparathyroidism if no functional autograft).

  **Intensification 2 — Gastrinoma / Zollinger-Ellison intensified
  surveillance:** In families with early-onset gastrinoma pedigree (or
  index proband with metastatic gastrinoma), fasting gastrin q6mo + PPI-
  wash-out secretin stimulation in equivocal cases. Endoscopic
  surveillance (EGD with antral / duodenal biopsies) at lower threshold
  for symptomatic dyspepsia or recurrent peptic ulceration. Most
  gastrinomas in MEN1 are multifocal duodenal microgastrinomas — surgical
  cure is uncommon; goal is functional control + metastasis prevention.

  **Intensification 3 — Early calcitonin baseline + thyroid US:**
  Although MEN1 is not associated with medullary thyroid carcinoma
  (that is MEN2 / RET), some kindreds present with overlap features
  prompting RET differential. Baseline calcitonin + thyroid US at MEN1
  diagnosis settles that question without prolonged ambiguity.

  **Cascade testing remains continuous:** every visit re-confirms
  family's testing status.

  Per CHARTER §11: intensified surveillance and prophylactic surgery
  are classic shared-decision-making domains. Patient autonomy is
  paramount; none of these intensifications are mandated, and the
  standard-track protocol remains the floor.

rationale_ua: >
  Aggressive-трекова Indication: накладена поверх IND-MEN1-CARRIER-
  SURVEILLANCE з трьома опціями інтенсифікації.

  **Foundation:** Усе стандартне спостереження з IND-MEN1-CARRIER-
  SURVEILLANCE застосовується.

  **Інтенсифікація 1 — Рання prophylactic паратиреоїдектомія:** При
  встановленому біохімічно гіперпаратиреоїді — subtotal (3.5-gland) або
  total + autotransplant у підлітків / young adults замість reactive
  втручання при симптомах. Trade-off: surgical morbidity (recurrent
  laryngeal nerve injury ~1-2%, permanent гіпопаратиреоз без
  функціонального аутографту).

  **Інтенсифікація 2 — Інтенсифікована gastrinoma / Zollinger-Ellison
  surveillance:** У сім'ях з ранньою gastrinoma — fasting gastrin q6mo
  + PPI-wash-out secretin stimulation. EGD з antral / duodenal biopsies
  при dyspepsia. MEN1 gastrinomas зазвичай multifocal duodenal
  microgastrinomas — surgical cure uncommon; goal = функціональний
  контроль + prevention метастазів.

  **Інтенсифікація 3 — Ранній калцитонін baseline + thyroid US:** Хоча
  MEN1 не associated з MTC (це MEN2 / RET), overlap features prompting
  RET diff dx. Baseline calcitonin + thyroid US при діагнозі MEN1
  settles це питання.

  **Cascade тестування continuous:** кожен візит re-confirms family
  testing status.

  Per CHARTER §11: shared-decision-making домен; автономія пацієнта
  primary.

