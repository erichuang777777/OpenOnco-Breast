expected_outcomes:
  overall_response_rate: >-
    Intensified track layers three options on top of the standard MEN1
    surveillance protocol: (1) earlier shared-decision discussion of
    prophylactic subtotal parathyroidectomy in adolescents with
    biochemically established hyperparathyroidism (rather than waiting
    for symptomatic disease); (2) intensified gastrinoma / Zollinger-
    Ellison surveillance with q6mo fasting gastrin + secretin
    stimulation in high-risk families (early-onset gastrinoma pedigree);
    (3) early calcitonin baseline + thyroid US at MEN2 differential
    confirmation step. Trade-off: surgical morbidity (hypoparathyroidism
    if total parathyroidectomy without autotransplant), more frequent
    biochemistry / imaging visits, anxiety burden — all shared-decision
    discussion points.

