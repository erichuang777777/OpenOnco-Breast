do_not_do:
  - "Не презентувати prophylactic parathyroidectomy як обов'язкову — це shared-decision-making, з повним обговоренням ризику хірургії vs ризику біохімічно asymptomatic hyperparathyroidism."
  - "Не виконувати total parathyroidectomy без autotransplant — permanent гіпопаратиреоз неприйнятний trade-off у young adult."
  - "Не intensifyувати gastrinoma surveillance у всіх carriers — резерв для high-risk pedigrees (early-onset, metastatic index)."
  - "Не використовувати ризик MEN2 / RET overlap як виправдання для empirical prophylactic тиреоїдектомії — calcitonin / US settle, не surgery."

do_not_do_en:
  - "Do not present prophylactic parathyroidectomy as mandatory — shared-decision-making with full discussion of surgical risk vs biochemically asymptomatic disease risk."
  - "Do not perform total parathyroidectomy without autotransplant — permanent hypoparathyroidism is an unacceptable trade-off in a young adult."
  - "Do not intensify gastrinoma surveillance in all carriers — reserve for high-risk pedigrees (early-onset, metastatic index)."
  - "Do not use MEN2 / RET overlap concern as justification for empirical prophylactic thyroidectomy — calcitonin / US settle the question, not surgery."

