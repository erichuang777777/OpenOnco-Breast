do_not_do:
  - "Не покладатися лише на cervical Pap у DES daughter — CCA arises у vaginal adenosis, often missed by cervical Pap."
  - "Не пропускати full speculum visualization з rotating speculum — adequate vaginal-wall inspection критичний."
  - "Не нормалізувати abnormal vaginal bleeding / discharge / dyspareunia у DES daughter — immediate workup."
  - "Не зупиняти surveillance на arbitrary age cutoff — bimodal risk extends past 40р."
  - "Не intensify mammographic screening на основі DES exposure alone — magnitude modest."
  - "Не пропускати reproductive counseling у women of reproductive age — Müllerian-tract anomalies впливають на pregnancy planning."

do_not_do_en:
  - "Do not rely only on cervical Pap in a DES daughter — CCA arises in vaginal adenosis, often missed by cervical Pap."
  - "Do not skip full speculum visualization with rotating speculum — adequate vaginal-wall inspection is critical."
  - "Do not normalize abnormal vaginal bleeding / discharge / dyspareunia in a DES daughter — immediate workup."
  - "Do not stop surveillance at an arbitrary age cutoff — bimodal risk extends past 40 years."
  - "Do not intensify mammographic screening based on DES exposure alone — magnitude modest."
  - "Do not skip reproductive counseling in women of reproductive age — Müllerian-tract anomalies affect pregnancy planning."

