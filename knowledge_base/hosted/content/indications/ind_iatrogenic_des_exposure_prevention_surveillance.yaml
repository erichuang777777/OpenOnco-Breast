notes: "STUB — v0.3 iatrogenic pilot (in-utero DES exposure → vaginal CCA + cervical CIS). Two-Clinical-Co-Lead signoff queued. Critical: cervical Pap is NOT sufficient; full vaginal-wall inspection by DES-experienced gynecologist is the standard. Anchored to DIS-VULVAR-VAGINAL-SCC (anatomic site) — clear-cell adenocarcinoma histology specificity carried in prose; future DIS-VAGINAL-CLEAR-CELL entity recommended."
