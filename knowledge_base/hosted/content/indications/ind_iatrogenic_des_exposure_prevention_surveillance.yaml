rationale: >
  Standard-track surveillance for documented in-utero DES exposure.
  Components per CDC DES Update + ACOG Committee Opinion +
  NCCN Cervical:

  **(1) Annual gynecologic examination with DES-specific
  technique** — full speculum visualization (rotating speculum
  to see full vaginal wall, NOT just cervix), bimanual exam,
  careful palpation of vaginal walls (clear-cell adenocarcinoma
  often presents as a submucosal mass, not a mucosal lesion).
  Iodine staining (Schiller test) on vaginal mucosa highlights
  glycogen-poor areas (adenosis) for targeted biopsy.

  **(2) Colposcopy of cervix + vagina** at first visit and
  whenever any abnormal area visualized. Vaginal adenosis
  (ectopic glandular epithelium in vagina, present in ~30-40%
  of DES daughters) is benign in itself but is the precursor
  field for CCA — abnormal vascular pattern or persistent
  glandular changes warrant biopsy.

  **(3) Cervical cytology + HPV co-testing** per ASCCP cadence —
  q3y if normal, q5y co-test, more frequent if abnormal. NOT
  a substitute for direct vaginal-wall inspection (CCA arises
  in vaginal adenosis, often missed by cervical Pap).

  **(4) Symptom evaluation** — abnormal vaginal bleeding
  (intermenstrual, postmenopausal), persistent vaginal
  discharge, dyspareunia, pelvic pain → immediate gynecologic
  exam + colposcopy + targeted biopsy. CCA does not always
  bleed; structural exam by experienced gynecologist is
  irreplaceable.

  **(5) Breast surveillance** — age-appropriate USPSTF
  mammography q2y ages 40-74. DES-exposed cohort has modestly
  elevated breast cancer risk after age 40 (~1.3x); intensified
  screening NOT recommended on DES exposure alone, but baseline
  screening must not be missed.

  **(6) Pregnancy / reproductive counseling** for DES daughters
  of reproductive age — increased risk of preterm birth,
  miscarriage, ectopic pregnancy from Müllerian-tract anomalies;
  high-risk obstetric care advisable.

  **(7) DES granddaughters (3rd generation)** — data limited
  and inconclusive; routine intensified surveillance NOT
  recommended; awareness counseling at first GYN visit. Mother's
  DES exposure should be documented in family history.

  **(8) Lifelong surveillance** — bimodal CCA risk extends past
  40 years; cohort is aging (born 1940-1971) but surveillance
  does NOT stop at any age threshold. Compromise to once-yearly
  cadence after age 60 if all prior exams normal is acceptable
  per ACOG.

  Goal: early-stage detection of CCA in the rare-event scenario;
  routine cervical / breast prevention does not slip; symptom-
  prompted evaluation pathway robust.

rationale_ua: >
  Стандартний-трек surveillance для документованої in-utero
  DES exposure. Components per CDC DES Update + ACOG + NCCN
  Cervical:

  **(1) Annual gynecologic examination з DES-specific technique**
  — full speculum visualization, bimanual exam, careful palpation
  vaginal walls (CCA часто submucosal mass, не mucosal lesion).
  Iodine staining (Schiller) vaginal mucosa — підкреслює glycogen-
  poor areas (adenosis) для targeted biopsy.

  **(2) Colposcopy cervix + vagina** на першому візиті і при
  будь-якій abnormality. Vaginal adenosis (у ~30-40% DES
  daughters) benign в собі, але precursor field для CCA.

  **(3) Cervical cytology + HPV co-testing** per ASCCP cadence.
  НЕ substitute для direct vaginal-wall inspection.

  **(4) Symptom evaluation** — abnormal vaginal bleeding,
  persistent discharge, dyspareunia, pelvic pain → immediate
  gynecologic exam + colposcopy + targeted biopsy. CCA не
  завжди bleeds.

  **(5) Breast surveillance** — age-appropriate USPSTF
  mammography q2р у 40-74. DES-exposed когорта модерно
  підвищений breast cancer ризик після 40р (~1.3x).

  **(6) Reproductive counseling** — increased ризик preterm
  birth, miscarriage, ectopic pregnancy від Müllerian anomalies.

  **(7) DES granddaughters** — дані обмежені; routine
  intensified surveillance НЕ recommended; awareness.

  **(8) Lifelong surveillance** — bimodal CCA ризик extends past
  40р; cohort старіє але surveillance НЕ stops на будь-якому віці.

