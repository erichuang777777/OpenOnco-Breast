rationale: >
  Standard-track prevention pathway for individuals with documented
  ≥10 years career firefighter exposure who do not have a current
  firefighter-attributable malignancy diagnosis. Five parallel
  interventions:

  **(1) USPSTF-modified LDCT chest screening.** Baseline USPSTF
  criteria are extended for career-firefighter cohort:
    - First LDCT at ≥10 years from active-duty start for firefighters
      with cumulative inhalation-exposure exposure consistent with
      structural fire-suppression (PAH + benzene + asbestos-overhaul
      composite).
    - Lower pack-years threshold (≥10 pack-years for ever-smokers)
      per firefighter-cohort guidance.
    - Annual cadence; Lung-RADS reporting.

  **(2) Annual dermatology consultation with full-skin exam.** Melanoma
  RR ~1.3-1.4 in firefighter cohorts supports structured cutaneous
  surveillance. Monthly self-skin-checks counseled between visits.

  **(3) GI screening with earlier initiation consideration.** NCCN /
  USPSTF average-risk guideline starts colorectal screening at age
  45. Firefighter-cohort guidance supports consideration of earlier
  initiation (age 40-45) given the modest RR elevation and earlier
  mean age at colorectal-cancer diagnosis in some cohorts. Modality
  per patient preference: colonoscopy q10y (gold standard), FIT
  annually, FIT-DNA (Cologuard) q3y, or CT colonography q5y.

  **(4) Urinalysis q1-2y for bladder-cancer surveillance.** Bladder
  cancer is the highest-RR endpoint (SMR ~1.3-1.5) and IARC sufficient
  evidence. Non-invasive urinalysis with microscopy for hematuria;
  cystoscopy reserved for persistent / unexplained hematuria.

  **(5) PPE / post-fire decontamination counseling for active
  firefighters.** SCBA throughout overhaul (not only fire-suppression
  phase — most carcinogen-exposure occurs during overhaul of smoldering
  structures), post-fire decontamination protocols (on-scene gross
  decon with wipes, transport-back-to-station decon, shower before
  departure), gear-laundering after every fire (not seasonal /
  annual), and station-level diesel-exhaust capture systems.

  Resource access in Ukraine: LDCT chest (~1500-3500 UAH); urinalysis
  (~150-400 UAH); dermatology accessible at regional centers; FIT
  / Cologuard / colonoscopy availability varies by region.

rationale_ua: >
  Стандартний-трек prevention шлях для осіб з документованим ≥10
  років career-firefighter впливом без поточного діагнозу
  firefighter-атрибутованої малігнізації. Пʼять паралельних втручань:

  **(1) USPSTF-модифікований LDCT грудної клітки.** Baseline USPSTF
  розширюється для career-firefighter когорти: перша LDCT при ≥10
  років від активного-duty початку; нижчий pack-years поріг
  (≥10 pack-years для ever-smokers).

  **(2) Щорічна дерматологічна консультація з повним оглядом шкіри.**
  Melanoma RR ~1.3-1.4 у firefighter cohorts.

  **(3) GI-скринінг з earlier-initiation розглядом.** NCCN / USPSTF
  average-risk guideline починає colorectal screening з 45 років.
  Firefighter-cohort guidance підтримує розгляд earlier initiation
  (40-45 років) з огляду на помірне підвищення RR та earlier mean
  age у деяких cohorts. Модальність за патієнтською перевагою:
  колоноскопія q10y (gold standard), FIT щорічно, FIT-DNA
  (Cologuard) q3y, або CT colonography q5y.

  **(4) Urinalysis q1-2y для спостереження за сечовим міхуром.**
  Рак сечового міхура — highest-RR endpoint (SMR ~1.3-1.5) та IARC
  sufficient evidence.

  **(5) PPE / post-fire decontamination counseling для активних
  пожежників.** SCBA протягом overhaul (не тільки fire-suppression
  phase — більшість carcinogen-exposure відбувається під час
  overhaul тліючих структур), post-fire decontamination protocols,
  gear-laundering після кожної пожежі, station-level diesel-exhaust
  capture systems.

  Доступ до ресурсів в Україні: LDCT грудної клітки (~1500-3500 грн);
  urinalysis (~150-400 грн); дерматологія доступна в регіональних
  центрах.

