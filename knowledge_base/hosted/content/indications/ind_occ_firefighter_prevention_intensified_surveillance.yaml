sources:
  - source_id: SRC-NCCN-BCELL-2025
    position: context
    relevant_quote_paraphrase: >-
      "Occupational mixed-exposure cohorts (firefighters) with multi-
      organ cancer-endpoint excess warrant multi-modality structured
      surveillance reflecting the spectrum of established endpoints."
  - source_id: SRC-NCCN-NSCLC-2025
    position: supports
    relevant_quote_paraphrase: >-
      "Annual low-dose CT lung-cancer screening is recommended for
      individuals at elevated lung-cancer risk by age, smoking history,
      and (per Clinical Practice Guidelines extension) occupational
      mixed-exposure cohorts including career firefighters."

do_not_do:
  - "Не обмежувати PPE counseling fire-suppression фазою — більшість carcinogen-exposure відбувається під час overhaul."
  - "Не пропускати щорічну дерматологію — melanoma RR ~1.3-1.4 у firefighter cohorts."
  - "Не відкладати GI-скринінг до 50 років — firefighter-cohort guidance підтримує розгляд earlier initiation з 40-45."
  - "Не призначати cystoscopy рутинно — резервується для persistent / нез'ясованої гематурії."

do_not_do_en:
  - "Do not limit PPE counseling to the fire-suppression phase — most carcinogen exposure occurs during overhaul."
  - "Do not skip annual dermatology — melanoma RR ~1.3-1.4 in firefighter cohorts."
  - "Do not delay GI screening to age 50 — firefighter-cohort guidance supports consideration of earlier initiation at age 40-45."
  - "Do not order cystoscopy routinely — reserve for persistent / unexplained hematuria."

