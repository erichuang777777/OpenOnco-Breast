do_not_do:
  - "Не рекомендувати initiation of alcohol (wine) для cancer-prevention purposes — alcohol є Group-1 канцероген; ризик > потенційна wine-component користь."
  - "Не презентувати dietary counseling як заміну screening — both interventions complementary."
  - "Не приписувати prescriptive Mediterranean-replica без cultural adaptation — adherence низька при culturally-foreign pattern."
  - "Не покладатися на supplements (olive oil capsules, polyphenol extracts) замість whole-food pattern — matrix effects + microbiome interactions не reproducible."
  - "Не ігнорувати economic constraints (extra-virgin olive oil, nuts, fish можуть бути недоступні) — culturally / economically feasible analogues prioritized."

do_not_do_en:
  - "Do not recommend initiation of alcohol (wine) for cancer-prevention purposes — alcohol is a Group-1 carcinogen; risk outweighs any putative wine-component benefit."
  - "Do not present dietary counseling as a substitute for screening — both interventions are complementary."
  - "Do not prescribe a prescriptive Mediterranean-replica without cultural adaptation — adherence is low with a culturally foreign pattern."
  - "Do not rely on supplements (olive oil capsules, polyphenol extracts) instead of whole-food pattern — matrix effects + microbiome interactions are not reproducible."
  - "Do not ignore economic constraints (extra-virgin olive oil, nuts, fish may be inaccessible) — culturally / economically feasible analogues should be prioritized."

known_controversies:
  - topic: "Wine component of Mediterranean dietary pattern"
    positions:
      - position: "PREDIMED protocol included moderate wine with meals as part of the trial-validated pattern"
      - position: "Alcohol is independently IARC Group-1 carcinogen (RF-LIFESTYLE-ALCOHOL-CANCER-PREVENTION); even moderate alcohol raises breast + HCC + esophageal SCC + CRC risk"
    our_default: "Do not recommend initiation of alcohol consumption for cancer-prevention purposes. Current moderate drinkers receive total-alcohol counseling per RF-LIFESTYLE-ALCOHOL-CANCER-PREVENTION as a separate prevention lever."
    rationale: "Net risk vs benefit of wine component is uncertain; potential cardiovascular benefit does not outweigh cancer-incidence risk in initiator populations."

