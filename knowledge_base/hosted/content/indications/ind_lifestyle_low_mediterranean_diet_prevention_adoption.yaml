rationale: >
  Standard-track prevention pathway for low Mediterranean-diet
  adherence. Components per PREDIMED + EPIC + NHS evidence base + ACS
  2020 Diet + Physical Activity Guideline + NCCN Colon Cancer screening:

  **(1) Mediterranean dietary-pattern counseling** — Target adherence
  to all 9 MDS components or MEDAS ≥10/14. Key behaviors:
  - Olive oil as primary culinary fat — ≥4 tablespoons/day extra-virgin
    where economically feasible
  - Vegetables — ≥3 servings/day (variety: leafy, cruciferous, allium,
    tomato-based)
  - Fruits — ≥3 servings/day with seasonal variety
  - Legumes — ≥3 servings/week (lentils, chickpeas, beans)
  - Whole grains — replace refined where feasible (whole-wheat bread,
    bulgur, brown rice, oats)
  - Nuts — ≥30 g/day (PREDIMED protocol: 15 g walnuts + 7.5 g almonds
    + 7.5 g hazelnuts) where affordable
  - Fish — ≥3 servings/week, emphasize fatty fish (mackerel, sardines,
    salmon) for ω-3
  - Reduce red/processed meat to <1 serving/day
  - Reduce sweets + sugar-sweetened beverages
  - Wine — IF consumed, moderate (1 glass/day women, 1-2 glasses/day
    men) with meals; do NOT initiate alcohol consumption for cancer-
    prevention purposes (conflicts with RF-LIFESTYLE-ALCOHOL-CANCER-
    PREVENTION; alcohol is a Group-1 carcinogen and dietary-pattern
    counseling should not encourage initiation)

  **(2) Cultural adaptation** — Mediterranean dietary principles
  (whole foods, vegetables/fruits/legumes/whole grains base, olive oil
  primary fat, moderate fish, limited red meat) are adaptable to
  Ukrainian / Eastern European cuisine. Examples: borscht (vegetable-
  forward), kasha (whole grain), salo replaced with olive oil, fish
  emphasis from Black Sea / fresh-water sources, beans + grains
  combinations. Counseling should be culturally fluent rather than
  prescriptive Mediterranean-replica.

  **(3) Gradual behavior change** — Adopt 1-2 new behaviors per visit
  rather than wholesale pattern change. Use motivational interviewing
  + readiness-stage assessment. Refer to registered dietitian for
  sustained support.

  **(4) USPSTF-cadence cancer screening** — CRC screening (colonoscopy
  q10y from age 45, or stool-based) per anchor. Mediterranean-diet
  adherence does not change screening cadence per current guidelines.

  Pattern-level dietary intervention + age-appropriate screening
  additive for cancer-incidence reduction across multiple tumor types.
  Cardiovascular + metabolic co-benefits independent of cancer.

rationale_ua: >
  Стандартний-трек prevention шлях для low Mediterranean-diet
  adherence. Components per PREDIMED + EPIC + NHS + ACS 2020 + NCCN
  Colon framework:

  **(1) Mediterranean dietary-pattern counseling** — Target adherence
  до всіх 9 MDS components або MEDAS ≥10/14. Key behaviors:
  - Olive oil як primary culinary fat — ≥4 ст. ложки/день extra-virgin
    where economically feasible
  - Овочі — ≥3 порції/день (variety: leafy, cruciferous, allium,
    tomato-based)
  - Фрукти — ≥3 порції/день з seasonal variety
  - Бобові — ≥3 порції/тиждень (сочевиця, нут, квасоля)
  - Whole grains — replace refined where feasible (whole-wheat bread,
    bulgur, brown rice, oats)
  - Горіхи — ≥30 г/день (PREDIMED protocol: 15 г walnuts + 7.5 г
    almonds + 7.5 г hazelnuts) where affordable
  - Риба — ≥3 порції/тиждень, emphasize fatty fish (mackerel,
    sardines, salmon) для ω-3
  - Зменшити red/processed meat до <1 порції/день
  - Зменшити sweets + sugar-sweetened beverages
  - Wine — ЯКЩО споживається, помірно (1 склянка/день для жінок, 1-2
    для чоловіків) з їжею; НЕ розпочинати alcohol для cancer-prevention
    purposes (alcohol — Group-1 канцероген)

  **(2) Cultural adaptation** — Mediterranean principles адаптовані до
  української / Східноєвропейської кухні: borscht (vegetable-forward),
  kasha (whole grain), salo replaced олією, риба з Чорного моря /
  річкових джерел, beans + grains. Counseling має бути culturally
  fluent rather than prescriptive Mediterranean-replica.

  **(3) Поступова behavior change** — Adopt 1-2 new behaviors per
  visit rather than wholesale pattern change. Use motivational
  interviewing + readiness-stage assessment. Refer до registered
  dietitian.

  **(4) USPSTF-cadence cancer screening** — CRC screening (colonoscopy
  q10y з 45 років, або stool-based) per anchor.

