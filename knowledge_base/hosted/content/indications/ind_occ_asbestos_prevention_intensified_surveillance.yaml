# No drug regimen — intervention is counseling + LDCT surveillance.
recommended_regimen: null
concurrent_therapy: []
followed_by: []

evidence_level: moderate
strength_of_recommendation: conditional
nccn_category: "2A"

expected_outcomes:
  overall_response_rate: >-
    Primary endpoint: detection of incident asbestos-attributable
    malignancy at earliest treatable stage. NLST + NELSON data show
    annual LDCT in high-risk smokers (≥20 pack-years, age 50-77 per
    USPSTF 2021) reduces lung-cancer mortality ~20-26%; asbestos-
    exposed cohorts are not formally enrolled but mechanistic
    inference supports extension. Smoking cessation in asbestos-
    exposed workers reduces incremental lung-cancer risk substantially
    (smoker-asbestos RR ~50x baseline; ex-smoker-asbestos RR
    decreases over 10-15 years toward asbestos-only RR ~2-5x).
    Mesothelioma surveillance has NO validated modality — chest CT,
    pleural ultrasound, and serum mesothelin / SMRP markers have low
    sensitivity / specificity for early-stage disease; surveillance
    is discussed but not as a routine recommendation.

