sources:
  - source_id: SRC-NCCN-NSCLC-2025
    position: supports
    relevant_quote_paraphrase: >-
      "Annual low-dose CT lung-cancer screening is recommended for
      individuals at elevated lung-cancer risk by age, smoking
      history, and (per Clinical Practice Guidelines extension)
      occupational carcinogen exposure including asbestos."
  - source_id: SRC-NCCN-SCLC-2025
    position: context
    relevant_quote_paraphrase: >-
      "Small-cell lung cancer is a smoking-related malignancy;
      detection at the limited-stage on incidental imaging during
      structured surveillance improves curative-intent outcomes."
  - source_id: SRC-ESMO-NSCLC-EARLY-2024
    position: supports
    relevant_quote_paraphrase: >-
      "Lung-cancer screening with low-dose CT in high-risk cohorts
      reduces lung-cancer-specific mortality ~20-25% per NLST and
      NELSON; smoking cessation is a foundational concurrent
      intervention."

do_not_do:
  - "Не презентувати LDCT як screening для мезотеліоми — модальність валідована для NSCLC / SCLC, не для мезотеліоми; пацієнтське очікування має бути керованим."
  - "Не призначати serum mesothelin (SMRP / Mesomark) як рутинний screening — чутливість занадто низька; tests тільки в контексті симптоматичної підозри."
  - "Не пропускати counseling щодо припинення куріння — це найвпливовіше одиничне втручання у multiplicative-synergy ризику раку легень; не лікувати LDCT як замінник."
  - "Не екстраполювати USPSTF age 50-80 беззастережно — азбест-експонованим non-smokers, перша LDCT може бути доречною з ≥20 років від першого впливу незалежно від pack-years."
  - "Не пропонувати інтенсивний моніторинг плевральних бляшок — це поширені бенігні знахідки; інтервенція тільки при діагностичній підозрі на mesothelioma / lung cancer."
  - "Не нехтувати take-home exposure для членів сім'ї — counseling щодо workplace-only laundering необхідне там, де поточний вплив зберігається."

do_not_do_en:
  - "Do not present LDCT as screening for mesothelioma — the modality is validated for NSCLC / SCLC, not mesothelioma; patient expectation must be managed."
  - "Do not order serum mesothelin (SMRP / Mesomark) as routine screening — sensitivity is too low; testing only in the context of symptomatic suspicion."
  - "Do not skip smoking-cessation counseling — this is the single most impactful intervention in the multiplicative-synergy lung-cancer risk; do not treat LDCT as a substitute."
  - "Do not extrapolate USPSTF age 50-80 unconditionally — for asbestos-exposed non-smokers, first LDCT may be appropriate ≥20 years from first exposure regardless of pack-years."
  - "Do not offer intensive monitoring for pleural plaques — these are common benign findings; intervention only at the diagnostic suspicion of mesothelioma / lung cancer."
  - "Do not overlook take-home exposure for family members — workplace-only laundering counseling is necessary where current exposure persists."

