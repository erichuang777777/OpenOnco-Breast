id: IND-OCC-ASBESTOS-PREVENTION-INTENSIFIED-SURVEILLANCE
plan_track: standard
intent: prevention

applicable_to:
  # Prevention target — primary anchor: lung cancer (most numerically
  # important asbestos-attributable malignancy, addressable by LDCT
  # screening + smoking cessation). Mesothelioma surveillance is
  # discussed in rationale but no validated screening modality exists.
  # Ovarian cancer prevention via avoidance of perineal-talc / further
  # exposure is mentioned in rationale.
  disease_id: DIS-NSCLC
