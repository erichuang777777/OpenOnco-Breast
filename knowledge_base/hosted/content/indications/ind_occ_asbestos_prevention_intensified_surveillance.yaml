notes: >
  STUB — v0.3 occupational pilot (asbestos). Two-Clinical-Co-Lead
  signoff queued per CHARTER §6.1 dev-mode exemption. No drug regimen
  — intervention is counseling + surveillance imaging. IARC Monograph
  100C (2012) and ATSDR Asbestos Tox Profile are the canonical
  evidence anchors; both are v0.3 source-authoring backlog (not yet
  in KB as separate SRC entities). Citations above are the most
  clinically relevant in-KB sources (NCCN / ESMO lung-cancer
  guidelines) per the source-set caveat documented on the paired
  RedFlag. Adoption of LDCT screening for asbestos-exposed non-smokers
  predates the USPSTF pack-years threshold and remains a soft-evidence
  region with NCCN extending consideration on the basis of cumulative
  carcinogen exposure rather than RCT data.
