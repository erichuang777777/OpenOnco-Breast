expected_outcomes:
  overall_response_rate: >-
    Primary endpoint: early detection of incident sinonasal
    adenocarcinoma via annual ENT symptom-review + low-threshold CT
    sinus on persistent unilateral symptoms. No validated imaging
    screening modality exists for asymptomatic sinonasal cancer; the
    rarity of sinonasal adenocarcinoma at baseline means even a low-
    sensitivity symptom-triggered pathway provides meaningful early-
    detection benefit given the highly elevated occupational baseline
    (SMR ~50-900x in heavily-exposed cohorts per IARC 100C / Demers
    1995).

