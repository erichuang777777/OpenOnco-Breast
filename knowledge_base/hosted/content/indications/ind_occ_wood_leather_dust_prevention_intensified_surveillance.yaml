do_not_do:
  - "Не призначати CT синусів рутинно асимптомним пацієнтам — резервується для persistent однобічних симптомів."
  - "Не ігнорувати однобічні симптоми як 'просто синусит' — однобічність — це alarm feature для синоназальної патології."
  - "Не пропускати exposure-cessation / PPE counseling — багато експонованих осіб залишаються активними працівниками."
  - "Не відкладати ENT-onkology referral при знахідках масі / костяної ерозії на CT — потрібна оперативна біопсія."

do_not_do_en:
  - "Do not order CT sinus routinely in asymptomatic patients — reserve for persistent unilateral symptoms."
  - "Do not dismiss unilateral symptoms as 'just sinusitis' — unilaterality is an alarm feature for sinonasal pathology."
  - "Do not skip exposure-cessation / PPE counseling — many exposed individuals remain active workers."
  - "Do not delay ENT-oncology referral for findings of mass / bony erosion on CT — prompt biopsy is required."

