rationale: >
  Standard-track prevention pathway for individuals with documented
  prior occupational hardwood or leather-dust exposure who do not have
  a current dust-associated malignancy diagnosis. Three parallel
  interventions:

  **(1) Annual ENT consultation with structured symptom review.**
  Clinician asks specifically about unilateral nasal obstruction,
  unilateral epistaxis, anosmia, facial pain / pressure, recurrent
  unilateral sinusitis, and any persistent nasal discharge. Visual
  anterior rhinoscopy at each visit. Nasal endoscopy reserved for
  any persistent unilateral finding.

  **(2) Low-threshold CT sinus imaging on persistent unilateral
  symptoms.** Any unilateral nasal obstruction, recurrent unilateral
  epistaxis, or unexplained facial pain persisting >3-4 weeks warrants
  CT sinus with contrast (or MRI sinus if contrast contraindicated).
  Findings of soft-tissue mass, bony erosion, or paranasal sinus
  opacification with mass effect prompt urgent ENT-oncology referral
  and biopsy.

  **(3) Exposure-cessation / PPE counseling.** Most dust-exposed
  individuals may be active workers (woodworking and leather
  industries remain ongoing). Counsel on dust-collection ventilation
  (LEV — local exhaust ventilation at source), N95+/half-face
  respirators with appropriate cartridges during cutting / sanding /
  finishing, wet-method cutting where feasible, and end-of-shift
  workplace cleaning (HEPA vacuum, not dry sweeping).

  Resource access in Ukraine: ENT consultation accessible at regional
  centers; CT sinus (~1500-3000 UAH) where indicated; nasal endoscopy
  available at large urban / private ENT centers.

rationale_ua: >
  Стандартний-трек prevention шлях для осіб з документованим попереднім
  професійним впливом пилу твердих порід деревини або шкіри без
  поточного діагнозу пил-асоційованої малігнізації. Три паралельні
  втручання:

  **(1) Щорічна ENT-консультація зі структурованим переглядом
  симптомів.** Клініцист питає специфічно про однобічну назальну
  обструкцію, однобічну епістаксис, аносмію, лицевий біль / тиск,
  рецидивуючий однобічний синусит, persistent назальні виділення.
  Візуальна передня рино скопія при кожному візиті. Назальна
  ендоскопія резервується для будь-якої persistent однобічної знахідки.

  **(2) Low-threshold CT синусів при persistent однобічних симптомах.**
  Будь-яка однобічна назальна обструкція, рецидивуюча однобічна
  епістаксис або нез'ясований лицевий біль, persistent >3-4 тижнів,
  потребує CT синусів з контрастом (або MRI синусів, якщо контраст
  протипоказаний).

  **(3) Exposure-cessation / PPE counseling.** Багато
  пил-експонованих осіб можуть бути активними працівниками
  (деревообробка та шкіряна промисловість залишаються активними).
  Counseling щодо dust-collection вентиляції (LEV — local exhaust
  ventilation біля джерела), N95+/half-face респіратори з
  відповідними картриджами при різанні / шліфуванні / оздобленні,
  wet-method різання де можливо, end-of-shift workplace cleaning
  (HEPA-пилосос, не суха підмітка).

  Доступ до ресурсів в Україні: ENT-консультація доступна в
  регіональних центрах; CT синусів (~1500-3000 грн) де показано;
  назальна ендоскопія доступна у великих міських / приватних ENT-
  центрах.

