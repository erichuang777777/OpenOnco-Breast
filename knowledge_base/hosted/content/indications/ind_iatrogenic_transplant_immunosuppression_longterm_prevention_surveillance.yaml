expected_outcomes:
  overall_response_rate: "Annual whole-body skin examination by dermatologist + q1-3y cervical co-test + q1-3y anal cytology in at-risk subset + dental cancer screening + annual lymphadenopathy / B-symptom review detects skin cancers, HPV-associated cancers, and late-onset PTLD at curable stage in the chronic-transplant cohort. Most aggressive SCC subset (post-transplant SCC) responds to early Mohs surgical excision; advanced cases historically have ~30-50% 5-year survival. Late-onset PTLD: complete response rates with rituximab-based first-line approach ~60-70%; lower than early-onset EBV-driven PTLD. Earlier detection consistently improves all outcomes."

