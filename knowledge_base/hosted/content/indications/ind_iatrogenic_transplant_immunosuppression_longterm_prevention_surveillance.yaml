do_not_do:
  - "Не пропускати annual whole-body skin exam — найбільший cancer-prevention yield у post-transplant cohort."
  - "Не reducing immunosuppression unilaterally без coordination з transplant team — graft rejection ризик."
  - "Не рутинно EBV-DNA monitoring у chronic >3y cohort — yield знижений; symptom-driven workup."
  - "Не пропускати HPV vaccination catch-up у unvaccinated post-transplant cohort — adoption повільне; immunosuppressed not contraindication."
  - "Не використовувати live vaccines у post-transplant immunosuppression — contraindicated."
  - "Не нормалізувати unexplained lymphadenopathy / B-symptoms — late-onset PTLD може presented extranodally."

do_not_do_en:
  - "Do not skip annual whole-body skin exam — the highest cancer-prevention yield in the post-transplant cohort."
  - "Do not reduce immunosuppression unilaterally without transplant-team coordination — graft rejection risk."
  - "Do not routinely monitor EBV-DNA in the chronic >3y cohort — yield drops; pivot to symptom-driven workup."
  - "Do not skip HPV vaccination catch-up in the unvaccinated post-transplant cohort — uptake is slow; immunosuppression is not a contraindication."
  - "Do not use live vaccines in post-transplant immunosuppression — contraindicated."
  - "Do not normalize unexplained lymphadenopathy / B-symptoms — late-onset PTLD often presents extranodally."

