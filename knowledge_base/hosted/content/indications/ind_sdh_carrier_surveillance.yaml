sources:
  - source_id: SRC-NCCN-BCELL-2025
    position: context
    relevant_quote_paraphrase: >-
      "Confirmed SDHx carriers should enter structured multi-organ
      surveillance with annual whole-body MRI from age 6-10 in SDHB,
      annual plasma metanephrines + methoxytyramine, head + neck MRI
      q2-3y for parasympathetic paragangliomas, abdominal MRI for
      sympathetic paraganglioma + SDH-deficient RCC and GIST. Risk
      stratification SDHB > SDHD > SDHC > SDHA. SDHD and SDHAF2 follow
      paternal-inheritance / maternal-imprinting transmission pattern."

do_not_do:
  - "Не використовувати тільки standard метанефриновий panel без methoxytyramine — SDHx-associated paragangliomas frequently dopaminergic; 3-MT необхідний для adequate biochemistry."
  - "Не виконувати adrenalectomy / PGL resection без preoperative alpha-blockade — intra-operative hypertensive crisis ризик life-threatening; mandatory ≥7-14 днів."
  - "Не пропускати SDHB pediatric surveillance — whole-body MRI baseline age 6-10 (younger якщо family-specific early-onset proband)."
  - "Не пропускати paternal-inheritance counseling у SDHD / SDHAF2 — maternal-line carriers unaffected але можуть transmit; family-tree counseling critical."
  - "Не використовувати imatinib empirically для SDH-deficient GIST — c-KIT та PDGFRA wild-type; ineffective; surveillance / surgical management appropriate."

do_not_do_en:
  - "Do not use standard metanephrine panel alone without methoxytyramine — SDHx-associated paragangliomas are frequently dopaminergic; 3-MT is necessary for adequate biochemistry."
  - "Do not perform adrenalectomy / PGL resection without preoperative alpha-blockade — intraoperative hypertensive crisis risk is life-threatening; mandatory ≥7-14 days."
  - "Do not skip SDHB pediatric surveillance — whole-body MRI baseline age 6-10 (younger if family-specific early-onset proband)."
  - "Do not skip paternal-inheritance counseling in SDHD / SDHAF2 — maternal-line carriers are unaffected but can transmit; family-tree counseling is critical."
  - "Do not use imatinib empirically for SDH-deficient GIST — c-KIT and PDGFRA wild-type; ineffective; surveillance / surgical management appropriate."

