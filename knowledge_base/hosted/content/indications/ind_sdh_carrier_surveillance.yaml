expected_outcomes:
  overall_response_rate: >-
    Structured SDHx surveillance per Endocrine Society International
    PPGL Guideline + international PPGL registry experience detects
    paragangliomas / pheochromocytomas at smaller, biochemically-quiet
    pre-symptomatic stage — amenable to cortical-sparing adrenalectomy
    and complete surgical resection with low operative mortality.
    Metastatic risk (particularly SDHB) is the leading mortality driver
    and is reduced by early-stage diagnosis. SDH-deficient RCC detected
    at small T1 stage allows nephron-sparing surgery. SDH-deficient
    GIST detected indolently allows surgical or watchful management
    (rather than the empirical imatinib of c-KIT-mutated GIST, which
    is ineffective in SDH-deficient GIST).

