do_not_do:
  - "Не презентувати observation як еквівалент АРТ — АРТ є життєрятівною інтервенцією, не просто cancer-prevention."
  - "Не пропускати periodic re-counseling про важливість ART — більшість пацієнтів врешті приймають терапію після додаткових візитів."
  - "Не використовувати цей шлях як перший вибір — ART-track залишається preferred standard of care."

do_not_do_en:
  - "Do not present observation as equivalent to ART — ART is a life-saving intervention, not merely cancer prevention."
  - "Do not skip periodic re-counseling about the importance of ART — most patients eventually accept therapy after additional visits."
  - "Do not use this pathway as a first choice — the ART track remains the preferred standard of care."

