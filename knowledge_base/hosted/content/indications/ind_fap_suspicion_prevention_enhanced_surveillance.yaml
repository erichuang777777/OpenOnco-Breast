do_not_do:
  - "Не презентувати enhanced surveillance як еквівалент genetic confirmation — diagnostic precision відсутня; cascade-testing benefit для родичів втрачається."
  - "Не виконувати профілактичну колектомію у emp​іричних спостереженнях без demonstrable polyposis (≥20 аденом) або high-grade дисплазії / інвазивної карциноми — confirmed APC носійство або polyp burden обґрунтовує операцію, не сімейна історія сама по собі."
  - "Не пропускати periodic re-discussion про genetic testing — більшість пацієнтів врешті приймають тестування після додаткових візитів та зменшення тривоги."
  - "Не пропускати hepatoblastoma скринінг (AFP + УЗД) у дітей з сильної FAP-сім'ї, навіть без генетичного підтвердження — інтервал q3-6 місяців birth до 5 років обов'язковий."
  - "Не починати щорічний верхньо-ШКТ EGD у emp​іричних спостереженнях підлітків — duodenal polyposis рідко емержує до 25-30 років, а інтенсивний скринінг без APC підтвердження надлишковий."

do_not_do_en:
  - "Do not present enhanced surveillance as equivalent to genetic confirmation — diagnostic precision is absent; cascade-testing benefit for relatives is lost."
  - "Do not perform prophylactic colectomy in empirical surveillance without demonstrable polyposis (≥20 adenomas) or high-grade dysplasia / invasive carcinoma — confirmed APC carrier status or polyp burden justifies surgery, family history alone does not."
  - "Do not skip periodic re-discussion of genetic testing — most patients eventually accept testing after additional visits and reduced anxiety."
  - "Do not skip hepatoblastoma screening (AFP + ultrasound) in children of a strong FAP family even without genetic confirmation — q3-6 month interval birth to age 5 is mandatory."
  - "Do not start annual upper-GI EGD in empirical surveillance of adolescents — duodenal polyposis rarely emerges before age 25-30, and intensive screening without APC confirmation is excessive."

