expected_outcomes:
  overall_response_rate: >-
    Empirical FAP-style surveillance (annual sigmoidoscopy from
    age 10-12 with escalation to colonoscopy on polyp emergence; low
    threshold for colectomy when polyposis becomes endoscopically
    unmanageable): expected to capture CRC at earliest detectable
    stage in the subset who are actual carriers (~30-90% of pedigree-
    suspicion individuals depending on phenotype stringency). Does
    NOT carry the diagnostic certainty of germline confirmation —
    carriers may receive unnecessary intensive surveillance when
    negative testing would have de-escalated, non-carriers receive
    surveillance that could have been safely declined, and the
    autosomal-dominant inheritance means cascade testing of siblings
    / children remains unresolved without proband genetic confirmation.

