do_not_do:
  - "Не презентувати dietary counseling як заміну colonoscopy screening — both interventions complementary."
  - "Не призначати aggressive fibre escalation — поступове збільшення мінімізує GI intolerance і покращує adherence."
  - "Не покладатися на fibre supplements (psyllium лише) замість whole-food fibre — мікробіом + matrix effects недосяжні з isolated supplements."
  - "Не ігнорувати cultural / economic constraints — fibre-rich whole foods можуть бути недоступні; counseling має бути feasible."

do_not_do_en:
  - "Do not present dietary counseling as a substitute for colonoscopy screening — both interventions are complementary."
  - "Do not prescribe aggressive fibre escalation — gradual progression minimizes GI intolerance and improves adherence."
  - "Do not rely on fibre supplements (psyllium alone) as a substitute for whole-food fibre — microbiome + matrix effects are not reproduced by isolated supplements."
  - "Do not ignore cultural / economic constraints — fibre-rich whole foods may be inaccessible; counseling must be feasible."

