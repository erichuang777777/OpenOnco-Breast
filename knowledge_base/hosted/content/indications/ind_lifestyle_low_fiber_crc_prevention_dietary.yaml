rationale: >
  Standard-track prevention pathway for low dietary fibre intake.
  Components per WCRF/AICR Continuous Update Project + ACS 2020 Diet +
  Physical Activity Guideline + NCCN Colon Cancer screening framework:

  **(1) Dietary fibre-target counseling** — Target ≥25-30 g/day total
  fibre from whole-food sources:
  - Whole grains (oats, barley, brown rice, whole-wheat, quinoa) —
    target ≥3 servings/day
  - Legumes (beans, lentils, chickpeas, peas) — target ≥4 servings/week
  - Vegetables — ≥5 servings/day, emphasize cruciferous + leafy greens
  - Fruits — 2-4 servings/day with skin/pulp intact
  - Nuts + seeds — 1 oz (28 g) daily as feasible

  **(2) Gradual intake-progression counseling** — Increase fibre by
  ~5 g/day every 1-2 weeks to minimize GI side effects (bloating, flatus,
  cramping). Pair with adequate hydration (~2 L water/day). Patients
  with IBS or prior bowel surgery may need slower progression and
  soluble-fibre emphasis (psyllium, oats) over insoluble.

  **(3) Mediterranean-style or plant-forward eating pattern** — Whole
  foods, vegetables, fruits, whole grains, olive oil, moderate fish/
  poultry. Strongest dietary-pattern evidence for CRC + cardiovascular
  + all-cause mortality reduction; aligns with high-fibre target.

  **(4) USPSTF-cadence CRC screening** — Colonoscopy q10y from age 45
  (or stool-based screening: FIT q1y, FIT-DNA q3y as alternatives).
  Low fibre intake does not change screening cadence per current
  guidelines but compounds baseline risk.

  **(5) Referral to registered dietitian** for sustained behavioral
  change, especially if cultural/economic constraints make whole-food
  dietary patterns challenging.

  Dietary intervention + age-appropriate screening additive for CRC
  incidence reduction.

rationale_ua: >
  Стандартний-трек prevention шлях для low dietary fibre intake.
  Components per WCRF/AICR + ACS 2020 + NCCN Colon framework:

  **(1) Dietary fibre-target counseling** — Ціль ≥25-30 г/день з
  whole-food sources:
  - Whole grains (овес, ячмінь, brown rice, whole-wheat, кіноа) —
    ≥3 порції/день
  - Бобові (квасоля, сочевиця, нут, горох) — ≥4 порції/тиждень
  - Овочі — ≥5 порцій/день, з акцентом на cruciferous + leafy greens
  - Фрукти — 2-4 порції/день зі шкірою/м'якоттю
  - Горіхи + насіння — 28 г/день за можливістю

  **(2) Поступове збільшення інтаке** — Підвищувати fibre на ~5 г/день
  кожні 1-2 тижні для мінімізації GI side-effects (bloating, flatus,
  cramping). Pair з гідратацією (~2 л води/день). Пацієнти з IBS або
  prior bowel surgery — повільніша progression, акцент на soluble fibre
  (psyllium, овес) над insoluble.

  **(3) Mediterranean-style або plant-forward eating pattern** — Whole
  foods, овочі, фрукти, whole grains, olive oil, помірне fish/poultry.

  **(4) USPSTF-cadence CRC screening** — Colonoscopy q10y з 45 років
  (або FIT q1y / FIT-DNA q3y).

  **(5) Direction до registered dietitian** для sustained behavioral
  change.

