expected_outcomes:
  overall_response_rate: "Increasing dietary fibre from <15 g/day to ≥30 g/day is associated with ~15-20% reduction in CRC incidence (meta-analyzed RR; WCRF/AICR convincing-evidence rating). Fibre-rich dietary patterns (whole grains, legumes, vegetables, fruits, nuts) also reduce all-cause + cardiovascular mortality. Population-level intervention potential meaningful — endemic low intake in Western diets."

