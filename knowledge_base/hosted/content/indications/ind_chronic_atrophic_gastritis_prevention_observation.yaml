expected_outcomes:
  overall_response_rate: >-
    Symptom-driven observation (B12 + iron + CBC q6-12mo; EGD only for
    new dyspeptic symptoms, weight loss, anemia, or GI bleeding)
    captures gastric malignancy at later stage than scheduled
    surveillance. Acceptable as a minimum-intensity default for
    low-stage atrophy (OLGA/OLGIM 0-II) without family history of
    gastric cancer; below standard of care for OLGA/OLGIM III-IV.

