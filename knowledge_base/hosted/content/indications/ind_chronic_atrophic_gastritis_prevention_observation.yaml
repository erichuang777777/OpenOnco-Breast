rationale: >
  Alternative-track companion to IND-CHRONIC-ATROPHIC-GASTRITIS-
  PREVENTION-SURVEILLANCE. Appropriate for patients with histologically
  confirmed CAG who fall into a low-stage subgroup AND choose minimum-
  intensity surveillance for any of: cost / access constraints,
  procedural anxiety, geographic distance to GI center, advanced age
  with limited life expectancy, or explicit preference after
  informed-consent discussion of trade-offs.

  **Cadence:**
    - CBC + ferritin + iron studies + B12 q6-12mo (baseline endocrine /
      hematologic care for autoimmune CAG)
    - Gastrin level annually (rising gastrin may signal ECL-cell
      hyperplasia / emerging type 1 NET)
    - EGD only when triggered by:
      - New or worsening dyspepsia not responding to standard PPI
      - Unintentional weight loss >5%
      - New iron-deficiency or B12 deficiency anemia not explained by
        baseline malabsorption
      - GI bleeding (overt or occult)
      - Early satiety, dysphagia, persistent vomiting

  **Not appropriate for:**
    - OLGA III/IV or OLGIM III/IV (these are above the eligibility
      threshold for symptom-driven observation; scheduled surveillance
      is strongly recommended)
    - Patients with prior dysplasia of any grade
    - Patients with family history of gastric cancer (especially first-
      degree relative)
    - Patients with concomitant H. pylori not yet eradicated (eradicate
      first, then re-stage atrophy)
    - Patients with rapidly rising gastrin or new visible NET on prior
      imaging

  Per CHARTER §11 patient-autonomy framing: low-stage CAG (OLGA 0-II)
  carries modest absolute cancer risk (<1% over 12 years in Rugge
  cohort), so symptom-driven observation is a legitimate informed-
  consent choice. Patient retains option to upgrade to scheduled
  surveillance at any future visit.

  **Alarm features** route immediately to diagnostic EGD with Sydney
  biopsies — and if frank malignancy is confirmed, to the treatment-
  persona algorithm via DIS-GASTRIC or DIS-GI-NET as appropriate.

rationale_ua: >
  Альтернативно-трекова Indication — компаньйон до
  IND-CHRONIC-ATROPHIC-GASTRITIS-PREVENTION-SURVEILLANCE. Доречно для
  пацієнтів з гістологічно підтвердженим CAG, які належать до low-stage
  підгрупи І обирають мінімальної інтенсивності спостереження з
  причин: вартість / доступ, процедурна тривога, географічна відстань,
  похилий вік з обмеженою тривалістю життя, або явна перевага після
  informed-consent обговорення.

  **Частота:**
    - CBC + ferritin + iron studies + B12 q6-12 міс
    - Гастрин рівень щорічно
    - EGD лише при триггері:
      - Нова або погіршена диспепсія не реагує на стандартний PPI
      - Ненавмисне схуднення >5%
      - Нова ЗДА або B12-дефіцитна анемія не пояснена baseline
        мальабсорбцією
      - ШКТ-кровотеча (явна або прихована)
      - Рання сатиація, дисфагія, persistent блювота

  **Не доречно для:**
    - OLGA III/IV або OLGIM III/IV — потребують запланованої surveillance
    - Пацієнтів з попередньою дисплазією будь-якого ступеня
    - Пацієнтів з сімейним анамнезом раку шлунка
    - Пацієнтів з coexisting H. pylori не ще ерадикованим
    - Пацієнтів зі швидко зростаючим гастрином або новим видимим NET

  Per CHARTER §11 framing автономії пацієнта: low-stage CAG несе
  модерний абсолютний рак-ризик (<1% за 12 років), тому symptom-driven
  observation — legitimate informed-consent вибір.

  **Alarm features** маршрутизують негайно до діагностичної EGD з
  Sydney біопсіями.

