do_not_do:
  - "Не використовувати цей шлях у пацієнтів з OLGA/OLGIM III-IV — потребують запланованої surveillance EGD q3 роки."
  - "Не презентувати symptom-driven observation як еквівалент scheduled surveillance — interval-cancer ризик вищий, презентація типово на більш пізній стадії."
  - "Не ігнорувати alarm features (диспепсія non-responsive до PPI, нова анемія, ШКТ-кровотеча) — імідіат-EGD показана."
  - "Не використовувати цей шлях у пацієнтів з попередньою дисплазією або сімейним анамнезом раку шлунка."
  - "Не пропускати періодичне обговорення upgrade — атрофія може прогресувати на surveillance інтервалі."

do_not_do_en:
  - "Do not use this pathway in patients with OLGA/OLGIM III-IV — they require scheduled surveillance EGD every 3 years."
  - "Do not present symptom-driven observation as equivalent to scheduled surveillance — interval-cancer risk is higher, presentation typically at later stage."
  - "Do not ignore alarm features (PPI-non-responsive dyspepsia, new anemia, GI bleeding) — immediate EGD indicated."
  - "Do not use this pathway in patients with prior dysplasia or family history of gastric cancer."
  - "Do not skip periodic re-discussion of upgrade — atrophy can progress over the surveillance interval."

