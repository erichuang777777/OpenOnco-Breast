nccn_category: "2A"

expected_outcomes:
  overall_response_rate: >-
    Praziquantel cure of active S. haematobium infection: >85% single
    dose 40 mg/kg PO; >95% with retreatment at 6 weeks. Cancer-prevention
    endpoint: reduced bladder SCC incidence in long-term cohorts where
    population-level praziquantel programmes are sustained, BUT
    praziquantel does NOT reverse chronic urothelial inflammation /
    squamous metaplasia from prior burden — lifetime urinary surveillance
    remains mandatory.

