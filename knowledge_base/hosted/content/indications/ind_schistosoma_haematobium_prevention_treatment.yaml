  - "Не пропускати урологічну surveillance — мікрогематурія є основним раннім сигналом."

do_not_do_en:
  - "Do not consider praziquantel a complete cancer-prevention intervention — chronic metaplasia from prior burden preserves SCC risk."
  - "Do not present praziquantel to the patient as 'protection from bladder cancer'. Disclaimer per CHARTER §11."
  - "Do not skip urinary surveillance — microscopic hematuria is the dominant early signal."

