  - TEST-LFT
desired_tests: []

rationale: >
  Standard-track prevention pathway for prior or active S. haematobium
  infection. Eradicate active infection with praziquantel 40 mg/kg PO
  single dose (WHO standard) — retreat at 6 weeks if ova still
  detectable. Then transition to lifelong urinary surveillance:
  urinalysis q6-12mo (microscopic hematuria is the dominant early
  sign of bladder SCC); urine cytology + cystoscopy for any new gross
  hematuria.

  S. haematobium-driven bladder cancers are predominantly squamous-cell
  carcinoma (SCC) — distinct from urothelial / transitional cell
  carcinoma. This affects cytology interpretation (squamous cells are
  not necessarily reactive in this population) and cystoscopic
  threshold for biopsy.

rationale_ua: >
  Стандартний-трек prevention шлях для попередньої або активної
  інфекції S. haematobium. Ерадикація активної інфекції празиквантелом
  40 мг/кг PO однократно (стандарт ВООЗ) — повторне лікування через
  6 тижнів якщо ova ще визначаються. Потім перехід до пожиттєвої
  урологічної surveillance: загальний аналіз сечі q6-12мо
  (мікрогематурія — домінуюча рання ознака SCC сечового міхура);
  цитологія сечі + цистоскопія при будь-якій новій макрогематурії.

  S. haematobium-зумовлені раки сечового міхура переважно
  плоскоклітинні (SCC) — відмінно від уротеліального / TCC. Це
  впливає на інтерпретацію цитології та поріг для біопсії при
  цистоскопії.

