expected_outcomes:
  overall_response_rate: >-
    Intensified track layers two options on top of standard SDHx
    surveillance: (1) earlier baseline imaging (age 5 in SDHB pediatric
    kindreds — when family-specific proband has documented onset before
    age 10); (2) closer biochemistry interval (q6mo plasma metanephrines
    + 3-MT in highest-risk subset, with functional 68Ga-DOTATATE PET
    used for any biochemical signal). Trade-off: increased imaging /
    biochemistry burden, more lifetime surveillance visits, anxiety
    burden in pediatric carriers — all shared-decision-making points
    within the family. Goal: maximize lead time for SDHB-associated
    aggressive paragangliomas (metastatic-onset event is the dominant
    SDHB mortality driver).

