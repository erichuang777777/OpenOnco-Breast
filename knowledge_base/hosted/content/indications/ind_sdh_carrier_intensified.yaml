do_not_do:
  - "Не advanceувати baseline imaging до age 5 без family-specific pediatric-onset proband — sedation / anesthesia burden + lifelong cumulative surveillance не виправдані."
  - "Не використовувати empirical PRRT (177Lu-DOTATATE) у asymptomatic carrier — реверв для metastatic / progressive disease."
  - "Не пропускати paternal-inheritance counseling у SDHD / SDHAF2 pre-conception genetic counseling — maternal vs paternal transmission кардинально різні implications."
  - "Не призначати empirical somatostatin-receptor-targeted therapy (octreotide / lanreotide) у asymptomatic carrier — реверв для symptomatic functional або metastatic disease."
  - "Не intensifyувати biochemistry до q6mo у всіх SDHB carriers — реверв для prior-PPGL history або metastatic-risk pedigree."

do_not_do_en:
  - "Do not advance baseline imaging to age 5 without family-specific pediatric-onset proband — sedation / anesthesia burden and lifelong cumulative surveillance are not justified otherwise."
  - "Do not use empirical PRRT (177Lu-DOTATATE) in an asymptomatic carrier — reserve for metastatic / progressive disease."
  - "Do not skip paternal-inheritance counseling in SDHD / SDHAF2 pre-conception genetic counseling — maternal vs paternal transmission has fundamentally different implications."
  - "Do not prescribe empirical somatostatin-receptor-targeted therapy (octreotide / lanreotide) in an asymptomatic carrier — reserve for symptomatic functional or metastatic disease."
  - "Do not intensify biochemistry to q6mo in all SDHB carriers — reserve for prior-PPGL history or metastatic-risk pedigree."

