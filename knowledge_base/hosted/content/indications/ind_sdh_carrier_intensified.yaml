rationale: >
  Aggressive-track confirmed-carrier pathway layered on top of the
  IND-SDH-CARRIER-SURVEILLANCE standard protocol.

  **Foundation:** All standard surveillance from IND-SDH-CARRIER-
  SURVEILLANCE applies (subunit-risk-stratified imaging cadence,
  plasma metanephrines + 3-MT q1y, head + neck MRI q2-3y, abdominal
  MRI q1y, mandatory pre-operative alpha-blockade for any PPGL
  resection, paternal-inheritance counseling for SDHD / SDHAF2).

  **Intensification 1 — Earlier baseline imaging (age 5 in SDHB
  pediatric kindreds):** When the family-specific proband has
  documented PPGL or RCC before age 10, advance baseline whole-body
  MRI from age 6-10 to age 5 (or earlier if proband even younger).
  Trade-off: requires age-appropriate sedation / general anesthesia
  for compliant pediatric MRI; high family counseling burden;
  cumulative MRI-related contrast considerations across decades.

  **Intensification 2 — Closer biochemistry interval (q6mo plasma
  metanephrines + 3-MT) in highest-risk subset:** For SDHB carriers
  with prior PPGL history (post-resection surveillance) or for SDHB
  carriers in families with metastatic-PPGL pedigree, advance
  biochemistry from annual to q6mo. Any abnormal biochemical signal
  triggers prompt functional imaging — 68Ga-DOTATATE PET (preferred
  for SDHx-PPGL given high somatostatin-receptor-2 expression) or
  18F-FDOPA PET as alternative. Cross-sectional MRI for anatomic
  staging follows positive functional study.

  **Other intensification considerations (not core to this track):**
    - Empirical somatostatin-receptor-targeted therapy in asymptomatic
      carrier is NOT indicated (octreotide, lanreotide reserved for
      symptomatic functional or metastatic disease).
    - Empirical PRRT (peptide receptor radionuclide therapy with
      177Lu-DOTATATE) is NOT indicated in asymptomatic carrier —
      reserved for metastatic / progressive disease.
    - Pre-conception genetic counseling (preimplantation genetic
      testing, prenatal diagnosis options) appropriate for carriers of
      childbearing age — for SDHD / SDHAF2 carriers must include
      paternal-inheritance counseling specifically.

  **Cascade testing remains continuous:** every visit re-confirms
  family testing status; critical for pediatric kindred and for
  paternal-line identification in SDHD / SDHAF2.

  Per CHARTER §11: intensified pediatric surveillance and closer
  biochemistry interval are shared-decision-making domains.

rationale_ua: >
  Aggressive-трекова Indication: накладена поверх IND-SDH-CARRIER-
  SURVEILLANCE.

  **Foundation:** Усе standard з IND-SDH-CARRIER-SURVEILLANCE.

  **Інтенсифікація 1 — Earlier baseline imaging (age 5 у SDHB
  pediatric кіндредах):** Коли family-specific proband має documented
  PPGL / RCC до 10 років — advance baseline whole-body MRI з 6-10 до 5
  років (або раніше). Trade-off: age-appropriate sedation / general
  anesthesia потрібна для compliant pediatric MRI; high family
  counseling burden; cumulative MRI contrast considerations.

  **Інтенсифікація 2 — Closer biochemistry (q6mo plasma metanephrines
  + 3-MT) у highest-risk subset:** SDHB carriers з prior PPGL history
  (post-resection surveillance) або в metastatic-PPGL pedigree —
  advance з annual до q6mo. Будь-який abnormal biochemical signal
  triggers prompt functional imaging — 68Ga-DOTATATE PET (preferred
  для SDHx-PPGL через high SSTR2 expression) або 18F-FDOPA PET як
  alternative. Cross-sectional MRI для anatomic staging follows
  positive functional study.

  **Інші міркування:**
    - Empirical somatostatin-receptor-targeted therapy у asymptomatic
      carrier — NOT indicated.
    - Empirical PRRT (177Lu-DOTATATE) — NOT indicated у asymptomatic
      carrier; реверв для metastatic / progressive disease.
    - Pre-conception genetic counseling (PGT, prenatal diagnosis)
      appropriate для carriers of childbearing age; для SDHD / SDHAF2
      counseling має включати paternal-inheritance specifically.

  **Cascade тестування continuous;** critical для pediatric кіндредів
  та paternal-line identification у SDHD / SDHAF2.

  Per CHARTER §11: shared-decision-making домен.

