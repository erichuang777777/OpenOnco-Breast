id: IND-OPISTHORCHIS-CHOLANGIO-PREVENTION-OBSERVATION
plan_track: surveillance
intent: prevention

applicable_to:
  disease_id: DIS-CHOLANGIOCARCINOMA
  stage_requirements: []
  biomarker_requirements_required: []
  biomarker_requirements_excluded: []
  demographic_constraints:
    ecog_max: 3

triggered_by_redflags:
  - RF-OPISTHORCHIS-CHOLANGIO-PREVENTION

recommended_regimen: null
concurrent_therapy: []
followed_by: []

evidence_level: low
strength_of_recommendation: conditional
nccn_category: "2B"

expected_outcomes:
  overall_response_rate: >-
    Primary endpoint: hepatobiliary surveillance compliance (liver US +
    CA 19-9 q12mo from age 40 in heavily-exposed cohorts). Does not
    reduce O. viverrini-driven cholangiocarcinoma incidence but
    improves likelihood of early-stage detection (resectable disease).

hard_contraindications: []
red_flags_triggering_alternative: []
required_tests:
  - TEST-CBC
  - TEST-LFT
desired_tests: []

rationale: >
  Alternative-track companion to
  IND-OPISTHORCHIS-CHOLANGIO-PREVENTION-TREATMENT. Patient with prior
  O. viverrini exposure but no active infection on confirmatory testing
  — surveillance-only without praziquantel. Lifelong hepatobiliary
  surveillance for heavily-exposed cohorts: liver US + CA 19-9 q12mo
  from age 40.

  Also covers patients with active infection who decline praziquantel
  for any reason — surveillance still offered (incidence-reduction
  absent).

rationale_ua: >
  Альтернативно-трекова Indication — компаньйон до
  IND-OPISTHORCHIS-CHOLANGIO-PREVENTION-TREATMENT. Пацієнт з
  попередньою експозицією O. viverrini без активної інфекції на
  підтверджуючому тестуванні — surveillance-only без празиквантелу.
  Пожиттєва гепатобіліарна surveillance для важко-експонованих
  когорт: УЗД печінки + CA 19-9 q12мо з 40 років.

