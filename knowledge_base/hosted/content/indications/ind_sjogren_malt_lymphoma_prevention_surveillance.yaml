rationale: >
  Standard-track prevention pathway for patients with confirmed primary
  Sjögren's syndrome. Annual structured assessment combines physical
  examination, lab monitoring, and on-demand imaging:

  **Physical examination (annually):** parotid and lacrimal glands
  (bilateral palpation, asymmetry, persistent enlargement, hardness,
  fixation); cervical and axillary lymph nodes; spleen/liver; skin
  (palpable purpura, livedo, ulcerations from cryoglobulinemic
  vasculitis).

  **Laboratory monitoring (annually, or q6mo for high-risk subgroup):**
    - CBC with differential (cytopenias may herald lymphoma involvement
      of marrow)
    - SPEP + serum immunoglobulins (IgM, IgG, IgA) — monoclonal protein
      detection
    - Cryoglobulins, C3, C4 (hypocomplementemia is a strong predictor)
    - LDH, β2-microglobulin (elevated in lymphoma progression)
    - Anti-Ro/SSA, anti-La/SSB titers (baseline only; titer doesn't
      track lymphoma risk)

  **Imaging-on-trigger:**
    - **Parotid US** for any new or persistent unilateral parotid
      swelling >2 weeks. Sjögren-associated salivary lymphoma has
      characteristic US features (hypoechoic nodules with cystic
      change, "honeycomb" pattern); US-guided core-needle biopsy if
      lymphoid-lesion-suspicious findings.
    - **Lacrimal gland US/MRI** for orbital swelling or proptosis
    - **CT neck/chest/abdomen/pelvis** for B-symptoms, new
      lymphadenopathy, or splenomegaly

  **Risk stratification (Brito-Zerón ESSDAI predictors):** count
  predictors (persistent salivary swelling, low C4, cryoglobulinemia,
  palpable purpura, monoclonal gammopathy, splenomegaly, lymphadenopathy,
  pulmonary involvement). Patients with ≥3 predictors should be
  considered for q6mo monitoring and lower threshold for diagnostic
  workup.

  **Treatment of underlying Sjögren's** (hydroxychloroquine for fatigue
  / arthralgias, sialogogues for sicca, ophthalmology referral for
  ocular involvement, rituximab for cryoglobulinemic vasculitis or
  severe extraglandular disease per EULAR 2020) is rheumatology's
  domain. Hydroxychloroquine has been hypothesized to reduce lymphoma
  risk but evidence remains observational; no formal prevention claim.

  In Ukraine, Sjögren's care is provided by rheumatology specialists at
  regional and tertiary centers (Kyiv, Lviv, Odesa, Kharkiv). Parotid
  US widely available; core-needle biopsy and flow cytometry at
  oncology and lymphoma-specialist centers. Cryoglobulin testing
  requires specific transport/processing protocols (warm transport,
  37 °C centrifugation) — confirm laboratory capability before sending.

rationale_ua: >
  Стандартний-трек prevention шлях для пацієнтів з підтвердженим
  первинним синдромом Шегрена. Щорічна структурована оцінка поєднує
  фізикальне обстеження, лабораторний моніторинг та on-demand
  імиджинг:

  **Фізикальне обстеження (щорічно):** привушні та слізні залози
  (білатеральна пальпація, асиметрія, persistent збільшення, твердість,
  фіксація); шийні та аксилярні лімфовузли; селезінка/печінка; шкіра
  (palpable purpura, livedo, виразки від кріоглобулінемічного
  vasculitis).

  **Лабораторний моніторинг (щорічно або q6 міс для high-risk):**
    - CBC з диференціалом
    - SPEP + сироваткові імуноглобуліни
    - Кріоглобуліни, C3, C4
    - LDH, β2-мікроглобулін
    - Anti-Ro/SSA, anti-La/SSB титри (baseline лише)

  **Imaging-on-trigger:**
    - **Parotid US** для будь-якого нового/persistent unilateral
      привушного набряку >2 тижні. Sjögren-асоційована салівна
      лімфома має характерні US ознаки; US-guided core-needle
      біопсія при lymphoid-lesion-suspicious знахідках.
    - **Слізна залоза US/MRI** для орбітального набряку
    - **CT шия/груди/живіт/таз** для B-симптомів

  **Стратифікація ризику (Brito-Zerón ESSDAI предиктори):** persistent
  слиновий набряк, низький C4, кріоглобулінемія, palpable purpura,
  моноклональна гаммапатія, спленомегалія, лімфаденопатія. ≥3
  предиктори — q6 міс моніторинг.

  **Лікування underlying Sjögren's** (гідроксихлорохін, sialogogues,
  ofthalmology, ритуксимаб per EULAR 2020) — rheumatology домен.

  В Україні Sjögren's care надається rheumatology фахівцями у
  регіональних та третинних центрах. Cryoglobulin testing потребує
  specific transport/processing протоколів (теплий транспорт, 37 °C
  центрифугування).

