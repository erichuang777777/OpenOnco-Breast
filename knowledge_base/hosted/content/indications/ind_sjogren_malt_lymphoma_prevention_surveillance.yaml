nccn_category: "2A"

expected_outcomes:
  overall_response_rate: >-
    Annual clinical assessment + targeted lab monitoring (cryoglobulins,
    C4, SPEP, immunoglobulins, CBC) + parotid US-on-trigger captures
    salivary/lacrimal MALT lymphoma at earliest detectable stage
    (typically stage IE — localized, amenable to gland-preserving
    radiation or rituximab monotherapy with excellent disease-specific
    survival >90%). Surveillance does not reduce baseline incidence
    but materially shifts stage at diagnosis (stage IE detection rate
    much higher in EULAR-screened cohorts vs symptom-only presentation).

