sources:
  - source_id: SRC-NCCN-BCELL-2025
    position: supports
    relevant_quote_paraphrase: >-
      "Primary Sjögren's syndrome confers the highest lymphoma risk
      among rheumatic diseases (relative risk ~15-20). Annual clinical
      and laboratory surveillance for lymphoma predictors (persistent
      parotid swelling, low C4, cryoglobulinemia, monoclonal gammopathy)
      enables earlier MALT lymphoma detection."

do_not_do:
  - "Не покладатися лише на anti-Ro/SSA титри для lymphoma surveillance — титри не корелюють з emerging лімфомою."
  - "Не лікувати persistent parotid swelling як просту salivary obstruction без EUS/US + цитологічного або core-needle обстеження."
  - "Не призначати empiric ритуксимаб без діагнозу лімфоми або задокументованої cryoglobulinemic vasculitis — рекомендації EULAR 2020 не включають prophylactic anti-CD20."
  - "Не пропускати тестування кріоглобулінів — низький C4 + кріоглобулінемія — потужні lymphoma предиктори."
  - "Не пропускати періодичну оцінку селезінки + лімфовузлів — extraglandular лімфома може презентувати без salivary знахідок."

do_not_do_en:
  - "Do not rely solely on anti-Ro/SSA titers for lymphoma surveillance — titers do not correlate with emerging lymphoma."
  - "Do not treat persistent parotid swelling as simple salivary obstruction without US + cytologic or core-needle workup."
  - "Do not prescribe empiric rituximab without a lymphoma diagnosis or documented cryoglobulinemic vasculitis — EULAR 2020 does not endorse prophylactic anti-CD20."
  - "Do not omit cryoglobulin testing — low C4 + cryoglobulinemia are strong lymphoma predictors."
  - "Do not skip periodic evaluation of spleen + lymph nodes — extraglandular lymphoma can present without salivary findings."

