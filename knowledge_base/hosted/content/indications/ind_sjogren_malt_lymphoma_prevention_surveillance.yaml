# No systemic drug regimen — primary intervention is annual physical
# examination + lab monitoring + imaging-on-trigger. Rheumatologic
# disease-modifying therapy (hydroxychloroquine, methotrexate, B-cell
# depletion) is treatment of the underlying syndrome and is captured
# in rheumatology care, not as a prevention Regimen FK.
