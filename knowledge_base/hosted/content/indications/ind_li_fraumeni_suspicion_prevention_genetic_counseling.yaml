expected_outcomes:
  overall_response_rate: >-
    Diagnostic yield of germline TP53 testing in pedigree-suspicion
    populations: ~50-70% in classic-LFS-criteria probands (very high
    yield), ~20-30% in Chompret-criteria probands, ~5-10% in
    multiple-primaries probands without Chompret/classic criteria.
    Confirmed carrier routes to Toronto-protocol surveillance with
    documented mortality benefit: prospective cohort data (Villani
    et al. Lancet Oncology 2016; SIGNIFY trial) show ~25-35% 5-year
    survival improvement with active surveillance vs untreated
    controls (89% vs 60%). Risk-reducing mastectomy in BRCA-overlap
    confirmed-carrier women reduces breast cancer incidence by ~90%
    and remains a discussion point in LFS care given the very high
    breast cancer penetrance.

