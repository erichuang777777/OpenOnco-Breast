notes: STUB — v0.2-B hereditary pilot for Li-Fraumeni Syndrome. NCCN Genetic/Familial High-Risk Breast/Ovarian/Pancreatic and dedicated LFS testing guidance (Mai et al. NCI consortium, Bougeard et al. revised Chompret) as new SRC entities are v0.2-B authoring backlog. Cascade testing of confirmed-carrier first-degree relatives + interventions for confirmed carriers (RF-LI-FRAUMENI-CONFIRMED-CARRIER + IND-LI-FRAUMENI-CARRIER-*) are v0.2-B follow-up authoring.
