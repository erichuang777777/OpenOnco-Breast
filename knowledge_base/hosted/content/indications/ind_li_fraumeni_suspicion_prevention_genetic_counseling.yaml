sources:
  - source_id: SRC-NCCN-BREAST-2025
    position: supports
    relevant_quote_paraphrase: >-
      "Genetic counseling and TP53 testing are recommended for
      individuals meeting Chompret or classic Li-Fraumeni criteria.
      Confirmed TP53 carriers should be offered surveillance
      including annual breast MRI in women, whole-body MRI, and
      brain MRI."
  - source_id: SRC-NCCN-SARCOMA
    position: supports
    relevant_quote_paraphrase: >-
      "Soft-tissue sarcoma and osteosarcoma at young age, or
      multiple sarcoma primaries, warrant evaluation for Li-Fraumeni
      syndrome and germline TP53 testing."
  - source_id: SRC-NCCN-CNS-2025
    position: supports
    relevant_quote_paraphrase: >-
      "Pediatric and young-adult CNS tumors (especially choroid
      plexus carcinoma, anaplastic medulloblastoma) merit
      evaluation for Li-Fraumeni syndrome regardless of family
      history."
  - source_id: SRC-NCCN-AML-2025
    position: supports
    relevant_quote_paraphrase: >-
      "Familial AML / leukemia in the context of an LFS-spectrum
      pedigree merits germline testing including TP53."

do_not_do:
  - "Не призначати germline TP53 тестування без LFS-специфічного pre-test консультування — психологічний тягар та lifetime-ризик-наближення-до-100% потребують спеціалізованого framing."
  - "Не трактувати VUS TP53 результат як патогенний — управляйте як родовідну підозру; не запускайте resource-intensive Toronto-protocol surveillance без confirmed pathogenic status."
  - "Не рекомендувати рутинну мамографію у TP53 носіїв до 30 років без явного обговорення radiation-induced secondary-cancer ризику — ультразвук / МРТ переважні у молодих носіїв."
  - "Не приймати lifetime risk ~100% як підставу для contraindications до treatment — TP53 носії, що розвивають index-раки, лікуються з ретельним розглядом radiation-avoiding альтернатив (хірургія, системна терапія), не з therapeutic nihilism."
  - "Не пропускати психосоціальну підтримку — LFS-специфічна тривога важка; вимагає peer support (LFS Association, Living LFS) і часто mental-health professional, навченого з hereditary-cancer counseling."

do_not_do_en:
  - "Do not order germline TP53 testing without LFS-specific pre-test counseling — the psychological burden and lifetime-risk-approaching-100% require specialized framing."
  - "Do not treat a TP53 VUS result as pathogenic — manage as pedigree suspicion; do not trigger resource-intensive Toronto-protocol surveillance without confirmed pathogenic status."
  - "Do not recommend routine mammography in TP53 carriers <30 without explicit discussion of radiation-induced secondary-cancer risk — ultrasound / MRI are preferred in young carriers."
  - "Do not accept lifetime risk ~100% as grounds for treatment contraindication — TP53 carriers who develop index cancers are treated with careful consideration of radiation-avoiding alternatives (surgery, systemic therapy), not with therapeutic nihilism."
  - "Do not skip psychosocial support — LFS-specific anxiety is severe; requires peer support (LFS Association, Living LFS) and often a mental-health professional trained in hereditary-cancer counseling."

