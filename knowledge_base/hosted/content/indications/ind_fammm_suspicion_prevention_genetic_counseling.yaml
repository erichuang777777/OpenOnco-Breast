rationale: >
  Standard-track prevention pathway for FAMMM / CDKN2A syndrome.

  **(1) Genetic counseling + germline CDKN2A panel.**

  **(2) Confirmed-carrier surveillance:**
  - Annual whole-body skin exam by dermatologist; total body photography
    with dermoscopy
  - Patient self-skin exam monthly; dermoscopy-trained primary care
  - Pancreatic surveillance via EUS/MRI q1-2y starting age 40 in
    CAPS-Consortium-eligible carriers (varies by CDKN2A variant)
  - Sun-protection counseling (UV is primary modifiable melanoma risk)

  **(3) Cascade testing of first-degree relatives.**

