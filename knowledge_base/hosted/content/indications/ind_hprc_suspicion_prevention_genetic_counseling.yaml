rationale: >
  Standard-track prevention pathway for HPRC.

  **(1) Genetic counseling + germline MET panel.**

  **(2) Confirmed-carrier surveillance:**
  - Annual abdominal MRI starting age 30 (or 10y before youngest family RCC)
  - Nephron-sparing surgery threshold: ≥3cm for unifocal lesions (similar to VHL)
  - Active surveillance permissible for smaller lesions (HPRC-RCC is less
    aggressive than HLRCC-RCC; different from FH-RCC paradigm)

  **(3) Cascade testing of first-degree relatives.**

rationale_ua: >
  Стандартний-трек для HPRC.

  **(1) Genetic counseling + germline MET panel.**

  **(2) Surveillance:**
  - Annual abdominal MRI з 30 років
  - Nephron-sparing surgery поріг: ≥3см
  - Active surveillance permissible для менших lesions

  **(3) Cascade testing родичів.**

