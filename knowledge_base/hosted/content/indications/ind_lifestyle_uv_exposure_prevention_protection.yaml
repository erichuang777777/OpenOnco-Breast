  **(1) UV-protection counseling (5 components)** —
  - Shade-seeking 10:00-16:00
  - Broad-spectrum SPF ≥30 sunscreen, reapply q2год + після води/поту
  - Protective clothing (довгі рукави, wide-brim hat, UPF-rated fabric)
  - UV-blocking sunglasses
  - Уникнення intentional tanning (sun АБО tanning beds)

  **(2) Tanning-bed cessation** — Absolute recommendation; немає safe
  exposure level. Counsel ~75% melanoma risk increment з under-35 use.

  **(3) Skin self-examination (SSE)** — Щомісяця, full-body, ABCDE
  criteria. Partner-assisted exam для hard-to-see areas.

  **(4) Clinical full-body skin examination** — Cadence per risk:
  - Average + UV exposure: кожні 1-3 роки з 40 років
  - High risk: кожні 6-12 місяців by dermatologist
  - Personal history of NMSC або melanoma: per NCCN survivorship

  **(5) Dermoscopy / total-body photography** для пацієнтів з multiple
  atypical nevi або strong family history.

