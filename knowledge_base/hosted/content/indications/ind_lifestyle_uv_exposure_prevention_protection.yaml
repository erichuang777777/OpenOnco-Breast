rationale: >
  Standard-track prevention pathway for high UV exposure. Components per
  USPSTF Behavioral Counseling for Skin Cancer Prevention (2018, Grade B
  for 6mo-24y; Grade C ages 25+ with risk factors) + AAD + NCCN Melanoma
  + NCCN Skin Cancer:

  **(1) UV-protection counseling (5 components)** —
  - Shade-seeking 10am-4pm
  - Broad-spectrum SPF ≥30 sunscreen, reapplied q2h + after water/sweat
  - Protective clothing (long sleeves, wide-brim hat, UPF-rated fabric)
  - UV-blocking sunglasses
  - Avoid intentional tanning (sun OR indoor tanning beds — both Group 1
    carcinogens)

  **(2) Tanning-bed cessation** — Absolute recommendation; no safe-tanning
  exposure level. Counsel patients about ~75% melanoma risk increment with
  under-35 tanning-bed use.

  **(3) Skin self-examination (SSE)** — Monthly, full-body, with ABCDE
  criteria for moles (Asymmetry, Border, Color, Diameter, Evolution).
  Partner-assisted exam for hard-to-see areas.

  **(4) Clinical full-body skin examination** — Cadence per risk:
  - Average risk + UV exposure: every 1-3 years from age 40
  - High risk (multiple risk factors, family hx, prior actinic damage):
    every 6-12 months by dermatologist
  - Personal history of NMSC or melanoma: per NCCN Melanoma /
    NCCN Skin survivorship cadence

  **(5) Dermoscopy / total-body photography** for patients with multiple
  atypical nevi or strong family history.

  Combined UV-protection + skin-surveillance significantly reduces invasive
  melanoma + NMSC incidence + mortality. Sunscreen does NOT reduce vitamin
  D status meaningfully in real-world use — counsel against vitamin D
  pretext for foregoing sun protection.

