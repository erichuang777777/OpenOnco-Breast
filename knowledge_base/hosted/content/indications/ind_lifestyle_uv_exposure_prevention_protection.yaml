do_not_do:
  - "Не виправдовувати UV exposure for vitamin D — supplementation безпечніша і ефективніша."
  - "Не використовувати спрей-санскрін без adequate coverage assessment — frequently under-applied."
  - "Не презентувати tanning beds як safer alternative до natural sun — both IARC Group 1 carcinogens."
  - "Не делегувати skin exam non-dermatologist for high-risk patients (multiple atypical nevi, family history) — dermoscopy training matters."
  - "Не пропускати ABCDE counseling — SSE without criteria має поганий yield."

do_not_do_en:
  - "Do not justify UV exposure for vitamin D — supplementation is safer and more effective."
  - "Do not use spray sunscreen without adequate coverage assessment — frequently under-applied."
  - "Do not present tanning beds as a safer alternative to natural sun — both are IARC Group 1 carcinogens."
  - "Do not delegate skin exam to a non-dermatologist for high-risk patients (multiple atypical nevi, family history) — dermoscopy training matters."
  - "Do not skip ABCDE counseling — SSE without criteria has poor yield."

