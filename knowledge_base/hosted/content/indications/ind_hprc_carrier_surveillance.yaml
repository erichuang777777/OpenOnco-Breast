  acceptable у shared decision-making. Threshold — Linehan / NCI-
  derived; не transferable до інших hereditary RCC syndromes.

  **Surgical philosophy:** Nephron-sparing paramount у HPRC carriers
  через bilateral multifocal recurrence. Enucleation often feasible
