rationale: >
  Standard-track confirmed-carrier surveillance pathway for MET-positive
  HPRC carriers per Linehan / NCI Urologic Oncology Branch experience
  and Schmidt et al. clinical-genetics framework.

  **Annual abdominal MRI:** Starting age 30 (or 10 years before
  youngest family RCC). MRI preferred over contrast-enhanced CT for
  cumulative-radiation reasons given lifelong surveillance interval.
  T1-weighted + T2-weighted + DWI + multi-phase gadolinium-enhanced
  protocol. Comparison with prior studies at every interval.

  **Surgical threshold (3-cm rule):** Lesions ≥3 cm — nephron-sparing
  partial nephrectomy (or enucleation when anatomically feasible given
  lesion biology). Sub-3-cm lesions — active surveillance acceptable
  in shared decision-making with the patient. Threshold is Linehan /
  NCI-derived and reflects HPRC-specific indolent biology; not
  appropriate to transfer to other hereditary RCC syndromes (VHL,
  HLRCC use different thresholds).

  **Surgical philosophy:** Nephron-sparing is paramount in HPRC carriers
  because bilateral multifocal tumors will recur — preserving renal
  parenchyma across multiple lifetime surgeries is the long-term goal.
  Enucleation (rather than wedge resection) often feasible for
  HPRC tumors given pseudo-capsule. Total nephrectomy reserved for
  large, central, or radical-margin-required tumors.

  **Active surveillance protocol (for sub-3-cm lesions):** Confirmed
  HPRC carrier with sub-3-cm enhancing renal mass on annual MRI —
  shorten interval to q6mo for the first 1-2 years to establish growth
  kinetics; resume annual if growth slow / absent. Cross to surgical
  resection if (a) lesion crosses 3-cm threshold, (b) growth rate
  exceeds 5 mm/year, (c) morphologic change (e.g., new cystic
  component, central necrosis suggesting higher-grade biology).

  **Cascade testing:** Mandates offer to all first-degree relatives.

  **Smoking cessation:** General-population RCC risk modifier — relevant
  but not HPRC-specific.

  Per CHARTER §11 patient-autonomy framing; active surveillance vs
  intervention is the classic shared-decision-making domain.

