    position: context
    relevant_quote_paraphrase: >-
      "Confirmed HPRC / MET carriers should enter structured renal
      surveillance with annual abdominal MRI from age 30, with
      nephron-sparing surgery for lesions ≥3 cm and active surveillance
      permissible for smaller lesions given the indolent HPRC type-1-
      papillary biology (less aggressive than HLRCC type-2-papillary)."

do_not_do:
  - "Не використовувати contrast-enhanced CT як primary surveillance modality — cumulative radiation burden lifelong; МРТ preferred."
  - "Не виконувати total nephrectomy при HPRC якщо partial / nephron-sparing feasible — bilateral multifocal recurrence inevitable; preserving parenchyma critical."
  - "Не transferувати 3-cm threshold до інших hereditary RCC syndromes — VHL та HLRCC мають різні surgical thresholds (lower через more aggressive biology)."
  - "Не пропускати q6mo interval перші 1-2 роки active surveillance — growth kinetics треба встановити перед annualування."
  - "Не пропускати cascade-тестування first-degree родичів."

do_not_do_en:
  - "Do not use contrast-enhanced CT as the primary surveillance modality — lifelong cumulative radiation burden; MRI preferred."
  - "Do not perform total nephrectomy in HPRC if partial / nephron-sparing is feasible — bilateral multifocal recurrence is inevitable; preserving parenchyma is critical."
  - "Do not transfer the 3-cm threshold to other hereditary RCC syndromes — VHL and HLRCC have different surgical thresholds (lower because of more aggressive biology)."
  - "Do not skip q6mo interval for the first 1-2 years of active surveillance — growth kinetics must be established before annualizing."
  - "Do not skip cascade testing of first-degree relatives."

