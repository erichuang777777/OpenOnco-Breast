expected_outcomes:
  overall_response_rate: >-
    Annual abdominal MRI surveillance in confirmed MET carriers detects
    HPRC type-1-papillary RCC at small (sub-3-cm) lesion size in most
    cases — enabling nephron-sparing partial nephrectomy or enucleation
    with preservation of renal parenchyma. Active surveillance of
    sub-3-cm lesions (Linehan / NCI 3-cm threshold) is acceptable given
    indolent HPRC biology — metastasis risk is meaningfully lower than
    HLRCC FH-driven type-2-papillary tumors. Lifelong avoidance of
    bilateral nephrectomy + dialysis dependency is the practical
    surveillance goal.

