rationale: >
  Standard-track prevention pathway for chronic occupational outdoor
  UV exposure. Components per NCCN Skin Cancer + Melanoma 2025 +
  American Academy of Dermatology + USPSTF Counseling for Skin
  Cancer Prevention (2018 + 2023 update) + Nambour Skin Cancer
  Prevention Trial:

  **(1) Personal photoprotection counseling — primary intervention**
  - Broad-spectrum sunscreen SPF ≥30 (preferably 50+) applied to all
    sun-exposed skin daily during outdoor work, reapplied every 2
    hours + after sweating / swimming. ~2 mg/cm² application thickness
    (~1 shot-glass volume for whole adult body) for label SPF to be
    achieved.
  - Sun-protective clothing — long sleeves + long pants, tightly
    woven fabric, UPF-rated work clothing where occupationally
    feasible.
  - Wide-brimmed hat (≥7.5 cm brim) covering face + neck + ears.
  - UV-blocking sunglasses (UV400 / 99-100% UVA + UVB filtration).
  - Shade-seeking during peak UV hours (10:00-16:00 in summer at
    Ukrainian latitudes). Reschedule outdoor work to early-morning /
    late-afternoon where feasible.
  - UV-index awareness — check forecast; UV index ≥3 warrants
    photoprotection; ≥8 warrants additional avoidance.

  **(2) Clinical full-body skin examination** — Annual full-body
  skin exam by dermatologist or trained primary-care clinician. NCCN
  cadence may shorten to q6mo if pre-malignant findings (actinic
  keratoses, dysplastic nevi, prior NMSC) present. Standardized
  ABCDE evaluation of nevi + photographic mole-mapping where
  available.

  **(3) Patient skin self-exam education** — Monthly self-exam with
  attention to:
  - New / changing skin lesions (especially on sun-exposed sites —
    face, ears, lips, scalp [if balding], dorsal hands + forearms)
  - Non-healing sores / ulcerations
  - Pearly papules with telangiectasia (BCC signature)
  - Scaly erythematous patches (SCC / actinic keratosis signature)
  - ABCDE features of pigmented lesions (Asymmetry, Border
    irregularity, Color variegation, Diameter >6mm, Evolution)

  **(4) Actinic-keratosis treatment** — Pre-malignant AKs identified
  on clinical exam treated proactively: cryotherapy (liquid nitrogen)
  for isolated lesions; topical 5-FU / imiquimod / diclofenac for
  field-cancerization (multiple AKs in confluent sun-exposed areas);
  photodynamic therapy where available. Treatment prevents AK-to-SCC
  progression (~10% lifetime risk per individual AK).

  **(5) Vitamin D balance** — Photoprotection may reduce endogenous
  vitamin D synthesis. Counsel on dietary vitamin D (fatty fish,
  fortified dairy, eggs) + targeted supplementation 1000-2000 IU/day
  rather than UV exposure for vitamin D needs (see RF-LIFESTYLE-LOW-
  CALCIUM-VIT-D-CRC-PREVENTION for full Vit D framework).

  **(6) Tobacco-cessation counseling — synergistic risk** — Tobacco
  use synergizes with UV exposure for cutaneous SCC (especially
  lip + oral cavity). See RF-LIFESTYLE-TOBACCO-CANCER-PREVENTION.

  Resource access in Ukraine: broad-spectrum SPF-30+ sunscreens
  pharmacy-accessible (~200-600 UAH per 200mL); cryotherapy for AKs
  available at dermatology outpatient clinics; field-treatment topicals
  prescription-required. Annual dermatology visit ~400-1500 UAH;
  partial НСЗУ coverage for high-risk-cohort dermatology consultation.

