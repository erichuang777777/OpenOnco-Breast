expected_outcomes:
  overall_response_rate: "Consistent photoprotection (SPF ≥30 broad-spectrum sunscreen + sun-protective clothing + shade-seeking + UV-index awareness) reduces actinic-keratosis incidence (precursor to SCC), reduces cutaneous SCC + BCC incidence in long-term RCTs (Nambour Skin Cancer Prevention Trial: ~40% SCC reduction, ~25% BCC reduction over 8-year follow-up), and modestly reduces melanoma incidence. Clinical full-body skin examination + patient self-exam education enable early detection at curable stage. Vitamin D balance via dietary + targeted supplementation rather than UV exposure."

