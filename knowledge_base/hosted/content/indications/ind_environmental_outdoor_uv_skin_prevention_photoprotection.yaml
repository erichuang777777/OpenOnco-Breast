do_not_do:
  - "Не покладатися виключно на sunscreen — sun-protective clothing + shade + temporal scheduling — equal or superior UV reduction."
  - "Не використовувати tanning beds як 'safe alternative' — IARC Group 1 з 2009; ризик подвоюється для melanoma при use before age 35."
  - "Не recommend UV exposure для Vitamin D — dietary + supplementation safer + more reliable, especially at Ukrainian latitudes."
  - "Не пропускати dermatological skin exam — окремі AKs / early SCC / BCC potentially missed in self-exam."
  - "Не ігнорувати lip + scalp + ear sun protection — common-missed sites з high cumulative-UV dose."
  - "Не treat ALL nevi prophylactically — atypical or evolving lesions warrant biopsy; benign nevi observation only."

do_not_do_en:
  - "Do not rely exclusively on sunscreen — sun-protective clothing + shade + temporal scheduling provide equal or superior UV reduction."
  - "Do not use tanning beds as a 'safe alternative' — IARC Group 1 since 2009; melanoma risk doubles with use before age 35."
  - "Do not recommend UV exposure for vitamin D — dietary + supplementation is safer + more reliable, especially at Ukrainian latitudes."
  - "Do not skip dermatological skin exam — discrete AKs / early SCC / BCC may be missed on self-exam alone."
  - "Do not overlook lip + scalp + ear sun protection — these are commonly missed sites with high cumulative UV dose."
  - "Do not treat ALL nevi prophylactically — atypical or evolving lesions warrant biopsy; benign nevi require observation only."

