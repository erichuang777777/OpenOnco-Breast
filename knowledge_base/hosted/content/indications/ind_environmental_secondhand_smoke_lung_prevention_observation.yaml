expected_outcomes:
  overall_response_rate: "Continued chronic ETS exposure without elimination: ongoing dose accumulation drives cumulative lung-cancer + cardiovascular + respiratory morbidity. Symptom-triggered evaluation captures earlier-stage disease but does not reduce incidence. Cohabitant smoking cessation referral remains appropriate regardless of mitigation-track choice."

