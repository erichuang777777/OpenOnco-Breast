do_not_do:
  - "Не презентувати observation як еквівалент elimination — lung-cancer + cardiovascular ризик ETS-attributable continues to accumulate."
  - "Не пропускати cohabitant cessation referral — це core lever, і пропозиція має бути renewed на кожному visit."
  - "Не ігнорувати alarm features (persistent cough, hemoptysis, dyspnea, weight loss) — immediate diagnostic imaging + multidisciplinary review."
  - "Не презентувати decision як final — periodic re-discussion elimination треку appropriate especially з changes у domestic circumstances."

do_not_do_en:
  - "Do not present observation as equivalent to elimination — ETS-attributable lung-cancer + cardiovascular risk continues to accumulate."
  - "Do not skip cohabitant cessation referral — it is the core lever, and the offer should be renewed at every visit."
  - "Do not ignore alarm features (persistent cough, hemoptysis, dyspnea, weight loss) — immediate diagnostic imaging + multidisciplinary review."
  - "Do not present the decision as final — periodic re-discussion of the elimination track is appropriate, especially with changes in domestic circumstances."

