rationale: >
  Alternative-track companion to IND-ENVIRONMENTAL-SECONDHAND-SMOKE-
  LUNG-PREVENTION-ELIMINATION. Patient cannot effect cohabitant
  smoking cessation (refusal by smoker, complex domestic dynamics,
  multi-unit housing without enforcement) — receives brief exposure-
  awareness counseling with each clinical contact + symptom-triggered
  evaluation pathway + cohabitant cessation referral on offer at
  every visit + air-filtration / ventilation guidance as partial
  mitigation. Per CHARTER §11 patient-autonomy framing — exposure-
  management constraints are legitimate but framed as suboptimal vs.
  elimination comparator. Periodic re-discussion of cohabitant
  cessation track at follow-up visits is appropriate, especially if
  domestic circumstances change.

rationale_ua: >
  Альтернативно-трекова Indication. Пацієнт не може effect cohabitant
  smoking cessation (refusal by smoker, complex domestic dynamics,
  multi-unit housing without enforcement) — отримує brief exposure-
  awareness counseling на кожному клінічному контакті + symptom-
  triggered evaluation pathway + cohabitant cessation referral on
  offer at every visit + air-filtration / ventilation guidance як
  partial mitigation. Per CHARTER §11. Periodic re-discussion
  cohabitant cessation треку appropriate, especially if domestic
  circumstances change.

