rationale: >
  Standard-track prevention pathway for patients with severe alpha-1
  antitrypsin deficiency (PiZZ or severe serum deficiency). Multi-
  component standard:

  **Hepatic surveillance:**
    - LFT panel (AST, ALT, ALP, GGT, bilirubin, albumin, INR) +
      platelet count q6-12mo
    - AFP q6-12mo (baseline marker; AFP can be modestly elevated in
      A1AT cirrhosis without HCC)
    - Liver elastography (FibroScan or MR elastography) q1-2y; or
      calculated FIB-4 / APRI
    - **Cirrhotic A1AT (Child-Pugh A, METAVIR F4 on biopsy/elastography):**
      AASLD HCC surveillance with abdominal US ± AFP q6mo; suboptimal
      US visualization → MRI or multiphase CT q6mo per LI-RADS
    - **Non-cirrhotic A1AT with elevated LFTs or significant fibrosis:**
      LFT panel + AFP q6mo; consider hepatology referral for biopsy or
      advanced imaging if synthesis dysfunction or rising fibrosis
      markers

  **Pulmonary surveillance:**
    - Baseline PFTs (FEV1, FEV1/FVC ratio, DLCO, lung volumes) at
      diagnosis; repeat q12mo
    - HRCT chest baseline at diagnosis (to characterize emphysema
      distribution — A1AT classically lower-lobe panacinar emphysema);
      repeat HRCT only when triggered by new respiratory symptoms,
      accelerated PFT decline, or incidental nodule on prior imaging
    - **USPSTF-eligible (age 50-80, 20 pack-year smoking history,
      current or quit <15y):** annual LDCT lung cancer screening per
      USPSTF 2021 — A1AT deficiency does not by itself qualify for
      LDCT screening but doubly indicates it when smoking criteria
      met

  **Smoking cessation (highest-priority intervention):**
    - Detailed cessation counseling at every visit
    - Pharmacotherapy (varenicline, bupropion, NRT) per usual cessation
      guidelines
    - Avoid second-hand smoke + occupational respiratory irritants
      (dust, fumes, biomass smoke)

  **A1AT augmentation therapy (symptomatic emphysema, FEV1 35-65%
  predicted, PiZZ or null genotype):**
    - Weekly IV infusion (Prolastin-C 60 mg/kg, Aralast NP 60 mg/kg,
      Zemaira 60 mg/kg, or Glassia 60 mg/kg per chosen product)
    - Per Chapman Lancet 2015 RAPID trial: slows emphysema progression
      by lung-density CT but does not reverse established disease
    - Not indicated for hepatic protection (no evidence) — hepatic
      transplantation is the disease-modifying option for advanced
      hepatic disease

  **Vaccination + comorbidity prevention:**
    - Annual influenza vaccination
    - Pneumococcal vaccination (PCV20 or PCV15/PPSV23 sequence)
    - HBV vaccination if not immune
    - HCV/HIV screening once
    - Avoid alcohol (synergistic hepatic injury)

  **Family screening:** first-degree relatives (parents, siblings,
  children >18y) for A1AT genotyping per ATS/ERS 2017; PiZZ and PiSZ
  relatives enter the same prevention pathway.

  **Transplant evaluation:** decompensated cirrhosis (Child-Pugh C,
  MELD ≥15) → hepatology consultation. Severe end-stage emphysema →
  pulmonology consultation for lung transplant. Combined liver-lung
  transplant rarely needed.

  In Ukraine, A1AT deficiency is markedly under-recognized; genotyping
  via Institute of Genetics + select private labs. Pulmonology +
  hepatology care at major centers in Kyiv, Lviv, Odesa, Kharkiv.
  A1AT augmentation products typically obtained via international
  pharmacy + clinical-trial channels — limited availability.
  Smoking cessation pharmacotherapy NSZU-covered when prescribed.

rationale_ua: >
  Стандартний-трек prevention шлях для пацієнтів з тяжким дефіцитом
  альфа-1 антитрипсину (PiZZ або тяжкий сироватковий дефіцит).
  Багатокомпонентний стандарт:

  **Hepatic surveillance:**
    - LFT панель + платіт q6-12 міс
    - AFP q6-12 міс
    - Liver elastography q1-2 роки; або FIB-4 / APRI
    - **Cirrhotic A1AT:** AASLD HCC surveillance US ± AFP q6 міс;
      suboptimal візуалізація → MRI або CT q6 міс
    - **Non-cirrhotic з підвищеними LFT або significant фіброзом:**
      LFT + AFP q6 міс

  **Pulmonary surveillance:**
    - Baseline PFTs (FEV1, FEV1/FVC, DLCO) при діагнозі; repeat q12 міс
    - HRCT грудей baseline; repeat лише при триггері
    - **USPSTF-eligible:** щорічна LDCT lung cancer screening

  **Smoking cessation (найвища-пріоритет інтервенція):**
    - Детальне cessation counseling на кожному візиті
    - Фармакотерапія (вареніклін, бупропіон, NRT)
    - Уникати second-hand smoke

  **A1AT augmentation therapy (symptomatic emphysema, FEV1 35-65%
  predicted, PiZZ або null):**
    - Щотижнева IV інфузія (Prolastin-C, Aralast NP, Zemaira, Glassia
      60 мг/кг)
    - Per Chapman Lancet 2015 RAPID — слов'янувіе емфізему прогресії
    - Не показано для hepatic protection

  **Vaccination:** influenza щорічно; pneumococcal; HBV; HCV/HIV
  скрінінг.

  **Family screening:** first-degree родичі для A1AT-генотипування.

  **Transplant evaluation:** decompensated cirrhosis → hepatology;
  end-stage emphysema → pulmonology.

  В Україні A1AT під-визнаний; генотипування — Institute of Genetics.
  Pulmonology + hepatology care у Києві, Львові, Одесі, Харкові.
  A1AT augmentation продукти — обмежена доступність.

