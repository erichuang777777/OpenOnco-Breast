# No systemic drug regimen — primary interventions are hepatic + lung
# surveillance + smoking cessation + (in symptomatic emphysema) A1AT
# augmentation. A1AT augmentation infusion is treatment of underlying
# A1AT deficiency, managed by pulmonology, not a prevention Regimen FK.
