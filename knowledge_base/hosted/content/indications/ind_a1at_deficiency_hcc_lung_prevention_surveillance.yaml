evidence_level: moderate
strength_of_recommendation: strong
nccn_category: "2A"

expected_outcomes:
  overall_response_rate: >-
    Combined hepatic + pulmonary surveillance + smoking cessation in
    severe A1AT deficiency:
      - AASLD HCC surveillance (US ± AFP q6mo) in cirrhotic A1AT
        shifts HCC stage at diagnosis from advanced to early
        (within-Milan transplant eligible; ablation/resection 5y OS
        60-75%).
      - Lung cancer surveillance via LDCT in USPSTF-eligible smokers/
        former smokers + symptom-triggered HRCT in non-smokers shifts
        NSCLC stage and improves 5y OS (60-90% early-stage vs
        5-15% advanced).
      - Smoking cessation provides the largest absolute risk reduction
        for both lung cancer and emphysema progression — typical
        absolute lung-cancer risk reduction ~50% over 10y post-cessation,
        additive in A1AT.

