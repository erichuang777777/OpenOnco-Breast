sources:
  - source_id: SRC-AASLD-HCC-2023
    position: supports
    relevant_quote_paraphrase: >-
      "HCC surveillance with ultrasound ± AFP every 6 months is
      recommended for patients with cirrhosis from alpha-1 antitrypsin
      deficiency. Smoking cessation is mandatory for both hepatic and
      pulmonary disease modification."
  - source_id: SRC-NCCN-NSCLC-2025
    position: supports
    relevant_quote_paraphrase: >-
      "USPSTF-eligible high-risk individuals receive annual low-dose
      CT lung cancer screening. A1AT deficiency with smoking history
      compounds risk and reinforces screening eligibility; non-smoking
      A1AT-deficient patients receive symptom-driven workup."
  - source_id: SRC-NCCN-BCELL-2025
    position: context

do_not_do:
  - "Не пропускати smoking cessation counseling у A1AT — найвища-impact інтервенція; PiZZ + куріння — multiplicatively-elevated ризик."
  - "Не використовувати A1AT augmentation для hepatic protection — augmentation схвалена для pulmonary emphysema, не для hepatic disease."
  - "Не пропускати HCC surveillance у cirrhotic A1AT — incidence ~3-5%/рік перевищує AASLD поріг."
  - "Не виконувати рутинну HRCT грудей у asymptomatic non-smoking A1AT — низький yield, accumulated radiation; PFTs + LDCT screening (якщо eligible) достатньо."
  - "Не пропускати family screening — first-degree родичі PiZZ носіїв мають 25% ризик PiZZ або PiSZ."

do_not_do_en:
  - "Do not skip smoking-cessation counseling in A1AT — the highest-impact intervention; PiZZ + smoking is multiplicatively elevated risk."
  - "Do not use A1AT augmentation for hepatic protection — augmentation is approved for pulmonary emphysema, not for hepatic disease."
  - "Do not skip HCC surveillance in cirrhotic A1AT — incidence ~3-5%/year exceeds AASLD threshold."
  - "Do not perform routine HRCT chest in asymptomatic non-smoking A1AT — low yield, accumulated radiation; PFTs + LDCT screening (if eligible) suffice."
  - "Do not skip family screening — first-degree relatives of PiZZ carriers have a 25% risk of PiZZ or PiSZ."

