expected_outcomes:
  overall_response_rate: "Age-appropriate USPSTF mammographic screening (q2y women 40-74) + prompt symptom-prompted endometrial evaluation (TVUS + biopsy on any abnormal bleeding) achieves stage I detection in the vast majority of cases where HRT-attributable breast or endometrial cancer develops. WHI follow-up: combined HRT-attributable breast cancers tend to present at similar stage-distribution to spontaneous cancers when screening adherence maintained; endometrial cancers in HRT-exposed women on sequential / cyclic regimens present with bleeding ~95% of the time — symptom-prompted pathway is highly sensitive. Shared-decision review at year-5 of HRT use with discussion of step-down options."

