do_not_do:
  - "Не призначати estrogen-alone HRT жінці з intact uterus — marked endometrial cancer ризик; завжди combined."
  - "Не продовжувати HRT за default без shared-decision review на 5р + щорічно."
  - "Не призначати рутинну asymptomatic TVUS screening — false-positive rate; no proven survival benefit; ACOG/NCCN against."
  - "Не зупиняти HRT abruptly у симптоматичній жінці без обговорення step-down — vasomotor rebound."
  - "Не нормалізувати unexpected або postmenopausal bleeding — TVUS + biopsy negotiable."
  - "Не використовувати systemic HRT для GU-symptom-only — vaginal estrogen є safer modality."

do_not_do_en:
  - "Do not prescribe estrogen-alone HRT in a woman with intact uterus — marked endometrial-cancer risk; always pair with progestin."
  - "Do not continue HRT by default without shared-decision review at year 5 and annually."
  - "Do not order routine asymptomatic TVUS screening — false-positive rate, no proven survival benefit; ACOG/NCCN advise against."
  - "Do not stop HRT abruptly in a symptomatic woman without discussing step-down — vasomotor rebound."
  - "Do not normalize unexpected or postmenopausal bleeding — TVUS + biopsy non-negotiable."
  - "Do not use systemic HRT for GU-symptom-only indication — vaginal estrogen is a safer modality."

