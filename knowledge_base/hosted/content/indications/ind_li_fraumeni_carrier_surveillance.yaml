rationale: >
  Toronto Protocol (Villani et al.) standardized surveillance for confirmed
  TP53 pathogenic variant carriers:

  **(1) Annual whole-body MRI (WB-MRI)** from age 1 (yes, infancy — adrenocortical
  carcinoma occurs in early childhood in LFS). Captures soft-tissue sarcomas,
  abdominal masses, intracranial lesions.

  **(2) Annual brain MRI** — gliomas, choroid plexus carcinomas, medulloblastomas.

  **(3) Annual abdominal/pelvic US** in children — adrenocortical carcinoma
  detection. Plus 24h urine catecholamines + cortisol.

  **(4) Breast MRI q1y from age 20** (women) — TP53 breast cancer presents
  pre-menopausally; mammography may worsen radiation-related risk so MRI preferred.

  **(5) Colonoscopy q2-5y starting age 25** — LFS-associated CRC risk modestly
  elevated.

  **(6) Careful skin / dermatology exam q6-12 months** — multiple primary
  cutaneous cancers documented.

  **AVOID radiation when feasible** — TP53 carriers have ~10-20x risk of
  radiation-induced secondary malignancy. CT preferred only when MRI is
  inadequate; therapeutic radiation only when alternative not available.

rationale_ua: >
  Toronto Protocol (Villani et al.) стандартизоване спостереження для
  підтверджених TP53 носіїв:

  **(1) Щорічна whole-body MRI** з 1 року (adrenocortical carcinoma виникає
  у ранньому дитинстві в LFS).

  **(2) Щорічна brain MRI** — гліоми, choroid plexus carcinomas, медуллобластоми.

  **(3) Щорічна abdominal/pelvic US** у дітей + 24h urine catecholamines + cortisol.

  **(4) Breast MRI q1y з 20 років** (жінки) — мамографія може погіршити
  radiation-related ризик; MRI переважна.

  **(5) Колоноскопія q2-5y з 25 років.**

  **AVOID radiation коли можливо** — TP53 carriers мають ~10-20x ризик
  radiation-induced secondary malignancy.

