id: IND-CHRONIC-HCV-PREVENTION-OBSERVATION
plan_track: surveillance

# §20 prevention extension (RATIFIED 2026-05-18). Alternative-track
# companion to IND-CHRONIC-HCV-PREVENTION-DAA. Required for §15.2 C4
# (≥2 tracks per PreventionPlan) — patient autonomy framing per CHARTER
# §11: cancer-incidence-reduction from DAA is an ancillary benefit, not
# life-saving, so a "decline DAA + active observation" pathway is a
# legitimate informed-consent alternative.
intent: prevention

applicable_to:
  # Same disease-being-prevented anchor as the DAA track — HCV-associated
  # indolent B-cell NHL (canonical OpenOnco entity for HCV-driven
  # malignancy).
  disease_id: DIS-HCV-MZL

  # line_of_therapy intentionally unset (prevention is not on LOT axis;
  # KSS §20.2 routing branch).

  stage_requirements: []

  biomarker_requirements_required:
    - biomarker_id: BIO-HCV-RNA
      required: true
      value_constraint: "detectable"

  biomarker_requirements_excluded: []

  demographic_constraints:
    ecog_max: 3

# Active-surveillance regimen — reuses the post-DAA observation entity.
# Surveillance cadence is similar regardless of whether the patient took
# DAA or declined it (CBC, LFT, AFP+US, periodic imaging) — the
# clinical distinction is captured in the Indication rationale, not in a
# separate Regimen.
recommended_regimen: REG-DAA-OBSERVATION-HCV-MZL
concurrent_therapy: []
followed_by: []

evidence_level: low
strength_of_recommendation: conditional
nccn_category: "2B"

expected_outcomes:
  overall_response_rate: >-
    Primary endpoint: avoidance of antiviral treatment when patient
    declines DAA. Cancer-incidence outcome: chronic HCV without DAA
    carries elevated NHL risk (~2-3x relative to general population per
    IARC Group 1 epidemiology) AND elevated HCC risk in cirrhotics
    (1-3%/year). Surveillance captures malignancy emergence at earliest
    detectable stage but does NOT reduce incidence.

hard_contraindications: []
red_flags_triggering_alternative: []

required_tests:
  - TEST-CBC
  - TEST-LFT
  - TEST-FIB4
  - TEST-LDH  # baseline; rising LDH = transformation flag
desired_tests:
  - TEST-HBV-SEROLOGY  # for occult HBV awareness

rationale: >
  Alternative-track companion to IND-CHRONIC-HCV-PREVENTION-DAA. Patient
  with chronic HCV (HCV-RNA detectable) who declines DAA antiviral
  therapy — for any reason (preference, drug-drug interaction concerns
  the patient resolves negatively, access constraint, contraindication
  not captured in the structured profile, treatment fatigue) — is
  offered active observation as the alternative pathway.

  Active observation in this context means a baseline workup (CBC, LFT,
  AFP+US per AASLD HCC surveillance for cirrhotics, FIB-4 staging) and
  periodic re-evaluation. The patient remains at elevated NHL and HCC
  risk relative to a DAA-treated comparator; surveillance does not
  reduce incidence but improves likelihood of early-stage detection if
  malignancy emerges. The pathway is a legitimate informed-consent
  alternative per CHARTER §11 patient-autonomy framing.

  Routing reconsiderations: the patient may revisit DAA at any
  subsequent visit; this Indication does not preclude treatment escalation.
  Transformation flags (rapid lymphadenopathy, rising LDH, B-symptoms)
  during observation route immediately to the treatment-persona
  pathway via existing HCV-MZL Indications.

rationale_ua: >
  Альтернативно-трекова Indication — компаньйон до
  IND-CHRONIC-HCV-PREVENTION-DAA. Пацієнтові з хронічним HCV
  (визначувана HCV-РНК), який відмовляється від DAA-терапії — з будь-якої
  причини (вибір, побоювання щодо лікарських взаємодій які пацієнт
  розв'язує негативно, обмеження доступу, протипоказання не зафіксоване
  в структурованому профілі, втома від лікування) — пропонується активне
  спостереження як альтернативний шлях.

  Активне спостереження в цьому контексті означає baseline workup
  (CBC, LFT, AFP+УЗД печінки за AASLD HCC-surveillance для циротиків,
  FIB-4 стейджинг) та періодичну переоцінку. Пацієнт залишається з
  підвищеним ризиком НХЛ і ГЦК відносно DAA-пролікованого компаратора;
  спостереження не знижує захворюваність, але покращує шанси раннього
  виявлення малігнізації. Шлях — легітимна альтернатива за
  принципом informed-consent (CHARTER §11 framing автономії пацієнта).

  Reroute: пацієнт може повернутися до DAA на будь-якому подальшому
  візиті; ця Indication не виключає ескалацію лікування.
  Сигнали трансформації (швидка лімфаденопатія, зростання LDH,
  B-симптоми) під час спостереження маршрутизують до treatment-persona
  шляху через існуючі HCV-MZL Indications.

ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_v0_2_a_anchor
draft_revision: 1

sources:
  - source_id: SRC-EASL-HCV-2023
    position: supports
    relevant_quote_paraphrase: >-
      "DAA-based HCV cure is the preferred intervention; non-treatment
      pathways involve continued elevated risk of extrahepatic and
      hepatic complications. Active surveillance is appropriate when
      DAA is declined or unavailable."
  - source_id: SRC-NCCN-BCELL-2025
    position: context
    relevant_quote_paraphrase: >-
      "Patients with chronic HCV who decline antiviral therapy require
      ongoing monitoring for HCV-associated malignancies; transformation
      flags route to treatment-persona algorithms."

do_not_do:
  - "Не презентувати observation як еквівалент DAA — incidence-reduction відсутній."
  - "Не пропускати periodic AFP + УЗД печінки якщо є cirrhosis (AASLD протокол q6mo)."
  - "Не продовжувати observation при появі transformation-flags (швидка лімфаденопатія, B-симптоми, ріст LDH) — routing to treatment-persona Indication."
  - "Не використовувати цей шлях як стандарт першої лінії — DAA-track залишається preferred recommendation."

do_not_do_en:
  - "Do not present observation as equivalent to DAA — incidence-reduction is absent."
  - "Do not skip periodic AFP + liver US if cirrhosis is present (AASLD protocol q6mo)."
  - "Do not continue observation when transformation flags appear (rapid lymphadenopathy, B-symptoms, rising LDH) — route to treatment-persona Indication."
  - "Do not use this pathway as a first-line standard — the DAA track remains the preferred recommendation."

known_controversies: []

time_critical: false

last_reviewed: "2026-05-18"
reviewers: []
reviewer_signoffs: 0
notes: >
  STUB — alternative-track companion to IND-CHRONIC-HCV-PREVENTION-DAA,
  ratified under CHARTER §6.1 dev-mode exemption alongside the primary
  track. Required for §15.2 C4 ≥2-tracks invariant on the PreventionPlan
  shape (KSS §20.2). Two-Co-Lead signoff queued for v0.2-A clinical
  review.

  Conceptually a "decline-DAA active observation" pathway; reuses
  REG-DAA-OBSERVATION-HCV-MZL as the surveillance regimen entity (post-
  DAA and decline-DAA surveillance schedules are clinically similar —
  patient-context distinction captured in rationale + do_not_do).
  A dedicated REG-HCV-DECLINE-DAA-SURVEILLANCE entity may be authored
  later if the surveillance cadences diverge meaningfully.
