sources:
  - source_id: SRC-NCCN-NSCLC-2025
    position: context
    relevant_quote_paraphrase: >-
      "Patients who decline lung-cancer screening at the intensified
      cadence require ongoing surveillance via symptom-triggered
      evaluation; smoking-cessation counseling remains foundational."
  - source_id: SRC-ESMO-NSCLC-EARLY-2024
    position: context
    relevant_quote_paraphrase: >-
      "Shared decision-making is integral to lung-cancer screening
      enrollment; patients may decline imaging in favor of clinical
      surveillance."

do_not_do:
  - "Не презентувати observation як еквівалент imaging surveillance — incidence-detection benefit відсутній; asbestos-attributable excess risk не адресується."
  - "Не ігнорувати alarm features (диспное, плевральний біль, кровохаркання, втрата ваги) — immediate діагностичне imaging + multidisciplinary review."
  - "Не використовувати цей шлях як стандарт першої лінії — intensified-surveillance трек залишається preferred recommendation для asbestos-exposed cohort."
  - "Не пропускати counseling щодо припинення куріння — рекомендація актуальна незалежно від imaging-track вибору."
  - "Не presenting decision як остаточне — periodic re-discussion intensified-surveillance треку доречне на повторних візитах."

do_not_do_en:
  - "Do not present observation as equivalent to imaging surveillance — incidence-detection benefit is absent; asbestos-attributable excess risk is unaddressed."
  - "Do not ignore alarm features (dyspnea, pleuritic pain, hemoptysis, weight loss) — immediate diagnostic imaging + multidisciplinary review."
  - "Do not use this pathway as a first-line standard — the intensified-surveillance track remains the preferred recommendation for the asbestos-exposed cohort."
  - "Do not skip smoking-cessation counseling — the recommendation is relevant regardless of imaging-track choice."
  - "Do not present the decision as final — periodic re-discussion of the intensified-surveillance track is appropriate at follow-up visits."

