expected_outcomes:
  overall_response_rate: >-
    Primary endpoint: avoidance of intensified imaging surveillance
    when patient declines the LDCT pathway. Cancer-incidence outcome:
    no reduction in asbestos-attributable mesothelioma / lung-cancer
    / ovarian-cancer incidence; LDCT detects lung cancer at earlier
    stages with documented ~20-25% lung-cancer-specific mortality
    reduction in NLST / NELSON cohorts (extension to asbestos-only
    non-smokers is mechanistic, not RCT-confirmed). Routine general-
    population USPSTF screening alone leaves the asbestos-attributable
    excess risk unaddressed. Smoking-cessation counseling remains
    appropriate regardless of imaging-track choice.

