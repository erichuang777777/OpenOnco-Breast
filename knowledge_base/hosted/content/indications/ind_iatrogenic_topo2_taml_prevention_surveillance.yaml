rationale: >
  Standard-track surveillance for prior topoisomerase-II inhibitor exposure.
  Components per NCCN AML Survivorship + Childhood Cancer Survivor Study
  (CCSS) + COG-LTFU guidelines:

  **(1) CBC with differential q3 months for first 5 years post-
  chemotherapy** — Then q6-12mo through year 10, then q12mo lifelong.
  Surveillance window shorter than alkylator t-AML because median
  latency 2-3y (vs 5-7y for alkylators). Risk highest years 2-5.

  **(2) Low-threshold marrow evaluation** for any of:
  - New unexplained cytopenia (anemia, neutropenia, thrombocytopenia)
  - Blasts on peripheral smear (even <5%)
  - Coagulopathy / DIC-like presentation (APL alarm — emergent workup
    + immediate ATRA empirically per NCCN AML if APL suspected)
  - Unexplained fevers + cytopenias
  Bone marrow aspirate + biopsy + cytogenetics (look for 11q23/MLL,
  21q22/RUNX1, t(15;17)/PML-RARA, inv(16)/CBFB-MYH11) + flow cytometry
  + molecular panel.

  **(3) APL-emergency awareness** — Topo2-inhibitor t-APL (t(15;17))
  presents with bleeding/DIC; mortality high if treatment delayed.
  Educate patient + family about emergent presentation symptoms:
  unexplained bleeding/bruising, persistent fatigue, fever, bone
  pain — immediate ED evaluation if any of these.

  **(4) Avoid additional topoisomerase-II inhibitor exposures** —
  if cancer recurrence requires re-treatment, prefer non-topo2
  alternatives where feasible without compromising outcomes.

  **(5) Allogeneic HSCT eligibility assessment** if t-AML develops —
  early evaluation per NCCN AML; topoisomerase-II t-AML with favorable
  cytogenetics (t(15;17), t(8;21), inv(16)) has better outcomes than
  alkylator-related complex-karyotype t-AML.

  Note: routine prophylactic bone marrow biopsies NOT recommended in
  asymptomatic patients with normal CBC. CBC q3mo + peripheral smear
  review is the recommended modality.

