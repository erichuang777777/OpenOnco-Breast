expected_outcomes:
  overall_response_rate: "Breast cancer + testicular cancer + pediatric ALL/AML survivor cohorts post-topoisomerase-II inhibitor: 0.5-3% cumulative t-AML incidence at 5-10y post-exposure. CBC q3mo for first 5y surveillance window catches APL-like presentations (t(15;17), KMT2A/MLL t-AML) at treatable stages. Topo2-inhibitor t-AML often presents abruptly without preceding MDS phase — surveillance focuses on cytopenias + blasts on smear vs. dysplastic morphology."

