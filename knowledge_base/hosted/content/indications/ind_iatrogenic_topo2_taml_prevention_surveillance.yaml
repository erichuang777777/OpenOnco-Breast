  **(1) CBC з диференційною q3 місяців для перших 5 років post-
  chemotherapy** — Потім q6-12mo через year 10, потім q12mo lifelong.
  Surveillance window коротший ніж alkylator t-AML, тому що median
  latency 2-3р (vs 5-7р для alkylators). Risk highest years 2-5.

  **(2) Low-threshold marrow evaluation** при:
  - New unexplained cytopenia
