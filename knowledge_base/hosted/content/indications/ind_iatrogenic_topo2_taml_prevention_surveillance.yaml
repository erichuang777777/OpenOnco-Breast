do_not_do:
  - "Не використовувати alkylator-t-AML surveillance schedule (5-7р median latency) для topo2 patients — peak risk 2-5р, не 5-7р."
  - "Не пропускати APL emergency awareness — t-APL presents з DIC + bleeding; treatment delay deadly."
  - "Не виконувати routine prophylactic marrow biopsies у asymptomatic patients з normal CBC."
  - "Не очікувати preceding MDS phase — topo2-inhibitor t-AML часто abrupt без cytopenic prodrome."
  - "Не вважати всі t-AML однаковими — topo2-inhibitor t-AML з favorable cytogenetics (t(15;17), t(8;21), inv(16)) has better outcomes than alkylator-related complex-karyotype t-AML."

do_not_do_en:
  - "Do not use the alkylator-t-AML surveillance schedule (5-7y median latency) for topo2 patients — peak risk is 2-5y, not 5-7y."
  - "Do not skip APL emergency awareness — t-APL presents with DIC + bleeding; treatment delay is deadly."
  - "Do not perform routine prophylactic marrow biopsies in asymptomatic patients with normal CBC."
  - "Do not expect a preceding MDS phase — topo2-inhibitor t-AML is often abrupt without cytopenic prodrome."
  - "Do not consider all t-AMLs the same — topo2-inhibitor t-AML with favorable cytogenetics (t(15;17), t(8;21), inv(16)) has better outcomes than alkylator-related complex-karyotype t-AML."

