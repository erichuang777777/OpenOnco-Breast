do_not_do:
  - "Не призначати disulfiram коли patient не fully abstinent — produces severe reaction з alcohol intake; medical emergency potential."
  - "Не пропускати hepatology referral при cirrhosis suspect — FIB-4 + elastography низькокоштовні і вирішують HCC-surveillance pathway."
  - "Не використовувати asymptomatic UADT screening на основі alcohol use alone — false-positive harm >> incremental detection; symptom-prompted ENT exam є highest-yield."
  - "Не призначати naltrexone у opioid-using patient без opioid-clearance pathway — precipitated opioid withdrawal — medical emergency."
  - "Не нормалізувати dysphagia / odynophagia / hoarseness / oral lesion як 'minor' у heavy-alcohol cohort — alarm symptoms warrant immediate evaluation."

do_not_do_en:
  - "Do not prescribe disulfiram when the patient is not fully abstinent — produces a severe reaction with alcohol intake; medical emergency potential."
  - "Do not skip hepatology referral when cirrhosis is suspected — FIB-4 + elastography are low-cost and decide the HCC-surveillance pathway."
  - "Do not use asymptomatic UADT screening on the basis of alcohol use alone — false-positive harm >> incremental detection; symptom-prompted ENT exam is highest yield."
  - "Do not prescribe naltrexone in an opioid-using patient without an opioid-clearance pathway — precipitated opioid withdrawal is a medical emergency."
  - "Do not normalize dysphagia / odynophagia / hoarseness / oral lesion as 'minor' in the heavy-alcohol cohort — alarm symptoms warrant immediate evaluation."

