expected_outcomes:
  overall_response_rate: >-
    Structured cessation counseling (motivational interviewing,
    cognitive-behavioural therapy, mutual-support groups including
    AA / SMART Recovery) + alcohol-use-disorder (AUD) pharmacotherapy
    (naltrexone 50 mg/d or extended-release injection 380 mg q4wk;
    acamprosate 666 mg TID; disulfiram 250-500 mg/d when fully
    abstinent + supervised; off-label gabapentin / topiramate for
    AUD) achieves 12-month abstinence or low-risk drinking in
    ~25-40% of engaged participants per COMBINE study + Cochrane
    meta-analyses. Alcohol-related-cancer screening adjustment
    yields: HCC US + AFP q6mo in cirrhosis cohort (Markov-modeled
    benefit shows median 1.4y survival gain vs no screening per
    AASLD); UADT (upper aerodigestive) symptom-prompted ENT exam
    surfaces early-stage cancers; breast / CRC standard cadence
    maintained. Combined effect: cessation + screening reduces
    incident UADT + HCC mortality substantially in compliant
    cohort.

