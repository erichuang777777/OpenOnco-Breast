expected_outcomes:
  overall_response_rate: >-
    Symptom-driven observation (TSH q6-12mo for hypothyroidism
    management; thyroid US only if palpable abnormality, compressive
    symptoms, or B-symptoms) misses subclinical sonographic nodules
    that would have been found by scheduled US. Acceptable as a
    minimum-intensity default when patient declines or cannot access
    annual ultrasound — but Hashimoto-associated thyroid lymphoma and
    PTC can present at later stage when caught only by clinical
    examination.

