do_not_do:
  - "Не використовувати цей шлях у пацієнтів з пре-існуючими вузлами на УЗД — потребують запланованої сонографічної surveillance."
  - "Не презентувати symptom-driven observation як еквівалент активного УЗД-спостереження — interval malignancy ризик вищий."
  - "Не ігнорувати alarm features (швидко зростаючий зоб, дисфагія, B-симптоми) — імідіат-обстеження показано."
  - "Не використовувати цей шлях у пацієнтів з попереднім дитячим опроміненням шиї — незалежний фактор ризику виправдовує запланований УЗД-моніторинг."
  - "Не пропускати повторне обговорення upgrade до активного спостереження — пацієнти можуть змінити переваги."

do_not_do_en:
  - "Do not use this pathway in patients with pre-existing nodules on ultrasound — they require scheduled sonographic surveillance."
  - "Do not present symptom-driven observation as equivalent to active US surveillance — interval-malignancy risk is higher."
  - "Do not ignore alarm features (rapidly enlarging goiter, dysphagia, B-symptoms) — immediate workup indicated."
  - "Do not use this pathway in patients with prior childhood neck radiation — independent risk factor warrants scheduled US monitoring."
  - "Do not skip periodic re-discussion of upgrade to active surveillance — patients may change preferences."

