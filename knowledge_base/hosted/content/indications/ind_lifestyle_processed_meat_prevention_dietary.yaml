rationale: >
  Standard-track prevention pathway for high processed-meat consumption.
  Components per WCRF/AICR Continuous Update Project + ACS 2020 Diet +
  Physical Activity Guideline + NCCN Colon Cancer screening:

  **(1) Dietary substitution counseling** — Reduce processed meat to
  <50 g/day (ideally minimal/none). Reduce red meat to <500 g/week
  (~3 portions). Substitute with:
  - Poultry, fish, eggs, dairy
  - Legumes (beans, lentils, chickpeas)
  - Whole grains, nuts, seeds
  - Plant-based protein sources

  **(2) Mediterranean-style or plant-forward eating pattern** — Whole
  foods, vegetables, fruits, whole grains, olive oil, moderate fish/
  poultry, minimal processed/red meat. Strongest dietary-pattern
  evidence for CRC + cardiovascular + all-cause mortality reduction.

  **(3) USPSTF-cadence CRC screening** — Colonoscopy q10y from age 45
  (or stool-based screening: FIT q1y, FIT-DNA q3y as alternatives).
  Processed-meat consumption does not change screening cadence per
  current guidelines but compounds baseline risk.

  **(4) Referral to registered dietitian** for sustained behavioral
  change, especially if cultural/religious dietary patterns make
  reduction challenging.

  Dietary intervention + age-appropriate screening additive for CRC
  incidence reduction. Plant-forward patterns also reduce cardiovascular
  + metabolic morbidity.

rationale_ua: >
  Стандартний-трек prevention шлях для high processed-meat consumption.
  Components per WCRF/AICR Continuous Update Project + ACS 2020 Guideline:

  **(1) Dietary substitution counseling** — Зменшити processed meat
  до <50 г/день (ідеально minimal/none). Зменшити red meat до <500 г/тиждень
  (~3 порції). Substitute:
  - Птиця, риба, яйця, dairy
  - Бобові
  - Whole grains, nuts, seeds
  - Plant-based protein

  **(2) Mediterranean-style або plant-forward eating pattern** — Whole
  foods, овочі, фрукти, whole grains, olive oil, moderate fish/poultry.

  **(3) USPSTF-cadence CRC screening** — Colonoscopy q10y з 45 років
  (або stool-based screening: FIT q1y, FIT-DNA q3y).

  **(4) Direction до registered dietitian** для sustained behavioral
  change.

