expected_outcomes:
  overall_response_rate: "Reducing processed-meat intake to <50 g/day (and red meat to <500 g/week) is associated with proportional reduction in CRC risk. Substitution effect: replacing processed meat with poultry, fish, legumes, whole grains, or plant protein further reduces incidence. WCRF/AICR projects ~13% of US CRC cases attributable to processed-meat consumption — population-level intervention potential meaningful."

