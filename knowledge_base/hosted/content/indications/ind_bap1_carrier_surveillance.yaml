rationale: >
  Standard-track confirmed-carrier surveillance pathway for BAP1-positive
  carriers per Pilarski et al. J Med Genet 2020 BAP1-TPDS consensus
  surveillance recommendations.

  **Uveal melanoma (~25-30% lifetime — BAP1-TPDS is the only major
  hereditary cause):** Annual dilated fundoscopic examination by an
  ophthalmologist familiar with uveal melanoma; baseline wide-field
  fundus photography. Early lesions (small choroidal melanoma) are
  treatable with eye-preserving plaque brachytherapy or proton therapy
  with excellent local control.

  **Cutaneous melanoma (~15-30% lifetime) + atypical Spitz tumors:**
  Annual whole-body skin examination by a dermatologist with dermoscopy.
  Atypical Spitz tumors (often nodular, melanocytic, sometimes BAP1-
  inactivated) are pathognomonic sentinels — frequently appear in
  childhood or adolescence and may be the first BAP1-TPDS clinical
  clue prompting family germline testing. Excise any atypical lesion
  for full histology with BAP1 immunohistochemistry.

  **Mesothelioma — pleural and peritoneal (~15-25% lifetime):** Chest
  CT q1-3y; baseline at carrier confirmation. Annual abdominal MRI
  (paired with RCC surveillance) covers peritoneal mesothelioma.
  Symptom-driven workup (pleural effusion, ascites, persistent abdominal
  pain) at lower threshold than general population.

  **Clear-cell RCC (~10% lifetime):** Annual abdominal MRI (preferred
  over CT for cumulative-radiation reasons). Small (< 3 cm) lesions
  managed with active surveillance or partial nephrectomy; larger
  lesions with nephron-sparing partial nephrectomy when anatomically
  feasible.

  **Asbestos-avoidance counseling:** Counsel ALL carriers to minimize
  occupational and environmental asbestos exposure (renovation,
  demolition, old building maintenance). Take-home asbestos exposure
  (dust on clothing brought home from worksite) historically caused
  family-cluster mesothelioma. This is the single most important
  modifiable BAP1 cofactor.

  **Cascade testing:** Mandates offer to all first-degree relatives;
  pediatric testing appropriate given childhood-onset atypical Spitz
  tumor recognition.

  Per CHARTER §11 patient-autonomy framing.

rationale_ua: >
  Стандартний-трек confirmed-carrier surveillance per Pilarski 2020
  BAP1-TPDS consensus.

  **Увеальна меланома (~25-30% — BAP1-TPDS єдина major hereditary
  cause):** Annual dilated fundoscopy офтальмологом, familiar з uveal
  melanoma; baseline wide-field fundus photography. Early lesions
  treatable з eye-preserving plaque brachytherapy / proton therapy.

  **Шкірна меланома (~15-30%) + atypical Spitz tumors:** Annual
  whole-body skin exam дерматологом з dermoscopy. Atypical Spitz tumors
  — pathognomonic sentinels, часто з'являються у дитячому / підлітковому
  віці. Excise будь-яке atypical lesion для histology з BAP1 IHC.

  **Мезотеліома — pleural + peritoneal (~15-25%):** Chest CT q1-3y;
  baseline при carrier confirmation. Annual abdominal MRI (paired з RCC
  surveillance) covers peritoneal mesothelioma.

  **Світлоклітинний RCC (~10%):** Annual abdominal MRI (preferred over
  CT через cumulative radiation). <3 см — active surveillance або
  partial nephrectomy.

  **Asbestos-avoidance counseling:** Counsel ALL carriers щодо
  occupational + environmental asbestos exposure (renovation,
  demolition, old building maintenance). Take-home asbestos exposure
  історично caused family-cluster mesothelioma — single most important
  modifiable BAP1 cofactor.

  **Cascade тестування:** mandates пропонування first-degree родичам;
  pediatric тестування appropriate.

  Per CHARTER §11 framing автономії пацієнта.

