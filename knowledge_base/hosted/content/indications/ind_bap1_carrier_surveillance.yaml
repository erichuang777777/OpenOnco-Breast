expected_outcomes:
  overall_response_rate: >-
    BAP1 surveillance per Pilarski 2020 consensus reduces mortality
    through earlier detection across four organ systems: uveal melanoma
    (dilated fundoscopy detects pre-symptomatic lesions amenable to
    plaque brachytherapy or proton therapy with eye preservation);
    cutaneous melanoma and atypical Spitz tumors (whole-body skin exam
    detects sentinel lesions early); mesothelioma (chest CT detects
    pleural plaque or early-stage disease amenable to multimodality
    therapy); clear-cell RCC (abdominal MRI detects T1a lesions
    amenable to nephron-sparing partial nephrectomy). Evidence base
    is consensus-driven (moderate quality, conditional strength) given
    BAP1-TPDS rarity.

