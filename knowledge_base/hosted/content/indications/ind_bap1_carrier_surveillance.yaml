      "BAP1 tumor predisposition syndrome carriers should enter
      structured surveillance modeled on consensus recommendations
      (Pilarski 2020): annual whole-body skin exam, annual dilated
      ophthalmologic exam for uveal melanoma, annual abdominal MRI for
      clear-cell RCC, periodic chest CT for mesothelioma, and explicit
      asbestos-avoidance counseling."

do_not_do:
  - "Не пропускати annual dilated fundoscopy — BAP1-TPDS — єдина major hereditary cause uveal melanoma; early-stage detection дозволяє eye-preserving therapy."
  - "Не використовувати тільки visual skin self-exam — annual whole-body dermatology з dermoscopy потрібна; atypical Spitz tumors easily missed."
  - "Не використовувати CT як primary surveillance для RCC + peritoneal mesothelioma — cumulative radiation burden lifelong; abdominal МРТ preferred."
  - "Не пропускати asbestos exposure history — single most important modifiable BAP1 cofactor; counseling має бути explicit на кожному візиті."
  - "Не пропускати cascade-тестування first-degree родичів — pediatric atypical Spitz tumor recognition може prompt family testing."

do_not_do_en:
  - "Do not skip annual dilated fundoscopy — BAP1-TPDS is the only major hereditary cause of uveal melanoma; early-stage detection enables eye-preserving therapy."
  - "Do not use visual skin self-exam alone — annual whole-body dermatology with dermoscopy is required; atypical Spitz tumors are easily missed."
  - "Do not use CT as primary surveillance for RCC and peritoneal mesothelioma — lifelong cumulative radiation burden; abdominal MRI preferred."
  - "Do not skip asbestos exposure history — single most important modifiable BAP1 cofactor; counseling should be explicit at every visit."
  - "Do not skip cascade testing of first-degree relatives — pediatric atypical Spitz tumor recognition can prompt family testing."

