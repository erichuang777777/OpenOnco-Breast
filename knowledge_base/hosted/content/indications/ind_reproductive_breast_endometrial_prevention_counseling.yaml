rationale: >
  Standard-track counseling + screening for reproductive-history-elevated cancer
  risk. Components:

  **(1) Risk stratification** — Gail / BCSC / Tyrer-Cuzick risk calculator for
  invasive breast cancer 5y/lifetime risk. Some risk factors are non-modifiable
  (menarche, menopause age), but cumulative risk informs surveillance intensity.

  **(2) HRT minimization** — combined HRT use ≥5y elevates breast cancer risk
  modestly + significantly elevates endometrial cancer risk (unopposed
  estrogen in women with intact uterus is contraindicated). Estrogen-only HRT
  in post-hysterectomy women has more favorable profile.

  **(3) PCOS / anovulation management** — progesterone challenge or combined OCP
  in chronic anovulation reduces endometrial cancer risk substantially.

  **(4) Chemoprevention discussion** for high-risk women — tamoxifen 20mg/d ×5y
  OR raloxifene 60mg/d ×5y (postmenopausal); aromatase inhibitors are
  alternatives. Reduces hormone-receptor-positive breast cancer incidence by
  ~50% but with thromboembolic / endometrial cancer / vasomotor side effects.
  USPSTF Grade B recommendation for women at high risk per accepted models.

  **(5) Screening adherence** — annual mammography per USPSTF (age 40-74);
  endometrial cancer awareness (post-menopausal bleeding evaluation immediate).

rationale_ua: >
  Стандартний-трек counseling + screening для reproductive-history-elevated
  cancer ризик.

  **(1) Risk stratification** — Gail / BCSC / Tyrer-Cuzick risk calculator.

  **(2) HRT minimization** — combined HRT використання ≥5р elevates breast cancer
  ризик modestly; estrogen-only HRT в post-hysterectomy women more favorable.

  **(3) PCOS / anovulation management** — progesterone challenge або combined OCP.

  **(4) Chemoprevention discussion** — tamoxifen / raloxifene для high-risk
  women.

  **(5) Screening adherence** — щорічна мамографія per USPSTF.

