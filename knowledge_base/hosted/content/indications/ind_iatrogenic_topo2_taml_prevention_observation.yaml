expected_outcomes:
  overall_response_rate: "Patient declines structured CBC surveillance schedule — receives symptom-prompted evaluation only. APL-like t-AML presentations (DIC, bleeding) may progress rapidly to fatal coagulopathy if not recognized promptly. Outcomes worse than with surveillance-detected disease, particularly for emergent APL presentations."

hard_contraindications: []
red_flags_triggering_alternative: []
required_tests: []
desired_tests: []

rationale: >
  Alternative-track companion to IND-IATROGENIC-TOPO2-TAML-PREVENTION-
  SURVEILLANCE. Patient declines structured q3mo CBC surveillance —
  receives symptom-vigilance education (focus on APL-emergency awareness:
  unexplained bleeding/bruising, persistent fatigue, fever, bone pain →
  immediate ED evaluation) + low-threshold evaluation for any cytopenic
  symptom. Per CHARTER §11 patient-autonomy framing — surveillance refusal
  is a legitimate choice but framed as suboptimal vs. scheduled-surveillance
  comparator, with special emphasis on APL-emergency awareness given
  topo2-inhibitor t-APL mortality risk.

rationale_ua: >
  Альтернативно-трекова Indication. Пацієнт відмовляється від structured
  q3mo CBC surveillance — отримує symptom-vigilance education з фокусом на
  APL-emergency awareness (unexplained bleeding/bruising, persistent fatigue,
  fever, bone pain → immediate ED evaluation) + low-threshold evaluation
  при будь-якому cytopenic symptom. Per CHARTER §11.

