do_not_do:
  - "Не презентувати observation як еквівалент surveillance — APL-emergent presentations особливо delay-sensitive."
  - "Не пропускати APL emergency education — DIC + bleeding fatal без immediate ATRA."
  - "Не затримувати workup при any new cytopenia, навіть без structured surveillance schedule."
  - "Не нормалізувати surveillance refusal — counsel що CBC q3mo low-burden + потенційно life-saving."

do_not_do_en:
  - "Do not present observation as equivalent to surveillance — APL-emergent presentations are particularly delay-sensitive."
  - "Do not skip APL emergency education — DIC + bleeding is fatal without immediate ATRA."
  - "Do not delay workup for any new cytopenia, even without a structured surveillance schedule."
  - "Do not normalize surveillance refusal — counsel that CBC q3mo is low-burden and potentially life-saving."

