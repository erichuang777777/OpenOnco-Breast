expected_outcomes:
  overall_response_rate: "Patient declines structured annual gynecologic exam — receives baseline symptom-vigilance education only. Postmenopausal bleeding or abnormal pre-menopausal bleeding may go unreported / delayed in workup. Outcomes worse than with prompt evaluation; stage at diagnosis later, treatment more aggressive."

hard_contraindications: []
red_flags_triggering_alternative: []
required_tests: []
desired_tests: []

rationale: >
  Alternative-track companion to IND-IATROGENIC-TAMOXIFEN-ENDOMETRIAL-
  PREVENTION-SURVEILLANCE. Patient declines structured annual
  gynecology follow-up (surveillance fatigue, geographic access,
  preference) — receives explicit symptom-vigilance education
  (postmenopausal bleeding, abnormal pre-menopausal bleeding, vaginal
  discharge, pelvic pain → immediate gynecology consultation, regardless
  of how minor the symptom appears) + medication review (HRT
  contraindicated). Per CHARTER §11 patient-autonomy framing — declining
  routine GYN visits is legitimate but framed as suboptimal vs. annual-
  exam comparator.

rationale_ua: >
  Альтернативно-трекова Indication. Пацієнт відмовляється від structured
  annual gynecology follow-up — отримує explicit symptom-vigilance
  education (postmenopausal bleeding, abnormal pre-menopausal bleeding,
  vaginal discharge, pelvic pain → immediate gynecology consultation,
  незалежно від того, як minor симптом appears) + medication review
  (HRT contraindicated). Per CHARTER §11.

