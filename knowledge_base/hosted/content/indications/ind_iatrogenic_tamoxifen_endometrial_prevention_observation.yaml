do_not_do:
  - "Не презентувати observation як еквівалент structured annual GYN follow-up — earlier-stage detection достовірно кращі outcomes."
  - "Не пропускати explicit symptom-vigilance education — patient education критична для symptom-prompted evaluation."
  - "Не призначати HRT — contraindicated у tamoxifen-exposed women; non-hormonal vasomotor management."
  - "Не виключати patient зі symptom-prompted workup access — even якщо routine surveillance declined, gynecology має бути available при будь-якому symptom."
  - "Не нормалізувати postmenopausal bleeding як 'minor' — будь-яке bleeding requires evaluation."

do_not_do_en:
  - "Do not present observation as equivalent to structured annual GYN follow-up — earlier-stage detection produces reliably better outcomes."
  - "Do not skip explicit symptom-vigilance education — patient education is critical for symptom-prompted evaluation."
  - "Do not prescribe HRT — contraindicated in tamoxifen-exposed women; use non-hormonal vasomotor management."
  - "Do not deny the patient symptom-prompted workup access — even if routine surveillance is declined, gynecology must be available for any symptom."
  - "Do not normalize postmenopausal bleeding as 'minor' — any bleeding requires evaluation."

