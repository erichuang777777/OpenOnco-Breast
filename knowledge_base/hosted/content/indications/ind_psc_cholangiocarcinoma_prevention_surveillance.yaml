do_not_do:
  - "Не пропускати annual MRI/MRCP у патієнтів з PSC — холангіокарцинома часто розвивається в перші 2-3 роки після діагнозу."
  - "Не використовувати CA 19-9 ізольовано — низька специфічність при холестазі; завжди в комбінації з imaging."
  - "Не ігнорувати alarm features (jaundice, weight loss, fevers, dominant stricture) — immediate ERCP + brushings."
  - "Не пропускати q1y колоноскопію в PSC-IBD підгрупі — навіть якщо IBD контрольоване."

do_not_do_en:
  - "Do not skip annual MRI/MRCP in PSC patients — cholangiocarcinoma often develops in the first 2-3 years after diagnosis."
  - "Do not use CA 19-9 alone — low specificity in cholestasis; always combined with imaging."
  - "Do not ignore alarm features (jaundice, weight loss, fevers, dominant stricture) — immediate ERCP + brushings."
  - "Do not skip q1y colonoscopy in PSC-IBD subgroup — even if IBD is well-controlled."

