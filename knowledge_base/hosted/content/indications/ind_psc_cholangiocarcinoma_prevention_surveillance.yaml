expected_outcomes:
  overall_response_rate: "Surveillance MRI/MRCP + CA 19-9 q1y captures cholangiocarcinoma at earlier stage in ~30-50% of cases; PSC-IBD subgroup faces ~10-15% lifetime CRC risk vs ~5% in general population — annual colonoscopy from PSC diagnosis substantially improves early-stage CRC detection."

