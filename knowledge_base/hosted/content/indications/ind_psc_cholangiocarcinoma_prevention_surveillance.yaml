rationale: >
  Standard-track surveillance for PSC patients without current hepatobiliary or
  colorectal malignancy. Three components per AASLD / EASL PSC guidelines:

  **(1) Annual MRI/MRCP + CA 19-9** for cholangiocarcinoma surveillance. CA 19-9 alone
  has limited specificity (raised in cholestasis); MRCP detects dominant strictures
  and biliary masses earlier than US.

  **(2) ERCP with brushings + biliary biopsy** when dominant biliary stricture is
  identified on MRCP. Early-stage cholangiocarcinoma detected via brush cytology has
  better resectability and outcomes.

  **(3) Annual colonoscopy from PSC diagnosis** in PSC-IBD subgroup (highest-risk —
  10-15% lifetime CRC risk). Surveillance via chromoendoscopy or random + targeted
  biopsies; dysplasia management per AGA.

  Liver transplant evaluation as advanced PSC develops (cirrhosis, recurrent
  cholangitis, intractable pruritus, dominant stricture progression).

rationale_ua: >
  Стандартний-трек спостереження для пацієнтів з PSC без поточної гепатобіліарної
  чи колоректальної малігнізації. Три компоненти за настановами AASLD / EASL PSC:

  **(1) Щорічна MRI/MRCP + CA 19-9** для скринінгу холангіокарциноми. MRCP виявляє
  домінантні стриктури та біліарні маси раніше ніж УЗ.

  **(2) ERCP з brushings + біліарна біопсія** при ідентифікації домінантної біліарної
  стриктури на MRCP. Рання стадія холангіокарциноми має кращу resectability.

  **(3) Щорічна колоноскопія з моменту діагнозу PSC** у підгрупі PSC-IBD (найвищий
  ризик — 10-15% lifetime CRC risk). Спостереження через хромоендоскопію або
  random+targeted біопсії; dysplasia management per AGA.

  Liver transplant evaluation при прогресуванні PSC (цироз, рецидивний холангіт,
  стійкий свербіж, прогресія домінантної стриктури).

