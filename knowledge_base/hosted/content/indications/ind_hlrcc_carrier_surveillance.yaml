rationale: >
  Per HLRCC Family Alliance + NCCN Genetic/Familial High-Risk: Kidney:

  **(1) Annual abdominal MRI** from age 8-10 in confirmed FH carriers — yes,
  childhood; HLRCC-RCC has been reported in children. MRI preferred over CT
  to minimize cumulative radiation exposure across decades.

  **(2) Low-threshold surgical resection** for any solid renal mass — HLRCC-RCC
  is aggressive collecting-duct / papillary type 2 histology that can
  metastasize from small primary tumors. Do NOT use the sporadic RCC paradigm
  of active surveillance for ≤4cm masses; instead, partial nephrectomy or
  radical nephrectomy as anatomically appropriate.

  **(3) Cutaneous leiomyoma surveillance** — annual dermatology exam; treat
  symptomatic lesions (excision / laser) but cosmetic-only treatment is
  individualized.

  **(4) Gynecologic counseling for women** — uterine leiomyomas (fibroids)
  occur in nearly all HLRCC women; aggressive symptom management +
  reproductive planning + consideration of post-childbearing hysterectomy
  given accelerated fibroid burden and rare uterine leiomyosarcoma risk.

  **(5) Cascade testing** of first-degree relatives — autosomal dominant
  inheritance; ~50% offspring carrier risk.

rationale_ua: >
  Per HLRCC Family Alliance + NCCN Genetic/Familial High-Risk: Kidney:

  **(1) Щорічна abdominal MRI** з 8-10 років.

  **(2) Низький поріг для хірургічної резекції** будь-якої solid renal mass —
  HLRCC-RCC агресивна collecting-duct / papillary type 2 histology; може
  метастазувати з невеликих первинних пухлин. НЕ використовувати sporadic RCC
  paradigm active surveillance.

  **(3) Спостереження cutaneous leiomyomas** — щорічний dermatology exam.

  **(4) Гінекологічне consulting для жінок** — uterine leiomyomas (фіброми).

  **(5) Cascade testing** родичів першого ступеня.

