expected_outcomes:
  overall_response_rate: >-
    Empirical Toronto-protocol-style surveillance applied without
    genetic confirmation: assumes the patient is a TP53 carrier
    despite no laboratory evidence. Diagnostic yield uncertain —
    Toronto Protocol benefit (Villani et al. Lancet Oncology 2016;
    ~25-35% 5-year survival improvement vs untreated controls) is
    documented ONLY in genetically-confirmed carriers. Empirical
    application without confirmation: (a) Some pedigree-suspicion
    individuals are not actual carriers (background rate ~30-70%
    of suspicion-criteria-meeting families); these individuals
    incur resource cost, anxiety, and incidental-finding harm
    without benefit. (b) For actual carriers in the suspicion
    cohort, surveillance benefit is preserved. Net: empirical
    Toronto-protocol surveillance is RESOURCE-INTENSIVE (annual
    WB-MRI ~10000-25000 UAH, annual brain MRI ~5000-12000 UAH per
    scan in Ukrainian private centers) AND not formally evidence-
    based without confirmation — this Indication frames the
    pathway as patient-autonomy alternative per CHARTER §11.

