rationale: >
  Alternative-track companion to IND-LI-FRAUMENI-SUSPICION-PREVENTION-
  GENETIC-COUNSELING. Patient with pedigree suspicion of Li-Fraumeni
  Syndrome who declines genetic counseling and/or germline TP53
  testing — for any reason (cost, insurance / GINA concerns,
  psychological / anxiety-overload considerations, family privacy,
  religious or cultural objections, geographic access constraints)
  — is offered empirical Toronto-protocol-style surveillance applied
  as if LFS were confirmed, with explicit recognition that this
  pathway is RESOURCE-INTENSIVE and may not be a sustainable or
  cost-effective allocation without genetic confirmation:

  **Empirical Toronto-protocol surveillance (modified):**
  - Annual whole-body MRI (WB-MRI) from age of risk awareness or
    early adulthood — soft-tissue sarcoma, abdominal / pelvic
    primary tumor surveillance.
  - Annual brain MRI with gadolinium contrast from same starting
    age — CNS tumor surveillance.
  - Annual abdominal ultrasound + adrenal-focused imaging — particularly
    important in pediatric / young-adult patients (adrenocortical
    carcinoma is dramatically over-represented in LFS).
  - Annual dermatologic exam.
  - Annual breast MRI from age 20-25 for women (alternating
    q6 months with ULTRASOUND in young patients, transitioning to
    mammogram alternating from age 30 with explicit radiation-
    minimization framing — though in suspicion-only individuals
    without confirmation, mammography is less restricted than in
    confirmed carriers).
  - Annual physical exam + neurologic exam + bloodwork (CBC
    surveillance for hematologic primaries).
  - Colonoscopy q2-5 years from age 25.

  **Resource-intensity caveat (critical):** This surveillance regimen
  is one of the most resource-intensive in oncology prevention.
  Annual WB-MRI + annual brain MRI + annual breast MRI for a young
  adult: ~5-10 hours of MRI scanner time per year, ~25000-50000 UAH
  per year in private Ukrainian centers, with cumulative-decade
  costs reaching ~250000-500000 UAH per surveilled individual. In
  confirmed carriers, this cost is offset by the ~25-35% 5-year
  survival benefit (Villani et al.); without genetic confirmation,
  the benefit-to-cost ratio is undocumented and potentially
  unfavorable for individuals who are not actual carriers.

  **Radiation considerations:** In suspicion-only individuals
  (no genetic confirmation), routine mammography and CT can
  proceed with standard clinical indications — the radiation-
  avoidance principle is most stringent for CONFIRMED carriers.
  However, given the high pre-test probability in
  classic-LFS-criteria families, some clinicians extend radiation
  minimization (MRI / ultrasound substitution where feasible) to
  suspicion-only individuals as a precautionary stance.

  **Risk-reducing surgery:** Risk-reducing mastectomy is NOT
  offered empirically without genetic confirmation. The decision
  to undergo bilateral risk-reducing mastectomy is one of the most
  consequential in hereditary cancer care; demonstrated carrier
  status is required to justify the benefit/harm calculation
  (~90% breast-cancer-risk reduction vs irreversible bilateral
  surgery, body-image impact, surgical risks).

  Per CHARTER §11 patient-autonomy framing: genetic testing is a
  shared-decision-making domain. Patients who decline testing retain
  access to surveillance benefit (with documented caveats),
  with the explicit understanding that empirical surveillance:
  (a) lacks the diagnostic precision and evidence base of
  carrier-confirmed Toronto-protocol surveillance;
  (b) is resource-intensive and may produce incidental findings
  with their own management cascades;
  (c) cannot support risk-reducing surgery decisions;
  (d) does not enable cascade-testing-driven family interventions.
  Periodic re-discussion of testing is strongly indicated — many
  patients eventually accept testing after additional visits,
  family events, or reduced anxiety.

  Routing reconsiderations: if patient eventually accepts genetic
  testing, results route to (a) confirmed-carrier carrier-specific
  pathway (Toronto Protocol with formal evidence base, plus
  radiation-avoidance for therapeutic radiation if any future
  cancer is diagnosed), (b) general-population pathway, or (c)
  continued pedigree-suspicion if VUS.

  **Sustainability caveat:** Annual Toronto-protocol surveillance
  may not be a sustainable lifetime regimen for many patients
  without confirmation, both financially and psychologically.
  Periodic re-discussion of testing is appropriate; some patients
  accept testing specifically to de-escalate empirical surveillance
  if they test negative.

rationale_ua: >
  Альтернативно-трекова Indication — компаньйон до
  IND-LI-FRAUMENI-SUSPICION-PREVENTION-GENETIC-COUNSELING. Пацієнт з
  родовідною підозрою на Li-Fraumeni синдром, який відмовляється від
  генетичного консультування та/або germline TP53 тестування — з
  будь-якої причини (вартість, страхові / GINA міркування,
  психологічні / anxiety-overload міркування, сімейна приватність,
  релігійні чи культурні заперечення, географічні обмеження доступу)
  — отримує emпіричний Toronto-protocol-style скринінг, як якщо б
  LFS був підтверджений, з явним визнанням, що цей шлях RESOURCE-
  INTENSIVE і може не бути sustainable або cost-effective allocation
  без генетичного підтвердження:

  **Empіричний Toronto-protocol скринінг (модифікований):**
  - Щорічна whole-body МРТ з віку усвідомлення ризику або раннього
    дорослого життя.
  - Щорічна brain МРТ з гадолінієвим контрастом з того ж стартового
    віку.
  - Щорічне abdominal ultrasound + adrenal-focused imaging.
  - Щорічний дерматологічний огляд.
  - Щорічна МРТ молочної залози з 20-25 років для жінок
    (чергуючи q6 місяців з ULTRASOUND у молодих пацієнтів,
    переходячи до мамографії, що чергується, з 30 років з явним
    radiation-minimization framing — хоча у suspicion-only осіб
    без підтвердження мамографія менш обмежена, ніж у підтверджених
    носіїв).
  - Щорічний фізичний огляд + неврологічний огляд + bloodwork.
  - Колоноскопія q2-5 років з 25 років.

  **Resource-intensity caveat (критичний):** Цей скринінговий
  режим — один з найбільш resource-intensive в oncology
  prevention. Щорічна WB-МРТ + щорічна brain МРТ + щорічна
  breast МРТ для молодого дорослого: ~5-10 годин MRI scanner
  часу на рік, ~25000-50000 UAH на рік у приватних українських
  центрах, з cumulative-decade витратами, що досягають
  ~250000-500000 UAH на surveilled особу. У підтверджених носіїв
  ця вартість компенсується ~25-35% 5-річною перевагою виживання
  (Villani et al.); без генетичного підтвердження benefit-to-cost
  співвідношення undocumented і потенційно несприятливе для осіб,
  що не є фактичними носіями.

  **Radiation considerations:** У suspicion-only осіб (без
  генетичного підтвердження) рутинна мамографія та КТ можуть
  проходити зі стандартними клінічними показаннями — принцип
  radiation-avoidance найбільш суворий для ПІДТВЕРДЖЕНИХ носіїв.
  Однак, з огляду на високу pre-test probability в classic-LFS-
  criteria сім'ях, деякі клініцисти поширюють radiation
  minimization (МРТ / ультразвук-substitution де можливо) на
  suspicion-only осіб як обережну позицію.

  **Risk-reducing хірургія:** Risk-reducing мастектомія НЕ
  пропонується emпірично без генетичного підтвердження. Рішення
  про двосторонню risk-reducing мастектомію — одне з найбільш
  consequential у hereditary cancer care; демонстрований статус
  носія потрібен, щоб виправдати benefit/harm розрахунок (~90%
  зниження ризику раку молочної залози vs незворотна двостороння
  хірургія, body-image вплив, хірургічні ризики).

  Per CHARTER §11 framing автономії пацієнта.

  **Sustainability caveat:** Щорічний Toronto-protocol скринінг
  може не бути sustainable lifetime регіменом для багатьох пацієнтів
  без підтвердження, як фінансово, так і психологічно. Periodic
  re-discussion тестування доречне; деякі пацієнти приймають
  тестування саме для de-escalate empіричного скринінгу, якщо
  тестуються негативно.

