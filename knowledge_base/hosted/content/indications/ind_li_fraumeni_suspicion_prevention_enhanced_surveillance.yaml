do_not_do:
  - "Не презентувати empіричний Toronto-protocol скринінг як еквівалент confirmed-carrier шляху — evidence base (Villani et al.) застосовується тільки до genetically-підтверджених носіїв, і resource cost може бути нестійким без підтвердження."
  - "Не рекомендувати risk-reducing мастектомію або інші незворотні втручання без genetic confirmation — необхідне підтверджене status носія для виправдання benefit/harm розрахунку."
  - "Не пропускати periodic re-discussion про genetic testing — багато пацієнтів приймають тестування саме для de-escalate empіричного скринінгу, якщо тестуються негативно; testing-first шлях надає більш точне допасування скринінгу до фактичного ризику."
  - "Не запускати Toronto-protocol для VUS результату — VUS не є патогенним statusом; empіричний скринінг без підтвердження вже resource-intensive, і VUS не виправдовує додаткове ескалювання."
  - "Не презентувати annual WB-MRI як рутинну / без incidental-finding risk — incidental findings часті в whole-body imaging і запускають diagnostic cascades, які мають власні витрати і ризики (включаючи radiation, якщо follow-up imaging є КТ-базованим)."

do_not_do_en:
  - "Do not present empirical Toronto-protocol surveillance as equivalent to the confirmed-carrier pathway — the evidence base (Villani et al.) applies only to genetically-confirmed carriers, and the resource cost may be unsustainable without confirmation."
  - "Do not recommend risk-reducing mastectomy or other irreversible interventions without genetic confirmation — confirmed carrier status is required to justify the benefit/harm calculation."
  - "Do not skip periodic re-discussion of genetic testing — many patients accept testing specifically to de-escalate empirical surveillance if they test negative; the testing-first pathway provides more precise matching of surveillance to actual risk."
  - "Do not trigger Toronto-protocol for a VUS result — a VUS is not a pathogenic status; empirical surveillance without confirmation is already resource-intensive, and a VUS does not justify further escalation."
  - "Do not present annual WB-MRI as routine / without incidental-finding risk — incidental findings are common in whole-body imaging and trigger diagnostic cascades that carry their own costs and risks (including radiation if follow-up imaging is CT-based)."

