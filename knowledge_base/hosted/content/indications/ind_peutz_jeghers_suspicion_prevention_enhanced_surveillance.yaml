rationale: >
  Alternative-track companion to IND-PEUTZ-JEGHERS-SUSPICION-PREVENTION-GENETIC-
  COUNSELING. Patient with Peutz-Jeghers family history suspicion (classic
  phenotype in proband or first-degree relative) who declines germline STK11
  testing receives empirical PJ-protocol surveillance: small-bowel VCE/MR
  enterography q2-3y from age 8-10, colonoscopy q2-3y from 18, EGD q2-3y from
  8-10, breast MRI from 30 (women). Per CHARTER §11 patient-autonomy framing.

rationale_ua: >
  Альтернативно-трекова Indication — компаньйон до IND-PEUTZ-JEGHERS-SUSPICION-
  PREVENTION-GENETIC-COUNSELING. Пацієнт з родовідною підозрою на Peutz-Jeghers
  (класичний фенотип у пробанда чи родича першого ступеня), який відмовляється
  від germline STK11 тестування, отримує empirical PJ-protocol surveillance:
  small-bowel VCE/MR enterography q2-3y з 8-10 років, колоноскопія q2-3y з 18,
  EGD q2-3y з 8-10, breast MRI з 30 (жінки). Per CHARTER §11 framing.

