do_not_do:
  - "Не презентувати empirical surveillance як еквівалент genetic confirmation."
  - "Не пропускати periodic re-discussion про genetic testing — більшість пацієнтів врешті приймають."
  - "Не використовувати empirical pancreatic screening (EUS/MRI) у dec-testing PJ-suspicion — recommendation для confirmed carriers."

do_not_do_en:
  - "Do not present empirical surveillance as equivalent to genetic confirmation."
  - "Do not skip periodic re-discussion of genetic testing — most patients eventually accept."
  - "Do not use empirical pancreatic screening (EUS/MRI) in decline-testing PJ-suspicion — recommendation is for confirmed carriers."

