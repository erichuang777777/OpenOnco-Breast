do_not_do:
  - "Не презентувати family-history-aware screening modification як еквівалент germline testing — diagnostic yield для high-penetrance carrier identification значно нижчий."
  - "Не пропускати symptom-vigilance education — pattern-recognition критична коли пацієнт не engages з germline pathway."
  - "Не закривати door на re-engagement — пацієнт може повернутися до genetic-counseling pathway при нових family cancer events або reproductive-planning shift."
  - "Не нормалізувати site-specific symptoms (breast lump, change у bowel habits, melanoma-suspicious lesion) як 'minor' у family-history cohort — every alarm symptom warrants immediate evaluation."
  - "Не ігнорувати pedigree re-review — pedigree dynamic; pedigree з 5 років тому може бути obsolete через нові family events."

do_not_do_en:
  - "Do not present family-history-aware screening modification as equivalent to germline testing — diagnostic yield for high-penetrance carrier identification is substantially lower."
  - "Do not skip symptom-vigilance education — pattern recognition is critical when the patient does not engage with the germline pathway."
  - "Do not close the door on re-engagement — patient may return to genetic-counseling pathway upon new family cancer events or reproductive-planning shifts."
  - "Do not normalize site-specific symptoms (breast lump, change in bowel habits, melanoma-suspicious lesion) as 'minor' in family-history cohort — every alarm symptom warrants immediate evaluation."
  - "Do not ignore pedigree re-review — pedigree is dynamic; a pedigree from 5 years ago may be obsolete due to new family events."

