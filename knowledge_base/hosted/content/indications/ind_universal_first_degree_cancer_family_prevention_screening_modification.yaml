expected_outcomes:
  overall_response_rate: >-
    Alternative-track companion. Patient declines or defers
    structured pedigree review + genetic-counseling referral
    (cost, access barriers, anxiety / surveillance fatigue,
    declining intent for downstream interventions) — instead
    receives family-history-aware modification of age-and-modality
    screening cadence: site-specific screening starting age
    typically 10 years earlier than youngest affected family member
    or USPSTF baseline (whichever is earlier), with modality
    intensification (e.g., supplemental breast MRI in dense-breast
    + family-history cohort meeting Tyrer-Cuzick ≥20% lifetime risk;
    colonoscopy starting age 40 or 10y before youngest CRC-affected
    relative whichever is earlier). Outcomes intermediate between
    full-pedigree-review pathway and population-baseline screening
    — captures the patient who is unwilling to engage with germline
    testing but who benefits from the family-history-aware screening
    cadence modification. Per CHARTER §11 patient-autonomy framing
    — declining genetic counseling is legitimate but framed as
    suboptimal vs structured-review comparator.

