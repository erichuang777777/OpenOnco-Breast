rationale: >
  Alternative-track companion to IND-UNIVERSAL-FIRST-DEGREE-CANCER-
  FAMILY-PREVENTION-COUNSELING. Patient declines or defers
  structured pedigree review + genetic-counseling referral — gives
  family-history-aware screening modification within general-practice
  scope. Components:

  **(1) Empirical risk modeling without germline testing.** Apply
  Tyrer-Cuzick / BOADICEA breast risk model or Gail / Claus
  alternatives (less site-comprehensive but tabulated) to estimate
  lifetime breast risk; PREMM5 for Lynch-suspicion; family-history-
  weighted Harvard Cancer Risk Index for general-population
  estimation. Results stratify into population-risk / moderate-risk
  / high-risk tiers without requiring germline testing.

  **(2) Site-specific starting-age shift.** Per NCCN / ACG / ACS
  consensus: screening starts 10 years earlier than the youngest
  affected first-degree relative (or USPSTF baseline, whichever is
  earlier). For breast: mammography at age 40 instead of 50, with
  supplemental MRI consideration if dense breast + family history;
  for colorectal: colonoscopy at age 40 or 10y before youngest
  affected relative diagnosis, repeat q5y instead of q10y; for
  prostate: PSA discussion at age 40 (BRCA2 family-history cohort
  high priority); for pancreatic: high-risk-surveillance program
  referral if ≥2 affected first-degree relatives with PDAC.

  **(3) Modality intensification thresholds.** Breast supplemental
  MRI when Tyrer-Cuzick lifetime risk ≥20%; CRC colonoscopy
  preference over FIT in moderate-risk family-history cohort;
  EUS / MRCP for pancreatic surveillance in PDAC-family cohort
  with documented ≥1 affected first-degree relative.

  **(4) Re-engagement opportunity.** Document the declined-counseling
  determination explicitly + offer re-engagement at each annual
  visit. Most patients who initially decline genetic counseling
  eventually engage when a family member is newly diagnosed or when
  reproductive-planning concerns shift priorities. Re-review
  pedigree at 5-year intervals.

  **(5) Symptom-vigilance education.** Heightened pattern-recognition
  for site-specific early-warning features in the family-history
  cohort (e.g., breast lump / nipple discharge in HBOC-family
  pre-menopausal cohort, change in bowel habits in CRC-family
  cohort, melanoma-suspicious lesion in melanoma-family cohort).

  Per CHARTER §11 patient-autonomy framing — declining structured
  genetic counseling is legitimate but framed as suboptimal vs
  structured-review comparator.

rationale_ua: >
  Альтернативно-трекова Indication. Пацієнт відмовляється або
  defers структурованого pedigree review + genetic-counseling
  referral — отримує family-history-aware screening modification
  у scope сімейної медицини. Components:

  **(1) Empirical risk modeling без germline testing.** Tyrer-Cuzick
  / BOADICEA для breast risk; PREMM5 для Lynch-suspicion; family-
  history-weighted Harvard Cancer Risk Index. Stratify у
  population-risk / moderate-risk / high-risk tiers.

  **(2) Site-specific starting-age shift.** Per NCCN / ACG / ACS:
  скринінг starts на 10р раніше за youngest affected first-degree
  relative (або USPSTF baseline, що раніше). Breast: мамографія в
  40 замість 50, supplemental MRI consideration при dense breast +
  family history; CRC: колоноскопія в 40 або 10р до diagnosis
  youngest affected, repeat q5р замість q10р; prostate: PSA
  discussion в 40 (BRCA2 family-history cohort high priority);
  pancreatic: high-risk-surveillance program referral при ≥2
  affected first-degree relatives з PDAC.

  **(3) Modality intensification thresholds.** Breast supplemental
  MRI коли Tyrer-Cuzick lifetime risk ≥20%; CRC колоноскопія
  preference над FIT у moderate-risk cohort; EUS / MRCP для
  pancreatic surveillance у PDAC-family cohort.

  **(4) Re-engagement opportunity.** Document declined-counseling
  determination explicitly + offer re-engagement при кожному
  annual visit.

  **(5) Symptom-vigilance education.** Heightened pattern-recognition
  для site-specific early-warning features.

  Per CHARTER §11 patient-autonomy framing — declining structured
  genetic counseling — legitimate але framed як suboptimal vs
  structured-review comparator.

