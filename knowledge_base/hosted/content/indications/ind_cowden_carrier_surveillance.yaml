do_not_do:
  - "Не використовувати mammography alone у носія PTEN — combined MRI + mammography має superior sensitivity для early-onset aggressive subtypes."
  - "Не пропускати pediatric thyroid US — Cowden multinodular goiter near-universal; follicular-variant papillary thyroid cancer presents у дитячому віці у деяких kindreds."
  - "Не використовувати CT як primary renal surveillance modality — cumulative radiation burden lifelong; МРТ preferred."
  - "Не виконувати empirical risk-reducing mastectomy без shared-decision-making з обговоренням опцій (continued surveillance, fertility planning, post-mastectomy reconstruction)."
  - "Не пропускати cascade-тестування first-degree родичів — кожен візит має документувати family testing status."

do_not_do_en:
  - "Do not use mammography alone in a PTEN carrier — combined MRI + mammography has superior sensitivity for early-onset aggressive subtypes."
  - "Do not skip pediatric thyroid US — Cowden multinodular goiter is near-universal and follicular-variant papillary thyroid cancer presents in childhood in some kindreds."
  - "Do not use CT as the primary renal surveillance modality — lifelong cumulative radiation burden; MRI preferred."
  - "Do not perform empirical risk-reducing mastectomy without shared-decision-making covering options (continued surveillance, fertility planning, post-mastectomy reconstruction)."
  - "Do not skip cascade testing of first-degree relatives — every surveillance visit should document family testing status."

