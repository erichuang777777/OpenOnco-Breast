expected_outcomes:
  overall_response_rate: >-
    Multi-organ surveillance in confirmed PTEN carriers per NCCN
    Genetic / Familial High-Risk: Breast, Ovarian, Pancreatic detects
    Cowden-spectrum cancers at earlier, more curable stages. Breast
    cancer screening with combined mammography + MRI annually from
    age 30 (women) has sensitivity > mammography alone for early-onset
    aggressive subtypes; risk-reducing mastectomy discussion deferred
    to the INTENSIFIED track. Thyroid US surveillance detects
    follicular-variant papillary thyroid cancer at smaller, lower-stage
    presentation. Renal imaging surveillance (US or MRI) detects
    papillary / chromophobe RCC at earlier stage.

