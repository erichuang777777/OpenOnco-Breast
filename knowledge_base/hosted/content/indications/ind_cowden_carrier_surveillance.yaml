rationale: >
  Standard-track confirmed-carrier surveillance pathway for PTEN-positive
  carriers per NCCN Genetic / Familial High-Risk: Breast, Ovarian,
  Pancreatic.

  **Breast (women, ~85% lifetime risk):** Annual mammography + breast
  MRI starting age 30 (or 5-10 years before earliest family case).
  Clinical breast exam q6mo. Self-exam education. Risk-reducing
  mastectomy discussion is the INTENSIFIED-track option, not surfaced
  as standard-protocol routine.

  **Endometrial (women, ~28% lifetime):** Annual endometrial sampling
  + TVUS starting age 35-40 (NCCN protocol; evidence base modest but
  recommended). Patient education on abnormal uterine bleeding — early
  presentation is the strongest factor in mortality reduction.

  **Thyroid (~35% lifetime, follicular > papillary > Hürthle):** Annual
  thyroid US from time of diagnosis (childhood-onset surveillance is
  appropriate given near-universal multinodular goiter and the
  follicular-variant predominance). Calcitonin testing NOT routine —
  Cowden is not associated with medullary thyroid carcinoma.

  **Renal (~34% lifetime, papillary / chromophobe predominant):** Annual
  renal US or MRI starting age 40; cross-sectional imaging (MRI)
  preferred over CT for cumulative-radiation reasons. Functional renal
  testing (eGFR, urinalysis) annually.

  **Colorectal (~9% lifetime):** Colonoscopy starting age 35 (or 5-10
  years before earliest family case); interval q2-5y depending on
  polyp burden — ganglioneuromatous and hyperplastic polyps are
  near-universal but the adenoma fraction is modest, so surveillance
  interval can be less intense than Lynch / FAP carriers.

  **Skin (Cowden-typical mucocutaneous papules, trichilemmomas, acral
  keratoses; melanoma ~6% lifetime):** Annual dermatology examination.

  **Cascade testing:** Mandates offer to all first-degree relatives;
  pediatric testing for at-risk children appropriate given the
  childhood-onset thyroid surveillance window.

  Per CHARTER §11 patient-autonomy framing: surveillance intervals are
  shared-decision-making.

rationale_ua: >
  Стандартний-трек confirmed-carrier surveillance per NCCN.

  **Молочна залоза (жінки, ~85%):** Annual mammography + breast MRI з
  30 років. CBE q6mo.

  **Ендометрій (жінки, ~28%):** Annual endometrial sampling + TVUS з
  35-40 років. Освіта пацієнтки щодо аномальної маткової кровотечі.

  **Щитоподібна (~35%, follicular > papillary > Hürthle):** Annual
  thyroid US з діагнозу (childhood-onset appropriate). Калцитонін NOT
  routine (Cowden не associated з MTC).

  **Нирки (~34%, papillary / chromophobe):** Annual renal US або МРТ
  з 40 років (preferred over CT через cumulative radiation).

  **Колоректальний (~9%):** Колоноскопія з 35 років; interval q2-5y
  залежно від polyp burden — ганглионевроматозні / гіперпластичні
  поліпи near-universal, але adenoma fraction modest.

  **Шкіра (~6% меланома + Cowden-typical mucocutaneous lesions):**
  Annual дерматологія.

  **Cascade тестування:** mandates пропонування first-degree родичам;
  pediatric тестування appropriate для at-risk дітей.

  Per CHARTER §11 framing автономії пацієнта.

