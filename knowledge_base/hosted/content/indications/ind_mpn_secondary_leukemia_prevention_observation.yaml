rationale: >
  Alternative-track companion to IND-MPN-SECONDARY-LEUKEMIA-
  PREVENTION-SURVEILLANCE. Appropriate for driver-mutation-positive
  patients without sustained blood-count abnormality, without
  splenomegaly, and without symptom burden, who choose minimum-
  intensity surveillance for any of: stable disease over many years,
  cost / access constraints (no nearby hematology center capable of
  molecular monitoring), advanced age with limited life expectancy,
  or explicit preference after informed-consent discussion.

  **Cadence:**
    - Hematology follow-up per usual cadence (q6-12mo) with examination,
      CBC, basic metabolic panel
    - Peripheral smear review on any abnormal CBC
    - Bone marrow evaluation only when triggered by:
      - New persistent cytopenia of any lineage
      - Circulating blasts >1% on smear
      - New or progressive splenomegaly
      - New constitutional symptoms (fatigue out of proportion, weight
        loss >5-10%, night sweats, bone pain)
      - WHO-criteria-suspicious blood-count pattern (sustained
        thrombocytosis, polycythemia, leukocytosis)
    - Molecular monitoring (JAK2 allele burden, NGS panel) only on
      request or trigger

  **Not appropriate for:**
    - Patients with sustained blood-count abnormality consistent with
      pre-WHO-criteria MPN (these warrant active surveillance)
    - Patients with palpable splenomegaly or symptomatic disease
    - Patients with prior thrombosis (high recurrence risk; antiplatelet
      management and active monitoring indicated)
    - Patients with adverse molecular features on prior NGS panel
      (TP53, ASXL1, EZH2 mutations)
    - JAK2-positive patients without cardiovascular risk-management
      plan (aspirin + risk-factor modification recommended)

  Per CHARTER §11 patient-autonomy framing: driver-mutation positivity
  without sustained blood-count abnormality or progression features
  carries modest absolute leukemic-transformation risk in any given
  year (~0.5%/year average across MPN phenotypes). Informed-consent
  observation is defensible for this asymptomatic subset. Patient
  retains option to upgrade to active surveillance at any visit;
  emerging cytopenia, blasts, or splenomegaly mandates transition.

  **Alarm features** route immediately to peripheral smear review +
  bone marrow evaluation + molecular workup — and if WHO-criteria-
  meeting MPN, sAML, or post-MPN MF is confirmed, to the relevant
  treatment-persona algorithm (DIS-PV / DIS-ET / DIS-PMF treatment, or
  DIS-AML for sAML).

rationale_ua: >
  Альтернативно-трекова Indication — компаньйон до
  IND-MPN-SECONDARY-LEUKEMIA-PREVENTION-SURVEILLANCE. Доречно для
  driver-mutation-позитивних пацієнтів без sustained blood-count
  абнормальності, без splenomegaly, без symptom burden, які обирають
  мінімальної інтенсивності спостереження з причин: стабільне
  захворювання багато років, вартість / доступ (немає поблизу
  hematology-центра з молекулярним моніторингом), похилий вік з
  обмеженою тривалістю життя.

  **Частота:**
    - Hematology follow-up per usual частотою (q6-12 міс)
    - Peripheral smear review при будь-якій abnormal CBC
    - Bone marrow evaluation лише при триггері:
      - Нова persistent cytopenia
      - Circulating blasts >1%
      - Нова або прогресуюча splenomegaly
      - Нові constitutional симптоми
      - WHO-criteria-suspicious blood-count pattern
    - Molecular моніторинг лише на запит або тригер

  **Не доречно для:**
    - Пацієнтів з sustained blood-count абнормальністю consistent з
      pre-WHO-criteria MPN
    - Пацієнтів з palpable splenomegaly або symptomatic disease
    - Пацієнтів з попереднім тромбозом
    - Пацієнтів з adverse molecular features (TP53, ASXL1, EZH2)
    - JAK2-positive без cardiovascular risk-management plan

  Per CHARTER §11 framing автономії пацієнта: driver-mutation
  позитивність без sustained blood-count абнормальності — модерний
  абсолютний ризик. Informed-consent observation defensible.

  **Alarm features** маршрутизують негайно до peripheral smear review
  + bone marrow evaluation.

