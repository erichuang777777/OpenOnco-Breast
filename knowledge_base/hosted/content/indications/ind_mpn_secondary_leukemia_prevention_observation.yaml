do_not_do:
  - "Не використовувати цей шлях у пацієнтів з sustained blood-count абнормальністю — потребують active surveillance."
  - "Не презентувати observation як еквівалент structured surveillance — interval-progression виявляється на більш пізній стадії."
  - "Не ігнорувати нову cytopenia, blasts, або splenomegaly — імідіат-bone marrow evaluation показано."
  - "Не використовувати цей шлях у пацієнтів з попереднім тромбозом — high recurrence ризик потребує active management."
  - "Не пропускати періодичне обговорення upgrade — driver-positive пацієнти з часом часто розвивають manifest MPN, що потребує переходу на standard track."

do_not_do_en:
  - "Do not use this pathway in patients with sustained blood-count abnormality — they require active surveillance."
  - "Do not present observation as equivalent to structured surveillance — interval progression is detected at later stage."
  - "Do not ignore new cytopenia, blasts, or splenomegaly — immediate bone marrow evaluation indicated."
  - "Do not use this pathway in patients with prior thrombosis — high recurrence risk requires active management."
  - "Do not skip periodic re-discussion of upgrade — driver-positive patients often develop manifest MPN over time and warrant transition to the standard track."

