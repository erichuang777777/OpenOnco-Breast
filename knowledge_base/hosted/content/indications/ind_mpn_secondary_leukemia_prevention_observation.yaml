expected_outcomes:
  overall_response_rate: >-
    Hematology-driven observation (CBC q6-12mo without structured smear
    review, bone marrow only on overt cytopenia/blast emergence, no
    allele-burden monitoring) detects MPN clonal evolution at later
    stage than structured surveillance. Acceptable as a minimum-
    intensity default for stable driver-mutation-positive patients
    without progression features; below NCCN-MPN 2025 best-practice
    for any driver-positive patient with sustained blood-count
    abnormality.

