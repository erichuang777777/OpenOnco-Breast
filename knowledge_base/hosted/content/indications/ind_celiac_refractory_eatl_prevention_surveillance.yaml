rationale: >
  Standard-track prevention pathway for refractory celiac disease, especially RCD2.
  Three components:

  **(1) Strict gluten-free diet adherence** — even refractory celiac requires
  continued strict GFD; some patients with apparent refractory disease have
  inadvertent gluten exposure. Dietitian + gluten contamination assessment.

  **(2) Small-bowel surveillance imaging** — video capsule endoscopy (VCE) or MR
  enterography q1-2 years for early EATL detection. Lesion characteristics:
  enterography wall-thickening, intussusception, ulcerative jejunitis on VCE.

  **(3) Immunosuppression discussion in RCD2** — cladribine, anti-TNF, or autologous
  hematopoietic stem cell transplant for RCD2 may delay EATL transformation. These
  are highly specialized interventions — referral to celiac-specialty center.

  Per AGA / BSG guidelines.

rationale_ua: >
  Стандартний-трек prevention шлях для рефрактерної целіакії, особливо RCD2.

  **(1) Strict gluten-free diet adherence** — навіть рефрактерна целіакія потребує
  продовження strict GFD; deyaki пацієнти з apparent refractory мають inadvertent
  gluten exposure. Dietitian + gluten contamination assessment.

  **(2) Small-bowel surveillance imaging** — video capsule endoscopy (VCE) або MR
  enterography q1-2 роки для раннього виявлення EATL.

  **(3) Обговорення імуносупресії при RCD2** — кладрибін, anti-TNF, або autologous
  HSCT можуть затримати EATL transformation. Високо специалізовано — направлення
  в celiac-specialty center.

