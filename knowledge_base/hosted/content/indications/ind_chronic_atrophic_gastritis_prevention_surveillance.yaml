expected_outcomes:
  overall_response_rate: >-
    EGD surveillance q3-5y with Sydney-protocol biopsies (q3y for OLGA
    III/IV or OLGIM III/IV; q5y for OLGA I-II without dysplasia) shifts
    gastric adenocarcinoma stage at diagnosis from advanced (T3-T4) to
    earlier (T1-T2), improving 5y OS from ~10-20% (locally advanced) to
    ~70-90% (early-stage, endoscopic-resection-amenable T1a). Type 1
    gastric NETs <1 cm are managed with endoscopic resection alone
    (>95% disease-specific survival). Surveillance does not reverse
    advanced atrophy/IM but enables early detection.

