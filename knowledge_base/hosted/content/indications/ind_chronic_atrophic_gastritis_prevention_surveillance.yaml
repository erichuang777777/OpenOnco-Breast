sources:
  - source_id: SRC-NCCN-GASTRIC-2025
    position: supports
    relevant_quote_paraphrase: >-
      "Chronic atrophic gastritis with extensive intestinal metaplasia
      (OLGA III/IV or OLGIM III/IV) carries elevated gastric cancer
      risk; EGD surveillance every 3 years with topographic biopsies
      per the updated Sydney protocol is recommended; annual surveillance
      for confirmed dysplasia or family history of gastric cancer."
  - source_id: SRC-NCCN-NET-2025
    position: supports
    relevant_quote_paraphrase: >-
      "Type 1 gastric neuroendocrine tumors arise in the setting of
      autoimmune atrophic gastritis with hypergastrinemia. Endoscopic
      resection is sufficient for lesions <1 cm; larger or refractory
      lesions warrant EUS staging and consideration of antrectomy."
  - source_id: SRC-NCCN-BCELL-2025
    position: context

do_not_do:
  - "Не використовувати random біопсії замість Sydney-протоколу — топографічно-структуровані біопсії дають OLGA/OLGIM staging; random misses extent."
  - "Не призначати TSH-супресивну дозу або інші endocrine-active терапії як cancer prevention при CAG — B12 + iron заміщення — стандарт supportive care, не prevention."
  - "Не виконувати рутинну профілактичну гастректомію — ризик хірургії перевищує абсолютний рак-ризик навіть в OLGA III/IV."
  - "Не покладатися лише на серологію (anti-parietal/intrinsic-factor antibodies, гастрин) для surveillance — гістологія — необхідна для OLGA/OLGIM staging."
  - "Не пропускати тест на H. pylori — ерадикація зупиняє прогресію навіть якщо не реверсує встановлену атрофію."

do_not_do_en:
  - "Do not use random biopsies instead of Sydney protocol — topographically structured biopsies enable OLGA/OLGIM staging; random sampling misses extent."
  - "Do not prescribe TSH-suppressive or other endocrine-active therapies as cancer prevention in CAG — B12 + iron replacement is supportive care, not prevention."
  - "Do not perform routine prophylactic gastrectomy — surgical risk exceeds absolute cancer risk even at OLGA III/IV."
  - "Do not rely on serology alone (anti-parietal/intrinsic-factor antibodies, gastrin) for surveillance — histology is required for OLGA/OLGIM staging."
  - "Do not skip H. pylori testing — eradication arrests progression even if it does not reverse established atrophy."

