rationale: >
  Standard-track prevention pathway for patients with histologically
  confirmed chronic atrophic gastritis. Risk stratification by OLGA /
  OLGIM stage drives surveillance cadence:

  **Cadence by OLGA/OLGIM stage:**
    - **OLGA/OLGIM 0-II without dysplasia:** EGD q5y. Many low-stage
      patients (especially post-H. pylori with limited residual atrophy)
      may be safely observed at this minimal interval.
    - **OLGA/OLGIM III-IV without dysplasia:** EGD q3y per MAPS II
      (Pimentel-Nunes Endoscopy 2019). These patients carry the highest
      gastric-cancer progression risk (10-15% over 12y in Rugge cohort).
    - **OLGA/OLGIM III-IV with family history of gastric cancer:** EGD
      q1-2y per MAPS II.
    - **Low-grade dysplasia (LGD):** EGD q1y with focused biopsies of
      previous LGD sites; confirm by expert GI pathologist review (LGD
      is over-called).
    - **High-grade dysplasia (HGD) or visible lesions:** endoscopic
      submucosal dissection (ESD) or endoscopic mucosal resection (EMR)
      for amenable lesions; surgical consultation for non-amenable
      lesions.

  **Technique:** Sydney protocol — 2 biopsies from antrum (greater +
  lesser curvature), 2 from corpus (greater + lesser curvature), 1 from
  incisura. Targeted biopsies of any visible mucosal irregularity.
  Optical-enhanced imaging (NBI, BLI) preferred where available;
  conventional white-light EGD with careful inspection acceptable
  otherwise.

  **Type 1 gastric NET management:**
    - Multiple small (<1 cm) polypoid NETs: endoscopic resection of
      largest lesions, surveillance EGD q6-12mo
    - Larger or rapidly enlarging NETs: endoscopic ultrasound to assess
      depth; ESD/EMR for amenable lesions; antrectomy considered for
      gastrin-source removal in refractory cases (specialist referral)
    - NET >2 cm, muscularis invasion, or metastatic disease: management
      transitions to DIS-GI-NET treatment algorithm

  **B12 + iron replacement (autoimmune CAG subset):** lifelong B12
  (1000 mcg/day PO or 1 mg IM monthly per response); iron supplementation
  if iron-deficiency anemia present; check ferritin + iron studies
  annually.

  **Coexisting H. pylori:** test (UBT, stool antigen, or biopsy urease)
  at diagnosis; if positive, eradicate per current MAPS / Maastricht VI
  regimens (this transitions the patient briefly to the
  RF-H-PYLORI-PREVENTION pathway, then back to atrophic-gastritis
  surveillance).

  In Ukraine, EGD with biopsies is widely available (NSZU-covered for
  symptomatic upper-GI investigation; out-of-pocket ~2000-5000 UAH for
  CAG-surveillance EGD). NBI/BLI imaging available in tertiary centers
  in Kyiv and Lviv. Histopathology with OLGA/OLGIM staging available at
  regional and tertiary centers; specialized GI pathologist review may
  require referral.

rationale_ua: >
  Стандартний-трек prevention шлях для пацієнтів з гістологічно
  підтвердженим хронічним атрофічним гастритом. Стратифікація ризику
  per OLGA / OLGIM стадією керує частотою спостереження:

  **Частота за OLGA/OLGIM стадією:**
    - **OLGA/OLGIM 0-II без дисплазії:** EGD q5 років.
    - **OLGA/OLGIM III-IV без дисплазії:** EGD q3 роки per MAPS II
      (Pimentel-Nunes Endoscopy 2019). Найвищий ризик прогресії
      (10-15% за 12 років у Rugge cohort).
    - **OLGA/OLGIM III-IV з сімейним анамнезом раку шлунка:** EGD
      q1-2 роки.
    - **Дисплазія низького ступеня (LGD):** EGD q1y з focused біопсіями
      попередніх LGD ділянок; підтвердження експертним GI-патологом
      (LGD — over-called).
    - **Дисплазія високого ступеня (HGD) або видимі ураження:** ESD
      або EMR для amenable уражень; хірургічна консультація для
      non-amenable.

  **Техніка:** Sydney-протокол — 2 біопсії з антрума (greater + lesser
  curvature), 2 з corpus, 1 з incisura. Цільові біопсії будь-яких
  видимих нерівностей слизової. NBI/BLI переважно де доступно.

  **Type 1 gastric NET управління:**
    - Множинні малі (<1 см) поліповидні NET: ендоскопічна резекція
      найбільших, surveillance EGD q6-12 міс
    - Більші або швидко зростаючі: EUS для оцінки глибини; ESD/EMR;
      антректомія для gastrin-source removal у рефрактерних випадках
    - NET >2 см, інвазія мускулярисa, метастатичне захворювання:
      управління переходить до DIS-GI-NET алгоритму

  **B12 + iron заміщення (автоімунний CAG):** пожиттєве B12
  (1000 мкг/день PO або 1 мг IM щомісяця); залізо при ЗДА; ferritin +
  iron studies щорічно.

  **Coexisting H. pylori:** тестування (UBT, stool antigen, біопсія
  urease) при діагнозі; ерадикація per MAPS / Maastricht VI.

  В Україні EGD з біопсіями широко доступна (НСЗУ покриває
  симптоматичне обстеження; out-of-pocket ~2000-5000 грн).

