  ukrainian: "Лейоміосаркома (LMS)"
  english: "Leiomyosarcoma"
  synonyms:
    - "LMS"
    - "Uterine leiomyosarcoma (uLMS)"
    - "Retroperitoneal leiomyosarcoma"
    - "Cutaneous / soft-tissue leiomyosarcoma"

codes:
  icd_o_3_morphology: "8890/3"  # Leiomyosarcoma NOS
  icd_o_3_topography: ["C49", "C54.2"]  # Connective + soft tissues; uterine myometrium
  icd_10: "C49, C54.2"
  who_classification: "WHO Soft Tissue and Bone Tumours 5th ed (2020): Leiomyosarcoma; WHO Female Genital Tumours 5th ed (2020): Uterine leiomyosarcoma"

archetype: stage_driven
oncotree_code: LMS
lineage: "sarcoma"

etiological_factors:
  - "Sporadic (most cases)"
  - "Hereditary leiomyomatosis and renal cell cancer (HLRCC; germline FH) — strong predisposition to cutaneous + uterine leiomyomas; lifetime uterine LMS risk elevated (rare but real); FH-deficient uLMS has distinct biology"
  - "Li-Fraumeni syndrome (germline TP53) — LMS over-represented across hereditary cancer syndromes; modest predisposition"
  - "Retinoblastoma survivors (germline RB1) — second-primary LMS risk"
  - "Prior pelvic radiation — secondary uterine / pelvic LMS in radiation field (decades latency)"

related_diseases:
  - DIS-SOFT-TISSUE-SARCOMA       # parent STS entity covers LMS as a histological subtype; this entity provides prevention / hereditary anchor for HLRCC + Li-Fraumeni + uterine subset
  - DIS-RCC                       # HLRCC overlap (papillary type 2 RCC)
  - DIS-ENDOMETRIAL               # uterine differential — uLMS distinct from endometrial adenocarcinoma

key_biomarkers:
  - BIO-TP53-MUTATION             # somatic TP53 ~50% of LMS; germline TP53 in Li-Fraumeni-associated LMS
  - BIO-RB1                       # somatic RB1 loss common in LMS; germline RB1 in retinoblastoma survivors

epidemiology:
  global_incidence: "~1–1.5 per 100K/year (all LMS subtypes); ~15% of adult soft-tissue sarcomas"
  anatomic_distribution: "Retroperitoneal / abdominal-pelvic ~40%; uterine (uLMS) ~25%; cutaneous + extremity ~25%; vascular (large vessels) ~10%"
  sex_distribution: "Uterine LMS exclusively female (post-menopausal predominance); non-uterine subtypes slight female predominance overall"
  five_year_survival: "Localized resectable LMS ~50–70%; uterine LMS stage I ~50% (poorer than similar-stage STS at other sites); metastatic disease ~15–25%"

