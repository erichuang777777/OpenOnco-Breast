id: DIS-ADRENOCORTICAL-CARCINOMA
names:
  preferred: "Adrenocortical carcinoma (ACC)"
  ukrainian: "Адренокортикальна карцинома (АКК)"
  english: "Adrenocortical carcinoma"
  synonyms:
    - "ACC"
    - "Adrenal cortical carcinoma"
    - "Carcinoma of adrenal cortex"

