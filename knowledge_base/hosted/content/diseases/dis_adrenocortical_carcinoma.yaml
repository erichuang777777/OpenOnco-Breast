metadata:
  proposal_status: partial
  awaiting_proposal: >
    Source gap: ACC-specific guidelines not yet ingested (ESMO ACC
    2020 Clinical Practice Guideline, ENSAT ACC consensus 2018, NCCN
    Neuroendocrine — adrenal section). Treatment Indications
    (adrenalectomy with curative intent + adjuvant mitotane for high-
    recurrence-risk stage I–III; mitotane ± EDP chemotherapy for
    advanced disease per FIRM-ACT) referenced in prose pending
    guideline-anchored Indication authoring. Germline TP53 testing
    cross-references Li-Fraumeni prevention pilot in v0.2-B.

notes: >
  Adrenocortical carcinoma is an aggressive rare cancer of the adrenal
  cortex. Bimodal age distribution (pediatric and adult peaks) reflects
  two distinct biological contexts: pediatric ACC is overwhelmingly
  hereditary (Li-Fraumeni / Beckwith-Wiedemann), adult ACC is mostly
  sporadic with ~10% hereditary component.

  Functional ACC presents with hormonal syndromes: hypercortisolism
  (Cushing — most common, ~50% of functional ACC), virilization
  (androgen-secreting; especially in women), feminization (estrogen-
  secreting; rare; in men), Conn syndrome (aldosterone-secreting;
  rare). Non-functional ACC presents with mass effect, abdominal pain,
  or as incidental imaging finding.

  Staging: ENSAT (European Network for the Study of Adrenal Tumors)
  staging system; tumor size >6 cm, capsular invasion, regional nodes,
  distant metastasis are key prognostic factors. Mitotic count (Weiss
  score / Helsinki score) drives recurrence-risk stratification.

  Treatment fundamentals (full Indications pending): radical
  adrenalectomy with curative intent for resectable disease — open
  approach historically preferred (laparoscopic associated with
  positive-margin / peritoneal-seeding risk in retrospective series).
  Mitotane (adrenolytic; o,p'-DDD) adjuvant after R0 resection in
  high-recurrence-risk stage I–III (ADIUVO trial; pending updated
  evidence). Advanced disease: mitotane ± etoposide / doxorubicin /
  cisplatin (EDP-M per FIRM-ACT). Second-line evidence is weak;
  pembrolizumab in MSI-H / TMB-H subsets.

  Hereditary link to Li-Fraumeni: per NCCN, germline TP53 testing is
  recommended for ALL pediatric ACC and for adult ACC with personal /
  family history fitting Chompret criteria. Identified Li-Fraumeni
  carriers enter lifetime multi-organ surveillance (annual whole-body
  MRI per Toronto protocol; breast MRI; colonoscopy; brain MRI) — a
  primary use-case for v0.2-B Li-Fraumeni prevention pilot.
notes_ua: |
  Адренокортикальна карцинома — агресивна рідкісна пухлина кори
  надниркової залози. Бімодальний віковий розподіл (педіатричний та
  дорослий піки) відображає два біологічно різні контексти:
  педіатрична АКК переважно є спадковою (Li-Fraumeni / Beckwith-
  Wiedemann), дорослі випадки переважно спорадичні з ~10% спадковою
  складовою.

  Гормонально активна АКК проявляється гормональними синдромами:
  гіперкортизолізм (синдром Кушинга — найчастіший, ~50% функціональних
  АКК), вірилізація (андроген-продукуюча; особливо у жінок),
  фемінізація (естроген-продукуюча; рідко; у чоловіків), синдром
  Конна (альдостерон-продукуюча; рідко). Гормонально неактивна АКК
  проявляється масовим ефектом, болем у животі або як випадкова
  знахідка при візуалізації.

  Стадіювання: за системою ENSAT (Європейська мережа дослідження
  пухлин надниркових залоз); розмір пухлини >6 см, інвазія капсули,
  регіонарні лімфатичні вузли та віддалені метастази — ключові
  прогностичні фактори. Мітотичний індекс (шкала Weiss / Helsinki)
  визначає стратифікацію ризику рецидиву.

  Принципи лікування (повний набір Indications очікується): радикальна
  адреналектомія з лікувальною метою при резектабельній хворобі —
  історично перевага надається відкритому доступу (за
  ретроспективними даними лапароскопічний метод асоційований із
  ризиком позитивного краю / перитонеального обсіменіння). Ад'ювантний
  мітотан (адренолітик; o,p'-DDD) після R0-резекції за умови високого
  ризику рецидиву на стадіях I–III (дослідження ADIUVO; очікуються
  оновлені дані). Поширена хвороба: мітотан ± етопозид / доксорубіцин
  / цисплатин (EDP-M за FIRM-ACT). Доказова база у другій лінії
  слабка; пембролізумаб у MSI-H / TMB-H підгрупах.

  Спадковий зв'язок із Li-Fraumeni: за NCCN, гермінальне тестування
  TP53 рекомендоване ВСІМ педіатричним пацієнтам з АКК і дорослим
  пацієнтам з особистим / родинним анамнезом, що відповідає
  критеріям Chompret. Виявлені носії Li-Fraumeni вступають у
  пожиттєву мультиорганну програму спостереження (щорічне МРТ
  всього тіла за Торонтським протоколом; МРТ молочних залоз;
  колоноскопія; МРТ головного мозку) — основний сценарій
  застосування v0.2-B профілактичного пілота Li-Fraumeni.

