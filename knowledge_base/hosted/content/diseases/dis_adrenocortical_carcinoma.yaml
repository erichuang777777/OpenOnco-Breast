archetype: stage_driven
oncotree_code: ACC
lineage: "carcinoma"

etiological_factors:
  - "Sporadic (most adult cases)"
  - "Li-Fraumeni syndrome (germline TP53) — strong association in pediatric ACC; ~50–80% of pediatric ACC harbours germline TP53; ~3–7% of adult ACC"
  - "Beckwith-Wiedemann syndrome (11p15 imprinting / IGF2 dysregulation) — pediatric overgrowth syndrome, ACC predisposition"
  - "Lynch syndrome (germline MLH1/MSH2/MSH6/PMS2/EPCAM) — modest ACC risk (<5%)"
  - "MEN1 (germline MEN1) — adrenocortical lesions; rarely true ACC"
  - "FAP (germline APC) — rare association"

related_diseases:
  - DIS-PHEOCHROMOCYTOMA       # adjacent adrenal anatomy; distinct biology; differential at imaging discovery
  - DIS-CRC                    # Lynch overlap

key_biomarkers:
  - BIO-TP53-MUTATION          # germline TP53 in Li-Fraumeni cases; somatic TP53 ~20% of adult ACC
  - BIO-MSI-STATUS             # rare MSI-H subset (Lynch); pembrolizumab actionable in tumor-agnostic context

epidemiology:
  global_incidence: "~0.7–2 per million/year — ultra-rare; bimodal age distribution (peak in childhood <5y; second peak 40–60y)"
  hereditary_proportion: "Pediatric ACC: up to 50–80% germline TP53 (Li-Fraumeni). Adult ACC: ~3–7% germline TP53; total hereditary ~10%"
  functional_proportion: "~60% functional (cortisol-secreting most common → Cushing syndrome; mineralocorticoid, androgen, mixed less common); ~40% non-functional"
  five_year_survival: "Stage I–II ~60–80%, stage III ~35–50%, stage IV <15%"

sources:
  - SRC-NCCN-NET-2025                                  # NCCN Neuroendocrine and Adrenal Tumors (covers ACC)
  - SRC-NCCN-GENETIC-FAMILIAL-BREAST-OVARIAN-2025      # framework for TP53 / Li-Fraumeni germline testing (used analogously)

