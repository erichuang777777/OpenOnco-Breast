metadata:
  proposal_status: partial
  awaiting_proposal: >
    Full multi-agent neoadjuvant / adjuvant chemo Indications
    (MAP regimen: high-dose methotrexate + doxorubicin + cisplatin per
    EURAMOS-1; AOST0331 ifosfamide / etoposide intensification in poor
    responders) referenced in prose pending guideline-anchored
    Indication authoring. Surgical (limb-salvage vs amputation),
    radiation, and second-line / metastatic-disease pathways
    (regorafenib, sorafenib, cabozantinib, mifamurtide where licensed)
    pending. Germline TP53 + RB1 cascade cross-references prevention-
    track v0.2-B Li-Fraumeni + retinoblastoma-survivor surveillance
    Indications.

notes: >
  Osteosarcoma is the most common primary malignant bone tumor in
  children + adolescents. Bimodal age distribution: adolescent
  growth-spurt peak (10–20y; long-bone metaphyses) and elderly
  secondary peak (>60y; predominantly Paget disease-associated or
  post-radiation).

  Standard-of-care multi-modal treatment (full Indications pending):
  neoadjuvant chemotherapy → en-bloc surgical resection (limb-salvage
  preferred; amputation reserved for unresectable / vascular-bundle
  invasion) → adjuvant chemotherapy. MAP regimen (high-dose
  methotrexate, doxorubicin, cisplatin) is the global standard from
  EURAMOS-1 (good-responder arm). Histological necrosis ≥90% at
  resection predicts favorable outcome; poor responders (<90% necrosis)
  do NOT benefit from intensification per EURAMOS-1.

  Genetic relationships drive prevention-workstream surveillance:
  - Li-Fraumeni (germline TP53): osteosarcoma is the second-most
    common cancer in this syndrome; Toronto-protocol annual
    whole-body MRI + bone surveillance recommended. v0.2-B pilot.
  - Hereditary retinoblastoma (germline RB1) survivors: lifetime
    osteosarcoma risk markedly elevated, particularly within prior
    RT field. Long-term surveillance post-retinoblastoma childhood
    treatment required. v0.2-B pilot.
  - Paget disease of bone: ~1% of Paget patients develop secondary
    osteosarcoma; aggressive presentation in older adults; treated
    differently from primary adolescent OS due to comorbidity and
    histology (pagetic OS often shows poorer chemo response).

  Histological subtypes shape treatment intensity:
  - Conventional high-grade intramedullary (~80%) — full MAP regimen.
  - Low-grade central (~1–2%) and parosteal (~5%) — surgery alone may
    suffice for low-grade variants without high-grade dedifferentiation.
  - Telangiectatic (~3%) and small-cell (rare) — same MAP intensity
    as conventional.
  - Extraskeletal osteosarcoma — treated more like soft-tissue sarcoma.

  Second-line / metastatic: limited evidence; regorafenib (REGOBONE),
  sorafenib, cabozantinib (CABONE — phase 2 ORR ~12%), mifamurtide
  (EMA-approved adjuvant in EU + UA for localized non-metastatic
  osteosarcoma <30y as part of front-line, with chemo).
notes_ua: |
  Остеосаркома — найпоширеніша первинна злоякісна пухлина кістки у
  дітей та підлітків. Бімодальний віковий розподіл: підлітковий пік
  росту (10–20 років; метафізи довгих кісток) і вторинний пік у
  старшому віці (>60 років; переважно асоційований із хворобою
  Педжета або як вторинна постпроменева пухлина).

  Стандарт мультимодального лікування (повний набір Indications
  очікується): неоад'ювантна хіміотерапія → en-bloc хірургічна
  резекція (перевага кінцівко-збережного підходу; ампутація — для
  нерезектабельних випадків / інвазії судинно-нервового пучка) →
  ад'ювантна хіміотерапія. Режим MAP (високодозний метотрексат
  (methotrexate), доксорубіцин (doxorubicin), цисплатин (cisplatin)) —
  глобальний стандарт за результатами EURAMOS-1 (плече з добрими
  респондерами). Гістологічний некроз ≥90% при резекції є
  передбачувачем сприятливого результату; пацієнти з поганою
  відповіддю (<90% некрозу) НЕ отримують переваги від інтенсифікації
  за даними EURAMOS-1.

  Генетичні зв'язки визначають профілактичні програми спостереження:
  - Li-Fraumeni (гермінальний TP53): остеосаркома — другий за
    частотою рак у цьому синдромі; рекомендоване щорічне МРТ всього
    тіла + кісткове спостереження за Торонтським протоколом.
    Пілот v0.2-B.
  - Спадкова ретинобластома (гермінальний RB1), реконвалесценти:
    ризик остеосаркоми пожиттєво значно підвищений, особливо в межах
    попереднього поля променевої терапії. Необхідне довгострокове
    спостереження після дитячого лікування ретинобластоми.
    Пілот v0.2-B.
  - Хвороба Педжета кістки: ~1% пацієнтів розвивають вторинну
    остеосаркому; агресивний перебіг у старших дорослих; лікування
    відрізняється від первинної підліткової OS через коморбідність
    та гістологічні особливості (педжетівська OS часто демонструє
    гіршу відповідь на хіміотерапію).

  Гістологічні підтипи визначають інтенсивність терапії:
  - Конвенційна високого ступеня інтрамедулярна (~80%) — повний MAP.
  - Низького ступеня центральна (~1–2%) та парастальна (~5%) —
    самостійна хірургія може бути достатньою для низько-злоякісних
    варіантів без високозлоякісної дедиференціації.
  - Телеангіектатична (~3%) та дрібноклітинна (рідко) — інтенсивність
    MAP як у конвенційної.
  - Екстраскелетна остеосаркома — лікується ближче до сарком м'яких
    тканин.

  Друга лінія / метастатична хвороба: обмежена доказова база;
  регорафеніб (regorafenib, REGOBONE), сорафеніб (sorafenib),
  кабозантиніб (cabozantinib, CABONE — фаза 2 ORR ~12%),
  міфамуртид (mifamurtide, схвалений EMA та зареєстрований в Україні)
  як ад'ювантний при локалізованій неметастатичній остеосаркомі у
  пацієнтів <30 років у складі першої лінії з хіміотерапією.

