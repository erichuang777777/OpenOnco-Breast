lineage: "sarcoma"

etiological_factors:
  - "Sporadic (most)"
  - "Li-Fraumeni syndrome (germline TP53) — second-most common cancer in Li-Fraumeni; lifetime osteosarcoma risk ~15%"
  - "Hereditary retinoblastoma (germline RB1) — second-primary osteosarcoma risk; especially after prior RT for retinoblastoma"
  - "Rothmund-Thomson syndrome (germline RECQL4) — pediatric osteosarcoma predisposition"
  - "Werner syndrome (germline WRN) — adult osteosarcoma in 4th–5th decade"
  - "Bloom syndrome (germline BLM) — pediatric osteosarcoma"
  - "Paget disease of bone (older adults) — secondary osteosarcoma in pagetic bone; markedly elevated risk over background"
  - "Prior therapeutic radiation — secondary post-RT osteosarcoma (decades latency)"
  - "Chronic osteomyelitis, fibrous dysplasia, bone infarcts (rare predisposing settings)"

related_diseases:
  - DIS-CHONDROSARCOMA         # adjacent bone-sarcoma differential
  - DIS-SOFT-TISSUE-SARCOMA    # extraskeletal osteosarcoma overlaps STS pathways

key_biomarkers:
  - BIO-TP53-MUTATION          # germline TP53 in Li-Fraumeni; somatic TP53 alterations in most sporadic OS
  - BIO-RB1                    # germline RB1 retinoblastoma carriers; somatic RB1 loss in most sporadic OS

epidemiology:
  global_incidence: "~3–4 per million children + adolescents/year; ~1–2 per million adults/year; bimodal age distribution (adolescent peak 10–20y; secondary peak >60y largely Paget-associated)"
  primary_site_distribution: "Metaphysis of long bones — distal femur, proximal tibia, proximal humerus (~80% of conventional OS); axial / craniofacial sites (~10–15%; older adults)"
  five_year_survival: "Localized resectable disease ~60–70% with multi-agent chemo + surgery; metastatic at diagnosis (~20% of cases) ~20–30%; relapsed disease <30%"

sources:
  - SRC-NCCN-BONE-SARCOMA           # NCCN Bone Cancer guideline (osteosarcoma chapter)
  - SRC-ESMO-BONE-SARCOMA           # ESMO Bone Sarcoma guideline
  - SRC-NCCN-PEDIATRIC-SARCOMA      # NCCN Pediatric (covers childhood osteosarcoma trials)

