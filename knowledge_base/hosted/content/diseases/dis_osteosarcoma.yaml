  icd_o_3_topography: ["C40", "C41"]  # bones of limbs / other bones
  icd_10: "C40, C41"
  who_classification: "WHO Soft Tissue and Bone Tumours 5th ed (2020): Osteosarcoma — conventional (high-grade intramedullary), telangiectatic, small cell, low-grade central, parosteal, periosteal, high-grade surface, extraskeletal"

