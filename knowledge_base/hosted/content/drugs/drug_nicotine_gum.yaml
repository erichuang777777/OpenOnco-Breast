id: DRUG-NICOTINE-GUM
names:
  preferred: "Nicotine gum (NRT)"
  ukrainian: "Нікотинова жувальна гумка (NRT)"
  english: "Nicotine gum"
  synonyms: ["NRT gum", "Nicotine polacrilex", "Nicotine replacement therapy — gum"]
  brand_names: ["Nicorette gum", "Nicotinell gum", "Niquitin gum", "Habitrol gum"]
atc_code: N07BA01
rxnorm_id: "1041572"
drug_class: "Nicotine replacement therapy (NRT) — buccal short-acting"
mechanism: >
  Nicotine polacrilex resin releases nicotine slowly across the oral
  mucosa during intermittent chewing (chew-and-park technique).
  Peak plasma concentration ~20-30 min, ~1/3 to 1/2 of inhaled
  cigarette peak, relieving acute craving and withdrawal while
  avoiding the rapid arterial pulse of smoking that drives addiction.
  Cancer-prevention rationale: tobacco cessation is the highest-
  impact modifiable intervention against lung, head-and-neck,
  bladder, esophageal, pancreatic, cervical, kidney, AML, and other
  tobacco-attributable cancers (IARC Monograph 100E — Personal Habits
  and Indoor Combustions). NRT roughly doubles 6-month abstinence vs.
  placebo (Cochrane); combining a patch (long-acting baseline) with a
  short-acting form (gum or lozenge) PRN improves quit rates over
  monotherapy. USPSTF Grade A for adult tobacco-cessation
  pharmacotherapy.

regulatory_status:
  fda:
    approved: true
    first_approval_year: 1984
    indications_brief:
      - "Aid to smoking cessation"
      - "Relief of nicotine withdrawal symptoms"
  ema:
    approved: true
  ukraine_registration:
    registered: true
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-05-18"
    notes: "OTC у формі жувальних гумок (Nicorette gum, Nicotinell gum); не входить у пакет НСЗУ для відмови від куріння — out-of-pocket."
typical_dosing: >
  Strength selection by time-to-first-cigarette (TTFC):
    - TTFC ≤30 min OR ≥25 cig/d: start 4 mg gum
    - TTFC >30 min OR <25 cig/d: start 2 mg gum
  Cadence (10-12 week course typical):
    - Weeks 1-6: 1 piece every 1-2 h (≥9 pieces/day at start)
    - Weeks 7-9: 1 piece every 2-4 h
    - Weeks 10-12: 1 piece every 4-8 h
  Maximum 24 pieces/day. CHEW-AND-PARK technique: chew slowly until
  tingling/peppery taste, then park between cheek and gum, resume
  chewing when taste fades; ~30 min per piece. Avoid food/drink
  (especially acidic — coffee, juice, soft drinks) for 15 min
  before/during use — acidic pH reduces buccal nicotine absorption.
  Combination NRT (patch baseline + PRN gum) preferred over
  monotherapy.
formulations:
  - "Gum 2 mg (regular and mint/fruit/cinnamon flavors)"
  - "Gum 4 mg (regular and flavored)"

absolute_contraindications:
  - "Hypersensitivity to nicotine or gum-base components"
  - "Active temporomandibular joint (TMJ) disease, severe dental/denture problems, jaw pain (relative — choose lozenge or patch instead)"
  - "Severe arrhythmia, recent (<2 weeks) MI, unstable/worsening angina (relative — net benefit usually favors NRT over continued smoking)"
  - "Children — pediatric ingestion is severe (secure storage)"
black_box_warnings: []
major_interactions:
  - "Smoking cessation reduces CYP1A2 induction — clearance of clozapine, olanzapine, theophylline, ropinirole, caffeine, fluvoxamine increases ~30-50% within 1-2 weeks of cessation; reduce doses and monitor"
  - "Insulin requirements may decrease modestly with cessation"
  - "Concurrent acidic beverages reduce buccal nicotine absorption (mechanism only — no toxic interaction)"
common_adverse_events:
  - "Mouth/throat irritation, soreness, jaw ache (~10-25%)"
  - "Hiccups, belching (~10-15% if chewed too vigorously and swallowed)"
  - "Heartburn / dyspepsia (~5-10%)"
  - "Nausea (~5-10%)"
  - "Headache (~5-10%)"
  - "Increased salivation (~5%)"
serious_adverse_events:
  - "Severe hypersensitivity reaction (rare)"
  - "Dental damage or filling/crown dislodgement (rare; choose lozenge if dental issues)"
  - "Nicotine toxicity from over-use or pediatric ingestion"
  - "Cardiovascular events (very rare; observational signal not robust)"

pharmacology: {half_life_hours: 2, clearance: "Hepatic CYP2A6 (primary) and CYP2B6; ~10% renal unchanged. Buccal absorption — peak plasma ~20-30 min during chew-and-park; ~50-80% absorbed buccally, remainder swallowed (first-pass metabolized)."}

sources:
  - SRC-IARC-100A-TOBACCO-SMOKING
  - SRC-USPSTF-LUNG-LDCT-2021

last_reviewed: "2026-05-18"
notes: >
  STUB — v0.2 prevention-workstream authoring (batch 2); pending two-
  Clinical-Co-Lead signoff per CHARTER §6.1 dev-mode. First-line
  tobacco-cessation NRT (USPSTF Grade A for adults; insufficient
  evidence in pregnancy). PARTNER to DRUG-NICOTINE-PATCH (long-acting
  baseline) and DRUG-NICOTINE-LOZENGE (alternative short-acting).
  Cochrane Stead 2012 meta-analysis: any NRT vs. placebo OR ~1.6 for
  6-month abstinence; combination NRT OR ~1.3 vs. NRT monotherapy.
  Patient selection: prefer LOZENGE over gum if dental issues, TMJ
  disease, or dentures. CHEW-AND-PARK technique training is critical
  for efficacy — gum is more user-error-sensitive than lozenge or
  patch. Primary RCTs (e.g., Garvey 2000, Tonnesen 1988) not yet
  ingested as standalone SRC-* entities; cited sources cover the
  tobacco-cancer causal relationship (IARC-100A) and the lung-cancer
  screening context where cessation is integrated (USPSTF-LUNG-LDCT).
  Engine should surface NRT options when prevention pilots flag
  current tobacco use; specific-form choice belongs to patient/clinician.

notes_ua: >
  Нікотинова жувальна гумка — короткодіюча форма NRT для відмови
  від куріння. Перша лінія за USPSTF (Grade A для дорослих).
  Дозування 2 mg або 4 mg залежно від TTFC (≤30 хв або ≥25 цигарок/
  добу → 4 mg). Курс 10-12 тижнів. ТЕХНІКА «ЖУЙ-І-ПАРКУЙ»: жувати
  повільно до поколювання/перцевого смаку, потім «припарковувати»
  між щокою та яснами, поновлювати жування коли смак зникне; ~30 хв
  на одну штуку. Уникати кави/соків за 15 хв до/під час застосування.
  При проблемах із зубами/протезами/TMJ — обрати льодяник або
  пластир. КОМБІНАЦІЯ з пластирем як базою + жуйка PRN — краще за
  монотерапію (Cochrane). В Україні OTC, не реімбурсується НСЗУ —
  out-of-pocket. Двигун має пропонувати NRT при поточному курінні;
  вибір форми — діалог пацієнт+лікар.

