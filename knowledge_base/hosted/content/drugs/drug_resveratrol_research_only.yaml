id: DRUG-RESVERATROL-RESEARCH-ONLY
names:
  preferred: "Resveratrol (research-only chemoprevention candidate — NOT standard-of-care)"
  ukrainian: "Ресвератрол (дослідницький кандидат — НЕ стандарт допомоги)"
  english: "Resveratrol research-only"
  synonyms: ["trans-Resveratrol", "3,5,4'-trihydroxy-trans-stilbene"]
  brand_names: ["various OTC supplements — Longevinex, Resvitrol, Resveratrol extract"]
atc_code: null
rxnorm_id: null
drug_class: "Polyphenol / stilbenoid — dietary supplement (food-grade phytochemical from grape skins, peanuts, berries)"
mechanism: >
  Naturally occurring stilbenoid polyphenol; activates SIRT1 (NAD+-
  dependent deacetylase) and modulates AMPK signaling, mTOR, NF-κB,
  and estrogen-receptor pathways in preclinical models. Cancer-
  prevention rationale (preclinical): induces cell-cycle arrest and
  apoptosis in tumor cell lines, inhibits inflammation, suppresses
  COX-2, modulates ER signaling. Animal models show reduction in
  chemically induced skin, mammary, colorectal, and prostate tumors.
  CRITICAL LIMITATION FOR CLINICAL TRANSLATION: oral bioavailability
  is ~1% (extensive sulfation/glucuronidation), and human plasma
  concentrations achieved with supplements are 10-100× lower than
  active concentrations in preclinical models. No clinical trial of
  any size has demonstrated cancer-preventive efficacy in humans.

