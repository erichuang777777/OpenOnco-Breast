id: DRUG-FINASTERIDE-CHEMOPREVENTION
names:
  preferred: "Finasteride (prostate cancer chemoprevention context)"
  ukrainian: "Фінастерид (хіміопрофілактика раку передміхурової залози)"
  english: "Finasteride (prostate cancer chemoprevention)"
  brand_names: ["Proscar (5 mg)", "Propecia (1 mg — alopecia, not chemoprevention dose)"]
atc_code: G04CB01
rxnorm_id: "4541"
drug_class: "5-alpha-reductase type 2 inhibitor"
mechanism: >
  Competitive inhibitor of 5-alpha-reductase type 2 isoenzyme; blocks
  conversion of testosterone to dihydrotestosterone (DHT) in prostate,
  hair follicles, and skin. Reduces intraprostatic DHT by ~85-90%
  while serum testosterone rises ~10-15%. Prostate cancer prevention
  rationale: lowering DHT reduces androgen-driven epithelial
  proliferation. Prostate Cancer Prevention Trial (PCPT, NCT00000484,
  Thompson NEJM 2003 + 2013 long-term): 25% relative reduction in
  prostate cancer incidence at 7 years but signal of increased Gleason
  ≥7 detection (re-analyzed and partly attributed to detection bias;
  long-term mortality not increased).

regulatory_status:
  fda:
    approved: true
    first_approval_year: 1992
    indications_brief:
      - "Benign prostatic hyperplasia (5 mg)"
      - "Androgenetic alopecia (1 mg — not chemoprevention dose)"
      - "NOT FDA-labeled for prostate cancer chemoprevention"
  ema:
    approved: true
  ukraine_registration:
    registered: true
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-05-18"
    notes: "Реімбурсація — не для хіміопрофілактики; out-of-pocket. BPH-показання покривається окремими програмами в окремих лікувальних закладах."
typical_dosing: >
  Prostate cancer chemoprevention (controversial / off-label, PCPT
  protocol): 5 mg PO once daily ongoing.
  BPH dosing identical (5 mg/day). Time to plateau effect on
  intraprostatic DHT ~6 months; PSA values reduce by ~50% within
  6-12 months — double measured PSA for cancer-screening interpretation
  in users.
formulations:
  - "Tablet 5 mg (BPH / chemoprevention dose)"
  - "Tablet 1 mg (alopecia — separate entity / dose)"

absolute_contraindications:
  - "Pregnancy / women of reproductive potential — Category X (fetal genital abnormalities); pregnant women must not handle crushed tablets"
  - "Hypersensitivity to finasteride or other 5-ARI"
  - "Pediatric use"
black_box_warnings: []
major_interactions:
  - "Minimal CYP3A4 substrate — clinically significant interactions rare"
  - "Theophylline, warfarin, digoxin — no significant interactions"
common_adverse_events:
  - "Decreased libido (~3-6%)"
  - "Erectile dysfunction (~3-8%)"
  - "Ejaculation disorders (decreased volume) (~2-3%)"
  - "Gynecomastia / breast tenderness (~1-3%)"
  - "Mood changes / depression (~1-2%; FDA label updated 2011)"
serious_adverse_events:
  - "Persistent sexual dysfunction after discontinuation (post-finasteride syndrome — controversial; FDA-acknowledged in 2012 label update)"
  - "High-grade prostate cancer signal (PCPT — partially detection-bias attributable; no mortality difference at 18-year follow-up)"
  - "Male breast cancer (rare signal; magnitude unclear)"
  - "Severe depression / suicidality (rare; label warning 2012)"

pharmacology: {half_life_hours: 6, clearance: "Hepatic CYP3A4 oxidation; metabolites and parent excreted via urine and feces; no renal dose adjustment"}

sources:
  - SRC-USPSTF-PROSTATE-2018
  - SRC-NCCN-PROSTATE-2025

last_reviewed: "2026-05-18"
notes: >
  STUB — v0.2 chemoprevention-workstream authoring; pending two-Clinical-
  Co-Lead signoff per CHARTER §6.1 dev-mode. CONTROVERSIAL chemoprevention
  indication. PCPT (Thompson NEJM 2003): 25% reduction in overall prostate
  cancer at 7 years BUT initially-reported increase in high-grade (Gleason
  7-10) tumors. Subsequent reanalysis attributed much of the high-grade
  excess to detection bias (smaller prostate volume → easier biopsy
  detection); long-term mortality at 18 years not increased. AUA 2011 /
  USPSTF 2018 caution: shared decision-making required; no general-
  population recommendation. Strict pregnancy exclusion for partner;
  pregnant women must not handle. Engine should NOT auto-recommend;
  reserved for high-risk men opting in after explicit counseling.

notes_ua: >
  Фінастерид — інгібітор 5-альфа-редуктази типу 2; основне FDA-
  показання — доброякісна гіперплазія передміхурової залози (5 mg).
  Хіміопрофілактика раку простати СУПЕРЕЧЛИВЕ показання: дослідження
  PCPT показало 25% зниження загальної захворюваності, але початковий
  сигнал збільшення Gleason ≥7 пухлин (частково обумовлений
  виявленням; смертність не зросла за 18 років). USPSTF 2018 / AUA 2011
  — рекомендують спільне прийняття рішень, без рекомендації для
  загальної популяції. Сувора виключна вагітність партнерки (Category X
  — фетальні аномалії геніталій; жінкам не торкатися подрібнених
  таблеток). Двигун НЕ повинен автоматично рекомендувати; призначається
  чоловікам високого ризику після явного консультування.

