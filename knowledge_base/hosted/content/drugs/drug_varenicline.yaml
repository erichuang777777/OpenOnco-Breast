id: DRUG-VARENICLINE
names:
  preferred: "Varenicline"
  ukrainian: "Варенікліні"
  english: "Varenicline"
  brand_names: ["Chantix", "Champix"]
atc_code: N07BA03
rxnorm_id: "638596"
drug_class: "α4β2 nicotinic acetylcholine receptor partial agonist"
mechanism: >
  Selective partial agonist at the α4β2 nicotinic acetylcholine receptor —
  the principal mediator of nicotine-induced dopaminergic reward. Partial
  agonism produces modest dopamine release (relieving craving and
  withdrawal) while simultaneously blocking nicotine binding (reducing
  reinforcement from any cigarettes smoked during titration).
  Most effective monotherapy for tobacco cessation (USPSTF / AHCPR).

regulatory_status:
  fda:
    approved: true
    first_approval_year: 2006
  ema:
    approved: true
  ukraine_registration:
    registered: true
    registration_number: null
    reimbursed_nszu: false
    reimbursement_indications: []
    last_verified: "2026-05-18"
    notes: "Registered in Ukraine (Champix). Not on НСЗУ tobacco-cessation package as of 2026-05 — out-of-pocket pharmacy."
typical_dosing: >
  PO: 0.5 mg once daily × days 1-3, then 0.5 mg BID × days 4-7, then
  1 mg BID for weeks 2-12 (standard 12-week course). Set quit date
  for ~day 8. May extend additional 12 weeks if abstinent at week 12.
  Renal: CrCl <30 → max 0.5 mg BID; ESRD/dialysis → 0.5 mg daily.
formulations:
  - "Tablet 0.5 mg, 1 mg"

absolute_contraindications:
  - "Hypersensitivity to varenicline"
black_box_warnings:
  - "Neuropsychiatric symptoms — depression, agitation, hostility, suicidal ideation/behavior (removed from labeling 2016 after EAGLES trial but historical caution remains; counsel patients to report mood changes)"
major_interactions:
  - "Nicotine replacement — additive nausea, headache; combination not routinely recommended"
  - "Alcohol — case reports of unusual drunkenness, blackout; advise caution while titrating"
common_adverse_events:
  - "Nausea (~30%)"
  - "Insomnia, abnormal/vivid dreams (~15%)"
  - "Headache (~15%)"
  - "Constipation (~10%)"
  - "Flatulence (~5%)"
serious_adverse_events:
  - "Seizures (rare, dose-related)"
  - "Cardiovascular events (small absolute risk; meta-analyses inconsistent)"
  - "Severe skin reactions (SJS, erythema multiforme — rare)"
  - "Neuropsychiatric symptoms — depression, suicidality (rare; not increased vs placebo in EAGLES trial)"

pharmacology: {half_life_hours: 24, clearance: "primarily renal (~92% excreted unchanged); minimal CYP metabolism"}

sources:
  - SRC-NCCN-BCELL-2025

last_reviewed: "2026-05-18"
notes: >
  STUB — v0.2 prevention-workstream authoring; pending two-Clinical-Co-Lead
  signoff per CHARTER §6.1 dev-mode. Most effective single-agent for
  tobacco cessation (USPSTF + AHCPR). Combination with NRT may further
  improve quit rates but increases nausea. EAGLES trial (2016)
  reassured cardiovascular and neuropsychiatric safety vs placebo.
  Source cited (SRC-NCCN-BCELL-2025) is closest in-KB until
  USPSTF/AHCPR/Cochrane tobacco-cessation sources are added in a
  separate source-stub workstream.

notes_ua: >
  Варенікліні — найефективніша монотерапія для припинення куріння
  (USPSTF + AHCPR). Тривалість курсу 12 тижнів, можна продовжити
  ще 12 тижнів. EAGLES trial (2016) підтвердив відсутність
  підвищеного ризику серцево-судинних і психоневрологічних подій
  порівняно з плацебо.

ukrainian_review_status: pending_clinical_signoff
