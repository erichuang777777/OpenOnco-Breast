  - SRC-NCCN-NET-2025
  - SRC-ENDOCRINE-SOCIETY-MEN-2023
last_reviewed: "2026-05-18"
notes: >
  Catecholamine-metabolite biomarker — gold-standard biochemical test for
  pheochromocytoma and paraganglioma (PPGL). Preferred for asymptomatic
  surveillance in syndromic carriers: VHL (annual, lifelong), MEN2A/MEN2B
  (annual after age 5-8 per RET codon stratification), SDHB/SDHC/SDHD/SDHA
  (annual, starting age 6-10 per Endocrine Society 2023). Sensitivity
  ~96-99% for PPGL when properly drawn; specificity ~85-95% (lower with
  drug/dietary interferents). VHL Type 1 lacks pheo; Type 2A/2B/2C have
  pheo as defining feature — surveillance schedule keyed to VHL phenotype
  classification (see BIO-VHL-CLASSIFICATION-PHENOTYPE). Elevation >3-4x
  upper limit highly suggestive; intermediate elevation prompts clonidine
  suppression test or 24-h urinary fractionated metanephrines as confirm.
  Imaging (MRI abdomen + I-123 MIBG or 68Ga-DOTATATE PET) when biochemistry
  positive. STUB pending two-Co-Lead signoff.
notes_ua: >
  Метаболіт катехоламінів — золотий стандарт біохімічного тесту для
  феохромоцитоми/парагангліоми. Переважний для безсимптомного нагляду
  носіїв синдромів: VHL (щорічно довічно), MEN2A/2B (щорічно після 5-8 років
  за стратифікацією кодону RET), SDHB/C/D/A (щорічно з 6-10 років за
  Endocrine Society 2023). STUB pending two-Co-Lead signoff.
ukrainian_review_status: pending_clinical_signoff
