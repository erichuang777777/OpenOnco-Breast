id: BIO-METANEPHRINES-PLASMA-PHEO
names:
  preferred: "Plasma free metanephrines (pheochromocytoma/paraganglioma surveillance — VHL/MEN2/SDH)"
  ukrainian: "Метанефрини плазми вільні (нагляд феохромоцитоми/парагангліоми — VHL/MEN2/SDH)"
  english: "Plasma Free Metanephrines"
  synonyms: ["plasma metanephrine", "plasma normetanephrine", "fractionated plasma metanephrines"]
biomarker_type: serum_marker
measurement:
  method: "Plasma LC-MS/MS (preferred) or immunoassay; patient supine ≥30 min before draw"
  units: "pg/mL or nmol/L (assay-dependent reference ranges; metanephrine and normetanephrine reported separately)"
specimen_requirements:
  - "EDTA plasma (5 mL), patient supine ≥30 min before phlebotomy"
  - "Avoid acetaminophen, sympathomimetics, tricyclic antidepressants ≥5 days before draw (assay interferents)"
  - "LOINC 35114-7 (metanephrine, plasma), 50182-9 (normetanephrine, plasma)"
clinical_context: [screening_surveillance]
applicable_in_asymptomatic: true
oncokb_skip_reason: tumor_marker
external_ids:
  loinc: "35114-7"
