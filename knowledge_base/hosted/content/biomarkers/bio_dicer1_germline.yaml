notes: "DICER1 germline — drives DICER1 syndrome. miRNA biogenesis defect. Spectrum: pleuropulmonary blastoma (PPB, type I/II/III pediatric), ovarian Sertoli-Leydig cell tumor, multinodular goitre / differentiated thyroid carcinoma, cystic nephroma, embryonal rhabdomyosarcoma (cervix/uterus), ciliary-body medulloepithelioma, pituitary blastoma, pineoblastoma. Surveillance: chest CT (infancy), thyroid US, pelvic US, eye exams. STUB pending two-Co-Lead signoff."
notes_ua: "DICER1 germline — драйвер DICER1 syndrome. Спектр: плевропульмональна бластома (дитяча), оваріальна пухлина Sertoli-Leydig, мультинодулярний зоб/диференційований РЩЗ, кістозна нефрома, RMS шийки матки."
