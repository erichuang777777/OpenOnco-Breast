notes: >
  Composite codon-phenotype classification for MEN2 (germline RET-
  activating pathogenic variants). ATA 2015 / NCCN 2025 stratify
  carriers into three syndromic subtypes and four codon-based risk
  tiers driving prophylactic-thyroidectomy timing.
  Syndromic subtypes:
  • MEN2A (~75% of MEN2): MTC + pheochromocytoma (~50%) +
    primary hyperparathyroidism (~25%); occasional cutaneous lichen
    amyloidosis or Hirschsprung disease. Codons mostly cysteine-rich
    extracellular domain (609, 611, 618, 620, 630, 634).
  • MEN2B (~5%): MTC (earliest onset, most aggressive) + pheo (~50%) +
    marfanoid habitus + mucosal neuromas (tongue, lips, GI) +
    medullated corneal nerves. Codon M918T (95%) or A883F (rare).
  • FMTC (~20%): MTC only, no pheo / no HPT. Codons 768, 790, 791,
    804, 891 (lower-risk codons) — increasingly considered MEN2A
    variant with low-penetrance pheo.
  ATA RET risk tiers driving prophylactic-thyroidectomy timing:
  • Highest risk (ATA HST): M918T → thyroidectomy by age 1 (before
    metastatic MTC).
  • High risk (ATA H): C634, A883F → by age 5.
  • Moderate risk (ATA MOD): 609, 611, 618, 620, 630, 768, 790, 791,
    804, 891 → individualized; consider 5-10 years (basal calcitonin
    + neck US trigger).
  Surveillance for pheo: annual plasma metanephrines starting age 11
  (MEN2A high/moderate) or age 8 (MEN2B); for HPT: annual calcium +
  PTH starting age 11 (MEN2A only). STUB pending two-Co-Lead signoff.
notes_ua: >
  Композитна класифікація кодон-фенотип для MEN2. 3 синдромні підтипи:
  MEN2A (~75% — MTC + феохромоцитома + первинний гіперпаратиреоз),
  MEN2B (~5% — MTC найагресивніший + феохромоцитома + марфаноїдний
  габітус + слизові нейроми; кодон M918T), FMTC (~20% — лише MTC).
  ATA рівні ризику визначають час профілактичної тиреоїдектомії:
  M918T — до 1 року; C634 — до 5 років; помірний ризик — 5-10 років.
  STUB pending two-Co-Lead signoff.
