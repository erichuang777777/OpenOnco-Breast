last_reviewed: "2026-05-18"
notes: >
  Screening-context entry for PSA — separate from BIO-PSA (which covers
  diagnostic and treatment-monitoring dynamics for established prostate
  cancer). USPSTF 2018: Grade C for men 55-69 (individualized
  shared-decision-making about benefits + harms); Grade D for men ≥70
  (recommend AGAINST routine screening). NCCN 2025 (Early Detection):
  baseline PSA + DRE discussion at age 45 for African American men or
  BRCA2 carriers (high-risk groups), age 50 for average risk; if PSA
  <1 ng/mL, repeat every 2-4 years; if PSA 1-3 ng/mL, repeat every 1-2
  years; if PSA >3 ng/mL, evaluate further (repeat PSA, mpMRI, biomarker
  reflex such as 4Kscore/PHI, possible biopsy). Higher screening intensity
  for confirmed BRCA2 germline carriers (IMPACT study — PSA q1y starting
  age 40; biopsy threshold ≥3 ng/mL). PSA can be falsely elevated in BPH,
  prostatitis, urinary retention, recent instrumentation. Free PSA ratio,
  PSA density, and reflex biomarkers (PHI, 4Kscore, SelectMDx) reduce
  unnecessary biopsy. Limitations: overdiagnosis/overtreatment of
  indolent cancers (well-characterized harm — driver of USPSTF Grade C).
  STUB pending two-Co-Lead signoff.
notes_ua: >
  Скринінговий контекст ПСА — окремо від BIO-PSA (динаміка при
  встановленому захворюванні). USPSTF 2018: ступінь C для чоловіків 55-69
  (індивідуалізоване рішення), ступінь D для ≥70. NCCN 2025: обговорення з
  45 років (афроамериканці, носії BRCA2), з 50 років (середній ризик).
  Носії BRCA2 — щорічно з 40 років. STUB pending two-Co-Lead signoff.
