id: BIO-PSA-PROSTATE-SCREENING
names:
  preferred: "PSA (prostate cancer screening / surveillance context — USPSTF C-grade)"
  ukrainian: "ПСА (скринінг/нагляд раку передміхурової залози — USPSTF C)"
  english: "Prostate-Specific Antigen for Screening"
  synonyms: ["PSA screening", "serum PSA"]
biomarker_type: serum_marker
measurement:
  method: "Serum immunoassay (ECLIA, CLIA); WHO 96/670 calibration preferred"
  units: "ng/mL"
  typical_range: [0, 4]
specimen_requirements:
  - "Serum (5 mL clotted blood)"
  - "Avoid recent ejaculation (<48 h), DRE (<1 week), or urological procedure (<6 weeks)"
  - "LOINC 2857-1 (PSA, total)"
clinical_context: [screening_surveillance]
applicable_in_asymptomatic: true
oncokb_skip_reason: tumor_marker
