notes: >
  STUB. Companion to BIO-MGMT-METHYLATION (primary-GBM treatment-selection
  scope). Surveillance use: IDH-mutant astrocytoma transformation to
  grade 4 / secondary GBM — MGMT status at progression informs second-line
  TMZ rechallenge vs lomustine vs trial. Distinction from primary entry
  is non-rigid (overlapping biology); kept as separate STUB so progression-
  context citations don't bleed into newly-diagnosed GBM rendering.
  Reviewer may merge with BIO-MGMT-METHYLATION if scope distinction is
  judged contrived.
