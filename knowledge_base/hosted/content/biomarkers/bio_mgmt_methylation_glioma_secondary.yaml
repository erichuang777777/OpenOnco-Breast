  ukrainian: "Метилювання MGMT — вторинна ГБМ / IDH-мутантна гліома, контекст прогресії"
  english: "MGMT methylation in secondary-GBM surveillance"
  synonyms: ["MGMT in IDH-mutant astrocytoma transformation", "secondary glioblastoma MGMT"]
