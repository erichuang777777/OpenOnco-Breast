notes: >
  Second of three Ashkenazi Jewish founder mutations. Single-nucleotide
  duplication (cytosine) in exon 20 causing frameshift and premature
  termination — truncates BRCA1 within the BRCT2 domain, abolishing
  C-terminal protein-binding function critical for homologous-recombination
  repair coordination. Also called 5382insC in legacy nomenclature
  (offset by stop-codon counting convention shift). Recurrent founder
  effect in AJ populations (~0.8-1.0% carrier frequency in AJ vs <0.1%
  non-AJ); also reported as a recurrent variant in Polish, Russian,
  Belarusian populations (likely separate founder events or AJ admixture).
  Lifetime cancer risks consistent with BRCA1 average. NCCN 2025
  endorses population-wide AJ founder-panel testing (3-mutation panel)
  regardless of family history. Same surveillance and risk-reduction
  protocols as other BRCA1 pathogenic variants. STUB pending two-Co-Lead
  signoff.
notes_ua: >
  Друга з трьох засновницьких мутацій ашкеназі. Одно-нуклеотидна
  дуплікація цитозину в екзоні 20 → зсув рамки, передчасний стоп-кодон,
  обрізаний домен BRCT2. Також відома як 5382insC у застарілій
  номенклатурі. Рекурентний засновницький ефект в ашкеназі (~0.8-1.0%),
  у польській, російській, білоруській популяціях. NCCN 2025: панельне
  тестування. STUB pending two-Co-Lead signoff.
