notes: "CDKN2A germline — drives Familial Atypical Multiple Mole Melanoma syndrome (FAMMM). Cutaneous melanoma lifetime risk ~50-70%; pancreatic ductal adenocarcinoma ~15-20%. Encodes p16INK4a + p14ARF; both isoforms may be affected. NCCN: annual dermatologic exam + pancreatic surveillance (MRI/EUS) per CAPS consortium. STUB pending two-Co-Lead signoff."
