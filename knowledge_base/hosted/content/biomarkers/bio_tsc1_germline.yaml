notes: "TSC1 germline — drives Tuberous Sclerosis Complex (TSC). mTOR-pathway hyperactivation. Tumors: subependymal giant cell astrocytoma (SEGA), renal angiomyolipomas (AML), lymphangioleiomyomatosis (LAM, females), cardiac rhabdomyomas, cortical tubers. mTOR inhibitors (everolimus, sirolimus) are active across SEGA / renal AML / LAM. STUB pending two-Co-Lead signoff."
notes_ua: "TSC1 germline — драйвер туберозного склерозу. Пухлини: SEGA, ниркові ангіоміоліпоми, LAM (жінки), кардіальні рабдоміоми. mTOR-інгібітори (еверолімус) — активні."
ukrainian_review_status: pending_clinical_signoff
