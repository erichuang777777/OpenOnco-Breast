notes: "NF2 germline — drives Neurofibromatosis Type 2 (distinct from NF1). Hallmark: bilateral vestibular schwannomas (pathognomonic). Spectrum also includes multiple intracranial / spinal meningiomas, spinal schwannomas, ependymomas, juvenile cataracts. Surveillance: brain + spine MRI, audiology. Bevacizumab off-label for vestibular-schwannoma hearing preservation. STUB pending two-Co-Lead signoff."
notes_ua: "NF2 germline — драйвер NF2 (відмінний від NF1). Двосторонні вестибулярні шваноми + множинні менінгіоми + спинальні шваноми. Нагляд: МРТ головного/спинного мозку, аудіометрія."
