id: BIO-HCV-RNA
names:
  preferred: "HCV RNA (quantitative PCR)"
  ukrainian: "РНК HCV (кількісна ПЛР)"
  english: "HCV RNA by quantitative PCR"
  synonyms:
    - "HCV viral load"
    - "HCV PCR"
biomarker_type: viral_load

measurement:
  method: "Real-time quantitative PCR"
  units: "IU/mL"
  typical_range: [0, 100000000]

specimen_requirements:
  - "Serum or EDTA plasma"
  - "LOINC code 11011-4 (HCV RNA quantitation)"

sources:
  - SRC-EASL-HCV-2023

# §20 prevention extension (RATIFIED 2026-05-18) — HCV-RNA serves both
# the treatment-time pathway (driving IND-HCV-MZL-1L-ANTIVIRAL response
# assessment via SVR12) AND the prevention-time pathway (asymptomatic
# chronic-HCV individual without confirmed lymphoma → DAA prevention via
# IND-CHRONIC-HCV-PREVENTION-DAA).
clinical_context:
  - screening_surveillance
  - predictive
applicable_in_asymptomatic: true

last_reviewed: "2026-05-18"
oncokb_skip_reason: viral_load
external_ids:
  loinc: "11011-4"  # HCV RNA quantitation
notes: >
  Binary positive/negative used for Indication applicability; quantitative
  value tracked for antiviral response assessment (SVR12 = undetectable at
  week 12 post-treatment).
notes_ua: >
  Позитивний / негативний результат визначає застосовність показань;
  кількісне значення відстежується для оцінки противірусної відповіді
  (SVR12 = невизначуваний рівень на 12-му тижні після закінчення лікування).
ukrainian_review_status: pending_clinical_signoff
ukrainian_drafted_by: claude_ua_02
draft_revision: 2
