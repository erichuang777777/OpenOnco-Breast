last_reviewed: "2026-05-18"
notes: "BAP1 germline — drives BAP1 Tumor Predisposition Syndrome. Core spectrum: uveal melanoma (lifetime ~30%), malignant mesothelioma (esp. peritoneal), clear-cell RCC, cutaneous melanoma, atypical Spitz tumors. Cutaneous BAP1-inactivated melanocytic tumors (BIMTs) are clinical clue. Surveillance: annual ophthalmologic exam + dermatologic + abdominal imaging. STUB pending two-Co-Lead signoff."
notes_ua: "BAP1 germline — драйвер BAP1 Tumor Predisposition Syndrome: уве­альна меланома + мезотеліома + RCC + шкірна меланома."
