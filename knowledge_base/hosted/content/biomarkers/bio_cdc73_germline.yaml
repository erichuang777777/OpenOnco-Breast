notes: "CDC73 (HRPT2) germline — drives Hyperparathyroidism-Jaw Tumor (HPT-JT) syndrome. Spectrum: primary hyperparathyroidism (often single-gland adenoma, ~15% parathyroid carcinoma), ossifying fibromas of mandible/maxilla, uterine tumors, renal cysts/Wilms-like tumors. Surveillance: annual serum calcium + PTH + neck exam; jaw imaging; renal/uterine imaging in carriers. STUB pending two-Co-Lead signoff."
notes_ua: "CDC73 (HRPT2) germline — драйвер HPT-JT синдрому: первинний гіперпаратиреоз (часто паратиреоїдна карцинома), оссифікуючі фіброми щелеп, ниркові/маткові пухлини. Щорічний контроль кальцію + ПТГ."
ukrainian_review_status: pending_clinical_signoff
