notes: "PTEN germline — drives PTEN Hamartoma Tumor Syndrome (PHTS), encompassing Cowden syndrome. Cancer spectrum: breast (lifetime ~85%), thyroid (follicular ~35%), endometrial ~28%, RCC ~30%, CRC, melanoma. Non-cancer: macrocephaly, mucocutaneous trichilemmomas, GI hamartomas, Lhermitte-Duclos. NCCN: annual breast MRI from 30, dermatologic + thyroid US + endometrial sampling. STUB pending two-Co-Lead signoff."
