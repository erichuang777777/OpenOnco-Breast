notes: "PTCH1 germline — drives Gorlin / Nevoid Basal Cell Carcinoma Syndrome (NBCCS). Hedgehog-pathway dysregulation. Hallmarks: multiple BCCs (often early-onset, sun-protected areas), odontogenic keratocysts of jaw, palmar/plantar pits, macrocephaly, calcified falx cerebri, skeletal anomalies (bifid ribs), childhood medulloblastoma (SHH-subtype, ~5%). AVOID therapeutic radiation when feasible — radiation drives BCC formation. Smoothened inhibitors (vismodegib, sonidegib) for advanced BCC. STUB pending two-Co-Lead signoff."
notes_ua: "PTCH1 germline — драйвер Gorlin / NBCCS. Множинні BCC, кератоцистні одонтогенні пухлини, медулобластома (SHH). УНИКАТИ променевої терапії. Smoothened-інгібітори (вісмодегіб)."
