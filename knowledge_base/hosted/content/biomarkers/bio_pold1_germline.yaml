notes: "POLD1 germline (exonuclease / proofreading-domain variants) — drives Polymerase-Proofreading-Associated Polyposis (PPAP), mechanistically analogous to POLE-PPAP. Autosomal dominant; oligopolyposis + early-onset CRC + endometrial cancer (higher endometrial penetrance than POLE-PPAP). Tumors ultramutated; potential ICI sensitivity. Surveillance: colonoscopy q1-2y from late teens; endometrial sampling from 40. STUB pending two-Co-Lead signoff."
notes_ua: "POLD1 germline (proofreading-варіанти) — драйвер PPAP, аналогічно POLE-PPAP. Олігополіпоз + КРР + ендометрій (вища пенетрантність ендометрія за POLE). Колоноскопія кожні 1-2 роки + ендометріальний контроль з 40."
