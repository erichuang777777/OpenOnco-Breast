id: BIO-HBV-DNA-QUANTITATIVE-MONITORING
names:
  preferred: "HBV DNA quantitative — viral-load monitoring during nucleos(t)ide analogue therapy"
  ukrainian: "HBV ДНК кількісна — моніторинг вірусного навантаження під час нуклеоз(т)идної терапії"
