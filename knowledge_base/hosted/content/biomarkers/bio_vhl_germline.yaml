last_reviewed: "2026-05-18"
notes: "VHL germline — drives von Hippel-Lindau syndrome. Spectrum: clear-cell RCC (lifetime ~70%), CNS hemangioblastomas (cerebellar/spinal), retinal hemangioblastomas, pheochromocytoma, pancreatic NETs / cysts, endolymphatic-sac tumors, epididymal cystadenomas. Lifelong surveillance (annual abdominal MRI, ophthalmologic exam, plasma metanephrines). STUB pending two-Co-Lead signoff."
notes_ua: "VHL germline — драйвер von Hippel-Lindau syndrome. Довічний нагляд (щорічна МРТ черевної порожнини, офтальмологічний огляд, метанефрини плазми)."
