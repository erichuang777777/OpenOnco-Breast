notes: "RB1 germline — drives hereditary retinoblastoma (~40% of all retinoblastoma; bilateral/multifocal). Mean age at diagnosis ~1 year. Second-primary risk lifelong: osteosarcoma (especially after radiotherapy), soft-tissue sarcoma, melanoma, SCLC. Avoid external-beam radiation when feasible. Surveillance: ophthalmologic exam under anaesthesia every 1-3 months in infancy; long-term sarcoma surveillance. STUB pending two-Co-Lead signoff."
notes_ua: "RB1 germline — спадкова ретинобластома (двостороння/мультифокальна, ~1 рік). Довічний ризик вторинних пухлин (остеосаркома, м'якотканинна саркома, меланома, ДРМЛ). Уникати променевої терапії."
