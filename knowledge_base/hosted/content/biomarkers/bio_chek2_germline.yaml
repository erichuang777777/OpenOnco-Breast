notes: "CHEK2 germline — moderate-penetrance breast cancer risk (~2-3x baseline; lifetime ~20-25% in c.1100delC carriers). Less clear ovarian / colorectal signal. PARPi response weaker than BRCA/ATM. NCCN: enhanced breast screening (annual MRI from 40); no prophylactic mastectomy default. STUB pending two-Co-Lead signoff. Standalone entry complements composite BIO-ATM-CHEK2-CDK12-GERMLINE."
notes_ua: "CHEK2 germline — помірний ризик раку молочної залози (~2-3x базового рівня). NCCN: посилений скринінг (щорічна МРТ з 40р)."
