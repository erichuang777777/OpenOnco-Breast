id: BIO-HCV-RNA-QUANTITATIVE-MONITORING
names:
  preferred: "HCV RNA quantitative — viral-load monitoring during direct-acting antiviral (DAA) therapy"
  ukrainian: "HCV РНК кількісна — моніторинг вірусного навантаження під час DAA-терапії"
  english: "HCV RNA quantitative monitoring"
