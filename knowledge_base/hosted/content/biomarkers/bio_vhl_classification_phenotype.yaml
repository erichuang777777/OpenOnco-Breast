notes: >
  Composite genotype-phenotype classification for von Hippel-Lindau
  syndrome (germline VHL pathogenic variant carriers). Four canonical
  subtypes based on pheochromocytoma risk and variant class:
  • Type 1: complete-loss-of-function variants (truncating, large
    deletions, missense disrupting elongin-binding) — RCC + CNS/retinal
    hemangioblastomas + pancreatic NET/cysts WITHOUT pheochromocytoma
    (or very low pheo risk).
  • Type 2A: specific missense variants (e.g., Tyr98His) — pheo + CNS/
    retinal hemangioblastomas, LOW RCC risk.
  • Type 2B: missense variants (e.g., Arg167Trp / Arg167Gln) — pheo +
    RCC + CNS/retinal hemangioblastomas (full classical VHL spectrum).
  • Type 2C: rare missense variants (e.g., Leu188Val) — pheochromocytoma
    ONLY (no RCC, no hemangioblastomas).
  Surveillance intensity follows phenotype: ALL types get annual
  ophthalmologic exam + brain/spine MRI; Type 1 + 2B get annual abdominal
  MRI; Type 2A/2B/2C get annual plasma metanephrines (see
  BIO-METANEPHRINES-PLASMA-PHEO). Belzutifan (HIF-2α inhibitor) approved
  for VHL-associated RCC, hemangioblastoma, pNET in adults with non-
  immediately-resectable disease. Classification guides discussion with
  patient/family but does NOT reduce baseline surveillance — phenotype
  evolves over decades. STUB pending two-Co-Lead signoff.
notes_ua: >
  Композитна класифікація генотип-фенотип для синдрому фон Гіппеля-Ліндау.
  4 канонічні підтипи: Тип 1 — RCC + гемангіобластоми + пНЕТ БЕЗ
  феохромоцитоми; Тип 2A — феохромоцитома + гемангіобластоми, низький
  ризик RCC; Тип 2B — феохромоцитома + RCC + гемангіобластоми; Тип 2C —
  ЛИШЕ феохромоцитома. Інтенсивність нагляду за фенотипом. STUB pending
  two-Co-Lead signoff.
