notes: "SUFU germline — drives Gorlin-syndrome variant with markedly higher pediatric medulloblastoma risk (~33%, SHH-subtype, often <3 years) compared with PTCH1-Gorlin (~5%). Lower BCC burden than PTCH1. Other features overlap NBCCS (jaw keratocysts may be less prevalent). AVOID craniospinal radiation when feasible — drives second primaries / treatment-related BCCs. Surveillance: brain MRI every 3-4 months in infants/young children. STUB pending two-Co-Lead signoff."
notes_ua: "SUFU germline — варіант Gorlin з суттєво вищим ризиком дитячої медулобластоми (~33%, SHH). УНИКАТИ кранiospinal променевої терапії. МРТ головного мозку кожні 3-4 міс у малюків."
