notes: >
  One of three Ashkenazi Jewish (AJ) founder mutations (with BRCA1
  c.5266dupC / 5382insC and BRCA2 c.5946delT / 6174delT). Combined
  carrier frequency for the three AJ founder mutations is ~1 in 40
  (~2.5%) in unselected AJ population, vs ~1 in 400 (~0.25%) for any
  BRCA1/2 pathogenic variant in non-AJ populations. NCCN 2025 endorses
  population-wide AJ founder-panel testing (3-mutation panel) regardless
  of family history. c.68_69delAG creates a premature termination codon
  in exon 2, abolishing BRCT-mediated homologous-recombination repair —
  full BRCA1 loss-of-function phenotype. Lifetime cancer risks
  consistent with BRCA1 average: breast ~60-70%, ovarian ~40-45%,
  contralateral breast ~50% by age 70 in carriers diagnosed at age 50.
  Same surveillance and risk-reduction protocols as other BRCA1
  pathogenic variants (annual breast MRI from age 25-30, RRSO 35-40
  after childbearing). STUB pending two-Co-Lead signoff.
notes_ua: >
  Одна з трьох засновницьких мутацій ашкеназі (разом з BRCA1
  c.5266dupC та BRCA2 c.5946delT). Сумарна частота носійства трьох
  ашкеназі-засновницьких мутацій — ~1 на 40 (2.5%) у непрофільованій
  ашкеназі-популяції. NCCN 2025 підтримує популяційне тестування панелі
  з 3-х мутацій незалежно від сімейної історії. Тий же протокол нагляду,
  що й для інших патогенних варіантів BRCA1. STUB pending two-Co-Lead
  signoff.
