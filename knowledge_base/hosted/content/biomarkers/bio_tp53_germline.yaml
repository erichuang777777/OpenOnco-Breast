id: BIO-TP53-GERMLINE
names:
  preferred: "TP53 germline pathogenic variant"
  ukrainian: "TP53 germline патогенний варіант"
  english: "TP53 germline pathogenic variant"
biomarker_type: gene_mutation
mutation_details:
  gene: TP53
  gene_hugo_id: HGNC:11998
  variant_type: missense_or_truncating
  functional_impact: loss_of_function
specimen_requirements: ["Whole blood or saliva DNA"]
clinical_context: [germline_susceptibility]
applicable_in_asymptomatic: true
oncokb_skip_reason: germline_no_somatic
sources:
  - SRC-NCCN-GENETIC-FAMILIAL-BREAST-OVARIAN-2025
last_reviewed: "2026-05-18"
notes: "TP53 germline — drives Li-Fraumeni syndrome (LFS). Extremely high penetrance: lifetime cancer risk ~70% males / ~100% females. Core spectrum: sarcoma, breast (premenopausal), adrenocortical carcinoma, brain tumors, leukemia. Avoid therapeutic radiation when possible. STUB pending two-Co-Lead signoff."
notes_ua: "TP53 germline — драйвер Li-Fraumeni syndrome. Уникати терапевтичної радіації коли можливо."
