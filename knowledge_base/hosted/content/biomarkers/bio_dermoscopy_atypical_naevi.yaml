id: BIO-DERMOSCOPY-ATYPICAL-NAEVI
names:
  preferred: "Total-body dermoscopy with sequential digital monitoring"
  ukrainian: "Тотальна дерматоскопія з послідовним цифровим моніторингом"
  english: "Total-body photography + dermoscopy for melanoma surveillance"
  synonyms: ["TBP + SDDI", "total-body photography", "sequential digital dermoscopy", "FotoFinder", "atypical-mole-syndrome surveillance"]
biomarker_type: imaging
measurement:
  method: "Total-body photography baseline + sequential digital dermoscopic imaging at 3-6 mo intervals; comparison for new lesions, asymmetric change, regression. 7-point checklist / 3-point / pattern analysis for diagnostic scoring"
  units: "categorical per lesion: benign | suspicious — excise | atypical — monitor"
specimen_requirements:
  - "Standardised lighting + photographic equipment (TBP-grade)"
  - "Patient skin type / phototype documented (Fitzpatrick I-VI)"
clinical_context: [screening_surveillance]
applicable_in_asymptomatic: true
oncokb_skip_reason: imaging
sources: [SRC-NCCN-MELANOMA-2025, SRC-NCCN-SKIN-2025, SRC-ESMO-MELANOMA-2024]
last_reviewed: "2026-05-18"
notes: >
  STUB. Cornerstone surveillance for high-risk groups: ≥5 atypical naevi,
  CDKN2A/CDK4 carriers, familial atypical multiple mole melanoma syndrome
  (FAMMM), prior melanoma, organ transplant. Sequential dermoscopy reduces
  unnecessary excisions ~2× while increasing thin-melanoma detection.
  Interval: 3 mo (FAMMM/CDKN2A), 6-12 mo (other high-risk). AI-augmented
  triage (multi-spectral imaging) emerging but not standard.
