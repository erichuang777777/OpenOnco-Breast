notes: "POLE germline (exonuclease / proofreading-domain variants) — drives Polymerase-Proofreading-Associated Polyposis (PPAP). Autosomal dominant; oligopolyposis (often <100 adenomas) + early-onset CRC + endometrial cancer; reported brain tumors. Tumors are typically ultramutated (TMB > 100 mut/Mb) and may respond to immune-checkpoint inhibitors. Surveillance: colonoscopy q1-2y from late teens; consider endometrial surveillance. STUB pending two-Co-Lead signoff."
notes_ua: "POLE germline (proofreading-варіанти) — драйвер PPAP. Олігополіпоз + ранній КРР + ендометрій. Пухлини ультрамутовані (TMB > 100 mut/Mb), можуть відповідати на ICI. Колоноскопія кожні 1-2 роки з підліткового віку."
