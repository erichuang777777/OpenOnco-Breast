notes: "AXIN2 germline — drives familial colorectal cancer with oligodontia (and ectodermal-dysplasia features: sparse hair, nail dysplasia). Wnt-pathway negative regulator; loss → constitutive beta-catenin signaling. Penetrance + spectrum still being defined; reported CRC, breast, gastric. Surveillance under NCCN colonoscopic schedule for high-risk CRC carriers. STUB pending two-Co-Lead signoff."
notes_ua: "AXIN2 germline — сімейний КРР з олігодонтією (ектодермальна дисплазія). Wnt-сигнальний шлях. Спектр пухлин: КРР, шлунок, РМЗ. Колоноскопічний нагляд за NCCN."
