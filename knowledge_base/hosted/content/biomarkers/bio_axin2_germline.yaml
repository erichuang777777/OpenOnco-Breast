mutation_details:
  gene: AXIN2
  gene_hugo_id: HGNC:904
  variant_type: missense_or_truncating
  functional_impact: loss_of_function
specimen_requirements: ["Whole blood or saliva DNA"]
clinical_context: [germline_susceptibility]
