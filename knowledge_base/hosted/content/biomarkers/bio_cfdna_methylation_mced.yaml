id: BIO-CFDNA-METHYLATION-MCED
names:
  preferred: "Cell-free DNA methylation — multi-cancer early detection (MCED) — research (ESCAT III)"
  ukrainian: "Метилювання позаклітинної ДНК — мульти-онкологічне раннє виявлення (MCED) — дослідницький рівень (ESCAT III)"
  english: "cfDNA methylation MCED"
  synonyms: ["MCED", "Galleri", "GRAIL Galleri", "multi-cancer early detection", "methylation-based MCED"]
biomarker_type: composite_score
measurement:
  method: "Plasma cfDNA targeted methylation sequencing (commercial: GRAIL Galleri ~100,000 methylation regions); classifier returns binary cancer-signal-detected + cancer-signal-of-origin (CSO) tissue prediction"
  units: "categorical (signal-detected | signal-not-detected) + predicted tissue-of-origin (single or paired prediction)"
specimen_requirements:
  - "Streck cfDNA BCT tubes (proprietary preservative); plasma processed per assay protocol"
  - "Note: NOT a replacement for established single-cancer screening (mammography, colonoscopy, LDCT lung, cervical screening)"
clinical_context: [screening_surveillance]
applicable_in_asymptomatic: true
oncokb_skip_reason: tumor_agnostic
sources:
  - SRC-CIVIC
last_reviewed: "2026-05-18"
notes: >
  Multi-cancer early-detection (MCED) class — plasma cfDNA methylation
  patterns classify cancer signal + predict tissue-of-origin across
  50+ cancer types in a single blood draw. Largest published evidence:
  GRAIL PATHFINDER prospective study (Schrag et al., Lancet 2023): in
  6,621 adults ≥50, MCED signal-detection rate ~1.4%, true-positive
  cancer detection ~38% of signal-positives; CSO accuracy ~88% for the
  primary site. Klein 2021 (CCGA Substudy 3) at 99.5% specificity:
  sensitivity 51.5% across 50 cancers, 67.6% in stages I-III for
  pre-specified 12 cancer types. ESCAT III evidence tier (clinical
  trial / large prospective cohort, not yet level-1 outcome data).
  Galleri available in US as a laboratory-developed test (LDT) —
  not FDA-approved (May 2026). NHS-Galleri trial (140,000 participants,
  UK) ongoing — primary endpoint stage-shift in detected cancers
  (results expected 2026-2028). USPSTF has NOT issued an MCED
  recommendation. Critical limitations: (1) negative result does NOT
  rule out cancer (sensitivity gaps especially for early-stage); (2)
  high false-positive rate at population scale → downstream imaging
  cascade burden; (3) lead-time bias not yet quantified; (4) CSO
  ambiguity in ~10-15% of true positives requires multi-modality
  diagnostic workup. NCCN does not endorse MCED for general-population
  screening as of 2025. RESEARCH USE ONLY in this KB — entry exists
  for prevention-pipeline tracking, NOT clinical recommendation. STUB
  pending two-Co-Lead signoff.
notes_ua: >
  Мульти-онкологічне раннє виявлення (MCED) — патерни метилювання
  позаклітинної ДНК класифікують онкологічний сигнал + прогнозують
  тканину-походження для 50+ типів раку в одному заборі крові.
  Найбільші дані: GRAIL PATHFINDER (Schrag, Lancet 2023). ESCAT III
  (поки не level-1). Galleri у США — LDT; FDA-схвалення немає.
  USPSTF не рекомендує. NCCN не підтримує MCED для популяційного
  скринінгу. Запис ДЛЯ ДОСЛІДНИЦЬКОГО ВИКОРИСТАННЯ — для відстеження
  у preview-конвеєрі. STUB pending two-Co-Lead signoff.
