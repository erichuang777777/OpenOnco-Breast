last_reviewed: "2026-05-18"
notes: "RET germline — drives MEN2A, MEN2B, and Familial Medullary Thyroid Carcinoma (FMTC). Medullary thyroid carcinoma (MTC) near-100% penetrance; pheochromocytoma in MEN2A/B; primary hyperparathyroidism in MEN2A; marfanoid habitus + mucosal neuromas in MEN2B. Prophylactic thyroidectomy timing keyed to specific codon variant (ATA risk tiers). STUB pending two-Co-Lead signoff."
notes_ua: "RET germline — драйвер MEN2A, MEN2B, FMTC. Час профілактичної тиреоїдектомії визначається конкретним кодоном (ATA рівні ризику)."
