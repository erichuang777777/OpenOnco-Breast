notes: >
  STUB pending two-Clinical-Co-Lead signoff per CHARTER §6.1 dev-mode.

  Indications (OpenOnco prevention scope):

  Peutz-Jeghers syndrome (STK11 carriers):
  - Baseline MR-enterography paired with VCE (TEST-VCE-CAPSULE) at
    age 8–10
  - Surveillance q1–3y in alternation or parallel with VCE
  - MR-E adds: mass effect, intussusception risk, mesenteric
    lymphadenopathy, extra-luminal disease — features VCE
    cannot show

  Refractory celiac disease (RCD-II / EATL surveillance):
  - Indicated when symptoms persist on strict GFD ≥12 months OR
    flat villous architecture with aberrant intraepithelial-
    lymphocyte clonality on biopsy
  - MR-E identifies wall thickening, mass lesion, mesenteric
    lymphadenopathy suspicious for ulcerative jejunitis or EATL

  Crohn's disease — small-bowel cancer surveillance:
  - Long-standing ileal Crohn's with strictures has elevated
    small-bowel adenocarcinoma risk; MR-E is the primary
    imaging modality for both inflammatory activity and
    suspected neoplasia
  - Surveillance frequency tailored to individual risk; no
    standardized interval, typically q1–3y in symptomatic /
    high-burden patients

  Limitations:
  - Patient cooperation with oral enteric-contrast ingestion
    (typically 1.5–2 L over 45–60 min); challenging in young
    children — alternative is intubated enteroclysis under
    sedation
  - Gadolinium relative contraindication in eGFR <30, pregnancy
  - Motion artifact in patients unable to perform consistent
    breath-holds
  - Does NOT enable tissue acquisition — positive findings
    require enteroscopy, surgery, or PET-CT for staging

  Engineering note: referenced by v0.2-B prevention Indications
  for Peutz-Jeghers, refractory celiac disease, and Crohn's-
  long-standing small-bowel surveillance pathways. Complementary
  test entity to TEST-VCE-CAPSULE.
