id: TEST-MR-ENTEROGRAPHY
names:
  preferred: "MR-enterography of small bowel (with oral + IV contrast)"
  ukrainian: "МР-ентерографія тонкої кишки (з пероральним та в/в контрастом)"
  english: "MR-enterography"
  synonyms: ["MRE", "Small-bowel MR", "MR-enteroclysis (alternative form)"]
loinc_codes: ["79101-6"]
category: imaging
purpose: >
  Cross-sectional small-bowel imaging — mural and mesenteric view
  complementary to video capsule endoscopy (mucosal view).
  OpenOnco prevention indications: Peutz-Jeghers surveillance
  (jejunal / ileal polyp mass + intussusception risk),
  refractory celiac disease (rule out enteropathy-associated
  T-cell lymphoma — EATL), Crohn's disease cancer surveillance in
  long-standing small-bowel involvement, and complex polyposis
  syndromes with extra-luminal disease. Preferred over CT-
  enterography for surveillance use cases requiring repeated
  imaging in pediatric / young-adult populations (no ionizing
  radiation).

specimen: "Imaging procedure with oral enteric contrast (typically polyethylene-glycol-based) + IV gadolinium"
turnaround_time: "Acquisition 30–60 min; report 1–3 days"
priority_class: standard

availability_ukraine:
  state_funded: false
  typical_cost_uah: 6500.0
  typical_availability: "Major academic and private MR centers; small-bowel-protocol expertise limited to ~10–15 UA centers"
  notes: >
    Standard MR-enterography requires both an experienced
    radiologist (small-bowel motility / mural-enhancement
    interpretation) and the oral enteric-contrast protocol
    workflow. Many UA private centers offer "MR abdomen" without
    the dedicated enterography protocol — for the OpenOnco
    surveillance use case the dedicated protocol is essential.

sources:
