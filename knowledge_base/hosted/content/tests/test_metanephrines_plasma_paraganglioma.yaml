id: TEST-METANEPHRINES-PLASMA-PARAGANGLIOMA
names:
  preferred: "Plasma free metanephrines + normetanephrines (paraganglioma / pheochromocytoma screening)"
  ukrainian: "Плазмові вільні метанефрини + норметанефрини (скринінг параганліоми / феохромоцитоми)"
  english: "Plasma free metanephrines"
  synonyms: ["Plasma fractionated metanephrines", "PFM", "PHEO screen"]
loinc_codes: ["29561-8", "53204-5"]
category: lab
purpose: >
  First-line biochemical screening for pheochromocytoma (adrenal-
  medullary) and paraganglioma (extra-adrenal sympathetic /
  parasympathetic) tumors. OpenOnco prevention indications:
  hereditary paraganglioma-pheochromocytoma syndrome (SDHB / SDHC /
  SDHD / SDHAF2 / SDHA / TMEM127 / MAX carriers — annual surveillance
  from age 5–10 depending on gene), VHL (annual from age 5–10),
  MEN2A / MEN2B / FMTC (annual from age 5–10 in highest-risk codons,
  age 11+ in moderate-risk codons), NF1 (when clinical suspicion of
  pheochromocytoma — sustained or paroxysmal hypertension,
  headache, sweating, palpitations). Preferred over 24-hour
  urinary metanephrines for screening — higher sensitivity (~97%
  vs ~93%) and easier patient compliance.

specimen: "Plasma (lavender-top EDTA tube) — supine ≥30 min before phlebotomy; processed and frozen within 4 hours; LC-MS/MS preferred over immunoassay"
turnaround_time: "3–7 days at high-volume reference labs; up to 14 days at smaller centers (LC-MS/MS workflow)"
priority_class: standard

availability_ukraine:
  state_funded: false
  typical_cost_uah: 2200.0
  typical_availability: "Private reference labs (CSD, Synevo) widely; LC-MS/MS methodology limited to ~5–8 high-volume UA labs"
  notes: >
    LC-MS/MS plasma metanephrine assay is the contemporary standard
    of care; immunoassay-based plasma metanephrines have lower
    specificity and should not be used for screening of confirmed
    carriers. Pre-test patient preparation is critical: avoid
    caffeine, nicotine, strenuous exercise ≥24h; ideally supine
    seated for ≥30 min before draw; many medications (tricyclics,
    SNRIs, levodopa, sympathomimetics, MAOI) cause false elevations
    and should be reviewed pre-test.

