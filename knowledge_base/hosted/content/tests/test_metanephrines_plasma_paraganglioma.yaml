notes: >
  STUB pending two-Clinical-Co-Lead signoff per CHARTER §6.1 dev-mode.

  Surveillance regimens by syndrome (combined NCCN-NET / NCCN-Kidney
  / ATA-MEN2 / Endocrine Society):

  Hereditary paraganglioma-pheochromocytoma syndrome:
  - SDHB carriers (highest extra-adrenal + metastatic risk):
    annual plasma metanephrines from age 5–10; whole-body MRI
    + cervical / abdominal MRI alternating biennially
  - SDHD / SDHC / SDHAF2 / SDHA: annual plasma metanephrines
    from age 5–10; imaging cadence per family pattern
  - TMEM127 / MAX: annual plasma metanephrines from age 10–15

  Von Hippel-Lindau (VHL):
  - Annual plasma metanephrines from age 5
  - Paired with annual abdominal MRI (TEST-MRI-ABDOMEN-RCC) for
    adrenal + retroperitoneal screening

  MEN2A / MEN2B / FMTC (RET):
  - Annual plasma metanephrines from age 11 for moderate-risk
    codons; from age 5 for high-risk codons (M918T, C634)
  - Paired with annual cervical ultrasound + serum calcitonin
    (TEST-CALCITONIN-MTC) and PTH / ionized calcium

  NF1:
  - Symptom-driven screening (sustained / paroxysmal hypertension,
    headache, sweating, palpitations) rather than asymptomatic
    surveillance — pheochromocytoma penetrance ~1–5% in NF1

  Interpretation:
  - 2–3× upper-limit-of-normal: borderline; repeat under
    standardized conditions + clonidine-suppression test or
    imaging
  - >4× upper-limit-of-normal: highly suspicious; proceed to
    cross-sectional imaging (MDCT abdomen / pelvis with
    pheochromocytoma protocol, or MRI if pediatric / pregnant)
  - Predominantly elevated normetanephrines: extra-adrenal
    paraganglioma over adrenal pheo

  Confounders requiring repeat-under-controlled-conditions:
  - Recent stress, caffeine, nicotine, exercise
  - Tricyclic antidepressants, SNRIs, MAOI, levodopa, methyldopa,
    sympathomimetics, buspirone
  - Acute illness, sleep apnea
  - Renal failure (urinary route preferred in eGFR <30)

  Engineering note: referenced by v0.2-B prevention Indications for
  hereditary paraganglioma-pheochromocytoma syndrome, VHL, MEN2A /
  MEN2B / FMTC, NF1, and tuberous sclerosis-complex carrier
  surveillance pathways.
