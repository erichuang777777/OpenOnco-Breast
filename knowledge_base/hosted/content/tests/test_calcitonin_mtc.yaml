notes: >
  STUB pending two-Clinical-Co-Lead signoff per CHARTER §6.1 dev-mode.

  ATA-MEN2 2015 risk-tier and surveillance timing:

  Highest risk (HR) — RET M918T (MEN2B):
  - Prophylactic total thyroidectomy + central neck dissection
    within first year of life (ideally first 6 months)
  - Baseline calcitonin not required to defer surgery — surgery
    proceeds based on genotype alone

  High risk (H) — RET C634, A883F (classic MEN2A):
  - Prophylactic thyroidectomy at or before age 5
  - Annual basal calcitonin from age 3 to surgical timing
  - Rising calcitonin or trend exceeding 40 pg/mL pediatric
    threshold → earlier surgery

  Moderate risk (MOD) — other MEN2A variants (C609, C611, C618,
  C620, C630, E768D, L790F, V804L, V804M, S891A, R912P, K666E):
  - Surgery typically deferred to age >5 unless calcitonin
    elevates; annual calcitonin from age 5+ guides timing
  - Some kindreds may defer surgery into adolescence based on
    sustained-normal calcitonin trajectory

  Adult MEN2A / FMTC carrier surveillance (if no thyroidectomy or
  for residual gland monitoring):
  - Annual calcitonin
  - Annual cervical ultrasound for nodal screening
  - Annual catecholamine / metanephrine screening
    (TEST-METANEPHRINES-PLASMA-PARAGANGLIOMA) for pheochromocytoma
  - Annual ionized calcium / parathyroid screen for primary
    hyperparathyroidism

  Interpretation caveats (sex- and assay-specific reference ranges):
  - Normal range typically <10 pg/mL women, <18.2 pg/mL men
    (assay-dependent — must use assay-specific cutoffs)
  - PPI / chronic-kidney-disease / hypercalcemia / autoimmune
    thyroiditis / smoking → modest elevations <40 pg/mL
  - Calcitonin >100 pg/mL: highly suspicious MTC; >1000 pg/mL:
    correlates with extra-thyroidal / metastatic disease
  - Procalcitonin can be used as alternative when calcitonin
    assay quality limited

  Engineering note: referenced by v0.2-B prevention Indications for
  MEN2A / MEN2B / FMTC RET-carrier surveillance and prophylactic-
  thyroidectomy-timing pathways.
