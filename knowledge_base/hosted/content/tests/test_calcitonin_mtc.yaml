id: TEST-CALCITONIN-MTC
names:
  preferred: "Serum calcitonin (medullary thyroid carcinoma screening)"
  ukrainian: "Сироватковий кальцитонін (скринінг медулярного раку щитоподібної залози)"
  english: "Serum calcitonin"
  synonyms: ["Basal calcitonin", "Pentagastrin-stimulated calcitonin (historical)"]
loinc_codes: ["1992-7", "16258-5"]
category: lab
purpose: >
  Biomarker for C-cell hyperplasia and medullary thyroid carcinoma
  (MTC). Primary OpenOnco prevention indication is surveillance in
  MEN2A / MEN2B / FMTC kindreds (RET pathogenic-variant carriers):
  baseline calcitonin annually from infancy / early childhood
  guides timing of prophylactic total thyroidectomy. Threshold-based
  decision rules per ATA-MTC 2015: prophylactic thyroidectomy
  before age 5 for MEN2A high-risk codons (C634), at age 1 or
  earlier for MEN2B (highest-risk M918T). Secondary use case:
  postoperative MTC monitoring (not the prevention scope here).

specimen: "Serum (gold-top SST tube) — fasting preferred; assay-stable when frozen; collect at consistent time of day"
turnaround_time: "1–3 days at high-volume reference labs; up to 7 days at smaller centers"
priority_class: standard

availability_ukraine:
  state_funded: false
  typical_cost_uah: 800.0
  typical_availability: "Private reference labs widely; major endocrinology centers offer in-house testing"
  notes: >
    Modern chemiluminescent immunoassay (CLIA) calcitonin is available
    at CSD Lab, Synevo, Diala and other major UA reference labs.
    Pre-test counseling: smoking, PPI use, autoimmune thyroiditis,
    and pulmonary / pancreatic NETs all cause modest non-MTC
    elevations; reference range is sex-specific (men higher).
    Provocation tests (calcium-stimulated or pentagastrin-stimulated)
    are historical and not part of contemporary first-line workup.

