id: TEST-GERMLINE-MULTI-GENE-PANEL
names:
  preferred: "Germline multi-gene hereditary cancer panel (NGS)"
  ukrainian: "Гермінальна мульти-генна онко-панель (NGS)"
loinc_codes: ["81247-9", "81296-6"]  # Cancer-related, full-panel germline-NGS LOINC codes
category: genomic
purpose: >
  Comprehensive germline pathogenic-variant screening for hereditary
  cancer susceptibility across the major hereditary cancer syndromes —
  drives index-patient diagnosis, family cascade testing, and
  prevention / surveillance Indication firing in the v0.2-B prevention
  workstream.

specimen: "Peripheral whole blood (EDTA tube) or saliva (Oragene-style kit) — blood preferred for minor patients and post-transplant patients"
turnaround_time: "14–28 days from accession to reported result; reflex confirmatory orthogonal assay (Sanger or MLPA for CNV) may extend to 35–42 days"
priority_class: standard

availability_ukraine:
  state_funded: false
  typical_cost_uah: null
  typical_availability: "Private molecular-genetics labs; cost-bearing patient unless covered by oncologist-led research program or charitable funding"
  notes: >
    No state-funded germline multi-gene panel is reimbursed under NSZU
    as of 2026-05; pre-test genetic counseling is required per
    international standards but UA-side counseling capacity is limited.
    Add to prevention-pathway funding-tracker queue.

lab_availability_ua:
  - lab: "CSD Lab"
    product_code: "M089"
    product_name: "MyGene HRR — NGS-панель спадкових мутацій у 32 генах"
    url: "https://www.csdlab.ua/analyzes/molekulyarno-genetichni-doslidzhennya-onkologichni"
    confirmation: "product_code_verified"
    coverage_notes: >
      32-gene HRR-focused panel (BRCA1/2 + 30 additional genes
      relevant to hereditary breast / ovarian / prostate / pancreatic
      cancer). Cross-references TEST-GERMLINE-BRCA-PANEL. Does NOT
      cover full Lynch (MMR), Li-Fraumeni (TP53 isolated), polyposis
      (APC / MUTYH / STK11 / PTEN / SMAD4 / BMPR1A), VHL, MEN2,
      paraganglioma (SDHx). Patient profiles flagging multiple
      syndromes need broader cancer-panel referral (typically
      international labs — Invitae / Ambry / GeneDx / Centogene).
    last_verified: "2026-05-01"

