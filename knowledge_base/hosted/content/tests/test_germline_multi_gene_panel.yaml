notes: >
  STUB pending two-Clinical-Co-Lead signoff per CHARTER §6.1 dev-mode.
  Multi-gene hereditary cancer germline panel — NGS-based sequencing
  of 30–100+ genes implicated in hereditary cancer syndromes. Used
  index-patient testing and family cascade screening.

  Typical gene coverage (provider-dependent; verify per product):
  - Lynch syndrome MMR: MLH1, MSH2, MSH6, PMS2, EPCAM
  - Hereditary breast / ovarian: BRCA1, BRCA2, PALB2, CHEK2, ATM
  - HRR-extended: RAD51C, RAD51D, BRIP1, BARD1
  - Li-Fraumeni: TP53
  - Polyposis: APC, MUTYH, STK11 (Peutz-Jeghers), PTEN (Cowden),
    SMAD4, BMPR1A (juvenile polyposis), GREM1
  - Hereditary diffuse gastric: CDH1
  - Renal cancer: VHL, FH (HLRCC), FLCN (Birt-Hogg-Dubé), MET
  - Paraganglioma / pheochromocytoma: SDHA, SDHB, SDHC, SDHD,
    SDHAF2, TMEM127, MAX, RET (MEN2), NF1 (NF1 syndrome), MEN1
  - Others (less common but standard on broader panels): CDKN2A
    (melanoma / pancreatic), POLE / POLD1 (polymerase proofreading-
    associated polyposis), BAP1 (mesothelioma / uveal melanoma)

  Result reporting follows the ACMG / AMP framework: pathogenic /
  likely-pathogenic / variant-of-uncertain-significance (VUS) /
  likely-benign / benign. Only P / LP variants drive clinical action;
  VUS results require periodic reanalysis as evidence accumulates.

  Pre-test genetic counseling is REQUIRED (NCCN, ASCO, ACMG, NSGC).
  Post-test counseling required for any P / LP / VUS finding.
  Cascade testing — single-site testing for the family-specific variant
  — is the canonical follow-up for first-degree relatives once a
  proband variant is identified.

  Engineering note: this Test entity is referenced by v0.2-B prevention
  Indications across multiple syndromes (FAP, Lynch, BRCA / HBOC,
  Li-Fraumeni, VHL, HLRCC). The lab_availability_ua block points to
  CSD's HRR-focused panel as the most accessible UA option; broader
  syndromic coverage typically requires international referral.
