notes: >
  STUB — Wave A+B germline expansion. Linked Indication: IND-LYNCH-CARRIER-
  SURVEILLANCE used as closest-fit (POLE-specific Indication does not yet
  exist; PPAP overlaps Lynch surveillance for CRC + endometrial). Note that
  IND-ENDOMETRIAL-STAGE-I-POLE-OBSERVATION exists for the somatic-POLE
  endometrial-treatment context — distinct from germline-carrier
  surveillance handled here. Two-Clinical-Co-Lead signoff queued. Variant
  classification matters: only exonuclease-domain variants (Pro286Arg,
  Val411Leu, Ser297Phe) drive PPAP — non-exonuclease variants are usually
  uncertain significance.
notes_ua: >
  STUB — Wave A+B розширення. Прив'язка до IND-LYNCH-CARRIER-SURVEILLANCE.
  Існує IND-ENDOMETRIAL-STAGE-I-POLE-OBSERVATION для соматичного контексту
  лікування — відрізняти від нагляду носія тут. Класифікація варіанта
  критична: тільки екзонуклеазний домен (Pro286Arg, Val411Leu, Ser297Phe)
  спричиняє PPAP.
