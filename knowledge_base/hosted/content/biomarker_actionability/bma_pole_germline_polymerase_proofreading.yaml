  - "EGD q3y from age 30"
  - "endometrial sampling + TVUS q1-2y from age 30-35 (women)"
  - "annual urinalysis from age 30"
  - "for POLE-mutant advanced CRC / endometrial: pembrolizumab 200 mg q3w — high response rate in ultramutator setting (NCCN Category 1 for TMB-H or MSI-H)"
  - "cascade testing to first-degree relatives; specific to exonuclease-domain variants (Pro286Arg, Val411Leu most common)"
