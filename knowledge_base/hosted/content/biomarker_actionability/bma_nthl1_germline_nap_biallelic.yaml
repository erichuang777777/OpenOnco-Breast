notes: >
  STUB — Wave A+B germline expansion. Linked Indication: IND-LYNCH-CARRIER-
  SURVEILLANCE used as closest-fit multi-organ surveillance template (no
  NAP-specific Indication exists yet). Two-Clinical-Co-Lead signoff queued.
  Critical: only biallelic NTHL1 carriers enter this protocol; monoallelic
  heterozygotes do not (autosomal-recessive). Partner-carrier testing for
  cascade reproductive counseling. Tumor mutational signature SBS30 in a
  CRC without explicit germline result is a strong NTHL1 case-finding
  signal.
notes_ua: >
  STUB — Wave A+B розширення. Прив'язка до IND-LYNCH-CARRIER-SURVEILLANCE.
  Тільки біалельні носії NTHL1 входять у протокол; моноалельні гетерозиготи —
  ні (аутосомно-рецесивно). Каскадне тестування включає партнера.
  Сигнатура SBS30 у КРР без герміногенного результату — сильний сигнал для
  пошуку NTHL1.
