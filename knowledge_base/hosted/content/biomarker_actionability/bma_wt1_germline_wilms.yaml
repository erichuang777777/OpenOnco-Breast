notes: >
  STUB — Wave A+B germline expansion. Linked Indication: none (no WT1-
  specific Indication exists yet). Two-Clinical-Co-Lead signoff queued.
  Surveillance is age-bounded: cadence drops markedly after age 7-8 when
  Wilms incidence falls. Variant location largely predicts syndrome
  subtype: contiguous-gene deletions → WAGR; zinc-finger missense → Denys-
  Drash; intron-9 splice variants → Frasier. Other 11p13 contiguous-gene
  deletion phenotypes (e.g. simultaneous involvement of PAX6) explain
  aniridia and warrant ophthalmology follow-up.
notes_ua: >
  STUB — Wave A+B розширення. Indication: відсутня. Нагляд обмежений віком:
  частота різко падає після 7-8 років. Локалізація варіанта прогнозує
  підтип: контигуозна делеція → WAGR; zinc-finger missense → Denys-Drash;
  intron-9 splice → Frasier. Аніридія при WAGR пов'язана з делецією PAX6 —
  офтальмологічний follow-up.
