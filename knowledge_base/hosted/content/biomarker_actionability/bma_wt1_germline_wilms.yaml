id: BMA-WT1-GERMLINE-WILMS
biomarker_id: BIO-WT1-GERMLINE
variant_qualifier: WT1 germline pathogenic (WAGR / Denys-Drash / Frasier syndromes)
disease_id: DIS-WILMS
escat_tier: IIA
evidence_summary: >
  WT1 germline pathogenic variants drive a spectrum of pediatric kidney
  predispositions: WAGR syndrome (11p13 contiguous-gene deletion — Wilms
  tumor, aniridia, genitourinary anomalies, range of intellectual
  disability; Wilms risk ~30-50%), Denys-Drash syndrome (missense in zinc-
  finger domain — pseudohermaphroditism + diffuse mesangial sclerosis +
  Wilms tumor; risk ~50-90%), and Frasier syndrome (intron-9 splice
  variants — 46,XY gonadal dysgenesis + focal segmental glomerulosclerosis;
  gonadoblastoma risk). Confirmed-carrier surveillance protocol (per
  International Society of Paediatric Oncology / SIOP-RTSG + COG Renal
  Tumor Committee Consensus / Kalish et al. 2017): renal ultrasound every
  3 months from diagnosis through age 7-8 (Wilms incidence peaks before
  age 5 and falls steeply after age 7), urinalysis at each visit, blood
  pressure monitoring. Multi-disciplinary involvement: pediatric oncology
  + nephrology (renal function + proteinuria) + endocrinology (gonadal
  dysgenesis management) + genetics. Prophylactic gonadectomy is
  recommended in Frasier syndrome to prevent gonadoblastoma. Surveillance
  duration may extend in Denys-Drash given higher Wilms risk and
  bilateral disease frequency. ESCAT IIA.
evidence_summary_ua: >
  Герміногенні патогенні варіанти WT1 спричиняють спектр педіатричних
  ниркових схильностей: WAGR (делеція 11p13 — Wilms + аніридія + GU-аномалії
  + інтелектуальні порушення; ризик Wilms ~30-50%), Denys-Drash
  (missense у zinc-finger — псевдогермафродитизм + дифузний мезангіальний
  склероз + Wilms; ризик ~50-90%), Frasier (інтрон-9 splice — 46,XY
  гонадальна дисгенезія + FSGS; гонадобластома). Протокол нагляду: УЗД
  нирок кожні 3 міс до 7-8 років (пік Wilms до 5 років, різко падає
  після 7), аналіз сечі при кожному візиті, контроль АТ. MDT: педіатрична
  онкологія + нефрологія + ендокринологія + генетика. Профілактична
  гонадектомія при Frasier — для попередження гонадобластоми. ESCAT IIA.
