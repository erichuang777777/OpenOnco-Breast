indications: []
notes: |
  STUB pending two-Co-Lead signoff. No post-treatment CRC surveillance
  Indication entity exists yet that ingests ctDNA-MRD status as a trigger
  (closest: future IND-CRC-POST-RESECTION-CTDNA-MRD-MONITORING). Until
  authored, indications: [] is intentional.

  Clinical use today: post-curative-resection serial draws at landmark
  (week 4-6) + every 3-6 months for 2-3 years. MRD-positive → multidisciplinary
  imaging re-evaluation; MRD-negative low-risk stage II → eligibility for
  chemo de-escalation per DYNAMIC paradigm (still trial-protocoled in most
  institutions). Engine must not auto-recommend adjuvant chemotherapy on
  ctDNA-MRD alone outside trial context — CHARTER §8.3.
