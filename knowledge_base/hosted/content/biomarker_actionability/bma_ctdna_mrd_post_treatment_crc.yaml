id: BMA-CTDNA-MRD-POST-TREATMENT-CRC
biomarker_id: BIO-CTDNA-MRD-POST-TREATMENT
variant_qualifier: ctDNA minimal residual disease — post-resection / post-adjuvant CRC
disease_id: DIS-CRC
escat_tier: IIIA
evidence_summary: >
  Post-resection ctDNA-MRD positivity in stage II/III colorectal cancer
  identifies patients at very high recurrence risk (DYNAMIC trial — Tie
  2022; GALAXY/CIRCULATE-Japan — Kotani 2023). Persistently negative ctDNA
  in stage II low-risk patients allowed adjuvant-chemotherapy de-escalation
  in DYNAMIC without an OS detriment. ctDNA-MRD-guided escalation
  (post-positive intensification) is being tested prospectively (BESPOKE,
  COBRA, CIRCULATE-US, ALTAIR). NCCN Colon 2025 acknowledges ctDNA-MRD as
  emerging/optional; not yet a category-1 trigger. ESCAT IIIA — evidence
  base substantial but not yet level-A actionability.
regulatory_approval:
  fda:
  - Signatera — Breakthrough Designation; Medicare coverage for CRC MRD
    (LCD L38779)
  - Guardant Reveal — Medicare coverage for CRC MRD
