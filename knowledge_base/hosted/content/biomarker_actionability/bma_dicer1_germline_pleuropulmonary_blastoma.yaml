recommended_combinations:
  - "International PPB Registry consultation on first PPB suspicion (resection + adjuvant chemotherapy protocol)"
  - "fertility-sparing oophorectomy for unilateral Sertoli-Leydig cell tumor in young women"
  - "thyroidectomy decision-making per multinodular goiter / nodule risk; total thyroidectomy with risk-reducing intent debated"
  - "lifestyle: smoking avoidance critical (synergistic lung-tumor risk in DICER1 carriers)"
  - "DICER1 surveillance per International Consensus (Stewart et al., Clin Cancer Res 2018; AACR Pediatric Working Group 2017)"
