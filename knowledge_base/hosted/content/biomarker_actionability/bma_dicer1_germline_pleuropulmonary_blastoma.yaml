id: BMA-DICER1-GERMLINE-PLEUROPULMONARY-BLASTOMA
biomarker_id: BIO-DICER1-GERMLINE
variant_qualifier: DICER1 germline pathogenic (RNase IIIb domain hotspot or LoF)
disease_id: DIS-OVARIAN
escat_tier: IIA
evidence_summary: >
  DICER1 germline pathogenic variants cause DICER1 tumor predisposition
  syndrome — broad spectrum centered on pleuropulmonary blastoma (PPB) in
  early childhood, ovarian Sertoli-Leydig cell tumor in adolescence /
  young-adult females, multinodular goiter + differentiated thyroid cancer,
  cystic nephroma, embryonal rhabdomyosarcoma (cervix / bladder / kidney),
  pineoblastoma, and pituitary blastoma. Confirmed-carrier surveillance
  protocol (per International PPB Registry Consensus / Stewart et al. 2019
  / DICER1 Cancer Predisposition Surveillance Statement): chest CT (low-dose)
  at age 3-6 months + 2.5 years + 8 years (PPB peak incidence < 6 years),
  chest X-ray q6mo to age 8 then annually to age 12, abdominal/pelvic US
  q6-12mo from infancy through age 8 then annual through adolescence,
  thyroid US q3y starting age 8, gynecologic exam + transabdominal pelvic
  US annual from age 8-10 (Sertoli-Leydig). Symptom-directed brain MRI for
  pineoblastoma / pituitary blastoma concern. Smoking avoidance is critical
  (synergistic lung-tumor risk). ESCAT IIA.
evidence_summary_ua: >
  Герміногенні патогенні варіанти DICER1 спричиняють синдром DICER1: PPB у
  ранньому дитинстві, Sertoli-Leydig пухлини яєчників у підлітків/жінок,
  мультинодулярний зоб + диференційований рак щитоподібної залози, кістозна
  нефрома, ембріональні рабдоміосаркоми, пінеобластома, гіпофізарна
  бластома. Протокол нагляду носія: низькодозова КТ грудної клітки у 3-6 міс
  + 2.5 років + 8 років (PPB <6 років), рентгенограма грудної клітки q6мо
  до 8 років, УЗД органів черевної порожнини/малого таза q6-12 міс,
  УЗД щитоподібної залози q3 роки з 8 років, гінекологічний огляд + УЗД
  з 8-10 років. Уникати куріння (синергічний ризик). ESCAT IIA.
