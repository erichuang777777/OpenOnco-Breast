actionability_review_required: true
notes: >
  STUB — Wave A+B germline expansion. Linked Indication: none (no DICER1-
  specific surveillance Indication exists yet). Two-Clinical-Co-Lead signoff
  queued. Disease anchor uses DIS-OVARIAN (Sertoli-Leydig); PPB lacks a
  Disease entity. Variant biology: pathognomonic dual-hit pattern with
  germline LoF (truncating/splice) + somatic missense in RNase IIIb hotspot
  (codons E1705, D1709, G1809, D1810, E1813) inside tumor — tumor sequencing
  alone misses the germline allele.
notes_ua: >
  STUB — Wave A+B розширення. Прив'язка до DIS-OVARIAN (Sertoli-Leydig);
  Disease-сутності PPB немає. Біологія варіанта: подвійний хіт — герміногенна
  LoF + соматична missense у hotspot RNase IIIb (E1705/D1709/G1809/D1810/
  E1813); пошук лише у пухлині не виявить герміногенної алелі.
