notes: >
  STUB — Wave A+B germline expansion. Linked Indication: IND-LYNCH-CARRIER-
  SURVEILLANCE used as closest-fit surveillance template (Lynch-like
  cadence, no AXIN2-specific Indication exists yet). Two-Clinical-Co-Lead
  signoff queued. AXIN2 syndrome is rare (~25 families reported) — penetrance
  + cancer spectrum estimates remain provisional; treat surveillance as
  attenuated-FAP / Lynch-overlap pragmatic protocol pending more data.
