  як найближчого шаблону (AXIN2-специфічної Indication немає). Синдром
  AXIN2 рідкісний (~25 родин у літературі); оцінки пенетрантності
  попередні; нагляд як прагматичний протокол attenuated-FAP / Lynch overlap.
