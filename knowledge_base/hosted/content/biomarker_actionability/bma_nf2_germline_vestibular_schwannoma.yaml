id: BMA-NF2-GERMLINE-VESTIBULAR-SCHWANNOMA
biomarker_id: BIO-NF2-GERMLINE
variant_qualifier: NF2 germline pathogenic (merlin/schwannomin loss-of-function)
disease_id: DIS-MENINGIOMA
escat_tier: IIA
evidence_summary: >
  NF2 germline pathogenic variants drive Neurofibromatosis Type 2 (NF2 / NF2-
  related schwannomatosis) — characterized by bilateral vestibular schwannomas,
  meningiomas (often multiple), spinal schwannomas, ependymomas, and juvenile
  posterior subcapsular cataract. Confirmed-carrier surveillance protocol (per
  NCCN CNS / Manchester NF2 Consensus): brain MRI with contrast (thin slices
  through IAC) starting at age 10-12 (earlier if symptomatic) q1-2y for
  vestibular schwannoma and intracranial meningioma, whole-spine MRI q2-3y
  for spinal schwannomas and meningiomas, annual neurological exam, annual
  audiology (pure-tone + speech discrimination + ABR), ophthalmology exam
  q1-2y. Bevacizumab is active for growing or symptomatic vestibular
  schwannoma (hearing preservation / volume reduction in ~40-60% per Plotkin
  et al.) — surveillance-triggered, not prophylactic. Surgery + radiosurgery
  remain mainstays for accessible lesions; radiosurgery use is cautious due
  to malignant transformation risk in NF2. ESCAT IIA.
evidence_summary_ua: >
  Герміногенні патогенні варіанти NF2 — драйвер нейрофіброматозу 2 типу
  (двосторонні вестибулярні шваноми, множинні менінгіоми, спінальні шваноми,
  епендимоми, ювенільні катаракти). Протокол нагляду носія: МРТ головного
  мозку з контрастом (тонкі зрізи через IAC) з 10-12 років q1-2 роки, МРТ
  всього хребта q2-3 роки, аудіологія + неврологічний огляд щорічно. При
  прогресуючій шваномі — бевацизумаб активний у ~40-60% (Plotkin); хірургія
  + radiosurgery — основа лікування доступних уражень; radiosurgery
  обережно (ризик малігнізації). ESCAT IIA.
regulatory_approval:
