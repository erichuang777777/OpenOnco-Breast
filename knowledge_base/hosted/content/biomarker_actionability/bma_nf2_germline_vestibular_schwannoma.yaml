actionability_review_required: true
notes: >
  STUB — Wave A+B germline expansion. Linked Indication: none (no
  NF2-specific Indication entity exists yet). Two-Clinical-Co-Lead signoff
  queued. Disease anchor uses DIS-MENINGIOMA as the most clinically
  relevant tumor in the spectrum; vestibular schwannoma is the pathognomonic
  feature but lacks a Disease entity. Mosaic NF2 (somatic mosaicism, ~25-33%
  of cases) requires deep sequencing of tumor + blood for diagnosis.
notes_ua: >
  STUB — Wave A+B розширення. Прив'язка до DIS-MENINGIOMA як найклінічніше
  значущої пухлини; вестибулярна шванома — патогномонічний прояв, але
  Disease-сутності для неї немає. Мозаїчний NF2 (~25-33%) — потребує
  глибокого секвенування пухлини + крові.
