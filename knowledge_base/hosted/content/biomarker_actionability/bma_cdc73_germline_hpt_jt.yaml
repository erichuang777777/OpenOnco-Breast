recommended_combinations:
  - "annual serum calcium + PTH + neck exam from age 5-10"
  - "panoramic radiograph or jaw CT periodically from age 10 (ossifying fibroma)"
  - "renal imaging (US ± MRI) every 5 years"
  - "pelvic imaging in women per uterine-tumor risk"
  - "en-bloc parathyroidectomy + ipsilateral thyroid lobectomy at first parathyroid surgery (avoid focused minimally-invasive parathyroidectomy in CDC73 carriers — high carcinoma + recurrence risk)"
  - "cinacalcet considered for medical control of hypercalcemia in unresectable parathyroid carcinoma"
  - "denosumab for hypercalcemia of parathyroid carcinoma refractory to other measures"
contraindicated_monotherapy:
  - "focused minimally-invasive parathyroidectomy as default in CDC73 carriers — preferred approach is en-bloc resection with ipsilateral thyroidectomy given carcinoma risk"
