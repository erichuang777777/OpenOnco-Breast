notes: >
  STUB — Wave A+B germline expansion. Linked Indication: none (no HPT-JT-
  specific Indication exists yet). Two-Clinical-Co-Lead signoff queued. The
  parent biomarker entity uses SRC-NCCN-BCELL-2025 as a placeholder source
  (apparent mis-anchor in BIO-CDC73-GERMLINE); this BMA uses SRC-NCCN-
  THYROID-2025 + SRC-ENDOCRINE-SOCIETY-MEN-2023 as more clinically
  appropriate. CDC73 inactivation also occurs somatically in a high fraction
  of sporadic parathyroid carcinomas — a sporadic parathyroid carcinoma
  case should prompt CDC73 germline testing per current guidelines.
notes_ua: >
  STUB — Wave A+B розширення. Indication: відсутня. Батьківський біомаркер
  BIO-CDC73-GERMLINE містить SRC-NCCN-BCELL-2025 як placeholder (хибна
  прив'язка); тут використано SRC-NCCN-THYROID-2025 + SRC-ENDOCRINE-SOCIETY-
  MEN-2023 як більш клінічно адекватні. Соматична інактивація CDC73 —
  у значній частці спорадичних паратиреоїдних карцином; випадок такого
  спорадичного раку — показання до герміногенного тестування CDC73.
