id: BMA-CDC73-GERMLINE-HPT-JT
biomarker_id: BIO-CDC73-GERMLINE
variant_qualifier: CDC73 (HRPT2) germline pathogenic (Hyperparathyroidism–Jaw Tumor syndrome)
disease_id: DIS-PARATHYROID-CARCINOMA
escat_tier: IIA
evidence_summary: >
  CDC73 (HRPT2) germline pathogenic variants drive Hyperparathyroidism–Jaw
  Tumor (HPT-JT) syndrome — primary hyperparathyroidism (often single-gland
  adenoma but with ~15% lifetime parathyroid carcinoma risk, much higher
  than sporadic PHPT where carcinoma is <1%), ossifying fibromas of mandible/
  maxilla, uterine tumors (adenofibroma, adenomyomatous polyps, carcinoma),
  renal cysts, and Wilms-like renal tumors. Familial isolated
  hyperparathyroidism (FIHP) is an overlapping presentation with attenuated
  extra-parathyroid features. Confirmed-carrier surveillance protocol (per
  Endocrine Society Hereditary Endocrine Tumor Guideline + Marx et al.):
  annual serum calcium + parathyroid hormone (PTH) + neck physical exam
  starting age 5-10; jaw imaging (panoramic / CT) periodically from age 10
  for ossifying fibroma; renal imaging (US ± MRI) every 5 years; pelvic
  imaging in women per uterine-tumor concern. On parathyroid surgery in
  HPT-JT carriers, en-bloc resection with thyroidectomy + lifelong follow-up
  is preferred over minimally invasive parathyroidectomy due to elevated
  carcinoma risk and recurrence pattern. ESCAT IIA.
evidence_summary_ua: >
  Герміногенні патогенні варіанти CDC73 (HRPT2) — драйвер синдрому HPT-JT:
  первинний гіперпаратиреоз (часто single-gland adenoma, але з ~15%
  довічним ризиком паратиреоїдної карциноми, на відміну від <1% при
  спорадичному PHPT), оссифікуючі фіброми щелеп, маткові пухлини
  (аденофіброма, аденоміоматозні поліпи, карцинома), ниркові кісти,
  Wilms-подібні пухлини. Familial isolated hyperparathyroidism — overlap.
  Протокол нагляду: щорічно — сироватковий кальцій + ПТГ + огляд шиї з 5-10
  років; OPG/CT щелеп періодично з 10 років; УЗД нирок q5 років; pelvic
  imaging у жінок. При хірургії носія HPT-JT — en-bloc резекція з
  тиреоїдектомією та довічним follow-up через підвищений ризик карциноми.
  ESCAT IIA.
