notes: >
  STUB — Wave A+B germline expansion. Linked Indication: IND-LYNCH-CARRIER-
  SURVEILLANCE used as closest-fit; no POLD1-specific Indication exists.
  Two-Clinical-Co-Lead signoff queued. Variant classification: only
  exonuclease-domain variants (Ser478Asn, Pro327Leu, Leu474Pro most common)
  drive PPAP. Endometrial-cancer risk in POLD1 carriers appears higher than
  POLE — supports earlier / denser endometrial surveillance + low-threshold
  risk-reducing surgery discussion at completion of childbearing.
notes_ua: >
  STUB — Wave A+B розширення. Прив'язка до IND-LYNCH-CARRIER-SURVEILLANCE.
  POLD1-специфічної Indication немає. Класифікація варіанта: лише
  екзонуклеазний домен (Ser478Asn, Pro327Leu, Leu474Pro). Ендометріальний
  ризик у носіїв POLD1 вищий, ніж POLE — підтримує більш ранній нагляд +
  обговорення risk-reducing хірургії після завершення дітородного періоду.
