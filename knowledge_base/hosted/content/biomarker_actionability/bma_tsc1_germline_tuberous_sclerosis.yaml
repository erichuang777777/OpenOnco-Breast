actionability_review_required: true
notes: >
  STUB — Wave A+B germline expansion. Linked Indication: none (no
  TSC-specific Indication entity exists yet; surveillance triggered via
  RF / Algorithm layer). Two-Clinical-Co-Lead signoff queued. mTOR
  inhibitor activity is well-established (EXIST-1/2/3 trials) — TSC1 and
  TSC2 are functionally equivalent for treatment indication; TSC2 carriers
  tend to have more severe phenotype but the same surveillance/treatment
  protocol applies.
notes_ua: >
  STUB — Wave A+B розширення герміногенних маркерів. Пов'язана Indication
  відсутня (TSC-специфічної Indication-сутності ще немає; нагляд через
  RF / Algorithm шар). Два підписи Clinical Co-Lead — у черзі.
