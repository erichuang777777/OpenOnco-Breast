actionability_review_required: true
notes: >
  STUB — Wave A+B germline expansion. Linked Indication: none (no
  TSC-specific Indication entity exists yet). Two-Clinical-Co-Lead signoff
  queued. TSC2 is functionally interchangeable with TSC1 for treatment
  selection (both upstream mTOR pathway), but TSC2 carriers warrant earlier
  surveillance entry (renal MRI from infancy) and screening for PKD1
  contiguous-gene deletion.
notes_ua: >
  STUB — Wave A+B розширення герміногенних маркерів. Пов'язана Indication
  відсутня. TSC2 функціонально аналогічний TSC1 для вибору терапії, але
  носії TSC2 потребують ранішого старту нагляду + скринінгу на контигуозну
  делецію PKD1.
