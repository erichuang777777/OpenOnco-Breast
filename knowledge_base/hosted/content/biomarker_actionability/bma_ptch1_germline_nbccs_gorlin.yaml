actionability_review_required: true
notes: >
  STUB — Wave A+B germline expansion. Linked Indication: none (no Gorlin/
  NBCCS-specific Indication exists yet). Two-Clinical-Co-Lead signoff queued.
  PTCH1 carriers face the BCC-treatment paradox: surgical excision is gold
  standard but cumulative scarring + functional impairment make Hedgehog-
  pathway inhibitors attractive for diffuse disease — vismodegib drug-holiday
  protocols (3 mo on / 3 mo off) attempt to balance efficacy with muscle
  cramps, alopecia, dysgeusia, weight loss. SUFU germline (BMA-SUFU-GERMLINE-
  MEDULLOBLASTOMA) is the alternate NBCCS-like locus.
notes_ua: >
  STUB — Wave A+B розширення. Indication: відсутня. Парадокс лікування БКР:
  хірургічне видалення — gold standard, але кумулятивне рубцювання робить
  Hh-інгібітори привабливими для дифузних уражень; протоколи з drug-holiday
  (3 міс прийому / 3 міс пауза) балансують ефективність із побічними
  ефектами (м'язові спазми, алопеція, дисгевзія).
