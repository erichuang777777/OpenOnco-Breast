notes: >
  STUB — Wave A+B germline expansion. Linked Indication: IND-LYNCH-CARRIER-
  SURVEILLANCE used as closest-fit Lynch-like template (no MSH3-specific
  Indication exists yet). Two-Clinical-Co-Lead signoff queued. Critical:
  MSH3-deficient tumors exhibit EMAST not classical MSI-H — standard MSI
  assays may miss them; this matters both for predisposition diagnosis
  and for potential pembrolizumab eligibility in advanced disease. MSH3
  syndrome is rare; published cohorts small (<25 families); penetrance
  estimates provisional.
notes_ua: >
  STUB — Wave A+B розширення. Прив'язка до IND-LYNCH-CARRIER-SURVEILLANCE.
  Критично: MSH3-дефіцитні пухлини мають EMAST, не класичний MSI-H —
  стандартні MSI-аналізи можуть їх не виявити; це важливо для діагностики
  схильності і для відбору пембролізумабу при поширених стадіях.
