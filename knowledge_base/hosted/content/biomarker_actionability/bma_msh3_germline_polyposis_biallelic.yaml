recommended_combinations:
  - "colonoscopy q1-2y from age 25-30 with polypectomy (adenomas + serrated lesions)"
  - "EGD q3-5y from age 30"
  - "endometrial sampling + TVUS in women per family-history risk profile"
  - "use NGS-based MSI assay or tetranucleotide-repeat assay if MSH3-deficiency suspected (standard MSI panels miss EMAST)"
  - "partner-carrier reproductive counseling (autosomal-recessive)"
