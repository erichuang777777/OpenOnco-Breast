id: BMA-MSH3-GERMLINE-POLYPOSIS-BIALLELIC
biomarker_id: BIO-MSH3-GERMLINE
variant_qualifier: MSH3 germline biallelic pathogenic (MSH3-associated polyposis)
disease_id: DIS-CRC
escat_tier: IIA
evidence_summary: >
  MSH3 germline biallelic pathogenic variants cause MSH3-associated polyposis
  (Adam et al. 2016) — autosomal-recessive, attenuated adenomatous and
  serrated polyposis with elevated colorectal-cancer risk. Tumors show
  elevated microsatellite instability at di- and tetra-nucleotide repeats
  (EMAST — elevated microsatellite alterations at selected tetranucleotide
  repeats) rather than classical mono-/dinucleotide MSI-H, so standard
  MSI-H IHC and PCR panels may MISS MSH3-deficient tumors. Phenotype:
  CRC, gastroduodenal polyps, possibly other Lynch-spectrum tumors.
  Confirmed-carrier (biallelic) surveillance protocol follows attenuated
  polyposis / Lynch-like template: colonoscopy q1-2y from age 25-30 with
  polypectomy of all adenomas + serrated lesions, EGD q3-5y from age 30,
  consider endometrial sampling + TVUS in women per family-history context.
  Monoallelic (heterozygous) MSH3 carriers are not currently risk-elevated.
  ESCAT IIA.
evidence_summary_ua: >
  Біалельні герміногенні патогенні варіанти MSH3 спричиняють MSH3-асоційований
  поліпоз (Adam et al. 2016) — аутосомно-рецесивний атенюйований аденоматозний
  і serrated поліпоз з підвищеним ризиком КРР. Пухлини мають EMAST (нестабільність
  на ди- та тетра-нуклеотидних повторах), а не класичний MSI-H — стандартні
  IHC і PCR-панелі можуть НЕ виявити MSH3-дефіцитну пухлину. Фенотип: КРР,
  гастродуоденальні поліпи, ймовірно інші пухлини Lynch-спектру. Протокол
  нагляду біалельного носія: колоноскопія q1-2 роки з 25-30; ЕГДС q3-5 роки з 30;
  ендометріальна біопсія за сімейним контекстом. Моноалельні гетерозиготи —
  без підвищеного ризику. ESCAT IIA.
