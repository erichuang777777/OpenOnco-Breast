actionability_review_required: true
notes: >
  STUB — Wave A+B germline expansion. Linked Indication: none (no Bloom-
  specific Indication exists yet). Two-Clinical-Co-Lead signoff queued.
  Critical: only biallelic carriers face the Bloom-phenotype cancer risk.
  Heterozygous BLM (including BLM-Ash Ashkenazi founder) — at most modest
  elevation; not currently a routine surveillance indication. Cytotoxic
  chemotherapy dose-reductions may be required due to underlying genomic
  instability and bone-marrow fragility — consult with center experienced
  in Bloom syndrome before any oncologic treatment.
notes_ua: >
  STUB — Wave A+B розширення. Indication: відсутня. Тільки біалельні носії
  мають Bloom-фенотипний ризик. Гетерозиготи (включно з BLM-Ash) — максимум
  модерне підвищення; рутинний нагляд не показаний. Цитотоксична хіміотерапія
  може потребувати знижених доз через геномну нестабільність + кістково-мозкову
  крихкість — консультація з центром, що має досвід синдрому Блума.
