recommended_combinations:
  - "strict UVA/UVB sun protection from infancy (SPF 50+ + protective clothing + UV-blocking eyewear)"
  - "annual dermatology with comprehensive skin exam (BCC, SCC, melanoma)"
  - "CBC q3-6mo (leukemia surveillance — AML, ALL, MDS)"
  - "colonoscopy q1-2y from age 12-15 with polypectomy"
  - "EGD q1-2y from age 12-15"
  - "breast MRI + mammography annual from age 18-20 (women)"
  - "low-threshold symptom-directed imaging — atypical cancer presentations at all ages"
  - "partner-carrier screening for couples planning children (autosomal-recessive)"
contraindicated_monotherapy:
  - "elective ionizing radiation exposure (diagnostic CT when alternatives available, EBRT for solid tumors when alternatives available) — documented radiosensitivity in Bloom syndrome"
primary_sources:
  - SRC-NCCN-PEDIATRIC-SARCOMA
