recommended_combinations:
  - "brain MRI q4mo to age 3, q6mo to age 5, annual to age 8 — earlier and denser than PTCH1 cadence"
  - "dermatology surveillance q6-12mo from puberty"
  - "neurosurgery + COG-based protocols for medulloblastoma (avoid EBRT where alternatives available)"
  - "do NOT default to vismodegib / sonidegib for SUFU-driven SHH-MB — downstream-of-SMO position renders SMO inhibition ineffective; consider GLI-pathway investigational agents in trial setting"
contraindicated_monotherapy:
  - "vismodegib / sonidegib (SMO inhibitors) — limited efficacy in SUFU-mutant medulloblastoma; not a substitute for chemotherapy / radiation"
