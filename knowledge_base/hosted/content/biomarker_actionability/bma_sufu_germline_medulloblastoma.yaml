id: BMA-SUFU-GERMLINE-MEDULLOBLASTOMA
biomarker_id: BIO-SUFU-GERMLINE
variant_qualifier: SUFU germline pathogenic (NBCCS-like, medulloblastoma-predominant)
disease_id: DIS-GBM
escat_tier: IIA
evidence_summary: >
  SUFU germline pathogenic variants cause a Gorlin-syndrome–like predisposition
  with much higher medulloblastoma risk than PTCH1 (~30% lifetime vs ~5% in
  PTCH1), and lower BCC burden. SUFU-driven medulloblastomas cluster in the
  SHH-activated molecular subgroup (infant/young-child onset, desmoplastic /
  MBEN histology in many cases). Confirmed-carrier surveillance protocol
  (per Foulkes et al. 2017 / AACR Pediatric Predisposition Working Group):
  brain MRI q4mo from diagnosis through age 3, q6mo from age 3-5, annually
  to age 8 — denser-than-PTCH1 cadence reflects higher MB risk. Dermatology
  surveillance for BCC q6-12mo from puberty. Avoid craniospinal external-beam
  radiation when alternatives exist (second-malignancy risk in carriers).
  Hedgehog-pathway inhibitors (vismodegib, sonidegib) have limited activity
  in SUFU-mutant SHH-MB — downstream-of-SMO position renders SMO inhibitors
  ineffective; this is a critical distinction from PTCH1-driven disease.
  ESCAT IIA.
evidence_summary_ua: >
  Герміногенні патогенні варіанти SUFU спричиняють Gorlin-подібну схильність з
  значно вищим ризиком медулобластоми (~30% довічно vs ~5% при PTCH1), нижчим
  тягарем БКР. Медулобластоми SUFU — SHH-група, інфантильні/раннього дитинства,
  десмопластичні / MBEN. Протокол нагляду: МРТ головного мозку q4 міс до 3 років,
  q6 міс 3-5 років, щорічно до 8 років. Дерматологія q6-12 міс з пубертату.
  Уникати краніоспінальної EBRT, де можливо. Hh-інгібітори (вісмодегіб, соніедгіб)
  МАЛОЕФЕКТИВНІ при SUFU-мутантних SHH-MB — SUFU нижче SMO у каскаді, тому
  SMO-інгібітори не працюють. ESCAT IIA.
