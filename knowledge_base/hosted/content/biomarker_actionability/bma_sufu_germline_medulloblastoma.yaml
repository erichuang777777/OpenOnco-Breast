actionability_review_required: true
notes: >
  STUB — Wave A+B germline expansion. Linked Indication: none (no SUFU-/Gorlin-
  specific Indication exists yet). Two-Clinical-Co-Lead signoff queued. Disease
  anchor uses DIS-GBM as closest CNS-tumor anchor; medulloblastoma lacks a
  Disease entity. The PTCH1-vs-SUFU distinction matters clinically: higher MB
  risk + tighter surveillance cadence + SMO-inhibitor resistance. Penetrance
  estimates remain unstable due to small published cohorts.
notes_ua: >
  STUB — Wave A+B розширення. Indication: відсутня. Прив'язка до DIS-GBM як
  найближчого CNS-якоря; медулобластома не має Disease-сутності. Різниця
  PTCH1 vs SUFU клінічно важлива: вищий ризик MB + щільніший нагляд + резистентність
  до SMO-інгібіторів. Оцінки пенетрантності нестабільні (малі публіковані когорти).
