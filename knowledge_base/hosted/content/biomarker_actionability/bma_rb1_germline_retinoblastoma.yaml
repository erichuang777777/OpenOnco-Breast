actionability_review_required: true
notes: >
  STUB — Wave A+B germline expansion. Linked Indication: none (no
  retinoblastoma-specific surveillance Indication exists yet). Two-Clinical-
  Co-Lead signoff queued. Pediatric ocular oncology is highly subspecialized;
  ophthalmology-genetics-oncology MDT is required at a designated center.
  Cascade testing of siblings before birth (cord-blood / amniotic-fluid)
  enables immediate post-natal screening protocol activation.
notes_ua: >
  STUB — Wave A+B розширення. Indication: відсутня. Педіатрична офтальмологія
  + генетика + онкологія — MDT у спеціалізованому центрі. Каскадне тестування
  братів/сестер до народження (пуповинна кров / амніон) дозволяє розпочати
  скринінг одразу після народження.
