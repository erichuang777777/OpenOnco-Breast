recommended_combinations:
  - "pediatric ocular oncology referral immediately on positive RB1 result or family history"
  - "EUA pediatric ophthalmology q2-4 weeks newborn-12 mo, lengthening to q3mo / q6mo / annual"
  - "intra-arterial chemotherapy (melphalan ± topotecan ± carboplatin) — focal vision-sparing therapy where appropriate"
  - "systemic chemotherapy (vincristine + carboplatin + etoposide) for advanced disease per COG"
  - "avoid external-beam radiation when feasible (secondary-cancer risk in RB1 carriers)"
  - "lifelong secondary-cancer surveillance (annual dermatology, low-threshold imaging for bone pain in adolescence)"
contraindicated_monotherapy:
  - "external-beam radiation therapy — relative contraindication in RB1 germline carriers due to secondary-cancer induction; prefer brachytherapy / intra-arterial chemotherapy / enucleation"
primary_sources:
