id: BMA-RB1-GERMLINE-RETINOBLASTOMA
biomarker_id: BIO-RB1-GERMLINE
variant_qualifier: RB1 germline pathogenic (heritable retinoblastoma)
disease_id: DIS-RETINOBLASTOMA
escat_tier: IIA
evidence_summary: >
  RB1 germline pathogenic variants cause heritable retinoblastoma (~40% of
  retinoblastoma cases) — bilateral / multifocal disease in 80% of carriers,
  median age at diagnosis ~12 months. Carriers face lifetime ~50% risk of
  secondary primary cancers (osteosarcoma, soft-tissue sarcoma, melanoma,
  lung, bladder); cumulative risk markedly elevated after external-beam
  radiation therapy (EBRT) — modern protocols avoid EBRT to mitigate.
  Confirmed-carrier surveillance protocol (per COG / Children's Oncology
  Group + International Retinoblastoma Consortium): pediatric ophthalmology
  with EUA (examination under anesthesia) starting in newborn period —
  every 2-4 weeks until age 1, then progressive lengthening to monthly →
  q3mo → q6mo through age 7, annual through adolescence. Cascade testing
  to all first-degree relatives mandatory. Lifelong secondary-cancer
  surveillance: annual skin exam, attentiveness to bone pain (osteosarcoma
  in adolescence/young adulthood), avoidance of unnecessary diagnostic
  ionizing radiation. ESCAT IIA.
evidence_summary_ua: >
  Герміногенні патогенні варіанти RB1 спричиняють спадкову ретинобластому
  (~40% випадків), двостороння у 80% носіїв, медіана діагнозу — 12 міс.
  Довічний ризик вторинних пухлин ~50% (остеосаркома, м'якотканинні саркоми,
  меланома, легені, сечовий міхур); підвищується після зовнішнього
  опромінення (EBRT — сучасні протоколи його уникають). Протокол нагляду:
  педіатрична офтальмологія з EUA з періоду новонародженості, кожні 2-4 тиж
  до 1 року, далі поступове подовження інтервалу до 1 раз на рік до
  підліткового віку. Каскадне тестування першого ступеня. Довічний нагляд
  вторинних пухлин: щорічний дерматологічний огляд, уникнення непотрібного
  іонізуючого опромінення. ESCAT IIA.
regulatory_approval:
