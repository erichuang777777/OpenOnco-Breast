notes: >
  Prevention-persona RedFlag for long-term ≥3y thiopurine
  (azathioprine / 6-MP) exposure. Engine routes to PreventionPlan
  recommending (1) annual whole-body skin exam by dermatologist
  + aggressive sun-protection counseling, (2) EBV serology
  baseline check in young adults pre-initiation (avoid initiation
  in EBV-seronegative young men per ECCO 2019), (3) annual
  B-symptom + lymphadenopathy review, (4) shared-decision
  discussion of indication continuation vs alternatives (MTX for
  RA, biologics for IBD) at year 5, (5) HPV vaccination catch-up
  where applicable. Anchored to DIS-DLBCL-NOS (lymphoma) +
  DIS-BCC (closest skin-cancer anchor for SCC and BCC). STUB
  pending two-Clinical-Co-Lead signoff per CHARTER §6.1 dev-mode.
