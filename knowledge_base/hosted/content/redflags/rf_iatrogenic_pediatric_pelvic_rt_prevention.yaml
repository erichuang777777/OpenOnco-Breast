notes: "Cancer-survivor late-effects RedFlag for prior pediatric pelvic radiotherapy ≥5y ago. Three surveillance domains: bladder cancer (urothelial — primary anchor), CRC (earlier screening at 45 or 10y post-RT), other pelvic-field secondaries. Annual UA + cytology + CRC screening earlier per COG-LTFU + CCSS. STUB pending two-Clinical-Co-Lead signoff per CHARTER §6.1 dev-mode."
