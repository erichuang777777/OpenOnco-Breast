id: RF-WILSONS-DISEASE-HCC-PREVENTION
definition: >-
  Wilson's disease (autosomal recessive ATP7B-mutated copper-transport
  disorder with hepatic and/or neuropsychiatric manifestations; Leipzig
  score ≥4 confirmatory) in an individual without a current HCC
  diagnosis. Historically considered a low-risk cirrhosis etiology for
  HCC, but contemporary cohorts (van Meer et al. Liver Int 2015;
  Pfeiffenberger et al. J Hepatol 2018) report HCC incidence of
  ~0.5-1%/year in cirrhotic Wilson's — exceeding the AASLD 1.5%/year
  surveillance-threshold in the cirrhotic subset. Risk concentrated
  in patients with established cirrhosis (especially decompensated
  disease) and those with prolonged uncontrolled copper accumulation.
  Adherent copper-chelation therapy (penicillamine, trientine, zinc)
  reduces hepatic copper burden but does not eliminate residual HCC
  risk in patients who already developed cirrhosis. AASLD HCC
  surveillance with US ± AFP q6mo recommended in cirrhotic Wilson's.
  Prevention-persona RedFlag (§20 ratification 2026-05-18, v0.3
  chronic-condition pilot).
definition_ua: >-
  Хвороба Вільсона (autosomal recessive ATP7B-мутаційний copper-
  transport розлад з печінковими та/або нейропсихіатричними
  проявами; Leipzig score ≥4 підтверджує) у пацієнта без поточного
  діагнозу HCC. Історично розглядалася як низько-ризикова cirrhosis
  етіологія для HCC, але сучасні когорти (van Meer Liver Int 2015;
  Pfeiffenberger J Hepatol 2018) повідомляють HCC incidence ~0.5-1%/рік
  у cirrhotic Вільсона — перевищує AASLD 1.5%/рік surveillance-поріг
  у cirrhotic підгрупі. Ризик концентрований у пацієнтів з
  встановленим цирозом (особливо decompensated) та з тривалим
  неконтрольованим накопиченням міді. Adherent copper-chelation
  терапія (пеніциламін, трієнтин, цинк) знижує hepatic copper burden,
  але не елімінує залишковий HCC ризик у пацієнтів з вже розвиненим
  цирозом. AASLD HCC surveillance з US ± AFP q6 міс рекомендована в
  cirrhotic Вільсоні. Prevention-persona RedFlag (ратифікація §20,
  2026-05-18, v0.3 пілот chronic-condition).

