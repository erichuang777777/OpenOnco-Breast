reviewer_signoffs: 0
notes: "Cancer-survivor late-effects RedFlag for cumulative platinum ≥400 mg/m². Surveillance domains: cardiovascular risk modification (BP + lipid panel q1y), nephropathy (creatinine + Mg q1y), secondary AML/MDS (CBC q1y). CV risk modification is the highest-yield late-effect domain. STUB pending two-Clinical-Co-Lead signoff per CHARTER §6.1 dev-mode."
