id: RF-SCHISTOSOMA-HAEMATOBIUM-BLADDER-PREVENTION
definition: >-
  History of Schistosoma haematobium infection (positive ova in urine,
  positive serology, or documented endemic-region exposure with
  suggestive urinary tract symptoms) in an individual without a current
  bladder cancer diagnosis. IARC Group 1 carcinogen (S. haematobium) —
  established etiological driver of bladder squamous cell carcinoma
  (SCC), the dominant histology in endemic regions (sub-Saharan Africa,
  Middle East, parts of South America). Praziquantel cures active
  infection but does NOT reverse chronic urothelial inflammation /
  squamous metaplasia from prior burden; surveillance (urinalysis,
  cytology, cystoscopy for any new hematuria) is the dominant
  prevention modality. Prevention-persona RedFlag (§20 ratification
  2026-05-18).
definition_ua: >-
  Анамнез інфекції Schistosoma haematobium (позитивні ova у сечі,
  позитивна серологія, або документована експозиція в ендемічному
  регіоні з відповідними урологічними симптомами) у пацієнта без
  поточного діагнозу раку сечового міхура. S. haematobium — канцероген
  IARC Group 1, встановлений етіологічний драйвер плоскоклітинного
  раку (SCC) сечового міхура, що є домінуючою гістологією в ендемічних
  регіонах (Африка південніше Сахари, Близький Схід, частини Південної
  Америки). Празиквантел виліковує активну інфекцію, але НЕ зворотний
  щодо хронічного запалення / плоскоклітинної метаплазії від
  попереднього навантаження; surveillance (загальний аналіз сечі,
  цитологія, цистоскопія при будь-якій новій гематурії) — домінуюча
  prevention модальність. RedFlag персони prevention (ратифікація §20,
  2026-05-18).

