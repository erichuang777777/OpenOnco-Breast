notes: >
  Prevention-persona RedFlag for S. haematobium-driven bladder SCC
  prevention. Fires on any documented exposure history with confirmatory
  testing. Engine routes to PreventionPlan recommending praziquantel
  (if active infection) + lifetime urinary surveillance (urinalysis q6-12mo,
  cytology + cystoscopy for any new hematuria). STUB pending Co-Lead
  review.

  Cancer scope: anchored to DIS-UROTHELIAL. S. haematobium-driven
  bladder cancers are predominantly SCC histology (distinct from
  urothelial / transitional cell carcinoma that dominates Western
  cohorts) — engine surfaces this distinction in the prevention
  rationale prose.

  Geographic context: Ukraine is non-endemic; this RF is relevant for
  patients with diaspora / refugee / travel / origin history from
  sub-Saharan Africa, Egypt, Sudan, Yemen, parts of South America.
