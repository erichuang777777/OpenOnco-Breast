id: RF-IATROGENIC-LONG-TERM-PPI-GASTRIC-NET-PREVENTION
definition: >-
  Chronic proton-pump inhibitor (PPI) exposure ≥10 years (omeprazole,
  esomeprazole, pantoprazole, lansoprazole, rabeprazole, dexlansoprazole).
  Sustained acid suppression → hypergastrinemia → enterochromaffin-like
  (ECL) cell hyperplasia in gastric body / fundus mucosa → small but
  measurable elevation in well-differentiated Type-1 gastric
  neuroendocrine tumors (gastric NET, formerly gastric carcinoid).
  Concomitantly, chronic acid suppression accelerates progression of
  underlying atrophic gastritis (especially in H. pylori-positive
  cohort) — atrophic gastritis is itself an independent gastric
  adenocarcinoma risk factor. Absolute risk increment is modest (most
  long-term PPI users do NOT develop gastric NET or cancer) but the
  cohort is large (millions exposed) and the indication for PPI is
  often weak (long-tail use for vague dyspepsia, NSAID prophylaxis
  without ongoing NSAID use, post-hospital-discharge inertia).
  Prevention-persona RedFlag — indication review + de-prescription
  is the primary intervention; surveillance EGD is secondary in
  cohorts with co-existing atrophic gastritis on biopsy.
definition_ua: >-
  Хронічна експозиція до інгібіторів протонної помпи (PPI) ≥10 років
  (омепразол, езомепразол, пантопразол, лансопразол, рабепразол,
  декслансопразол). Стійка acid suppression → гіпергастринемія →
  гіперплазія enterochromaffin-like (ECL) клітин у gastric body /
  fundus → невелике, але вимірне підвищення well-differentiated
  Type-1 gastric neuroendocrine tumors (гастральні NET, раніше
  гастральний карциноїд). Одночасно chronic acid suppression
  прискорює прогресію underlying atrophic gastritis (особливо у
  H. pylori-positive когорті) — atrophic gastritis сам по собі
  незалежний фактор ризику gastric adenocarcinoma. Абсолютний
  приріст ризику скромний, але когорта величезна, і призначення
  PPI часто слабо обґрунтоване (long-tail use на тривалу dyspepsia,
  NSAID prophylaxis без поточного NSAID, post-discharge inertia).
  RedFlag персони prevention — перегляд показів + de-prescription
  є первинною інтервенцією; surveillance EGD — вторинною у когорті
  з co-existing atrophic gastritis за біопсією.

