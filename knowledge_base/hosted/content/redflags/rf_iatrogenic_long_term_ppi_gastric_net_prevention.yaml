notes: "Prevention-persona RedFlag for chronic PPI exposure ≥10y. Engine routes to PreventionPlan recommending (1) indication-review + de-prescription where the PPI is no longer needed (most common scenario), (2) fasting gastrin + chromogranin A in cohort with persistent acid-suppression indication, (3) EGD with body/fundus biopsies in those with elevated gastrin or symptoms; surveillance EGD q3-5y if atrophic gastritis or ECL hyperplasia documented. Anchored to DIS-GASTRIC (gastric NET and atrophic-gastritis-derived adenocarcinoma both gastric-body diseases); NET-specific outcomes carried in indication prose. STUB pending two-Clinical-Co-Lead signoff per CHARTER §6.1 dev-mode."
