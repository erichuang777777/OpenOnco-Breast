id: RF-UNIVERSAL-OCCUPATIONAL-EXPOSURE-MULTIPLE
definition: >-
  Patient with documented ≥2 distinct IARC Group 1 occupational
  carcinogen exposures during working life. Examples of synergistic
  paired exposures: asbestos + tobacco smoking (lung-cancer relative
  risk ~50-90 in combined cohort vs ~5 for tobacco alone, ~5 for
  asbestos alone — supra-multiplicative interaction at low asbestos
  doses); benzene + radon; polycyclic-aromatic-hydrocarbon (PAH)
  exposure + tobacco; diesel-exhaust + silica; formaldehyde + wood-
  dust in joinery / cabinetmaking; ionizing-radiation + tobacco
  (lung carcinogenesis); painter / coke-oven / aluminum-smelter
  worker + tobacco. IARC Monographs Volumes 100A-F + 105 (diesel)
  + 132 (firefighting) document the individual Group 1 status and
  the WHO REACH database documents the synergistic combinations.
  Universal RedFlag (relevant_diseases ["*"]) — fires only when the
  occupational-history questionnaire documents ≥2 distinct Group 1
  exposures over a working lifetime; routes to intensified
  multi-organ surveillance covering lung (annual LDCT if combined
  pack-year + asbestos + radon profile reaches USPSTF / NCCN
  high-risk criteria — explicit eligibility broadening per NCCN
  high-risk nodule and lung-cancer-screening pathway), urinary
  bladder (urine cytology + cystoscopy in benzene / aniline-dye /
  rubber-industry cohort), skin (low-threshold dermatology for
  PAH / coal-tar / arsenic), oropharynx (annual ENT exam for
  combined PAH / tobacco / alcohol). Distinct from single-exposure
  occupational RFs (RF-OCCUPATIONAL-ASBESTOS-PREVENTION, RF-
  OCCUPATIONAL-DIESEL-PREVENTION, etc.) which encode individual
  carcinogen-organ pairs — this RF is the synergy / multi-exposure
  catchment.
definition_ua: >-
  Пацієнт з задокументованими ≥2 distinct IARC Group 1
  occupational carcinogen exposures протягом working life. Приклади
  synergistic парних exposures: asbestos + tobacco smoking (lung-
  cancer relative risk ~50-90 у combined cohort vs ~5 для tobacco
  alone, ~5 для asbestos alone — supra-multiplicative interaction
  на low asbestos дозах); benzene + radon; PAH exposure + tobacco;
  diesel-exhaust + silica; formaldehyde + wood-dust у joinery /
  cabinetmaking; ionizing-radiation + tobacco (lung carcinogenesis);
  painter / coke-oven / aluminum-smelter worker + tobacco. IARC
  Monographs Volumes 100A-F + 105 (diesel) + 132 (firefighting)
  документують individual Group 1 статус і WHO REACH database
  документує synergistic combinations. Universal RedFlag
  (relevant_diseases ["*"]) — fires лише коли occupational-history
  questionnaire документує ≥2 distinct Group 1 exposures за
  working lifetime; routes до intensified multi-organ surveillance:
  лёгкі (annual LDCT якщо combined pack-year + asbestos + radon
  profile reaches USPSTF / NCCN high-risk criteria), сечовий
  міхур (urine cytology + cystoscopy у benzene / aniline-dye /
  rubber-industry cohort), шкіра (low-threshold dermatology для
  PAH / coal-tar / arsenic), oropharynx (annual ENT exam для
  combined PAH / tobacco / alcohol). Відмінний від single-exposure
  occupational RFs — цей RF — synergy / multi-exposure catchment.

