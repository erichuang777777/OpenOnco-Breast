reviewer_signoffs: 0
notes: "Pre-triage universal RedFlag — chronic immunosuppression ≥1y from any cause (HIV / transplant / autoimmune-on-immunosuppressant / inherited immunodef). risk_category=iatrogenic best captures the dominant adult cohort (transplant + autoimmune-on-biologic) though primary-immunodeficiency cohort would fit `chronic_condition`. Trigger uses NOVEL finding `chronic_immunosuppression_ge_1y_documented: true` deliberately distinct from `hiv_status: positive` (pilot HIV test patient finding) to avoid cross-firing with RF-CHRONIC-HIV-MALIGNANCY-PREVENTION test scenario. Universal Indications anchored to DIS-KAPOSI (AIDS-defining; NOT DIS-DLBCL-NOS which is the HIV pilot target — advisor note). With relevant_diseases=[\"*\"], engine does NOT attach Indication tracks via prevention path (plan.py:297 excludes \"*\") — universal Indications are documentation / sidecar candidates pending future engine extension. STUB pending two-Clinical-Co-Lead signoff per CHARTER §6.1 dev-mode."
