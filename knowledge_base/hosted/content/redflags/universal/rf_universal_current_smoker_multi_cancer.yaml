notes: "Pre-triage universal RedFlag — current tobacco use (≥3 mo, any quantity) per IARC 100A 17-cancer cluster. Authoring intent: highest-yield prevention intervention. Routes to (1) structured cessation — combined behavioural + first-line pharmacotherapy (varenicline / bupropion / NRT-combination) per USPHS 2008 + NICE / NCQA, and (2) USPSTF 2021 LDCT eligibility evaluation (annual LDCT for 50-80yo with ≥20 pack-y history, current smoker or quit ≤15y). With relevant_diseases=[\"*\"], engine does NOT attach Indication tracks via prevention path (plan.py:297 excludes \"*\") — universal Indications anchored to DIS-NSCLC are documentation / sidecar candidates pending future engine extension. STUB pending two-Clinical-Co-Lead signoff per CHARTER §6.1 dev-mode."
