notes: "Pre-triage universal RedFlag — any prior-cancer survivor with treatment completed. Authoring intent: route to structured survivorship surveillance (NCCN Survivorship 2025 + COG-LTFU v5.0 treatment-summary-driven cadence). risk_category=iatrogenic reflects that the elevated secondary-malignancy risk is therapy-related rather than tumor-biology-intrinsic. With relevant_diseases=[\"*\"], engine does NOT attach Indication tracks via prevention path (plan.py:297 excludes \"*\") — universal Indications anchored to DIS-CRC (heterogeneous survivor surveillance defaults to CRC + breast cadence individualization) are documentation / sidecar candidates pending future engine extension. STUB pending two-Clinical-Co-Lead signoff per CHARTER §6.1 dev-mode."
