id: RF-UNIVERSAL-PRIOR-CANCER-SECONDARY-RISK
definition: >-
  Any prior cancer history (any site, treatment completed, currently
  no evidence of active recurrent disease — survivor cohort).
  Secondary-malignancy risk in cancer survivors is well-characterized
  in two cohorts: (1) Childhood Cancer Survivor Study (CCSS) +
  Children's Oncology Group Long-Term Follow-Up (COG-LTFU)
  Guidelines v5.0 — survivors of pediatric cancers face cumulative
  incidence of second neoplasm reaching 20-25% at 30 years post-
  diagnosis, dominated by therapy-related solid tumors (breast in
  chest-RT survivors, CNS in cranial-RT, thyroid in neck-RT,
  sarcoma and gastrointestinal in TBI / alkylator survivors) and
  therapy-related myeloid neoplasms; (2) NCCN Survivorship 2025
  guidelines for adult-cancer survivors — second-primary-cancer
  risk is elevated 1.5-3× general-population baseline depending on
  treatment exposures (anthracycline + chest-RT for Hodgkin and
  breast survivors carries documented late-onset breast-cancer +
  cardiotoxicity risk; alkylator + TBI exposure carries t-MDS / AML
  risk; cyclophosphamide carries urothelial-bladder-cancer risk).
  Universal RedFlag (relevant_diseases ["*"]) — routes to enrollment
  in a structured survivorship surveillance program (NCCN
  Survivorship + COG-LTFU treatment-summary-driven cadence) covering
  cardiotoxicity, secondary-malignancy screening, late-effects
  endocrine / psychosocial / fertility surveillance. Distinct from
  disease-specific survivorship RFs (some authored — e.g.,
  chest-RT-survivor breast surveillance) — this RF is the upstream
  catchment for the universal "prior cancer" claim.
definition_ua: >-
  Будь-який prior cancer (any site, treatment completed, currently
  no evidence of active recurrent disease — survivor когорта).
  Secondary-malignancy ризик у cancer survivors well-characterized
  у двох когортах: (1) Childhood Cancer Survivor Study (CCSS) +
  Children's Oncology Group Long-Term Follow-Up (COG-LTFU)
  Guidelines v5.0 — survivors педіатричних раків мають cumulative
  incidence другої neoplasm досягаючи 20-25% на 30 років після
  diagnosis, dominated by therapy-related solid tumors (breast у
  chest-RT survivors, CNS у cranial-RT, thyroid у neck-RT,
  sarcoma і GI у TBI / alkylator survivors) та therapy-related
  myeloid neoplasms; (2) NCCN Survivorship 2025 guidelines для
  adult-cancer survivors — second-primary-cancer ризик підвищений
  1.5-3× general-population baseline залежно від treatment
  exposures (anthracycline + chest-RT для Hodgkin і breast
  survivors несе documented late-onset breast-cancer +
  cardiotoxicity ризик; alkylator + TBI несе t-MDS / AML ризик;
  cyclophosphamide несе urothelial-bladder-cancer ризик).
  Universal RedFlag (relevant_diseases ["*"]) — routes до
  enrollment у structured survivorship surveillance program
  (NCCN Survivorship + COG-LTFU treatment-summary-driven cadence)
  cardiotoxicity, secondary-malignancy screening, late-effects
  endocrine / psychosocial / fertility surveillance. Відмінний
  від disease-specific survivorship RFs (деякі authored — напр.,
  chest-RT-survivor breast surveillance) — цей RF — upstream
  catchment для universal "prior cancer" claim.

