id: RF-UNIVERSAL-FIRST-DEGREE-CANCER-FAMILY-ANY
definition: >-
  Any first-degree relative (parent, full sibling, biological child) with
  a history of any cancer (any site, any age at diagnosis). Broad
  pre-triage flag intended to fire BEFORE the disease- or
  syndrome-specific genetic RedFlags (BRCA / Lynch / Cowden / Li-Fraumeni
  / FAP / VHL etc.). Captures the cohort of patients whose family
  pedigree has not yet been systematically evaluated. Universal RedFlag
  (relevant_diseases ["*"]) — does not by itself anchor to a specific
  cancer; serves as a routing signal to general genetic-counseling
  referral and family-history-aware modification of age-and-modality
  screening cadence. Most patients with a single first-degree relative
  cancer do NOT carry a high-penetrance pathogenic variant — the value
  of this flag is in surfacing the cohort to a structured pedigree
  review (Tyrer-Cuzick / BOADICEA / PREMM5 / MMRpro depending on family
  profile) which then either triggers disease-specific genetic RFs or
  documents a negative-pedigree determination. Distinct from
  disease-specific family-history RFs (e.g.,
  RF-BRCA-HBOC-FAMILY-HISTORY-SUSPICION) which encode site / pedigree-
  pattern thresholds — this RF is the upstream catchment.
definition_ua: >-
  Будь-який родич першого ступеня (батько, мати, рідний сиблінг,
  біологічна дитина) з онкологічним діагнозом в анамнезі (будь-яка
  локалізація, будь-який вік на момент діагнозу). Широкий
  pre-triage прапор, що спрацьовує ПЕРЕД disease- або syndrome-
  specific genetic RedFlags (BRCA / Lynch / Cowden / Li-Fraumeni
  / FAP / VHL тощо). Охоплює когорту пацієнтів, чия сімейна
  родовід ще не пройшла systematic evaluation. Universal RedFlag
  (relevant_diseases ["*"]) — сам по собі не анкорований до
  конкретного раку; служить routing-сигналом до загального
  направлення на генетичне консультування та family-history-aware
  модифікації частоти / модальності скринінгу. Більшість пацієнтів
  з одним first-degree relative онкологічного анамнезу НЕ є
  носіями high-penetrance pathogenic variant — цінність прапора
  у винесенні когорти на structured pedigree review (Tyrer-Cuzick
  / BOADICEA / PREMM5 / MMRpro залежно від family profile), що
  далі або тригерить disease-specific genetic RFs, або документує
  negative-pedigree determination. Відмінний від disease-specific
  family-history RFs (напр., RF-BRCA-HBOC-FAMILY-HISTORY-SUSPICION),
  які кодують site / pedigree-pattern thresholds — цей RF — upstream
  catchment.

