notes: "Pre-triage universal RedFlag — fires upstream of disease-specific genetic RFs (BRCA / Lynch / Cowden / Li-Fraumeni / FAP / VHL etc.). Authoring intent: route to structured pedigree review + general genetic-counseling referral, NOT to a specific cancer-syndrome workup until a downstream disease-specific RF fires. With relevant_diseases=[\"*\"], the engine currently does NOT attach Indication tracks via the prevention path (engine excludes \"*\" from disease-anchor matching at plan.py:297) — universal Indications anchored to DIS-BREAST and DIS-CRC are authored as documentation / sidecar candidates pending future engine extension (KSS §20 v0.2-C scope). STUB pending two-Clinical-Co-Lead signoff per CHARTER §6.1 dev-mode."
