id: RF-UNIVERSAL-ELEVATED-BMI-CANCER-CLUSTER
definition: >-
  BMI ≥30 kg/m² (WHO obesity Class I or higher). IARC Working Group
  on Obesity (Lauby-Secretan 2016, NEJM) catalogued sufficient
  evidence for a causal association between excess body fatness and
  ≥13 cancer types: oesophagus (adenocarcinoma), gastric cardia,
  colon and rectum, liver, gallbladder, pancreas, postmenopausal
  breast, corpus uteri, ovary, kidney (renal cell carcinoma),
  meningioma, thyroid, multiple myeloma. WCRF / AICR Continuous
  Update Project (2018) corroborates with additional probable
  evidence for advanced prostate, oral cavity / pharynx / larynx,
  and provides dose-response curves (HR per 5 kg/m² increase
  typically 1.1-1.5 across the cluster). Universal RedFlag
  (relevant_diseases ["*"]) — routes to a structured weight-loss
  program + cancer-cluster screening cadence modification (priority
  CRC + breast + endometrial + HCC where USPSTF / NCCN screening
  is age-and-modality defined). Distinct from disease-specific
  obesity RFs (rare; not currently authored) — this RF is the
  upstream catchment.
definition_ua: >-
  BMI ≥30 кг/м² (WHO obesity Class I або вище). IARC Working Group
  on Obesity (Lauby-Secretan 2016, NEJM) задокументувала достатні
  докази причинного зв'язку між надлишковим body fatness і ≥13
  типами раку: стравохід (аденокарцинома), gastric cardia, товста
  і пряма кишка, печінка, жовчний міхур, підшлункова, постменопаузальна
  молочна залоза, тіло матки, яєчник, нирка (RCC), meningioma,
  щитоподібна, multiple myeloma. WCRF / AICR Continuous Update
  Project (2018) підтверджує з додатковими probable доказами для
  advanced prostate, oral cavity / pharynx / larynx, та надає
  dose-response криві (HR per 5 кг/м² зазвичай 1.1-1.5 в межах
  cluster). Universal RedFlag (relevant_diseases ["*"]) — routes
  до structured weight-loss program + cancer-cluster screening
  cadence modification (priority CRC + breast + endometrial + HCC
  де USPSTF / NCCN screening є age-and-modality defined).
  Відмінний від disease-specific obesity RFs (рідкі; не authored
  наразі) — цей RF — upstream catchment.

