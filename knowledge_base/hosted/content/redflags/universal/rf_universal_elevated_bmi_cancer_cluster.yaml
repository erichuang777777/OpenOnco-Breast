notes: "Pre-triage universal RedFlag — obesity (BMI≥30) per IARC 13-cancer cluster + WCRF/AICR CUP. Authoring intent: route to structured weight-loss program + cancer-cluster screening modification (CRC priority — adenoma surveillance interval and starting-age individualization; breast supplemental imaging on density; endometrial symptom-prompted TVUS; HCC US+AFP q6mo if NAFLD/MASH-cirrhosis component). With relevant_diseases=[\"*\"], the engine does NOT attach Indication tracks via the prevention path (engine excludes \"*\" at plan.py:297) — universal Indications anchored to DIS-CRC are documentation / sidecar candidates pending future engine extension. STUB pending two-Clinical-Co-Lead signoff per CHARTER §6.1 dev-mode."
