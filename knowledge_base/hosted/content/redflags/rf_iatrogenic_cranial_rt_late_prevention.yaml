id: RF-IATROGENIC-CRANIAL-RT-LATE-PREVENTION
definition: >-
  Cancer survivor ≥5 years post-completion of curative-intent oncology
  treatment that included cranial radiotherapy — most commonly pediatric
  ALL (whole-brain RT or craniospinal), pediatric brain tumor (medulloblastoma,
  ependymoma, low-grade glioma), prophylactic cranial irradiation (PCI) in
  SCLC, primary CNS lymphoma RT, head-and-neck RT with brain in field.
  Three principal late-effect domains: (1) secondary CNS tumors —
  meningioma (highest incidence, latency 15-30y, cumulative 1-3% at 30y),
  high-grade glioma, low-grade glioma; (2) endocrine sequelae from
  hypothalamic-pituitary axis injury — growth hormone deficiency, thyroid
  dysfunction (hypothyroidism from indirect or direct neck-field exposure),
  gonadal dysfunction, ACTH deficiency; (3) neurocognitive late effects —
  attention deficits, processing speed, executive dysfunction, dementia
  risk in older survivors. Surveillance cadence per COG-LTFU + Childhood
  Cancer Survivor Study (CCSS) + NCCN CNS guidelines.
  Prevention-persona RedFlag (§20 cancer-survivor late-effects pilot).
definition_ua: >-
  Виживач раку ≥5 років після завершення curative-intent oncology
  treatment з cranial radiotherapy — переважно pediatric ALL (whole-brain
  RT або craniospinal), pediatric brain tumor (medulloblastoma, ependymoma,
  low-grade glioma), prophylactic cranial irradiation (PCI) при SCLC,
  primary CNS lymphoma RT, head-and-neck RT з brain in field. Три principal
  late-effect domains: (1) secondary CNS tumors — meningioma (найвища
  incidence, latency 15-30р, cumulative 1-3% at 30р), high-grade glioma,
  low-grade glioma; (2) endocrine sequelae від hypothalamic-pituitary
  axis injury — GH deficiency, thyroid dysfunction (hypothyroidism), gonadal
  dysfunction, ACTH deficiency; (3) neurocognitive late effects — attention
  deficits, processing speed, executive dysfunction, dementia ризик у старших
  survivors. Surveillance cadence per COG-LTFU + CCSS + NCCN CNS.

trigger:
  type: lab_value
  any_of:
    - finding: "survivor_5y_post_cranial_radiotherapy"
      value: true
    - finding: "survivor_pediatric_cranial_rt_late_effect"
      value: true
    - finding: "survivor_prophylactic_cranial_irradiation_late_effect"
      value: true

clinical_direction: investigate

severity: major
priority: 100
category: other

risk_category: iatrogenic

# Anchor DIS-GBM — closest in-KB CNS disease for secondary brain tumor
# surveillance. Meningioma + low-grade glioma not separately stocked yet
# as anchor entities; GBM is the representative high-grade CNS anchor.
relevant_diseases:
  - DIS-GBM

shifts_algorithm: []

sources:
  - SRC-NCCN-BCELL-2025
  - SRC-NCCN-CNS-2025
  - SRC-COG

last_reviewed: "2026-05-18"
reviewer_signoffs: 0
notes: "Cancer-survivor late-effects RedFlag for prior cranial radiotherapy ≥5y ago. Three surveillance domains: secondary CNS tumors (meningioma highest incidence), endocrine sequelae (HP-axis), neurocognitive. Annual neuro exam + endocrine panel + brain MRI q1-3y if symptomatic per COG-LTFU. STUB pending two-Clinical-Co-Lead signoff per CHARTER §6.1 dev-mode."
