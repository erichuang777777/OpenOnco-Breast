notes: >
  v0.3 chronic-condition prevention pilot — systemic sclerosis / lung
  cancer. Prevention-persona RedFlag (CHARTER §3 amended 2026-05-18
  Path A, HCP-mediated). Fires when patient profile shows confirmed
  systemic sclerosis (especially SSc-ILD or anti-Scl70 subset) AND
  no confirmed lung cancer. Engine routes to PreventionPlan with 2
  tracks: HRCT chest q1-2y if ILD present + PFTs q6-12mo + smoking
  cessation (IND-SCLERODERMA-LUNG-PREVENTION-SURVEILLANCE) as standard;
  rheumatology-driven observation with chest imaging only on symptom
  trigger (IND-SCLERODERMA-LUNG-PREVENTION-OBSERVATION) as alternative.

  Evidence base:
    - **Lung cancer risk magnitude:** Bonifazi et al. Arthritis Care
      Res 2013 meta-analysis (cancer in SSc, SIR 4.4 for lung); SSc-ILD
      subset SIR ~5-7. Pearson et al. Arthritis Rheumatol 2018 cohort
      study showing temporal clustering at SSc onset suggestive of
      paraneoplastic mechanisms in some cases.
    - **Autoantibody risk:** anti-RNA polymerase III associated with
      paraneoplastic-presentation cancers (breast, others) at SSc onset;
      anti-Scl70 (topoisomerase I) associated with SSc-ILD and elevated
      lung-cancer risk.
    - **Surveillance recommendations:** EULAR 2023 update — HRCT
      baseline at SSc diagnosis to characterize ILD; surveillance HRCT
      q1-2y in established ILD or progressive disease; PFTs q3-6mo for
      monitoring ILD trajectory. NCCN LCSP eligibility (low-dose CT
      screening) applies independently for patients with smoking
      history; SSc itself is not an NCCN LCSP qualifying criterion.

  STUB pending two-Clinical-Co-Lead signoff per CHARTER §6.1 dev-mode
  exemption.
notes_ua: >
  v0.3 пілот prevention chronic-condition — системний склероз / рак
  легень. Prevention-persona RedFlag (CHARTER §3 поправка 2026-05-18).
  Спрацьовує коли профіль пацієнта показує підтверджений системний
  склероз (особливо SSc-ILD або anti-Scl70 підгрупа) ТА відсутній
  підтверджений рак легень. Engine маршрутизує до PreventionPlan з 2
  треками: HRCT грудей q1-2 роки якщо ILD присутній + PFTs q6-12 міс +
  smoking cessation (IND-SCLERODERMA-LUNG-PREVENTION-SURVEILLANCE) як
  стандарт; rheumatology-driven спостереження з chest imaging лише на
  symptom trigger (IND-SCLERODERMA-LUNG-PREVENTION-OBSERVATION) як
  альтернатива.

  Доказова база: SIR ~4.4 загалом, ~5-7 у SSc-ILD підгрупі (Bonifazi
  Arthritis Care Res 2013). Anti-Scl70 асоційований з SSc-ILD та
  підвищеним lung-cancer ризиком. EULAR 2023: HRCT baseline при
  діагнозі, surveillance HRCT q1-2y в ILD; PFTs q3-6 міс.

  Це STUB, очікує підпис двох Clinical Co-Lead за §6.1 dev-mode
  exemption.
