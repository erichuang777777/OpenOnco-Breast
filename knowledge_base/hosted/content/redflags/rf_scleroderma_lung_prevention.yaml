id: RF-SCLERODERMA-LUNG-PREVENTION
definition: >-
  Systemic sclerosis (scleroderma) per ACR/EULAR 2013 classification
  criteria (diffuse cutaneous or limited cutaneous form, characteristic
  Raynaud's, sclerodactyly, fingertip pitting/ulceration, abnormal
  nailfold capillaroscopy, ± organ involvement) in an individual
  without a current lung cancer diagnosis. Established risk factor for
  lung cancer (~2-3x relative risk overall; further elevated in the
  scleroderma-associated interstitial lung disease [SSc-ILD] subset to
  ~5-7x, and in anti-topoisomerase-I-positive patients). Risk
  attributable to chronic pulmonary inflammation, fibrosis,
  immunosuppressant exposure, and the underlying scleroderma
  immunobiology. Smokers with SSc-ILD compound risk multiplicatively.
  HRCT chest q1-2y in SSc-ILD subset enables detection of incidental
  pulmonary nodules; PFTs q6-12mo guide ILD management and identify
  decompensation that may flag malignancy. Prevention-persona RedFlag
  (§20 ratification 2026-05-18, v0.3 chronic-condition pilot).
definition_ua: >-
  Системний склероз (склеродермія) per ACR/EULAR 2013 критеріями
  класифікації (дифузна шкірна або обмежена шкірна форма, характерний
  Рейно, склеродактилія, fingertip pitting/ulceration, abnormal
  nailfold capillaroscopy, ± залучення органів) у пацієнта без
  поточного діагнозу раку легень. Встановлений фактор ризику раку
  легень (~2-3x відносний ризик загалом; додатково підвищений у
  scleroderma-асоційованому interstitial lung disease [SSc-ILD]
  підгрупі до ~5-7x, та у anti-topoisomerase-I-positive пацієнтів).
  Ризик пояснюється хронічним pulmonary запаленням, фіброзом,
  експозицією імуносупресантів та underlying scleroderma
  імунобіологією. Курці з SSc-ILD multiplicatively compound ризик.
  HRCT грудей q1-2 роки в SSc-ILD підгрупі дозволяє виявити incidental
  pulmonary вузли; PFTs q6-12 міс керують ILD-менеджментом та
  ідентифікують decompensation, що може флагнути малігнізацію.
  Prevention-persona RedFlag (ратифікація §20, 2026-05-18, v0.3 пілот
  chronic-condition).

