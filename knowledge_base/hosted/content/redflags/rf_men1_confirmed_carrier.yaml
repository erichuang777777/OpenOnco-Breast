id: RF-MEN1-CONFIRMED-CARRIER
definition: >-
  Confirmed germline pathogenic / likely-pathogenic variant in the MEN1
  (menin) gene. Patient has had germline panel testing returned positive;
  the pedigree-suspicion question is settled. No current personal cancer
  diagnosis in the carrier being assessed (current cancer diagnosis routes
  to treatment-track plan with carrier status recorded for tailored
  surgical / surveillance decisions). Mandates structured multi-organ
  endocrine surveillance from early childhood (PTH/Ca from age 5,
  pituitary MRI from age 5, GEP-NET surveillance from age 10).
  Prevention-persona RedFlag (§20, v0.2-B confirmed-carrier surveillance
  pathway — distinct from RF-MEN1-FAMILY-HISTORY-SUSPICION which fires
  before testing).
definition_ua: >-
  Підтверджений гермінативний патогенний / ймовірно-патогенний варіант у
  гені MEN1 (menin). Пацієнт пройшов germline-тестування з позитивним
  результатом; питання родовідної підозри вирішене. Поточний особистий
  діагноз раку у носія, що оцінюється, відсутній (поточний діагноз раку
  routes до treatment-track плану зі записаним статусом носійства).
  Mandates структуроване мульти-органне ендокринне спостереження з
  раннього дитячого віку (PTH/Ca з 5 років, гіпофізарна МРТ з 5 років,
  GEP-NET спостереження з 10 років). Prevention-persona RedFlag (§20,
  v0.2-B шлях спостереження підтверджених носіїв — відрізняється від
  RF-MEN1-FAMILY-HISTORY-SUSPICION, що спрацьовує до тестування).

trigger:
  type: lab_value
  any_of:
    - finding: "germline_men1_pathogenic_variant_confirmed"
      value: true

clinical_direction: investigate

severity: major
priority: 100
category: other
risk_category: genetic

# MEN1-spectrum: GEP-NETs (DIS-PNET dominant, plus DIS-GI-NET for
# duodenal/gastric/bronchial/thymic NETs). Primary hyperparathyroidism
# (~95% lifetime), pituitary adenoma (~30-40%), adrenocortical (~20-40%)
# managed via endocrinology surveillance without dedicated DIS-* entities.
relevant_diseases:
  - DIS-PNET
  - DIS-GI-NET

shifts_algorithm: []

sources:
  - SRC-NCCN-NET-2025
  - SRC-NCCN-BCELL-2025

last_reviewed: "2026-05-18"
reviewer_signoffs: 0
notes: >
  v0.2-B confirmed-carrier surveillance pathway — MEN1 (Wermer syndrome).
  Fires on documented germline MEN1 pathogenic variant positivity in an
  asymptomatic individual. Engine routes to PreventionPlan recommending:
    (a) IND-MEN1-CARRIER-SURVEILLANCE (standard) — Thakker/ESE-style
        annual biochemistry (PTH + ionized Ca + prolactin + IGF-1 +
        chromogranin-A) from age 5; pituitary MRI q3y from age 5;
        abdominal MRI q1y from age 10 for GEP-NET surveillance.
    (b) IND-MEN1-CARRIER-INTENSIFIED (aggressive) — standard protocol
        PLUS shared-decision discussion of prophylactic subtotal
        parathyroidectomy, intensified gastrinoma / Zollinger-Ellison
        surveillance, and early calcitonin baseline for any RET-overlap
        differential.

  STUB pending two-Clinical-Co-Lead signoff per CHARTER §6.1 dev-mode
  exemption. Source-set TODO: Thakker et al. JCEM Clinical Practice
  Guidelines for MEN1 (2012); ESE 2024 MEN1 update — v0.2-B authoring
  backlog new SRC entities.

  Lifetime tumor risk in confirmed MEN1 carriers (Thakker JCEM 2012;
  ESE 2024):
    - Primary hyperparathyroidism: ~95% by age 50 (multi-glandular)
    - GEP-NETs: ~30-80% lifetime (gastrinoma most common; insulinoma,
      glucagonoma, VIPoma; malignant transformation dominates mortality)
    - Pituitary adenoma: ~30-40% (prolactinoma > GH-secreting > ACTH)
    - Adrenocortical tumors: ~20-40% (mostly non-functioning, rarely
      malignant)
    - Bronchial / thymic NET: ~5-10% (thymic NET in male carriers often
      aggressive — chest CT periodically)
