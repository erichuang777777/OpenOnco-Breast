id: RF-LIFESTYLE-PROCESSED-MEAT-PREVENTION
definition: >-
  Regular processed-meat consumption ≥50 g/day per WCRF/IARC threshold.
  IARC Monograph 114 (2015) classified processed meat as Group 1
  carcinogen for colorectal cancer (sufficient evidence). Each 50 g/day
  of processed meat increases CRC risk by ~18% (meta-analyzed RR ~1.18;
  WCRF/AICR convincing-evidence rating). Processed meat = sausages, ham,
  bacon, salami, cured/smoked/salted/preserved meat. Red meat (Group 2A
  per IARC, probable carcinogen) is a separate but overlapping concern —
  threshold ≥500 g/week for red meat. Mechanisms: N-nitroso compounds,
  heterocyclic amines, polycyclic aromatic hydrocarbons, heme iron.
  Prevention-persona RedFlag (§20 v0.3 lifestyle pilot).
definition_ua: >-
  Регулярне споживання processed meat ≥50 г/день per WCRF/IARC threshold.
  IARC Monograph 114 (2015) класифікувала processed meat як Group 1
  канцероген для колоректального раку (sufficient evidence). Кожні 50 г/день
  processed meat збільшують ризик CRC на ~18% (RR ~1.18; WCRF/AICR
  convincing-evidence rating). Processed meat = ковбаси, шинка, бекон,
  салямі, cured/smoked/salted/preserved meat. Red meat (Group 2A per
  IARC, probable carcinogen) — окрема, але overlapping проблема.

trigger:
  type: lab_value
  any_of:
    - finding: "processed_meat_intake_ge_50g_per_day"
      value: true
    - finding: "red_meat_intake_ge_500g_per_week"
      value: true

clinical_direction: investigate

