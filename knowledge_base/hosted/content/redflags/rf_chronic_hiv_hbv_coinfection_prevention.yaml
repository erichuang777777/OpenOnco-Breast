notes: >
  Prevention-persona RedFlag for HIV + HBV coinfection cancer prevention.
  Higher severity (critical) than mono-infection HBV RF — coinfection
  carries documented accelerated-fibrosis + elevated HCC risk AND a
  hard constraint on antiviral selection (tenofovir-based ART
  mandatory; entecavir monotherapy contraindicated). Engine routes to
  PreventionPlan recommending tenofovir-based ART (covers both viruses
  simultaneously) + AASLD HCC surveillance q6mo. STUB pending Co-Lead
  review.

  Cancer scope: anchored to DIS-HCC. HIV-driven AIDS-defining
  malignancies (Kaposi sarcoma via HHV-8 reactivation, NHL, cervical)
  are covered separately via RF-CHRONIC-HIV-MALIGNANCY-PREVENTION and
  RF-CHRONIC-HHV8-MALIGNANCY-PREVENTION.

  Distinct from RF-CHRONIC-HBV-MALIGNANCY-PREVENTION and
  RF-CHRONIC-HIV-MALIGNANCY-PREVENTION (individual mono-infection RFs).
  When coinfection trigger fires, this RF takes precedence (higher
  priority) and the indication enforces tenofovir-based ART selection.
