id: RF-CHRONIC-HIV-HBV-COINFECTION-PREVENTION
definition: >-
  Concurrent HIV + HBV coinfection (HIV-positive AND HBsAg positive
  ≥6 months OR HBV-DNA detectable ≥6 months) in an individual without
  a current HCC or AIDS-defining malignancy diagnosis. IARC Group 1
  carcinogens (HBV, HIV-indirect immunosuppression) — coinfection
  carries elevated HCC risk and accelerated liver fibrosis vs HBV
  mono-infection. The ART regimen for HIV+/HBV+ MUST be tenofovir-based
  (TDF or TAF, paired with FTC or 3TC) — tenofovir has dual activity
  against HIV and HBV; entecavir is NOT active against HIV and
  monotherapy in a coinfected patient drives HIV resistance.
  Surveillance: AASLD HCC US + AFP every 6 months. Prevention-persona
  RedFlag (§20 ratification 2026-05-18).
definition_ua: >-
  Одночасна коінфекція ВІЛ + HBV (ВІЛ-позитивний ТА HBsAg позитивний
  ≥6 міс АБО HBV-ДНК визначувана ≥6 міс) у пацієнта без поточного
  діагнозу ГЦК чи AIDS-визначальної злоякісності. HBV + ВІЛ-непряма
  імуносупресія — обидва канцерогени IARC Group 1; коінфекція
  супроводжується вищим ризиком ГЦК і прискореним фіброзом печінки
  vs HBV-моноінфекція. АРТ-режим для ВІЛ+/HBV+ ОБОВ'ЯЗКОВО має бути
  tenofovir-based (TDF або TAF, у парі з FTC або 3TC) — тенофовір
  має подвійну активність проти ВІЛ і HBV; entecavir НЕ активний
  проти ВІЛ, монотерапія у коінфікованого пацієнта призводить до
  HIV-резистентності. Surveillance: AASLD HCC УЗД + AFP кожні
  6 міс. RedFlag персони prevention (ратифікація §20, 2026-05-18).

