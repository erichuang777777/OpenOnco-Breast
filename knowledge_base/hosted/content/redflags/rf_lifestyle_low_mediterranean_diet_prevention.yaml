notes: "Prevention-persona RedFlag for low Mediterranean-diet adherence. Population-level dietary-pattern lever — distinct from single-nutrient RFs (fibre, calcium, red meat). PREDIMED RCT (2013 primary endpoint cardiovascular; 2015 secondary CRC analysis) + EPIC + NHS observational signal. Anchored to DIS-CRC because pattern-cancer evidence is strongest there; multi-cancer benefit framed in rationale. Engine routes to PreventionPlan recommending dietary-pattern counseling + USPSTF-cadence screening per anchor. STUB pending two-Clinical-Co-Lead signoff per CHARTER §6.1 dev-mode."
