id: RF-LIFESTYLE-LOW-MEDITERRANEAN-DIET-PREVENTION
definition: >-
  Low adherence to a Mediterranean dietary pattern (Trichopoulou
  Mediterranean Diet Score [MDS] 0-3 of 9, or PREDIMED-style score in
  the lowest tertile, or 14-item MEDAS <7). Mediterranean dietary
  pattern = high intake of olive oil, vegetables, fruits, whole grains,
  legumes, nuts, fish; moderate dairy + wine with meals; low intake of
  red/processed meat + sweets. EPIC + Nurses' Health Study + PREDIMED
  cohorts: high adherence associated with ~12-15% reduction in overall
  cancer incidence + mortality; strongest signals for CRC, breast,
  gastric, hepatocellular cancers + dietary-pattern co-benefits for
  cardiovascular disease (PREDIMED 2013 RCT primary endpoint).
  Mechanisms: high polyphenol (olive oil, vegetables) + ω-3 fatty acid
  (fish) + fibre + antioxidant content; low pro-inflammatory red/
  processed meat + refined-carbohydrate content; favorable microbiome
  modulation. Prevention-persona RedFlag (§20 v0.3 diet pilot,
  2026-05-18) — represents general dietary-pattern lever distinct from
  single-nutrient RFs (fibre, calcium, etc.) above.
definition_ua: >-
  Низька adherence до Mediterranean dietary pattern (Trichopoulou
  Mediterranean Diet Score [MDS] 0-3 з 9, або PREDIMED-style score у
  lowest tertile, або 14-item MEDAS <7). Mediterranean pattern =
  високе споживання olive oil, овочів, фруктів, whole grains, legumes,
  nuts, риба; moderate dairy + wine з їжею; низьке red/processed meat +
  sweets. EPIC + Nurses' Health Study + PREDIMED: high adherence
  асоціюється з ~12-15% зниженням overall cancer incidence +
  mortality; найсильніші сигнали для CRC, breast, gastric, HCC +
  cardiovascular co-benefits (PREDIMED 2013 RCT). Механізми: високий
  polyphenol (olive oil, овочі) + ω-3 (риба) + fibre + antioxidant
  content; низький pro-inflammatory red/processed meat + refined-carb;
  favorable microbiome modulation.

trigger:
  type: lab_value
  any_of:
    - finding: "mediterranean_diet_score_lt_4"
      value: true
    - finding: "medas_score_lt_7"
      value: true
    - finding: "predimed_lowest_tertile"
      value: true

clinical_direction: investigate

severity: minor
