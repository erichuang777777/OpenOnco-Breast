id: RF-IBD-CRC-PREVENTION
definition: >-
  Long-standing inflammatory bowel disease (IBD) with colonic involvement
  — either ulcerative colitis (UC) with diagnosis ≥8 years, or Crohn's
  colitis (involvement of ≥1/3 of colon) with diagnosis ≥8 years, or
  IBD with concomitant primary sclerosing cholangitis (PSC) regardless
  of duration (PSC-IBD is the highest-risk IBD subgroup for colorectal
  cancer — cumulative CRC risk ~15-30% at 30 years from PSC diagnosis).
  No current colorectal cancer diagnosis. Chronic colonic inflammation
  drives colitis-associated dysplasia and CRC via an
  inflammation-dysplasia-carcinoma sequence distinct from sporadic CRC
  (often arises from flat dysplasia, multifocal, harder to detect by
  conventional white-light colonoscopy). Surveillance colonoscopy with
  chromoendoscopy or high-definition white-light reduces CRC mortality
  in this population. Prevention-persona RedFlag (§20 ratification
  2026-05-18, v0.3 chronic-condition pilot).
definition_ua: >-
  Тривалозіе запальне захворювання кишечника (IBD) з ураженням
  ободової кишки — або виразковий коліт (UC) з діагнозом ≥8 років, або
  Crohn-коліт (ураження ≥1/3 ободової кишки) з діагнозом ≥8 років, або
  IBD з супутнім первинним склерозуючим холангітом (PSC) незалежно від
  тривалості (PSC-IBD — найвища-ризикова IBD-підгрупа для
  колоректального раку — кумулятивний CRC ризик ~15-30% за 30 років
  від діагнозу PSC). Поточний діагноз КРР відсутній. Хронічне
  ободове запалення керує колітом-асоційованою дисплазією та КРР через
  inflammation-dysplasia-carcinoma послідовність, відмінну від спорадичного
  КРР (часто виникає з flat dysplasia, мультифокально, важче виявити
  стандартною білою ендоскопією). Спостережувальна колоноскопія з
  хромоендоскопією або high-definition білою ендоскопією знижує
  смертність від КРР у цій популяції. Prevention-persona RedFlag
  (ратифікація §20, 2026-05-18, v0.3 пілот chronic-condition).

