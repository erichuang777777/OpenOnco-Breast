severity: major
priority: 100
category: other

# §20 prevention extension — drives engine routing to PreventionPlan
# when patient carries this RF and no confirmed Disease (KSS §20.2).
risk_category: chronic_condition

# Cancer being prevented: colorectal cancer (DIS-CRC). Long-standing IBD
# with colonic involvement carries cumulative CRC risk increasing over
# time (~2% at 10y, 8% at 20y, 18% at 30y in UC; comparable in Crohn-
# colitis ≥1/3 colon involvement; ~15-30% at 30y in PSC-IBD).
relevant_diseases:
  - DIS-CRC

