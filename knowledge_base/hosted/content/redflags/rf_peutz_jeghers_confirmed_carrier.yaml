reviewer_signoffs: 0
notes: >
  v0.2-B confirmed-carrier surveillance pathway — Peutz-Jeghers / STK11.
  Fires on documented germline STK11 pathogenic variant positivity.
  Engine routes to PreventionPlan recommending:
    (a) IND-PEUTZ-JEGHERS-CARRIER-SURVEILLANCE (standard) — small-bowel
        VCE / MR enterography q2-3y from age 8-10; colonoscopy q2-3y
        from age 18; EGD q2-3y from age 8-10; breast MRI from age 30
        (women); pancreatic EUS / MRI q1-2y from age 30-35; cervical
        Pap with adenoma-malignum awareness; testicular exam (men).
    (b) IND-PEUTZ-JEGHERS-CARRIER-INTENSIFIED (aggressive) — standard
        PLUS earlier pancreatic surveillance initiation + breast risk-
        reducing options discussion.

  STUB pending two-Clinical-Co-Lead signoff per CHARTER §6.1 dev-mode
  exemption.

  Lifetime cancer risk in confirmed STK11 carriers (Hearle et al. Clin
  Cancer Res 2006; ACG 2015):
    - Colorectal: ~39% lifetime
    - Pancreatic adenocarcinoma: ~11-36% lifetime (highest hereditary
      pancreatic-cancer risk of any syndrome)
    - Breast (women): ~32-54% lifetime (comparable to BRCA1/2)
    - Gastric: ~29% lifetime
    - Small-bowel adenocarcinoma: ~13% lifetime (highest hereditary)
    - Ovarian SCTAT (women): ~8-21%
    - Cervical adenoma malignum (minimal-deviation adenocarcinoma):
      ~10%
    - Lung: modest elevation (~7-17%)
    - Testicular Sertoli-cell (large-cell calcifying variant): ~9% in
      men; usually pre-pubertal, benign-acting but hormonally active
    - Childhood intussusception: ~50% by age 20 in untreated PJS
