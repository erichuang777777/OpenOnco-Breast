id: RF-PEUTZ-JEGHERS-CONFIRMED-CARRIER
definition: >-
  Confirmed germline pathogenic / likely-pathogenic variant in the STK11
  (LKB1) gene — Peutz-Jeghers syndrome (PJS). Patient has had germline
  STK11 testing returned positive; the pedigree-suspicion question is
  settled. No current personal cancer diagnosis in the carrier being
  assessed (current cancer routes to treatment-track plan with PJS
  status recorded). Mandates structured multi-organ surveillance from
  childhood given small-bowel intussusception risk (~50% by age 20 in
  untreated PJS) and the highest hereditary small-bowel-cancer and
  pancreatic-cancer risks of any syndrome. Prevention-persona RedFlag
  (§20, v0.2-B confirmed-carrier surveillance pathway — distinct from
  RF-PEUTZ-JEGHERS-FAMILY-HISTORY-SUSPICION which fires before testing).
definition_ua: >-
  Підтверджений гермінативний патогенний / ймовірно-патогенний варіант у
  гені STK11 (LKB1) — синдром Peutz-Jeghers (PJS). Пацієнт пройшов
  germline STK11-тестування з позитивним результатом; питання родовідної
  підозри вирішене. Поточний особистий діагноз раку відсутній. Mandates
  структуроване мульти-органне спостереження з дитячого віку через ризик
  тонкокишкової інвагінації (~50% до 20 років при нелікованому PJS) та
  найвищі hereditary small-bowel + pancreatic cancer ризики серед будь-
  яких синдромів. Prevention-persona RedFlag (§20, v0.2-B шлях
  спостереження підтверджених носіїв).

trigger:
  type: lab_value
  any_of:
