      value: true

clinical_direction: investigate

severity: major
priority: 100
category: other
risk_category: genetic

# PJS-spectrum: CRC (~39%), pancreatic (~11-36% — highest hereditary
# pancreatic-cancer risk), breast (~32-54%, BRCA-comparable), gastric
# (~29%), ovarian SCTAT (~8-21%), cervical adenoma malignum (~10%),
# small-bowel (~13%, highest hereditary) — small-bowel mapped under
# DIS-CRC notes (no dedicated entity).
