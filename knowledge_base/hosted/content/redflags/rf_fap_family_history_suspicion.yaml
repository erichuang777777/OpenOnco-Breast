id: RF-FAP-FAMILY-HISTORY-SUSPICION
definition: >-
  Family pedigree suggestive of Familial Adenomatous Polyposis (FAP) or
  the attenuated FAP (AFAP) / Gardner-variant spectrum: any of (a) a
  family member with a known pathogenic APC variant; (b) classic FAP
  phenotype — >100 colorectal adenomatous polyps in the proband or a
  first/second-degree relative; (c) attenuated FAP phenotype — 10-100
  colorectal adenomas in a relative plus family history of CRC under 60;
  (d) first-degree relative with a confirmed clinical FAP diagnosis;
  (e) family member with extracolonic FAP / Gardner manifestations
  (osteomas, epidermoid cysts, congenital hypertrophy of the retinal
  pigment epithelium [CHRPE], or desmoid tumors). No current personal
  cancer diagnosis in the individual at risk. Prevention-persona
  RedFlag (§20 ratification 2026-05-18, v0.2-B hereditary pilot
  starter).
definition_ua: >-
  Сімейний родовід, що відповідає підозрі на сімейний аденоматозний
  поліпоз (FAP) або attenuated FAP (AFAP) / спектр Gardner-варіанту:
  будь-яке з (а) родич з відомим патогенним APC варіантом; (б)
  класичний FAP фенотип — >100 колоректальних аденоматозних поліпів у
  пробанда або родича першого/другого ступеня; (в) attenuated FAP
  фенотип — 10-100 колоректальних аденом у родича плюс сімейна історія
  КРР під 60 років; (г) родич першого ступеня з підтвердженим клінічним
  діагнозом FAP; (д) родич з позаколоректальними проявами FAP /
  Gardner (остеоми, епідермоїдні кісти, вроджена гіпертрофія
  пігментного епітелію сітківки [CHRPE] або десмоїдні пухлини).
  Поточний особистий діагноз раку у пацієнта з ризиком відсутній.
  Prevention-persona RedFlag (ратифікація §20, 2026-05-18, v0.2-B
  пілот спадковості — starter).

trigger:
  type: lab_value
  any_of:
    - finding: "family_apc_known_pathogenic_variant"
      value: true
    - finding: "family_classic_fap_phenotype"
      value: true
    - finding: "family_attenuated_fap_phenotype"
      value: true
    - finding: "family_first_degree_fap_diagnosed_relative"
      value: true
    - finding: "family_desmoid_tumor_or_extracolonic_fap_manifestations"
      value: true

clinical_direction: investigate

severity: major
priority: 100
category: other

# §20 prevention extension — drives engine routing to PreventionPlan
# when patient carries this RF and no confirmed Disease (KSS §20.2).
risk_category: genetic

# FAP-spectrum cancers (existing KB Disease entities): CRC is the
# anchor (lifetime CRC risk ~100% in classic FAP without colectomy).
# Upper-GI: duodenal adenocarcinoma (~5-10% lifetime risk, captured
# under DIS-PDAC in KB as the closest pancreatic/upper-GI anchor —
# duodenum and pancreatic head share anatomy; FAP-associated duodenal
# polyposis is the actual concern but no DIS-DUODENAL entity exists).
# Gastric fundic-gland polyposis: modest CRC-risk elevation, anchored
# under DIS-GASTRIC. Prostate risk elevated modestly in confirmed FAP
# carriers per NCCN Genetic/Familial High-Risk: Colorectal.
relevant_diseases:
  - DIS-CRC
  - DIS-PDAC
  - DIS-GASTRIC
  - DIS-PROSTATE

shifts_algorithm: []

sources:
  - SRC-ESMO-CRC-2024
  - SRC-NCCN-COLON-2025

last_reviewed: "2026-05-18"
reviewer_signoffs: 0
notes: >
  v0.2-B hereditary pilot — FAP. Fires on pedigree-based suspicion of
  FAP / AFAP / Gardner-variant in an asymptomatic individual (no
  current cancer diagnosis). Engine routes to PreventionPlan
  recommending:
    (a) genetic counseling + germline APC panel testing (modern
        multi-gene panels include MUTYH for MAP differential — note
        that MUTYH-associated polyposis is autosomal recessive vs
        autosomal-dominant FAP) via
        IND-FAP-SUSPICION-PREVENTION-GENETIC-COUNSELING (standard)
    (b) empirical enhanced surveillance for patients declining
        testing via IND-FAP-SUSPICION-PREVENTION-ENHANCED-
        SURVEILLANCE (alternative).

  Triggers correspond to established FAP-suspicion criteria. Patient
  profile is expected to carry these as computed booleans from the
  pedigree input (FHIR FamilyMemberHistory at the data-standards
  layer; computation is a downstream concern not yet implemented).

  STUB pending two-Clinical-Co-Lead signoff per CHARTER §6.1 dev-mode
  exemption. Source-set TODO: NCCN Genetic/Familial High-Risk:
  Colorectal as a new SRC entity (per scope proposal open question
  #7 on license posture); American College of Gastroenterology FAP
  surveillance guidance.

  Confirmed APC carriers (germline mutation positive on panel) route
  to a DIFFERENT prevention pathway (carrier-confirmed surveillance —
  sigmoidoscopy q1-2y from age 10-12 in classic FAP / colonoscopy
  q1-2y in attenuated FAP; upper-GI EGD q1-3y from age 25-30 with
  duodenal-polyp Spigelman staging; prophylactic colectomy late
  teens / early 20s in classic FAP, individualized in AFAP). That
  pathway is v0.2-B follow-up authoring (RF-FAP-CONFIRMED-CARRIER +
  IND-FAP-CARRIER-SURVEILLANCE).

  Lifetime cancer risk in confirmed FAP carriers (NCCN Genetic/
  Familial High-Risk: Colorectal):
    - CRC: ~100% by age 40 in classic FAP without colectomy;
      ~70-80% by age 80 in attenuated FAP
    - Duodenal adenocarcinoma: ~5-10% lifetime
    - Gastric fundic-gland polyposis: ~30-50% (most benign;
      adenocarcinoma transformation rare)
    - Desmoid tumors: ~10-20% lifetime, often post-surgical;
      a leading cause of FAP mortality after CRC
    - Thyroid (papillary cribriform-morular variant): ~1-2%
    - Hepatoblastoma in children of FAP families: ~1-2% under age 5
    - CNS (medulloblastoma — Turcot variant): rare
