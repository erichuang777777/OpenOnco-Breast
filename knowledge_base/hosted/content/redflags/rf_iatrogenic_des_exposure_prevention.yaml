id: RF-IATROGENIC-DES-EXPOSURE-PREVENTION
definition: >-
  In-utero exposure to diethylstilbestrol (DES), a synthetic non-
  steroidal estrogen prescribed to pregnant women 1940s-1970s to
  prevent miscarriage and pregnancy complications (US peak 1947-1971;
  withdrawn for this indication 1971; smaller cohorts in Europe used
  through the late 1970s). Daughters of women who took DES during
  pregnancy ("DES daughters") have a markedly elevated risk of clear-
  cell adenocarcinoma of the vagina and cervix (CCA) — a rare cancer
  with a clear bimodal age distribution: peak at 15-25 years
  (historically detected during the first DES surveillance era) and
  a second elevated-risk window persisting through age 40+; cumulative
  lifetime CCA risk in DES-exposed cohort approximately 1 per 1000
  (vs ~1 per million in unexposed) — IARC Group 1 carcinogen for
  this exact exposure. Additionally elevated: cervical intraepithelial
  neoplasia / carcinoma in situ (CIS), structural Müllerian-tract
  anomalies (T-shaped uterus, cervical hood / ridge), modestly
  elevated breast cancer risk after age 40. DES granddaughters
  (third generation) have limited but inconclusive data signals.
  Cohort is aging (DES daughters born 1940-1971 are now 55-86 years
  old in 2026) — still benefits from clinical-exam surveillance
  given prolonged CCA-risk window. Prevention-persona RedFlag
  (§20 v0.3 iatrogenic pilot).
definition_ua: >-
  Внутрішньоутробна експозиція до diethylstilbestrol (DES) —
  синтетичного нестероїдного естрогену, що призначався вагітним
  жінкам у 1940-1970х для запобігання miscarriage та pregnancy
  complications (US peak 1947-1971; withdrawn 1971; менші когорти
  Європи використовували до кінця 1970х). Дочки жінок, що приймали
  DES ("DES daughters"), мають виражено підвищений ризик clear-cell
  adenocarcinoma vagina та cervix (CCA) — рідкісного раку з чітким
  bimodal age distribution: peak 15-25 років і другий вікно
  підвищеного ризику до 40+ років; кумулятивний lifetime CCA
  ризик у когорті ~1 на 1000 (vs ~1 на million у unexposed) —
  IARC Group 1 канцероген для цієї експозиції. Додатково
  підвищені: cervical intraepithelial neoplasia / carcinoma in
  situ (CIS), структурні аномалії Müllerian tract, модерне
  підвищення breast cancer risk після 40р. Когорта старіє
  (DES daughters народжені 1940-1971, зараз 55-86 років у 2026)
  — все ще benefits від clinical-exam surveillance враховуючи
  prolonged CCA-risk window. RedFlag персони prevention.

trigger:
  type: lab_value
  any_of:
    - finding: "in_utero_des_exposure_documented"
      value: true
    - finding: "des_daughter_history"
      value: true
    - finding: "maternal_pregnancy_des_use"
      value: true

clinical_direction: investigate

severity: major
