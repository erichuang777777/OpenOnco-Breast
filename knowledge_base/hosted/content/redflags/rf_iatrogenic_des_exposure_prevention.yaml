last_reviewed: "2026-05-18"
reviewer_signoffs: 0
notes: >
  Prevention-persona RedFlag for in-utero DES exposure. Engine routes
  to PreventionPlan recommending annual gynecologic exam with
  speculum + bimanual + careful palpation of vaginal walls (specific
  technique for DES daughters per ACOG), colposcopy with vaginal
  + cervical staining for early detection of CCA, cervical cytology
  / HPV co-test on routine cadence, breast surveillance per age-
  appropriate USPSTF cadence. Cohort is aging — bimodal-risk window
  extends past 40y; surveillance does NOT stop at any age cutoff.

  Cancer scope: anchored to DIS-VULVAR-VAGINAL-SCC (closest existing
  Disease entity for vaginal-tract anchor) + DIS-CERVICAL. DES-
  associated cancer is histologically clear-cell adenocarcinoma —
  NOT yet authored as a distinct DIS-VAGINAL-CLEAR-CELL entity;
  histology-specific surveillance considerations carried via the
  indication prose. Future authoring of DIS-VAGINAL-CLEAR-CELL
  recommended.

  Distinct from RF-IATROGENIC-LONG-TERM-HRMNL-CONTRACEPTION-
  PREVENTION (post-natal hormonal exposure, exposure-as-cofactor).
  This is a one-time in-utero developmental exposure — surveillance
  cohort is closed (no new DES daughters); known existing cohort
  remains at lifelong elevated risk.
