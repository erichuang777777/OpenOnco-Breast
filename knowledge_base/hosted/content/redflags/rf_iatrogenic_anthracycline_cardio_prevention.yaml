  - SRC-NCCN-BREAST-2025
  - SRC-NCCN-BCELL-2025

last_reviewed: "2026-05-18"
reviewer_signoffs: 0
notes: "Prevention-persona RedFlag for anthracycline cumulative dose ≥250 mg/m². Cardio surveillance focus (HF / cardiomyopathy); t-AML surveillance overlap covered by separate RF-IATROGENIC-TOPO2-TAML-PREVENTION. Echo q1-5y depending on risk profile (ASCO/COG-LTFU cadence). Engine routes to PreventionPlan recommending baseline + serial echo + BNP. STUB pending two-Clinical-Co-Lead signoff per CHARTER §6.1 dev-mode."
