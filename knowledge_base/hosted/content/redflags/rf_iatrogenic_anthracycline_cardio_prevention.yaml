id: RF-IATROGENIC-ANTHRACYCLINE-CARDIO-PREVENTION
definition: >-
  History of cumulative anthracycline exposure ≥250 mg/m² (doxorubicin
  equivalent) — typically reached in breast cancer adjuvant AC/EC
  regimens, lymphoma CHOP/R-CHOP cohorts ≥6 cycles, pediatric ALL/AML
  induction, sarcoma + germ-cell regimens. Anthracyclines cause dose-
  dependent cardiotoxicity: irreversible cardiomyocyte loss → cardiomyopathy
  → heart failure (HF). Lifetime HF incidence rises with cumulative dose:
  ~5% at 400 mg/m², ~26% at 550 mg/m², ~48% at 700 mg/m² (legacy ANT-
  exposure cohorts). Modern cardioprotection (dexrazoxane, liposomal
  doxorubicin, infusion schedule, baseline + serial echo + BNP/troponin)
  modulate but do not eliminate risk. Concurrent trastuzumab amplifies
  risk. Anthracyclines are also topoisomerase-II inhibitors — patient
  ALSO fires RF-IATROGENIC-TOPO2-TAML-PREVENTION for t-AML surveillance.
  This RF specifically covers cardiac surveillance. Prevention-persona
  RedFlag (§20 v0.3 iatrogenic pilot).
definition_ua: >-
  Історія cumulative anthracycline exposure ≥250 мг/м² (doxorubicin
  equivalent) — типово досягається в breast cancer adjuvant AC/EC
  regimens, lymphoma CHOP/R-CHOP cohorts ≥6 cycles, pediatric ALL/AML
  induction, sarcoma + germ-cell regimens. Anthracyclines викликають
  dose-dependent cardiotoxicity: irreversible cardiomyocyte loss →
  cardiomyopathy → heart failure (HF). Lifetime HF incidence зростає з
  cumulative dose: ~5% при 400 мг/м², ~26% при 550 мг/м², ~48% при
  700 мг/м² (legacy ANT-exposure cohorts). Concurrent trastuzumab
  amplifies risk. Anthracyclines є також topoisomerase-II inhibitors —
  пацієнт ТАКОЖ fires RF-IATROGENIC-TOPO2-TAML-PREVENTION для t-AML
  surveillance. Цей RF специфічно covers cardiac surveillance.

trigger:
  type: lab_value
  any_of:
    - finding: "anthracycline_cumulative_dose_ge_250_mg_m2"
      value: true
    - finding: "anthracycline_with_trastuzumab_exposure"
      value: true
    - finding: "anthracycline_with_chest_radiation_exposure"
      value: true
    - finding: "pediatric_anthracycline_exposure"
      value: true

clinical_direction: investigate

severity: major
priority: 100
category: other

risk_category: iatrogenic

# Anchor DIS-AML — anthracycline t-AML overlap. Cardio surveillance is also for
# this same cohort; engine surfaces both surveillance dimensions via this RF +
# the topo2 t-AML RF.
relevant_diseases:
  - DIS-AML

shifts_algorithm: []

sources:
