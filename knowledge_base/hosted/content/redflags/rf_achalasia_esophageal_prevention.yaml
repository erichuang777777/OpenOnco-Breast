notes: >
  v0.3 chronic-condition prevention pilot — achalasia / esophageal SCC.
  Prevention-persona RedFlag (CHARTER §3 amended 2026-05-18 Path A,
  HCP-mediated). Fires when patient profile shows confirmed achalasia
  AND no confirmed esophageal cancer. Engine routes to PreventionPlan
  with 2 tracks: EGD q2-3y starting 10-15y after achalasia onset
  (IND-ACHALASIA-ESOPHAGEAL-PREVENTION-SURVEILLANCE) as standard;
  symptom-driven observation (IND-ACHALASIA-ESOPHAGEAL-PREVENTION-
  OBSERVATION) as alternative.

  Evidence base:
    - **SCC risk magnitude:** Sandler et al. JAMA 1995 (Mayo cohort,
      RR ~16); Leeuwenburgh et al. Am J Gastroenterol 2010 (Dutch
      national cohort, RR ~28). Latency 10-25y from achalasia onset to
      SCC emergence.
    - **Surveillance evidence:** prospective cohort data limited; ACG
      2013 + ASGE 2015 recommend EGD surveillance q2-3y starting 10-15y
      after diagnosis, with biopsy of any suspicious mucosa. Cancer
      detected at earlier stage when found via surveillance vs symptomatic
      presentation (Leeuwenburgh 2010 — early-stage detection in 75%
      of surveilled vs 25% of unsurveilled).
    - **Post-myotomy Barrett:** ~25-30% develop reflux + Barrett within
      10y after Heller myotomy or POEM; PPI co-therapy recommended;
      Barrett emergence triggers separate Barrett's surveillance
      (RF-BARRETTS-ESOPHAGUS-PREVENTION).

  STUB pending two-Clinical-Co-Lead signoff per CHARTER §6.1 dev-mode
  exemption. SRC-NCCN-BCELL-2025 cited as the v0.3 chronic-condition
  pilot project source per task brief; primary clinical guideline is
  SRC-NCCN-ESOPHAGEAL-2025.
notes_ua: >
  v0.3 пілот prevention chronic-condition — ахалазія / SCC стравоходу.
  Prevention-persona RedFlag (CHARTER §3 поправка 2026-05-18). Спрацьовує
  коли профіль пацієнта показує підтверджену ахалазію ТА відсутній
  підтверджений рак стравоходу. Engine маршрутизує до PreventionPlan з
  2 треками: EGD q2-3 роки починаючи через 10-15 років після початку
  ахалазії (IND-ACHALASIA-ESOPHAGEAL-PREVENTION-SURVEILLANCE) як
  стандарт; symptom-driven observation
  (IND-ACHALASIA-ESOPHAGEAL-PREVENTION-OBSERVATION) як альтернатива.

  Доказова база: відносний ризик SCC ~16-28x (Sandler JAMA 1995;
  Leeuwenburgh AJG 2010); латентність 10-25 років; рання-стадія
  детекція у 75% surveilled vs 25% unsurveilled. Post-myotomy Barrett
  у ~25-30% за 10 років.

  Це STUB, очікує підпис двох Clinical Co-Lead за §6.1 dev-mode
  exemption.
