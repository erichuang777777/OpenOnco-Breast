id: RF-ACHALASIA-ESOPHAGEAL-PREVENTION
definition: >-
  Achalasia (primary esophageal motor disorder with impaired LES
  relaxation and loss of esophageal peristalsis, diagnosed by
  high-resolution manometry per Chicago classification) in an individual
  without a current esophageal cancer diagnosis. Long-standing chronic
  food stasis and esophagitis confer markedly elevated esophageal SCC
  risk (relative risk ~16-50x population baseline; absolute risk
  ~0.3-1%/year emerging 10-25 years after achalasia onset). Esophageal
  adenocarcinoma risk is also elevated in achalasia patients with
  secondary Barrett's after surgical or pneumatic myotomy. Endoscopic
  surveillance starting 10-15 years after achalasia diagnosis is the
  standard secondary-prevention strategy. Prevention-persona RedFlag
  (§20 ratification 2026-05-18, v0.3 chronic-condition pilot).
definition_ua: >-
  Ахалазія (первинне розлад моторики стравоходу з порушенням
  релаксації нижнього езофагеального сфінктера та втратою перистальтики
  стравоходу, діагностована high-resolution манометрією per Chicago
  classification) у пацієнта без поточного діагнозу раку стравоходу.
  Тривалий хронічний стаз їжі та езофагіт зумовлюють значно підвищений
  ризик плоскоклітинного раку стравоходу (відносний ризик ~16-50x
  популяційного базового; абсолютний ризик ~0,3-1%/рік, що з'являється
  через 10-25 років після початку ахалазії). Ризик аденокарциноми
  стравоходу також підвищений у пацієнтів з ахалазією з вторинним
  Barrett після хірургічної або пневматичної міотомії. Ендоскопічне
  спостереження починаючи через 10-15 років після діагнозу ахалазії —
  стандартна secondary-prevention стратегія. Prevention-persona RedFlag
  (ратифікація §20, 2026-05-18, v0.3 пілот chronic-condition).

