id: RF-LI-FRAUMENI-CONFIRMED-CARRIER
definition: >-
  Patient has a confirmed germline TP53 pathogenic variant (positive
  germline test, distinct from pedigree-suspicion phase). Toronto Protocol
  whole-body MRI-based surveillance applies. Confirmed-carrier RedFlag
  (§20, v0.2-B follow-on to RF-LI-FRAUMENI-FAMILY-HISTORY-SUSPICION).
definition_ua: >-
  Пацієнт має підтверджений germline TP53 патогенний варіант. Toronto
  Protocol whole-body MRI-based surveillance застосовується.

trigger:
  type: lab_value
  any_of:
