notes: "Prevention-persona confirmed-carrier RedFlag for Li-Fraumeni syndrome. Engine routes to PreventionPlan recommending Toronto Protocol whole-body MRI + brain MRI + colonoscopy from 25 + breast MRI from 20-25 (women) + AVOID radiation. STUB pending two-Clinical-Co-Lead signoff."
