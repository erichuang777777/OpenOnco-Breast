reviewer_signoffs: 0
notes: "Prevention-persona RedFlag for combined low calcium intake + vitamin D deficiency. WCRF/AICR probable-evidence for calcium and CRC; IARC pooled signal for vitamin D status. RCT evidence for supplementation is mixed at population doses — counseling emphasizes adequate intake/repletion not pharmacologic dosing. Engine routes to PreventionPlan recommending dietary counseling + vitamin D repletion + CRC screening per USPSTF. STUB pending two-Clinical-Co-Lead signoff per CHARTER §6.1 dev-mode."
