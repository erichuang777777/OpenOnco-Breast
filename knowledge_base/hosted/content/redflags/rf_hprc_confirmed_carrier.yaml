notes: >
  v0.2-B confirmed-carrier surveillance pathway — HPRC / MET. Fires on
  documented germline MET pathogenic variant positivity. Engine routes
  to PreventionPlan recommending:
    (a) IND-HPRC-CARRIER-SURVEILLANCE (standard) — annual abdominal
        MRI from age 30 (or 10 years before youngest family RCC);
        nephron-sparing surgery threshold ≥3 cm; active surveillance
        permissible for smaller lesions (HPRC-RCC less aggressive than
        HLRCC type-2-papillary).
    (b) IND-HPRC-CARRIER-INTENSIFIED (aggressive) — earlier surveillance
        initiation + lower surgical threshold for atypical / rapidly
        growing lesions.

  STUB pending two-Clinical-Co-Lead signoff per CHARTER §6.1 dev-mode
  exemption. Source-set TODO: dedicated HPRC surveillance source —
  Schmidt et al. JNCI; Linehan / Marston Linehan group recommendations
  — v0.2-B authoring backlog new SRC entities.

  Clinical features of confirmed MET carriers (Schmidt et al. 1997; NCI
  Urologic Oncology Branch experience):
    - Bilateral, multifocal type-1 papillary RCC; lifetime risk
      approaches 100% with extended follow-up
    - Indolent biology — many tumors enlarge slowly; metastatic
      potential lower than HLRCC type-2-papillary
    - Surveillance modality preference: MRI (radiation-sparing for
      lifelong cadence) > contrast-enhanced CT
    - Surgical strategy: nephron-sparing partial nephrectomy for
      lesions ≥3 cm; enucleation often feasible given lesion biology;
      active surveillance acceptable for sub-3-cm lesions in shared-
      decision-making
