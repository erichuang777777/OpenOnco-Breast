id: RF-HPRC-CONFIRMED-CARRIER
definition: >-
  Confirmed germline pathogenic / likely-pathogenic variant in the MET
  proto-oncogene — Hereditary Papillary Renal Cancer (HPRC), autosomal
  dominant type-1-papillary RCC predisposition. Patient has had germline
  MET testing returned positive; the pedigree-suspicion question is
  settled. No current personal cancer diagnosis in the carrier being
  assessed. Mandates structured renal surveillance with annual
  abdominal MRI from age 30 (or 10 years before youngest family RCC).
  HPRC tumors are typically bilateral, multifocal, indolent type-1
  papillary — less aggressive than HLRCC (FH-driven type-2 papillary) —
  enabling active surveillance for sub-3-cm lesions and nephron-sparing
  surgery as the dominant interventional strategy. Prevention-persona
  RedFlag (§20, v0.2-B confirmed-carrier surveillance pathway —
  distinct from RF-HPRC-FAMILY-HISTORY-SUSPICION which fires before
  testing).
definition_ua: >-
  Підтверджений гермінативний патогенний / ймовірно-патогенний варіант у
  гені MET — Hereditary Papillary Renal Cancer (HPRC), autosomal
  dominant type-1-papillary RCC predisposition. Пацієнт пройшов germline
  MET-тестування з позитивним результатом; питання родовідної підозри
  вирішене. Поточний особистий діагноз раку відсутній. Mandates
  структуроване renal surveillance з annual abdominal MRI з 30 років
  (або 10 років до наймолодшого family RCC). HPRC пухлини зазвичай
  bilateral, multifocal, indolent type-1 papillary — менш агресивні ніж
  HLRCC — дозволяють active surveillance для sub-3-cm lesions та
  nephron-sparing surgery. Prevention-persona RedFlag (§20, v0.2-B
  шлях спостереження підтверджених носіїв).

