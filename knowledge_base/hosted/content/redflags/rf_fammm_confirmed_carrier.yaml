id: RF-FAMMM-CONFIRMED-CARRIER
definition: >-
  Confirmed germline pathogenic / likely-pathogenic variant in the
  CDKN2A (p16-INK4a) gene — Familial Atypical Multiple Mole Melanoma
  syndrome (FAMMM). Patient has had germline CDKN2A testing returned
  positive; the pedigree-suspicion question is settled. No current
  personal cancer diagnosis in the carrier being assessed. Mandates
  structured surveillance: lifetime melanoma risk ~60-80% (cutaneous,
  occasionally ocular) and pancreatic adenocarcinoma risk ~15-25%
  (CDKN2A is one of few hereditary syndromes with sufficient absolute
  pancreatic-cancer risk to justify CAPS Consortium-eligible
  surveillance). Prevention-persona RedFlag (§20, v0.2-B confirmed-
  carrier surveillance pathway — distinct from RF-FAMMM-FAMILY-HISTORY-
  SUSPICION which fires before testing).
definition_ua: >-
  Підтверджений гермінативний патогенний / ймовірно-патогенний варіант у
  гені CDKN2A (p16-INK4a) — синдром Familial Atypical Multiple Mole
  Melanoma (FAMMM). Пацієнт пройшов germline CDKN2A-тестування з
  позитивним результатом; питання родовідної підозри вирішене. Поточний
  особистий діагноз раку відсутній. Mandates структуроване спостереження:
  lifetime melanoma ризик ~60-80% (шкірна, occasionally ocular) та
  pancreatic adenocarcinoma ризик ~15-25% (CDKN2A — один з небагатьох
  спадкових синдромів зі sufficient absolute pancreatic-cancer ризиком
  для CAPS Consortium-eligible surveillance). Prevention-persona RedFlag
  (§20, v0.2-B шлях спостереження підтверджених носіїв).

