notes: >
  v0.2-B confirmed-carrier surveillance pathway — FAMMM / CDKN2A. Fires
  on documented germline CDKN2A pathogenic variant positivity. Engine
  routes to PreventionPlan recommending:
    (a) IND-FAMMM-CARRIER-SURVEILLANCE (standard) — annual whole-body
        skin exam by dermatologist + total body photography + dermoscopy;
        pancreatic surveillance EUS / MRI q1-2y from age 40 (CAPS
        Consortium-eligible); sun-protection counseling; family cascade
        testing offered.
    (b) IND-FAMMM-CARRIER-INTENSIFIED (aggressive) — standard PLUS
        earlier pancreatic surveillance initiation (age 30-35 if smoker
        or family pancreatic cancer < 50) + intensified sun-avoidance
        program (avoidance + structural barriers + chemoprotection
        adjuncts).

  STUB pending two-Clinical-Co-Lead signoff per CHARTER §6.1 dev-mode
  exemption. Source-set TODO: dedicated CDKN2A surveillance source —
  Goldstein et al. melanoma-pancreas family registry recommendations;
  CAPS Consortium pancreatic-cancer surveillance consensus (Goggins
  et al. Gut 2020).

  Lifetime cancer risk in confirmed CDKN2A carriers (Goldstein et al.
  J Med Genet 2007; updated estimates):
    - Cutaneous melanoma: ~60-80% lifetime; often multiple primaries
      across lifetime
    - Pancreatic adenocarcinoma: ~15-25% lifetime; smoking is the
      strongest modifiable cofactor (multiplicatively elevates risk)
    - Uveal melanoma: modest elevation (smaller than BAP1-TPDS)
    - Squamous-cell carcinoma + basal-cell carcinoma: elevated via
      chronic sun damage in atypical-nevus phenotype carriers
