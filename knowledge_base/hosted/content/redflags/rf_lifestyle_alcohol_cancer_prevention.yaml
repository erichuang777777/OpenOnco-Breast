id: RF-LIFESTYLE-ALCOHOL-CANCER-PREVENTION
definition: >-
  Heavy alcohol consumption — defined as >14 drinks/week (women) or
  >21 drinks/week (men) per US DHHS / WHO thresholds — OR
  cumulative lifetime alcohol use ≥40 drink-years. IARC Group 1
  carcinogen — established etiological driver of head + neck
  squamous cell carcinoma (oral cavity + oropharynx + larynx +
  hypopharynx), esophageal SCC, hepatocellular carcinoma (via
  cirrhosis), colorectal cancer, female breast cancer (dose-
  response from ≥1 drink/day), and probably pancreatic + gastric.
  Alcohol-tobacco interaction is multiplicative for oral-pharyngeal-
  laryngeal-esophageal-SCC. Cessation / moderation produces
  meaningful cancer-incidence reduction over decades. Prevention-
  persona RedFlag (§20 v0.3 lifestyle pilot).
definition_ua: >-
  Важке вживання алкоголю — визначається як >14 напоїв/тиждень
  (жінки) або >21 напоїв/тиждень (чоловіки) за US DHHS / WHO
  thresholds — АБО кумулятивне lifetime alcohol use ≥40 drink-years.
  IARC Group 1 канцероген — встановлений етіологічний драйвер раку
  голови + шиї (порожнина рота + ротоглотка + гортань + гіпофаринкс),
  esophageal SCC, гепатоцелюлярної карциноми (через цироз),
  колоректального раку, раку молочної залози у жінок (dose-response
  від ≥1 напою/день), і ймовірно панкреатичного + шлункового.

trigger:
  type: lab_value
  any_of:
