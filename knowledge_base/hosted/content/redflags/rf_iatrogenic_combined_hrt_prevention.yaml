id: RF-IATROGENIC-COMBINED-HRT-PREVENTION
definition: >-
  Cumulative use of combined hormone replacement therapy (estrogen +
  progestin / progestogen) ≥5 years in postmenopausal women — IARC
  Group 1 carcinogen (combined menopausal therapy). Elevated risk
  profile: breast cancer +1.2-1.7x with current use, magnitude scaling
  with duration (~+8 cases per 10,000 woman-years per WHI Combined-HRT
  arm at year 5), effect attenuates within 5-10 years of stopping;
  endometrial cancer risk depends on regimen: continuous combined HRT
  (daily estrogen + daily progestin) NEUTRAL or slightly protective vs
  no HRT (~RR 1.0-1.1) — the progestin opposes estrogen-driven
  endometrial proliferation. Sequential / cyclic combined regimens
  (estrogen daily + progestin 10-14 days/month) carry a smaller but
  measurable endometrial-cancer signal (~RR 1.2-1.5) vs continuous
  combined. Estrogen-ALONE HRT in a woman with intact uterus carries
  marked endometrial cancer risk (~RR 5-10) — contraindicated in
  intact-uterus women; covered by separate guideline-level safety
  prohibition rather than this RF. Modest ovarian-cancer signal
  (+1.2-1.4x at ≥5y exposure) per Collaborative Group on Epidemiological
  Studies of Ovarian Cancer 2015. Prevention-persona RedFlag —
  shared decision-making framework with patient: continued HRT
  use if vasomotor symptom benefit > breast/cardiovascular risk
  on individualized basis. NOT a recommendation to stop HRT
  automatically. Prevention-persona RedFlag (§20 v0.3 iatrogenic
  pilot).
definition_ua: >-
  Кумулятивне використання combined HRT (естроген + прогестин /
  прогестоген) ≥5 років у postmenopausal жінок — IARC Group 1
  канцероген (combined menopausal therapy). Підвищений risk profile:
  breast cancer +1.2-1.7x з current use, magnitude масштабує з
  duration (~+8 випадків на 10,000 woman-years per WHI Combined-HRT
  arm на 5р), ефект згасає протягом 5-10р після зупинки; ризик
  endometrial cancer залежить від режиму: continuous combined HRT
  (щоденно estrogen + daily progestin) НЕЙТРАЛЬНИЙ або злегка
  protective (~RR 1.0-1.1); sequential / cyclic combined regimens
  carry менший але measurable endometrial-cancer signal (~RR 1.2-1.5).
  Estrogen-ALONE HRT у intact-uterus woman carries marked endometrial
  cancer ризик (~RR 5-10) — contraindicated у intact-uterus жінок.
  Модерний ovarian-cancer signal (+1.2-1.4x при ≥5р). RedFlag
  персони prevention — shared decision-making framework: continued
  HRT use якщо vasomotor symptom benefit > breast / cardiovascular
  ризик. НЕ recommendation зупинити HRT автоматично.

