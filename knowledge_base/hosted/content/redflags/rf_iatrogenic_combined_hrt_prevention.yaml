notes: "Prevention-persona RedFlag for combined HRT exposure ≥5y. Engine routes to PreventionPlan recommending (1) shared-decision discussion of risk-benefit (vasomotor symptoms, bone-density preservation vs breast / VTE / cardiovascular risks), (2) lowest-effective-dose + shortest-duration principle per NAMS / ACOG, (3) breast surveillance per USPSTF cadence — supplemental imaging not recommended on HRT alone (density-related supplemental imaging is a separate axis), (4) symptom-prompted endometrial workup (any abnormal bleeding → TVUS + biopsy) for women on sequential/cyclic combined or with intact uterus on any HRT, (5) annual GYN exam. Distinct from RF-IATROGENIC-TAMOXIFEN-ENDOMETRIAL-PREVENTION (different mechanism: SERM with partial endometrial agonism). STUB pending two-Clinical-Co-Lead signoff per CHARTER §6.1 dev-mode."
