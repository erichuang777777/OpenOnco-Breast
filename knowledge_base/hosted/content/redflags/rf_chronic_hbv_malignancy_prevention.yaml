id: RF-CHRONIC-HBV-MALIGNANCY-PREVENTION
definition: >-
  Chronic Hepatitis B infection (HBsAg+ ≥6 months OR HBV-DNA detectable
  ≥6 months) in an individual without a current HCC or HBV-associated
  lymphoma diagnosis. IARC Group 1 carcinogen (HBV) — established
  etiological driver of HCC (lifetime risk 15-25% in untreated chronic
  HBV per WHO; 5-10x reduction with antiviral suppression) and a
  contributor to B-cell NHL (HCC the dominant cancer outcome).
  Long-term nucleos(t)ide analog suppression (entecavir / tenofovir
  TDF or TAF) reduces HCC incidence. Prevention-persona RedFlag
  (§20 ratification 2026-05-18).
definition_ua: >-
  Хронічна інфекція Hepatitis B (HBsAg+ ≥6 міс АБО HBV-ДНК визначувана
  ≥6 міс) у пацієнта без поточного діагнозу ГЦК або HBV-асоційованої
  лімфоми. HBV — канцероген IARC Group 1, встановлений етіологічний
  драйвер ГЦК (lifetime ризик 15-25% у нелікованому хронічному HBV за
  WHO; зниження 5-10x з антивірусною супресією) і фактор для B-клітинної
  НХЛ (ГЦК — домінуючий онкологічний результат). Тривала супресія
  nucleos(t)ide аналогами (entecavir / tenofovir TDF або TAF) знижує
  захворюваність ГЦК. RedFlag персони prevention (ратифікація §20,
  2026-05-18).

