last_reviewed: "2026-05-18"
reviewer_signoffs: 0
notes: >
  Prevention-persona RedFlag for HBV-associated cancer prevention.
  Fires on HBsAg+ OR detectable HBV-DNA in patient without HCC. Engine
  routes to PreventionPlan recommending nucleos(t)ide analog suppression
  (per IND-CHRONIC-HBV-PREVENTION-ANTIVIRAL) + AFP+US HCC surveillance
  q6mo per AASLD protocol. STUB pending Co-Lead review.

  Cancer scope: anchor target DIS-HCC. HBV-associated DLBCL/NHL is also
  documented in literature but with weaker effect-size data than the
  HCV-NHL link; covered via the broader NHL prevention surveillance
  bullet in the antiviral indication rationale.

  Distinct from RF-UNIVERSAL-HBV-REACTIVATION-RISK (existing) which is
  the treatment-time RF for HBV reactivation during anti-CD20 / chemo.
