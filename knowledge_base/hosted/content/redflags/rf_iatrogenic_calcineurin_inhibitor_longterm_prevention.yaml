id: RF-IATROGENIC-CALCINEURIN-INHIBITOR-LONGTERM-PREVENTION
definition: >-
  Long-term calcineurin-inhibitor exposure ≥5 years — cyclosporine
  or tacrolimus (prograf, FK-506) — across transplant, autoimmune
  (psoriasis, atopic dermatitis, refractory nephrotic syndrome),
  and ophthalmologic / other indications. IARC Group 1 carcinogen
  (cyclosporine). Mechanism: direct calcineurin-pathway suppression
  of T-cell function plus pro-oncogenic effects (TGF-β upregulation,
  IL-6 induction, impaired DNA repair, anti-apoptotic signaling).
  Risk profile: cutaneous squamous-cell carcinoma 65-100x background
  in transplant cohort (calcineurin-inhibitors are a primary driver
  of this excess), basal-cell carcinoma 10-20x, aggressive SCC
  variant prone to local recurrence + perineural invasion + nodal
  metastasis; Kaposi sarcoma in HHV-8-exposed cohort (KSHV
  reactivation under calcineurin inhibition); cutaneous T-cell
  lymphoma (less common); lip cancer (cumulative UV co-factor);
  modest increase in non-cutaneous cancers (lymphoma, post-transplant
  lymphoproliferative disorder). Cancer signal generally higher with
  cyclosporine than tacrolimus in head-to-head comparisons;
  cyclosporine has the more robust IARC Group 1 designation.
  Prevention-persona RedFlag — emphasis on intensive skin
  surveillance, sun protection, HPV vaccination catch-up, and
  shared-decision discussion of switch to mTOR inhibitor
  (sirolimus / everolimus) in the high-skin-cancer-burden cohort
  (CONVERT trial + ProSparc evidence: mTOR switch reduces new
  SCC incidence). NEVER unilateral switch — coordinated with
  transplant nephrologist / hepatologist / cardiologist or
  dermatologist as appropriate. (§20 v0.3 iatrogenic pilot).
definition_ua: >-
  Тривала експозиція до calcineurin-інгібіторів ≥5 років —
  cyclosporine або tacrolimus — у transplant, autoimmune
  (psoriasis, atopic dermatitis, refractory nephrotic syndrome)
  та ophthalmologic / інших показів. IARC Group 1 канцероген
  (cyclosporine). Risk profile: cutaneous SCC 65-100x background
  у transplant cohort (calcineurin-inhibitors — primary driver),
  BCC 10-20x, aggressive SCC variant; Kaposi sarcoma у HHV-8-
  exposed cohort; cutaneous T-cell lymphoma; lip cancer; modest
  підвищення non-cutaneous cancers. Cancer signal generally
  вище з cyclosporine ніж tacrolimus у head-to-head comparisons.
  RedFlag персони prevention — інтенсивний skin surveillance,
  sun protection, HPV vaccination catch-up, shared-decision
  switch на mTOR inhibitor (sirolimus / everolimus) у high-skin-
  cancer-burden cohort (CONVERT + ProSparc evidence). НІКОЛИ
  unilateral switch — координовано з transplant team /
  dermatologist.

