notes: >
  Prevention-persona RedFlag for long-term ≥5y calcineurin-inhibitor
  exposure (cyclosporine or tacrolimus). Engine routes to
  PreventionPlan recommending (1) annual or q6mo whole-body skin
  exam by dermatologist (q6mo if any prior skin cancer), (2)
  aggressive sun-protection counseling, (3) HHV-8 awareness in
  endemic cohorts + KS surveillance (skin, oral, GI), (4) HPV
  vaccination catch-up if transplant context, (5) shared-decision
  discussion with transplant team of switch to mTOR inhibitor
  (sirolimus / everolimus) in patients with cumulative skin-
  cancer burden — CONVERT + ProSparc evidence: mTOR-switch
  reduces new SCC. Anchored to DIS-KAPOSI + DIS-BCC. Distinct
  from broader RF-IATROGENIC-TRANSPLANT-IMMUNOSUPPRESSION-* RFs
  by drug-class specificity — applies also to non-transplant
  calcineurin-inhibitor users (psoriasis, atopic dermatitis,
  nephrotic syndrome). STUB pending two-Clinical-Co-Lead signoff
  per CHARTER §6.1 dev-mode.
