notes: "Prevention-persona RedFlag for prior topoisomerase-II inhibitor exposure. Distinct from alkylator t-AML: shorter latency (2-3y vs 5-7y), characteristic 11q23/21q22 cytogenetics, often APL-like t(15;17). Engine routes to PreventionPlan recommending CBC q3mo for first 5y post-chemo + low threshold for marrow evaluation. STUB pending two-Clinical-Co-Lead signoff per CHARTER §6.1 dev-mode. Note: anthracycline exposure also fires RF-IATROGENIC-ANTHRACYCLINE-CARDIO-PREVENTION (separate cardio + t-AML surveillance overlap)."
