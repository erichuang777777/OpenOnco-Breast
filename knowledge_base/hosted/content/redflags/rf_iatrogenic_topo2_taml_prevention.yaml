id: RF-IATROGENIC-TOPO2-TAML-PREVENTION
definition: >-
  History of prior topoisomerase-II inhibitor exposure — etoposide,
  teniposide, anthracyclines (doxorubicin, daunorubicin, epirubicin,
  idarubicin, mitoxantrone) — ≥1 year prior. Therapy-related AML following
  topoisomerase-II-inhibitor exposure has distinctive features that
  differ from alkylator-related t-AML: SHORTER median latency (2-3
  years post-exposure vs 5-7y for alkylators), characteristic
  cytogenetics with balanced translocations involving 11q23 (KMT2A/MLL),
  21q22 (RUNX1), or t(15;17) (PML-RARA, APL-like), absence of preceding
  MDS phase, lower TP53 mutation frequency. Higher per-dose risk than
  alkylators in some series. Highest risk: breast cancer survivors
  (anthracycline + cyclophosphamide), pediatric ALL/AML survivors
  (etoposide), testicular cancer survivors (etoposide in BEP).
  Prevention-persona RedFlag (§20 v0.3 iatrogenic pilot).
definition_ua: >-
  Історія prior topoisomerase-II inhibitor exposure — etoposide, teniposide,
  anthracyclines (doxorubicin, daunorubicin, epirubicin, idarubicin,
  mitoxantrone) — ≥1 рік тому. Therapy-related AML після topoisomerase-II-
  inhibitor exposure має distinctive features порівняно з alkylator-related
  t-AML: КОРОТША median latency (2-3 роки post-exposure vs 5-7р для
  alkylators), characteristic cytogenetics з balanced translocations
  involving 11q23 (KMT2A/MLL), 21q22 (RUNX1), або t(15;17) (PML-RARA,
  APL-like), відсутність preceding MDS phase, нижча TP53 mutation
  frequency. Higher per-dose risk than alkylators в деяких series.
  Highest risk: breast cancer survivors, pediatric ALL/AML survivors,
  testicular cancer survivors (etoposide в BEP).

