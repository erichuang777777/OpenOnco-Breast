id: RF-BARRETTS-ESOPHAGUS-PREVENTION
definition: >-
  Barrett's esophagus (intestinal metaplasia of the distal esophagus with
  goblet cells on biopsy after EGD performed for chronic GERD or
  Barrett's-specific surveillance) in an individual without a current
  esophageal adenocarcinoma diagnosis. Established precursor lesion to
  esophageal adenocarcinoma — annual progression rates: non-dysplastic
  Barrett's ~0.1-0.3%/year to EAC, low-grade dysplasia (LGD) ~0.7-2%/year,
  high-grade dysplasia (HGD) ~7-19%/year. Endoscopic surveillance and
  endoscopic eradication therapy (radiofrequency ablation, endoscopic
  mucosal resection) for dysplastic Barrett's substantially reduce EAC
  incidence and mortality. Prevention-persona RedFlag (§20 ratification
  2026-05-18, v0.3 chronic-condition pilot).
definition_ua: >-
  Стравохід Барретта (кишкова метаплазія дистального стравоходу з
  келихоподібними клітинами на біопсії після EGD, виконаної з приводу
  хронічного ГЕРХ або Barrett-специфічного спостереження) у пацієнта без
  поточного діагнозу аденокарциноми стравоходу. Встановлена передракова
  патологія аденокарциноми стравоходу — щорічні показники прогресії:
  не-дисплазійний Barrett ~0.1-0.3%/рік до EAC, дисплазія низького
  ступеня (LGD) ~0.7-2%/рік, дисплазія високого ступеня (HGD)
  ~7-19%/рік. Ендоскопічне спостереження та ендоскопічна ерадикаційна
  терапія (радіочастотна абляція, ендоскопічна резекція слизової) для
  дисплазійного Barrett суттєво знижують захворюваність EAC та
  смертність. Prevention-persona RedFlag (ратифікація §20, 2026-05-18,
  v0.3 пілот chronic-condition).

trigger:
  type: lab_value
  any_of:
    - finding: "barretts_esophagus_diagnosis_confirmed"
      value: true
    - finding: "barretts_esophagus_with_dysplasia_low_grade"
      value: true
    - finding: "barretts_esophagus_with_dysplasia_high_grade"
      value: true

clinical_direction: investigate

severity: major
priority: 100
category: other

# §20 prevention extension — drives engine routing to PreventionPlan
# when patient carries this RF and no confirmed Disease (KSS §20.2).
risk_category: chronic_condition

# Cancer being prevented: esophageal adenocarcinoma (EAC), captured in
# OpenOnco KB as DIS-ESOPHAGEAL. Barrett's metaplasia is the established
# precursor lesion; risk escalates with dysplasia grade.
relevant_diseases:
  - DIS-ESOPHAGEAL

shifts_algorithm: []

