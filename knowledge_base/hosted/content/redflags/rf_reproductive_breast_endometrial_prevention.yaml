id: RF-REPRODUCTIVE-BREAST-ENDOMETRIAL-PREVENTION
definition: >-
  Reproductive-history risk factors for hormone-driven cancers (breast +
  endometrial + ovarian primarily): nulliparity, late first pregnancy
  (≥30 years), early menarche (<12 years), late menopause (≥55 years),
  combined hormone replacement therapy (HRT) ≥5 years, OR persistent
  anovulation (PCOS, perimenopause). Each independently confers modest
  RR ~1.2-1.5 for hormone-receptor-positive breast cancer + endometrial
  cancer. Cumulative effect non-trivial. Prevention-persona RedFlag
  (§20 v0.3 reproductive).
definition_ua: >-
  Reproductive-history risk factors для hormone-driven cancers: nulliparity,
  late first pregnancy (≥30 років), early menarche (<12 років), late
  menopause (≥55 років), combined HRT ≥5 років АБО persistent anovulation
  (PCOS, перименопауза). Кожний незалежно дає modest RR ~1.2-1.5 для
  hormone-receptor-positive breast cancer + endometrial cancer.

trigger:
  type: lab_value
  any_of:
    - finding: "nulliparous_age_ge_30"
      value: true
    - finding: "early_menarche_age_lt_12"
      value: true
    - finding: "late_menopause_age_ge_55"
      value: true
    - finding: "combined_hrt_use_ge_5y"
      value: true
    - finding: "persistent_anovulation_or_pcos"
      value: true

