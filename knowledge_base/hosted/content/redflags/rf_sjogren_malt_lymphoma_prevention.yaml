# Cancer being prevented: extranodal marginal zone (MALT) lymphoma of
# salivary/lacrimal glands. Closest in-KB anchor is DIS-HCV-MZL
# (marginal zone lymphoma entity); a dedicated DIS-SALIVARY-MALT entity
# would be a future authoring task.
