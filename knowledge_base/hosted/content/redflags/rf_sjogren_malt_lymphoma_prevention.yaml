id: RF-SJOGREN-MALT-LYMPHOMA-PREVENTION
definition: >-
  Primary Sjögren's syndrome (chronic autoimmune exocrinopathy with
  characteristic anti-Ro/SSA ± anti-La/SSB autoantibodies and
  histologic focal lymphocytic infiltration of minor salivary glands;
  EULAR/ACR 2016 classification criteria) in an individual without a
  current lymphoma diagnosis. The strongest hematologic-cancer risk
  factor among rheumatic diseases — ~15-20x relative risk for marginal
  zone (MALT) lymphoma, predominantly arising in parotid and lacrimal
  glands, with lifetime incidence ~5-10%. Risk concentrated in
  patients with persistent parotid swelling, palpable purpura,
  cryoglobulinemia, low C4 complement, monoclonal gammopathy, lymph-
  node enlargement, or high EULAR Sjögren's Disease Activity Index
  (ESSDAI). Annual examination targeting parotid/lacrimal swelling
  + lab monitoring (cryoglobulins, C4, SPEP, immunoglobulins) enables
  earliest-stage MALT detection. Prevention-persona RedFlag (§20
  ratification 2026-05-18, v0.3 chronic-condition pilot).
definition_ua: >-
  Первинний синдром Шегрена (хронічна автоімунна екзокринопатія з
  характерними анти-Ro/SSA ± анти-La/SSB автоантитілами та гістологічно
  focal лімфоцитарною інфільтрацією малих слинних залоз; EULAR/ACR
  2016 критерії класифікації) у пацієнта без поточного діагнозу
  лімфоми. Найсильніший hematologic-cancer фактор ризику серед
  ревматичних захворювань — ~15-20x відносний ризик marginal zone
  (MALT) лімфоми, переважно у привушних та слізних залозах, з
  lifetime-incidence ~5-10%. Ризик концентрований у пацієнтів з
  persistent привушним набряком, palpable purpura, кріоглобулінемією,
  низьким C4 комплементом, моноклональною гаммапатією, збільшенням
  лімфовузлів, або високим EULAR Sjögren's Disease Activity Index
  (ESSDAI). Щорічне обстеження таргетуючи привушний/слізний набряк +
  лабораторний моніторинг (кріоглобуліни, C4, SPEP, імуноглобуліни)
  забезпечує earliest-stage MALT детекцію. Prevention-persona RedFlag
  (ратифікація §20, 2026-05-18, v0.3 пілот chronic-condition).

