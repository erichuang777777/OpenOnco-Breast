notes: >
  v0.3 chronic-condition prevention pilot — Sjögren's syndrome / MALT
  lymphoma. Prevention-persona RedFlag (CHARTER §3 amended 2026-05-18
  Path A, HCP-mediated). Fires when patient profile shows confirmed
  primary Sjögren's syndrome AND no confirmed lymphoma. Engine routes
  to PreventionPlan with 2 tracks: annual physical exam + lab
  monitoring + parotid US for any new/persistent swelling
  (IND-SJOGREN-MALT-LYMPHOMA-PREVENTION-SURVEILLANCE) as standard;
  rheumatology-driven observation with lymphoma workup only on
  clinical suspicion (IND-SJOGREN-MALT-LYMPHOMA-PREVENTION-OBSERVATION)
  as alternative.

  Evidence base:
    - **Lymphoma risk magnitude:** Theander et al. Ann Rheum Dis 2006
      (Swedish cohort, SIR ~15.6); Solans-Laqué et al. Semin Arthritis
      Rheum 2011 (meta-analysis, RR ~13-19). MALT lymphoma comprises
      ~60-70% of Sjögren-related lymphomas; DLBCL ~20-25%; nodal
      marginal zone + others remainder.
    - **Predictive features:** Brito-Zerón et al. Ann Rheum Dis 2014
      (multicenter cohort) — predictors: persistent salivary swelling
      (OR ~3), low C4 (OR ~2.5), cryoglobulinemia (OR ~2.5), palpable
      purpura (OR ~2), monoclonal gammopathy (OR ~2). Patients with
      ≥3 features carry markedly higher lymphoma risk.
    - **Surveillance recommendations:** EULAR 2020 (Ramos-Casals et al.
      Ann Rheum Dis 2020) — annual clinical assessment for lymphoma
      red flags; parotid US for new/persistent unilateral swelling
      (US-guided core biopsy if findings suggestive of lymphoid
      lesion).

  STUB pending two-Clinical-Co-Lead signoff per CHARTER §6.1 dev-mode
  exemption. Future enhancement: a dedicated DIS-SALIVARY-MALT entity
  would allow more precise treatment-side Indication anchoring.
notes_ua: >
  v0.3 пілот prevention chronic-condition — синдром Шегрена / MALT
  лімфома. Prevention-persona RedFlag (CHARTER §3 поправка 2026-05-18).
  Спрацьовує коли профіль пацієнта показує підтверджений первинний
  синдром Шегрена ТА відсутній підтверджений діагноз лімфоми. Engine
  маршрутизує до PreventionPlan з 2 треками: щорічне фізикальне
  обстеження + лабораторний моніторинг + parotid US для будь-якого
  нового/persistent набряку
  (IND-SJOGREN-MALT-LYMPHOMA-PREVENTION-SURVEILLANCE) як стандарт;
  rheumatology-driven спостереження з lymphoma workup лише при
  клінічній підозрі (IND-SJOGREN-MALT-LYMPHOMA-PREVENTION-OBSERVATION)
  як альтернатива.

  Доказова база: SIR ~15.6 (Theander Ann Rheum Dis 2006); MALT
  переважає ~60-70%. Предиктори (Brito-Zerón 2014): persistent
  слиновий набряк, низький C4, кріоглобулінемія, palpable purpura,
  моноклональна гаммапатія. EULAR 2020 — щорічна клінічна оцінка для
  lymphoma red flags; parotid US для нового/persistent unilateral
  набряку.

  Це STUB, очікує підпис двох Clinical Co-Lead за §6.1 dev-mode
  exemption.
