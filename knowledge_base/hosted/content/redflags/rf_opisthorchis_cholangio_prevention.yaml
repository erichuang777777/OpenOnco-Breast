shifts_algorithm: []

sources:
  - SRC-IARC-MONO-100B-2012
  - SRC-NCCN-HCC-2025

last_reviewed: "2026-05-18"
reviewer_signoffs: 0
notes: >
  Prevention-persona RedFlag for O. viverrini-driven cholangiocarcinoma
  prevention. Fires on any documented exposure history with confirmatory
  testing. Engine routes to PreventionPlan recommending praziquantel
  (if active infection) + lifelong hepatobiliary surveillance (US + CA
  19-9 q12mo from age 40 in heavily-exposed cohorts). STUB pending
  Co-Lead review.

  Cancer scope: anchored to DIS-CHOLANGIOCARCINOMA. Northeast Thailand
  has the world's highest cholangiocarcinoma incidence (up to 90 per
  100K) — attributable fraction in endemic regions exceeds 50%.

  Geographic context: relevant for Mekong-region diaspora, refugees,
  travelers, and adoptees. Companion to RF-CLONORCHIS-CHOLANGIO-PREVENTION
  (East Asian liver-fluke pathway, biologically similar mechanism).
