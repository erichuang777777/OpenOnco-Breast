id: RF-OPISTHORCHIS-CHOLANGIO-PREVENTION
definition: >-
  History of Opisthorchis viverrini infection (positive stool ova /
  microscopy, positive serology, or documented endemic-region exposure
  with raw / undercooked freshwater-fish consumption) in an individual
  without a current cholangiocarcinoma diagnosis. IARC Group 1
  carcinogen (O. viverrini) — established etiological driver of
  intrahepatic cholangiocarcinoma in the Mekong basin (Northeast
  Thailand, Laos, Vietnam, Cambodia). Praziquantel cures active
  infection but does NOT reverse chronic biliary-tract inflammation
  / fibrosis from prior burden; lifelong hepatobiliary surveillance
  (liver US + CA 19-9 every 12 months from age 40 in heavily-exposed
  cohorts) is the dominant prevention modality. Prevention-persona
  RedFlag (§20 ratification 2026-05-18).
definition_ua: >-
  Анамнез інфекції Opisthorchis viverrini (позитивні ova / мікроскопія
  калу, позитивна серологія, або документована експозиція в
  ендемічному регіоні з вживанням сирої / недостатньо термічно
  обробленої прісноводної риби) у пацієнта без поточного діагнозу
  холангіокарциноми. O. viverrini — канцероген IARC Group 1,
  встановлений етіологічний драйвер внутрішньопечінкової
  холангіокарциноми в басейні Меконгу (північно-східний Таїланд,
  Лаос, В'єтнам, Камбоджа). Празиквантел виліковує активну інфекцію,
  але НЕ зворотний щодо хронічного запалення / фіброзу жовчних
  проток від попереднього навантаження; пожиттєве гепатобіліарне
  спостереження (УЗД печінки + CA 19-9 кожні 12 міс з 40 років у
  важко-експонованих когортах) — домінуюча prevention модальність.
  RedFlag персони prevention (ратифікація §20, 2026-05-18).

trigger:
  type: lab_value
  any_of:
    - finding: "opisthorchis_viverrini_history"
      value: "positive"
    - finding: "opisthorchis_viverrini_ova_stool"
      value: "positive"
    - finding: "opisthorchis_viverrini_serology"
      value: "positive"

clinical_direction: investigate

severity: major
priority: 100
category: other

risk_category: infectious

