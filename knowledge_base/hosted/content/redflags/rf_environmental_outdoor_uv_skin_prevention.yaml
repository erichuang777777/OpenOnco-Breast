notes: "Prevention-persona RedFlag for chronic occupational outdoor UV exposure ≥10y in high-UV-index latitudes. IARC Group 1 solar UV. Distinct from broader RF-LIFESTYLE-UV-EXPOSURE-PREVENTION (which covers tanning beds + sunburn history + recreational UV). Anchored to DIS-BCC per task brief (closest skin DIS to UV-NMSC). Engine routes to PreventionPlan recommending photoprotection counseling + clinical skin exam cadence + patient skin self-exam education + Vitamin D balance. STUB pending two-Clinical-Co-Lead signoff per CHARTER §6.1 dev-mode."
