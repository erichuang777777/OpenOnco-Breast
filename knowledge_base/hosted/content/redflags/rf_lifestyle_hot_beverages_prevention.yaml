id: RF-LIFESTYLE-HOT-BEVERAGES-PREVENTION
definition: >-
  Regular consumption of very hot beverages (≥65°C / 149°F) per IARC
  Monograph 116 (2016) — applies primarily to teas (especially traditional
  preparation styles in regions of Iran, Turkey, China, parts of South
  America with maté), but also coffee/water consumed at scalding
  temperatures. IARC Group 2A (probably carcinogenic) classification —
  associated with esophageal squamous-cell carcinoma (ESCC), particularly
  in regions with high background ESCC incidence. Mechanism: thermal
  injury to esophageal epithelium → chronic inflammation → field
  carcinogenesis. Note: at typical Western coffee/tea temperatures
  (<60°C), no association observed; coffee + tea per se are not
  carcinogenic. Prevention-persona RedFlag (§20 v0.3 lifestyle pilot).
definition_ua: >-
  Регулярне споживання дуже гарячих напоїв (≥65°C) per IARC Monograph 116
  (2016) — застосовується переважно до чаїв (особливо традиційні preparation
  styles у регіонах Ірану, Туреччини, Китаю, частинах Південної Америки з
  matе), а також кофе/води at scalding temperatures. IARC Group 2A
  (probably carcinogenic) — асоційовано з esophageal squamous-cell
  carcinoma (ESCC), особливо в регіонах з high background ESCC incidence.
  Mechanism: thermal injury до esophageal epithelium → chronic inflammation →
  field carcinogenesis. Примітка: при типових Western температурах кофе/чаю
  (<60°C), no association observed.

