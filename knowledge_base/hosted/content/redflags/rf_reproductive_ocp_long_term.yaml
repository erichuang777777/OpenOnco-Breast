notes: "Prevention-persona RedFlag for long-term combined OCP use ≥10y. Mixed cancer profile — modest risk increase (breast, cervical-with-HPV) AND substantial protection (ovarian, endometrial). Engine routes to PreventionPlan recommending COUNSELING-BALANCE indication, not unidirectional risk warning. Critical that render layer present full risk-benefit panel. STUB pending two-Clinical-Co-Lead signoff per CHARTER §6.1 dev-mode."
