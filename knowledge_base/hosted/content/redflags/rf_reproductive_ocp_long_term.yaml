id: RF-REPRODUCTIVE-OCP-LONG-TERM
definition: >-
  Long-term combined oral contraceptive use (≥10 cumulative years).
  Mixed cancer risk profile per IARC Monograph 100A + Collaborative
  Group on Hormonal Factors in Breast Cancer + IARC reviews:
  - Modest BREAST cancer risk increase during current use + ~5y post-
    cessation (RR ~1.08-1.20; effect declines after cessation, baseline
    risk restored ~10y post-cessation).
  - Modest CERVICAL cancer risk increase with long-term use in HPV-
    positive women (RR ~1.5 at ≥5y use; effect attenuates post-cessation).
    HPV is the necessary cofactor.
  - SUBSTANTIAL PROTECTION against OVARIAN cancer (~50% reduction at
    ≥5y use, durable for ≥30y post-cessation).
  - SUBSTANTIAL PROTECTION against ENDOMETRIAL cancer (~50% reduction at
    ≥5y use, durable post-cessation).
  - Modest CRC protective association (less robust).
  Net cancer balance is favorable for most users. Prevention-persona
  RedFlag triggers a COUNSELING-BALANCE indication — risk-benefit
  framing, not unidirectional risk warning. (§20 v0.3 reproductive pilot.)
definition_ua: >-
  Long-term використання combined oral contraceptive (≥10 кумулятивних
  років). Mixed cancer risk profile per IARC Monograph 100A + Collaborative
  Group on Hormonal Factors in Breast Cancer:
  - Modest BREAST cancer ризик під час current use + ~5р post-cessation
    (RR ~1.08-1.20; ефект знижується після cessation).
  - Modest CERVICAL cancer ризик при long-term use у HPV-positive жінок
    (RR ~1.5 при ≥5р use; HPV — necessary cofactor).
  - SUBSTANTIAL PROTECTION проти OVARIAN cancer (~50% reduction при
    ≥5р use, durable ≥30р post-cessation).
  - SUBSTANTIAL PROTECTION проти ENDOMETRIAL cancer (~50% reduction).
  - Modest CRC protective association.
  Net cancer balance favorable для більшості users. Prevention-persona
  RedFlag triggers COUNSELING-BALANCE indication — risk-benefit framing.

trigger:
  type: lab_value
  any_of:
    - finding: "combined_ocp_use_ge_10_years"
      value: true
    - finding: "combined_ocp_current_long_term_use"
      value: true

clinical_direction: investigate

severity: minor
