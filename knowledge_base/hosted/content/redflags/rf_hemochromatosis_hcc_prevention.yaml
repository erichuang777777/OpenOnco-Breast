notes: >
  v0.3 chronic-condition prevention pilot — hereditary hemochromatosis
  (HFE) / HCC. Prevention-persona RedFlag (CHARTER §3 amended 2026-05-18
  Path A, HCP-mediated). Fires when patient profile shows confirmed
  HFE-related hemochromatosis (especially C282Y homozygous with iron
  overload) AND no confirmed HCC. Engine routes to PreventionPlan with
  2 tracks: phlebotomy treatment + ferritin/transferrin saturation
  monitoring + AASLD HCC surveillance if cirrhotic
  (IND-HEMOCHROMATOSIS-HCC-PREVENTION-SURVEILLANCE) as standard;
  hepatology-driven observation in non-cirrhotic iron-controlled HH
  (IND-HEMOCHROMATOSIS-HCC-PREVENTION-OBSERVATION) as alternative.

  Evidence base:
    - **HCC risk in cirrhotic HH:** Niederau et al. NEJM 1996 (cohort
      251 HH patients, HCC SIR 219 in cirrhotic subset vs population);
      Elmberg et al. Gastroenterology 2003 (Swedish national cohort,
      SIR 21 overall, dominated by cirrhotic subset); contemporary
      studies confirm ~3-5%/year cirrhotic HCC incidence — exceeding
      AASLD 1.5%/year surveillance threshold.
    - **HCC risk in non-cirrhotic HH:** very low absolute incidence
      in iron-controlled non-cirrhotic patients per multiple cohorts
      — does not meet AASLD surveillance threshold.
    - **Phlebotomy benefit:** Niederau 1985+1996 long-term cohort —
      phlebotomy-treated non-cirrhotic patients normalize life
      expectancy; cirrhotic patients have markedly improved survival
      but residual HCC risk persists.
    - **AASLD 2023 / EASL 2022 / NCCN-HCC 2025:** HCC surveillance
      with US ± AFP q6mo for any cirrhosis from HH; not recommended
      for non-cirrhotic HFE-positive patients.

  Phlebotomy regimen typically 500 mL weekly to biweekly during
  induction (until ferritin <50 ng/mL), then maintenance phlebotomy
  q2-4mo to keep ferritin 50-100 ng/mL. Iron chelation (deferasirox,
  deferoxamine) for patients unable to undergo phlebotomy (cardiac
  failure, severe anemia from concurrent disease).

  STUB pending two-Clinical-Co-Lead signoff per CHARTER §6.1 dev-mode
  exemption.
notes_ua: >
  v0.3 пілот prevention chronic-condition — спадковий гемохроматоз
  (HFE) / HCC. Prevention-persona RedFlag (CHARTER §3 поправка
  2026-05-18). Спрацьовує коли профіль пацієнта показує підтверджений
  HFE-пов'язаний гемохроматоз (особливо C282Y гомозиготний з
  iron-overload) ТА відсутній підтверджений HCC. Engine маршрутизує
  до PreventionPlan з 2 треками: phlebotomy treatment + ferritin/
  transferrin saturation моніторинг + AASLD HCC surveillance якщо
  cirrhotic (IND-HEMOCHROMATOSIS-HCC-PREVENTION-SURVEILLANCE) як
  стандарт; hepatology-driven спостереження у non-cirrhotic
  iron-controlled HH (IND-HEMOCHROMATOSIS-HCC-PREVENTION-OBSERVATION)
  як альтернатива.

  Доказова база: HCC SIR ~21-200 у cirrhotic HH (Niederau NEJM 1996;
  Elmberg Gastroenterology 2003); ~3-5%/рік absolute incidence —
  перевищує AASLD 1.5%/рік. Non-cirrhotic iron-controlled — дуже
  низький абсолютний ризик. Phlebotomy нормалізує тривалість життя
  для non-cirrhotic; для cirrhotic — поліпшує виживання, але
  залишковий HCC ризик persistent.

  Phlebotomy режим: 500 мл щотижнево-біwknownight індукція (до
  ferritin <50 нг/мл), далі maintenance q2-4 міс (ferritin 50-100
  нг/мл). Iron chelation для пацієнтів, що не можуть phlebotomy.

  Це STUB, очікує підпис двох Clinical Co-Lead за §6.1 dev-mode
  exemption.
