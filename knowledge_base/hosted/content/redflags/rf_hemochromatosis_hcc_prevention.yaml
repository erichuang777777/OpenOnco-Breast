id: RF-HEMOCHROMATOSIS-HCC-PREVENTION
definition: >-
  Hereditary hemochromatosis (HFE-related; C282Y homozygous genotype
  primarily, compound C282Y/H63D heterozygous less common) with
  biochemical or histologic iron overload in an individual without a
  current HCC diagnosis. Strongest genetic HCC risk factor among
  metabolic-genetic liver diseases: relative risk ~20-200x in
  cirrhotic HFE C282Y homozygotes (population baseline rare; absolute
  HCC incidence ~3-5%/year in cirrhotic HH cohorts). Non-cirrhotic
  HFE-positive iron-overload patients carry near-baseline HCC risk;
  the cirrhotic transition is the inflection point. Phlebotomy
  treatment to deplete iron stores (target ferritin <50 ng/mL,
  transferrin saturation <50%) arrests further iron-driven hepatic
  injury but does not reverse established cirrhosis or eliminate
  HCC risk in cirrhotic patients. AASLD HCC surveillance with US ±
  AFP q6mo recommended in HH-associated cirrhosis. Prevention-persona
  RedFlag (§20 ratification 2026-05-18, v0.3 chronic-condition pilot).
definition_ua: >-
  Спадковий гемохроматоз (HFE-пов'язаний; C282Y гомозиготний генотип
  переважно, compound C282Y/H63D гетерозиготний рідше) з біохімічним
  або гістологічним надлишком заліза у пацієнта без поточного діагнозу
  HCC. Найсильніший генетичний HCC фактор ризику серед метаболічно-
  генетичних захворювань печінки: відносний ризик ~20-200x у cirrhotic
  HFE C282Y гомозиготів (популяційний baseline рідкий; абсолютна HCC
  incidence ~3-5%/рік у cirrhotic HH когортах). Non-cirrhotic
  HFE-позитивні пацієнти з iron-overload несуть near-baseline HCC
  ризик; cirrhotic transition — inflection point. Лікування
  флеботомією для виснаження запасів заліза (target ferritin
  <50 нг/мл, transferrin saturation <50%) зупиняє подальшу iron-driven
  hepatic injury, але не реверсує встановлену cirrhosis або елімінує
  HCC ризик у cirrhotic пацієнтів. AASLD HCC surveillance з US ± AFP
  q6 міс рекомендована в HH-асоційованому цирозі. Prevention-persona
  RedFlag (ратифікація §20, 2026-05-18, v0.3 пілот chronic-condition).

