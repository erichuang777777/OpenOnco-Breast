#   DIS-SINONASAL-ADENOCARCINOMA not a separate entity).
relevant_diseases:
  - DIS-HNSCC

shifts_algorithm: []

# Source caveat: IARC Monograph 100C (2012) is canonical for wood-dust /
# leather-dust Group-1 status; NOT yet a separate SRC entity. v0.3
# source-authoring backlog.
