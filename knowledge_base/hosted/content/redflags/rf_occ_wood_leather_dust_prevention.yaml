  - SRC-NCCN-HNSCC-2025

last_reviewed: "2026-05-18"
reviewer_signoffs: 0
notes: >
  Prevention-persona RedFlag — v0.3 occupational batch-2 pilot. Fires
  when patient profile carries documented prior occupational hardwood
  or leather-dust exposure AND no confirmed dust-attributable malignancy
  diagnosis. Engine routes to 2-track PreventionPlan:
    (a) IND-OCC-WOOD-LEATHER-DUST-PREVENTION-INTENSIFIED-SURVEILLANCE
        (standard) — annual ENT consultation with symptom-review
        (unilateral nasal obstruction, epistaxis, anosmia, facial
        pain); low-threshold CT sinus if persistent unilateral
        symptoms develop; PPE counseling if active exposure persists.
    (b) IND-OCC-WOOD-LEATHER-DUST-PREVENTION-OBSERVATION (surveillance)
        — routine general-population care; patient declines annual ENT
        consultation but receives symptom-triggered evaluation.

  Trigger findings are computed booleans from occupational-history
  intake at the patient-profile layer.

  Evidence base: IARC Monograph 100C (2012); Hayes et al. 1986
  (Netherlands woodworkers cohort); Demers et al. 1995 (international
  pooled woodworker analysis). Sinonasal adenocarcinoma SMR ~50-900x
  baseline in heavily-exposed cohorts depending on cumulative dose
  and species (hardwood >> softwood).

  Sources TODO: IARC Monograph 100C (2012) as a new SRC entity. v0.3
  source-authoring backlog.

  STUB pending two-Clinical-Co-Lead signoff per CHARTER §6.1 dev-mode
  exemption.
notes_ua: >
  Prevention-persona RedFlag — v0.3 occupational batch-2 пілот.
  Спрацьовує при документованому попередньому професійному впливі пилу
  твердих порід деревини або шкіри без підтвердженого діагнозу. Engine
  маршрутизує до 2-track PreventionPlan: (а) intensified — щорічна
  ENT-консультація + low-threshold CT синусів; (б) observation —
  symptom-triggered тільки. STUB — очікує підпис двох Clinical Co-Lead
  за §6.1 dev-mode exemption.

