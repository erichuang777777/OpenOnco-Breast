id: RF-OCC-WOOD-LEATHER-DUST-PREVENTION
definition: >-
  Documented historical occupational exposure to hardwood dust (oak,
  beech, mahogany, walnut, teak) or leather dust — typical high-risk
  occupations include cabinetmakers, furniture manufacturing /
  woodworking-shop workers, parquet flooring installers, sawmill workers
  in hardwood operations, and leather / shoe / boot manufacturing
  workers (tanning, cutting, finishing) — in an individual without a
  current dust-associated malignancy diagnosis. Hardwood dust and
  leather dust are IARC Group 1 carcinogens (Monograph 100C, 2012),
  with the strongest epidemiologic association being sinonasal
  adenocarcinoma (a rare histologic subtype of head & neck cancer with
  near-pathognomonic association in heavily-exposed woodworkers).
  Latency is typically ≥30-40 years from first exposure; the rarity of
  sinonasal adenocarcinoma at general-population baseline means
  occupational attribution is particularly clean. There is NO validated
  imaging screening modality — symptom-triggered ENT evaluation with
  low threshold for nasal endoscopy and CT sinus is the operational
  standard. Prevention-persona RedFlag (§20 ratification 2026-05-18,
  v0.3 occupational batch-2 pilot).
definition_ua: >-
  Документоване історичне професійне впливу пилу твердих порід деревини
  (дуб, бук, червоне дерево, горіх, тик) або шкіряного пилу — типові
  високоризикові професії: меблярі, працівники меблевого виробництва /
  деревообробних цехів, монтажники паркетної підлоги, працівники
  лісопилок у твердопородному виробництві, працівники виробництва
  шкіри / взуття (дублення, різання, оздоблення) — у пацієнта без
  поточного діагнозу пил-асоційованої малігнізації. Пил твердої
  деревини та шкіряний пил — канцерогени IARC Group 1
  (Monograph 100C, 2012), найсильніша епідеміологічна асоціація —
  синоназальна аденокарцинома (рідкісний гістологічний підтип
  головно-шийного раку з майже-патогномонічною асоціацією у
  важко-експонованих деревообробників). Латентність зазвичай ≥30-40
  років від першого впливу; рідкісність синоназальної аденокарциноми у
  загальній популяції робить професійну атрибуцію особливо чистою.
  Валідованої модальності imaging-скринінгу НЕМАЄ — symptom-triggered
  ENT-оцінка з низьким порогом для назальної ендоскопії та CT синусів
  — operational standard. Prevention-persona RedFlag (§20 ратифікація
  2026-05-18, v0.3 occupational batch-2 пілот).

trigger:
  type: lab_value
  any_of:
    - finding: "occupational_hardwood_dust_exposure_documented"
      value: true
    - finding: "occupational_leather_dust_exposure_documented"
      value: true

clinical_direction: investigate

severity: major
priority: 100
