  - SRC-NCCN-COLON-2025

last_reviewed: "2026-05-18"
reviewer_signoffs: 0
notes: "Prevention-persona RedFlag combining red-meat ≥500g/week + processed-meat ≥50g/day thresholds per WCRF/AICR + IARC Monograph 114. Severity:major because processed-meat exposure is Group-1 carcinogen with population-attributable fraction ~13% for CRC (WCRF/AICR). Engine routes to PreventionPlan recommending dietary substitution + CRC screening per USPSTF. STUB pending two-Clinical-Co-Lead signoff per CHARTER §6.1 dev-mode. Coexists with existing RF-LIFESTYLE-PROCESSED-MEAT-PREVENTION — both may fire."
