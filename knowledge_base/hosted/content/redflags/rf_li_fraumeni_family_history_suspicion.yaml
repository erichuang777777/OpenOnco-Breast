id: RF-LI-FRAUMENI-FAMILY-HISTORY-SUSPICION
definition: >-
  Family pedigree or personal history meeting criteria suggestive of
  Li-Fraumeni Syndrome (LFS; germline TP53 pathogenic variant), one of
  the most penetrant hereditary cancer syndromes known: any of (a)
  first- or second-degree relative with a confirmed TP53 pathogenic
  variant; (b) Chompret criteria met — proband with an LFS-spectrum
  tumor (soft-tissue sarcoma, osteosarcoma, premenopausal breast
  cancer, CNS tumor, adrenocortical carcinoma, leukemia, or lung
  bronchoalveolar carcinoma) before age 46 AND ≥1 first/second-degree
  relative with LFS-spectrum tumor (other than breast if proband had
  breast cancer) before age 56 or with multiple primaries at any age;
  OR proband with multiple primary tumors (≥2, with first before age
  46); OR proband with adrenocortical carcinoma, choroid plexus
  carcinoma, embryonal anaplastic subtype rhabdomyosarcoma, regardless
  of family history; (c) classic Li-Fraumeni criteria met — proband
  with sarcoma diagnosed <45 + first-degree relative with any cancer
  <45 + an additional first/second-degree relative with any cancer
  <45 OR with sarcoma at any age; (d) proband with ≥2 primary
  LFS-spectrum tumors (soft-tissue sarcoma, osteosarcoma, breast
  premenopausal, CNS tumor, adrenocortical carcinoma, leukemia) at
  any age. No current personal cancer diagnosis in the at-risk
  individual being assessed (current cancer diagnosis routes to
  treatment-track plan with germline-testing recommendation
  embedded). Prevention-persona RedFlag (§20 ratification 2026-05-18,
  v0.2-B hereditary pilot — Li-Fraumeni).
definition_ua: >-
  Сімейний родовід або особиста історія, що відповідає критеріям
  підозри на синдром Li-Fraumeni (LFS; гермінативний патогенний
  варіант TP53), один з найбільш пенетрантних спадкових онкосиндромів
  відомих: будь-яке з (а) родич першого/другого ступеня з
  підтвердженим патогенним варіантом TP53; (б) виконуються критерії
  Chompret — пробанд з LFS-spectrum пухлиною (soft-tissue саркома,
  остеосаркома, premenopausal рак молочної залози, CNS пухлина,
  адренокортикальна карцинома, лейкемія або bronchoalveolar carcinoma
  легені) до 46р І ≥1 родич першого/другого ступеня з LFS-spectrum
  пухлиною (крім молочної залози, якщо пробанд мав рак молочної
  залози) до 56р або з множинними primaries будь-якого віку; АБО
  пробанд з множинними primaries (≥2, з першим до 46р); АБО пробанд
  з адренокортикальною карциномою, choroid plexus карциномою,
  embryonal anaplastic subtype рабдоміосаркомою, незалежно від
  сімейної історії; (в) виконуються classic Li-Fraumeni критерії —
  пробанд із саркомою, діагностованою <45 + родич першого ступеня з
  будь-яким раком <45 + додатковий родич першого/другого ступеня з
  будь-яким раком <45 АБО з саркомою будь-якого віку; (г) пробанд з
  ≥2 primary LFS-spectrum пухлинами (soft-tissue саркома,
  остеосаркома, premenopausal breast, CNS пухлина, адренокортикальна
  карцинома, лейкемія) будь-якого віку. Поточний особистий діагноз
  раку у пацієнта з ризиком відсутній. Prevention-persona RedFlag
  (ратифікація §20, 2026-05-18, v0.2-B пілот спадковості — Li-Fraumeni).

trigger:
  type: lab_value
  any_of:
    - finding: "family_tp53_known_pathogenic_variant"
      value: true
    - finding: "family_chompret_criteria_met"
      value: true
    - finding: "family_classic_lfs_criteria_met"
      value: true
    - finding: "family_multiple_lfs_spectrum_cancers_in_proband"
      value: true

clinical_direction: investigate

severity: major
priority: 100
category: other

# §20 prevention extension — drives engine routing to PreventionPlan
# when patient carries this RF and no confirmed Disease (KSS §20.2).
risk_category: genetic

# LFS-spectrum cancers in KB: breast cancer (DIS-BREAST — most common
# LFS-spectrum cancer in adults), AML (DIS-AML — myeloid leukemia
# component), soft-tissue sarcoma (DIS-SOFT-TISSUE-SARCOMA — sarcoma
# component), GBM (DIS-GBM — CNS tumor component). Adrenocortical
# carcinoma, choroid plexus carcinoma, and osteosarcoma do not have
# dedicated DIS-* entities in current KB; future authoring may add
# them (out of v0.2-B scope per task constraints).
relevant_diseases:
  - DIS-BREAST
  - DIS-AML
  - DIS-SOFT-TISSUE-SARCOMA
  - DIS-GBM

shifts_algorithm: []

