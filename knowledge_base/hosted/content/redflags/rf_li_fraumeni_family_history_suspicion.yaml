notes: >
  v0.2-B hereditary pilot — Li-Fraumeni Syndrome (LFS). Fires on
  pedigree-based suspicion of LFS in an asymptomatic individual (no
  current cancer diagnosis). Engine routes to PreventionPlan
  recommending:
    (a) genetic counseling + germline TP53 testing via
        IND-LI-FRAUMENI-SUSPICION-PREVENTION-GENETIC-COUNSELING
        (standard)
    (b) empirical Toronto-protocol-style enhanced surveillance for
        patients declining testing via
        IND-LI-FRAUMENI-SUSPICION-PREVENTION-ENHANCED-SURVEILLANCE
        (surveillance / alternative, resource-intensive — explicit
        patient-autonomy framing per CHARTER §11).

  Trigger criteria correspond to (1) Chompret criteria for TP53
  testing (revised 2015), (2) classic Li-Fraumeni criteria (Li &
  Fraumeni 1988 / Birch et al. 1994), and (3) NCCN Genetic/Familial
  High-Risk: Breast, Ovarian and Pancreatic v2.2025 LFS section
  testing criteria. Simplified for v0.2-B pilot; production version
  may add quantitative scoring (LFS Mutation Probability Score).

  STUB pending two-Clinical-Co-Lead signoff per CHARTER §6.1 dev-mode
  exemption. Source-set TODO: NCCN Genetic/Familial High-Risk:
  Breast/Ovarian/Pancreatic, dedicated TP53/LFS testing guidance from
  Mai et al. NCI consortium, Bougeard et al. revised Chompret
  criteria, as dedicated SRC-* entities (v0.2-B follow-up authoring;
  license posture to verify per scope proposal open question #7).

  Confirmed TP53 carriers (germline mutation positive on panel) route
  to a DIFFERENT prevention pathway (carrier-confirmed Toronto-
  protocol surveillance — annual whole-body MRI + annual brain MRI +
  careful skin exam + colonoscopy q2-5y from 25 + breast MRI from
  20-25 for women + risk-reducing mastectomy discussion + RADIATION
  AVOIDANCE for confirmed carriers). That pathway is v0.2-B
  follow-up authoring (RF-LI-FRAUMENI-CONFIRMED-CARRIER +
  IND-LI-FRAUMENI-CARRIER-*).

  **RADIATION AVOIDANCE caveat (critical):** TP53 carriers have
  documented elevated risk of radiation-induced secondary cancers in
  the treatment field. Diagnostic radiation (CT, mammography, X-ray)
  is minimized in favor of MRI / ultrasound when feasible.
  Therapeutic radiation for index cancers in TP53 carriers requires
  multidisciplinary discussion of alternatives (surgery alone,
  systemic therapy alone). This applies to CONFIRMED carriers — for
  suspicion-only individuals, standard imaging is acceptable until
  confirmation.

  Lifetime cancer risk in confirmed TP53 carriers (per Mai et al.
  NCI consortium analysis and Bougeard et al. revised Chompret data):
    - Lifetime cumulative cancer risk: ~70% by age 50 in men, ~90%
      by age 50 in women (driven by breast cancer); ≥90% lifetime in
      both sexes.
    - Breast (women): ~54% by age 70; mean dx age ~33y.
    - Soft-tissue sarcoma: ~15% lifetime.
    - Osteosarcoma: ~5-10% lifetime.
    - CNS tumor: ~10-15% lifetime.
    - Adrenocortical carcinoma: ~6-13% lifetime (much higher in
      childhood — pediatric adrenocortical carcinoma is essentially
      diagnostic of LFS in some populations).
    - Leukemia: ~4-6% lifetime.
    - Multiple primary cancers in lifetime: ~50%.

  **Psychological burden caveat:** Li-Fraumeni syndrome carries
  substantial psychological burden — predicted lifetime risk
  approaches 100%, and routine surveillance is resource-intensive
  and anxiety-provoking. Pre-test counseling must explicitly address
  this and connect patients to LFS-specific support resources
  (LFS Association, Living LFS, etc.).
