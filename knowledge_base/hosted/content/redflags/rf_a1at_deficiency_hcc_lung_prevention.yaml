id: RF-A1AT-DEFICIENCY-HCC-LUNG-PREVENTION
definition: >-
  Alpha-1 antitrypsin (A1AT) deficiency, particularly homozygous PiZZ
  genotype (severe deficiency with serum A1AT typically <11 µM /
  <50 mg/dL), in an individual without a current HCC or lung cancer
  diagnosis. PiZZ confers elevated HCC risk in cirrhotic subset
  (~3-5%/year in adult cirrhotic A1AT-deficient cohorts;
  Pittelkow et al. JAMA 2014; Tanash et al. Gastroenterology 2016) and
  elevated lung cancer risk in smokers + non-smokers (Pittelkow JAMA
  2014; observational cohorts SIR ~2-3 for lung cancer, multiplicatively
  higher with smoking). Underlying pathology: misfolded Z-A1AT
  polymerizes in hepatocytes (hepatic injury → fibrosis → cirrhosis →
  HCC) and absent circulating A1AT permits neutrophil-elastase-mediated
  alveolar destruction (emphysema → field-cancerization-mechanism lung
  cancer risk). PiSZ heterozygotes carry intermediate risk; PiMZ
  carriers near-population risk except with concurrent smoking.
  Smoking cessation is the single highest-impact intervention.
  AASLD HCC surveillance with US ± AFP q6mo in cirrhotic A1AT.
  Prevention-persona RedFlag (§20 ratification 2026-05-18, v0.3
  chronic-condition pilot).
definition_ua: >-
  Дефіцит альфа-1 антитрипсину (A1AT), особливо гомозиготний PiZZ
  генотип (тяжкий дефіцит з сироватковим A1AT типово <11 мкМ / <50
  мг/дл), у пацієнта без поточного діагнозу HCC або раку легень. PiZZ
  зумовлює підвищений HCC ризик у cirrhotic підгрупі (~3-5%/рік у
  adult cirrhotic A1AT-deficient когортах; Pittelkow JAMA 2014;
  Tanash Gastroenterology 2016) та підвищений lung-cancer ризик у
  курців + non-смокерів (Pittelkow JAMA 2014; observational cohorts
  SIR ~2-3 для lung cancer, multiplicatively вищий з курінням).
  Underlying патологія: misfolded Z-A1AT polymerizes у гепатоцитах
  (hepatic injury → фіброз → cirrhosis → HCC) і absent circulating
  A1AT permits neutrophil-elastase-mediated alveolar destruction
  (емфізема → field-cancerization lung-cancer ризик). PiSZ
  гетерозиготи — інтермедіарний ризик; PiMZ — near-population ризик
  крім concurrent куріння. Smoking cessation — найбільш імпактна
  інтервенція. AASLD HCC surveillance з US ± AFP q6 міс у cirrhotic
  A1AT. Prevention-persona RedFlag (ратифікація §20, 2026-05-18, v0.3
  пілот chronic-condition).

