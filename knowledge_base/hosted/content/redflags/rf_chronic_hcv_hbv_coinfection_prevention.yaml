notes: >
  Prevention-persona RedFlag for HCV + HBV coinfection cancer prevention.
  Higher severity (critical) than either mono-infection RF — coinfection
  carries documented synergistic HCC risk AND DAA-cure-induced HBV
  reactivation risk that requires combination antiviral. Engine routes
  to PreventionPlan recommending concurrent DAA + nucleos(t)ide analog
  + intensified HCC surveillance (US + AFP q4-6mo, more frequent than
  the q6mo cadence for either mono-infection). STUB pending Co-Lead
  review.

  Cancer scope: anchored to DIS-HCC. NHL prevention (HCV-driven)
  continues to be a secondary benefit; tracked via prose in the
  combined-antiviral indication rationale.

  Distinct from RF-CHRONIC-HCV-NHL-PREVENTION-OPPORTUNITY and
  RF-CHRONIC-HBV-MALIGNANCY-PREVENTION (individual mono-infection RFs).
  When coinfection trigger fires, this RF takes precedence over the
  two individual RFs (higher priority).
