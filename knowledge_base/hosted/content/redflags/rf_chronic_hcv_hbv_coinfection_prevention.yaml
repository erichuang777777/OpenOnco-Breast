id: RF-CHRONIC-HCV-HBV-COINFECTION-PREVENTION
definition: >-
  Concurrent chronic HCV + HBV coinfection (HCV-RNA detectable ≥6
  months AND HBsAg positive ≥6 months) in an individual without a
  current HCC, fulminant hepatitis, or HCV/HBV-associated lymphoma
  diagnosis. Coinfection carries higher HCC incidence and a real risk
  of HBV reactivation / fulminant hepatitis when HCV is cured by DAA
  monotherapy (HCV historically suppressed HBV replication; DAA cure
  lifts that suppression). IARC Group 1 carcinogens (HCV + HBV both) —
  established etiological drivers, synergistic for HCC. Combination
  pathway: DAA (e.g. sofosbuvir/velpatasvir) for HCV cure plus
  concurrent nucleos(t)ide analog (entecavir or tenofovir TDF / TAF)
  for HBV suppression; HCC surveillance more intensive than either
  mono-infection (US + AFP every 4-6 months per AASLD-modified
  protocol). Prevention-persona RedFlag (§20 ratification 2026-05-18).
definition_ua: >-
  Одночасна хронічна коінфекція HCV + HBV (HCV-РНК визначувана
  ≥6 міс ТА HBsAg позитивний ≥6 міс) у пацієнта без поточного
  діагнозу ГЦК, фульмінантного гепатиту чи HCV/HBV-асоційованої
  лімфоми. Коінфекція супроводжується вищою захворюваністю ГЦК і
  реальним ризиком реактивації HBV / фульмінантного гепатиту при
  виліковуванні HCV DAA-монотерапією (HCV історично супресує
  реплікацію HBV; DAA-cure знімає цю супресію). HCV + HBV — обидва
  канцерогени IARC Group 1, синергічні для ГЦК. Комбінований шлях:
  DAA (наприклад sofosbuvir/velpatasvir) для виліковування HCV +
  одночасний nucleos(t)ide аналог (entecavir або tenofovir TDF / TAF)
  для супресії HBV; HCC surveillance інтенсивніший ніж при будь-якій
  моноінфекції (УЗД + AFP кожні 4-6 міс за AASLD-модифікованим
  протоколом). RedFlag персони prevention (ратифікація §20, 2026-05-18).

