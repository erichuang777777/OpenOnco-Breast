notes: "Prevention-persona RedFlag for cumulative hormonal-contraception exposure ≥10y, iatrogenic-axis only (exposure-as-risk). Engine routes to PreventionPlan recommending HPV co-test on schedule per ASCCP / USPSTF, age-appropriate mammographic screening per USPSTF, attentive symptom history (breast lump, abnormal bleeding). Severity minor — absolute risk increment small, effect on breast cancer attenuates after stop. Distinct from RF-REPRODUCTIVE-OCP-LONG-TERM (balanced risk-benefit counseling, see §20 reproductive bucket). STUB pending two-Clinical-Co-Lead signoff per CHARTER §6.1 dev-mode."
