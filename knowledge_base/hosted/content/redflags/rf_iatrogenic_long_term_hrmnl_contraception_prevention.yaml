id: RF-IATROGENIC-LONG-TERM-HRMNL-CONTRACEPTION-PREVENTION
definition: >-
  Cumulative use of estrogen-containing or combined hormonal
  contraception (combined oral contraceptive, combined patch, combined
  vaginal ring) ≥10 years — IARC Group 1 carcinogen (estrogen-progestogen
  combined oral contraceptives). Modest, small-magnitude relative-risk
  elevation: breast cancer +1.2-1.3x during current/recent use (effect
  attenuates within 10 years of stopping; population-level absolute
  increment ~13 extra cases per 100,000 woman-years for ages 35-39);
  cervical cancer +1.5-2.0x at ≥5y use among high-risk HPV-positive
  cohort (mechanism: probable co-factor for HPV persistence + cervical
  squamous-cell carcinoma progression). NOTE: this iatrogenic-persona
  RF is intentionally distinct from RF-REPRODUCTIVE-OCP-LONG-TERM,
  which carries the BALANCED risk-benefit counseling framing
  (substantial ovarian + endometrial protection lifelong). The
  iatrogenic-persona view focuses on the exposure-as-risk axis —
  patient who has already stopped OCP after long use, or who is
  evaluating ongoing breast-screening adequacy + HPV-co-test cadence
  in the context of prior exposure. Prevention-persona RedFlag
  (§20 v0.3 iatrogenic pilot).
definition_ua: >-
  Кумулятивне використання естроген-вмісної або комбінованої
  гормональної контрацепції ≥10 років — IARC Group 1 канцероген
  (combined oral contraceptives). Скромне підвищення ризику:
  breast cancer +1.2-1.3x під час current/recent use (ефект
  згасає протягом 10 років після зупинки; populational absolute
  increment ~13 додаткових випадків на 100,000 woman-years для
  35-39р); cervical cancer +1.5-2.0x при ≥5р у high-risk HPV-
  positive когорті (механізм: ймовірний co-factor для HPV
  persistence + прогресії cervical SCC). ПРИМІТКА: цей iatrogenic-
  персона RF навмисно відмінний від RF-REPRODUCTIVE-OCP-LONG-TERM,
  який несе ЗБАЛАНСОВАНЕ risk-benefit counseling (substantial
  ovarian + endometrial protection lifelong). Iatrogenic-персона
  фокусується на exposure-as-risk осі — пацієнт після тривалого
  OCP use оцінює adequate breast-screening / HPV co-test cadence
  у контексті prior exposure. RedFlag персони prevention.

