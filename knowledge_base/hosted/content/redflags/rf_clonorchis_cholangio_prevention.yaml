last_reviewed: "2026-05-18"
reviewer_signoffs: 0
notes: >
  Prevention-persona RedFlag for C. sinensis-driven cholangiocarcinoma
  prevention. Fires on any documented exposure history with confirmatory
  testing. Engine routes to PreventionPlan recommending praziquantel
  (if active infection) + lifelong hepatobiliary surveillance (US + CA
  19-9 q12mo from age 40 in heavily-exposed cohorts). STUB pending
  Co-Lead review.

  Cancer scope: anchored to DIS-CHOLANGIOCARCINOMA. East-Asian endemic
  belt has 10-50x higher cholangiocarcinoma incidence than non-endemic
  Western populations.

  Geographic context: relevant for East-Asian diaspora, immigrants,
  refugees, adoptees. Companion to RF-OPISTHORCHIS-CHOLANGIO-PREVENTION
  (Mekong-region liver-fluke pathway, biologically similar mechanism —
  identical surveillance protocol).
