id: RF-CLONORCHIS-CHOLANGIO-PREVENTION
definition: >-
  History of Clonorchis sinensis infection (positive stool ova /
  microscopy, positive serology, or documented endemic-region exposure
  with raw / undercooked freshwater-fish consumption) in an individual
  without a current cholangiocarcinoma diagnosis. IARC Group 1
  carcinogen (C. sinensis) — established etiological driver of
  intrahepatic cholangiocarcinoma in East Asia (parts of China, Korea,
  Vietnam, Russian Far East). Praziquantel cures active infection but
  does NOT reverse chronic biliary-tract inflammation / fibrosis from
  prior burden; lifelong hepatobiliary surveillance (liver US + CA 19-9
  every 12 months from age 40 in heavily-exposed cohorts) is the
  dominant prevention modality. Prevention-persona RedFlag (§20
  ratification 2026-05-18).
definition_ua: >-
  Анамнез інфекції Clonorchis sinensis (позитивні ova / мікроскопія
  калу, позитивна серологія, або документована експозиція в
  ендемічному регіоні з вживанням сирої / недостатньо термічно
  обробленої прісноводної риби) у пацієнта без поточного діагнозу
  холангіокарциноми. C. sinensis — канцероген IARC Group 1,
  встановлений етіологічний драйвер внутрішньопечінкової
  холангіокарциноми в Східній Азії (частини Китаю, Корея, В'єтнам,
  російський Далекий Схід). Празиквантел виліковує активну інфекцію,
  але НЕ зворотний щодо хронічного запалення / фіброзу жовчних проток
  від попереднього навантаження; пожиттєве гепатобіліарне
  спостереження (УЗД печінки + CA 19-9 кожні 12 міс з 40 років у
  важко-експонованих когортах) — домінуюча prevention модальність.
  RedFlag персони prevention (ратифікація §20, 2026-05-18).

