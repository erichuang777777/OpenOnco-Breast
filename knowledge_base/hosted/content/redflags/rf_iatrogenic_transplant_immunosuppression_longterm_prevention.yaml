notes: >
  Prevention-persona RedFlag for chronic ≥3y post-transplant
  immunosuppression cohort. Engine routes to PreventionPlan with
  long-cycle surveillance cadence appropriate to the chronic
  cohort (vs the acute-window EBV-DNA cadence in the new-transplant
  RF). Distinct from RF-IATROGENIC-TRANSPLANT-IMMUNOSUPPRESSION-
  PREVENTION (which covers acute / new-transplant window). Both
  RFs may fire simultaneously in the early-chronic window
  (1-3y post-transplant) — engine routes to both surveillance
  tracks, render layer deduplicates overlapping recommendations.

  Anchored to DIS-DLBCL-NOS as the primary lymphoma anchor (late-
  onset PTLD histology more DLBCL-like; DIS-PTLD as the canonical
  early-onset EBV-driven entity). Multiple cancer types listed in
  relevant_diseases reflect the broad cumulative-risk profile of
  the chronic cohort. STUB pending two-Clinical-Co-Lead signoff
  per CHARTER §6.1 dev-mode.
