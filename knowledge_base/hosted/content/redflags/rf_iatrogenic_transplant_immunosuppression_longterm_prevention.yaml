id: RF-IATROGENIC-TRANSPLANT-IMMUNOSUPPRESSION-LONGTERM-PREVENTION
definition: >-
  Solid-organ transplant recipient on chronic immunosuppression ≥3 years
  post-transplant, beyond the high-acute-rejection window — the chronic-
  cohort persona. Distinct from the new-transplant cohort covered by
  RF-IATROGENIC-TRANSPLANT-IMMUNOSUPPRESSION-PREVENTION (which focuses
  on the acute / early window with EBV-DNA monitoring for PTLD, peri-
  transplant antiviral prophylaxis). Chronic-cohort risk profile shifts
  toward: cumulative skin-cancer burden (squamous-cell carcinoma 65-100x
  background; basal-cell carcinoma 10-20x; aggressive SCC subset prone
  to local recurrence + metastasis), late-onset post-transplant
  lymphoproliferative disorder (PTLD; late-onset PTLD ≥1y post-transplant
  more often EBV-negative, more diffuse-large-B-cell-like histology,
  worse prognosis than early-onset EBV-driven PTLD), Kaposi sarcoma
  in HHV-8-exposed cohort, cervical intraepithelial neoplasia / cervical
  cancer (HPV co-factor), anal SCC (HPV co-factor in MSM + women with
  anogenital HPV history), oropharyngeal cancer, HCC in HBV/HCV-history
  cohort, renal-cell carcinoma in kidney-transplant recipients
  (acquired-cystic-disease native-kidney pathway). Prevention-persona
  RedFlag — emphasis on long-cycle surveillance cadence (annual skin
  exam, q1-3y cervical co-test, dental cancer screening, q6mo HCC
  surveillance in at-risk subset), shared-decision discussion of
  immunosuppression-minimization strategies coordinated with the
  transplant team (NEVER unilateral changes), and HPV vaccination
  catch-up where applicable. (§20 v0.3 iatrogenic pilot).
definition_ua: >-
  Реципієнт solid-organ transplant на хронічній імуносупресії ≥3
  років post-transplant, за межами вікна високого acute-rejection
  ризику — persona хронічної когорти. Відмінний від new-transplant
  когорти (RF-IATROGENIC-TRANSPLANT-IMMUNOSUPPRESSION-PREVENTION
  — фокус на acute / early window з EBV-DNA monitoring для PTLD).
  Risk profile хронічної когорти зсувається до: cumulative skin-
  cancer burden (SCC 65-100x background; BCC 10-20x; aggressive
  SCC subset prone до local recurrence + metastasis), late-onset
  PTLD (≥1р post-transplant частіше EBV-negative, DLBCL-like
  histology, гірший prognosis), Kaposi sarcoma у HHV-8-exposed
  когорті, CIN / cervical cancer (HPV co-factor), anal SCC (HPV
  co-factor у MSM + жінок з anogenital HPV history), oropharyngeal
  cancer, HCC при HBV/HCV-history, RCC у kidney-transplant
  recipients (acquired-cystic-disease native-kidney pathway).
  RedFlag персони prevention — long-cycle surveillance cadence
  (annual skin exam, q1-3р cervical co-test, dental cancer screening,
  q6mo HCC surveillance у at-risk subset), shared-decision discussion
  immunosuppression-minimization coordinated з transplant team
  (НІКОЛИ unilateral changes), HPV vaccination catch-up.

