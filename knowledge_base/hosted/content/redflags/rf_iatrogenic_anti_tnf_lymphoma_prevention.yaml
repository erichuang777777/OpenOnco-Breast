notes: >
  Prevention-persona RedFlag for chronic anti-TNF biologic exposure
  ≥3y in pediatric / adolescent / young-adult IBD cohort. Engine
  routes to PreventionPlan recommending (1) EBV serology baseline
  in young adults, (2) B-symptom + lymphadenopathy awareness, (3)
  annual skin examination (synergistic with concomitant thiopurine
  + UV), (4) periodic shared-decision discussion of combination-
  therapy step-down where IBD activity allows (anti-TNF monotherapy
  has favourable cancer signal vs combination with thiopurine),
  (5) vaccination catch-up (HPV, HBV, influenza, pneumococcal).
  Severity = minor — absolute attributable risk in anti-TNF
  monotherapy is small; the meaningful signal is the combination-
  with-thiopurine HSTCL warning specifically in pediatric / young-
  adult cohort, addressed via combination-step-down counseling.
  Anchored to DIS-DLBCL-NOS + DIS-HSTCL. STUB pending two-Clinical-
  Co-Lead signoff per CHARTER §6.1 dev-mode.
