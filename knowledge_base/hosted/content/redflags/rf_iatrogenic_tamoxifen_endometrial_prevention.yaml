notes: "Prevention-persona RedFlag for tamoxifen exposure ≥5y in women with intact uterus. ~2-7 fold endometrial cancer risk. Engine routes to PreventionPlan recommending symptom-prompted evaluation (postmenopausal bleeding → immediate workup with TVUS + endometrial biopsy). Routine asymptomatic TVUS screening NOT recommended per ACOG (false-positives from tamoxifen-related subepithelial changes). STUB pending two-Clinical-Co-Lead signoff per CHARTER §6.1 dev-mode."
