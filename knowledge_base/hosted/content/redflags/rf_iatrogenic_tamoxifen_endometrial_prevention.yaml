id: RF-IATROGENIC-TAMOXIFEN-ENDOMETRIAL-PREVENTION
definition: >-
  Current or prior tamoxifen exposure ≥5 years in a woman with intact
  uterus (no prior hysterectomy). Tamoxifen is a selective estrogen-
  receptor modulator (SERM) — antagonist in breast tissue (therapeutic
  for ER+ breast cancer + risk reduction) but partial agonist in
  endometrium → ~2-7 fold increased endometrial cancer risk
  (predominantly endometrioid; less commonly serous, carcinosarcoma).
  Cumulative risk ~1-2% over 5y treatment; higher with longer duration
  + post-menopausal status. Endometrial cancers in tamoxifen-exposed
  women often more aggressive histology than spontaneous. Population
  with hysterectomy: this RF does NOT fire (no at-risk organ). Patient
  with ER+ breast cancer (treatment-time persona) ALSO has prevention-
  persona considerations covered by this RF. Prevention-persona RedFlag
  (§20 v0.3 iatrogenic pilot).
definition_ua: >-
  Current або prior tamoxifen exposure ≥5 років у жінки з intact uterus
  (без prior hysterectomy). Tamoxifen — selective estrogen-receptor
  modulator (SERM) — antagonist у breast tissue (therapeutic для ER+
  breast cancer + risk reduction) але partial agonist в endometrium →
  ~2-7 fold увеличений endometrial cancer risk (переважно endometrioid;
  менш часто serous, carcinosarcoma). Cumulative risk ~1-2% за 5р
  treatment; вищий при longer duration + post-menopausal status.
  Endometrial cancers у tamoxifen-exposed жінок часто more aggressive
  histology порівняно з spontaneous. Population з hysterectomy: цей RF
  НЕ fires (no at-risk organ).

trigger:
