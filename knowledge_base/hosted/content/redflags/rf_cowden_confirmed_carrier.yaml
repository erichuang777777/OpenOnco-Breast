notes: >
  v0.2-B confirmed-carrier surveillance pathway — Cowden / PHTS. Fires
  on documented germline PTEN pathogenic variant positivity in an
  asymptomatic individual. Engine routes to PreventionPlan recommending:
    (a) IND-COWDEN-CARRIER-SURVEILLANCE (standard) — annual breast
        mammography + MRI from age 30 (women); annual thyroid US from
        diagnosis; endometrial sampling / TVUS q1y from age 35-40
        (women); colonoscopy from age 35 then per-finding; annual skin
        exam; renal US or MRI q1-2y from age 40.
    (b) IND-COWDEN-CARRIER-INTENSIFIED (aggressive) — standard protocol
        PLUS risk-reducing mastectomy / hysterectomy discussion
        post-childbearing.

  STUB pending two-Clinical-Co-Lead signoff per CHARTER §6.1 dev-mode
  exemption. Source-set TODO: Tan et al. Lifetime cancer risks in PHTS,
  Clin Cancer Res 2012 — v0.2-B authoring backlog new SRC entity.

  Lifetime cancer risk in confirmed PTEN carriers (Tan et al. Clin
  Cancer Res 2012; NCCN Genetic / Familial High-Risk Breast Ovarian):
    - Breast (women): ~85% lifetime; often early-onset (40s) and
      bilateral
    - Endometrial: ~28% lifetime; often early-onset (under 50)
    - Thyroid (predominantly follicular, also papillary and Hürthle):
      ~35% lifetime; multinodular goiter near-universal but mostly
      benign
    - Renal (predominantly papillary RCC and chromophobe): ~34% lifetime
    - Colorectal: ~9% lifetime; ganglioneuromatous + hyperplastic polyps
      near-universal but adenoma fraction modest
    - Melanoma: ~6% lifetime
