id: RF-COWDEN-CONFIRMED-CARRIER
definition: >-
  Confirmed germline pathogenic / likely-pathogenic variant in the PTEN
  gene (Cowden syndrome / PTEN hamartoma tumor syndrome, PHTS). Patient
  has had germline PTEN testing returned positive; the pedigree-suspicion
  question is settled. No current personal cancer diagnosis in the
  carrier being assessed. Mandates multi-organ surveillance for the
  Cowden-spectrum cancers (breast — ~85% lifetime; endometrial — ~28%;
  thyroid — ~35%; renal — ~34%; colorectal — ~9%; melanoma — ~6%) with
  protocols starting variously between diagnosis and age 40 depending on
  organ. Prevention-persona RedFlag (§20, v0.2-B confirmed-carrier
  surveillance pathway — distinct from RF-COWDEN-FAMILY-HISTORY-SUSPICION
  which fires before testing).
definition_ua: >-
  Підтверджений гермінативний патогенний / ймовірно-патогенний варіант у
  гені PTEN (синдром Cowden / PTEN hamartoma tumor syndrome, PHTS).
  Пацієнт пройшов germline PTEN-тестування з позитивним результатом;
  питання родовідної підозри вирішене. Поточний особистий діагноз раку
  відсутній. Mandates мульти-органне спостереження для Cowden-spectrum
  раків (молочна залоза ~85%; ендометрій ~28%; щитоподібна ~35%; нирки
  ~34%; колоректальний ~9%; меланома ~6%). Prevention-persona RedFlag
  (§20, v0.2-B шлях спостереження підтверджених носіїв).

