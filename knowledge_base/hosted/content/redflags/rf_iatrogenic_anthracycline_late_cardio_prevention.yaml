notes: "Cancer-survivor late-effects RedFlag for cumulative anthracycline ≥250 mg/m² with ≥5y post-treatment interval. Distinct from RF-IATROGENIC-ANTHRACYCLINE-CARDIO-PREVENTION (general cardio surveillance starting at treatment completion). COG-LTFU-driven echo cadence q1-5y based on dose + chest RT + age at exposure. STUB pending two-Clinical-Co-Lead signoff per CHARTER §6.1 dev-mode."
