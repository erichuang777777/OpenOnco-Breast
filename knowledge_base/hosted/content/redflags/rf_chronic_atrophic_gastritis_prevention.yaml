id: RF-CHRONIC-ATROPHIC-GASTRITIS-PREVENTION
definition: >-
  Chronic atrophic gastritis (CAG) — histologically confirmed loss of
  oxyntic and/or antral gastric glands with replacement by intestinal
  metaplasia and/or pyloric metaplasia, most commonly secondary to
  autoimmune mechanism (anti-parietal and anti-intrinsic-factor
  antibodies, B12 deficiency, achlorhydria, elevated gastrin) or
  long-standing H. pylori infection. Established precursor lesion to
  gastric adenocarcinoma (intestinal type, ~5-10x lifetime relative
  risk; absolute risk ~1-2%/year for OLGA III/IV stages) and a
  potent risk factor for type 1 gastric neuroendocrine tumors arising
  from ECL-cell hyperplasia driven by chronic hypergastrinemia. No
  current gastric malignancy diagnosis. Endoscopic surveillance with
  topographic biopsies (updated Sydney protocol) per OLGA/OLGIM stage
  reduces gastric cancer mortality in high-risk subgroups.
  Prevention-persona RedFlag (§20 ratification 2026-05-18, v0.3
  chronic-condition pilot).
definition_ua: >-
  Хронічний атрофічний гастрит (CAG) — гістологічно підтверджена втрата
  oxyntic та/або antral шлункових залоз з заміщенням кишковою
  метаплазією та/або пілоричною метаплазією, найчастіше вторинна до
  автоімунного механізму (анти-парієтальні та анти-intrinsic-factor
  антитіла, B12-дефіцит, ахлоргідрія, підвищений гастрин) або тривалої
  H. pylori інфекції. Встановлене передракове ураження аденокарциноми
  шлунка (інтестинальний тип, ~5-10x lifetime відносний ризик;
  абсолютний ризик ~1-2%/рік для OLGA III/IV стадій) та потужний
  фактор ризику для type 1 нейроендокринних пухлин шлунка, що
  виникають з ECL-клітинної гіперплазії, керованої хронічною
  гіпергастринемією. Поточний діагноз злоякісного новоутворення
  шлунка відсутній. Ендоскопічне спостереження з топографічними
  біопсіями (оновлений Sydney-протокол) per OLGA/OLGIM стадією знижує
  гастричну рак-смертність у high-risk підгрупах. Prevention-persona
  RedFlag (ратифікація §20, 2026-05-18, v0.3 пілот chronic-condition).

