notes: >
  v0.3 chronic-condition prevention pilot — chronic atrophic gastritis
  (CAG). Prevention-persona RedFlag (CHARTER §3 amended 2026-05-18
  Path A, HCP-mediated). Fires when patient profile shows histologically
  confirmed atrophic gastritis (autoimmune or post-H. pylori) AND no
  confirmed gastric malignancy. Engine routes to PreventionPlan with
  2 tracks: EGD q3-5y with Sydney-protocol surveillance biopsies
  (IND-CHRONIC-ATROPHIC-GASTRITIS-PREVENTION-SURVEILLANCE) as standard;
  symptom-driven observation with B12 + iron monitoring only
  (IND-CHRONIC-ATROPHIC-GASTRITIS-PREVENTION-OBSERVATION) as
  alternative.

  Evidence base:
    - **Gastric cancer risk by OLGA/OLGIM stage:** Rugge et al. Gut 2018
      (12-year prospective cohort): OLGA stage III/IV — 12-year
      gastric cancer incidence ~10-15%; OLGA stage 0-II — <1%.
      OLGIM (intestinal-metaplasia-specific) staging predicts similarly.
    - **MAPS II European Guideline (Pimentel-Nunes et al. Endoscopy
      2019):** EGD with Sydney biopsies (2 antrum + 2 corpus + incisura)
      at diagnosis; q3y surveillance for advanced atrophy/IM (OLGA III/IV
      or OLGIM III/IV); q1y for IM with dysplasia or family history of
      gastric cancer. Optical-enhanced imaging (NBI, BLI) preferred
      where available.
    - **Type 1 gastric NET (autoimmune CAG subset):** ECL-cell hyperplasia
      → micro-NETs → grossly visible polypoid NETs. Typically multifocal,
      indolent, endoscopic resection sufficient for lesions <1 cm; larger
      or rapidly enlarging NETs warrant pathologic review and possible
      antrectomy (removes gastrin drive).
    - **B12 + iron deficiency** are baseline manifestations of autoimmune
      atrophic gastritis; lifelong B12 replacement (PO or IM per response)
      + iron supplementation as needed is standard.

  Coexisting H. pylori (when still present) → eradication per
  RF-H-PYLORI-PREVENTION pathway (separate RF entity). H. pylori
  eradication does not reverse established advanced atrophy/IM but
  arrests further progression.

  STUB pending two-Clinical-Co-Lead signoff per CHARTER §6.1 dev-mode
  exemption.
notes_ua: >
  v0.3 пілот prevention chronic-condition — хронічний атрофічний
  гастрит (CAG). Prevention-persona RedFlag (CHARTER §3 поправка
  2026-05-18). Спрацьовує коли профіль пацієнта показує гістологічно
  підтверджений атрофічний гастрит (автоімунний або post-H. pylori)
  ТА відсутній підтверджений рак шлунка. Engine маршрутизує до
  PreventionPlan з 2 треками: EGD q3-5 роки з Sydney-протоколом
  surveillance біопсіями (IND-CHRONIC-ATROPHIC-GASTRITIS-PREVENTION-
  SURVEILLANCE) як стандарт; symptom-driven observation з B12 + iron
  моніторингом (IND-CHRONIC-ATROPHIC-GASTRITIS-PREVENTION-OBSERVATION)
  як альтернатива.

  Доказова база: OLGA/OLGIM III/IV — 12-річна gastric cancer incidence
  ~10-15% (Rugge Gut 2018). MAPS II (Pimentel-Nunes Endoscopy 2019):
  EGD з Sydney біопсіями (2 антрум + 2 corpus + incisura) при діагнозі;
  q3 роки surveillance для advanced атрофії/IM. Type 1 gastric NET
  (автоімунна CAG підгрупа): ECL-клітинна гіперплазія → micro-NETs.
  B12 + iron заміщення pожиттєве при автоімунному CAG.

  Co-існуючий H. pylori → ерадикація per RF-H-PYLORI-PREVENTION шлях
  (окрема RF entity). Ерадикація не реверсує встановлену advanced
  атрофію/IM, але зупиняє подальшу прогресію.

  Це STUB, очікує підпис двох Clinical Co-Lead за §6.1 dev-mode
  exemption.
