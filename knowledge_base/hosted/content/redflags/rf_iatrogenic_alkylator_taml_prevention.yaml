id: RF-IATROGENIC-ALKYLATOR-TAML-PREVENTION
definition: >-
  History of prior cumulative alkylating-agent chemotherapy exposure
  (cyclophosphamide, ifosfamide, melphalan, busulfan, chlorambucil,
  procarbazine, bendamustine, BCNU/CCNU/lomustine, dacarbazine,
  temozolomide) ≥5 years prior. Therapy-related AML (t-AML) and
  therapy-related MDS following alkylator exposure has characteristic
  features: median latency 5-7 years post-exposure (longer than
  topoisomerase-II-inhibitor t-AML), preceded often by t-MDS phase
  with chromosomes 5q-/-5 or 7q-/-7 cytogenetics, complex karyotype.
  Cumulative incidence ~1-10% at 10y depending on dose + concurrent
  RT + age. Highest risk: Hodgkin lymphoma survivors (MOPP-era),
  multiple myeloma (melphalan), pediatric sarcoma survivors.
  Prevention-persona RedFlag (§20 v0.3 iatrogenic pilot).
definition_ua: >-
  Історія prior cumulative alkylating-agent chemotherapy exposure
  (cyclophosphamide, ifosfamide, melphalan, busulfan, chlorambucil,
  procarbazine, bendamustine, BCNU/CCNU/lomustine, dacarbazine,
  temozolomide) ≥5 років тому. Therapy-related AML (t-AML) і therapy-
  related MDS після alkylator exposure має characteristic features:
  median latency 5-7 років post-exposure (довша ніж topoisomerase-II-
  inhibitor t-AML), often preceded by t-MDS phase з chromosomes 5q-/-5
  або 7q-/-7 cytogenetics, complex karyotype. Cumulative incidence
  ~1-10% at 10р залежно від dose + concurrent RT + age. Highest risk:
  Hodgkin lymphoma survivors (MOPP-era), multiple myeloma (melphalan),
  pediatric sarcoma survivors.

