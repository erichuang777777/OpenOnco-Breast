notes: "Prevention-persona RedFlag for prior alkylator chemotherapy exposure. Median t-AML latency 5-7y post-exposure; cumulative incidence ~1-10% at 10y. Engine routes to PreventionPlan recommending CBC q3-6mo for first 10y post-chemo + low threshold for marrow evaluation if cytopenias appear. STUB pending two-Clinical-Co-Lead signoff per CHARTER §6.1 dev-mode."
