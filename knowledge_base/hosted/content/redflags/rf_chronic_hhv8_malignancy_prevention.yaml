  - SRC-NIH-AIDS-2024

last_reviewed: "2026-05-18"
reviewer_signoffs: 0
notes: >
  Prevention-persona RedFlag for HHV-8-driven malignancy prevention.
  Fires on HHV-8 seropositivity in HIV+, transplant, or other
  immunocompromised host without confirmed Kaposi sarcoma / MCD / PEL.
  Engine routes to PreventionPlan recommending immune restoration
  (ART for HIV+; transplant-immunosuppression rebalance) + mucocutaneous
  + oral + GI / lymph-node surveillance. STUB pending Co-Lead review.

  Cancer scope: anchored to DIS-KAPOSI. MCD and PEL are HHV-8-driven
  but not yet authored as distinct Disease entities — covered via the
  prose surveillance rationale in the indication for now.

  Distinct from RF-CHRONIC-HIV-MALIGNANCY-PREVENTION (existing) — that
  is HIV-as-RF; this is HHV-8-positivity-as-RF (the co-factor that turns
  HIV-related immunocompromise into Kaposi risk specifically).
