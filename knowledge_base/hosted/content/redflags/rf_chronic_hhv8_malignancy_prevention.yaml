id: RF-CHRONIC-HHV8-MALIGNANCY-PREVENTION
definition: >-
  HHV-8 (Kaposi sarcoma-associated herpesvirus, KSHV) seropositivity in an
  immunocompromised host (HIV+, solid-organ-transplant recipient on chronic
  immunosuppression, or other persistent T-cell-immunity deficit) without a
  current Kaposi sarcoma, multicentric Castleman disease (MCD), or primary
  effusion lymphoma (PEL) diagnosis. IARC Group 1 carcinogen (HHV-8) —
  established etiological driver of all three lymphoproliferative outcomes.
  No curative antiviral exists; the prevention pathway is restoration /
  optimization of cellular immunity (ART initiation for HIV+; minimization
  of immunosuppression where transplant-graft-safe) plus mucocutaneous +
  oral + GI awareness and lymph-node surveillance. Prevention-persona
  RedFlag (§20 ratification 2026-05-18).
definition_ua: >-
  Серопозитивність HHV-8 (Kaposi sarcoma-associated herpesvirus, KSHV) у
  імуноскомпрометованого пацієнта (ВІЛ+, реципієнт трансплантації
  солідного органу на хронічній імуносупресії, або інший стійкий дефіцит
  T-клітинного імунітету) без поточного діагнозу саркоми Капоші,
  мультицентричної хвороби Кастлмана (MCD) чи первинної ефузійної
  лімфоми (PEL). HHV-8 — канцероген IARC Group 1, встановлений
  етіологічний драйвер всіх трьох лімфопроліферативних результатів.
  Куративної антивірусної терапії немає; шлях профілактики — відновлення
  / оптимізація клітинного імунітету (старт АРТ при ВІЛ+; мінімізація
  імуносупресії де graft-safe) + спостереження шкіри, ротової
  порожнини, ШКТ і лімфовузлів. RedFlag персони prevention
  (ратифікація §20, 2026-05-18).

trigger:
  type: lab_value
  any_of:
    - finding: "hhv8_serology"
      value: "positive"
    - finding: "kshv_serology"
      value: "positive"
    - finding: "hhv8_status_in_immunocompromised"
      value: "positive"

clinical_direction: investigate

severity: major
priority: 100
category: other

risk_category: infectious

