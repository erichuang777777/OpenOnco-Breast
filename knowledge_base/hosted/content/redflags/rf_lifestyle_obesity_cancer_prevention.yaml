id: RF-LIFESTYLE-OBESITY-CANCER-PREVENTION
definition: >-
  Obesity — BMI ≥30 kg/m² (per WHO definition) — OR class 2/3 obesity
  with BMI ≥35 / ≥40. IARC + WCRF/AICR establish obesity as an
  etiological factor for ≥13 cancers: post-menopausal breast cancer,
  endometrial, colorectal, esophageal adenocarcinoma, gastric cardia,
  hepatocellular carcinoma (via NAFLD/MASH), renal cell carcinoma,
  ovarian, pancreatic, gallbladder, multiple myeloma, meningioma, and
  thyroid. Population-attributable fraction varies by cancer (~30-40%
  for endometrial; ~5-10% for many others). Sustained weight reduction
  (especially ≥10% BMI) produces meaningful cancer-incidence reduction
  particularly for hormonally-driven tumors. Prevention-persona RedFlag.
definition_ua: >-
  Ожиріння — BMI ≥30 кг/м² (за WHO визначенням) — АБО class 2/3 obesity
  з BMI ≥35 / ≥40. IARC + WCRF/AICR встановлюють ожиріння як етіологічний
  фактор для ≥13 раків. Sustained weight reduction (особливо ≥10% BMI)
  виробляє meaningful cancer-incidence reduction.

